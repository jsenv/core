<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Route Layout Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useRef, useState } from "preact/hooks";
      import { Link, Route, route, setupRoutes } from "@jsenv/navi";

      /*
       * Demonstrate that <Route> children act as a layout:
       * the parent <Route> renders its element (the shell/layout) and the
       * child <Route> renders the matching page inside it.
       *
       * Current limitation: when NO child route matches, the layout is still
       * rendered because <Route> (container mode) always renders its children.
       * Navigate to "/" to see the issue — the gray shell appears even though
       * no sub-route matches.
       */

      const RENDER_COUNT_STYLE = {
        fontSize: "11px",
        color: "#999",
        fontFamily: "monospace",
        marginLeft: "8px",
      };
      const COUNTER_BUTTON_STYLE = {
        fontSize: "11px",
        padding: "2px 8px",
        cursor: "pointer",
        marginLeft: "4px",
      };
      const useRenderCount = (label) => {
        const countRef = useRef(0);
        countRef.current++;
        return (
          <span style={RENDER_COUNT_STYLE}>
            [{label} renders: {countRef.current}]
          </span>
        );
      };
      const useLocalCounter = (label) => {
        const [count, setCount] = useState(0);
        return (
          <span>
            <button
              style={COUNTER_BUTTON_STYLE}
              onClick={() => setCount(count + 1)}
            >
              {label}: {count} (click to re-render)
            </button>
          </span>
        );
      };

      const HOME_ROUTE = route("");
      const PROFILE_ROUTE = route("/profile");
      const SETTINGS_ROUTE = route("/settings");
      setupRoutes([HOME_ROUTE, PROFILE_ROUTE, SETTINGS_ROUTE]);

      const AppLayout = ({ appCounter, children }) => {
        const renderCount = useRenderCount("AppLayout");

        return (
          <div
            style={{
              fontFamily: "system-ui, sans-serif",
              maxWidth: "600px",
              padding: "20px",
            }}
          >
            <nav style={{ display: "flex", gap: "12px", marginBottom: "20px" }}>
              <Link route={HOME_ROUTE}>Home</Link>
              <Link route={PROFILE_ROUTE}>Profile</Link>
              <Link route={SETTINGS_ROUTE}>Settings</Link>
              {renderCount}
              {appCounter}
            </nav>
            {children}
          </div>
        );
      };

      // Layout shell rendered when either /profile or /settings matches.
      // The child routes render the actual page content inside it.
      const AuthenticatedLayout = ({ appCounter, children }) => {
        const renderCount = useRenderCount("AuthLayout");
        const localCounter = useLocalCounter("AuthLayout state");
        return (
          <div
            style={{
              padding: "16px",
              background: "#f0f4ff",
              border: "1px solid #c0d0ff",
              borderRadius: "6px",
            }}
          >
            <div
              style={{
                fontSize: "12px",
                color: "#555",
                marginBottom: "12px",
              }}
            >
              Authenticated area {renderCount}
              <br />
              App counter: {appCounter} | Self counter: {localCounter}
            </div>
            {children}
          </div>
        );
      };

      const App = () => {
        const appCounter = useLocalCounter("App");

        return (
          <AppLayout appCounter={appCounter}>
            <Route id="app_layout">
              {/* Home has no layout wrapper — standalone page */}
              <Route
                route={HOME_ROUTE}
                element={() => <HomePage appCounter={appCounter} />}
              />

              <Route id="auth_layout">
                <AuthenticatedLayout appCounter={appCounter}>
                  <Route
                    route={PROFILE_ROUTE}
                    element={() => <ProfilePage appCounter={appCounter} />}
                  />
                  <Route
                    route={SETTINGS_ROUTE}
                    element={() => <SettingsPage appCounter={appCounter} />}
                  />
                </AuthenticatedLayout>
              </Route>
            </Route>
          </AppLayout>
        );
      };

      const HomePage = ({ appCounter }) => {
        const renderCount = useRenderCount("HomePage");
        const localCounter = useLocalCounter("Home state");
        return (
          <div>
            <h2>Home {renderCount}</h2>
            <p>No layout wrapper on this page.</p>
            App counter: {appCounter}
            <br />
            Self counter: {localCounter}
          </div>
        );
      };
      const ProfilePage = ({ appCounter }) => {
        const renderCount = useRenderCount("ProfilePage");
        const localCounter = useLocalCounter("Profile state");
        return (
          <div>
            <h2>Profile {renderCount}</h2>
            <p>This page is wrapped inside the authenticated layout.</p>
            App counter: {appCounter}
            <br />
            Self counter: {localCounter}
          </div>
        );
      };
      const SettingsPage = ({ appCounter }) => {
        const renderCount = useRenderCount("SettingsPage");
        const localCounter = useLocalCounter("Settings state");
        return (
          <div>
            <h2>Settings {renderCount}</h2>
            <p>This page is also wrapped inside the authenticated layout.</p>
            App counter: {appCounter}
            <br />
            Self counter: {localCounter}
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
