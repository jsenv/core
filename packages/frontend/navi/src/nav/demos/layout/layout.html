<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Route Layout Demo</title>
    <style>
      @keyframes render-flash {
        0% {
          background-color: var(--flash-color);
          transform: scale(1.08);
        }
        60% {
          transform: scale(1);
        }
        100% {
          background-color: transparent;
        }
      }
      .render-flash {
        display: inline-block;
        animation: render-flash 700ms ease-out;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      .app {
        max-width: 700px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .component-box {
        margin: 8px 0;
        border: 2px solid;
        border-radius: 8px;
        overflow: hidden;
      }
      .component-header {
        display: flex;
        padding: 8px 12px;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        font-size: 13px;
      }
      .component-name {
        font-weight: 700;
        font-size: 14px;
      }
      .component-body {
        padding: 10px 14px;
      }
      .counters {
        display: flex;
        margin-bottom: 8px;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        color: #555;
        font-size: 12px;
      }
      .counter-btn {
        padding: 3px 10px;
        font-size: 12px;
        font-family: monospace;
        background: white;
        border: 1px solid currentColor;
        border-radius: 4px;
        cursor: pointer;
      }
      .counter-btn:hover {
        opacity: 0.8;
      }
      nav {
        display: flex;
        margin-bottom: 12px;
        gap: 8px;
      }
      nav a {
        padding: 5px 14px;
        color: #333;
        font-size: 14px;
        text-decoration: none;
        background: #e0e0e0;
        border-radius: 6px;
      }
      nav a[aria-current] {
        color: white;
        background: #333;
      }
      /* color palette per component */
      .box-app {
        border-color: #6366f1;
      }
      .box-app .component-header {
        background: #eef2ff;
      }
      .box-auth {
        border-color: #0ea5e9;
      }
      .box-auth .component-header {
        background: #e0f2fe;
      }
      .box-home {
        border-color: #10b981;
      }
      .box-home .component-header {
        background: #d1fae5;
      }
      .box-profile {
        border-color: #f59e0b;
      }
      .box-profile .component-header {
        background: #fef3c7;
      }
      .box-settings {
        border-color: #ef4444;
      }
      .box-settings .component-header {
        background: #fee2e2;
      }
      .box-notfound {
        border-color: #a855f7;
      }
      .box-notfound .component-header {
        background: #f3e8ff;
      }
      .box-dashboard {
        border-color: #f97316;
      }
      .box-dashboard .component-header {
        background: #ffedd5;
      }
      .box-dashboard-notfound {
        border-color: #64748b;
      }
      .box-dashboard-notfound .component-header {
        background: #f1f5f9;
      }

      .btn-app {
        color: #6366f1;
      }
      .btn-auth {
        color: #0ea5e9;
      }
      .btn-home {
        color: #10b981;
      }
      .btn-profile {
        color: #f59e0b;
      }
      .btn-settings {
        color: #ef4444;
      }
      .btn-notfound {
        color: #a855f7;
      }
      .btn-dashboard {
        color: #f97316;
      }
      .btn-dashboard-notfound {
        color: #64748b;
      }
      .box-dashboard-projects {
        border-color: #14b8a6;
      }
      .box-dashboard-projects .component-header {
        background: #ccfbf1;
      }
      .box-dashboard-analytics {
        border-color: #f43f5e;
      }
      .box-dashboard-analytics .component-header {
        background: #ffe4e6;
      }
      .btn-dashboard-projects {
        color: #14b8a6;
      }
      .btn-dashboard-analytics {
        color: #f43f5e;
      }
    </style>
  </head>
  <body>
    <div
      id="render-log"
      style="
        background: #1e1e2e;
        color: #cdd6f4;
        font-family: monospace;
        font-size: 12px;
        padding: 8px 16px;
        border-bottom: 2px solid #45475a;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        flex-direction: column;
        align-items: center;
      "
    >
      <span style="color: #6c7086; font-size: 11px"
        >Render tracker (increments each time a component function is called by
        Preact):</span
      >
      <div
        id="render-log-counts"
        style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center"
      ></div>
    </div>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useLayoutEffect, useState } from "preact/hooks";
      import { Nav, Link, Route, route, setupRoutes } from "@jsenv/navi";

      const HOME_ROUTE = route("");
      const PROFILE_ROUTE = route("/profile");
      const SETTINGS_ROUTE = route("/settings");
      const DASHBOARD_HOME_ROUTE = route("/dashboard");
      const DASHBOARD_PROJECTS_ROUTE = route("/dashboard/projects");
      const DASHBOARD_ANALYTICS_ROUTE = route("/dashboard/analytics");
      const DASHBOARD_UNKNOWN_ROUTE = route("/dashboard/unknown");
      const DASHBOARD_SECTION_ROUTE = route("/dashboard/");
      const UNKNOWN_ROUTE = route("/unknown");
      setupRoutes([
        HOME_ROUTE,
        PROFILE_ROUTE,
        SETTINGS_ROUTE,
        DASHBOARD_HOME_ROUTE,
        DASHBOARD_PROJECTS_ROUTE,
        DASHBOARD_ANALYTICS_ROUTE,
        DASHBOARD_UNKNOWN_ROUTE,
        DASHBOARD_SECTION_ROUTE,
        UNKNOWN_ROUTE,
      ]);

      // Plain-DOM render tracking — never causes re-renders
      const renderCounts = {
        App: 0,
        AuthLayout: 0,
        DashboardLayout: 0,
        HomePage: 0,
        ProfilePage: 0,
        SettingsPage: 0,
        DashboardHomePage: 0,
        DashboardProjectsPage: 0,
        DashboardAnalyticsPage: 0,
        NotFoundPage: 0,
        DashboardNotFound: 0,
      };
      const trackRender = (name) => {
        renderCounts[name] = (renderCounts[name] || 0) + 1;
      };
      // Names that rendered during the current Preact batch
      const pendingFlash = new Set();
      const COLORS = {
        App: "#a5b4fc",
        AuthLayout: "#7dd3fc",
        DashboardLayout: "#fdba74",
        HomePage: "#6ee7b7",
        ProfilePage: "#fcd34d",
        SettingsPage: "#fca5a5",
        DashboardHomePage: "#fb923c",
        DashboardProjectsPage: "#2dd4bf",
        DashboardAnalyticsPage: "#fb7185",
        NotFoundPage: "#c084fc",
        DashboardNotFound: "#94a3b8",
      };
      const TREE = [
        { name: "App", indent: "" },
        { name: "HomePage", indent: "  \u251c\u2500 " },
        { name: "AuthLayout", indent: "  \u251c\u2500 " },
        { name: "ProfilePage", indent: "  \u2502   \u251c\u2500 " },
        { name: "SettingsPage", indent: "  \u2502   \u2514\u2500 " },
        { name: "DashboardLayout", indent: "  \u251c\u2500 " },
        { name: "DashboardHomePage", indent: "  \u2502   \u251c\u2500 " },
        { name: "DashboardProjectsPage", indent: "  \u2502   \u251c\u2500 " },
        { name: "DashboardAnalyticsPage", indent: "  \u2502   \u251c\u2500 " },
        { name: "DashboardNotFound", indent: "  \u2502   \u2514\u2500 " },
        { name: "NotFoundPage", indent: "  \u2514\u2500 " },
      ];
      let logInitialized = false;
      const initRenderLog = () => {
        const counts = document.getElementById("render-log-counts");
        if (!counts || logInitialized) return;
        logInitialized = true;
        const lines = TREE.map(({ name, indent }) => {
          const color = COLORS[name] ?? "#cdd6f4";
          return `<span style="white-space:pre;color:#6c7086">${indent}</span><span id="rc-${name}" style="color:${color};opacity:0.35;padding:0 3px;border-radius:3px;--flash-color:${color}cc">${name}&thinsp;<b>0</b></span>`;
        });
        counts.innerHTML = `<div style="font-family:monospace;font-size:12px;line-height:1.7">${lines.join("<br>")}</div>`;
      };
      const flushRenderLog = () => {
        initRenderLog();
        const flashing = new Set(pendingFlash);
        pendingFlash.clear();
        for (const { name } of TREE) {
          const span = document.getElementById(`rc-${name}`);
          if (!span) continue;
          const count = renderCounts[name] ?? 0;
          span.style.opacity = count === 0 ? "0.35" : "1";
          span.querySelector("b").textContent = count;
          if (flashing.has(name)) {
            // Force reflow to restart animation if already running
            span.classList.remove("render-flash");
            // eslint-disable-next-line no-void
            void span.offsetWidth;
            span.classList.add("render-flash");
            span.addEventListener(
              "animationend",
              () => span.classList.remove("render-flash"),
              { once: true },
            );
          }
        }
      };
      const useTrackRender = (name) => {
        trackRender(name);
        pendingFlash.add(name);
        useLayoutEffect(flushRenderLog);
      };
      flushRenderLog();
      initRenderLog();

      const ComponentBox = ({ colorClass, name, headerExtras, children }) => (
        <div class={`component-box ${colorClass}`}>
          <div class="component-header">
            <span class="component-name">{name}</span>
            {headerExtras}
          </div>
          <div class="component-body">{children}</div>
        </div>
      );

      const CounterBtn = ({ colorClass, label, count, onClick }) => (
        <button class={`counter-btn ${colorClass}`} onClick={onClick}>
          {label}: {count}
        </button>
      );

      const useCounter = () => {
        const [count, setCount] = useState(0);
        return [count, () => setCount((c) => c + 1)];
      };

      /* ── App (root) ─────────────────────────────────────────────── */
      const App = () => {
        useTrackRender("App");
        const [appCount, incApp] = useCounter();
        const [authCount, incAuth] = useCounter();

        return (
          <div class="app">
            <ComponentBox
              colorClass="box-app"
              name="App"
              headerExtras={
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
              }
            >
              <Nav>
                <Link route={HOME_ROUTE}>Home</Link>
                <Link route={PROFILE_ROUTE}>Profile</Link>
                <Link route={SETTINGS_ROUTE}>Settings</Link>

                <Link route={DASHBOARD_HOME_ROUTE}>Dashboard</Link>
                <Link
                  route={UNKNOWN_ROUTE}
                  style="color:#a855f7;background:#f3e8ff;"
                >
                  Unknown (fallback)
                </Link>
              </Nav>
              <Route id="app_layout">
                <Route
                  route={HOME_ROUTE}
                  element={HomePage}
                  elementProps={{ appCount, incApp }}
                />
                <Route
                  id="auth_layout"
                  element={AuthLayout}
                  elementProps={{ appCount, incApp, authCount, incAuth }}
                >
                  <Route
                    route={PROFILE_ROUTE}
                    element={ProfilePage}
                    elementProps={{ appCount, incApp, authCount, incAuth }}
                  />
                  <Route
                    route={SETTINGS_ROUTE}
                    element={SettingsPage}
                    elementProps={{ appCount, incApp }}
                  />
                </Route>
                <Route
                  id="dashboard_layout"
                  route={DASHBOARD_SECTION_ROUTE}
                  element={DashboardLayout}
                  elementProps={{ appCount, incApp }}
                >
                  <Route
                    route={DASHBOARD_HOME_ROUTE}
                    element={DashboardHomePage}
                    elementProps={{ appCount, incApp }}
                  />
                  <Route
                    route={DASHBOARD_PROJECTS_ROUTE}
                    element={DashboardProjectsPage}
                    elementProps={{ appCount, incApp }}
                  />
                  <Route
                    route={DASHBOARD_ANALYTICS_ROUTE}
                    element={DashboardAnalyticsPage}
                    elementProps={{ appCount, incApp }}
                  />
                  <Route
                    fallback
                    element={DashboardNotFound}
                    elementProps={{ appCount, incApp }}
                  />
                </Route>
                <Route
                  fallback
                  element={NotFoundPage}
                  elementProps={{ appCount, incApp }}
                />
              </Route>
            </ComponentBox>
          </div>
        );
      };

      /* ── AuthLayout ─────────────────────────────────────────────── */
      const AuthLayout = ({
        appCount,
        incApp,
        authCount,
        incAuth,
        children,
      }) => {
        useTrackRender("AuthLayout");

        return (
          <ComponentBox
            colorClass="box-auth"
            name="AuthLayout"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-auth"
                  label="Auth state"
                  count={authCount}
                  onClick={incAuth}
                />
              </>
            }
          >
            {children}
          </ComponentBox>
        );
      };

      /* ── Pages ──────────────────────────────────────────────────── */
      const HomePage = ({ appCount, incApp }) => {
        useTrackRender("HomePage");
        const [homeCount, incHome] = useCounter();

        return (
          <ComponentBox
            colorClass="box-home"
            name="HomePage"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-home"
                  label="Home state"
                  count={homeCount}
                  onClick={incHome}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              No layout wrapper on this page.
            </p>
          </ComponentBox>
        );
      };

      const ProfilePage = ({ appCount, incApp }) => {
        useTrackRender("ProfilePage");
        const [profileCount, incProfile] = useCounter();

        return (
          <ComponentBox
            colorClass="box-profile"
            name="ProfilePage"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-profile"
                  label="Profile state"
                  count={profileCount}
                  onClick={incProfile}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              Wrapped inside AuthLayout.
            </p>
          </ComponentBox>
        );
      };

      const SettingsPage = ({ appCount, incApp }) => {
        useTrackRender("SettingsPage");
        const [settingsCount, incSettings] = useCounter();

        return (
          <ComponentBox
            colorClass="box-settings"
            name="SettingsPage"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-settings"
                  label="Settings state"
                  count={settingsCount}
                  onClick={incSettings}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              Wrapped inside AuthLayout.
            </p>
          </ComponentBox>
        );
      };

      const NotFoundPage = ({ appCount, incApp }) => {
        useTrackRender("NotFoundPage");
        const [nfCount, incNf] = useCounter();

        return (
          <ComponentBox
            colorClass="box-notfound"
            name="NotFoundPage (fallback)"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-notfound"
                  label="NotFound state"
                  count={nfCount}
                  onClick={incNf}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              No route matched — shown via <code>fallback</code> prop.
            </p>
          </ComponentBox>
        );
      };

      /* ── Dashboard ──────────────────────────────────────────────── */
      const DashboardLayout = ({ appCount, incApp, children }) => {
        useTrackRender("DashboardLayout");
        const [dashCount, incDash] = useCounter();

        return (
          <ComponentBox
            colorClass="box-dashboard"
            name="DashboardLayout"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-dashboard"
                  label="Dashboard state"
                  count={dashCount}
                  onClick={incDash}
                />
              </>
            }
          >
            <Nav>
              <Link route={DASHBOARD_HOME_ROUTE}>Dashboard home</Link>
              <Link route={DASHBOARD_PROJECTS_ROUTE}>Projects</Link>
              <Link route={DASHBOARD_ANALYTICS_ROUTE}>Analytics</Link>
              <Link
                route={DASHBOARD_UNKNOWN_ROUTE}
                style="color:#64748b;background:#f1f5f9;"
              >
                Unknown (fallback)
              </Link>
            </Nav>
            {children}
          </ComponentBox>
        );
      };

      const DashboardHomePage = ({ appCount, incApp }) => {
        useTrackRender("DashboardHomePage");
        const [pageCount, incPage] = useCounter();

        return (
          <ComponentBox
            colorClass="box-dashboard"
            name="DashboardHomePage"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-dashboard"
                  label="Page state"
                  count={pageCount}
                  onClick={incPage}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              Dashboard overview — wrapped inside DashboardLayout.
            </p>
          </ComponentBox>
        );
      };

      const DashboardProjectsPage = ({ appCount, incApp }) => {
        useTrackRender("DashboardProjectsPage");
        const [pageCount, incPage] = useCounter();

        return (
          <ComponentBox
            colorClass="box-dashboard-projects"
            name="DashboardProjectsPage"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-dashboard-projects"
                  label="Page state"
                  count={pageCount}
                  onClick={incPage}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              Dashboard projects — wrapped inside DashboardLayout.
            </p>
          </ComponentBox>
        );
      };

      const DashboardAnalyticsPage = ({ appCount, incApp }) => {
        useTrackRender("DashboardAnalyticsPage");
        const [pageCount, incPage] = useCounter();

        return (
          <ComponentBox
            colorClass="box-dashboard-analytics"
            name="DashboardAnalyticsPage"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-dashboard-analytics"
                  label="Page state"
                  count={pageCount}
                  onClick={incPage}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              Dashboard analytics — wrapped inside DashboardLayout.
            </p>
          </ComponentBox>
        );
      };

      const DashboardNotFound = ({ appCount, incApp }) => {
        useTrackRender("DashboardNotFound");
        const [nfCount, incNf] = useCounter();

        return (
          <ComponentBox
            colorClass="box-dashboard-notfound"
            name="DashboardNotFound (fallback inside layout)"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-dashboard-notfound"
                  label="DashNotFound state"
                  count={nfCount}
                  onClick={incNf}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              No dashboard route matched — fallback rendered inside{" "}
              <code>DashboardLayout</code>.
            </p>
          </ComponentBox>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
