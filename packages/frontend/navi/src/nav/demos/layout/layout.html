<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Route Layout Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      .app {
        max-width: 700px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .component-box {
        margin: 8px 0;
        border: 2px solid;
        border-radius: 8px;
        overflow: hidden;
      }
      .component-header {
        display: flex;
        padding: 8px 12px;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        font-size: 13px;
      }
      .component-name {
        font-weight: 700;
        font-size: 14px;
      }
      .component-body {
        padding: 10px 14px;
      }
      .counters {
        display: flex;
        margin-bottom: 8px;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        color: #555;
        font-size: 12px;
      }
      .counter-btn {
        padding: 3px 10px;
        font-size: 12px;
        font-family: monospace;
        background: white;
        border: 1px solid currentColor;
        border-radius: 4px;
        cursor: pointer;
      }
      .counter-btn:hover {
        opacity: 0.8;
      }
      nav {
        display: flex;
        margin-bottom: 12px;
        gap: 8px;
      }
      nav a {
        padding: 5px 14px;
        color: #333;
        font-size: 14px;
        text-decoration: none;
        background: #e0e0e0;
        border-radius: 6px;
      }
      nav a[aria-current] {
        color: white;
        background: #333;
      }
      /* color palette per component */
      .box-app {
        border-color: #6366f1;
      }
      .box-app .component-header {
        background: #eef2ff;
      }
      .box-auth {
        border-color: #0ea5e9;
      }
      .box-auth .component-header {
        background: #e0f2fe;
      }
      .box-home {
        border-color: #10b981;
      }
      .box-home .component-header {
        background: #d1fae5;
      }
      .box-profile {
        border-color: #f59e0b;
      }
      .box-profile .component-header {
        background: #fef3c7;
      }
      .box-settings {
        border-color: #ef4444;
      }
      .box-settings .component-header {
        background: #fee2e2;
      }
      .box-notfound {
        border-color: #a855f7;
      }
      .box-notfound .component-header {
        background: #f3e8ff;
      }

      .btn-app {
        color: #6366f1;
      }
      .btn-auth {
        color: #0ea5e9;
      }
      .btn-home {
        color: #10b981;
      }
      .btn-profile {
        color: #f59e0b;
      }
      .btn-settings {
        color: #ef4444;
      }
      .btn-notfound {
        color: #a855f7;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div
      id="render-log"
      style="
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1e1e2e;
        color: #cdd6f4;
        font-family: monospace;
        font-size: 12px;
        padding: 8px 16px;
        border-top: 2px solid #45475a;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        align-items: center;
      "
    >
      <span style="color: #6c7086; font-size: 11px"
        >render counts per component:</span
      >
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useLayoutEffect, useState } from "preact/hooks";
      import { Link, Route, route, setupRoutes } from "@jsenv/navi";

      const HOME_ROUTE = route("");
      const PROFILE_ROUTE = route("/profile");
      const SETTINGS_ROUTE = route("/settings");
      setupRoutes([HOME_ROUTE, PROFILE_ROUTE, SETTINGS_ROUTE]);

      // Plain-DOM render tracking — never causes re-renders
      const renderCounts = {};
      const trackRender = (name) => {
        renderCounts[name] = (renderCounts[name] || 0) + 1;
      };
      const flushRenderLog = () => {
        const panel = document.getElementById("render-log");
        if (!panel) return;
        const COLORS = {
          App: "#a5b4fc",
          AuthLayout: "#7dd3fc",
          HomePage: "#6ee7b7",
          ProfilePage: "#fcd34d",
          SettingsPage: "#fca5a5",
          NotFoundPage: "#c084fc",
        };
        panel.innerHTML = Object.entries(renderCounts)
          .map(
            ([name, count]) =>
              `<span style="color:${COLORS[name] ?? "#cdd6f4"}">${name}: <b>${count}</b></span>`,
          )
          .join("&ensp;·&ensp;");
      };
      const useTrackRender = (name) => {
        trackRender(name);
        useLayoutEffect(flushRenderLog);
      };

      const ComponentBox = ({ colorClass, name, headerExtras, children }) => (
        <div class={`component-box ${colorClass}`}>
          <div class="component-header">
            <span class="component-name">{name}</span>
            {headerExtras}
          </div>
          <div class="component-body">{children}</div>
        </div>
      );

      const CounterBtn = ({ colorClass, label, count, onClick }) => (
        <button class={`counter-btn ${colorClass}`} onClick={onClick}>
          {label}: {count}
        </button>
      );

      const useCounter = () => {
        const [count, setCount] = useState(0);
        return [count, () => setCount((c) => c + 1)];
      };

      /* ── App (root) ─────────────────────────────────────────────── */
      const App = () => {
        useTrackRender("App");
        const [appCount, incApp] = useCounter();

        return (
          <div class="app">
            <ComponentBox
              colorClass="box-app"
              name="App"
              headerExtras={
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
              }
            >
              <nav>
                <Link route={HOME_ROUTE}>Home</Link>
                <Link route={PROFILE_ROUTE}>Profile</Link>
                <Link route={SETTINGS_ROUTE}>Settings</Link>
                <a href="/unknown" style="color:#a855f7;background:#f3e8ff;">
                  Unknown (fallback)
                </a>
              </nav>
              <Route id="app_layout">
                <Route
                  route={HOME_ROUTE}
                  element={HomePage}
                  elementProps={{ appCount, incApp }}
                />
                <Route
                  id="auth_layout"
                  element={AuthLayout}
                  elementProps={{ appCount, incApp }}
                >
                  <Route
                    route={PROFILE_ROUTE}
                    element={ProfilePage}
                    elementProps={{ appCount, incApp }}
                  />
                  <Route
                    route={SETTINGS_ROUTE}
                    element={SettingsPage}
                    elementProps={{ appCount, incApp }}
                  />
                </Route>
                <Route
                  fallback
                  element={NotFoundPage}
                  elementProps={{ appCount, incApp }}
                />
              </Route>
            </ComponentBox>
          </div>
        );
      };

      /* ── AuthLayout ─────────────────────────────────────────────── */
      const AuthLayout = ({ appCount, incApp, children }) => {
        useTrackRender("AuthLayout");
        const [authCount, incAuth] = useCounter();

        return (
          <ComponentBox
            colorClass="box-auth"
            name="AuthLayout"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-auth"
                  label="Auth state"
                  count={authCount}
                  onClick={incAuth}
                />
              </>
            }
          >
            {children}
          </ComponentBox>
        );
      };

      /* ── Pages ──────────────────────────────────────────────────── */
      const HomePage = ({ appCount, incApp }) => {
        useTrackRender("HomePage");
        const [homeCount, incHome] = useCounter();

        return (
          <ComponentBox
            colorClass="box-home"
            name="HomePage"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-home"
                  label="Home state"
                  count={homeCount}
                  onClick={incHome}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              No layout wrapper on this page.
            </p>
          </ComponentBox>
        );
      };

      const ProfilePage = ({ appCount, incApp }) => {
        useTrackRender("ProfilePage");
        const [profileCount, incProfile] = useCounter();

        return (
          <ComponentBox
            colorClass="box-profile"
            name="ProfilePage"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-profile"
                  label="Profile state"
                  count={profileCount}
                  onClick={incProfile}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              Wrapped inside AuthLayout.
            </p>
          </ComponentBox>
        );
      };

      const SettingsPage = ({ appCount, incApp }) => {
        useTrackRender("SettingsPage");
        const [settingsCount, incSettings] = useCounter();

        return (
          <ComponentBox
            colorClass="box-settings"
            name="SettingsPage"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-settings"
                  label="Settings state"
                  count={settingsCount}
                  onClick={incSettings}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              Wrapped inside AuthLayout.
            </p>
          </ComponentBox>
        );
      };

      const NotFoundPage = ({ appCount, incApp }) => {
        useTrackRender("NotFoundPage");
        const [nfCount, incNf] = useCounter();

        return (
          <ComponentBox
            colorClass="box-notfound"
            name="NotFoundPage (fallback)"
            headerExtras={
              <>
                <CounterBtn
                  colorClass="btn-app"
                  label="App state"
                  count={appCount}
                  onClick={incApp}
                />
                <CounterBtn
                  colorClass="btn-notfound"
                  label="NotFound state"
                  count={nfCount}
                  onClick={incNf}
                />
              </>
            }
          >
            <p style="margin:0;color:#555;font-size:13px;">
              No route matched — shown via <code>fallback</code> prop.
            </p>
          </ComponentBox>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
