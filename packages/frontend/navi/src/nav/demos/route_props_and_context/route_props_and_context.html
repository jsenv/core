<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Route props and context demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useRef, useState } from "preact/hooks";
      import { Box, Route, Nav, Link, route, setupRoutes } from "@jsenv/navi";

      const ALPHA_ROUTE = route("/alpha");
      const BETA_ROUTE = route("/beta");
      setupRoutes([ALPHA_ROUTE, BETA_ROUTE]);

      /*
       * RouteContent — the element rendered inside the route.
       * It receives props from its wrapper (wrapperCount) to show
       * that route elements have access to whatever the wrapper passes.
       */
      const RouteContent = ({ label, wrapperCount }) => {
        const renderCount = useRef(0);
        renderCount.current++;
        return (
          <Box
            flex="y"
            spacing="s"
            style={{
              border: "1px solid #aaa",
              padding: "8px",
              borderRadius: "4px",
            }}
          >
            <strong>{label} (RouteContent)</strong>
            <span>
              wrapperCount from props: <strong>{wrapperCount}</strong>
            </span>
            <span style={{ color: "#888", fontSize: "0.85em" }}>
              RouteContent render #{renderCount.current}
            </span>
          </Box>
        );
      };

      /*
       * AlphaWrapper — wraps the Alpha route.
       * Owns a counter and passes it to RouteContent via elementProps.
       *
       * Recommended: elementProps — the component is only instantiated
       * when the route matches.
       */
      const AlphaWrapper = () => {
        const renderCount = useRef(0);
        renderCount.current++;
        const [count, setCount] = useState(0);
        return (
          <Box
            flex="y"
            spacing="s"
            style={{
              border: "2px solid #1976d2",
              padding: "12px",
              borderRadius: "6px",
            }}
          >
            <strong>AlphaWrapper</strong>
            <span style={{ color: "#888", fontSize: "0.85em" }}>
              AlphaWrapper render #{renderCount.current}
            </span>
            <span>
              count: <strong>{count}</strong>
            </span>
            <button
              onClick={() => {
                setCount(count + 1);
              }}
            >
              Increment
            </button>
            <Route
              route={ALPHA_ROUTE}
              element={RouteContent}
              elementProps={{ label: "Alpha", wrapperCount: count }}
            />
          </Box>
        );
      };

      /*
       * BetaWrapper — wraps the Beta route.
       * Owns a counter and passes it to RouteContent via element={<>}.
       *
       * Not recommended: element={<RouteContent />} calls the component
       * unconditionally, even when the route does not match.
       */
      const BetaWrapper = () => {
        const renderCount = useRef(0);
        renderCount.current++;
        const [count, setCount] = useState(0);
        return (
          <Box
            flex="y"
            spacing="s"
            style={{
              border: "2px solid #e53935",
              padding: "12px",
              borderRadius: "6px",
            }}
          >
            <strong>BetaWrapper</strong>
            <span style={{ color: "#888", fontSize: "0.85em" }}>
              BetaWrapper render #{renderCount.current}
            </span>
            <span>
              count: <strong>{count}</strong>
            </span>
            <button
              onClick={() => {
                setCount(count + 1);
              }}
            >
              Increment
            </button>
            <Route
              route={BETA_ROUTE}
              element={<RouteContent label="Beta" wrapperCount={count} />}
            />
          </Box>
        );
      };

      const App = () => {
        return (
          <Box flex="y" spacing="m">
            <Nav spacing="s">
              <Link route={ALPHA_ROUTE} appearance="tab" currentIndicator>
                Alpha
              </Link>
              <Link route={BETA_ROUTE} appearance="tab" currentIndicator>
                Beta
              </Link>
            </Nav>
            <p>
              Each wrapper owns a counter. When it increments, the wrapper
              re-renders and passes the updated count as a prop to its route
              element.
            </p>
            <AlphaWrapper />
            <BetaWrapper />
          </Box>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
