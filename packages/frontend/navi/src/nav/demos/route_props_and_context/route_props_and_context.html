<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Route props and context demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useRef, useState } from "preact/hooks";
      import { Box, Route, Nav, Link, route, setupRoutes } from "@jsenv/navi";

      const ALPHA_ROUTE = route("/alpha");
      const BETA_ROUTE = route("/beta");
      setupRoutes([ALPHA_ROUTE, BETA_ROUTE]);

      /*
       * RouteContent — the leaf element rendered inside the route.
       * Displays 3 counters:
       *   1. appCount — from App, passed down via wrapper then elementProps
       *   2. wrapperCount — from its direct wrapper, via elementProps
       *   3. its own local counter
       */
      const RouteContent = ({ label, appCount, wrapperCount }) => {
        const [count, setCount] = useState(0);
        return (
          <Box
            flex="y"
            spacing="s"
            style={{
              border: "1px solid #aaa",
              padding: "8px",
              borderRadius: "4px",
            }}
          >
            <strong>{label} (RouteContent)</strong>
            <span>
              appCount (from App): <strong>{appCount}</strong>
            </span>
            <span>
              wrapperCount (from wrapper): <strong>{wrapperCount}</strong>
            </span>
            <span>
              own count: <strong>{count}</strong>
            </span>
            <button
              onClick={() => {
                setCount(count + 1);
              }}
            >
              Increment own count
            </button>
          </Box>
        );
      };

      /*
       * AlphaWrapper — wraps the Alpha route.
       * Receives appCount from App and passes it along with its own count
       * to RouteContent via elementProps.
       *
       * Recommended: elementProps — the component is only instantiated
       * when the route matches.
       */
      const AlphaWrapper = ({ appCount }) => {
        const [count, setCount] = useState(0);
        return (
          <Box
            flex="y"
            spacing="s"
            style={{
              border: "2px solid #1976d2",
              padding: "12px",
              borderRadius: "6px",
            }}
          >
            <strong>AlphaWrapper</strong>
            <span>
              count: <strong>{count}</strong>
            </span>
            <button
              onClick={() => {
                setCount(count + 1);
              }}
            >
              Increment wrapper count
            </button>
            <Route
              route={ALPHA_ROUTE}
              element={RouteContent}
              elementProps={{ label: "Alpha", appCount, wrapperCount: count }}
            />
          </Box>
        );
      };

      /*
       * BetaWrapper — wraps the Beta route.
       * Receives appCount from App and passes it along with its own count
       * to RouteContent via element={<>}.
       *
       * Not recommended: element={<RouteContent />} calls the component
       * unconditionally, even when the route does not match.
       */
      const BetaWrapper = ({ appCount }) => {
        const [count, setCount] = useState(0);
        return (
          <Box
            flex="y"
            spacing="s"
            style={{
              border: "2px solid #e53935",
              padding: "12px",
              borderRadius: "6px",
            }}
          >
            <strong>BetaWrapper</strong>
            <span>
              count: <strong>{count}</strong>
            </span>
            <button
              onClick={() => {
                setCount(count + 1);
              }}
            >
              Increment wrapper count
            </button>
            <Route
              route={BETA_ROUTE}
              element={
                <RouteContent
                  label="Beta"
                  appCount={appCount}
                  wrapperCount={count}
                />
              }
            />
          </Box>
        );
      };

      const App = () => {
        const [appCount, setAppCount] = useState(0);
        return (
          <Box flex="y" spacing="m">
            <Nav spacing="m">
              <Link route={ALPHA_ROUTE}>Alpha</Link>
              <Link route={BETA_ROUTE}>Beta</Link>
            </Nav>
            <Box flex="y" spacing="s">
              <strong>App</strong>
              <span>
                count: <strong>{appCount}</strong>
              </span>
              <button
                onClick={() => {
                  setAppCount(appCount + 1);
                }}
              >
                Increment app count
              </button>
            </Box>
            <AlphaWrapper appCount={appCount} />
            <BetaWrapper appCount={appCount} />
          </Box>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
