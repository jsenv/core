<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>S-curve tab corners demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px;
        color: #222;
        font-family: system-ui, sans-serif;
        background: #e8eaed;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }
      .controls {
        display: flex;
        margin-bottom: 32px;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
      }
      .controls label {
        color: #555;
        font-weight: 600;
      }
      .controls input[type="range"] {
        width: 160px;
      }
      .controls output {
        min-width: 32px;
        color: #333;
        font-variant-numeric: tabular-nums;
      }

      /* ── tab strip ───────────────────────────────────── */
      .tabstrip {
        position: relative;
        display: flex;
        align-items: flex-end;
        gap: 0;
      }
      .panel {
        position: relative;
        z-index: 1;
        width: 460px;
        min-height: 60px;
        padding: 20px 24px;
        color: #444;
        font-size: 0.9rem;
      }
      .binder-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* ── SVG tab ──────────────────────────────────────── */
      .svg-tab {
        position: relative;
        display: inline-flex;
        padding: 8px 24px 40px;
        align-items: center;
        justify-content: center;
        color: #888;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        user-select: none;
      }
      .svg-tab.active {
        color: #222;
      }
      .svg-tab svg {
        position: absolute;
        inset: 0;
        overflow: visible;
      }
      .svg-tab span {
        position: relative;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useLayoutEffect, useRef } from "preact/hooks";

      /*
        Why we draw borders with SVG instead of using CSS borders:

        The tab shape requires two features that CSS borders cannot provide:
          1. Skipping border segments — the active tab must have no bottom border so it
             visually merges with the panel below it. CSS has no way to omit one side of
             a border while keeping the surrounding corners intact.
          2. Inverted (concave) border-radius — the corners where the tab meets the panel
             need an inward curve (like a notch), the opposite of what CSS border-radius
             produces. CSS only supports convex (outward) rounding.

        Both canvas and SVG can draw arbitrary paths that solve these problems.
        We use SVG rather than canvas so the shapes are part of the DOM and fully
        visible / inspectable in the browser dev tools.
      */

      // The active tab and its panel share a single SVG border drawn as a filled
      // path. This avoids any visual seam between CSS borders and SVG borders.
      //
      // The SVG is absolutely positioned over the whole binder area (tabstrip +
      // panel). Its coordinate origin is the top-left of the tab row.
      //
      // Shape (outer boundary, clockwise from panel bottom-left):
      //   panel BL corner → panel bottom → panel BR corner
      //   → panel right up → panel TR (square, no radius here yet)
      //   → left along panel top to tab right edge
      //   → inverted BR corner of active tab (concave notch)
      //   → tab right side up → tab TR corner → tab top → tab TL corner
      //   → tab left side down → tab BL = panel TL
      //   → panel left side down → panel BL corner → Z
      //
      // The inner boundary is the same shape inset by b, with the tab bottom
      // opening (no horizontal inner segment connecting tab bottom to panel top).

      // Low-level arc helpers: produce SVG arc commands with an explicit sweep flag.
      // sweep=1 → clockwise arc; sweep=0 → counter-clockwise arc.
      const arcSweep1 = (r, dx, dy) => {
        if (r <= 0) return `l ${dx},${dy}`;
        return `a ${r},${r} 0 0 1 ${dx},${dy}`;
      };
      const arcSweep0 = (r, dx, dy) => {
        if (r <= 0) return `l ${dx},${dy}`;
        return `a ${r},${r} 0 0 0 ${dx},${dy}`;
      };

      // Semantic aliases used when drawing the CW outer path.
      // In a CW path: convex (outward) corners use sweep=1, concave (inward) use sweep=0.
      const arcConvex = arcSweep1;
      const arcConcave = arcSweep0;

      // Builds the centerline path of the border (inset by borderWidth/2 from the outer edge).
      // Rendered as a stroked path with strokeWidth=1 so we can see exactly where the border
      // center runs, without worrying about fill or inner/outer boundary math.
      //
      // Centerline radii:
      //   convex corners:  r - borderWidth/2  (center moves inward → smaller arc)
      //   concave corners: r + borderWidth/2  (center moves outward from corner → larger arc)
      const buildBinderCenterlinePath = ({
        tabX,
        tabWidth,
        tabRowHeight,
        panelWidth,
        panelHeight,
        borderWidth,
        cornerRadius,
      }) => {
        const h = borderWidth / 2; // half border width = inset amount
        const convR = Math.max(0, cornerRadius - h); // centerline convex radius
        const concR = convR; // concave junction uses same visual radius as convex corners

        const hasRightJunction = tabX + tabWidth < panelWidth;
        const hasLeftJunction = tabX > 0;
        const rightConcR = hasRightJunction ? concR : 0;
        const leftConcR = hasLeftJunction ? concR : 0;

        // Inset coords
        const left = h;
        const top = h;
        const right = panelWidth - h;
        const bottom = tabRowHeight + panelHeight - h;
        const tabLeft = tabX + h;
        const tabRight = tabX + tabWidth - h;
        const junctionY = tabRowHeight - h; // y of the junction point (tab bottom / panel top)

        const d = [];
        // Start at tab TL, move right along tab top
        d.push(`M ${tabLeft + convR},${top}`);
        d.push(`h ${tabRight - tabLeft - 2 * convR}`); // tab top →
        d.push(arcConvex(convR, convR, convR)); // tab TR: right→down
        if (rightConcR > 0) {
          d.push(`v ${junctionY - top - convR - rightConcR}`); // tab right ↓
          d.push(arcConcave(rightConcR, rightConcR, rightConcR)); // right junction: down→right (concave)
        } else {
          d.push(`v ${junctionY - top - convR}`); // tab right ↓ (no junction arc)
        }
        d.push(`h ${right - tabRight - convR - rightConcR}`); // panel top-right →
        d.push(arcConvex(convR, convR, convR)); // panel TR: right→down
        d.push(`v ${bottom - junctionY - 2 * convR}`); // panel right ↓
        d.push(arcConvex(convR, -convR, convR)); // panel BR: down→left
        d.push(`h -${right - left - 2 * convR}`); // panel bottom ←
        d.push(arcConvex(convR, -convR, -convR)); // panel BL: left→up
        d.push(`v -${bottom - junctionY - convR}`); // panel left ↑ to junction y
        if (leftConcR > 0) {
          d.push(`h ${tabLeft - left - leftConcR}`); // panel top-left →
          d.push(arcConcave(leftConcR, leftConcR, -leftConcR)); // left junction: right→up (concave)
        } else {
          d.push(`h ${tabLeft - left}`); // panel top-left → (no junction arc)
        }
        d.push(`v -${junctionY - top - convR - leftConcR}`); // tab left ↑
        d.push(arcConvex(convR, convR, -convR)); // tab TL: up→right
        d.push("Z");

        return d.join(" ");
      };

      // The unified binder SVG: covers the full binder area (tab row + panel).
      // Draws the border centerline as a thin stroke so the shape is visible.
      const BinderSvg = ({
        tabX,
        tabWidth,
        tabRowHeight,
        panelWidth,
        panelHeight,
        borderWidth,
        cornerRadius,
        borderColor,
      }) => {
        const centerlinePath = buildBinderCenterlinePath({
          tabX,
          tabWidth,
          tabRowHeight,
          panelWidth,
          panelHeight,
          borderWidth,
          cornerRadius,
        });

        return (
          <svg
            style={{
              position: "absolute",
              inset: 0,
              overflow: "visible",
              pointerEvents: "none",
              zIndex: 1,
            }}
            width={panelWidth}
            height={tabRowHeight + panelHeight}
          >
            <path
              d={centerlinePath}
              fill="none"
              stroke={borderColor}
              stroke-width="1"
            />
          </svg>
        );
      };

      // Inactive tabs use plain CSS borders for now.
      const SvgTab = ({ label, active, onClick, r, b, tabRef }) => {
        return (
          <div
            ref={tabRef}
            class={`svg-tab${active ? " active" : ""}`}
            style={{
              borderWidth: `${b}px`,
              borderStyle: "solid",
              borderColor: "violet",
              borderRadius: `${r}px ${r}px 0 0`,
              background: "#f0f0f0",
              borderBottom: "none",
              marginBottom: `${b}px`,

              ...(active
                ? {
                    borderColor: "transparent",
                    background: "transparent",
                    zIndex: 2,
                  }
                : {
                    zIndex: 0,
                  }),
            }}
            onClick={onClick}
          >
            <span>{label}</span>
          </div>
        );
      };

      const TABS = [
        {
          key: "approved",
          label: "Approved",
          content: "These 3 items have been reviewed and approved.",
        },
        {
          key: "pending",
          label: "Pending",
          content: "These 2 items are awaiting review.",
        },
        {
          key: "archived",
          label: "Archived",
          content: "No archived items yet.",
        },
      ];

      const Binder = ({ initialActive, b, r, borderColor }) => {
        const [active, setActive] = useState(initialActive);
        const panelRef = useRef(null);
        const activeTabRef = useRef(null);
        const [panelSize, setPanelSize] = useState(null);

        useLayoutEffect(() => {
          const el = panelRef.current;
          if (!el) return null;
          const measure = () => {
            const tabEl = activeTabRef.current;
            setPanelSize({
              width: el.offsetWidth,
              height: el.offsetHeight,
              top: el.offsetTop,
              tabWidth: tabEl ? tabEl.offsetWidth : 0,
              tabLeft: tabEl ? tabEl.offsetLeft : 0,
            });
          };
          const obs = new ResizeObserver(measure);
          obs.observe(el);
          measure();
          return () => obs.disconnect();
        }, []);

        // Re-measure when the active tab changes (different tab may have different width/position)
        useLayoutEffect(() => {
          const tabEl = activeTabRef.current;
          if (!tabEl) return;
          setPanelSize((prev) =>
            prev
              ? {
                  ...prev,
                  tabWidth: tabEl.offsetWidth,
                  tabLeft: tabEl.offsetLeft,
                }
              : prev,
          );
        }, [active]);

        return (
          <div style={{ position: "relative", display: "inline-block" }}>
            {/* The unified SVG sits behind everything, covering tabstrip + panel */}
            {panelSize && (
              <BinderSvg
                tabX={panelSize.tabLeft}
                tabWidth={panelSize.tabWidth}
                tabRowHeight={panelSize.top - b}
                panelWidth={panelSize.width}
                panelHeight={panelSize.height + b}
                borderWidth={b}
                cornerRadius={r}
                borderColor={borderColor}
              />
            )}
            <div class="tabstrip">
              {TABS.map((tab) => (
                <SvgTab
                  key={tab.key}
                  label={tab.label}
                  active={active === tab.key}
                  onClick={() => setActive(tab.key)}
                  r={r}
                  b={b}
                  tabRef={active === tab.key ? activeTabRef : null}
                />
              ))}
            </div>
            <div
              ref={panelRef}
              class="panel"
              style={{
                borderWidth: `${b}px`,
                borderStyle: "solid",
                borderColor: "transparent",
                borderTop: "none",
              }}
            >
              {TABS.find((t) => t.key === active).content}
            </div>
          </div>
        );
      };

      const Demo = () => {
        const [b, setB] = useState(20);
        const [r, setR] = useState(20);
        const borderColor = "#bbb";

        return (
          <div>
            <h1>S-curve tab corners — inline SVG</h1>
            <div class="controls">
              <div style="display: flex; align-items: start; justify-content: start; flex-direction: column; gap: 4px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <label for="border-slider">Border width</label>
                  <input
                    id="border-slider"
                    type="range"
                    min="1"
                    max="20"
                    value={b}
                    onInput={(e) => setB(Number(e.target.value))}
                  />
                  <output>{b}px</output>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">
                  <label for="radius-slider">Border radius</label>
                  <input
                    id="radius-slider"
                    type="range"
                    min="0"
                    max="30"
                    value={r}
                    onInput={(e) => setR(Number(e.target.value))}
                  />
                  <output>{r}px</output>
                </div>
              </div>
            </div>
            <div class="binder-group">
              <Binder
                initialActive="approved"
                b={b}
                r={r}
                borderColor={borderColor}
              />
              <Binder
                initialActive="pending"
                b={b}
                r={r}
                borderColor={borderColor}
              />
              <Binder
                initialActive="archived"
                b={b}
                r={r}
                borderColor={borderColor}
              />
            </div>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
