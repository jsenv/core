<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>S-curve tab corners demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px;
        color: #222;
        font-family: system-ui, sans-serif;
        background: #e8eaed;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }
      .controls {
        display: flex;
        margin-bottom: 32px;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
      }
      .controls label {
        color: #555;
        font-weight: 600;
      }
      .controls input[type="range"] {
        width: 160px;
      }
      .controls output {
        min-width: 32px;
        color: #333;
        font-variant-numeric: tabular-nums;
      }

      /* ── tab strip ───────────────────────────────────── */
      .tabstrip {
        position: relative;
        display: flex;
        align-items: flex-end;
        gap: 0;
      }
      .panel {
        position: relative;
        z-index: 1;
        width: 460px;
        min-height: 60px;
        padding: 20px 24px;
        color: #444;
        font-size: 0.9rem;
      }
      .binder-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* ── SVG tab ──────────────────────────────────────── */
      .svg-tab {
        position: relative;
        display: inline-flex;
        padding: 8px 24px 10px;
        align-items: center;
        justify-content: center;
        color: #888;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        user-select: none;
      }
      .svg-tab.active {
        color: #222;
      }
      .svg-tab svg {
        position: absolute;
        inset: 0;
        overflow: visible;
      }
      .svg-tab span {
        position: relative;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useLayoutEffect, useRef } from "preact/hooks";

      /*
        Why we draw borders with SVG instead of using CSS borders:

        The tab shape requires two features that CSS borders cannot provide:
          1. Skipping border segments — the active tab must have no bottom border so it
             visually merges with the panel below it. CSS has no way to omit one side of
             a border while keeping the surrounding corners intact.
          2. Inverted (concave) border-radius — the corners where the tab meets the panel
             need an inward curve (like a notch), the opposite of what CSS border-radius
             produces. CSS only supports convex (outward) rounding.

        Both canvas and SVG can draw arbitrary paths that solve these problems.
        We use SVG rather than canvas so the shapes are part of the DOM and fully
        visible / inspectable in the browser dev tools.
      */

      // The active tab and its panel share a single SVG border drawn as a filled
      // path. This avoids any visual seam between CSS borders and SVG borders.
      //
      // The SVG is absolutely positioned over the whole binder area (tabstrip +
      // panel). Its coordinate origin is the top-left of the tab row.
      //
      // Shape (outer boundary, clockwise from panel bottom-left):
      //   panel BL corner → panel bottom → panel BR corner
      //   → panel right up → panel TR (square, no radius here yet)
      //   → left along panel top to tab right edge
      //   → inverted BR corner of active tab (concave notch)
      //   → tab right side up → tab TR corner → tab top → tab TL corner
      //   → tab left side down → tab BL = panel TL
      //   → panel left side down → panel BL corner → Z
      //
      // The inner boundary is the same shape inset by b, with the tab bottom
      // opening (no horizontal inner segment connecting tab bottom to panel top).

      // Builds the outer boundary of the binder shape as a single closed filled path.
      // Rendered beneath the white interior fill to produce the visible border.
      const buildBinderOuterPath = ({
        tabX, // active tab left offset from panel left edge
        tabWidth, // active tab outer width
        tabRowHeight, // height of the tab-strip area (panel.offsetTop − borderWidth)
        panelWidth, // panel outer width
        panelHeight, // panel outer height
        cornerRadius, // corner radius for all corners (tab top, panel bottom, and junctions)
      }) => {
        // All arcs drawn clockwise (CW).
        // Convex corners bow outward: sweep=1.
        // Concave junction corners bow inward: sweep=0.
        const arcConvex = (r, dx, dy) => {
          if (r <= 0) return `l ${dx},${dy}`;
          return `a ${r},${r} 0 0 1 ${dx},${dy}`;
        };
        const arcConcave = (r, dx, dy) => {
          if (r <= 0) return `l ${dx},${dy}`;
          return `a ${r},${r} 0 0 0 ${dx},${dy}`;
        };

        // Junction arcs only appear when the tab side is set back from the panel edge.
        const hasRightJunction = tabX + tabWidth < panelWidth;
        const hasLeftJunction = tabX > 0;
        const rightJR = hasRightJunction ? cornerRadius : 0;
        const leftJR = hasLeftJunction ? cornerRadius : 0;

        // CW from tab TL: right → TR → down right → junction → panel TR → BR → BL → up left → junction → tab TL
        const d = [];
        d.push(`M ${tabX + cornerRadius},0`);
        d.push(`h ${tabWidth - 2 * cornerRadius}`); // tab top →
        d.push(arcConvex(cornerRadius, cornerRadius, cornerRadius)); // tab TR: right→down
        d.push(`v ${tabRowHeight - cornerRadius - rightJR}`); // tab right ↓
        if (rightJR > 0) d.push(arcConcave(rightJR, rightJR, rightJR)); // right junction: down→right (concave)
        d.push(`h ${panelWidth - tabX - tabWidth - cornerRadius - rightJR}`); // panel top-right →
        d.push(arcConvex(cornerRadius, cornerRadius, cornerRadius)); // panel TR: right→down
        d.push(`v ${panelHeight - 2 * cornerRadius}`); // panel right ↓
        d.push(arcConvex(cornerRadius, -cornerRadius, cornerRadius)); // panel BR: down→left
        d.push(`h -${panelWidth - 2 * cornerRadius}`); // panel bottom ←
        d.push(arcConvex(cornerRadius, -cornerRadius, -cornerRadius)); // panel BL: left→up
        d.push(`v -${panelHeight - cornerRadius}`); // panel left ↑ to y=tabRowHeight
        d.push(`h ${tabX - leftJR}`); // panel top-left → (skipped if tabX=0)
        if (leftJR > 0) d.push(arcConcave(leftJR, leftJR, -leftJR)); // left junction: right→up (concave)
        d.push(`v -${tabRowHeight - cornerRadius - leftJR}`); // tab left ↑
        d.push(arcConvex(cornerRadius, cornerRadius, -cornerRadius)); // tab TL: up→right
        d.push("Z");

        return d.join(" ");
      };

      // The unified binder SVG: covers the full binder area (tab row + panel).
      // Draws both the white background fill and the border ring in one SVG.
      const BinderSvg = ({
        tabX,
        tabWidth,
        tabRowHeight,
        panelWidth,
        panelHeight,
        borderWidth,
        cornerRadius,
        borderColor,
      }) => {
        // Background fill path: traces the inner boundary of the border ring so the
        // white fill covers exactly the area inside the border (not under it).
        const bgPath = (() => {
          const arcConvex = (r, dx, dy) => {
            if (r <= 0) return `l ${dx},${dy}`;
            return `a ${r},${r} 0 0 0 ${dx},${dy}`;
          };
          const arcConcave = (r, dx, dy) => {
            if (r <= 0) return `l ${dx},${dy}`;
            return `a ${r},${r} 0 0 1 ${dx},${dy}`;
          };
          const innerCornerR = Math.max(0, cornerRadius - borderWidth);
          const innerPanelW = panelWidth - 2 * borderWidth;
          const innerPanelH = panelHeight - 2 * borderWidth;
          const innerTabW = tabWidth - 2 * borderWidth;
          const hasRightJunction = tabX + tabWidth < panelWidth;
          const hasLeftJunction = tabX > 0;
          // Concave junction arcs: center is OUTSIDE the shape, so moving inward (toward white)
          // moves AWAY from the arc center → larger radius. r + b*(√2-1) gives uniform thickness.
          const innerJunctionR = cornerRadius + borderWidth * (Math.SQRT2 - 1);
          const innerRightJR = hasRightJunction ? innerJunctionR : 0;
          const innerLeftJR = hasLeftJunction ? innerJunctionR : 0;
          const d = [];
          d.push(
            `M ${borderWidth + innerCornerR},${tabRowHeight + panelHeight - borderWidth}`,
          );
          d.push(`h ${innerPanelW - innerCornerR - innerCornerR}`);
          d.push(arcConvex(innerCornerR, innerCornerR, -innerCornerR)); // inner panel BR
          d.push(`v -${innerPanelH - innerCornerR - innerCornerR}`);
          d.push(arcConvex(innerCornerR, -innerCornerR, -innerCornerR)); // inner panel TR
          d.push(
            `h -${panelWidth - tabX - tabWidth - innerCornerR - innerRightJR}`,
          );
          if (innerRightJR > 0)
            d.push(arcConcave(innerRightJR, -innerRightJR, -innerRightJR)); // inner right junction corner
          d.push(`v -${tabRowHeight - innerCornerR - innerRightJR}`);
          d.push(arcConvex(innerCornerR, -innerCornerR, -innerCornerR)); // inner tab TR
          d.push(`h -${innerTabW - innerCornerR - innerCornerR}`);
          d.push(arcConvex(innerCornerR, -innerCornerR, innerCornerR)); // inner tab TL
          d.push(`v ${tabRowHeight - innerCornerR - innerLeftJR}`);
          if (innerLeftJR > 0)
            d.push(arcConcave(innerLeftJR, -innerLeftJR, innerLeftJR)); // inner left junction corner
          d.push(`h -${tabX - innerLeftJR}`);
          d.push(`v ${innerPanelH - innerCornerR}`);
          d.push(arcConvex(innerCornerR, innerCornerR, innerCornerR)); // inner panel BL
          d.push("Z");
          return d.join(" ");
        })();

        const outerPath = buildBinderOuterPath({
          tabX,
          tabWidth,
          tabRowHeight,
          panelWidth,
          panelHeight,
          cornerRadius,
        });

        return (
          <svg
            style={{
              position: "absolute",
              inset: 0,
              overflow: "visible",
              pointerEvents: "none",
              zIndex: 1,
            }}
            width={panelWidth}
            height={tabRowHeight + panelHeight}
          >
            <path d={outerPath} fill={borderColor} />
            <path d={bgPath} fill="rgba(0, 0, 0, 0.5)" />
          </svg>
        );
      };

      // Inactive tabs use plain CSS borders for now.
      const SvgTab = ({ label, active, onClick, r, b, tabRef }) => {
        return (
          <div
            ref={tabRef}
            class={`svg-tab${active ? " active" : ""}`}
            style={{
              borderWidth: `${b}px`,
              borderStyle: "solid",
              borderColor: "violet",
              borderRadius: `${r}px ${r}px 0 0`,
              background: "#f0f0f0",
              borderBottom: "none",
              marginBottom: `${b}px`,

              ...(active
                ? {
                    borderColor: "transparent",
                    background: "transparent",
                    zIndex: 2,
                  }
                : {
                    zIndex: 0,
                  }),
            }}
            onClick={onClick}
          >
            <span>{label}</span>
          </div>
        );
      };

      const TABS = [
        {
          key: "approved",
          label: "Approved",
          content: "These 3 items have been reviewed and approved.",
        },
        {
          key: "pending",
          label: "Pending",
          content: "These 2 items are awaiting review.",
        },
        {
          key: "archived",
          label: "Archived",
          content: "No archived items yet.",
        },
      ];

      const Binder = ({ initialActive, b, r, borderColor }) => {
        const [active, setActive] = useState(initialActive);
        const panelRef = useRef(null);
        const activeTabRef = useRef(null);
        const [panelSize, setPanelSize] = useState(null);

        useLayoutEffect(() => {
          const el = panelRef.current;
          if (!el) return null;
          const measure = () => {
            const tabEl = activeTabRef.current;
            setPanelSize({
              width: el.offsetWidth,
              height: el.offsetHeight,
              top: el.offsetTop,
              tabWidth: tabEl ? tabEl.offsetWidth : 0,
              tabLeft: tabEl ? tabEl.offsetLeft : 0,
            });
          };
          const obs = new ResizeObserver(measure);
          obs.observe(el);
          measure();
          return () => obs.disconnect();
        }, []);

        // Re-measure when the active tab changes (different tab may have different width/position)
        useLayoutEffect(() => {
          const tabEl = activeTabRef.current;
          if (!tabEl) return;
          setPanelSize((prev) =>
            prev
              ? {
                  ...prev,
                  tabWidth: tabEl.offsetWidth,
                  tabLeft: tabEl.offsetLeft,
                }
              : prev,
          );
        }, [active]);

        return (
          <div style={{ position: "relative", display: "inline-block" }}>
            {/* The unified SVG sits behind everything, covering tabstrip + panel */}
            {panelSize && (
              <BinderSvg
                tabX={panelSize.tabLeft}
                tabWidth={panelSize.tabWidth}
                tabRowHeight={panelSize.top - b}
                panelWidth={panelSize.width}
                panelHeight={panelSize.height + b}
                borderWidth={b}
                cornerRadius={r}
                borderColor={borderColor}
              />
            )}
            <div class="tabstrip">
              {TABS.map((tab) => (
                <SvgTab
                  key={tab.key}
                  label={tab.label}
                  active={active === tab.key}
                  onClick={() => setActive(tab.key)}
                  r={r}
                  b={b}
                  tabRef={active === tab.key ? activeTabRef : null}
                />
              ))}
            </div>
            <div
              ref={panelRef}
              class="panel"
              style={{
                borderWidth: `${b}px`,
                borderStyle: "solid",
                borderColor: "transparent",
                borderTop: "none",
              }}
            >
              {TABS.find((t) => t.key === active).content}
            </div>
          </div>
        );
      };

      const Demo = () => {
        const [b, setB] = useState(6);
        const [r, setR] = useState(20);
        const borderColor = "#bbb";

        return (
          <div>
            <h1>S-curve tab corners — inline SVG</h1>
            <div class="controls">
              <div style="display: flex; align-items: start; justify-content: start; flex-direction: column; gap: 4px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <label for="border-slider">Border width</label>
                  <input
                    id="border-slider"
                    type="range"
                    min="1"
                    max="20"
                    value={b}
                    onInput={(e) => setB(Number(e.target.value))}
                  />
                  <output>{b}px</output>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">
                  <label for="radius-slider">Border radius</label>
                  <input
                    id="radius-slider"
                    type="range"
                    min="0"
                    max="30"
                    value={r}
                    onInput={(e) => setR(Number(e.target.value))}
                  />
                  <output>{r}px</output>
                </div>
              </div>
            </div>
            <div class="binder-group">
              <Binder
                initialActive="approved"
                b={b}
                r={r}
                borderColor={borderColor}
              />
              <Binder
                initialActive="pending"
                b={b}
                r={r}
                borderColor={borderColor}
              />
              <Binder
                initialActive="archived"
                b={b}
                r={r}
                borderColor={borderColor}
              />
            </div>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
