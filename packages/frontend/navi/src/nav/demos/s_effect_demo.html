<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>S-curve tab corners demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px;
        color: #222;
        font-family: system-ui, sans-serif;
        background: #e8eaed;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }
      .controls {
        display: flex;
        margin-bottom: 32px;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
      }
      .controls label {
        color: #555;
        font-weight: 600;
      }
      .controls input[type="range"] {
        width: 160px;
      }
      .controls output {
        min-width: 32px;
        color: #333;
        font-variant-numeric: tabular-nums;
      }

      /* ── tab strip ───────────────────────────────────── */
      .tabstrip {
        display: flex;
        align-items: flex-end;
        gap: 0;
      }
      .panel {
        width: 460px;
        min-height: 60px;
        padding: 20px 24px;
        color: #444;
        font-size: 0.9rem;
        background: #fff;
        border-radius: 0 8px 8px 8px;
      }
      .binder-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* ── SVG tab ──────────────────────────────────────── */
      .svg-tab {
        position: relative;
        display: inline-flex;
        padding: 8px 24px 10px;
        align-items: center;
        justify-content: center;
        color: #888;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        user-select: none;
      }
      .svg-tab.active {
        z-index: 1;
        color: #222;
      }
      .svg-tab svg {
        position: absolute;
        inset: 0;
        overflow: visible;
      }
      .svg-tab span {
        position: relative;
        z-index: 1;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";

      /*
        Why we draw borders with SVG instead of using CSS borders:

        The tab shape requires two features that CSS borders cannot provide:
          1. Skipping border segments — the active tab must have no bottom border so it
             visually merges with the panel below it. CSS has no way to omit one side of
             a border while keeping the surrounding corners intact.
          2. Inverted (concave) border-radius — the corners where the tab meets the panel
             need an inward curve (like a notch), the opposite of what CSS border-radius
             produces. CSS only supports convex (outward) rounding.

        Both canvas and SVG can draw arbitrary paths that solve these problems.
        We use SVG rather than canvas so the shapes are part of the DOM and fully
        visible / inspectable in the browser dev tools.
      */

      /*
        buildBorderPath — incrementally builds a single SVG <path> that draws a
        rectangular border with per-corner control.

        We walk the rectangle counter-clockwise starting at the bottom-left corner:
          bottom-left → top-left → top-right → bottom-right

        For each corner we choose one of three styles:
          "convex"   — normal CSS-like border-radius (arc curves outward)
          "inverted" — concave arc (curves inward, like the notch where a tab meets
                       its panel)
          null / 0   — sharp right-angle corner

        Between corners we draw the connecting side line.  A side can be skipped
        entirely (set its skip flag to true) so the path stays open there — this is
        how the active tab omits its bottom edge and blends seamlessly into the panel.

        The path is always open (no Z close) so a stroked path renders only what is
        explicitly drawn.  For a filled background shape the caller closes it with Z.

        Parameters
          x, y          — top-left corner of the rectangle
          w, h          — width and height
          size          — border thickness (used for fill shape inset)
          corners: {
            bottomLeft, topLeft, topRight, bottomRight
          }             — each can be:
                          { radius: number, type: "convex"|"inverted" }
                          or null / omitted for a sharp corner
          sides: {
            bottom, left, top, right
          }             — each can be { skip: true } to omit that segment
      */
      const buildBorderPath = ({ x, y, w, h, corners = {}, sides = {} }) => {
        const bl = corners.bottomLeft || {};
        const tl = corners.topLeft || {};
        const tr = corners.topRight || {};
        const br = corners.bottomRight || {};

        const skipBottom = sides.bottom && sides.bottom.skip;
        const skipLeft = sides.left && sides.left.skip;
        const skipTop = sides.top && sides.top.skip;
        const skipRight = sides.right && sides.right.skip;

        // clamp radius so it never exceeds half the adjacent sides
        const clamp = (r) => {
          if (!r) return 0;
          let clamped = r;
          if (clamped > w / 2) clamped = w / 2;
          if (clamped > h / 2) clamped = h / 2;
          return clamped;
        };

        const blr = clamp(bl.radius);
        const tlr = clamp(tl.radius);
        const trr = clamp(tr.radius);
        const brr = clamp(br.radius);

        /*
          Arc helper.
          The path walks clockwise (right along bottom → up right → left along top
          → down left). CSS border-radius places the arc center at the INNER corner
          of the rectangle (e.g., top-left corner arc has center at (r, r)), which
          means the arc sweeps counter-clockwise (sweep-flag=0) relative to our
          clockwise traversal.

          Inverting that: the inverted/concave arc uses the OUTER corner as center,
          which sweeps clockwise (sweep-flag=1) relative to our traversal.

          SVG arc flags: large-arc-flag=0, sweep-flag=0 for convex (CSS-like),
                         sweep-flag=1 for inverted (concave).
        */
        const arc = (r, type, dx, dy) => {
          if (!r) return `l ${dx},${dy}`;
          const sweep = type === "inverted" ? 1 : 0;
          return `a ${r},${r} 0 0 ${sweep} ${dx},${dy}`;
        };

        const d = [];

        // ── Start: bottom-left corner arrival point ───────────────────────────
        // We start from the point just to the right of the bottom-left corner.
        d.push(`M ${x + blr},${y + h}`);

        // ── Bottom side (left → right) ────────────────────────────────────────
        const bottomLineW = w - blr - brr;
        if (!skipBottom && bottomLineW > 0) {
          d.push(`h ${bottomLineW}`);
        } else if (bottomLineW > 0) {
          d.push(`m ${bottomLineW},0`);
        }

        // ── Bottom-right corner ───────────────────────────────────────────────
        if (br.type === "inverted") {
          // inverted: arc curves inward, so we go up then left
          d.push(arc(brr, "inverted", brr, -brr));
        } else {
          d.push(arc(brr, "convex", brr, -brr));
        }

        // ── Right side (bottom → top) ─────────────────────────────────────────
        const rightLineH = h - brr - trr;
        if (!skipRight && rightLineH > 0) {
          d.push(`v -${rightLineH}`);
        } else if (rightLineH > 0) {
          d.push(`m 0,-${rightLineH}`);
        }

        // ── Top-right corner ──────────────────────────────────────────────────
        if (tr.type === "inverted") {
          d.push(arc(trr, "inverted", -trr, -trr));
        } else {
          d.push(arc(trr, "convex", -trr, -trr));
        }

        // ── Top side (right → left) ───────────────────────────────────────────
        const topLineW = w - trr - tlr;
        if (!skipTop && topLineW > 0) {
          d.push(`h -${topLineW}`);
        } else if (topLineW > 0) {
          d.push(`m -${topLineW},0`);
        }

        // ── Top-left corner ───────────────────────────────────────────────────
        if (tl.type === "inverted") {
          d.push(arc(tlr, "inverted", -tlr, tlr));
        } else {
          d.push(arc(tlr, "convex", -tlr, tlr));
        }

        // ── Left side (top → bottom) ──────────────────────────────────────────
        const leftLineH = h - tlr - blr;
        if (!skipLeft && leftLineH > 0) {
          d.push(`v ${leftLineH}`);
        } else if (leftLineH > 0) {
          d.push(`m 0,${leftLineH}`);
        }

        // ── Bottom-left corner ────────────────────────────────────────────────
        if (bl.type === "inverted") {
          d.push(arc(blr, "inverted", blr, blr));
        } else {
          d.push(arc(blr, "convex", blr, blr));
        }

        return d.join(" ");
      };

      // ── Tab SVG components ────────────────────────────────────────────────────
      //
      // Active tab:
      //   - white fill shape (closed, no bottom gap so it covers the panel border)
      //   - border stroke: skip bottom side, inverted radius on bottom-left and
      //     bottom-right corners so the tab visually connects to the panel
      //
      // Inactive tab:
      //   - tinted fill, full rectangular border with convex top corners

      const ActiveTabSvg = ({ W, H, r, b, borderColor }) => {
        // Fill: close the shape so the white background covers the panel top border.
        // The bottom edge simply runs straight across (no inverted arcs needed for fill).
        const fillPath = `${buildBorderPath({
          x: 0,
          y: 0,
          w: W,
          h: H,
          corners: {
            topLeft: { radius: r, type: "convex" },
            topRight: { radius: r, type: "convex" },
          },
        })} Z`;

        // Stroke: skip the bottom side, use inverted arcs at the two bottom corners
        // so the stroke blends smoothly into the panel border below.
        const strokePath = buildBorderPath({
          x: 0,
          y: 0,
          w: W,
          h: H,
          corners: {
            bottomLeft: { radius: r, type: "inverted" },
            topLeft: { radius: r, type: "convex" },
            topRight: { radius: r, type: "convex" },
            bottomRight: { radius: r, type: "inverted" },
          },
          sides: { bottom: { skip: true } },
        });

        return (
          <svg
            style={{
              position: "absolute",
              inset: 0,
              overflow: "visible",
              width: "100%",
              height: "100%",
            }}
            viewBox={`0 0 ${W} ${H}`}
            preserveAspectRatio="none"
          >
            <path d={fillPath} fill="white" stroke="none" />
            <path
              d={strokePath}
              fill="none"
              stroke={borderColor}
              stroke-width={b}
              vector-effect="non-scaling-stroke"
              stroke-linecap="square"
            />
          </svg>
        );
      };

      const InactiveTabSvg = ({ W, H, r, b, borderColor }) => {
        const path = `${buildBorderPath({
          x: 0,
          y: 0,
          w: W,
          h: H,
          corners: {
            topLeft: { radius: r, type: "convex" },
            topRight: { radius: r, type: "convex" },
          },
        })} Z`;

        return (
          <svg
            style={{
              position: "absolute",
              inset: 0,
              overflow: "visible",
              width: "100%",
              height: "100%",
            }}
            viewBox={`0 0 ${W} ${H}`}
            preserveAspectRatio="none"
          >
            <path
              d={path}
              fill="#f0f0f0"
              stroke={borderColor}
              stroke-width={b}
              vector-effect="non-scaling-stroke"
              stroke-linejoin="round"
            />
          </svg>
        );
      };

      const TAB_W = 120;
      const TAB_H = 36;

      const SvgTab = ({ label, active, onClick, r, b, borderColor }) => {
        return (
          <div class={`svg-tab${active ? " active" : ""}`} onClick={onClick}>
            {active ? (
              <ActiveTabSvg
                W={TAB_W}
                H={TAB_H}
                r={r}
                b={b}
                borderColor={borderColor}
              />
            ) : (
              <InactiveTabSvg
                W={TAB_W}
                H={TAB_H}
                r={r}
                b={b}
                borderColor={borderColor}
              />
            )}
            <span>{label}</span>
          </div>
        );
      };

      const TABS = [
        {
          key: "approved",
          label: "Approved",
          content: "These 3 items have been reviewed and approved.",
        },
        {
          key: "pending",
          label: "Pending",
          content: "These 2 items are awaiting review.",
        },
        {
          key: "archived",
          label: "Archived",
          content: "No archived items yet.",
        },
      ];

      const Binder = ({ initialActive, b, r, borderColor }) => {
        const [active, setActive] = useState(initialActive);
        const panelStyle = {
          border: `${b}px solid ${borderColor}`,
        };
        return (
          <div>
            <div class="tabstrip">
              {TABS.map((tab) => (
                <SvgTab
                  key={tab.key}
                  label={tab.label}
                  active={active === tab.key}
                  onClick={() => setActive(tab.key)}
                  r={r}
                  b={b}
                  borderColor={borderColor}
                />
              ))}
            </div>
            <div class="panel" style={panelStyle}>
              {TABS.find((t) => t.key === active).content}
            </div>
          </div>
        );
      };

      const Demo = () => {
        const [b, setB] = useState(10);
        const r = 8;
        const borderColor = "#bbb";

        return (
          <div>
            <h1>S-curve tab corners — inline SVG</h1>
            <div class="controls">
              <label for="border-slider">Border width</label>
              <input
                id="border-slider"
                type="range"
                min="1"
                max="20"
                value={b}
                onInput={(e) => setB(Number(e.target.value))}
              />
              <output>{b}px</output>
            </div>
            <div class="binder-group">
              <Binder
                initialActive="approved"
                b={b}
                r={r}
                borderColor={borderColor}
              />
              <Binder
                initialActive="pending"
                b={b}
                r={r}
                borderColor={borderColor}
              />
              <Binder
                initialActive="archived"
                b={b}
                r={r}
                borderColor={borderColor}
              />
            </div>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
