<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>S-curve tab corners demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px;
        color: #222;
        font-family: system-ui, sans-serif;
        background: #e8eaed;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }
      .controls {
        display: flex;
        margin-bottom: 32px;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
      }
      .controls label {
        color: #555;
        font-weight: 600;
      }
      .controls input[type="range"] {
        width: 160px;
      }
      .controls output {
        min-width: 32px;
        color: #333;
        font-variant-numeric: tabular-nums;
      }

      /* ── tab strip ───────────────────────────────────── */
      .tabstrip {
        position: relative;
        display: flex;
        align-items: flex-end;
        gap: 0;
      }
      .panel {
        position: relative;
        z-index: 1;
        width: 460px;
        min-height: 60px;
        padding: 20px 24px;
        color: #444;
        font-size: 0.9rem;
      }
      .binder-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* ── SVG tab ──────────────────────────────────────── */
      .svg-tab {
        position: relative;
        display: inline-flex;
        padding: 8px 24px 10px;
        align-items: center;
        justify-content: center;
        color: #888;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        user-select: none;
      }
      .svg-tab.active {
        color: #222;
      }
      .svg-tab svg {
        position: absolute;
        inset: 0;
        overflow: visible;
      }
      .svg-tab span {
        position: relative;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useLayoutEffect, useRef } from "preact/hooks";

      /*
        Why we draw borders with SVG instead of using CSS borders:

        The tab shape requires two features that CSS borders cannot provide:
          1. Skipping border segments — the active tab must have no bottom border so it
             visually merges with the panel below it. CSS has no way to omit one side of
             a border while keeping the surrounding corners intact.
          2. Inverted (concave) border-radius — the corners where the tab meets the panel
             need an inward curve (like a notch), the opposite of what CSS border-radius
             produces. CSS only supports convex (outward) rounding.

        Both canvas and SVG can draw arbitrary paths that solve these problems.
        We use SVG rather than canvas so the shapes are part of the DOM and fully
        visible / inspectable in the browser dev tools.
      */

      /*
        buildBorderPath — incrementally builds a single SVG <path> that draws a
        rectangular border with per-corner control.

        We walk the rectangle counter-clockwise starting at the bottom-left corner:
          bottom-left → top-left → top-right → bottom-right

        For each corner we choose one of three styles:
          "convex"   — normal CSS-like border-radius (arc curves outward)
          "inverted" — concave arc (curves inward, like the notch where a tab meets
                       its panel) [not yet implemented, coming later]
          null / 0   — sharp right-angle corner

        Between corners we draw the connecting side line.  A side can be skipped
        entirely (set its skip flag to true) so the path stays open there — this is
        how the active tab omits its bottom edge and blends seamlessly into the panel.

        The border is drawn as a filled shape (not a stroke) to have precise control
        over the border's position.  Inspiration from multi_border.jsx:
        the shape is a "ring" — the area between the outer rectangle and the inner
        rectangle (inset by the border width).  The inner corner radius equals the
        outer corner radius minus the border width (floored at 0).

        For a full border (no sides skipped) we use two closed sub-paths with
        fill-rule="evenodd": the outer closed rect and the inner closed rect.
        The evenodd rule fills only the ring between them.

        For a border with a side skipped (e.g. active tab with no bottom border)
        we use a single connected open-ring path: starting at the gap, we trace
        along the inner edge, cap across to the outer edge, trace back along the
        outer edge, then close (Z) back to the gap start.

        Parameters
          x, y          — top-left corner of the outer rectangle
          w, h          — width and height of the outer rectangle
          b             — border width
          corners: {
            bottomLeft, topLeft, topRight, bottomRight
          }             — each: { radius: number } or omitted for sharp
          sides: {
            bottom, left, top, right
          }             — each: { skip: true } to omit that side entirely
      */
      const buildFilledBorderPath = ({
        x,
        y,
        w,
        h,
        b,
        corners = {},
        sides = {},
      }) => {
        const bl = corners.bottomLeft || {};
        const tl = corners.topLeft || {};
        const tr = corners.topRight || {};
        const br = corners.bottomRight || {};

        const skipBottom = Boolean(sides.bottom && sides.bottom.skip);
        const skipRight = Boolean(sides.right && sides.right.skip);
        const skipTop = Boolean(sides.top && sides.top.skip);
        const skipLeft = Boolean(sides.left && sides.left.skip);

        // Outer corner radii — a corner only gets a radius when BOTH adjacent sides
        // are present (otherwise it's a square end/cap).
        // Inverted corners are separated: they curve inward at open-gap edges.
        const clampR = (r, maxR) => (r > 0 && maxR > 0 ? Math.min(r, maxR) : 0);
        const maxR = Math.min(w / 2, h / 2);
        const oBlr =
          !skipBottom && !skipLeft ? clampR(bl.radius || 0, maxR) : 0;
        const oBrr =
          !skipBottom && !skipRight && !br.inverted
            ? clampR(br.radius || 0, maxR)
            : 0;
        const oBrrInv = br.inverted ? clampR(br.radius || 0, maxR) : 0;
        const oTrr = !skipTop && !skipRight ? clampR(tr.radius || 0, maxR) : 0;
        const oTlr = !skipTop && !skipLeft ? clampR(tl.radius || 0, maxR) : 0;

        // Inner dimensions
        const iw = w - 2 * b;
        const ih = h - 2 * b;
        const imaxR = Math.min(iw / 2, ih / 2);

        // Inner radii = outer - b, floored at 0 and clamped to inner rect
        const iBlr = clampR(oBlr - b, imaxR);
        const iBrr = clampR(oBrr - b, imaxR);
        const iTrr = clampR(oTrr - b, imaxR);
        const iTlr = clampR(oTlr - b, imaxR);

        /*
          SVG arc flags: large-arc-flag=0, sweep-flag.
          sweep=1 = CW in screen space (y-down), sweep=0 = CCW.

          For each convex corner we work out the short (90°) arc direction by
          computing start/end angles from the corner's circle center:
            - Arcs that go from a higher SVG angle down to a lower one are CCW → sweep=0.
            - Arcs that go from a lower SVG angle up to a higher one are CW → sweep=1.

          Full ring outer + inner paths (right→up→left→down): every corner decreases
          in angle → CCW → sweep=0 (arcCCW).
          Skip-bottom inner U (up-left-down): same angular direction → sweep=0.
          Skip-bottom outer U (up-right-down): every corner increases in angle →
          CW → sweep=1 (arcCW).
        */
        const arcCW = (r, dx, dy) => {
          if (r <= 0) return `l ${dx},${dy}`;
          return `a ${r},${r} 0 0 1 ${dx},${dy}`;
        };
        const arcCCW = (r, dx, dy) => {
          if (r <= 0) return `l ${dx},${dy}`;
          return `a ${r},${r} 0 0 0 ${dx},${dy}`;
        };

        const d = [];

        if (!skipBottom && !skipRight && !skipTop && !skipLeft) {
          // ── Full border ring: two closed sub-paths + fill-rule="evenodd" ─────
          // Both sub-paths go right→up→left→down. Each convex corner's short arc
          // decreases in SVG angle → CCW → sweep=0 (arcCCW).
          // Outer sub-path
          d.push(`M ${x + oBlr},${y + h}`);
          d.push(`h ${w - oBlr - oBrr}`);
          d.push(arcCCW(oBrr, oBrr, -oBrr));
          d.push(`v -${h - oBrr - oTrr}`);
          d.push(arcCCW(oTrr, -oTrr, -oTrr));
          d.push(`h -${w - oTrr - oTlr}`);
          d.push(arcCCW(oTlr, -oTlr, oTlr));
          d.push(`v ${h - oTlr - oBlr}`);
          d.push(arcCCW(oBlr, oBlr, oBlr));
          d.push("Z");
          // Inner sub-path (same winding; evenodd fills the ring between them)
          d.push(`M ${x + b + iBlr},${y + h - b}`);
          d.push(`h ${iw - iBlr - iBrr}`);
          d.push(arcCCW(iBrr, iBrr, -iBrr));
          d.push(`v -${ih - iBrr - iTrr}`);
          d.push(arcCCW(iTrr, -iTrr, -iTrr));
          d.push(`h -${iw - iTrr - iTlr}`);
          d.push(arcCCW(iTlr, -iTlr, iTlr));
          d.push(`v ${ih - iTlr - iBlr}`);
          d.push(arcCCW(iBlr, iBlr, iBlr));
          d.push("Z");
        } else if (skipBottom && !skipRight && !skipTop && !skipLeft) {
          // ── Bottom side skipped: single connected open ring ───────────────────
          //
          // Inner U goes up-left-down (same winding as full ring) → arcCCW (sweep=0).
          // Outer U goes up-right-down → arcCW (sweep=1).
          //
          // If bottomRight has inverted:true, the outer right side ends oBrrInv
          // pixels above the bottom, then a concave arc (arcCCW) curves inward along
          // the bottom edge to the start point. The start point is shifted left by
          // oBrrInv, and the initial cap goes rightward (oBrrInv-b pixels) to reach
          // the inner right edge at (x+w-b, y+h).

          // Start point along the bottom edge
          d.push(`M ${x + w - oBrrInv},${y + h}`);
          // Cap to inner BR: rightward if inverted (start is left of inner), leftward otherwise
          if (oBrrInv > 0) {
            d.push(`h ${oBrrInv - b}`); // right → inner BR at (x+w-b, y+h)
          } else {
            d.push(`l -${b},0`); // left → inner BR at (x+w-b, y+h)
          }
          d.push(`v -${h - b - iTrr}`); // up inner right side
          d.push(arcCCW(iTrr, -iTrr, -iTrr)); // inner TR corner
          d.push(`h -${iw - iTrr - iTlr}`); // left inner top
          d.push(arcCCW(iTlr, -iTlr, iTlr)); // inner TL corner
          d.push(`v ${h - b - iTlr}`); // down inner left side → inner BL at (x+b, y+h)
          d.push(`l -${b},0`); // cap outward → outer BL at (x, y+h)
          d.push(`v -${h - oTlr}`); // up outer left side
          d.push(arcCW(oTlr, oTlr, -oTlr)); // outer TL corner
          d.push(`h ${w - oTlr - oTrr}`); // right outer top
          d.push(arcCW(oTrr, oTrr, oTrr)); // outer TR corner
          d.push(`v ${h - oTrr - oBrrInv}`); // down outer right side (shortened if inverted)
          if (oBrrInv > 0) {
            // Inverted (concave) arc: center is the outer corner (x+w, y+h).
            // From (x+w, y+h-oBrrInv) CCW to (x+w-oBrrInv, y+h) → arcCCW.
            d.push(arcCCW(oBrrInv, -oBrrInv, oBrrInv));
          }
          d.push("Z"); // closes back to start
        }

        return d.join(" ");
      };

      // ── Tab SVG components ────────────────────────────────────────────────────
      //
      // The active tab and its panel share a single SVG border drawn as a filled

      // Builds a closed path for the background fill rectangle (rounded top corners).
      // Traces up-right-down → CW arcs → sweep=1.
      const buildRectFillPath = ({ x, y, w, h, tlr = 0, trr = 0 }) => {
        const arc = (radius, dx, dy) => {
          if (radius <= 0) return `l ${dx},${dy}`;
          return `a ${radius},${radius} 0 0 1 ${dx},${dy}`;
        };
        return [
          `M ${x},${y + h}`,
          `v -${h - tlr}`,
          arc(tlr, tlr, -tlr),
          `h ${w - tlr - trr}`,
          arc(trr, trr, trr),
          `v ${h - trr}`,
          "Z",
        ].join(" ");
      };

      // The active tab and its panel share a single SVG border drawn as a filled
      // path. This avoids any visual seam between CSS borders and SVG borders.
      //
      // The SVG is absolutely positioned over the whole binder area (tabstrip +
      // panel). Its coordinate origin is the top-left of the tab row.
      //
      // Shape (outer boundary, clockwise from panel bottom-left):
      //   panel BL corner → panel bottom → panel BR corner
      //   → panel right up → panel TR (square, no radius here yet)
      //   → left along panel top to tab right edge
      //   → inverted BR corner of active tab (concave notch)
      //   → tab right side up → tab TR corner → tab top → tab TL corner
      //   → tab left side down → tab BL = panel TL
      //   → panel left side down → panel BL corner → Z
      //
      // The inner boundary is the same shape inset by b, with the tab bottom
      // opening (no horizontal inner segment connecting tab bottom to panel top).

      const buildBinderBorderPath = ({
        TX, // tab x offset from panel left edge
        TW,
        TH, // tab outer width/height
        PW,
        PH, // panel outer width/height
        b, // border width
        r, // corner radius (convex corners on tab top, panel bottom)
        ir = r, // junction radius (concave S-curve corners where tab meets panel top)
      }) => {
        // Convex arc (CCW, sweep=0) for tab top corners and panel bottom corners.
        const arcCCW = (radius, dx, dy) => {
          if (radius <= 0) return `l ${dx},${dy}`;
          return `a ${radius},${radius} 0 0 0 ${dx},${dy}`;
        };
        // Concave arc (CW, sweep=1) for junction S-curve corners.
        const arcCW = (radius, dx, dy) => {
          if (radius <= 0) return `l ${dx},${dy}`;
          return `a ${radius},${radius} 0 0 1 ${dx},${dy}`;
        };

        const pr = r; // panel corner radius
        const tr = r; // tab top corner radius
        const ipr = Math.max(0, pr - b);
        const itr = Math.max(0, tr - b);

        // Concave junction corners: only when the tab edge is not flush with the panel edge.
        // A junction where tab right/left meets panel top gets a concave arc (S-curve).
        const hasRightJunction = TX + TW < PW;
        const hasLeftJunction = TX > 0;
        const rir = hasRightJunction ? ir : 0; // outer right junction radius
        const lir = hasLeftJunction ? ir : 0; // outer left junction radius
        const iir = ir + b; // inner junction radius: concave arc, inward offset increases radius
        const irir = hasRightJunction ? iir : 0;
        const ilir = hasLeftJunction ? iir : 0;

        // ── Outer boundary (clockwise from panel BL) ───────────────────────────
        const d = [];
        d.push(`M ${pr},${TH + PH}`);
        d.push(`h ${PW - pr - pr}`); // panel bottom
        d.push(arcCCW(pr, pr, -pr)); // panel BR corner
        d.push(`v -${PH - pr - pr}`); // panel right side up
        d.push(arcCCW(pr, -pr, -pr)); // panel TR corner (convex)
        d.push(`h -${PW - pr - TX - TW - rir}`); // panel top right segment → stop rir before tab right
        if (rir > 0) d.push(arcCW(rir, -rir, -rir)); // concave junction: tab BR meets panel top
        d.push(`v -${TH - tr - rir}`); // tab right side up
        d.push(arcCCW(tr, -tr, -tr)); // tab TR corner
        d.push(`h -${TW - tr - tr}`); // tab top
        d.push(arcCCW(tr, -tr, tr)); // tab TL corner
        d.push(`v ${TH - tr - lir}`); // tab left down (stop lir above panel top)
        if (lir > 0) d.push(arcCW(lir, -lir, lir)); // concave junction: tab BL meets panel top
        d.push(`h -${TX - lir}`); // panel top left segment → panel left edge
        d.push(`v ${PH - pr}`); // panel left side down
        d.push(arcCCW(pr, pr, pr)); // panel BL corner
        d.push("Z");

        // ── Inner boundary (inset by b, same winding → evenodd fills ring) ─────
        const iPW = PW - 2 * b;
        const iPH = PH - 2 * b;
        const iTW = TW - 2 * b;
        const iTX = TX; // inner tab x offset: inner panel left is at x=b, inner tab left is at x=TX+b, so relative distance = TX

        // Start: inner panel BL
        d.push(`M ${b + ipr},${TH + PH - b}`);
        d.push(`h ${iPW - ipr - ipr}`); // inner panel bottom
        d.push(arcCCW(ipr, ipr, -ipr)); // inner panel BR
        d.push(`v -${iPH - ipr - ipr}`); // inner panel right side up
        d.push(arcCCW(ipr, -ipr, -ipr)); // inner panel TR corner
        d.push(`h -${PW - 2 * b - iTX - iTW - ipr - irir}`); // inner panel top right segment
        if (irir > 0) d.push(arcCW(irir, -irir, -irir)); // inner concave junction: tab BR
        d.push(`v -${TH - itr - irir}`); // inner tab right up
        d.push(arcCCW(itr, -itr, -itr)); // inner tab TR
        d.push(`h -${iTW - itr - itr}`); // inner tab top
        d.push(arcCCW(itr, -itr, itr)); // inner tab TL
        d.push(`v ${TH - itr - ilir}`); // inner tab left down
        if (ilir > 0) d.push(arcCW(ilir, -ilir, ilir)); // inner concave junction: tab BL
        d.push(`h -${iTX - ilir}`); // inner panel top left segment
        d.push(`v ${iPH - ipr}`); // inner panel left side down
        d.push(arcCCW(ipr, ipr, ipr)); // inner panel BL
        d.push("Z");

        return d.join(" ");
      };

      // The unified binder SVG: covers the full binder area (tab row + panel).
      // Draws both the white background fill and the border ring in one SVG.
      const BinderSvg = ({ TX, TW, TH, PW, PH, b, r, ir = r, borderColor }) => {
        // Background fill: the inner boundary of the border ring (inset by b),
        // so white only fills the area inside the border.
        const bgPath = (() => {
          const arcCCW = (radius, dx, dy) => {
            if (radius <= 0) return `l ${dx},${dy}`;
            return `a ${radius},${radius} 0 0 0 ${dx},${dy}`;
          };
          const arcCW = (radius, dx, dy) => {
            if (radius <= 0) return `l ${dx},${dy}`;
            return `a ${radius},${radius} 0 0 1 ${dx},${dy}`;
          };
          const ipr = Math.max(0, r - b);
          const itr = Math.max(0, r - b);
          const iir = ir + b; // inner junction radius: concave arc, inward offset increases radius
          const iPW = PW - 2 * b;
          const iPH = PH - 2 * b;
          const iTW = TW - 2 * b;
          const iTX = TX;
          const hasRightJunction = TX + TW < PW;
          const hasLeftJunction = TX > 0;
          const irir = hasRightJunction ? iir : 0;
          const ilir = hasLeftJunction ? iir : 0;
          const d = [];
          d.push(`M ${b + ipr},${TH + PH - b}`);
          d.push(`h ${iPW - ipr - ipr}`);
          d.push(arcCCW(ipr, ipr, -ipr)); // inner panel BR
          d.push(`v -${iPH - ipr - ipr}`);
          d.push(arcCCW(ipr, -ipr, -ipr)); // inner panel TR
          d.push(`h -${PW - 2 * b - iTX - iTW - ipr - irir}`);
          if (irir > 0) d.push(arcCW(irir, -irir, -irir)); // inner concave junction: tab BR
          d.push(`v -${TH - itr - irir}`);
          d.push(arcCCW(itr, -itr, -itr)); // inner tab TR
          d.push(`h -${iTW - itr - itr}`);
          d.push(arcCCW(itr, -itr, itr)); // inner tab TL
          d.push(`v ${TH - itr - ilir}`);
          if (ilir > 0) d.push(arcCW(ilir, -ilir, ilir)); // inner concave junction: tab BL
          d.push(`h -${iTX - ilir}`);
          d.push(`v ${iPH - ipr}`);
          d.push(arcCCW(ipr, ipr, ipr)); // inner panel BL
          d.push("Z");
          return d.join(" ");
        })();

        const borderPath = buildBinderBorderPath({
          TX,
          TW,
          TH,
          PW,
          PH,
          b,
          r,
          ir,
        });

        return (
          <svg
            style={{
              position: "absolute",
              inset: 0,
              overflow: "visible",
              pointerEvents: "none",
            }}
            width={PW}
            height={TH + PH}
          >
            <path d={bgPath} fill="white" />
            <path d={borderPath} fill={borderColor} fill-rule="evenodd" />
          </svg>
        );
      };

      const TAB_W = 120;
      const TAB_H = 36;

      // Inactive tabs use plain CSS borders for now.
      const SvgTab = ({ label, active, onClick, r, b, tabRef }) => {
        return (
          <div
            ref={tabRef}
            class={`svg-tab${active ? " active" : ""}`}
            style={{
              borderWidth: `${b}px`,
              borderStyle: "solid",
              borderColor: "violet",
              borderRadius: `${r}px ${r}px 0 0`,
              background: "#f0f0f0",
              borderBottom: "none",
              marginBottom: `${b}px`,
              ...(active
                ? {
                    borderColor: "transparent",
                    background: "transparent",
                  }
                : {}),
            }}
            onClick={onClick}
          >
            <span>{label}</span>
          </div>
        );
      };

      const TABS = [
        {
          key: "approved",
          label: "Approved",
          content: "These 3 items have been reviewed and approved.",
        },
        {
          key: "pending",
          label: "Pending",
          content: "These 2 items are awaiting review.",
        },
        {
          key: "archived",
          label: "Archived",
          content: "No archived items yet.",
        },
      ];

      const Binder = ({
        initialActive,
        b,
        r,
        borderColor,
        curvedOuterJunctions,
      }) => {
        const [active, setActive] = useState(initialActive);
        const panelRef = useRef(null);
        const activeTabRef = useRef(null);
        const [panelSize, setPanelSize] = useState(null);

        useLayoutEffect(() => {
          const el = panelRef.current;
          if (!el) return null;
          const measure = () => {
            const tabEl = activeTabRef.current;
            setPanelSize({
              width: el.offsetWidth,
              height: el.offsetHeight,
              top: el.offsetTop,
              tabWidth: tabEl ? tabEl.offsetWidth : TAB_W,
              tabLeft: tabEl ? tabEl.offsetLeft : 0,
            });
          };
          const obs = new ResizeObserver(measure);
          obs.observe(el);
          measure();
          return () => obs.disconnect();
        }, []);

        // Re-measure when the active tab changes (different tab may have different width/position)
        useLayoutEffect(() => {
          const tabEl = activeTabRef.current;
          if (!tabEl) return;
          setPanelSize((prev) =>
            prev
              ? {
                  ...prev,
                  tabWidth: tabEl.offsetWidth,
                  tabLeft: tabEl.offsetLeft,
                }
              : prev,
          );
        }, [active]);

        return (
          <div style={{ position: "relative", display: "inline-block" }}>
            {/* The unified SVG sits behind everything, covering tabstrip + panel */}
            {panelSize && (
              <BinderSvg
                TX={panelSize.tabLeft}
                TW={panelSize.tabWidth}
                TH={panelSize.top - b}
                PW={panelSize.width}
                PH={panelSize.height + b}
                b={b}
                r={r}
                ir={curvedOuterJunctions ? r : 0}
                borderColor={borderColor}
              />
            )}
            <div class="tabstrip">
              {TABS.map((tab) => (
                <SvgTab
                  key={tab.key}
                  label={tab.label}
                  active={active === tab.key}
                  onClick={() => setActive(tab.key)}
                  r={r}
                  b={b}
                  tabRef={active === tab.key ? activeTabRef : null}
                />
              ))}
            </div>
            <div
              ref={panelRef}
              class="panel"
              style={{
                borderWidth: `${b}px`,
                borderStyle: "solid",
                borderColor: "transparent",
                borderTop: "none",
              }}
            >
              {TABS.find((t) => t.key === active).content}
            </div>
          </div>
        );
      };

      const Demo = () => {
        const [b, setB] = useState(10);
        const [r, setR] = useState(8);
        const [curvedOuterJunctions, setCurvedOuterJunctions] = useState(false);
        const borderColor = "#bbb";

        return (
          <div>
            <h1>S-curve tab corners — inline SVG</h1>
            <div class="controls">
              <div style="display: flex; align-items: start; justify-content: start; flex-direction: column; gap: 4px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <label for="border-slider">Border width</label>
                  <input
                    id="border-slider"
                    type="range"
                    min="1"
                    max="20"
                    value={b}
                    onInput={(e) => setB(Number(e.target.value))}
                  />
                  <output>{b}px</output>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">
                  <label for="radius-slider">Border radius</label>
                  <input
                    id="radius-slider"
                    type="range"
                    min="0"
                    max="30"
                    value={r}
                    onInput={(e) => setR(Number(e.target.value))}
                  />
                  <output>{r}px</output>
                </div>

                <div style="display: flex; align-items: center; justify-content:start;  gap: 8px;">
                  <label>
                    <input
                      type="checkbox"
                      checked={curvedOuterJunctions}
                      onChange={(e) =>
                        setCurvedOuterJunctions(e.target.checked)
                      }
                    />{" "}
                    Curved outer junctions
                  </label>
                </div>
              </div>
            </div>
            <div class="binder-group">
              <Binder
                initialActive="approved"
                b={b}
                r={r}
                borderColor={borderColor}
                curvedOuterJunctions={curvedOuterJunctions}
              />
              <Binder
                initialActive="pending"
                b={b}
                r={r}
                borderColor={borderColor}
                curvedOuterJunctions={curvedOuterJunctions}
              />
              <Binder
                initialActive="archived"
                b={b}
                r={r}
                borderColor={borderColor}
                curvedOuterJunctions={curvedOuterJunctions}
              />
            </div>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
