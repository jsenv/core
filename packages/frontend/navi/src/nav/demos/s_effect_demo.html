<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>S-curve tab corners demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px;
        color: #222;
        font-family: system-ui, sans-serif;
        background: #e8eaed;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }
      .controls {
        display: flex;
        margin-bottom: 32px;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
      }
      .controls label {
        color: #555;
        font-weight: 600;
      }
      .controls input[type="range"] {
        width: 160px;
      }
      .controls output {
        min-width: 32px;
        color: #333;
        font-variant-numeric: tabular-nums;
      }

      /* ── tab strip ───────────────────────────────────── */
      .tabstrip {
        position: relative;
        display: flex;
        align-items: flex-end;
        gap: 0;
      }
      .panel {
        position: relative;
        z-index: 1;
        width: 460px;
        min-height: 60px;
        padding: 20px 24px;
        color: #444;
        font-size: 0.9rem;
      }
      .binder-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* ── SVG tab ──────────────────────────────────────── */
      .svg-tab {
        position: relative;
        display: inline-flex;
        padding: 8px 24px;
        align-items: center;
        justify-content: center;
        color: #888;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        user-select: none;
      }
      .svg-tab.tabs-above {
        margin-bottom: 0;
        padding-bottom: 40px;
      }
      .svg-tab.tabs-below {
        margin-top: 0;
        padding-top: 40px;
      }
      .tabstrip.tabs-below {
        align-items: flex-start;
      }
      .svg-tab.active {
        color: #222;
      }
      .svg-tab svg {
        position: absolute;
        inset: 0;
        overflow: visible;
      }
      .svg-tab span {
        position: relative;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useLayoutEffect, useRef } from "preact/hooks";

      /*
        Why we draw borders with SVG instead of using CSS borders:

        The tab shape requires two features that CSS borders cannot provide:
          1. Skipping border segments — the active tab must have no bottom border so it
             visually merges with the panel below it. CSS has no way to omit one side of
             a border while keeping the surrounding corners intact.
          2. Inverted (concave) border-radius — the corners where the tab meets the panel
             need an inward curve (like a notch), the opposite of what CSS border-radius
             produces. CSS only supports convex (outward) rounding.

        Both canvas and SVG can draw arbitrary paths that solve these problems.
        We use SVG rather than canvas so the shapes are part of the DOM and fully
        visible / inspectable in the browser dev tools.
      */

      // The active tab and its panel share a single SVG border drawn as a filled
      // path. This avoids any visual seam between CSS borders and SVG borders.
      //
      // The SVG is absolutely positioned over the whole binder area (tabstrip +
      // panel). Its coordinate origin is the top-left of the tab row.
      //
      // Shape (outer boundary, clockwise from panel bottom-left):
      //   panel BL corner → panel bottom → panel BR corner
      //   → panel right up → panel TR (square, no radius here yet)
      //   → left along panel top to tab right edge
      //   → inverted BR corner of active tab (concave notch)
      //   → tab right side up → tab TR corner → tab top → tab TL corner
      //   → tab left side down → tab BL = panel TL
      //   → panel left side down → panel BL corner → Z
      //
      // The inner boundary is the same shape inset by b, with the tab bottom
      // opening (no horizontal inner segment connecting tab bottom to panel top).

      // Low-level arc helpers: produce SVG arc commands with an explicit sweep flag.
      // sweep=1 → clockwise arc; sweep=0 → counter-clockwise arc.
      const arcSweep1 = (r, dx, dy) => {
        if (r <= 0) return `l ${dx},${dy}`;
        return `a ${r},${r} 0 0 1 ${dx},${dy}`;
      };
      const arcSweep0 = (r, dx, dy) => {
        if (r <= 0) return `l ${dx},${dy}`;
        return `a ${r},${r} 0 0 0 ${dx},${dy}`;
      };

      // Semantic aliases used when drawing the CW outer path.
      // In a CW path: convex (outward) corners use sweep=1, concave (inward) use sweep=0.
      const arcConvex = arcSweep1;
      const arcConcave = arcSweep0;

      // Builds the centerline path when tabs are ABOVE the panel.
      // CW path: M(tabLeft+r, top) → tab top → tab TR → [right junction] → panel TR
      //   → panel right ↓ → panel BR → panel bottom ← → panel BL → panel left ↑ → [left junction] → tab TL → Z
      const buildBinderCenterlinePathAbove = ({
        tabX,
        tabWidth,
        tabRowHeight,
        panelWidth,
        panelHeight,
        h,
        r,
        rTR,
      }) => {
        const hasRightJunction = tabX + tabWidth < panelWidth;
        const hasLeftJunction = tabX > 0;

        const left = h;
        const top = h;
        const right = panelWidth - h;
        const bottom = tabRowHeight + panelHeight - h;
        const tabLeft = tabX + h;
        const tabRight = tabX + tabWidth - h;
        const junctionY = tabRowHeight - h;

        const rVSpace = junctionY - top - r;
        const rTotalHSpace = right - tabRight;
        const rFits =
          hasRightJunction && rVSpace >= r && rTotalHSpace >= r + rTR;

        const lVSpace = junctionY - top - r;
        const lTotalHSpace = tabLeft - left;
        const lFits = hasLeftJunction && lVSpace >= r && lTotalHSpace >= 2 * r;

        const d = [];
        d.push(`M ${tabLeft + r},${top}`);
        d.push(`h ${tabRight - r - (tabLeft + r)}`);

        // ── Right side ────────────────────────────────────────────────────────────
        if (!hasRightJunction) {
          d.push(arcConvex(r, r, r));
          d.push(`v ${bottom - top - 2 * r}`);
        } else if (rFits) {
          d.push(arcConvex(r, r, r)); // tab TR: right→down
          d.push(`v ${rVSpace - r}`); // tab right ↓ to concave arc start
          d.push(arcConcave(r, r, r)); // junction concave: down→right
          d.push(`h ${rTotalHSpace - r - rTR}`); // panel top →
          d.push(arcConvex(rTR, rTR, rTR)); // panel TR: right→down
          d.push(`v ${bottom - junctionY - rTR - r}`); // panel right ↓
        } else {
          d.push(arcConvex(r, r, r)); // tab TR: right→down
          d.push(`v ${rVSpace}`); // straight down to junctionY
          d.push(`h ${rTotalHSpace - rTR}`); // panel top →
          d.push(arcConvex(rTR, rTR, rTR)); // panel TR: right→down (clamped)
          d.push(`v ${bottom - junctionY - rTR - r}`); // panel right ↓
        }

        // ── Panel BR → bottom → BL ────────────────────────────────────────────────
        d.push(arcConvex(r, -r, r));
        d.push(`h -${right - left - 2 * r}`);
        d.push(arcConvex(r, -r, -r));

        // ── Panel left ↑ + left junction back to M ───────────────────────────────
        if (!hasLeftJunction) {
          d.push(`v -${bottom - top - 2 * r}`);
          d.push(arcConvex(r, r, -r));
        } else if (lFits) {
          d.push(`v -${bottom - junctionY - r}`);
          d.push(`h ${lTotalHSpace - r}`);
          d.push(arcConcave(r, r, -r));
          d.push(`v -${lVSpace - r}`);
          d.push(arcConvex(r, r, -r));
        } else {
          d.push(`v -${bottom - junctionY - r}`);
          d.push(`h ${lTotalHSpace}`);
          d.push(`v -${lVSpace}`);
          d.push(arcConvex(r, r, -r));
        }

        d.push("Z");
        return d.join(" ");
      };

      // Builds the centerline path when tabs are BELOW the panel.
      // CW path: M(left+r, top) → panel top → panel TR → panel right ↓ → [right junction] →
      //   tab right ↓ → tab BR → tab bottom ← → [left junction] → tab BL → tab left ↑ → panel left ↑ → panel TL → Z
      //
      // Right junction: going DOWN on panel right, convex panel BR corner (down→left), left along panel bottom
      //   gap, concave notch arc (left→down), down on tab right.
      // Left junction: going UP on tab left, concave notch arc (up→left), left along panel bottom gap,
      //   convex panel BL arc (left→up), up on panel left.
      const buildBinderCenterlinePathBelow = ({
        tabX,
        tabWidth,
        tabRowHeight,
        panelWidth,
        panelHeight,
        h,
        r,
        rTR: rBR,
      }) => {
        const hasRightJunction = tabX + tabWidth < panelWidth;
        const hasLeftJunction = tabX > 0;

        const left = h;
        const top = h;
        const right = panelWidth - h;
        const bottom = panelHeight + tabRowHeight - h;
        const tabLeft = tabX + h;
        const tabRight = tabX + tabWidth - h;
        const junctionY = panelHeight - h;

        // Vertical room on panel right side (between panel TR and panel BR arcs at junctionY)
        const rPanelVSpace = junctionY - top - r;
        const rTotalHSpace = right - tabRight;
        // rFits needs room for panel BR arc (r) + concave junction arc (r) horizontally
        const rFits =
          hasRightJunction && rPanelVSpace >= r && rTotalHSpace >= 2 * r;

        const lTotalHSpace = tabLeft - left;
        const lFits =
          hasLeftJunction && rPanelVSpace >= r && lTotalHSpace >= 2 * r;

        const d = [];

        // M: start after panel TL arc, going right along panel top
        d.push(`M ${left + r},${top}`);
        d.push(`h ${right - left - 2 * r}`); // panel top →

        // ── Right side: panel right ↓ then (junction or direct) tab right ↓ ──────
        if (!hasRightJunction) {
          d.push(arcConvex(r, r, r)); // panel TR: right→down
          d.push(`v ${bottom - top - 2 * r}`); // full right side ↓
          d.push(arcConvex(r, -r, r)); // tab BR: down→left
        } else if (rFits) {
          d.push(arcConvex(r, r, r)); // panel TR: right→down
          d.push(`v ${rPanelVSpace - r}`); // panel right ↓ to (right, junctionY-r)
          d.push(arcConvex(r, -r, r)); // panel BR: down→left
          d.push(`h -${rTotalHSpace - 2 * r}`); // panel bottom ← to (tabRight+r, junctionY)
          d.push(arcConcave(r, -r, r)); // junction concave: left→down
          d.push(`v ${bottom - junctionY - 2 * r}`); // tab right ↓ to (tabRight, bottom-r)
          d.push(arcConvex(r, -r, r)); // tab BR: down→left
        } else {
          // Tight: straight panel right ↓ to junctionY, straight left to tabRight, straight tab right ↓
          d.push(arcConvex(r, r, r)); // panel TR: right→down
          d.push(`v ${rPanelVSpace}`); // panel right ↓ to junctionY (square corner)
          d.push(`h -${rTotalHSpace - rBR}`); // panel bottom ← (leaving room for rBR)
          d.push(arcConvex(rBR, -rBR, r)); // panel BR (clamped): down→left
          d.push(`v ${bottom - junctionY - rBR - r}`); // tab right ↓ to (tabRight, bottom-r)
          d.push(arcConvex(r, -r, r)); // tab BR: down→left
        }

        // ── Tab bottom ← ──────────────────────────────────────────────────────────
        d.push(`h -${tabRight - r - (tabLeft + r)}`); // tab bottom ←

        // ── Left side: tab left ↑ then (junction or direct) panel left ↑ → panel TL ──
        if (!hasLeftJunction) {
          d.push(arcConvex(r, -r, -r)); // tab BL = panel BL: left→up
          d.push(`v -${bottom - top - 2 * r}`); // full left side ↑
          d.push(arcConvex(r, r, -r)); // panel TL: up→right → M
        } else if (lFits) {
          d.push(arcConvex(r, -r, -r)); // tab BL: left→up
          d.push(`v -${bottom - junctionY - 2 * r}`); // tab left ↑ to (tabLeft, junctionY+r)
          d.push(arcConcave(r, -r, -r)); // junction concave: up→left
          d.push(`h -${lTotalHSpace - 2 * r}`); // panel bottom ← to (left+r, junctionY)
          d.push(arcConvex(r, -r, -r)); // panel BL: left→up
          d.push(`v -${rPanelVSpace - r}`); // panel left ↑ to (left, top+r)
          d.push(arcConvex(r, r, -r)); // panel TL: up→right → M
        } else {
          // Tight: square corner at junction
          d.push(arcConvex(r, -r, -r)); // tab BL: left→up
          d.push(`v -${bottom - junctionY - r}`); // tab left ↑ to junctionY (square corner)
          d.push(`h -${lTotalHSpace}`); // panel bottom ← to tabLeft
          d.push(`v -${rPanelVSpace}`); // panel left ↑ to (left, top+r)
          d.push(arcConvex(r, r, -r)); // panel TL: up→right → M
        }

        d.push("Z");
        return d.join(" ");
      };

      const buildBinderCenterlinePath = ({
        tabX,
        tabWidth,
        tabRowHeight,
        panelWidth,
        panelHeight,
        borderWidth,
        cornerRadius,
        panelTRCornerR,
        tabsBelow,
      }) => {
        const h = borderWidth / 2;
        const r = Math.max(0, cornerRadius - h);
        // rTR: panel corner radius adjacent to the last tab.
        // Only start rounding when the gap is at least r px — prevents a tiny ugly stub corner.
        const gap =
          panelTRCornerR !== undefined ? Math.max(0, panelTRCornerR) : r;
        const rTR = gap >= r ? Math.min(r, gap) : 0;

        if (tabsBelow) {
          return buildBinderCenterlinePathBelow({
            tabX,
            tabWidth,
            tabRowHeight,
            panelWidth,
            panelHeight,
            h,
            r,
            rTR,
          });
        }
        return buildBinderCenterlinePathAbove({
          tabX,
          tabWidth,
          tabRowHeight,
          panelWidth,
          panelHeight,
          h,
          r,
          rTR,
        });
      };

      // The unified binder SVG: covers the full binder area (tab row + panel).
      // Draws the border centerline as a thin stroke so the shape is visible.
      const BinderSvg = ({
        tabX,
        tabWidth,
        tabRowHeight,
        panelWidth,
        panelHeight,
        borderWidth,
        cornerRadius,
        borderColor,
        fullStrokeWidth,
        panelTRCornerR,
        tabsBelow,
      }) => {
        const centerlinePath = buildBinderCenterlinePath({
          tabX,
          tabWidth,
          tabRowHeight,
          panelWidth,
          panelHeight,
          borderWidth,
          cornerRadius,
          panelTRCornerR,
          tabsBelow,
        });

        return (
          <svg
            style={{
              position: "absolute",
              inset: 0,
              overflow: "visible",
              pointerEvents: "none",
              zIndex: 1,
            }}
            width={panelWidth}
            height={tabRowHeight + panelHeight}
          >
            <path
              d={centerlinePath}
              fill="white"
              stroke={borderColor}
              stroke-width={fullStrokeWidth ? borderWidth : 1}
            />
          </svg>
        );
      };

      // Inactive tabs use plain CSS borders for now.
      const SvgTab = ({
        label,
        active,
        onClick,
        r,
        b,
        tabRef,
        lastTabRef,
        tabsBelow,
      }) => {
        return (
          <div
            ref={(el) => {
              if (tabRef) tabRef.current = el;
              if (lastTabRef) lastTabRef.current = el;
            }}
            class={`svg-tab ${tabsBelow ? "tabs-below" : "tabs-above"}${active ? " active" : ""}`}
            style={{
              borderWidth: `${b}px`,
              borderStyle: "solid",
              borderColor: "violet",
              borderRadius: tabsBelow
                ? `0 0 ${r}px ${r}px`
                : `${r}px ${r}px 0 0`,
              background: "#f0f0f0",
              [tabsBelow ? "borderTop" : "borderBottom"]: "none",
              [tabsBelow ? "marginTop" : "marginBottom"]: `${b}px`,

              ...(active
                ? {
                    borderColor: "transparent",
                    background: "transparent",
                    zIndex: 2,
                  }
                : {
                    zIndex: 0,
                  }),
            }}
            onClick={onClick}
          >
            <span>{label}</span>
          </div>
        );
      };

      const TABS = [
        {
          key: "approved",
          label: "Approved",
          content: "These 3 items have been reviewed and approved.",
        },
        {
          key: "pending",
          label: "Pending",
          content: "These 2 items are awaiting review.",
        },
        {
          key: "archived",
          label: "Archived",
          content: "No archived items yet.",
        },
      ];

      const Binder = ({
        initialActive,
        b,
        r,
        borderColor,
        fullStrokeWidth,
        wideLabels,
        tallContent,
        tabsBelow,
      }) => {
        const [active, setActive] = useState(initialActive);
        const panelRef = useRef(null);
        const activeTabRef = useRef(null);
        const lastTabRef = useRef(null);
        const wrapperRef = useRef(null);
        const [panelSize, setPanelSize] = useState(null);

        useLayoutEffect(() => {
          const panelEl = panelRef.current;
          const tabEl = activeTabRef.current;
          const wrapperEl = wrapperRef.current;
          if (!panelEl) return null;
          const measure = () => {
            const t = activeTabRef.current;
            const wrapperEl = wrapperRef.current;
            const lastTabEl = lastTabRef.current;
            const wrapperWidth = wrapperEl
              ? wrapperEl.offsetWidth
              : panelEl.offsetWidth;
            const lastTabRight = lastTabEl
              ? lastTabEl.offsetLeft + lastTabEl.offsetWidth
              : wrapperWidth;
            const gapRightOfTabs = wrapperWidth - lastTabRight;
            setPanelSize({
              width: wrapperWidth,
              height: panelEl.offsetHeight,
              top: tabsBelow ? 0 : panelEl.offsetTop,
              tabRowHeight: t ? t.offsetHeight : 0,
              tabWidth: t ? t.offsetWidth : 0,
              tabLeft: t ? t.offsetLeft : 0,
              panelTRCornerR: gapRightOfTabs,
            });
          };
          const obs = new ResizeObserver(measure);
          obs.observe(panelEl);
          if (wrapperEl) obs.observe(wrapperEl);
          if (tabEl) obs.observe(tabEl);
          measure();
          return () => obs.disconnect();
        }, [active]);

        // (tab changes handled above by re-running the effect)

        const tabstrip = (
          <div class={`tabstrip${tabsBelow ? " tabs-below" : ""}`}>
            {TABS.map((tab) => (
              <SvgTab
                key={tab.key}
                label={
                  wideLabels ? `${tab.label} (extra long label)` : tab.label
                }
                active={active === tab.key}
                onClick={() => setActive(tab.key)}
                r={r}
                b={b}
                tabRef={active === tab.key ? activeTabRef : null}
                lastTabRef={
                  tab.key === TABS[TABS.length - 1].key ? lastTabRef : null
                }
                tabsBelow={tabsBelow}
              />
            ))}
          </div>
        );

        const panel = (
          <div
            ref={panelRef}
            class="panel"
            style={{
              borderWidth: `${b}px`,
              borderStyle: "solid",
              borderColor: "transparent",
              [tabsBelow ? "borderBottom" : "borderTop"]: "none",
            }}
          >
            {tallContent ? (
              <div style={{ minHeight: "160px" }}>
                {TABS.find((t) => t.key === active).content}
              </div>
            ) : (
              TABS.find((t) => t.key === active).content
            )}
          </div>
        );

        return (
          <div
            ref={wrapperRef}
            style={{ position: "relative", display: "inline-block" }}
          >
            {/* The unified SVG sits behind everything, covering tabstrip + panel */}
            {panelSize && (
              <BinderSvg
                tabX={panelSize.tabLeft}
                tabWidth={panelSize.tabWidth}
                tabRowHeight={
                  tabsBelow ? panelSize.tabRowHeight : panelSize.top - b
                }
                panelWidth={panelSize.width}
                panelHeight={panelSize.height + b}
                borderWidth={b}
                cornerRadius={r}
                borderColor={borderColor}
                fullStrokeWidth={fullStrokeWidth}
                panelTRCornerR={panelSize.panelTRCornerR}
                tabsBelow={tabsBelow}
              />
            )}
            {tabsBelow ? panel : tabstrip}
            {tabsBelow ? tabstrip : panel}
          </div>
        );
      };

      const readParams = () => {
        const url = new URLSearchParams(window.location.search);
        const ls = (() => {
          try {
            return JSON.parse(localStorage.getItem("demo_params") || "{}");
          } catch {
            return {};
          }
        })();
        const get = (key, fallback) => {
          if (url.has(key)) return url.get(key);
          if (key in ls) return ls[key];
          return fallback;
        };
        return {
          b: Number(get("b", 20)),
          r: Number(get("r", 30)),
          fullStrokeWidth: get("fullStrokeWidth", "false") === "true",
          wideLabels: get("wideLabels", "false") === "true",
          tallContent: get("tallContent", "false") === "true",
        };
      };

      const writeParams = (params) => {
        const url = new URLSearchParams();
        for (const [k, v] of Object.entries(params)) url.set(k, v);
        window.history.replaceState(null, "", `?${url}`);
        try {
          localStorage.setItem("demo_params", JSON.stringify(params));
        } catch {}
      };

      const Demo = () => {
        const init = readParams();
        const [b, setB] = useState(init.b);
        const [r, setR] = useState(init.r);
        const [fullStrokeWidth, setFullStrokeWidth] = useState(
          init.fullStrokeWidth,
        );
        const [wideLabels, setWideLabels] = useState(init.wideLabels);
        const [tallContent, setTallContent] = useState(init.tallContent);
        const borderColor = "#bbb";

        const update = (key, value, setter) => {
          setter(value);
          writeParams({
            b,
            r,
            fullStrokeWidth,
            wideLabels,
            tallContent,
            [key]: value,
          });
        };

        return (
          <div>
            <h1>S-curve tab corners — inline SVG</h1>
            <div class="controls">
              <div style="display: flex; align-items: start; justify-content: start; flex-direction: column; gap: 4px;">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <label for="border-slider">Border width</label>
                  <input
                    id="border-slider"
                    type="range"
                    min="1"
                    max="20"
                    value={b}
                    onInput={(e) => update("b", Number(e.target.value), setB)}
                  />
                  <output>{b}px</output>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">
                  <input
                    id="fullwidth-checkbox"
                    type="checkbox"
                    checked={fullStrokeWidth}
                    onChange={(e) =>
                      update(
                        "fullStrokeWidth",
                        e.target.checked,
                        setFullStrokeWidth,
                      )
                    }
                  />
                  <label for="fullwidth-checkbox">Full stroke width</label>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">
                  <input
                    id="widelabels-checkbox"
                    type="checkbox"
                    checked={wideLabels}
                    onChange={(e) =>
                      update("wideLabels", e.target.checked, setWideLabels)
                    }
                  />
                  <label for="widelabels-checkbox">Wide tab labels</label>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">
                  <input
                    id="tallcontent-checkbox"
                    type="checkbox"
                    checked={tallContent}
                    onChange={(e) =>
                      update("tallContent", e.target.checked, setTallContent)
                    }
                  />
                  <label for="tallcontent-checkbox">Tall content</label>
                </div>

                <div style="display: flex; align-items: center; gap: 8px;">
                  <label for="radius-slider">Border radius</label>
                  <input
                    id="radius-slider"
                    type="range"
                    min="0"
                    max="30"
                    value={r}
                    onInput={(e) => update("r", Number(e.target.value), setR)}
                  />
                  <output>{r}px</output>
                </div>
              </div>
            </div>
            <div class="binder-group">
              <Binder
                initialActive="approved"
                b={b}
                r={r}
                borderColor={borderColor}
