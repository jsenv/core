<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>S-curve tab corners demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px;
        color: #222;
        font-family: system-ui, sans-serif;
        background: #e8eaed;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }
      .controls {
        display: flex;
        margin-bottom: 32px;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
      }
      .controls label {
        color: #555;
        font-weight: 600;
      }
      .controls input[type="range"] {
        width: 160px;
      }
      .controls output {
        min-width: 32px;
        color: #333;
        font-variant-numeric: tabular-nums;
      }

      /* ── tab strip ───────────────────────────────────── */
      .tabstrip {
        display: flex;
        align-items: flex-end;
        gap: 0;
      }
      .panel {
        width: 460px;
        min-height: 60px;
        padding: 20px 24px;
        color: #444;
        font-size: 0.9rem;
        background: #fff;
      }
      .binder-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* ── SVG tab ──────────────────────────────────────── */
      .svg-tab {
        position: relative;
        display: inline-flex;
        padding: 8px 24px 10px;
        align-items: center;
        justify-content: center;
        color: #888;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        user-select: none;
      }
      .svg-tab.active {
        z-index: 1;
        color: #222;
      }
      .svg-tab svg {
        position: absolute;
        inset: 0;
        overflow: visible;
      }
      .svg-tab span {
        position: relative;
        z-index: 1;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";

      /*
        Why we draw borders with SVG instead of using CSS borders:

        The tab shape requires two features that CSS borders cannot provide:
          1. Skipping border segments — the active tab must have no bottom border so it
             visually merges with the panel below it. CSS has no way to omit one side of
             a border while keeping the surrounding corners intact.
          2. Inverted (concave) border-radius — the corners where the tab meets the panel
             need an inward curve (like a notch), the opposite of what CSS border-radius
             produces. CSS only supports convex (outward) rounding.

        Both canvas and SVG can draw arbitrary paths that solve these problems.
        We use SVG rather than canvas so the shapes are part of the DOM and fully
        visible / inspectable in the browser dev tools.
      */

      /*
        buildBorderPath — incrementally builds a single SVG <path> that draws a
        rectangular border with per-corner control.

        We walk the rectangle counter-clockwise starting at the bottom-left corner:
          bottom-left → top-left → top-right → bottom-right

        For each corner we choose one of three styles:
          "convex"   — normal CSS-like border-radius (arc curves outward)
          "inverted" — concave arc (curves inward, like the notch where a tab meets
                       its panel) [not yet implemented, coming later]
          null / 0   — sharp right-angle corner

        Between corners we draw the connecting side line.  A side can be skipped
        entirely (set its skip flag to true) so the path stays open there — this is
        how the active tab omits its bottom edge and blends seamlessly into the panel.

        The border is drawn as a filled shape (not a stroke) to have precise control
        over the border's position.  Inspiration from multi_border.jsx:
        the shape is a "ring" — the area between the outer rectangle and the inner
        rectangle (inset by the border width).  The inner corner radius equals the
        outer corner radius minus the border width (floored at 0).

        For a full border (no sides skipped) we use two closed sub-paths with
        fill-rule="evenodd": the outer closed rect and the inner closed rect.
        The evenodd rule fills only the ring between them.

        For a border with a side skipped (e.g. active tab with no bottom border)
        we use a single connected open-ring path: starting at the gap, we trace
        along the inner edge, cap across to the outer edge, trace back along the
        outer edge, then close (Z) back to the gap start.

        Parameters
          x, y          — top-left corner of the outer rectangle
          w, h          — width and height of the outer rectangle
          b             — border width
          corners: {
            bottomLeft, topLeft, topRight, bottomRight
          }             — each: { radius: number } or omitted for sharp
          sides: {
            bottom, left, top, right
          }             — each: { skip: true } to omit that side entirely
      */
      const buildFilledBorderPath = ({
        x,
        y,
        w,
        h,
        b,
        corners = {},
        sides = {},
      }) => {
        const bl = corners.bottomLeft || {};
        const tl = corners.topLeft || {};
        const tr = corners.topRight || {};
        const br = corners.bottomRight || {};

        const skipBottom = Boolean(sides.bottom && sides.bottom.skip);
        const skipRight = Boolean(sides.right && sides.right.skip);
        const skipTop = Boolean(sides.top && sides.top.skip);
        const skipLeft = Boolean(sides.left && sides.left.skip);

        // Outer corner radii — a corner only gets a radius when BOTH adjacent sides
        // are present (otherwise it's a square end/cap).
        // Inverted corners are separated: they curve inward at open-gap edges.
        const clampR = (r, maxR) => (r > 0 && maxR > 0 ? Math.min(r, maxR) : 0);
        const maxR = Math.min(w / 2, h / 2);
        const oBlr =
          !skipBottom && !skipLeft ? clampR(bl.radius || 0, maxR) : 0;
        const oBrr =
          !skipBottom && !skipRight && !br.inverted
            ? clampR(br.radius || 0, maxR)
            : 0;
        const oBrrInv = br.inverted ? clampR(br.radius || 0, maxR) : 0;
        const oTrr = !skipTop && !skipRight ? clampR(tr.radius || 0, maxR) : 0;
        const oTlr = !skipTop && !skipLeft ? clampR(tl.radius || 0, maxR) : 0;

        // Inner dimensions
        const iw = w - 2 * b;
        const ih = h - 2 * b;
        const imaxR = Math.min(iw / 2, ih / 2);

        // Inner radii = outer - b, floored at 0 and clamped to inner rect
        const iBlr = clampR(oBlr - b, imaxR);
        const iBrr = clampR(oBrr - b, imaxR);
        const iTrr = clampR(oTrr - b, imaxR);
        const iTlr = clampR(oTlr - b, imaxR);

        /*
          SVG arc flags: large-arc-flag=0, sweep-flag.
          sweep=1 = CW in screen space (y-down), sweep=0 = CCW.

          For each convex corner we work out the short (90°) arc direction by
          computing start/end angles from the corner's circle center:
            - Arcs that go from a higher SVG angle down to a lower one are CCW → sweep=0.
            - Arcs that go from a lower SVG angle up to a higher one are CW → sweep=1.

          Full ring outer + inner paths (right→up→left→down): every corner decreases
          in angle → CCW → sweep=0 (arcCCW).
          Skip-bottom inner U (up-left-down): same angular direction → sweep=0.
          Skip-bottom outer U (up-right-down): every corner increases in angle →
          CW → sweep=1 (arcCW).
        */
        const arcCW = (r, dx, dy) => {
          if (r <= 0) return `l ${dx},${dy}`;
          return `a ${r},${r} 0 0 1 ${dx},${dy}`;
        };
        const arcCCW = (r, dx, dy) => {
          if (r <= 0) return `l ${dx},${dy}`;
          return `a ${r},${r} 0 0 0 ${dx},${dy}`;
        };

        const d = [];

        if (!skipBottom && !skipRight && !skipTop && !skipLeft) {
          // ── Full border ring: two closed sub-paths + fill-rule="evenodd" ─────
          // Both sub-paths go right→up→left→down. Each convex corner's short arc
          // decreases in SVG angle → CCW → sweep=0 (arcCCW).
          // Outer sub-path
          d.push(`M ${x + oBlr},${y + h}`);
          d.push(`h ${w - oBlr - oBrr}`);
          d.push(arcCCW(oBrr, oBrr, -oBrr));
          d.push(`v -${h - oBrr - oTrr}`);
          d.push(arcCCW(oTrr, -oTrr, -oTrr));
          d.push(`h -${w - oTrr - oTlr}`);
          d.push(arcCCW(oTlr, -oTlr, oTlr));
          d.push(`v ${h - oTlr - oBlr}`);
          d.push(arcCCW(oBlr, oBlr, oBlr));
          d.push("Z");
          // Inner sub-path (same winding; evenodd fills the ring between them)
          d.push(`M ${x + b + iBlr},${y + h - b}`);
          d.push(`h ${iw - iBlr - iBrr}`);
          d.push(arcCCW(iBrr, iBrr, -iBrr));
          d.push(`v -${ih - iBrr - iTrr}`);
          d.push(arcCCW(iTrr, -iTrr, -iTrr));
          d.push(`h -${iw - iTrr - iTlr}`);
          d.push(arcCCW(iTlr, -iTlr, iTlr));
          d.push(`v ${ih - iTlr - iBlr}`);
          d.push(arcCCW(iBlr, iBlr, iBlr));
          d.push("Z");
        } else if (skipBottom && !skipRight && !skipTop && !skipLeft) {
          // ── Bottom side skipped: single connected open ring ───────────────────
          //
          // Inner U goes up-left-down (same winding as full ring) → arcCCW (sweep=0).
          // Outer U goes up-right-down → arcCW (sweep=1).
          //
          // If bottomRight has inverted:true, the outer right side ends oBrrInv
          // pixels above the bottom, then a concave arc (arcCCW) curves inward along
          // the bottom edge to the start point. The start point is shifted left by
          // oBrrInv, and the initial cap goes rightward (oBrrInv-b pixels) to reach
          // the inner right edge at (x+w-b, y+h).

          // Start point along the bottom edge
          d.push(`M ${x + w - oBrrInv},${y + h}`);
          // Cap to inner BR: rightward if inverted (start is left of inner), leftward otherwise
          if (oBrrInv > 0) {
            d.push(`h ${oBrrInv - b}`); // right → inner BR at (x+w-b, y+h)
          } else {
            d.push(`l -${b},0`); // left → inner BR at (x+w-b, y+h)
          }
          d.push(`v -${h - b - iTrr}`); // up inner right side
          d.push(arcCCW(iTrr, -iTrr, -iTrr)); // inner TR corner
          d.push(`h -${iw - iTrr - iTlr}`); // left inner top
          d.push(arcCCW(iTlr, -iTlr, iTlr)); // inner TL corner
          d.push(`v ${h - b - iTlr}`); // down inner left side → inner BL at (x+b, y+h)
          d.push(`l -${b},0`); // cap outward → outer BL at (x, y+h)
          d.push(`v -${h - oTlr}`); // up outer left side
          d.push(arcCW(oTlr, oTlr, -oTlr)); // outer TL corner
          d.push(`h ${w - oTlr - oTrr}`); // right outer top
          d.push(arcCW(oTrr, oTrr, oTrr)); // outer TR corner
          d.push(`v ${h - oTrr - oBrrInv}`); // down outer right side (shortened if inverted)
          if (oBrrInv > 0) {
            // Inverted (concave) arc: center is the outer corner (x+w, y+h).
            // From (x+w, y+h-oBrrInv) CCW to (x+w-oBrrInv, y+h) → arcCCW.
            d.push(arcCCW(oBrrInv, -oBrrInv, oBrrInv));
          }
          d.push("Z"); // closes back to start
        }

        return d.join(" ");
      };

      // ── Tab SVG components ────────────────────────────────────────────────────
      //
      // Active tab:
      //   - white fill background (closed rect with rounded top corners)
      //   - border as filled shape: bottom side skipped, drawn with buildFilledBorderPath
      //
      // Inactive tab:
      //   - tinted fill background
      //   - full rectangular border as filled shape

      // Builds a closed path for the background fill rectangle (rounded top corners).
      // Traces up-right-down (same direction as outer U-shape) → CW arcs → sweep=1.
      const buildRectFillPath = ({ x, y, w, h, tlr = 0, trr = 0 }) => {
        const arc = (r, dx, dy) => {
          if (r <= 0) return `l ${dx},${dy}`;
          return `a ${r},${r} 0 0 1 ${dx},${dy}`;
        };
        return [
          `M ${x},${y + h}`,
          `v -${h - tlr}`,
          arc(tlr, tlr, -tlr),
          `h ${w - tlr - trr}`,
          arc(trr, trr, trr),
          `v ${h - trr}`,
          "Z",
        ].join(" ");
      };

      const ActiveTabSvg = ({ W, H, r, b, borderColor }) => {
        const fillPath = buildRectFillPath({
          x: 0,
          y: 0,
          w: W,
          h: H,
          tlr: r,
          trr: r,
        });

        const borderPath = buildFilledBorderPath({
          x: 0,
          y: 0,
          w: W,
          h: H,
          b,
          corners: {
            topLeft: { radius: r },
            topRight: { radius: r },
            bottomRight: { radius: r, inverted: true },
          },
          sides: { bottom: { skip: true } },
        });

        return (
          <svg
            style={{
              position: "absolute",
              inset: 0,
              overflow: "visible",
              width: "100%",
              height: "100%",
            }}
            viewBox={`0 0 ${W} ${H}`}
            preserveAspectRatio="none"
          >
            <path d={fillPath} fill="white" />
            <path d={borderPath} fill={borderColor} />
          </svg>
        );
      };

      const InactiveTabSvg = ({ W, H, r, b, borderColor }) => {
        const fillPath = buildRectFillPath({
          x: 0,
          y: 0,
          w: W,
          h: H,
          tlr: r,
          trr: r,
        });

        const borderPath = buildFilledBorderPath({
          x: 0,
          y: 0,
          w: W,
          h: H,
          b,
          corners: {
            topLeft: { radius: r },
            topRight: { radius: r },
          },
        });

        return (
          <svg
            style={{
              position: "absolute",
              inset: 0,
              overflow: "visible",
              width: "100%",
              height: "100%",
            }}
            viewBox={`0 0 ${W} ${H}`}
            preserveAspectRatio="none"
          >
            <path d={fillPath} fill="#f0f0f0" />
            <path d={borderPath} fill={borderColor} fill-rule="evenodd" />
          </svg>
        );
      };

      const TAB_W = 120;
      const TAB_H = 36;

      const SvgTab = ({ label, active, onClick, r, b, borderColor }) => {
        return (
          <div class={`svg-tab${active ? " active" : ""}`} onClick={onClick}>
            {active ? (
              <ActiveTabSvg
                W={TAB_W}
                H={TAB_H}
                r={r}
                b={b}
                borderColor={borderColor}
              />
            ) : (
              <InactiveTabSvg
                W={TAB_W}
                H={TAB_H}
                r={r}
                b={b}
                borderColor={borderColor}
              />
            )}
            <span>{label}</span>
          </div>
        );
      };

      const TABS = [
        {
          key: "approved",
          label: "Approved",
          content: "These 3 items have been reviewed and approved.",
        },
        {
          key: "pending",
          label: "Pending",
          content: "These 2 items are awaiting review.",
        },
        {
          key: "archived",
          label: "Archived",
          content: "No archived items yet.",
        },
      ];

      const Binder = ({ initialActive, b, r, borderColor }) => {
        const [active, setActive] = useState(initialActive);
        const panelStyle = {
          borderWidth: `${b}px`,
          borderStyle: `solid`,
          borderColor: "violet",
          borderTop: "none",
          borderBottomLeftRadius: "8px",
          borderBottomRightRadius: "8px",
        };
        return (
          <div>
            <div class="tabstrip">
              {TABS.map((tab) => (
                <SvgTab
                  key={tab.key}
                  label={tab.label}
                  active={active === tab.key}
                  onClick={() => setActive(tab.key)}
                  r={r}
                  b={b}
                  borderColor={borderColor}
                />
              ))}
            </div>
            <div class="panel" style={panelStyle}>
              {TABS.find((t) => t.key === active).content}
            </div>
          </div>
        );
      };

      const Demo = () => {
        const [b, setB] = useState(10);
        const r = 8;
        const borderColor = "#bbb";

        return (
          <div>
            <h1>S-curve tab corners — inline SVG</h1>
            <div class="controls">
              <label for="border-slider">Border width</label>
              <input
                id="border-slider"
                type="range"
                min="1"
                max="20"
                value={b}
                onInput={(e) => setB(Number(e.target.value))}
              />
              <output>{b}px</output>
            </div>
            <div class="binder-group">
              <Binder
                initialActive="approved"
                b={b}
                r={r}
                borderColor={borderColor}
              />
              <Binder
                initialActive="pending"
                b={b}
                r={r}
                borderColor={borderColor}
              />
              <Binder
                initialActive="archived"
                b={b}
                r={r}
                borderColor={borderColor}
              />
            </div>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
