<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Route local state demo</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }

      /* ContentView — the main renderable area */
      .content-view {
        padding: 16px;
        background: white;
        border: 2px solid #ccc;
        border-radius: 6px;
      }
      .content-view-header {
        display: flex;
        margin-bottom: 12px;
        align-items: center;
        gap: 8px;
      }
      .content-item {
        display: flex;
        width: 72px;
        height: 72px;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 1.1rem;
        border: 3px solid transparent;
        border-radius: 6px;
        transition: border-color 0.15s;
        cursor: pointer;
        user-select: none;
      }
      .content-item.selected {
        border-color: #222;
        box-shadow: 0 0 0 2px #222;
      }

      /* Legend — the companion panel */
      .legend {
        padding: 16px;
        background: #f0f7ff;
        border: 2px solid #90caf9;
        border-radius: 6px;
      }
      .legend-header {
        display: flex;
        margin-bottom: 12px;
        align-items: center;
        gap: 8px;
      }
      .legend-entry {
        display: flex;
        padding: 6px 10px;
        align-items: center;
        gap: 8px;
        border: 2px solid transparent;
        border-radius: 4px;
        cursor: pointer;
        user-select: none;
      }
      .legend-entry:hover {
        background: #dceeff;
      }
      .legend-entry.selected {
        font-weight: 600;
        background: #dceeff;
        border-color: #1976d2;
      }
      .legend-dot {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        border-radius: 50%;
      }
      .legend-none {
        padding: 6px 10px;
        color: #aaa;
        font-style: italic;
        font-size: 0.9rem;
      }

      /* shared */
      .render-count {
        display: inline-block;
        padding: 2px 8px;
        color: #fff;
        font-size: 0.75rem;
        background: #888;
        border-radius: 10px;
      }
      .component-label {
        color: #555;
        font-weight: 700;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useRef, useState } from "preact/hooks";
      import {
        Box,
        Caption,
        Route,
        Routes,
        Tab,
        TabList,
        route,
        setupRoutes,
      } from "@jsenv/navi";

      const ALPHA_ROUTE = route("/alpha");
      const BETA_ROUTE = route("/beta");
      setupRoutes([ALPHA_ROUTE, BETA_ROUTE]);

      const ALPHA_ITEMS = [
        { value: "A1", color: "#e53935" },
        { value: "A2", color: "#43a047" },
        { value: "A3", color: "#1e88e5" },
      ];
      const BETA_ITEMS = [
        { value: "B1", color: "#8e24aa" },
        { value: "B2", color: "#f4511e" },
        { value: "B3", color: "#00897b" },
      ];

      const App = () => {
        const [selectedValue, setSelectedValue] = useState(undefined);

        return (
          <Box row spacing="m">
            <TabList>
              <Tab route={ALPHA_ROUTE}>Alpha</Tab>
              <Tab route={BETA_ROUTE}>Beta</Tab>
            </TabList>

            {/*
             * Routes renders the active ContentView.
             * ContentView is responsible for displaying items and lets the user
             * select one by clicking. It reads selectedValue to highlight the
             * active item, and calls onSelectedValueChange when the user clicks.
             */}
            <Routes>
              <Route
                route={ALPHA_ROUTE}
                element={
                  <ContentView
                    items={ALPHA_ITEMS}
                    selectedValue={selectedValue}
                    onSelectedValueChange={setSelectedValue}
                  />
                }
              />
              <Route
                route={BETA_ROUTE}
                element={
                  <ContentView
                    items={BETA_ITEMS}
                    selectedValue={selectedValue}
                    onSelectedValueChange={setSelectedValue}
                  />
                }
              />
            </Routes>

            {/*
             * Legend lives outside Routes and is always visible.
             * It shows a label for each item of the active tab so the user
             * understands what is rendered. Clicking a legend entry selects
             * that item — ContentView must reflect it. When ContentView changes
             * the selection, Legend must update too.
             */}
            <Legend
              items={
                window.location.pathname.startsWith("/beta")
                  ? BETA_ITEMS
                  : ALPHA_ITEMS
              }
              selectedValue={selectedValue}
              onSelectedValueChange={setSelectedValue}
            />
          </Box>
        );
      };

      /*
       * ContentView — the main renderable area.
       * Displays items as colored boxes. Clicking an item selects it.
       * Re-renders when selectedValue changes (from Legend or from itself).
       */
      const ContentView = ({ items, selectedValue, onSelectedValueChange }) => {
        const renderCount = useRef(0);
        renderCount.current++;

        return (
          <div className="content-view">
            <div className="content-view-header">
              <span className="component-label">ContentView</span>
              <span className="render-count">
                render #{renderCount.current}
              </span>
            </div>
            <Box row spacing="s">
              {items.map(({ value, color }) => (
                <div
                  key={value}
                  className={`content-item${selectedValue === value ? " selected" : ""}`}
                  style={{ background: color }}
                  onClick={() =>
                    onSelectedValueChange(
                      selectedValue === value ? undefined : value,
                    )
                  }
                >
                  {value}
                </div>
              ))}
            </Box>
            <Caption marginTop="s">
              Click an item to select it. Click again to deselect.
            </Caption>
          </div>
        );
      };

      /*
       * Legend — the companion panel tied to what ContentView renders.
       * Clicking a legend entry drives selection into ContentView.
       * Re-renders when selectedValue changes (from ContentView or from itself).
       */
      const Legend = ({ items, selectedValue, onSelectedValueChange }) => {
        const renderCount = useRef(0);
        renderCount.current++;

        return (
          <div className="legend">
            <div className="legend-header">
              <span className="component-label">Legend</span>
              <span className="render-count">
                render #{renderCount.current}
              </span>
            </div>
            <Box column spacing="xs">
              {items.map(({ value, color }) => (
                <div
                  key={value}
                  className={`legend-entry${selectedValue === value ? " selected" : ""}`}
                  onClick={() =>
                    onSelectedValueChange(
                      selectedValue === value ? undefined : value,
                    )
                  }
                >
                  <span className="legend-dot" style={{ background: color }} />
                  {value}
                </div>
              ))}
              {selectedValue === undefined && (
                <div className="legend-none">Nothing selected</div>
              )}
            </Box>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
