<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nav Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.5;
        background: #f5f5f5;
      }
      h1 {
        margin: 0 0 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }
      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .demo-section h2 {
        margin: 0 0 15px;
        padding-bottom: 6px;
        color: #222;
        font-size: 1.3rem;
        border-bottom: 2px solid #e0e0e0;
      }
      .caption {
        margin: 10px 0 8px;
        color: #666;
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .example-block {
        margin-bottom: 24px;
      }
      .note {
        display: inline-block;
        padding: 10px 12px;
        color: #555;
        font-size: 0.8rem;
        background: #f8f9fa;
        border-left: 4px solid #1976d2;
        border-radius: 0 6px 6px 0;
      }
      .dynamic-panel {
        min-height: 60px;
        margin-top: 16px;
        padding: 12px 16px;
        background: #fafafa;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Box,
        Title,
        Text,
        Nav,
        Link,
        Caption,
        Icon,
        HomeSvg,
        UserSvg,
        SettingsSvg,
        BadgeCount,
        setupRoutes,
        route,
      } from "@jsenv/navi";

      const TEST_ROUTE = route("/test_route");
      setupRoutes([TEST_ROUTE]);

      const Demo = () => {
        return (
          <div style={{ padding: "10px" }}>
            <Title as="h1">TabList Component Demo</Title>
            <BasicNav />
            <UnderlineInteractive />
            {/*}


            <RoundedTabList />
            <VerticalTabs />
            <VerticalTabsWithIcons />
            <SpacingVariants />
            <StylingVariables />
            <DynamicAddRemove />
              <BinderTabs />
            */}
          </div>
        );
      };

      const BasicNav = () => {
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Basic</Title>

            <Caption>Minimal list of links</Caption>
            <Nav spacing="s">
              <Link pseudoState={{ ":-navi-href-current": true }}>Home</Link>
              <Link>Profile</Link>
              <Link>Settings</Link>
            </Nav>

            <Caption>List of links as tab</Caption>
            <Nav spacing="s">
              <Link
                appearance="tab"
                pseudoState={{ ":-navi-href-current": true }}
              >
                Home
              </Link>
              <Link appearance="tab">Profile</Link>
              <Link appearance="tab">Settings</Link>
            </Nav>
          </Box>
        );
      };

      const UnderlineInteractive = () => {
        const [active, setActive] = useState("overview");
        const tabs = ["overview", "activity", "reports", "billing"];
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Indicator + Click Selection</Title>
            <Text className="note">
              The <code>indicator</code> prop enables an active marker at the{" "}
              <code>"start"</code> or <code>"end"</code> of tabs. Tabs become
              interactive when you provide an <code>onClick</code>; selection is
              controlled externally (here by local state). The selected tab also
              updates the associated panel below.
            </Text>
            <div className="example-block">
              <div className="caption">Indicator below (default)</div>
              <Box border="1px dashed violet">
                <Nav spacing="s" lineHeight="2">
                  {tabs.map((name) => (
                    <Link
                      appearance="tab"
                      key={name}
                      onClick={() => setActive(name)}
                      aria-controls={`panel-${name}`}
                      paddingX="md"
                      pseudoState={{
                        ":focus-visible": name === "activity",
                        ":hover": name === "activity" || undefined,
                        ":-navi-href-current": name === active,
                      }}
                      capitalize
                    >
                      {name}
                    </Link>
                  ))}
                </Nav>
              </Box>
            </div>
            <div className="example-block">
              <div className="caption">Indicator above</div>
              <Box border="1px dashed violet">
                <Nav spacing="s" lineHeight="2">
                  {tabs.map((name) => (
                    <Link
                      key={name}
                      appearance="tab"
                      currentIndicator="top"
                      onClick={() => setActive(name)}
                      aria-controls={`panel-${name}`}
                      paddingX="md"
                      pseudoState={{
                        ":hover": name === "activity" || undefined,
                        ":focus-visible": name === "activity",
                        ":-navi-href-current": name === active,
                      }}
                      capitalize
                    >
                      {name}
                    </Link>
                  ))}
                </Nav>
              </Box>
            </div>
            <div className="example-block">
              <div className="caption">
                TabList background + selected styling (no indicator)
              </div>
              <Box row align="center" border="1px dashed violet">
                <Nav
                  lineHeight="2"
                  borderRadius="s"
                  linkBorderRadius="inherit"
                  expandX
                  padding="2"
                  style={{
                    "--nav-background": "rgb(233, 236, 240)",
                  }}
                >
                  {tabs.map((name) => (
                    <Link
                      appearance="tab"
                      currentIndicator="none"
                      key={name}
                      onClick={() => setActive(name)}
                      aria-controls={`panel-${name}`}
                      paddingX="m"
                      expandX
                      alignX="center"
                      pseudoState={{
                        ":hover": name === "activity" || undefined,
                        ":focus-visible": name === "activity",
                        ":-navi-href-current": name === active,
                      }}
                      style={{
                        "--link-color": "#373C45",
                        "--link-background-current": "#373C45",
                        "--link-color-current": "white",
                      }}
                      capitalize
                    >
                      {name}
                    </Link>
                  ))}
                </Nav>
              </Box>
            </div>

            <div className="example-block">
              <div className="caption">
                TabList as icons with scaling when selected
              </div>
              <Box
                row
                alignX="start"
                border="1px dashed violet"
                width="fit-content"
              >
                <Nav spacing="sm">
                  {tabs.map((name) => (
                    <Link
                      key={name}
                      icon
                      onClick={() => setActive(name)}
                      aria-controls={`panel-${name}`}
                      padding="0"
                      circle
                      backgroundColor="orange"
                      color="white"
                      scale="1"
                      style={{
                        ":-navi-href-current": {
                          scale: "1.3",
                          backgroundColor:
                            "color-mix(in srgb, var(--link-background-color) 80%, black)",
                        },
                      }}
                      pseudoState={{
                        ":hover": name === "activity" || undefined,
                        ":focus-visible": name === "activity",
                        ":-navi-href-current": name === active,
                      }}
                      transition="all 0.3s ease-in-out"
                      circle
                      backgroundColor="var(--x-link-background)"
                    >
                      <Icon box size="32" align="center" padding="6">
                        <SettingsSvg />
                      </Icon>
                    </Link>
                  ))}
                </Nav>
              </Box>
            </div>
          </Box>
        );
      };

      const RoundedTabList = () => {
        const [active, setActive] = useState(undefined);

        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Rounded / Pill Style</Title>
            <Text className="note">
              Setting <code>borderRadius="100px"</code> with{" "}
              <code>indicator="none"</code> and a background color creates a
              pill-shaped tablist. The tab border-radius is automatically kept 2
              px smaller than the container so each tab pill also appears
              rounded.
            </Text>

            <div className="example-block">
              <div className="caption">Interactive — click to select</div>
              <Nav
                background="#ede9f5"
                border="10px solid blue"
                borderRadius="100px"
                spacing="0"
              >
                <Link
                  background="#F3E8FF"
                  paddingX="m"
                  onClick={() => setActive("0-0")}
                  pseudoState={{
                    ":-navi-href-current": active === "0-0",
                  }}
                >
                  0-0
                </Link>
                <Link
                  background="#C4B5FD"
                  paddingX="m"
                  onClick={() => setActive("1-3")}
                  pseudoState={{
                    ":-navi-href-current": active === "1-3",
                  }}
                >
                  1-3
                </Link>
                <Link
                  background="#8B5CF6"
                  paddingX="m"
                  onClick={() => setActive("3-6")}
                  pseudoState={{
                    ":-navi-href-current": active === "3-6",
                  }}
                >
                  3-6
                </Link>
                <Link
                  background="#7C3AED"
                  paddingX="m"
                  onClick={() => setActive("6+")}
                  pseudoState={{
                    ":-navi-href-current": active === "6+",
                  }}
                >
                  6+
                </Link>
              </Nav>
            </div>

            <div className="example-block">
              <div className="caption">
                Same design with first and last tab hovered
              </div>
              <Nav
                background="#ede9f5"
                border="10px solid blue"
                borderRadius="100px"
                spacing="0"
              >
                <Link
                  background="#F3E8FF"
                  paddingX="m"
                  pseudoState={{ ":hover": true }}
                >
                  0-0
                </Link>
                <Link background="#C4B5FD" paddingX="m">
                  1-3
                </Link>
                <Link background="#8B5CF6" paddingX="m">
                  3-6
                </Link>
                <Link
                  background="#7C3AED"
                  paddingX="m"
                  pseudoState={{ ":hover": true }}
                >
                  6+
                </Link>
              </Nav>
            </div>

            <div className="example-block">
              <div className="caption">Same design with last tab selected</div>
              <Nav
                background="#ede9f5"
                border="10px solid blue"
                borderRadius="100px"
                spacing="0"
              >
                <Link background="#F3E8FF" paddingX="m">
                  0-0
                </Link>
                <Link background="#C4B5FD" paddingX="m">
                  1-3
                </Link>
                <Link background="#8B5CF6" paddingX="m">
                  3-6
                </Link>
                <Link
                  background="#7C3AED"
                  paddingX="m"
                  pseudoState={{ ":-navi-href-current": true }}
                >
                  6+
                </Link>
              </Nav>
            </div>

            <div className="example-block">
              <div className="caption">Same design with padding on tablist</div>
              <Nav
                background="#ede9f5"
                border="10px solid blue"
                borderRadius="100px"
                spacing="0"
                padding="15"
              >
                <Link
                  background="#F3E8FF"
                  paddingX="m"
                  onClick={() => setActive("0-0")}
                  pseudoState={{
                    ":-navi-href-current": active === "0-0",
                  }}
                >
                  0-0
                </Link>
                <Link
                  background="#C4B5FD"
                  paddingX="m"
                  onClick={() => setActive("1-3")}
                  pseudoState={{
                    ":-navi-href-current": active === "1-3",
                  }}
                >
                  1-3
                </Link>
                <Link
                  background="#8B5CF6"
                  paddingX="m"
                  onClick={() => setActive("3-6")}
                  pseudoState={{
                    ":-navi-href-current": active === "3-6",
                  }}
                >
                  3-6
                </Link>
                <Link
                  background="#7C3AED"
                  paddingX="m"
                  onClick={() => setActive("6+")}
                  pseudoState={{
                    ":-navi-href-current": active === "6+",
                  }}
                >
                  6+
                </Link>
              </Nav>
            </div>
          </Box>
        );
      };

      const VerticalTabsWithIcons = () => {
        const [activeIconTab, setActiveIconTab] = useState("home");

        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Vertical Layout with Icons</Title>
            <Text className="note">
              Vertical tabs can include icons alongside text labels. Here are
              examples with different icon placements and styling approaches
              using the Icon component with SVG files.
            </Text>

            <Box row>
              <Box column spacing="md">
                <div className="example-block">
                  <div className="caption">Icons before text</div>
                  <Box border="1px dashed violet" style={{ width: "200px" }}>
                    <TabList vertical spacing="xs" indicator="end" expandX>
                      <Tab
                        selected={activeIconTab === "home"}
                        onClick={() => setActiveIconTab("home")}
                        aria-controls="icon-panel-home"
                        column
                      >
                        <Link
                          box
                          preventDefault
                          href="toto"
                          paddingX="md"
                          alignY="center"
                        >
                          <Icon>
                            <HomeSvg />
                          </Icon>
                          Home
                          <BadgeCount
                            background="red"
                            selfAlignX="end"
                            color="white"
                          >
                            1
                          </BadgeCount>
                        </Link>
                      </Tab>
                      <Tab
                        paddingX="md"
                        selected={activeIconTab === "profile"}
                        onClick={() => setActiveIconTab("profile")}
                        aria-controls="icon-panel-profile"
                        column
                        route={TEST_ROUTE}
                        alignY="center"
                      >
                        <Icon>
                          <UserSvg />
                        </Icon>
                        Profile
                        <BadgeCount
                          background="red"
                          selfAlignX="end"
                          color="white"
                        >
                          1
                        </BadgeCount>
                      </Tab>
                      <Tab
                        paddingX="md"
                        selected={activeIconTab === "settings"}
                        onClick={() => setActiveIconTab("settings")}
                        aria-controls="icon-panel-settings"
                        column
                        // boldWhenSelected={false}
                      >
                        <Icon>
                          <SettingsSvg />
                        </Icon>
                        Settings
                      </Tab>
                      <Tab
                        paddingX="md"
                        paddingY="sm"
                        selected={activeIconTab === "settings_2"}
                        onClick={() => setActiveIconTab("settings_2")}
                        aria-controls="icon-panel-settings"
                        column
                        lineHeight="normal"
                      >
                        <Icon>
                          <SettingsSvg />
                        </Icon>
                        Settings
                      </Tab>
                    </TabList>
                  </Box>
                </div>
              </Box>

              <Box column spacing="md">
                <div className="example-block">
                  <div className="caption">Icons only</div>
                  <Box border="1px dashed violet" width="fit-content">
                    <TabList
                      vertical
                      spacing="xs"
                      indicator="end"
                      lineHeight="1"
                    >
                      <Tab
                        selected={activeIconTab === "home"}
                        onClick={() => setActiveIconTab("home")}
                        aria-controls="icon-panel-home"
                        title="Home"
                      >
                        <Icon fontSize="lg">
                          <HomeSvg />
                        </Icon>
                      </Tab>
                      <Tab
                        selected={activeIconTab === "profile"}
                        onClick={() => setActiveIconTab("profile")}
                        aria-controls="icon-panel-profile"
                        title="Profile"
                      >
                        <Icon fontSize="lg">
                          <UserSvg />
                        </Icon>
                      </Tab>
                      <Tab
                        selected={activeIconTab === "settings"}
                        onClick={() => setActiveIconTab("settings")}
                        aria-controls="icon-panel-settings"
                        title="Settings"
                      >
                        <Icon fontSize="lg">
                          <SettingsSvg />
                        </Icon>
                      </Tab>
                    </TabList>
                  </Box>
                </div>
              </Box>
            </Box>
          </Box>
        );
      };

      const SpacingVariants = () => {
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Spacing Variants</Title>
            <Text className="note">
              The <code>spacing</code> prop controls gap between tabs.
              Demonstrated with values <code>xs</code>, <code>sm</code>, and no
              spacing prop (default).
            </Text>
            <div className="example-block">
              <div className="caption">spacing="xs"</div>
              <TabList spacing="xs">
                <Tab key="a" selected>
                  A
                </Tab>
                <Tab key="b">B</Tab>
                <Tab key="c">C</Tab>
              </TabList>
            </div>
            <div className="example-block">
              <div className="caption">spacing="sm"</div>
              <TabList spacing="sm">
                <Tab key="a" selected>
                  A
                </Tab>
                <Tab key="b">B</Tab>
                <Tab key="c">C</Tab>
              </TabList>
            </div>
            <div className="example-block">
              <div className="caption">(default spacing)</div>
              <TabList>
                <Tab key="a" selected>
                  A
                </Tab>
                <Tab key="b">B</Tab>
                <Tab key="c">C</Tab>
              </TabList>
            </div>
          </Box>
        );
      };

      const DynamicAddRemove = () => {
        const [tabs, setTabs] = useState([
          { key: "alpha", label: "Alpha" },
          { key: "beta", label: "Beta" },
          { key: "gamma", label: "Gamma" },
        ]);
        const [active, setActive] = useState("alpha");
        const addTab = () => {
          const id = `tab${tabs.length + 1}`;
          setTabs([...tabs, { key: id, label: id }]);
        };
        const removeLast = () => {
          if (tabs.length === 0) return;
          const clone = tabs.slice(0, -1);
          setTabs(clone);
          if (!clone.find((t) => t.key === active) && clone.length) {
            setActive(clone[clone.length - 1].key);
          }
        };
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Dynamic Add / Remove</Title>
            <Text className="note">
              Tabs can be created or removed externally; the list simply renders
              what it receives.
            </Text>
            <div style={{ marginBottom: "12px" }}>
              <button onClick={addTab} style={{ marginRight: "8px" }}>
                Add Tab
              </button>
              <button onClick={removeLast}>Remove Last</button>
            </div>
            <TabList spacing="sm">
              {tabs.map((t) => (
                <Tab
                  key={t.key}
                  selected={t.key === active}
                  onClick={() => setActive(t.key)}
                  aria-controls={`panel-${t.key}`}
                >
                  {t.label}
                </Tab>
              ))}
            </TabList>
            <div
              className="dynamic-panel"
              id={`panel-${active}`}
              role="tabpanel"
            >
              <strong>{active}</strong> dynamic panel content
            </div>
          </Box>
        );
      };

      const VerticalTabs = () => {
        const [activeVertical, setActiveVertical] = useState("dashboard");
        const verticalTabs = ["dashboard", "analytics", "reports", "settings"];
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Vertical Layout</Title>
            <Text className="note">
              The <code>vertical</code> prop changes the layout direction.
              Default indicator position for vertical is <code>"start"</code>{" "}
              (left side), but can be changed to <code>"end"</code> (right
              side).
            </Text>

            <Box row>
              <Box column spacing="md">
                <div className="example-block" style={{ flex: "1" }}>
                  <div className="caption">Default</div>
                  <Box border="1px dashed violet">
                    <TabList vertical spacing="xs">
                      {verticalTabs.map((name) => (
                        <Tab
                          key={name}
                          selected={name === activeVertical}
                          onClick={() => setActiveVertical(name)}
                          aria-controls={`vertical-panel-${name}`}
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                          }}
                        >
                          <Link
                            paddingX="md"
                            discrete
                            pseudoState={{
                              ":focus-visible": name === "analytics",
                            }}
                          >
                            {name.charAt(0).toUpperCase() + name.slice(1)}
                          </Link>
                        </Tab>
                      ))}
                    </TabList>
                  </Box>
                </div>

                <div className="example-block" style={{ flex: "1" }}>
                  <div className="caption">Indicator end</div>
                  <Box border="1px dashed violet">
                    <TabList vertical indicator="end" spacing="xs">
                      {verticalTabs.map((name) => (
                        <Tab
                          key={name}
                          selected={name === activeVertical}
                          onClick={() => setActiveVertical(name)}
                          aria-controls={`vertical-panel-${name}`}
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                          }}
                        >
                          <Link
                            paddingX="md"
                            discrete
                            pseudoState={{
                              ":focus-visible": name === "analytics",
                            }}
                          >
                            {name.charAt(0).toUpperCase() + name.slice(1)}
                          </Link>
                        </Tab>
                      ))}
                    </TabList>
                  </Box>
                </div>
              </Box>
              <Box column spacing="md">
                <Box expandX>
                  <div className="caption">Tab aligned right</div>
                  <Box border="1px dashed violet">
                    <TabList vertical spacing="xs">
                      {verticalTabs.map((name) => (
                        <Tab
                          key={name}
                          selected={name === activeVertical}
                          onClick={() => setActiveVertical(name)}
                          aria-controls={`vertical-panel-${name}`}
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                          }}
                          alignX="end"
                        >
                          <Link
                            paddingX="md"
                            discrete
                            pseudoState={{
                              ":focus-visible": name === "analytics",
                            }}
                          >
                            {name.charAt(0).toUpperCase() + name.slice(1)}
                          </Link>
                        </Tab>
                      ))}
                    </TabList>
                  </Box>
                </Box>
                <Box expandX>
                  <div className="caption">Aligned right + indicator end</div>
                  <Box border="1px dashed violet">
                    <TabList vertical spacing="xs" indicator="end">
                      {verticalTabs.map((name) => (
                        <Tab
                          key={name}
                          selected={name === activeVertical}
                          onClick={() => setActiveVertical(name)}
                          aria-controls={`vertical-panel-${name}`}
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                          }}
                          alignX="end"
                        >
                          <Link
                            paddingX="md"
                            discrete
                            pseudoState={{
                              ":focus-visible": name === "analytics",
                            }}
                          >
                            {name.charAt(0).toUpperCase() + name.slice(1)}
                          </Link>
                        </Tab>
                      ))}
                    </TabList>
                  </Box>
                </Box>
              </Box>

              <Box column spacing="md">
                <Box expandX>
                  <div className="caption">Background</div>
                  <Box border="1px dashed violet">
                    <TabList
                      vertical
                      spacing="0"
                      style={{
                        "--tab-indicator-spacing": "0",
                        "--tablist-background": "rgb(233, 236, 240)",
                        "--tab-background": "transparent",
                        "--tab-color": "#373C45",
                        "--tab-background-selected": "#373C45",
                        "--tab-color-selected": "white",
                      }}
                    >
                      {verticalTabs.map((name) => (
                        <Tab
                          key={name}
                          selected={name === activeVertical}
                          onClick={() => setActiveVertical(name)}
                          aria-controls={`vertical-panel-${name}`}
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                          }}
                        >
                          <Link
                            paddingX="md"
                            discrete
                            pseudoState={{
                              ":focus-visible": name === "analytics",
                            }}
                          >
                            {name.charAt(0).toUpperCase() + name.slice(1)}
                          </Link>
                        </Tab>
                      ))}
                    </TabList>
                  </Box>
                </Box>

                <Box expandX>
                  <div className="caption">Background + full width</div>
                  <Box border="1px dashed violet">
                    <TabList
                      vertical
                      spacing="0"
                      expandX
                      style={{
                        "--tab-indicator-spacing": "0",
                        "--tablist-background": "rgb(233, 236, 240)",
                        "--tab-background": "transparent",
                        "--tab-color": "#373C45",
                        "--tab-background-selected": "#373C45",
                        "--tab-color-selected": "white",
                      }}
                    >
                      {verticalTabs.map((name) => (
                        <Tab
                          key={name}
                          selected={name === activeVertical}
                          onClick={() => setActiveVertical(name)}
                          aria-controls={`vertical-panel-${name}`}
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                          }}
                        >
                          <Link
                            paddingX="md"
                            discrete
                            pseudoState={{
                              ":focus-visible": name === "analytics",
                            }}
                          >
                            {name.charAt(0).toUpperCase() + name.slice(1)}
                          </Link>
                        </Tab>
                      ))}
                    </TabList>
                  </Box>
                </Box>
              </Box>
            </Box>
          </Box>
        );
      };

      const StylingVariables = () => {

              <code>--tab-indicator-color</code> and{" "}
              <code>--tab-indicator-size</code>.
            </Text>
            <div className="example-block">
              <div className="caption">Global theme (light slate)</div>
              <TabList
                style={{
                  "--tab-background": "#f2f5f8",
                  "--tab-color": "#334155",
                  "--tab-background-hover": "#e2e8f0",
                  "--tab-color-hover": "#1e293b",
                }}
              >
                <Tab key="one" selected>
                  One
                </Tab>
                <Tab key="two">Two</Tab>
                <Tab key="three">Three</Tab>
              </TabList>
            </div>
            <div className="example-block">
              <div className="caption">Override third tab only</div>
              <TabList
                style={{
                  "--tab-background": "#202124",
                  "--tab-color": "#e8eaed",
                  "--tab-background-hover": "#2d2f31",
                  "--tab-color-hover": "white",
                }}
              >
                <Tab key="alpha" selected>
                  Alpha
                </Tab>
                <Tab key="beta">Beta</Tab>
                <Tab
                  key="gamma"
                  style={{
                    "--tab-background": "#0d47a1",
                    "--tab-color": "#fff",
                    "--tab-background-hover": "#1565c0",
                    "--tab-color-hover": "#fff",
                  }}
                >
                  Gamma (override)
                </Tab>
              </TabList>
            </div>
            <div className="example-block">
              <div className="caption">Custom hover + indicator</div>
              <TabList
                indicator="end"
                style={{
                  "--tab-background": "transparent",
                  "--tab-color": "#374151",
                  "--tab-background-hover": "#fde68a",
                  "--tab-color-hover": "#92400e",
                  "--tab-indicator-color": "#f59e0b",
                }}
              >
                <Tab key="day" selected>
                  Day
                </Tab>
                <Tab key="week">Week</Tab>
                <Tab key="month">Month</Tab>
              </TabList>
            </div>
            <div className="example-block">
              <div className="caption">Custom selected background & color</div>
              <TabList
                indicator="end"
                style={{
                  "--tab-background": "#1e1e1e",
                  "--tab-color": "#c9d1d9",
                  "--tab-background-hover": "#2a2a2a",
                  "--tab-color-hover": "white",
                  "--tab-indicator-color": "#ff6b6b",
                  "--tab-indicator-size": "3px",
                  "--tab-background-selected": "#0d1117",
                  "--tab-color-selected": "#ffdd57",
                }}
              >
                <Tab key="code" selected>
                  Code
                </Tab>
                <Tab key="design">Design</Tab>
                <Tab key="docs">Docs</Tab>
              </TabList>
            </div>
            <div className="example-block">
              <div className="caption">Override selected style for one tab</div>
              <TabList
                indicator="end"
                style={{
                  "--tab-background": "#f1f5f9",
                  "--tab-color": "#475569",
                  "--tab-background-hover": "#e2e8f0",
                  "--tab-color-hover": "#1e293b",
                  "--tab-background-selected": "#cbd5e1",
                  "--tab-color-selected": "#0f172a",
                  "--tab-indicator-color": "#0ea5e9",
                }}
              >
                <Tab key="general" selected>
                  General
                </Tab>
                <Tab key="advanced">Advanced</Tab>
                <Tab
                  key="danger"
                  style={{
                    "--tab-background": "#fee2e2",
                    "--tab-color": "#991b1b",
                    "--tab-background-hover": "#fecaca",
                    "--tab-color-hover": "#7f1d1d",
                    "--tab-background-selected": "#fb7185",
                    "--tab-color-selected": "white",
                    "--tab-indicator-color": "#dc2626",
                  }}

                  Danger (override)

            </div>
            <div className="example-block">
              <div className="caption">Indicator at start position</div>
              <TabList
                indicator="start"
                style={{
                  "--tab-background": "#f8fafc",
                  "--tab-color": "#64748b",
                  "--tab-background-hover": "#e2e8f0",
                  "--tab-color-hover": "#334155",
                  "--tab-indicator-color": "#22c55e",
                  "--tab-indicator-size": "4px",
                }}
              >
                <Tab key="inbox" selected>

                </Tab>
                <Tab key="sent">Sent</Tab>

          </Box>

      const BinderTabs = () => {

        return (
          <Box as="section" className="demo-section">

              "Intercalaire / classeur" style — tabs with category badges. Uses{" "}
              <code>indicator="none"</code>, a bottom border on the wrapper to

              <em>
                The "open bottom on selected tab" effect requires future TabList

              <Box padding="m" background="lightgrey">

                    "--tablist-border-width": "10px",
                    "--tab-background": "transparent",
                    "--tab-color": "#9ca3af",
                    "--tab-background-hover": "#f9fafb",
                    "--tab-color-hover": "#374151",
                    "--tab-background-selected": "#ffffff",
                    "--tab-color-selected": "#111827",

                  panelPosition="after"
                  panelBorderConnection
                >
                  <Tab

                    spacing="xs"
                    selected={active === "approved"}
