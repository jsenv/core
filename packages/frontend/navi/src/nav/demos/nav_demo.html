<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nav Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.5;
        background: #f5f5f5;
      }
      h1 {
        margin: 0 0 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }
      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .demo-section h2 {
        margin: 0 0 15px;
        padding-bottom: 6px;
        color: #222;
        font-size: 1.3rem;
        border-bottom: 2px solid #e0e0e0;
      }
      .caption {
        margin: 10px 0 8px;
        color: #666;
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .example-block {
        margin-bottom: 24px;
      }
      .note {
        display: inline-block;
        padding: 10px 12px;
        color: #555;
        font-size: 0.8rem;
        background: #f8f9fa;
        border-left: 4px solid #1976d2;
        border-radius: 0 6px 6px 0;
      }
      .dynamic-panel {
        min-height: 60px;
        margin-top: 16px;
        padding: 12px 16px;
        background: #fafafa;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Box,
        Title,
        Text,
        Nav,
        Link,
        Caption,
        Icon,
        HomeSvg,
        UserSvg,
        SettingsSvg,
        BadgeCount,
        setupRoutes,
        route,
      } from "@jsenv/navi";

      const TEST_ROUTE = route("/test_route");
      setupRoutes([TEST_ROUTE]);

      const Demo = () => {
        return (
          <div style={{ padding: "10px" }}>
            <Title as="h1">Nav + Link Demo</Title>
            <BasicNav />
            <UnderlineInteractive />
            <RoundedNav />
            <Vertical />
            <VerticalWithIcons />
            <SpacingVariants />
            <StylingVariables />
            <DynamicAddRemove />
            <Binder />
          </div>
        );
      };

      const BasicNav = () => {
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Basic</Title>

            <Caption>Minimal list of links</Caption>
            <Nav spacing="s">
              <Link pseudoState={{ ":-navi-href-current": true }}>Home</Link>
              <Link>Profile</Link>
              <Link>Settings</Link>
            </Nav>

            <Caption>List of links as tab</Caption>
            <Nav spacing="s">
              <Link
                appearance="tab"
                pseudoState={{ ":-navi-href-current": true }}
                currentIndicator
                currentEffectBold
              >
                Home
              </Link>
              <Link appearance="tab" currentIndicator>
                Profile
              </Link>
              <Link appearance="tab" currentIndicator>
                Settings
              </Link>
            </Nav>
          </Box>
        );
      };

      const UnderlineInteractive = () => {
        const [active, setActive] = useState("overview");
        const tabs = ["overview", "activity", "reports", "billing"];
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Indicator + Click Selection</Title>
            <Text className="note">
              The <code>indicator</code> prop enables an active marker at the{" "}
              <code>"start"</code> or <code>"end"</code> of tabs. Tabs become
              interactive when you provide an <code>onClick</code>; selection is
              controlled externally (here by local state). The selected tab also
              updates the associated panel below.
            </Text>
            <div className="example-block">
              <div className="caption">Indicator below (default)</div>
              <Box border="1px dashed violet">
                <Nav spacing="s" lineHeight="2">
                  {tabs.map((name) => (
                    <Link
                      key={name}
                      appearance="tab"
                      currentIndicator
                      currentEffectBold
                      onClick={() => setActive(name)}
                      aria-controls={`panel-${name}`}
                      paddingX="md"
                      pseudoState={{
                        ":focus-visible": name === "activity",
                        ":hover": name === "activity" || undefined,
                        ":-navi-href-current": name === active,
                      }}
                      capitalize
                    >
                      {name}
                    </Link>
                  ))}
                </Nav>
              </Box>
            </div>
            <div className="example-block">
              <div className="caption">Indicator above</div>
              <Box border="1px dashed violet">
                <Nav spacing="s" lineHeight="2">
                  {tabs.map((name) => (
                    <Link
                      key={name}
                      appearance="tab"
                      currentIndicator="top"
                      currentEffectBold
                      onClick={() => setActive(name)}
                      aria-controls={`panel-${name}`}
                      paddingX="md"
                      pseudoState={{
                        ":hover": name === "activity" || undefined,
                        ":focus-visible": name === "activity",
                        ":-navi-href-current": name === active,
                      }}
                      capitalize
                    >
                      {name}
                    </Link>
                  ))}
                </Nav>
              </Box>
            </div>
            <div className="example-block">
              <div className="caption">
                Nav background + selected link styling (no indicator)
              </div>
              <Box row align="center" border="1px dashed violet">
                <Nav
                  lineHeight="2"
                  borderRadius="s"
                  expandX
                  padding="2"
                  style={{
                    "--nav-background": "rgb(233, 236, 240)",
                  }}
                  linkBorderRadiusInherit
                >
                  {tabs.map((name) => (
                    <Link
                      appearance="tab"
                      key={name}
                      onClick={() => setActive(name)}
                      aria-controls={`panel-${name}`}
                      paddingX="m"
                      expandX
                      alignX="center"
                      pseudoState={{
                        ":hover": name === "activity" || undefined,
                        ":focus-visible": name === "activity",
                        ":-navi-href-current": name === active,
                      }}
                      style={{
                        "--link-color": "#373C45",
                        "--link-background-current": "#373C45",
                        "--link-color-current": "white",
                      }}
                      capitalize
                      currentEffectBold
                    >
                      {name}
                    </Link>
                  ))}
                </Nav>
              </Box>
            </div>

            <div className="example-block">
              <div className="caption">
                Nav as icons with scaling when selected
              </div>
              <Box
                row
                alignX="start"
                border="1px dashed violet"
                width="fit-content"
              >
                <Nav spacing="s">
                  {tabs.map((name) => (
                    <Link
                      key={name}
                      onClick={() => setActive(name)}
                      aria-controls={`panel-${name}`}
                      padding="0"
                      backgroundColor="orange"
                      color="white"
                      scale="1"
                      style={{
                        ":-navi-href-current": {
                          scale: "1.3",
                          backgroundColor:
                            "color-mix(in srgb, var(--link-background-color) 80%, black)",
                          color: "black",
                        },
                      }}
                      pseudoState={{
                        ":hover": name === "activity" || undefined,
                        ":focus-visible": name === "activity",
                        ":-navi-href-current": name === active,
                      }}
                      transition="all 0.3s ease-in-out"
                      circle
                    >
                      <Icon box size="32" align="center" padding="6">
                        <SettingsSvg />
                      </Icon>
                    </Link>
                  ))}
                </Nav>
              </Box>
            </div>
          </Box>
        );
      };

      const RoundedNav = () => {
        const [active, setActive] = useState(undefined);

        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Rounded / Pill Style</Title>
            <Text className="note">
              Setting <code>borderRadius="100px"</code> on a <code>Nav</code>{" "}
              with a background color creates a pill-shaped nav bar. The{" "}
              <code>Link</code> border-radius is automatically kept 2 px smaller
              than the container so each link also appears rounded.
            </Text>

            <div className="example-block">
              <div className="caption">Interactive — click to select</div>
              <Nav border="10px solid blue" borderRadius="100px">
                <Link
                  appearance="tab"
                  background="#F3E8FF"
                  paddingX="m"
                  onClick={() => setActive("0-0")}
                  pseudoState={{
                    ":-navi-href-current": active === "0-0",
                  }}
                >
                  0-0
                </Link>
                <Link
                  appearance="tab"
                  background="#C4B5FD"
                  paddingX="m"
                  onClick={() => setActive("1-3")}
                  pseudoState={{
                    ":-navi-href-current": active === "1-3",
                  }}
                >
                  1-3
                </Link>
                <Link
                  appearance="tab"
                  background="#8B5CF6"
                  paddingX="m"
                  onClick={() => setActive("3-6")}
                  pseudoState={{
                    ":-navi-href-current": active === "3-6",
                  }}
                >
                  3-6
                </Link>
                <Link
                  appearance="tab"
                  background="#7C3AED"
                  paddingX="m"
                  onClick={() => setActive("6+")}
                  pseudoState={{
                    ":-navi-href-current": active === "6+",
                  }}
                >
                  6+
                </Link>
              </Nav>
            </div>

            <div className="example-block">
              <div className="caption">
                Same design with first and last tab hovered
              </div>
              <Nav border="10px solid blue" borderRadius="100px" spacing="0">
                <Link
                  appearance="tab"
                  background="#F3E8FF"
                  paddingX="m"
                  pseudoState={{ ":hover": true }}
                >
                  0-0
                </Link>
                <Link appearance="tab" background="#C4B5FD" paddingX="m">
                  1-3
                </Link>
                <Link appearance="tab" background="#8B5CF6" paddingX="m">
                  3-6
                </Link>
                <Link
                  appearance="tab"
                  background="#7C3AED"
                  paddingX="m"
                  pseudoState={{ ":hover": true }}
                >
                  6+
                </Link>
              </Nav>
            </div>

            <div className="example-block">
              <div className="caption">Same design with last tab selected</div>
              <Nav border="10px solid blue" borderRadius="100px">
                <Link appearance="tab" background="#F3E8FF" paddingX="m">
                  0-0
                </Link>
                <Link appearance="tab" background="#C4B5FD" paddingX="m">
                  1-3
                </Link>
                <Link appearance="tab" background="#8B5CF6" paddingX="m">
                  3-6
                </Link>
                <Link
                  appearance="tab"
                  background="#7C3AED"
                  paddingX="m"
                  pseudoState={{ ":-navi-href-current": true }}
                >
                  6+
                </Link>
              </Nav>
            </div>

            <div className="example-block">
              <div className="caption">Same design with padding on nav</div>
              <Nav
                background="yellow"
                border="10px solid blue"
                borderRadius="100px"
                padding="15"
              >
                <Link
                  appearance="tab"
                  background="#F3E8FF"
                  paddingX="m"
                  onClick={() => setActive("0-0")}
                  pseudoState={{
                    ":-navi-href-current": active === "0-0",
                  }}
                >
                  0-0
                </Link>
                <Link
                  appearance="tab"
                  background="#C4B5FD"
                  paddingX="m"
                  onClick={() => setActive("1-3")}
                  pseudoState={{
                    ":-navi-href-current": active === "1-3",
                  }}
                >
                  1-3
                </Link>
                <Link
                  appearance="tab"
                  background="#8B5CF6"
                  paddingX="m"
                  onClick={() => setActive("3-6")}
                  pseudoState={{
                    ":-navi-href-current": active === "3-6",
                  }}
                >
                  3-6
                </Link>
                <Link
                  appearance="tab"
                  background="#7C3AED"
                  paddingX="m"
                  onClick={() => setActive("6+")}
                  pseudoState={{
                    ":-navi-href-current": active === "6+",
                  }}
                >
                  6+
                </Link>
              </Nav>
            </div>
          </Box>
        );
      };

      const Vertical = () => {
        const [activeLink, setActiveLink] = useState("dashboard");
        const navLinks = ["dashboard", "analytics", "reports", "settings"];
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Vertical Layout</Title>
            <Text className="note">
              The <code>vertical</code> prop changes the layout direction of the{" "}
              <code>Nav</code>. Indicator position can be <code>"left"</code> or{" "}
              <code>"right"</code>.
            </Text>

            <Box row>
              <Box column spacing="md">
                <div className="example-block" style={{ flex: "1" }}>
                  <div className="caption">Default</div>
                  <Box border="1px dashed violet">
                    <Nav vertical spacing="s">
                      {navLinks.map((name) => (
                        <Link
                          key={name}
                          onClick={() => setActiveLink(name)}
                          aria-controls={`vertical-panel-${name}`}
                          appearance="tab"
                          currentIndicator="left"
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                            ":focus-visible": name === "analytics",
                            ":-navi-href-current": name === activeLink,
                          }}
                          paddingX="m"
                          capitalize
                          currentEffectBold
                        >
                          {name}
                        </Link>
                      ))}
                    </Nav>
                  </Box>
                </div>

                <div className="example-block" style={{ flex: "1" }}>
                  <div className="caption">Indicator end</div>
                  <Box border="1px dashed violet">
                    <Nav vertical spacing="xs">
                      {navLinks.map((name) => (
                        <Link
                          key={name}
                          appearance="tab"
                          onClick={() => setActiveLink(name)}
                          aria-controls={`vertical-panel-${name}`}
                          paddingX="m"
                          currentIndicator="right"
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                            ":focus-visible": name === "analytics",
                            ":-navi-href-current": name === activeLink,
                          }}
                          capitalize
                          currentEffectBold
                        >
                          {name}
                        </Link>
                      ))}
                    </Nav>
                  </Box>
                </div>
              </Box>
              <Box column spacing="md">
                <Box expandX>
                  <div className="caption">Tab aligned right</div>
                  <Box border="1px dashed violet">
                    <Nav vertical spacing="xs">
                      {navLinks.map((name) => (
                        <Link
                          key={name}
                          appearance="tab"
                          currentIndicator="left"
                          alignX="end"
                          onClick={() => setActiveLink(name)}
                          aria-controls={`vertical-panel-${name}`}
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                            ":focus-visible": name === "analytics",
                            ":-navi-href-current": name === activeLink,
                          }}
                          paddingX="m"
                          capitalize
                          currentEffectBold
                        >
                          {name}
                        </Link>
                      ))}
                    </Nav>
                  </Box>
                </Box>
                <Box expandX>
                  <div className="caption">Aligned right + indicator end</div>
                  <Box border="1px dashed violet">
                    <Nav vertical spacing="xs">
                      {navLinks.map((name) => (
                        <Link
                          key={name}
                          appearance="tab"
                          onClick={() => setActiveLink(name)}
                          aria-controls={`vertical-panel-${name}`}
                          paddingX="m"
                          alignX="end"
                          currentIndicator="right"
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                            ":focus-visible": name === "analytics",
                            ":-navi-href-current": name === activeLink,
                          }}
                          capitalize
                          currentEffectBold
                        >
                          {name}
                        </Link>
                      ))}
                    </Nav>
                  </Box>
                </Box>
              </Box>

              <Box column spacing="md">
                <Box expandX>
                  <div className="caption">Background</div>
                  <Box border="1px dashed violet">
                    <Nav
                      vertical
                      style={{
                        "--nav-background": "rgb(233, 236, 240)",
                      }}
                    >
                      {navLinks.map((name) => (
                        <Link
                          key={name}
                          appearance="tab"
                          selected={name === activeLink}
                          onClick={() => setActiveLink(name)}
                          aria-controls={`vertical-panel-${name}`}
                          paddingX="m"
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                            ":focus-visible": name === "analytics",
                            ":-navi-href-current": name === activeLink,
                          }}
                          currentIndicator="left"
                          style={{
                            "--link-current-indicator-spacing": "0",
                            "--link-background": "transparent",
                            "--link-color": "#373C45",
                            "--link-background-current": "#373C45",
                            "--link-color-current": "white",
                          }}
                          capitalize
                          currentEffectBold
                        >
                          {name}
                        </Link>
                      ))}
                    </Nav>
                  </Box>
                </Box>

                <Box expandX>
                  <div className="caption">Background + full width</div>
                  <Box border="1px dashed violet">
                    <Nav
                      vertical
                      expandX
                      style={{
                        "--nav-background": "rgb(233, 236, 240)",
                      }}
                    >
                      {navLinks.map((name) => (
                        <Link
                          key={name}
                          appearance="tab"
                          onClick={() => setActiveLink(name)}
                          aria-controls={`vertical-panel-${name}`}
                          paddingX="m"
                          pseudoState={{
                            ":hover": name === "analytics" || undefined,
                            ":focus-visible": name === "analytics",
                            ":-navi-href-current": name === activeLink,
                          }}
                          currentIndicator="left"
                          style={{
                            "--link-current-indicator-spacing": "0",
                            "--link-background": "transparent",
                            "--link-color": "#373C45",
                            "--link-background-current": "#373C45",
                            "--link-color-current": "white",
                          }}
                          capitalize
                          expandX
                          currentEffectBold
                        >
                          {name}
                        </Link>
                      ))}
                    </Nav>
                  </Box>
                </Box>
              </Box>
            </Box>
          </Box>
        );
      };

      const VerticalWithIcons = () => {
        const [activeIconTab, setActiveIconTab] = useState("home");

        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Vertical Layout with Icons</Title>
            <Text className="note">
              Vertical tabs can include icons alongside text labels. Here are
              examples with different icon placements and styling approaches
              using the Icon component with SVG files.
            </Text>

            <Box row>
              <Box column spacing="md">
                <div className="example-block">
                  <div className="caption">Icons before text</div>
                  <Box border="1px dashed violet" style={{ width: "200px" }}>
                    <Nav vertical spacing="xs" expandX>
                      <Link
                        flex
                        expandX
                        appearance="tab"
                        paddingX="m"
                        alignY="center"
                        currentIndicator="right"
                        currentEffectBold
                        current={activeIconTab === "home"}
                        href="toto"
                        preventDefault
                        onClick={() => setActiveIconTab("home")}
                      >
                        <Icon>
                          <HomeSvg />
                        </Icon>
                        Home
                        <BadgeCount
                          background="red"
                          selfAlignX="end"
                          color="white"
                        >
                          1
                        </BadgeCount>
                      </Link>
                      <Link
                        flex
                        expandX
                        appearance="tab"
                        paddingX="m"
                        alignY="center"
                        currentIndicator="right"
                        currentEffectBold
                        current={activeIconTab === "profile"}
                        route={TEST_ROUTE}
                        preventDefault
                        onClick={() => setActiveIconTab("profile")}
                      >
                        <Icon>
                          <UserSvg />
                        </Icon>
                        Profile
                        <BadgeCount
                          background="red"
                          selfAlignX="end"
                          color="white"
                        >
                          1
                        </BadgeCount>
                      </Link>
                      <Link
                        appearance="tab"
                        currentIndicator="right"
                        currentEffectBold
                        paddingX="m"
                        onClick={() => setActiveIconTab("settings")}
                        aria-controls="icon-panel-settings"
                        column
                        // boldWhenSelected={false}
                        current={activeIconTab === "settings"}
                      >
                        <Icon>
                          <SettingsSvg />
                        </Icon>
                        Settings
                      </Link>
                      <Link
                        appearance="tab"
                        currentIndicator="right"
                        currentEffectBold
                        paddingX="m"
                        paddingY="s"
                        onClick={() => setActiveIconTab("settings_2")}
                        aria-controls="icon-panel-settings"
                        column
                        lineHeight="normal"
                        current={activeIconTab === "settings_2"}
                      >
                        <Icon>
                          <SettingsSvg />
                        </Icon>
                        Settings
                      </Link>
                    </Nav>
                  </Box>
                </div>
              </Box>

              <Box column spacing="md">
                <div className="example-block">
                  <div className="caption">Icons only</div>
                  <Box border="1px dashed violet" width="fit-content">
                    <Nav vertical spacing="xs" lineHeight="1">
                      <Link
                        appearance="icon"
                        onClick={() => setActiveIconTab("home")}
                        aria-controls="icon-panel-home"
                        title="Home"
                        pseudoState={{
                          ":-navi-href-current": activeIconTab === "home",
                        }}
                        currentIndicator="right"
                      >
                        <Icon fontSize="lg">
                          <HomeSvg />
                        </Icon>
                      </Link>
                      <Link
                        appearance="icon"
                        onClick={() => setActiveIconTab("profile")}
                        aria-controls="icon-panel-profile"
                        title="Profile"
                        pseudoState={{
                          ":-navi-href-current": activeIconTab === "profile",
                        }}
                        currentIndicator="right"
                      >
                        <Icon fontSize="lg">
                          <UserSvg />
                        </Icon>
                      </Link>
                      <Link
                        appearance="icon"
                        onClick={() => setActiveIconTab("settings")}
                        aria-controls="icon-panel-settings"
                        title="Settings"
                        pseudoState={{
                          ":-navi-href-current": activeIconTab === "settings",
                        }}
                        currentIndicator="right"
                      >
                        <Icon fontSize="lg">
                          <SettingsSvg />
                        </Icon>
                      </Link>
                    </Nav>
                  </Box>
                </div>
              </Box>
            </Box>
          </Box>
        );
      };

      const SpacingVariants = () => {
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Spacing Variants</Title>
            <Text className="note">
              The <code>spacing</code> prop controls the gap between{" "}
              <code>Link</code> elements inside a <code>Nav</code>.
            </Text>
            <div className="example-block">
              <div className="caption">(default spacing)</div>
              <Nav>
                <Link current>A</Link>
                <Link>B</Link>
                <Link>C</Link>
              </Nav>
            </div>
            <div className="example-block">
              <div className="caption">spacing="xs"</div>
              <Nav spacing="xs">
                <Link current>A</Link>
                <Link>B</Link>
                <Link>C</Link>
              </Nav>
            </div>
            <div className="example-block">
              <div className="caption">spacing="s"</div>
              <Nav spacing="s">
                <Link current>A</Link>
                <Link>B</Link>
                <Link>C</Link>
              </Nav>
            </div>
          </Box>
        );
      };

      const DynamicAddRemove = () => {
        const [links, setLinks] = useState([
          { key: "alpha", label: "Alpha" },
          { key: "beta", label: "Beta" },
          { key: "gamma", label: "Gamma" },
        ]);
        const [active, setActive] = useState("alpha");
        const addLink = () => {
          const id = `link${links.length + 1}`;
          setLinks([...links, { key: id, label: id }]);
        };
        const removeLast = () => {
          if (links.length === 0) return;
          const clone = links.slice(0, -1);
          setLinks(clone);
          if (!clone.find((t) => t.key === active) && clone.length) {
            setActive(clone[clone.length - 1].key);
          }
        };
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Dynamic Add / Remove</Title>
            <Text className="note">

              </button>
              <button onClick={removeLast}>Remove Last</button>
            </div>
            <Nav spacing="s">
              {links.map((t) => (
                <Link
                  key={t.key}
                  current={t.key === active}
                  onClick={() => setActive(t.key)}
                  aria-controls={`panel-${t.key}`}
                >
                  {t.label}
                </Link>
              ))}
            </Nav>
            <div className="dynamic-panel" id={`panel-${active}`} role="region">
              <strong>{active}</strong> dynamic panel content
            </div>
          </Box>
        );
