<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Search Fallback Demo</title>
    <style>
      body {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        NaviDebug,
        List,
        Input,
        Button,
        Picker,
        Text,
        useSearchText,
        stateSignal,
        route,
        setupRoutes,
        Box,
      } from "@jsenv/navi";

      const GAMES = [
        "Chess",
        "Checkers",
        "Go",
        "Backgammon",
        "Scrabble",
        "Monopoly",
        "Risk",
        "Catan",
        "Dominion",
        "Pandemic",
      ];

      const selectedGameSignal = stateSignal(undefined, {
        id: "selected_game",
        type: "string",
      });
      const searchSignal = stateSignal(undefined, {
        id: "search",
        type: "string",
      });

      const GAME_LIST_PAGE = route("", {
        searchParams: {
          game: selectedGameSignal,
          search: searchSignal,
        },
      });

      setupRoutes([GAME_LIST_PAGE]);

      const GameList = ({
        selectedGame,
        searchText,
        getMatchInfo,
        matchingGames,
      }) => (
        <>
          <Input
            type="search"
            placeholder="Search games…"
            value={searchSignal}
            action={(v) => {
              searchSignal.value = v;
            }}
            expandX
            navi-list="game_list"
          />
          <List
            id="game_list"
            selectable
            command="--navi-send"
            expandX
            separator
            searchText={searchText}
            searchFallback={false}
          >
            {matchingGames.map((game, i) => {
              const { match, ranges } = getMatchInfo(game);
              return (
                <List.Item
                  selectable
                  key={game}
                  index={i}
                  id={`game_${game.toLowerCase()}`}
                  value={game}
                  selected={selectedGame === game}
                  match={match}
                  highlight={ranges}
                  padding="s"
                >
                  {game}
                </List.Item>
              );
            })}
          </List>
          <Box flex="x" spacing="s" alignX="end">
            <Button variant="secondary" command="--navi-cancel">
              Cancel
            </Button>
            <Button variant="primary" command="--navi-send">
              Define
            </Button>
          </Box>
        </>
      );

      const App = () => {
        const selectedGame = selectedGameSignal.value;
        const searchText = searchSignal.value;
        const [matchingGames, getMatchInfo] = useSearchText(searchText, GAMES);

        return (
          <NaviDebug debugAll>
            <Box flex="y" spacing="xl">
              <Box flex="y" spacing="m" alignX="start">
                <Text as="h2" size="l">
                  Dialog mode
                </Text>
                <Picker
                  name="game_picker_dialog"
                  placeholder="Select a game…"
                  value={selectedGame}
                  action={(v) => {
                    selectedGameSignal.value = v ?? "";
                  }}
                  mode="dialog"
                  minWidth="200"
                  dialogExpandY
                >
                  <Box flex="y" spacing="l" padding="m" expandY minHeight="0">
                    <GameList
                      selectedGame={selectedGame}
                      searchText={searchText}
                      matchingGames={matchingGames}
                      getMatchInfo={getMatchInfo}
                    />
                  </Box>
                </Picker>
              </Box>

              <Box flex="y" spacing="m" alignX="start">
                <Text as="h2" size="l">
                  Popover mode
                </Text>
                <Picker
                  name="game_picker_popover"
                  placeholder="Select a game…"
                  value={selectedGame}
                  action={(v) => {
                    selectedGameSignal.value = v ?? "";
                  }}
                  mode="popover"
                  minWidth="200"
                >
                  <Box flex="y" spacing="m" padding="m" expandY minHeight="0">
                    <GameList
                      selectedGame={selectedGame}
                      searchText={searchText}
                      matchingGames={matchingGames}
                      getMatchInfo={getMatchInfo}
                    />
                  </Box>
                </Picker>
              </Box>
            </Box>
          </NaviDebug>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
