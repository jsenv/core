<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Search Fallback Demo</title>
    <style>
      body {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        NaviDebug,
        List,
        Input,
        Link,
        Picker,
        Text,
        useSearchText,
        stateSignal,
        route,
        setupRoutes,
        Box,
      } from "@jsenv/navi";

      const GAMES = [
        "Chess",
        "Checkers",
        "Go",
        "Backgammon",
        "Scrabble",
        "Monopoly",
        "Risk",
        "Catan",
        "Dominion",
        "Pandemic",
      ];

      const selectedGameSignal = stateSignal(undefined, {
        id: "selected_game",
        type: "string",
      });
      const searchSignal = stateSignal(undefined, {
        id: "search",
        type: "string",
      });

      const GAME_LIST_PAGE = route("", {
        searchParams: {
          game: selectedGameSignal,
        },
      });

      setupRoutes([GAME_LIST_PAGE]);

      const App = () => {
        const selectedGame = selectedGameSignal.value;
        const searchText = searchSignal.value;
        const [matchingGames, getMatchInfo] = useSearchText(searchText, GAMES);

        return (
          <NaviDebug debugAll>
            <div>
              <Text as="h1" size="l" marginBottom="m">
                Game Library
              </Text>
              <Picker
                name="game_picker"
                placeholder="Select a game…"
                value={selectedGame}
                action={(v) => {
                  selectedGameSignal.value = v ?? "";
                }}
                mode="dialog"
                minWidth="200"
              >
                <Box flex="y" spacing="m" padding="m">
                  <Input
                    type="search"
                    placeholder="Search games…"
                    value={searchText}
                    action={(v) => {
                      searchSignal.value = v ?? "";
                    }}
                    expandX
                    navi-list="game_list"
                  />
                  <List
                    id="game_list"
                    selectable
                    command="--navi-send"
                    expandX
                    separator
                    searchText={searchText}
                    searchFallback={
                      <Text
                        flex="y"
                        textAlign="center"
                        spacing="s"
                        expandX
                        size="m"
                        padding="s"
                      >
                        <Text>
                          Aucun résultat ne correspond à votre recherche.
                        </Text>
                        <Link
                          route={GAME_LIST_PAGE}
                          routeParams={{ game: undefined }}
                          paddingX="s"
                          paddingY="xs"
                          onClick={() => {
                            searchSignal.value = "";
                          }}
                        >
                          Revenir à la liste complète
                        </Link>
                      </Text>
                    }
                  >
                    {matchingGames.map((game, i) => {
                      const { match, ranges } = getMatchInfo(game);
                      return (
                        <List.Item
                          selectable
                          key={game}
                          index={i}
                          id={`game_${game.toLowerCase()}`}
                          value={game}
                          selected={selectedGame === game}
                          match={match}
                          highlight={ranges}
                          padding="s"
                        >
                          {game}
                        </List.Item>
                      );
                    })}
                  </List>
                </Box>
              </Picker>
            </div>
          </NaviDebug>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
