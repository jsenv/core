<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TabList Demo</title>
    <style></style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        Box,
        Title,
        Text,
        Nav,
        Link,
        Icon,
        HomeSvg,
        UserSvg,
        SettingsSvg,
        BadgeCount,
        setupRoutes,
        route,
      } from "@jsenv/navi";

      const A_ROUTE = route("/a");
      const B_ROUTE = route("/b");
      setupRoutes([A_ROUTE, B_ROUTE]);

      const ScalingTabsDemo = () => {
        return (
          <Box as="section" className="demo-section">
            <Title as="h2">Scaling Selected Tabs</Title>

            <div className="example-block">
              <div className="caption">
                Circular icon tabs with scale + color change
              </div>
              <Box border="1px dashed violet" padding="md" width="fit-content">
                <Nav spacing="s">
                  <Link
                    appearance="tab"
                    route={A_ROUTE}
                    circle
                    currentIndicator="none"
                    backgroundColor="orange"
                    color="white"
                    padding="8"
                    transition="all 0.8s ease-in-out"
                    style={{
                      ":-navi-href-current": {
                        scale: "1.3",
                        backgroundColor: "lightblue",
                      },
                    }}
                  >
                    <Icon circle size="40">
                      <HomeSvg />
                    </Icon>
                  </Link>
                  <Link
                    route={B_ROUTE}
                    appearance="tab"
                    currentIndicator="none"
                    circle
                    backgroundColor="green"
                    color="white"
                    padding="8"
                    transition="all 0.8s ease-in-out"
                    style={{
                      ":-navi-href-current": {
                        scale: "1.3",
                        backgroundColor: "lightblue",
                      },
                    }}
                  >
                    <Icon circle size="40">
                      <UserSvg />
                    </Icon>
                  </Link>
                </Nav>
              </Box>
            </div>
          </Box>
        );
      };

      render(<ScalingTabsDemo />, document.getElementById("app"));
    </script>
  </body>
</html>
