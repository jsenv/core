<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Item Tracker with subscribers</title>
    <link rel="icon" href="data:," />
    <style>
      @keyframes render-flash {
        0% {
          background-color: #fde68a;
          transform: scale(1.04);
        }
        60% {
          transform: scale(1);
        }
        100% {
          background-color: transparent;
        }
      }
      .render-badge {
        display: inline-block;
        padding: 1px 6px;
        color: #555;
        font-size: 11px;
        font-family: monospace;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .render-flash {
        animation: render-flash 600ms ease-out;
      }
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      input {
        display: block;
        margin-bottom: 8px;
      }
      .component-box {
        margin: 6px 0;
        border: 2px solid #ccc;
        border-radius: 8px;
        overflow: hidden;
      }
      .component-header {
        display: flex;
        padding: 6px 10px;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        background: #f5f5f5;
      }
      .component-name {
        font-weight: 700;
        font-size: 13px;
      }
      .component-body {
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <script type="module" jsenv-type="module/jsx">
      import { createContext, render } from "preact";
      import { useContext, useRef, useState } from "preact/hooks";
      import { useItemTracker } from "../item_tracker/use_item_tracker.js";

      // ── Render counter hook ───────────────────────────────────────────────────

      const useRenderCount = () => {
        const countRef = useRef(0);
        countRef.current += 1;
        return countRef.current;
      };

      const RenderBadge = ({ count }) => {
        const keyRef = useRef(0);
        keyRef.current += 1;
        return (
          <span class="render-badge render-flash" key={keyRef.current}>
            renders={count}
          </span>
        );
      };

      // ── Demo ──────────────────────────────────────────────────────────────────

      const SearchContext = createContext(null);

      const ITEMS = [
        "a-1",
        "b-1",
        "a-2",
        "b-2",
        "a-3",
        "b-3",
        "a-4",
        "b-4",
        "a-5",
        "b-5",
      ];

      const ListWithSearch = ({ children }) => {
        const renders = useRenderCount();
        const [searchText, setSearchText] = useState(null);
        const searchContextRef = useRef(null);
        if (
          !searchContextRef.current ||
          searchContextRef.current.searchText !== (searchText || null)
        ) {
          searchContextRef.current = { searchText: searchText || null };
        }

        const tracker = useItemTracker();

        return (
          <div class="component-box">
            <div class="component-header">
              <span class="component-name">ListWithSearch</span>
              <RenderBadge count={renders} />
            </div>
            <div class="component-body">
              <input
                type="text"
                placeholder='Filter: "a" or "b"'
                onInput={(e) => {
                  setSearchText(e.currentTarget.value || null);
                }}
              />
              <VisibleCount tracker={tracker} />
              <VisibleValues tracker={tracker} />
              <SearchContext.Provider value={searchContextRef.current}>
                <ul style={{ listStyle: "none", padding: 0, margin: 0 }}>
                  <TrackerContext.Provider value={tracker}>
                    {children}
                  </TrackerContext.Provider>
                </ul>
              </SearchContext.Provider>
            </div>
          </div>
        );
      };

      const TrackerContext = createContext();
      const Item = ({ value, id, index }) => {
        const tracker = useContext(TrackerContext);

        const renders = useRenderCount();
        const [counter, setCounter] = useState(0);
        const searchContext = useContext(SearchContext);
        const hidden = searchContext?.searchText
          ? !value.startsWith(searchContext.searchText)
          : false;
        const visibleIndex = tracker.useTrackItem({ id, index, hidden, value });
        if (visibleIndex === -1) {
          return null;
        }
        return (
          <li
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              padding: "2px 0",
            }}
          >
            <span style={{ minWidth: "40px" }}>{value}</span>
            <button
              onClick={() => setCounter((n) => n + 1)}
              style={{ fontSize: "11px", padding: "1px 6px" }}
            >
              +1
            </button>
            <span style={{ fontSize: "11px", color: "#888" }}>
              counter={counter}
            </span>
            <RenderBadge count={renders} />
          </li>
        );
      };

      const ITEM_VNODES = ITEMS.map((v, i) => (
        <Item key={v} id={v} value={v} index={i} />
      ));

      const VisibleCount = ({ tracker }) => {
        const renders = useRenderCount();
        const count = tracker.useItemCount();
        return (
          <div class="component-box">
            <div class="component-header">
              <span class="component-name">VisibleCount</span>
              <RenderBadge count={renders} />
            </div>
            <div class="component-body">count={count}</div>
          </div>
        );
      };

      const VisibleValues = ({ tracker }) => {
        const renders = useRenderCount();
        const values = tracker.useItemValues("value");
        return (
          <div class="component-box">
            <div class="component-header">
              <span class="component-name">VisibleValues</span>
              <RenderBadge count={renders} />
            </div>
            <div class="component-body">values=[{values.join(",")}]</div>
          </div>
        );
      };

      render(<ListWithSearch>{ITEM_VNODES}</ListWithSearch>, document.body);
    </script>
  </body>
</html>
