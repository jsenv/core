<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Item Tracker with subscribers</title>
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      input {
        display: block;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <script type="module" jsenv-type="module/jsx">
      import { createContext, render } from "preact";
      import {
        useContext,
        useLayoutEffect,
        useRef,
        useState,
      } from "preact/hooks";

      // createItemTracker: tracker where useTrackItem() notifies subscribers after
      // visibility changes. Consumers call useTrackerItemProp(propName) or
      // useTrackerItemCount() to subscribe with fine-grained re-render control.
      const createItemTracker = ({ filter }) => {
        const registrations = new Map(); // id → { data, order }
        let orderCounter = 0;
        const subscribers = new Set(); // { compute, equals, setState, lastValue }
        let notifyScheduled = false;

        const visibleSorted = () =>
          [...registrations.values()]
            .filter((r) => filter(r.data))
            .sort((a, b) => a.order - b.order);

        const notify = () => {
          if (!notifyScheduled) {
            notifyScheduled = true;
            queueMicrotask(() => {
              notifyScheduled = false;
              for (const sub of subscribers) {
                const newValue = sub.compute();
                if (!sub.equals(sub.lastValue, newValue)) {
                  sub.lastValue = newValue;
                  sub.setState((n) => n + 1);
                }
              }
            });
          }
        };

        const useSubscriber = (compute, equals) => {
          const [, setState] = useState(0);
          const subRef = useRef(null);
          if (subRef.current === null) {
            subRef.current = {
              compute,
              equals,
              setState,
              lastValue: compute(),
            };
          }
          // Keep compute fresh (captures latest registrations closure).
          subRef.current.compute = compute;
          useLayoutEffect(() => {
            subscribers.add(subRef.current);
            return () => {
              subscribers.delete(subRef.current);
            };
          }, []);
          return compute();
        };

        // Subscribe to a single prop across all visible items (ordered).
        // Re-renders only when the resulting array changes (length, order, or values).
        const useTrackerItemProp = (propName) => {
          const compute = () => visibleSorted().map((r) => r.data[propName]);
          const equals = (a, b) => {
            if (a === null) {
              return false;
            }
            if (a.length !== b.length) {
              return false;
            }
            for (let i = 0; i < a.length; i++) {
              if (a[i] !== b[i]) {
                return false;
              }
            }
            return true;
          };
          return useSubscriber(compute, equals);
        };

        // Subscribe to the visible item count only.
        // Re-renders only when the number of visible items changes.
        const useTrackerItemCount = () => {
          const compute = () => visibleSorted().length;
          const equals = (a, b) => a === b;
          return useSubscriber(compute, equals);
        };

        // Register an item. Calls notify() only when visibility (filter result) changes.
        const useTrackItem = (id, data) => {
          const orderRef = useRef(null);
          if (orderRef.current === null) {
            orderRef.current = orderCounter++;
          }
          registrations.set(id, { data, order: orderRef.current });

          const isVisible = filter(data);

          useLayoutEffect(() => {
            registrations.set(id, { data, order: orderRef.current });
            notify();
          }, [isVisible]);

          useLayoutEffect(() => {
            return () => {
              registrations.delete(id);
              notify();
            };
          }, []);

          if (!isVisible) {
            return -1;
          }
          return visibleSorted().findIndex((r) => r.order === orderRef.current);
        };

        return { useTrackItem, useTrackerItemProp, useTrackerItemCount };
      };

      // ── Render counter hook ───────────────────────────────────────────────────

      const useRenderCount = () => {
        const countRef = useRef(0);
        countRef.current += 1;
        return countRef.current;
      };

      // ── Demo ──────────────────────────────────────────────────────────────────

      const SearchContext = createContext(null);

      const ITEMS = [
        "a-1",
        "b-1",
        "a-2",
        "b-2",
        "a-3",
        "b-3",
        "a-4",
        "b-4",
        "a-5",
        "b-5",
      ];

      const { useTrackItem, useTrackerItemProp, useTrackerItemCount } =
        createItemTracker({
          filter: (data) => !data.hidden,
        });

      const Item = ({ value, id }) => {
        const renders = useRenderCount();
        const [counter, setCounter] = useState(0);
        const searchContext = useContext(SearchContext);
        const hidden = searchContext?.searchText
          ? !value.startsWith(searchContext.searchText)
          : false;
        const index = useTrackItem(id, { hidden, value });
        if (hidden || index === -1) {
          return null;
        }
        return (
          <li
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              padding: "2px 0",
            }}
          >
            <span style={{ minWidth: "40px" }}>{value}</span>
            <button
              onClick={() => setCounter((n) => n + 1)}
              style={{ fontSize: "11px", padding: "1px 6px" }}
            >
              +1
            </button>
            <span style={{ fontSize: "11px", color: "#888" }}>
              counter={counter} | renders={renders}
            </span>
          </li>
        );
      };

      const ITEM_VNODES = ITEMS.map((v) => <Item key={v} id={v} value={v} />);

      const ListWithSearch = ({ children }) => {
        const renders = useRenderCount();
        const [searchText, setSearchText] = useState(null);
        const searchContextRef = useRef(null);
        if (
          !searchContextRef.current ||
          searchContextRef.current.searchText !== (searchText || null)
        ) {
          searchContextRef.current = { searchText: searchText || null };
        }

        const visibleValues = useTrackerItemProp("value");
        const visibleCount = useTrackerItemCount();

        return (
          <div>
            <input
              type="text"
              placeholder='Filter: "a" or "b"'
              onInput={(e) => {
                setSearchText(e.currentTarget.value || null);
              }}
            />
            <p style={{ fontSize: "12px", color: "#555" }}>
              count={visibleCount} | values=[{visibleValues.join(",")}] |
              renders={renders}
            </p>
            <SearchContext.Provider value={searchContextRef.current}>
              <ul style={{ listStyle: "none", padding: 0, margin: 0 }}>
                {children}
              </ul>
            </SearchContext.Provider>
          </div>
        );
      };

      render(<ListWithSearch>{ITEM_VNODES}</ListWithSearch>, document.body);
    </script>
  </body>
</html>
