<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Item Tracker with subscribers</title>
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      input {
        display: block;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <script type="module" jsenv-type="module/jsx">
      import { createContext, render } from "preact";
      import {
        useContext,
        useLayoutEffect,
        useRef,
        useState,
      } from "preact/hooks";

      // createItemTracker: tracker where useTrackItem() notifies subscribers after
      // every commit via queueMicrotask. Consumers call useTrackerItems() to subscribe
      // and automatically re-render when the visible item list changes.
      const createItemTracker = ({ filter }) => {
        const registrations = new Map(); // id → { data, order }
        let orderCounter = 0;
        const subscribers = new Set();
        let notifyScheduled = false;

        const notify = () => {
          if (!notifyScheduled) {
            notifyScheduled = true;
            queueMicrotask(() => {
              notifyScheduled = false;
              for (const setState of subscribers) {
                setState((n) => n + 1);
              }
            });
          }
        };

        // Subscribe to item list changes. Returns the current list of visible item ids.
        const useTrackerItems = () => {
          const [, setState] = useState(0);
          useLayoutEffect(() => {
            subscribers.add(setState);
            return () => {
              subscribers.delete(setState);
            };
          }, []);
          return [...registrations.entries()]
            .filter(([, r]) => filter(r.data))
            .sort((a, b) => a[1].order - b[1].order)
            .map(([id]) => id);
        };

        // Register an item. Calls notify() after every commit so useTrackerItems()
        // consumers re-render with the updated list.
        // Two effects are used to avoid the cleanup-before-re-add race:
        //   - [] effect: removes registration on unmount only
        //   - no-deps effect: syncs data and notifies on every render (no cleanup)
        const useTrackItem = (id, data) => {
          const orderRef = useRef(null);
          if (orderRef.current === null) {
            orderRef.current = orderCounter++;
          }
          registrations.set(id, { data, order: orderRef.current });

          useLayoutEffect(() => {
            return () => {
              registrations.delete(id);
              notify();
            };
          }, []);

          useLayoutEffect(() => {
            registrations.set(id, { data, order: orderRef.current });
            notify();
          });

          if (!filter(data)) {
            return -1;
          }
          const visible = [...registrations.values()]
            .filter((r) => filter(r.data))
            .sort((a, b) => a.order - b.order);
          return visible.findIndex((r) => r.order === orderRef.current);
        };

        return { useTrackItem, useTrackerItems };
      };

      // ── Render counter hook ───────────────────────────────────────────────────

      const useRenderCount = () => {
        const countRef = useRef(0);
        countRef.current += 1;
        return countRef.current;
      };

      // ── Demo ──────────────────────────────────────────────────────────────────

      const SearchContext = createContext(null);

      const ITEMS = [
        "a-1",
        "b-1",
        "a-2",
        "b-2",
        "a-3",
        "b-3",
        "a-4",
        "b-4",
        "a-5",
        "b-5",
      ];

      const { useTrackItem, useTrackerItems } = createItemTracker({
        filter: (data) => !data.hidden,
      });

      const Item = ({ value, id }) => {
        const renders = useRenderCount();
        const [counter, setCounter] = useState(0);
        const searchContext = useContext(SearchContext);
        const hidden = searchContext?.searchText
          ? !value.startsWith(searchContext.searchText)
          : false;
        const index = useTrackItem(id, { hidden, value });
        if (hidden || index === -1) {
          return null;
        }
        return (
          <li
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              padding: "2px 0",
            }}
          >
            <span style={{ minWidth: "40px" }}>{value}</span>
            <button
              onClick={() => setCounter((n) => n + 1)}
              style={{ fontSize: "11px", padding: "1px 6px" }}
            >
              +1
            </button>
            <span style={{ fontSize: "11px", color: "#888" }}>
              counter={counter} | renders={renders}
            </span>
          </li>
        );
      };

      const ITEM_VNODES = ITEMS.map((v) => <Item key={v} id={v} value={v} />);

      const ListWithSearch = ({ children }) => {
        const renders = useRenderCount();
        const [searchText, setSearchText] = useState(null);
        // Stable context object — only replaced when searchText actually changes.
        // Avoids re-notifying items when useTrackerItems triggers a re-render here.
        const searchContextRef = useRef(null);
        if (
          !searchContextRef.current ||
          searchContextRef.current.searchText !== (searchText || null)
        ) {
          searchContextRef.current = { searchText: searchText || null };
        }

        const visibleIds = useTrackerItems();

        return (
          <div>
            <input
              type="text"
              placeholder='Filter: "a" or "b"'
              onInput={(e) => {
                setSearchText(e.currentTarget.value || null);
              }}
            />
            <p style={{ fontSize: "12px", color: "#555" }}>
              visible={visibleIds.length} | renders={renders}
            </p>
            <SearchContext.Provider value={searchContextRef.current}>
              <ul style={{ listStyle: "none", padding: 0, margin: 0 }}>
                {children}
              </ul>
            </SearchContext.Provider>
          </div>
        );
      };

      render(<ListWithSearch>{ITEM_VNODES}</ListWithSearch>, document.body);
    </script>
  </body>
</html>
