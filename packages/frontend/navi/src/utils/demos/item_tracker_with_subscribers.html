<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Item Tracker with subscribers</title>
    <link rel="icon" href="data:," />
    <style>
      @keyframes render-flash {
        0% {
          background-color: #fde68a;
          transform: scale(1.04);
        }
        60% {
          transform: scale(1);
        }
        100% {
          background-color: transparent;
        }
      }
      .render-badge {
        display: inline-block;
        padding: 1px 6px;
        color: #555;
        font-size: 11px;
        font-family: monospace;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .render-flash {
        animation: render-flash 600ms ease-out;
      }
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      input {
        display: block;
        margin-bottom: 8px;
      }
      .component-box {
        margin: 6px 0;
        border: 2px solid #ccc;
        border-radius: 8px;
        overflow: hidden;
      }
      .component-header {
        display: flex;
        padding: 6px 10px;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        background: #f5f5f5;
      }
      .component-name {
        font-weight: 700;
        font-size: 13px;
      }
      .component-body {
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <script type="module" jsenv-type="module/jsx">
      import { createContext, render } from "preact";
      import {
        useContext,
        useLayoutEffect,
        useRef,
        useState,
      } from "preact/hooks";
      import { signal } from "@preact/signals";

      // createItemTracker with Preact signals and incremental maintenance.
      //
      // Core idea:
      //   - registrations: Map of currently-visible items only
      //   - The caller decides visibility and passes isVisible to useTrackItem
      //   - orderedVisible: sorted array, recomputed once per batch in notify()
      //   - countSignal: signal(number), bumped only when count changes
      //   - propSignals: Map propName → signal(array), bumped only on content change
      // Items always call useTrackItem with all their data including hidden.
      // useTrackItem decides internally: hidden → remove from registrations, return -1.
      // Not hidden → register and return current index among visible items.
      //
      // sortedOrders: number[] of visible item orders, kept sorted at all times.
      // Index = bisect(order) — O(log n), no linear scan.
      // notify() uses sortedOrders directly — no sort needed there either.
      const createItemTracker = () => {
        const registrations = new Map(); // order → data
        const idToOrder = new Map(); // id → order
        let orderCounter = 0;
        const sortedOrders = []; // visible item orders, kept sorted

        const bisect = (order) => {
          let lo = 0;
          let hi = sortedOrders.length;
          while (lo < hi) {
            const mid = (lo + hi) >> 1;
            if (sortedOrders[mid] < order) {
              lo = mid + 1;
            } else {
              hi = mid;
            }
          }
          return lo;
        };

        const insertOrder = (order) => {
          sortedOrders.splice(bisect(order), 0, order);
        };

        const removeOrder = (order) => {
          const pos = bisect(order);
          if (sortedOrders[pos] === order) {
            sortedOrders.splice(pos, 1);
          }
        };

        const countSignal = signal(0);
        const propSignals = new Map(); // propName → signal(array)

        const getPropSignal = (propName) => {
          if (!propSignals.has(propName)) {
            propSignals.set(propName, signal([]));
          }
          return propSignals.get(propName);
        };

        let notifyScheduled = false;
        const notify = () => {
          if (notifyScheduled) {
            return;
          }
          notifyScheduled = true;
          queueMicrotask(() => {
            notifyScheduled = false;

            // sortedOrders is already sorted — no sort needed here
            const newCount = sortedOrders.length;
            if (countSignal.peek() !== newCount) {
              countSignal.value = newCount;
            }

            for (const [propName, sig] of propSignals) {
              const prev = sig.peek();
              const next = sortedOrders.map(
                (order) => registrations.get(order)[propName],
              );
              let changed = prev.length !== next.length;
              if (!changed) {
                for (let i = 0; i < next.length; i++) {
                  if (prev[i] !== next[i]) {
                    changed = true;
                    break;
                  }
                }
              }
              if (changed) {
                sig.value = next;
              }
            }
          });
        };

        const useTrackerItemProp = (propName) => getPropSignal(propName).value;
        const useTrackerItemCount = () => countSignal.value;

        const useTrackItem = (id, data) => {
          if (!idToOrder.has(id)) {
            idToOrder.set(id, orderCounter++);
          }
          const order = idToOrder.get(id);

          // sync update so index is correct during this render
          if (data.hidden) {
            registrations.delete(order);
            removeOrder(order);
          } else {
            registrations.set(order, data);
            if (sortedOrders[bisect(order)] !== order) {
              insertOrder(order);
            }
          }

          useLayoutEffect(() => {
            if (data.hidden) {
              registrations.delete(order);
              removeOrder(order);
            } else {
              registrations.set(order, data);
              if (sortedOrders[bisect(order)] !== order) {
                insertOrder(order);
              }
            }
            notify();
          });

          useLayoutEffect(() => {
            return () => {
              registrations.delete(order);
              removeOrder(order);
              notify();
            };
          }, []);

          if (data.hidden) {
            return -1;
          }
          return bisect(order);
        };

        return { useTrackItem, useTrackerItemProp, useTrackerItemCount };
      };

      // ── Render counter hook ───────────────────────────────────────────────────

      const useRenderCount = () => {
        const countRef = useRef(0);
        countRef.current += 1;
        return countRef.current;
      };

      const RenderBadge = ({ count }) => {
        const keyRef = useRef(0);
        keyRef.current += 1;
        return (
          <span class="render-badge render-flash" key={keyRef.current}>
            renders={count}
          </span>
        );
      };

      // ── Demo ──────────────────────────────────────────────────────────────────

      const SearchContext = createContext(null);

      const ITEMS = [
        "a-1",
        "b-1",
        "a-2",
        "b-2",
        "a-3",
        "b-3",
        "a-4",
        "b-4",
        "a-5",
        "b-5",
      ];

      const { useTrackItem, useTrackerItemProp, useTrackerItemCount } =
        createItemTracker();

      const Item = ({ value, id }) => {
        const renders = useRenderCount();
        const [counter, setCounter] = useState(0);
        const searchContext = useContext(SearchContext);
        const hidden = searchContext?.searchText
          ? !value.startsWith(searchContext.searchText)
          : false;
        const index = useTrackItem(id, { hidden, value });
        if (index === -1) {
          return null;
        }
        return (
          <li
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              padding: "2px 0",
            }}
          >
            <span style={{ minWidth: "40px" }}>{value}</span>
            <button
              onClick={() => setCounter((n) => n + 1)}
              style={{ fontSize: "11px", padding: "1px 6px" }}
            >
              +1
            </button>
            <span style={{ fontSize: "11px", color: "#888" }}>
              counter={counter}
            </span>
            <RenderBadge count={renders} />
          </li>
        );
      };

      const ITEM_VNODES = ITEMS.map((v) => <Item key={v} id={v} value={v} />);

      const VisibleCount = () => {
        const renders = useRenderCount();
        const count = useTrackerItemCount();
        return (
          <div class="component-box">
            <div class="component-header">
              <span class="component-name">VisibleCount</span>
              <RenderBadge count={renders} />
            </div>
            <div class="component-body">count={count}</div>
          </div>
        );
      };

      const VisibleValues = () => {
        const renders = useRenderCount();
        const values = useTrackerItemProp("value");
        return (
          <div class="component-box">
            <div class="component-header">
              <span class="component-name">VisibleValues</span>
              <RenderBadge count={renders} />
            </div>
            <div class="component-body">values=[{values.join(",")}]</div>
          </div>
        );
      };

      const ListWithSearch = ({ children }) => {
        const renders = useRenderCount();
        const [searchText, setSearchText] = useState(null);
        const searchContextRef = useRef(null);
        if (
          !searchContextRef.current ||
          searchContextRef.current.searchText !== (searchText || null)
        ) {
          searchContextRef.current = { searchText: searchText || null };
        }

        return (
          <div class="component-box">
            <div class="component-header">
              <span class="component-name">ListWithSearch</span>
              <RenderBadge count={renders} />
            </div>
            <div class="component-body">
              <input
                type="text"
                placeholder='Filter: "a" or "b"'
                onInput={(e) => {
                  setSearchText(e.currentTarget.value || null);
                }}
              />
              <VisibleCount />
              <VisibleValues />
              <SearchContext.Provider value={searchContextRef.current}>
                <ul style={{ listStyle: "none", padding: 0, margin: 0 }}>
                  {children}
                </ul>
              </SearchContext.Provider>
            </div>
          </div>
        );
      };

      render(<ListWithSearch>{ITEM_VNODES}</ListWithSearch>, document.body);
    </script>
  </body>
</html>
