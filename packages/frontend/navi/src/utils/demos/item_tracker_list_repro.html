<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Item Tracker - list.jsx repro</title>
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      input {
        display: block;
        margin-bottom: 8px;
      }
      .status {
        margin: 4px 0;
        font-size: 13px;
      }
      pre {
        padding: 8px;
        color: #ccc;
        font-size: 11px;
        white-space: pre-wrap;
        background: #1e1e1e;
      }
    </style>
  </head>
  <body>
    <script type="module" jsenv-type="module/jsx">
      import { createContext, render } from "preact";
      import { useContext, useLayoutEffect, useState } from "preact/hooks";
      import { createItemTracker } from "../item_tracker/item_tracker.jsx";

      const SearchContext = createContext(null);

      // 10 items: "a-1".."a-5" and "b-1".."b-5"
      // filter "a" → 5 items, filter "b" → 5 items
      const ITEMS = [
        "a-1",
        "b-1",
        "a-2",
        "b-2",
        "a-3",
        "b-3",
        "a-4",
        "b-4",
        "a-5",
        "b-5",
      ];

      const [useTrackerProvider, useTrackItem] = createItemTracker({
        filter: (data) => !data.hidden,
      });

      let effectLog = [];
      const logEffect = (msg) => {
        effectLog.push(msg);
        const el = document.getElementById("effect-log");
        if (el) {
          el.textContent = effectLog.join("\n");
        }
      };

      // Item: subscribes to SearchContext (triggers separate enqueueRender when context changes)
      const Item = ({ value, id }) => {
        const searchContext = useContext(SearchContext);
        const hidden = searchContext?.searchText
          ? !value.startsWith(searchContext.searchText)
          : false;
        const index = useTrackItem(id, { hidden, value });
        useLayoutEffect(() => {
          logEffect("  [Item " + value + "] index=" + index);
        });
        if (hidden || index === -1) {
          return null;
        }
        return <li>{value}</li>;
      };

      // ListLike: mirrors ListControlled — filler reads committedItems after every render
      const ListLike = ({ children, searchText }) => {
        const ItemTrackerProvider = useTrackerProvider();
        const searchContext = { searchText: searchText || null };

        useLayoutEffect(() => {
          const totalItems = ItemTrackerProvider.items.length;
          const expected = ITEMS.filter((v) =>
            searchText ? v.startsWith(searchText) : true,
          ).length;
          const ok = totalItems === expected;
          effectLog = [];
          logEffect(
            "[filler] totalItems=" +
              totalItems +
              " expected=" +
              expected +
              (ok ? " ✅" : " ❌ WRONG"),
          );
          document.getElementById("status").textContent = ok
            ? "✅ correct"
            : "❌ WRONG: got " + totalItems + ", expected " + expected;
          document.getElementById("status").style.color = ok ? "green" : "red";
        });

        return (
          <SearchContext.Provider value={searchContext}>
            <ul>
              <ItemTrackerProvider>{children}</ItemTrackerProvider>
            </ul>
          </SearchContext.Provider>
        );
      };

      // ListWithSearchLike: owns searchText state, passes stable children down
      const ListWithSearchLike = ({ children }) => {
        const [searchText, setSearchText] = useState(null);
        return (
          <div>
            <p class="status">
              <span id="status">-</span>
            </p>
            <input
              type="text"
              placeholder='Filter (try: "a" or "b")'
              onInput={(e) => setSearchText(e.currentTarget.value || null)}
            />
            <ListLike searchText={searchText}>{children}</ListLike>
          </div>
        );
      };

      // App renders stable JSX children — they are NOT re-created when searchText changes
      // because App does not own that state. This causes items to bail-out during
      // ListWithSearchLike's re-render and be enqueued separately via context subscription,
      // making them commit AFTER ListLike's filler effect — which then reads a stale count.
      const App = () => (
        <div>
          <h2>list.jsx repro — filler reads stale committedItems</h2>
          <ListWithSearchLike>
            {ITEMS.map((v) => (
              <Item key={v} id={v} value={v} />
            ))}
          </ListWithSearchLike>
          <pre id="effect-log" />
        </div>
      );

      render(<App />, document.body);
    </script>
  </body>
</html>
