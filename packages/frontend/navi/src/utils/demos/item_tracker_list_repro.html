<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Item Tracker - list.jsx repro</title>
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      input {
        display: block;
        margin-bottom: 8px;
      }
      .status {
        margin: 4px 0;
        font-size: 13px;
      }
      pre {
        padding: 8px;
        color: #ccc;
        font-size: 11px;
        white-space: pre-wrap;
        background: #1e1e1e;
      }
    </style>
  </head>
  <body>
    <script type="module" jsenv-type="module/jsx">
      import { createContext, render } from "preact";
      import { useContext, useLayoutEffect, useState } from "preact/hooks";
      import { createItemTracker } from "../item_tracker/item_tracker.jsx";

      const SearchContext = createContext(null);

      // 10 items: "a-1".."a-5" and "b-1".."b-5"
      // filter "a" → 5 items, filter "b" → 5 items
      const ITEMS = [
        "a-1",
        "b-1",
        "a-2",
        "b-2",
        "a-3",
        "b-3",
        "a-4",
        "b-4",
        "a-5",
        "b-5",
      ];

      let effectLogs = {};
      const logEffect = (logId, msg) => {
        if (!effectLogs[logId]) {
          effectLogs[logId] = [];
        }
        effectLogs[logId].push(msg);
        const el = document.getElementById(logId);
        if (el) {
          el.textContent = effectLogs[logId].join("\n");
        }
      };
      const clearLog = (logId) => {
        effectLogs[logId] = [];
        const el = document.getElementById(logId);
        if (el) {
          el.textContent = "";
        }
      };

      // makeCase: creates an entirely independent set of components for one demo case.
      // Each case has its own tracker so the two cases don't interfere.
      const makeCase = (logId) => {
        const [useTrackerProvider, useTrackItem] = createItemTracker({
          filter: (data) => !data.hidden,
        });

        // Item: subscribes to SearchContext → triggers separate enqueueRender on context change
        const Item = ({ value, id }) => {
          const searchContext = useContext(SearchContext);
          const hidden = searchContext?.searchText
            ? !value.startsWith(searchContext.searchText)
            : false;
          const index = useTrackItem(id, { hidden, value });
          useLayoutEffect(() => {
            logEffect(logId, `  [Item ${value}] index=${index}`);
          });
          if (hidden || index === -1) {
            return null;
          }
          return <li>{value}</li>;
        };

        // Stable vnodes created once — never re-created when searchText changes.
        // This is the key: same _original → Preact bails them out during the parent
        // re-render → they are re-enqueued via context subscription → separate commit.
        const itemVnodes = ITEMS.map((v) => <Item key={v} id={v} value={v} />);

        return { useTrackerProvider, Item, itemVnodes };
      };

      // ── BROKEN ───────────────────────────────────────────────────────────────
      // Filler lives OUTSIDE ItemTrackerProvider (in the parent component).
      // Commit order: ListLikeBroken filler runs first (stale count), then items commit.
      const {
        useTrackerProvider: useTrackerProviderBroken,
        itemVnodes: ITEMS_BROKEN,
      } = makeCase("log-broken");

      const ListLikeBroken = ({ children, searchText }) => {
        const ItemTrackerProvider = useTrackerProviderBroken();
        const searchContext = { searchText: searchText || null };

        useLayoutEffect(() => {
          const totalItems = ItemTrackerProvider.items.length;
          const expected = ITEMS.filter((v) =>
            searchText ? v.startsWith(searchText) : true,
          ).length;
          const ok = totalItems === expected;
          logEffect(
            "log-broken",
            `[filler] totalItems=${totalItems} expected=${expected}${ok ? " ✅" : " ❌ WRONG"}`,
          );
          document.getElementById("status-broken").textContent = ok
            ? "✅ correct"
            : `❌ WRONG: got ${totalItems}, expected ${expected}`;
          document.getElementById("status-broken").style.color = ok
            ? "green"
            : "red";
        });

        return (
          <SearchContext.Provider value={searchContext}>
            <ul>
              <ItemTrackerProvider>{children}</ItemTrackerProvider>
            </ul>
          </SearchContext.Provider>
        );
      };

      // ── FIXED ────────────────────────────────────────────────────────────────
      // Filler is a component rendered INSIDE ItemTrackerProvider.
      // Commit order (bottom-up): items commit first, then Filler, then ListLikeFixed.
      const {
        useTrackerProvider: useTrackerProviderFixed,
        itemVnodes: ITEMS_FIXED,
      } = makeCase("log-fixed");

      const FillerFixed = ({ tracker, searchText }) => {
        // Subscribe to SearchContext — this is the key fix.
        // When SearchContext changes, both items and Filler are enqueued via the
        // Provider's subscriber set. Items were subscribed first (mounted before Filler)
        // so they process first → commit first → Filler reads the correct count.
        useContext(SearchContext);
        useLayoutEffect(() => {
          const totalItems = tracker.items.length;
          const expected = ITEMS.filter((v) =>
            searchText ? v.startsWith(searchText) : true,
          ).length;
          const ok = totalItems === expected;
          logEffect(
            "log-fixed",
            `[filler] totalItems=${totalItems} expected=${expected}${ok ? " ✅" : " ❌ WRONG"}`,
          );
          document.getElementById("status-fixed").textContent = ok
            ? "✅ correct"
            : `❌ WRONG: got ${totalItems}, expected ${expected}`;
          document.getElementById("status-fixed").style.color = ok
            ? "green"
            : "red";
        });
        return null;
      };

      const ListLikeFixed = ({ children, searchText }) => {
        const ItemTrackerProvider = useTrackerProviderFixed();
        const searchContext = { searchText: searchText || null };
        return (
          <SearchContext.Provider value={searchContext}>
            <ul>
              <ItemTrackerProvider>
                {children}
                <FillerFixed
                  tracker={ItemTrackerProvider}
                  searchText={searchText}
                />
              </ItemTrackerProvider>
            </ul>
          </SearchContext.Provider>
        );
      };

      // Case: owns searchText state, receives children from outside (stable vnodes).
      const Case = ({
        // eslint-disable-next-line no-unused-vars
        ListComponent,
        statusId,
        logId,
        label,
        children,
      }) => {
        const [searchText, setSearchText] = useState(null);
        return (
          <div style={{ flex: 1 }}>
            <h3 style={{ marginTop: 0 }}>{label}</h3>
            <p class="status">
              <span id={statusId}>-</span>
            </p>
            <input
              type="text"
              placeholder='Filter: "a" or "b"'
              onInput={(e) => {
                clearLog(logId);
                setSearchText(e.currentTarget.value || null);
              }}
            />
            <ListComponent searchText={searchText}>{children}</ListComponent>
            <pre id={logId} />
          </div>
        );
      };

      const App = () => (
        <div style={{ display: "flex", gap: "40px", alignItems: "flex-start" }}>
          <Case
            ListComponent={ListLikeBroken}
            statusId="status-broken"
            logId="log-broken"
            label="❌ Broken — filler outside ItemTrackerProvider"
          >
            {ITEMS_BROKEN}
          </Case>
          <Case
            ListComponent={ListLikeFixed}
            statusId="status-fixed"
            logId="log-fixed"
            label="✅ Fixed — filler inside ItemTrackerProvider"
          >
            {ITEMS_FIXED}
          </Case>
        </div>
      );

      render(<App />, document.body);
    </script>
  </body>
</html>
