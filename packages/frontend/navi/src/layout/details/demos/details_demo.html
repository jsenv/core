<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Details Component Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      .feature-list {
        padding: 0;
        list-style-type: none;
      }

      .feature-list li {
        padding: 8px 0;
        border-bottom: 1px solid #dee2e6;
      }

      .feature-list li:last-child {
        border-bottom: none;
      }

      .feature-list li::before {
        margin-right: 10px;
        color: #28a745;
        font-weight: bold;
        content: "✓";
      }

      .keyboard-shortcuts {
        margin: 15px 0;
        padding: 15px;
        background: #fff3cd;
        border: 1px solid #ffeaa7;
        border-radius: 6px;
      }

      .keyboard-shortcuts strong {
        color: #856404;
      }

      .code-block {
        margin: 15px 0;
        padding: 15px;
        color: #e2e8f0;
        font-size: 14px;
        font-family: "Courier New", monospace;
        background: #2d3748;
        border-radius: 8px;
        overflow-x: auto;
      }

      .demo-example {
        margin: 15px 0;
        padding: 15px;
        background: white;
        border: 1px solid #dee2e6;
        border-radius: 8px;
      }

      .demo-section h3 {
        margin-top: 0;
        color: #495057;
      }

      .code-block {
        margin: 15px 0;
        padding: 15px;
        color: #e2e8f0;
        font-size: 14px;
        font-family: "Courier New", monospace;
        background: #2d3748;
        border-radius: 8px;
        overflow-x: auto;
      }

      .demo-example {
        margin: 15px 0;
        padding: 15px;
        background: white;
        border: 1px solid #dee2e6;
        border-radius: 6px;
      }

      .demo-details {
        margin: 20px 0;
      }

      .feature-list {
        padding: 0;
        list-style-type: none;
      }

      .feature-list li {
        padding: 8px 0;
        border-bottom: 1px solid #dee2e6;
      }

      .feature-list li:last-child {
        border-bottom: none;
      }

      .feature-list li::before {
        margin-right: 10px;
        color: #28a745;
        font-weight: bold;
        content: "✓";
      }

      .keyboard-shortcuts {
        margin: 15px 0;
        padding: 15px;
        background: #fff3cd;
        border: 1px solid #ffeaa7;
        border-radius: 6px;
      }

      .keyboard-shortcuts strong {
        color: #856404;
      }

      .content-example {
        padding: 15px;
        background: #e3f2fd;
        border-left: 4px solid #2196f3;
      }

      details {
        border: 1px solid black;
      }

      summary {
        background: lightblue;
      }
    </style>
  </head>
  <body>
    <h1>Details Component Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Details, Box, Button } from "@jsenv/navi";
      import { createAction } from "@jsenv/navi";

      const App = () => {
        return (
          <div>
            {/* <FeaturesOverview /> */}
            <BasicUsageDemo />
            <KeyboardNavigationDemo />
            <MultipleDetailsDemo />
            <ActionIntegrationDemo />
            <StateManagementDemo />
            <InteractiveDemo />
            <PropsReference />
          </div>
        );
      };

      const FeaturesOverview = () => {
        return (
          <div className="demo-section">
            <h2>Features</h2>
            <p>
              The Details component is an enhanced version of the HTML{" "}
              <code>&lt;details&gt;</code> element with action integration,
              keyboard navigation, and state management.
            </p>
            <ul className="feature-list">
              <li>Standard details/summary collapsible behavior</li>
              <li>Action integration - fetch data when opening</li>
              <li>Keyboard shortcuts (Arrow keys navigation)</li>
              <li>Browser navigation state integration</li>
              <li>Focus group support</li>
              <li>Loading states with animated marker</li>
              <li>Customizable labels and styling</li>
            </ul>
          </div>
        );
      };

      const BasicUsageDemo = () => {
        return (
          <div className="demo-section">
            <h2>Basic Usage</h2>
            <fieldset>
              <legend>Simple Details</legend>
              <p>Basic collapsible content without any special behavior:</p>
              <Details label="Simple Details Example">
                <div className="content-example">
                  <p>
                    This is the content inside the details element. It can be
                    collapsed and expanded by clicking the summary.
                  </p>
                  <p>
                    You can put any content here - text, images, forms, other
                    components, etc.
                  </p>
                </div>
              </Details>
            </fieldset>

            <fieldset>
              <legend>With Custom Styling</legend>
              <Details label="Styled Details" className="custom-styling">
                <Box column spacing="sm" alignY="center">
                  <p>
                    This details element receives custom styling through
                    className.
                  </p>
                  <Button>Action Button Inside</Button>
                </Box>
              </Details>
            </fieldset>
          </div>
        );
      };

      const KeyboardNavigationDemo = () => {
        return (
          <div className="demo-section">
            <h2>Keyboard Navigation</h2>
            <div className="keyboard-shortcuts">
              <strong>Keyboard Shortcuts:</strong>
              <br />• <strong>Right Arrow (→)</strong>: Open details and focus
              first element inside
              <br />• <strong>Left Arrow (←)</strong>: Close details and return
              focus to summary
              <br />• <strong>Tab</strong>: Navigate through focusable elements
            </div>

            <fieldset>
              <legend>Try Keyboard Navigation</legend>
              <p>
                Click on the summary below, then try the keyboard shortcuts:
              </p>
              <Details
                label="Keyboard Navigation Example"
                arrowKeyShortcuts={true}
              >
                <Box column spacing="sm">
                  <p>Use Tab to navigate through these focusable elements:</p>
                  <Box row spacing="sm">
                    <Button>First Button</Button>
                    <Button>Second Button</Button>
                    <input type="text" placeholder="Input field" />
                    <Button>Third Button</Button>
                  </Box>
                </Box>
              </Details>
            </fieldset>
          </div>
        );
      };

      const MultipleDetailsDemo = () => {
        return (
          <div className="demo-section">
            <h2>Multiple Details</h2>
            <fieldset>
              <legend>Nested Content</legend>
              <p>Multiple details can be used together:</p>

              <Details label="Section 1: Getting Started">
                <div className="content-example">
                  <p>
                    This section contains information about getting started with
                    the project.
                  </p>
                  <ul>
                    <li>Installation instructions</li>
                    <li>Basic configuration</li>
                    <li>First steps</li>
                  </ul>
                </div>
              </Details>

              <Details label="Section 2: Advanced Features">
                <div className="content-example">
                  <p>Advanced functionality and customization options.</p>
                  <Details label="Subsection: API Integration">
                    <div className="content-example">
                      <p>Details about integrating with external APIs.</p>
                    </div>
                  </Details>
                  <Details label="Subsection: Custom Styling">
                    <div className="content-example">
                      <p>How to customize the appearance and behavior.</p>
                    </div>
                  </Details>
                </div>
              </Details>

              <Details label="Section 3: Troubleshooting">
                <div className="content-example">
                  <p>Common issues and solutions.</p>
                  <ul>
                    <li>Performance considerations</li>
                    <li>Browser compatibility</li>
                    <li>Debugging tips</li>
                  </ul>
                </div>
              </Details>
            </fieldset>
          </div>
        );
      };

      const ActionIntegrationDemo = () => {
        const getUserProfile = createAction(async ({ userId }) => {
          // Simulate network delay
          await new Promise((resolve) => setTimeout(resolve, 1500));
          return {
            id: userId,
            name: "John Doe",
            email: "john.doe@example.com",
            role: "Developer",
          };
        });

        return (
          <div className="demo-section">
            <h2>Action Integration</h2>
            <fieldset>
              <legend>Loading Data on Open</legend>
              <p>
                The Details component can integrate with actions to fetch data
                when opened:
              </p>

              <Details
                action={getUserProfile.bindParams({ userId: 123 })}
                label="User Profile (loads data on open)"
              >
                <div className="content-example">
                  <p>
                    <strong>Action Integration Features:</strong>
                  </p>
                  <ul>
                    <li>Automatic loading state management</li>
                    <li>Error handling and display</li>
                    <li>Abort requests when closing</li>
                    <li>Caching and memoization</li>
                  </ul>
                </div>
              </Details>
            </fieldset>
          </div>
        );
      };

      const StateManagementDemo = () => {
        return (
          <div className="demo-section">
            <h2>State Management</h2>
            <fieldset>
              <legend>Navigation State Integration</legend>
              <p>
                Details state can be synchronized with the browser's navigation
                state:
              </p>

              <Details
                id="persistent-state-example"
                label="Persistent State Example"
              >
                <div className="content-example">
                  <p>
                    When using the <code>id</code> prop, the Details component
                    will:
                  </p>
                  <ul>
                    <li>Remember its open/closed state in the URL</li>
                    <li>Restore state when navigating back/forward</li>
                    <li>Share state across page refreshes</li>
                  </ul>
                  <p>
                    <em>
                      This is useful for deep-linkable expandable sections.
                    </em>
                  </p>
                </div>
              </Details>
            </fieldset>
          </div>
        );
      };

      const InteractiveDemo = () => {
        const [label, setLabel] = useState("Interactive Details");
        const [loading, setLoading] = useState(false);
        const [open, setOpen] = useState(false);
        const [arrowKeys, setArrowKeys] = useState(true);

        return (
          <div className="demo-section">
            <h2>Interactive Configuration</h2>
            <fieldset>
              <legend>Controls</legend>
              <Box column spacing="sm">
                <div className="interactive-controls">
                  <label>
                    Label:
                    <input
                      type="text"
                      value={label}
                      onChange={(e) => setLabel(e.target.value)}
                    />
                  </label>
                  <label>
                    <input
                      type="checkbox"
                      checked={loading}
                      onChange={(e) => setLoading(e.target.checked)}
                    />
                    Loading
                  </label>
                  <label>
                    <input
                      type="checkbox"
                      checked={open}
                      onChange={(e) => setOpen(e.target.checked)}
                    />
                    Open
                  </label>
                  <label>
                    <input
                      type="checkbox"
                      checked={arrowKeys}
                      onChange={(e) => setArrowKeys(e.target.checked)}
                    />
                    Arrow Keys
                  </label>
                </div>
              </Box>
            </fieldset>

            <fieldset>
              <legend>Result</legend>
              <Details
                label={label}
                loading={loading}
                open={open}
                arrowKeyShortcuts={arrowKeys}
                onToggle={(e) => {
                  console.log("Details toggled:", e.newState);
                  setOpen(e.newState === "open");
                }}
              >
                <div className="content-example">
                  <p>This is the configurable details content.</p>
                  <div className="value-display">
                    Label: "{label}" | Loading: {loading ? "Yes" : "No"} | Open:{" "}
                    {open ? "Yes" : "No"} | Arrow Keys:{" "}
                    {arrowKeys ? "Enabled" : "Disabled"}
                  </div>
                </div>
              </Details>
            </fieldset>
          </div>
        );
      };

      const PropsReference = () => {
        return (
          <div className="demo-section">
            <h2>Props Reference</h2>
            <div className="code-block">
              {`interface DetailsProps {
  id?: string;                    // For nav state integration
  label?: string;                 // Summary text (default: "Summary")
  open?: boolean;                 // Initial open state
  loading?: boolean;              // Show loading indicator
  className?: string;             // Additional CSS classes
  focusGroup?: boolean | string;  // Focus group integration
  focusGroupDirection?: string;   // Focus navigation direction
  arrowKeyShortcuts?: boolean;    // Enable arrow key shortcuts (default: true)
  openKeyShortcut?: string;       // Key to open (default: "ArrowRight")
  closeKeyShortcut?: string;      // Key to close (default: "ArrowLeft")
  onToggle?: (event) => void;     // Toggle event handler
  action?: Action;                // Action to execute on open
  onActionPrevented?: Function;   // Action prevention handler
  onActionStart?: Function;       // Action start handler
  onActionError?: Function;       // Action error handler
  onActionEnd?: Function;         // Action end handler
  children?: ReactNode;           // Content to display
}`}
            </div>
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
