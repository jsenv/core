<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Column Drag Demo - Reorder Columns</title>
    <style>
      body {
        margin: 0px;
        padding: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }

      .demo-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* Container with fixed size to show drag behavior */
      .table-container {
        width: 800px;
        height: 500px;
        margin: 20px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        overflow: auto;
      }

      /* Status display */
      .status {
        margin-top: 20px;
        padding: 10px;
        font-size: 14px;
        font-family: monospace;
        background: #f0f8ff;
        border-radius: 4px;
      }

      .actions {
        margin-top: 15px;
      }

      .action-button {
        margin-right: 10px;
        padding: 8px 16px;
        color: white;
        background: #007acc;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      .action-button:hover {
        background: #005a9e;
      }

      .info {
        margin-bottom: 20px;
        padding: 15px;
        background: #e8f4fd;
        border: 1px solid #bee5eb;
        border-radius: 4px;
      }

      .info h3 {
        margin-top: 0;
        color: #0c5460;
      }

      .info ul {
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Table,
        TableCell,
        Colgroup,
        Col,
        Thead,
        Tbody,
        Tr,
        RowNumberCol,
        RowNumberTableCell,
        useCellGridFromRows,
        useOrderedColumns,
      } from "@jsenv/navi";

      const firstNames = [
        "John",
        "Jane",
        "Michael",
        "Sarah",
        "David",
        "Emily",
        "Chris",
        "Lisa",
        "Mark",
        "Anna",
        "Tom",
        "Kate",
        "Alex",
        "Maria",
        "Paul",
        "Susan",
        "Jake",
        "Emma",
        "Luke",
        "Nina",
      ];
      const lastNames = [
        "Smith",
        "Johnson",
        "Williams",
        "Brown",
        "Jones",
        "Garcia",
        "Miller",
        "Davis",
        "Rodriguez",
        "Martinez",
        "Hernandez",
        "Lopez",
        "Gonzalez",
        "Wilson",
        "Anderson",
        "Thomas",
        "Taylor",
        "Moore",
        "Jackson",
        "Martin",
      ];
      const domains = [
        "example.com",
        "test.org",
        "demo.net",
        "sample.io",
        "users.co",
      ];

      function generateRandomUser(id) {
        const firstName =
          firstNames[Math.floor(Math.random() * firstNames.length)];
        const lastName =
          lastNames[Math.floor(Math.random() * lastNames.length)];
        const email = `${firstName.toLowerCase()}.${lastName.toLowerCase()}@${domains[Math.floor(Math.random() * domains.length)]}`;
        const creationDate = new Date(
          2020 + Math.random() * 4,
          Math.floor(Math.random() * 12),
          Math.floor(Math.random() * 28) + 1,
        );
        return {
          id,
          name: `${firstName} ${lastName}`,
          email,
          creation_date: creationDate.toLocaleDateString("en-US", {
            year: "numeric",
            month: "short",
            day: "numeric",
          }),
        };
      }

      const initialRows = [];
      for (let i = 1; i <= 50; i++) {
        initialRows.push(generateRandomUser(i));
      }

      const columnsConfig = [
        { id: "id", header: "ID", width: 80 },
        { id: "name", header: "Full Name", width: 180 },
        { id: "email", header: "Email Address", width: 220 },
        { id: "creation_date", header: "Created", width: 120 },
      ];

      const TableDemo = () => {
        const [rows, setRows] = useState(initialRows);
        const [lastAction, setLastAction] = useState(
          "Ready for column dragging",
        );
        const [orderedColumns, setColumnOrder] =
          useOrderedColumns(columnsConfig);
        const orderedColumnIds = orderedColumns.map((col) => col.id);
        const cellGrid = useCellGridFromRows(rows, orderedColumnIds);

        const resetColumns = () => {
          setColumnOrder(columnsConfig.map((c) => c.id));
          setLastAction("Column order reset to default");
        };

        const addRandomUser = () => {
          const newId = Math.max(...rows.map((u) => u.id)) + 1;
          const newUser = generateRandomUser(newId);
          setRows([...rows, newUser]);
          setLastAction(`Added new user: ${newUser.name}`);
        };

        const clearTable = () => {
          setRows([]);
          setLastAction("Table cleared");
        };

        return (
          <div className="demo-container">
            <h1>Table Column Drag Demo</h1>

            <div className="info">
              <h3>Column Drag & Drop Features</h3>
              <ul>
                <li>
                  <strong>Drag to Reorder:</strong> Grab any column header and
                  drag it to reorder columns
                </li>
                <li>
                  <strong>Visual Feedback:</strong> Drag clone provides visual
                  indication of the column being moved
                </li>
                <li>
                  <strong>Real Data:</strong> Table contains realistic user data
                  with ID, name, email, and dates
                </li>
              </ul>
            </div>

            <div className="table-container">
              <Table
                onColumnOrderChange={(newColumnOrder) => {
                  setColumnOrder(newColumnOrder);
                  setLastAction(
                    `Column order changed to: ${newColumnOrder.join(", ")}`,
                  );
                }}
                borderCollapse
              >
                <Colgroup>
                  <RowNumberCol />
                  {orderedColumns.map((col) => (
                    <Col key={col.id} id={col.id} width={col.width} />
                  ))}
                </Colgroup>
                <Thead>
                  <Tr id="head">
                    <RowNumberTableCell />
                    {orderedColumns.map((col) => (
                      <TableCell key={col.id}>{col.header}</TableCell>
                    ))}
                  </Tr>
                </Thead>
                <Tbody>
                  {cellGrid.map((rowCells, rowIndex) => (
                    <Tr key={rows[rowIndex].id} id={rows[rowIndex].id}>
                      <RowNumberTableCell />
                      {rowCells.map((cellValue, columnIndex) => (
                        <TableCell key={orderedColumns[columnIndex].id}>
                          {cellValue}
                        </TableCell>
                      ))}
                    </Tr>
                  ))}
                </Tbody>
              </Table>
            </div>

            <div className="status">
              <div>
                <strong>Column Order:</strong>{" "}
                <span>{orderedColumnIds.join(", ")}</span>
              </div>
              <div>
                <strong>Last Action:</strong> <span>{lastAction}</span>
              </div>
            </div>

            <div className="actions">
              <button className="action-button" onClick={resetColumns}>
                Reset Column Order
              </button>
              <button className="action-button" onClick={addRandomUser}>
                Add Random User
              </button>
              <button className="action-button" onClick={clearTable}>
                Clear Table
              </button>
            </div>
          </div>
        );
      };

      render(<TableDemo />, document.getElementById("root"));
    </script>
  </body>
</html>
