<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table - Column Mutations Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }
      .demo-container {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Table,
        TableCell,
        Colgroup,
        Col,
        Thead,
        Tbody,
        Tr,
        RowNumberCol,
        RowNumberTableCell,
        Button,
        useCellGridFromRows,
        useOrderedColumns,
      } from "@jsenv/navi";
      import { useRowsState } from "./table_demo_helpers.js";

      const initialRows = [
        { id: 1, name: "Alice", age: 30, email: "alice@example.com" },
        { id: 2, name: "Bob", age: 25, email: "bob@example.com" },
        { id: 3, name: "Charlie", age: 35, email: "charlie@example.com" },
        { id: 4, name: "Diana", age: 28, email: "diana@example.com" },
      ];

      // Columns are identified by name only — no separate id or header.
      const initialColumnsConfig = [
        { name: "name" },
        { name: "age" },
        { name: "email" },
      ];

      // This demo illustrates the typical pattern in a real frontend app:
      //
      // - The BACKEND is the source of truth. It holds the columns config and
      //   exposes methods to mutate it (add, rename, delete).
      //   Here it is simulated by a component using useState.
      //
      // - The FRONTEND receives the current state as props (columnsConfig) and can
      //   REQUEST mutations via callbacks. It never modifies state directly.
      //
      // The 1s delay on frontend actions simulates a real HTTP round-trip.

      const Backend = () => {
        const [columnsConfig, setColumnsConfig] =
          useState(initialColumnsConfig);
        const columnIds = columnsConfig.map((col) => col.name);
        const [rows, { renameProperty }] = useRowsState(initialRows, columnIds);
        const [newColName, setNewColName] = useState("");

        const addColumn = (name) => {
          if (!name || columnsConfig.some((c) => c.name === name)) return;
          setColumnsConfig((prev) => [...prev, { name }]);
        };

        const renameColumn = (oldName, newName) => {
          if (!newName || oldName === newName) return;
          renameProperty(oldName, newName);
          setColumnsConfig((prev) =>
            prev.map((col) => (col.name === oldName ? { name: newName } : col)),
          );
        };

        const deleteColumn = (name) => {
          setColumnsConfig((prev) => prev.filter((c) => c.name !== name));
        };

        return (
          <div style={{ display: "flex", flexDirection: "column", gap: "0" }}>
            <div
              style={{
                border: "2px solid #6c757d",
                borderRadius: "8px",
                padding: "12px",
              }}
            >
              <div
                style={{
                  color: "#6c757d",
                  fontSize: "0.8em",
                  fontWeight: "bold",
                  marginBottom: "8px",
                }}
              >
                ⚙️ Backend (source of truth)
              </div>
              <ul style={{ listStyle: "none", padding: 0, margin: "0 0 8px" }}>
                {columnsConfig.map((col) => (
                  <li
                    key={col.name}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "8px",
                      marginBottom: "4px",
                      fontSize: "0.85em",
                      color: "#495057",
                    }}
                  >
                    <span>{`{ name: "${col.name}" }`}</span>
                    <button
                      style={{
                        padding: "1px 6px",
                        background: "#6c757d",
                        color: "white",
                        border: "none",
                        borderRadius: "3px",
                        cursor: "pointer",
                        fontSize: "0.9em",
                      }}
                      onClick={() => deleteColumn(col.name)}
                    >
                      ×
                    </button>
                  </li>
                ))}
              </ul>
              <div
                style={{ display: "flex", gap: "6px", alignItems: "center" }}
              >
                <input
                  type="text"
                  placeholder="new column name"
                  value={newColName}
                  onInput={(e) => setNewColName(e.target.value)}
                  style={{
                    padding: "2px 6px",
                    fontSize: "0.85em",
                    border: "1px solid #adb5bd",
                    borderRadius: "3px",
                  }}
                />
                <button
                  style={{
                    padding: "2px 8px",
                    background: "#6c757d",
                    color: "white",
                    border: "none",
                    borderRadius: "3px",
                    cursor: "pointer",
                    fontSize: "0.85em",
                  }}
                  onClick={() => {
                    addColumn(newColName.trim());
                    setNewColName("");
                  }}
                >
                  + add column
                </button>
              </div>
            </div>

            <div
              style={{
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                padding: "6px 0",
                fontSize: "0.75em",
                color: "#868e96",
                lineHeight: "1.4",
              }}
            >
              <span>columnsConfig ↓</span>
              <span style={{ fontSize: "1.4em", lineHeight: "1" }}>⇅</span>
              <span>onAddColumn / onRenameColumn / onDeleteColumn ↑</span>
            </div>

            <Frontend
              rows={rows}
              columnsConfig={columnsConfig}
              onRenameColumn={renameColumn}
              onDeleteColumn={deleteColumn}
            />
          </div>
        );
      };

      const Frontend = ({
        rows,
        columnsConfig,
        onRenameColumn,
        onDeleteColumn,
      }) => {
        const [orderedColumns] = useOrderedColumns(columnsConfig, undefined, {
          columnIdKey: "name",
        });
        const orderedColumnIds = orderedColumns.map((col) => col.name);
        const cellGrid = useCellGridFromRows(rows, orderedColumnIds);

        return (
          <div
            style={{
              border: "2px solid #0078d4",
              borderRadius: "8px",
              padding: "12px",
            }}
          >
            <div
              style={{
                color: "#0078d4",
                fontSize: "0.8em",
                fontWeight: "bold",
                marginBottom: "8px",
              }}
            >
              🖥️ Frontend (display + calls backend to mutate columns)
            </div>
            <Table borderCollapse>
              <Colgroup>
                <RowNumberCol />
                {orderedColumns.map((col) => (
                  <Col key={col.name} id={col.name} />
                ))}
              </Colgroup>
              <Thead>
                <Tr id="head">
                  <RowNumberTableCell />
                  {orderedColumns.map((col) => (
                    <TableCell
                      key={col.name}
                      action={async (newName) => {
                        await new Promise((resolve) =>
                          setTimeout(resolve, 1000),
                        );
                        onRenameColumn(
                          col.name,
                          newName.trim().toLowerCase().replace(/\s+/g, "_"),
                        );
                      }}
                      value={col.name}
                    >
                      {col.name}
                      <Button
                        action={async () => {
                          await new Promise((resolve) =>
                            setTimeout(resolve, 1000),
                          );
                          onDeleteColumn(col.name);
                        }}
                      >
                        ×
                      </Button>
                    </TableCell>
                  ))}
                </Tr>
              </Thead>
              <Tbody>
                {cellGrid.map((rowCells, dataRowIndex) => {
                  const row = rows[dataRowIndex];
                  return (
                    <Tr id={row.id} key={row.id}>
                      <RowNumberTableCell />
                      {rowCells.map((cellValue, columnIndex) => (
                        <TableCell key={orderedColumns[columnIndex].name}>
                          {cellValue}
                        </TableCell>
                      ))}
                    </Tr>
                  );
                })}
              </Tbody>
            </Table>
          </div>
        );
      };

      const App = () => (
        <div class="demo-container">
          <h1>Table — column mutations</h1>
          <p style={{ color: "#6c757d", marginBottom: "16px" }}>
            The <strong>backend</strong> (grey box) is the source of truth.
            Columns can be added, deleted instantly, or renamed. The{" "}
            <strong>frontend</strong> (blue box) reflects what it receives —
            double-click a header to rename it, click × to delete it. The 1s
            delay on frontend actions simulates an HTTP round-trip. Column order
            is preserved across all mutations.
          </p>
          <Backend />
        </div>
      );

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
