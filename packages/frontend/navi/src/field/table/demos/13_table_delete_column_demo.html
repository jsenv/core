<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table - Delete Column Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }
      .demo-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Table,
        TableCell,
        Colgroup,
        Col,
        Thead,
        Tbody,
        Tr,
        RowNumberCol,
        RowNumberTableCell,
        useCellGrid,
        useCellsAndColumns,
      } from "@jsenv/navi";

      const rows = [
        { id: 1, name: "Alice", age: 30, email: "alice@example.com" },
        { id: 2, name: "Bob", age: 25, email: "bob@example.com" },
        { id: 3, name: "Charlie", age: 35, email: "charlie@example.com" },
        { id: 4, name: "Diana", age: 28, email: "diana@example.com" },
      ];

      const initialColumnsConfig = [
        { id: "name", header: "Name" },
        { id: "age", header: "Age" },
        { id: "email", header: "Email" },
      ];

      const TableColumnManager = () => {
        const [columnsConfig, setColumnsConfig] =
          useState(initialColumnsConfig);

        return (
          <Demo
            columnsConfig={columnsConfig}
            onDeleteColumn={(columnId) => {
              setColumnsConfig((prev) => prev.filter((c) => c.id !== columnId));
            }}
          />
        );
      };

      const Demo = ({ columnsConfig, onDeleteColumn }) => {
        const cellGrid = useCellGrid(
          rows,
          columnsConfig.map((c) => c.id),
        );
        const { cells, columns } = useCellsAndColumns(cellGrid, columnsConfig);

        return (
          <div class="demo-container">
            <h1>Table — Delete Column</h1>
            <p style={{ color: "#6c757d", marginBottom: "16px" }}>
              {columns.length} column(s) — click <strong>×</strong> in a header
              to delete that column.
            </p>

            <Table borderCollapse>
              <Colgroup>
                <RowNumberCol />
                {columns.map((col) => (
                  <Col key={col.id} id={col.id} />
                ))}
              </Colgroup>

              <Thead>
                <Tr id="head">
                  <RowNumberTableCell />
                  {columns.map((col) => (
                    <TableCell key={col.id}>
                      <span style={{ marginRight: "6px" }}>{col.header}</span>
                      <button
                        style={{
                          padding: "1px 6px",
                          background: "#dc3545",
                          color: "white",
                          border: "none",
                          borderRadius: "3px",
                          cursor: "pointer",
                        }}
                        onClick={() => onDeleteColumn(col.id)}
                      >
                        ×
                      </button>
                    </TableCell>
                  ))}
                </Tr>
              </Thead>

              <Tbody>
                {cells.map((rowCells, dataRowIndex) => {
                  const row = rows[dataRowIndex];
                  return (
                    <Tr id={row.id} key={row.id}>
                      <RowNumberTableCell />
                      {rowCells.map((cellValue, columnIndex) => (
                        <TableCell key={columns[columnIndex].id}>
                          {cellValue}
                        </TableCell>
                      ))}
                    </Tr>
                  );
                })}
              </Tbody>
            </Table>
          </div>
        );
      };

      render(<TableColumnManager />, document.getElementById("root"));
    </script>
  </body>
</html>
