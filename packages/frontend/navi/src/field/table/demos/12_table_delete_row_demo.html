<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table - Delete Row Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }
      .demo-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        Table,
        TableCell,
        Colgroup,
        Col,
        Thead,
        Tbody,
        Tr,
        RowNumberCol,
        RowNumberTableCell,
        useRowsAsGrid,
        useCellsAndColumns,
      } from "@jsenv/navi";
      import { useRowsState } from "./table_demo_helpers.js";

      const initialRows = [
        { id: 1, name: "Alice", email: "alice@example.com" },
        { id: 2, name: "Bob", email: "bob@example.com" },
        { id: 3, name: "Charlie", email: "charlie@example.com" },
        { id: 4, name: "Diana", email: "diana@example.com" },
      ];

      const columnsConfig = [
        { id: "id", header: "ID" },
        { id: "name", header: "Name" },
        { id: "email", header: "Email" },
      ];

      const columnIds = columnsConfig.map((col) => col.id);

      // Example 1: rows are an external source of truth.
      // Backend owns state + mutation logic. Frontend only renders what it receives.

      const Backend = () => {
        const [rows, { deleteRow }] = useRowsState(initialRows, columnIds);
        return (
          <div
            style={{
              border: "2px dashed #6c757d",
              borderRadius: "8px",
              padding: "12px",
              marginBottom: "16px",
            }}
          >
            <div
              style={{
                color: "#6c757d",
                fontSize: "0.8em",
                marginBottom: "8px",
              }}
            >
              ⚙️ Backend (source of truth)
            </div>
            <ul style={{ listStyle: "none", padding: 0, margin: "0 0 12px" }}>
              {rows.map((row, rowIndex) => (
                <li
                  key={row.id}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "8px",
                    marginBottom: "4px",
                    fontSize: "0.85em",
                    color: "#495057",
                  }}
                >
                  <span>
                    #{row.id} {row.name} — {row.email}
                  </span>
                  <button
                    style={{
                      padding: "1px 6px",
                      background: "#6c757d",
                      color: "white",
                      border: "none",
                      borderRadius: "3px",
                      cursor: "pointer",
                      fontSize: "0.9em",
                    }}
                    onClick={() => deleteRow(rowIndex)}
                  >
                    ×
                  </button>
                </li>
              ))}
            </ul>
            <Frontend rows={rows} onDeleteRow={deleteRow} />
          </div>
        );
      };

      const Frontend = ({ rows, onDeleteRow }) => {
        const cellGrid = useRowsAsGrid(rows, columnIds);
        const { cells, columns } = useCellsAndColumns(cellGrid, columnsConfig);

        return (
          <div
            style={{
              border: "2px solid #0078d4",
              borderRadius: "8px",
              padding: "12px",
            }}
          >
            <div
              style={{
                color: "#0078d4",
                fontSize: "0.8em",
                marginBottom: "8px",
              }}
            >
              🖥️ Frontend (display + calls backend to delete)
            </div>
            <Table borderCollapse>
              <Colgroup>
                <RowNumberCol />
                {columns.map((col) => (
                  <Col key={col.id} id={col.id} />
                ))}
                <Col id="__delete__" width={40} />
              </Colgroup>
              <Thead>
                <Tr id="head">
                  <RowNumberTableCell />
                  {columns.map((col) => (
                    <TableCell key={col.id}>{col.header}</TableCell>
                  ))}
                  <TableCell />
                </Tr>
              </Thead>
              <Tbody>
                {cells.map((rowCells, rowIndex) => (
                  <Tr key={rows[rowIndex].id} id={rows[rowIndex].id}>
                    <RowNumberTableCell />
                    {rowCells.map((cellValue, columnIndex) => (
                      <TableCell key={columns[columnIndex].id}>
                        {cellValue}
                      </TableCell>
                    ))}
                    <TableCell>
                      <button
                        style={{
                          padding: "1px 6px",
                          background: "#dc3545",
                          color: "white",
                          border: "none",
                          borderRadius: "3px",
                          cursor: "pointer",
                        }}
                        onClick={() => onDeleteRow(rows[rowIndex].id)}
                      >
                        ×
                      </button>
                    </TableCell>
                  </Tr>
                ))}
              </Tbody>
            </Table>
          </div>
        );
      };

      const ExternalStateExample = () => (
        <div class="demo-container">
          <h1>External state — table is display-only</h1>
          <p style={{ color: "#6c757d", marginBottom: "16px" }}>
            The backend owns rows and knows how to delete them. The frontend
            receives rows as props and calls <code>onDeleteRow</code> — it does
            not manage state directly.
          </p>
          <Backend />
        </div>
      );

      const App = () => <ExternalStateExample />;

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
