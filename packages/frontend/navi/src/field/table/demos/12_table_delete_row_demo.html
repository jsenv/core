<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table - Delete Row Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }
      .demo-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Table,
        TableCell,
        Colgroup,
        Col,
        Thead,
        Tbody,
        Tr,
        RowNumberCol,
        RowNumberTableCell,
        useRowsAsGrid,
        useCellsAndColumns,
      } from "@jsenv/navi";
      import { useRowsState } from "./table_demo_helpers.js";

      const initialRows = [
        { id: 1, name: "Alice", email: "alice@example.com" },
        { id: 2, name: "Bob", email: "bob@example.com" },
        { id: 3, name: "Charlie", email: "charlie@example.com" },
        { id: 4, name: "Diana", email: "diana@example.com" },
      ];

      const columnsConfig = [
        { id: "id", header: "ID" },
        { id: "name", header: "Name" },
        { id: "email", header: "Email" },
      ];

      const columnIds = columnsConfig.map((col) => col.id);

      // Example 1: rows are an external source of truth.
      // The table is display-only; mutations come from outside (here: a list with delete buttons).
      // useCellGrid is a pure transform — it just converts rows to grid format.
      const ExternalStateExample = () => {
        const [rows, setRows] = useState(initialRows);
        const cellGrid = useRowsAsGrid(rows, columnIds);
        const { cells, columns } = useCellsAndColumns(cellGrid, columnsConfig);

        return (
          <div class="demo-container">
            <h1>External state — table is display-only</h1>
            <p style={{ color: "#6c757d", marginBottom: "16px" }}>
              Rows live outside the table. Delete from the list; the table just
              displays what it receives.
            </p>

            <div style={{ marginTop: "16px" }}>
              <strong>External row list</strong>
              <ul style={{ listStyle: "none", padding: 0, margin: "8px 0 0" }}>
                {rows.map((row) => (
                  <li
                    key={row.id}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "8px",
                      marginBottom: "4px",
                    }}
                  >
                    <span>
                      #{row.id} {row.name} — {row.email}
                    </span>
                    <button
                      style={{
                        padding: "1px 6px",
                        background: "#dc3545",
                        color: "white",
                        border: "none",
                        borderRadius: "3px",
                        cursor: "pointer",
                      }}
                      onClick={() =>
                        setRows((prev) => prev.filter((r) => r.id !== row.id))
                      }
                    >
                      ×
                    </button>
                  </li>
                ))}
              </ul>
            </div>

            <Table borderCollapse>
              <Colgroup>
                <RowNumberCol />
                {columns.map((col) => (
                  <Col key={col.id} id={col.id} />
                ))}
              </Colgroup>
              <Thead>
                <Tr id="head">
                  <RowNumberTableCell />
                  {columns.map((col) => (
                    <TableCell key={col.id}>{col.header}</TableCell>
                  ))}
                </Tr>
              </Thead>
              <Tbody>
                {cells.map((rowCells, rowIndex) => (
                  <Tr key={rows[rowIndex].id} id={rows[rowIndex].id}>
                    <RowNumberTableCell />
                    {rowCells.map((cellValue, columnIndex) => (
                      <TableCell key={columns[columnIndex].id}>
                        {cellValue}
                      </TableCell>
                    ))}
                  </Tr>
                ))}
              </Tbody>
            </Table>
          </div>
        );
      };

      // Example 2: no external state — useRowsState manages everything in the UI.
      // For demo purposes only. In a real app this would not exist;
      // the UI would receive rows from an external source and only call back mutations.
      const DemoStateExample = () => {
        const [cellGrid, { deleteRow }] = useRowsState(initialRows, columnIds);
        const { cells, columns } = useCellsAndColumns(cellGrid, columnsConfig);

        return (
          <div class="demo-container" style={{ marginTop: "40px" }}>
            <h1>Demo-only state — delete button inside the table</h1>
            <p style={{ color: "#6c757d", marginBottom: "16px" }}>
              State lives in the UI via <code>useRowsState</code> (demo helper).
              Not for production use.
            </p>

            <Table borderCollapse>
              <Colgroup>
                <RowNumberCol />
                {columns.map((col) => (
                  <Col key={col.id} id={col.id} />
                ))}
                <Col id="__delete__" width={40} />
              </Colgroup>
              <Thead>
                <Tr id="head">
                  <RowNumberTableCell />
                  {columns.map((col) => (
                    <TableCell key={col.id}>{col.header}</TableCell>
                  ))}
                  <TableCell />
                </Tr>
              </Thead>
              <Tbody>
                {cells.map((rowCells, rowIndex) => (
                  <Tr key={rowIndex}>
                    <RowNumberTableCell />
                    {rowCells.map((cellValue, columnIndex) => (
                      <TableCell key={columns[columnIndex].id}>
                        {cellValue}
                      </TableCell>
                    ))}
                    <TableCell>
                      <button
                        style={{
                          padding: "1px 6px",
                          background: "#dc3545",
                          color: "white",
                          border: "none",
                          borderRadius: "3px",
                          cursor: "pointer",
                        }}
                        onClick={() => deleteRow(rowIndex)}
                      >
                        ×
                      </button>
                    </TableCell>
                  </Tr>
                ))}
              </Tbody>
            </Table>
          </div>
        );
      };

      const App = () => (
        <>
          <ExternalStateExample />
          <DemoStateExample />
        </>
      );

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
