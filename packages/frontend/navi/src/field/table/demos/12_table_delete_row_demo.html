<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table - Delete Row Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }
      .demo-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        Table,
        TableCell,
        Colgroup,
        Col,
        Thead,
        Tbody,
        Tr,
        RowNumberCol,
        RowNumberTableCell,
        Button,
        useRowsAsGrid,
        useCellsAndColumns,
      } from "@jsenv/navi";
      import { useRowsState } from "./table_demo_helpers.js";

      const initialRows = [
        { id: 1, name: "Alice", email: "alice@example.com" },
        { id: 2, name: "Bob", email: "bob@example.com" },
        { id: 3, name: "Charlie", email: "charlie@example.com" },
        { id: 4, name: "Diana", email: "diana@example.com" },
      ];

      const columnsConfig = [
        { id: "id", header: "ID" },
        { id: "name", header: "Name" },
        { id: "email", header: "Email" },
      ];

      const columnIds = columnsConfig.map((col) => col.id);

      // This demo illustrates the typical pattern in a real frontend app:
      //
      // - The BACKEND is the source of truth. It holds the data and exposes
      //   methods to mutate it (e.g. HTTP endpoints backed by a database).
      //   Here it is simulated by a component using useRowsState.
      //
      // - The FRONTEND receives the current state as props (rows) and can
      //   REQUEST mutations via callbacks (onDeleteRow). It never modifies
      //   state directly — it only reflects what the backend sends.
      //
      // The 1s delay on the frontend delete button simulates a real HTTP
      // round-trip: the request goes out, the backend processes it, and the
      // updated rows eventually come back down to the frontend.

      const Backend = () => {
        const [rows, { deleteRow }] = useRowsState(initialRows, columnIds);
        return (
          <div style={{ display: "flex", flexDirection: "column", gap: "0" }}>
            <div
              style={{
                border: "2px solid #6c757d",
                borderRadius: "8px",
                padding: "12px",
              }}
            >
              <div
                style={{
                  color: "#6c757d",
                  fontSize: "0.8em",
                  fontWeight: "bold",
                  marginBottom: "8px",
                }}
              >
                ⚙️ Backend (source of truth)
              </div>
              <ul style={{ listStyle: "none", padding: 0, margin: 0 }}>
                {rows.map((row, rowIndex) => (
                  <li
                    key={row.id}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "8px",
                      marginBottom: "4px",
                      fontSize: "0.85em",
                      color: "#495057",
                    }}
                  >
                    <span>
                      #{row.id} {row.name} — {row.email}
                    </span>
                    <button
                      style={{
                        padding: "1px 6px",
                        background: "#6c757d",
                        color: "white",
                        border: "none",
                        borderRadius: "3px",
                        cursor: "pointer",
                        fontSize: "0.9em",
                      }}
                      onClick={() => deleteRow(rowIndex)}
                    >
                      ×
                    </button>
                  </li>
                ))}
              </ul>
            </div>

            <div
              style={{
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                padding: "6px 0",
                fontSize: "0.75em",
                color: "#868e96",
                lineHeight: "1.4",
              }}
            >
              <span style={{ fontSize: "1.4em", lineHeight: "1" }}>⇅</span>
            </div>

            <Frontend rows={rows} onDeleteRow={deleteRow} />
          </div>
        );
      };

      const Frontend = ({ rows, onDeleteRow }) => {
        const cellGrid = useRowsAsGrid(rows, columnIds);
        const { cells, columns } = useCellsAndColumns(cellGrid, columnsConfig);

        return (
          <div
            style={{
              border: "2px solid #0078d4",
              borderRadius: "8px",
              padding: "12px",
            }}
          >
            <div
              style={{
                color: "#0078d4",
                fontSize: "0.8em",
                marginBottom: "8px",
              }}
            >
              🖥️ Frontend (display + calls backend to delete)
            </div>
            <Table borderCollapse>
              <Colgroup>
                <RowNumberCol />
                {columns.map((col) => (
                  <Col key={col.id} id={col.id} />
                ))}
                <Col id="__delete__" />
              </Colgroup>
              <Thead>
                <Tr id="head">
                  <RowNumberTableCell />
                  {columns.map((col) => (
                    <TableCell key={col.id}>{col.header}</TableCell>
                  ))}
                  <TableCell />
                </Tr>
              </Thead>
              <Tbody>
                {cells.map((rowCells, rowIndex) => (
                  <Tr key={rows[rowIndex].id} id={rows[rowIndex].id}>
                    <RowNumberTableCell />
                    {rowCells.map((cellValue, columnIndex) => (
                      <TableCell key={columns[columnIndex].id}>
                        {cellValue}
                      </TableCell>
                    ))}
                    <TableCell>
                      <Button
                        action={async () => {
                          await new Promise((resolve) =>
                            setTimeout(resolve, 1000),
                          );
                          onDeleteRow(rowIndex);
                        }}
                      >
                        Delete
                      </Button>
                    </TableCell>
                  </Tr>
                ))}
              </Tbody>
            </Table>
          </div>
        );
      };

      const ExternalStateExample = () => (
        <div class="demo-container">
          <h1>Table — delete row</h1>
          <p style={{ color: "#6c757d", marginBottom: "16px" }}>
            The <strong>backend</strong> (dashed box) is the source of truth: it
            holds rows and can delete them instantly from its own list.
            <br />
            The <strong>frontend</strong> (blue box) only displays what it
            receives and must call back to request deletion — the 1s delay on
            the × button simulates an HTTP round-trip.
          </p>
          <Backend />
        </div>
      );

      const App = () => <ExternalStateExample />;

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
