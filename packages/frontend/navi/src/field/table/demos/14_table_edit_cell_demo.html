<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table - Edit Cell Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }
      .demo-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        Table,
        TableCell,
        Colgroup,
        Col,
        Thead,
        Tbody,
        Tr,
        RowNumberCol,
        RowNumberTableCell,
        useRowsAsGrid,
        useCellsAndColumns,
      } from "@jsenv/navi";

      const initialRows = [
        { id: 1, name: "Alice", age: 30, email: "alice@example.com" },
        { id: 2, name: "Bob", age: 25, email: "bob@example.com" },
        { id: 3, name: "Charlie", age: 35, email: "charlie@example.com" },
        { id: 4, name: "Diana", age: 28, email: "diana@example.com" },
      ];

      const columnsConfig = [
        { id: "name", header: "Name" },
        { id: "age", header: "Age" },
        { id: "email", header: "Email" },
      ];

      const TableCellManager = () => {
        const { cellGrid, setCell } = useRowsAsGrid(
          initialRows,
          columnsConfig.map((c) => c.id),
        );

        return (
          <Demo
            cellGrid={cellGrid}
            onCellChange={({ columnIndex, rowIndex }, value) => {
              setCell({ columnIndex, rowIndex }, value);
            }}
          />
        );
      };

      const Demo = ({ cellGrid, onCellChange }) => {
        const { cells, columns } = useCellsAndColumns(cellGrid, columnsConfig);

        return (
          <div class="demo-container">
            <h1>Table — Edit Cell</h1>
            <p style={{ color: "#6c757d", marginBottom: "16px" }}>
              Double-click a cell to edit its value.
            </p>

            <Table borderCollapse>
              <Colgroup>
                <RowNumberCol />
                {columns.map((col) => (
                  <Col key={col.id} id={col.id} />
                ))}
              </Colgroup>

              <Thead>
                <Tr id="head">
                  <RowNumberTableCell />
                  {columns.map((col) => (
                    <TableCell key={col.id}>{col.header}</TableCell>
                  ))}
                </Tr>
              </Thead>

              <Tbody>
                {cells.map((rowCells, rowIndex) => {
                  return (
                    <Tr key={rowIndex}>
                      <RowNumberTableCell />
                      {rowCells.map((cellValue, columnIndex) => {
                        const col = columns[columnIndex];
                        return (
                          <TableCell
                            key={col.id}
                            action={(value) => {
                              onCellChange({ columnIndex, rowIndex }, value);
                            }}
                          >
                            {cellValue}
                          </TableCell>
                        );
                      })}
                    </Tr>
                  );
                })}
              </Tbody>
            </Table>
          </div>
        );
      };

      render(<TableCellManager />, document.getElementById("root"));
    </script>
  </body>
</html>
