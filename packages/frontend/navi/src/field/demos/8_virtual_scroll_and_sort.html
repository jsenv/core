<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Virtual Scroll + Sort Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #app {
        max-width: 400px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";

      /**
       * Virtual Scroll + Sort Demo
       *
       * 200 items — virtual scroll is always active (maxHeight="220px").
       * Typing in the input re-sorts items in state (no items are hidden):
       *   1. items that START with the query (alphabetically)
       *   2. items that CONTAIN the query (alphabetically)
       *   3. everything else at the end
       *
       * SuggestionListCombo is used with match={() => true} so it never hides
       * any suggestion. The combo's input (via ListboxIdContext) gets proper
       * aria-controls and keyboard forwarding for free. Our onInput handler
       * updates the sort state independently.
       */

      import {
        Input,
        Suggestion,
        SuggestionList,
        SuggestionListCombo,
      } from "@jsenv/navi";
      import { useState } from "preact/hooks";

      const ALL_ITEMS = Array.from({ length: 200 }, (_, i) => {
        const names = [
          "Alpha",
          "Bravo",
          "Charlie",
          "Delta",
          "Echo",
          "Foxtrot",
          "Golf",
          "Hotel",
          "India",
          "Juliet",
          "Kilo",
          "Lima",
          "Mike",
          "November",
          "Oscar",
          "Papa",
          "Quebec",
          "Romeo",
          "Sierra",
          "Tango",
        ];
        const base = names[i % names.length];
        const num = String(Math.floor(i / names.length) + 1).padStart(2, "0");
        return `${base}-${num}`;
      });

      // Sort items based on a filter string:
      //   1. items that START with the filter (alphabetically)
      //   2. items that CONTAIN the filter (alphabetically)
      //   3. everything else at the end
      // No items are hidden — all 200 are always rendered, just reordered.
      const sortItems = (items, filter) => {
        if (!filter) {
          return items;
        }
        const lower = filter.toLowerCase();
        const starts = [];
        const contains = [];
        const rest = [];
        for (const item of items) {
          const lowerItem = item.toLowerCase();
          if (lowerItem.startsWith(lower)) {
            starts.push(item);
          } else if (lowerItem.includes(lower)) {
            contains.push(item);
          } else {
            rest.push(item);
          }
        }
        starts.sort((a, b) => a.localeCompare(b));
        contains.sort((a, b) => a.localeCompare(b));
        return [...starts, ...contains, ...rest];
      };

      export const App = () => {
        const [filter, setFilter] = useState("");
        const [selected, setSelected] = useState(null);
        const items = sortItems(ALL_ITEMS, filter);

        return (
          <div>
            <h2>Virtual Scroll + Sort Demo</h2>
            <p style="font-size:13px;color:#555">
              200 items — virtual scroll active. Typing re-sorts: matching items
              bubble up (starts-with first, then contains), nothing is hidden.
            </p>
            {selected && (
              <p style="font-size:13px;color:#1a73e8">
                Selected: <b>{selected}</b>
              </p>
            )}
            <SuggestionListCombo match={() => true}>
              <Input
                placeholder="Sort suggestions…"
                expandX
                onInput={(e) => setFilter(e.target.value)}
              />
              <SuggestionList maxHeight="220px" uiAction={setSelected} expandX>
                {items.map((item) => (
                  <Suggestion key={item} value={item}>
                    {item}
                  </Suggestion>
                ))}
              </SuggestionList>
            </SuggestionListCombo>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
