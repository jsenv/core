<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Label Demo</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Label, Input, Box } from "@jsenv/navi";

      const sectionStyle = {
        border: "1px solid #ccc",
        borderRadius: "6px",
        padding: "12px",
      };

      const BasicDemo = () => {
        return (
          <>
            <ToTheLeftDemo />
            <AboveDemo />
            <DisabledDemo />
            <ReadOnlyDemo />
          </>
        );
      };

      const ToTheLeftDemo = () => {
        return (
          <Box flex="y" spacing="xs" style={sectionStyle}>
            <h2>To the left</h2>
            <Label flex spacing="s" alignY="center">
              <span>Username</span>
              <Input placeholder="Enter username" />
            </Label>
          </Box>
        );
      };

      const AboveDemo = () => {
        return (
          <Box flex="y" spacing="xs" style={sectionStyle}>
            <h2>Above</h2>
            <Label flex="y" spacing="xs">
              <span>Email</span>
              <Input type="email" placeholder="Enter email" />
            </Label>
          </Box>
        );
      };

      const DisabledDemo = () => {
        return (
          <Box flex="y" spacing="xs" style={sectionStyle}>
            <h2>Above + field is disabled</h2>
            <Label flex="y" spacing="xs">
              <span>Disabled field</span>
              <Input placeholder="Not editable" disabled />
            </Label>
          </Box>
        );
      };

      const ReadOnlyDemo = () => {
        return (
          <Box flex="y" spacing="xs" style={sectionStyle}>
            <h2>Above + field is readOnly</h2>
            <Label flex="y" spacing="xs">
              <span>Read-only field</span>
              <Input value="Fixed value" readOnly />
            </Label>
          </Box>
        );
      };

      const SizingDemo = () => {
        return (
          <Box flex="y" spacing="xs" style={sectionStyle}>
            <h2>Sizing</h2>
            <Box flex="y" spacing="s">
              <Box flex="y" spacing="xs">
                <span>block (default)</span>
                <div
                  style={{
                    width: "200px",
                    border: "2px dotted #999",
                    padding: "8px",
                  }}
                >
                  <Label
                    style={{ background: "rgba(255,200,0,0.3)" }}
                    spacing="xs"
                  >
                    <span>Short</span>
                    <span>
                      This text is much much longer than the container width
                    </span>
                  </Label>
                </div>
              </Box>
              <Box flex="y" spacing="xs">
                <span>flex (shrinks to content)</span>
                <div
                  style={{
                    width: "200px",
                    border: "2px dotted #999",
                    padding: "8px",
                  }}
                >
                  <Label
                    flex
                    style={{ background: "rgba(255,200,0,0.3)" }}
                    spacing="xs"
                  >
                    <span>Short</span>
                    <span>
                      This text is much much longer than the container width
                    </span>
                  </Label>
                </div>
              </Box>
            </Box>
          </Box>
        );
      };

      const App = () => {
        return (
          <Box
            flex="y"
            spacing="s"
            style={{ padding: "20px", maxWidth: "600px" }}
          >
            <h1>Label</h1>
            <BasicDemo />
            <SizingDemo />
          </Box>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
