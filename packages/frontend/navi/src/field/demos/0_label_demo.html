<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Label Demo</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Label, Input, Box, Text } from "@jsenv/navi";

      const sectionStyle = {
        border: "1px solid #ccc",
        borderRadius: "6px",
        padding: "12px",
      };

      const BasicDemo = () => {
        return (
          <>
            <ToTheLeftDemo />
            <AboveDemo />
            <DisabledDemo />
            <ReadOnlyDemo />
          </>
        );
      };

      const ToTheLeftDemo = () => {
        return (
          <Box flex="y" alignX="start" spacing="xs" style={sectionStyle}>
            <h2>To the left</h2>
            <Label
              flex
              spacing="s"
              alignY="center"
              style={{ border: "1px dotted #999" }}
            >
              <span>Username</span>
              <Input placeholder="Enter username" />
            </Label>
          </Box>
        );
      };

      const AboveDemo = () => {
        return (
          <Box flex="y" alignX="start" spacing="xs" style={sectionStyle}>
            <h2>Above</h2>
            <Label flex="y" spacing="xs" style={{ border: "1px dotted #999" }}>
              <span>Email</span>
              <Input type="email" placeholder="Enter email" />
            </Label>
          </Box>
        );
      };

      const DisabledDemo = () => {
        return (
          <Box flex="y" alignX="start" spacing="xs" style={sectionStyle}>
            <h2>Above + field is disabled</h2>
            <Label flex="y" spacing="xs" style={{ border: "1px dotted #999" }}>
              <span>Disabled field</span>
              <Input placeholder="Not editable" disabled />
            </Label>
          </Box>
        );
      };

      const ReadOnlyDemo = () => {
        return (
          <Box flex="y" alignX="start" spacing="xs" style={sectionStyle}>
            <h2>Above + field is readOnly</h2>
            <Label flex="y" spacing="xs" style={{ border: "1px dotted #999" }}>
              <span>Read-only field</span>
              <Input value="Fixed value" readOnly />
            </Label>
          </Box>
        );
      };

      const SizingDemo = () => {
        return (
          <Box flex="y" spacing="xs" style={sectionStyle}>
            <h2>Sizing</h2>
            <Box flex="y" spacing="s">
              <Box flex="y" spacing="xs">
                <span>flex + block</span>
                <div
                  style={{
                    width: "200px",
                    background: "rgba(255,200,0,0.3)",
                    padding: "8px",
                  }}
                >
                  <LabelWithToggle block>Short text</LabelWithToggle>
                  <LabelWithToggle block>A longer text</LabelWithToggle>
                  <LabelWithToggle block>
                    This text is much much longer than the container width
                  </LabelWithToggle>
                </div>
              </Box>

              <Box flex="y" spacing="xs">
                <span>flex + width 100%</span>
                <div
                  style={{
                    width: "200px",
                    background: "rgba(255,200,0,0.3)",
                    padding: "8px",
                  }}
                >
                  <LabelWithToggle width="100%">Short text</LabelWithToggle>
                  <LabelWithToggle width="100%">A longer text</LabelWithToggle>
                  <LabelWithToggle width="100%">
                    This text is much much longer than the container width
                  </LabelWithToggle>
                </div>
              </Box>

              <Box flex="y" spacing="xs">
                <span>flex only</span>
                <div
                  style={{
                    width: "200px",
                    background: "rgba(255,200,0,0.3)",
                    padding: "8px",
                  }}
                >
                  <LabelWithToggle>Short text</LabelWithToggle>
                  <LabelWithToggle>A longer text</LabelWithToggle>
                  <LabelWithToggle>
                    This text is much much longer than the container width
                  </LabelWithToggle>
                </div>
              </Box>

              <Box flex="y" spacing="xs">
                <span>flex + expandX</span>
                <div
                  style={{
                    width: "200px",
                    background: "rgba(255,200,0,0.3)",
                    padding: "8px",
                  }}
                >
                  <LabelWithToggle expandX>Short text</LabelWithToggle>
                  <LabelWithToggle expandX>A longer text</LabelWithToggle>
                  <LabelWithToggle expandX>
                    This text is much much longer than the container width
                  </LabelWithToggle>
                </div>
              </Box>
            </Box>
          </Box>
        );
      };
      const LabelWithToggle = ({ children, ...props }) => {
        return (
          <Label
            flex
            alignY="center"
            border="1px dotted #999"
            spacing="xs"
            {...props}
          >
            <Text overflowEllipsis>{children}</Text>
            <Input
              type="checkbox"
              appearance="toggle"
              selfAlignX="end"
              size="xs"
            />
          </Label>
        );
      };

      const App = () => {
        return (
          <Box
            flex="y"
            spacing="s"
            style={{ padding: "20px", maxWidth: "600px" }}
          >
            <h1>Label</h1>
            <BasicDemo />
            <SizingDemo />
          </Box>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
