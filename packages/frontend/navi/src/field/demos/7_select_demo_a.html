<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Select Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      .demo-section {
        max-width: 560px;
        margin: 0 auto 40px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        max-width: 560px;
        margin: 0 auto 32px;
        color: #333;
        font-size: 1.6rem;
        text-align: center;
      }
      h2 {
        margin: 0 0 8px;
        color: #222;
        font-size: 1.1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        min-height: 20px;
        margin-top: 12px;
        padding: 8px;
        font-size: 0.8rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }
      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(no value)";
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }
      fieldset {
        min-width: 160px;
      }
    </style>
  </head>
  <body>
    <h1>Select Demo</h1>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Select,
        List,
        ListItem,
        Separator,
        ListItemHeader,
        useSearchText,
        Input,
        Form,
        Box,
        ListItemGroup,
        Label,
        NaviDebug,
        Button,
        Text,
        Caption,
        Icon,
      } from "@jsenv/navi";

      // ── Demo 1: Basics ────────────────────────────────────────────────────────

      const DEMO1_OPTIONS = ["Apple", "Banana"];
      const WARM_COLORS = ["Red", "Orange", "Yellow"];
      const COOL_COLORS = ["Green", "Blue", "Purple"];

      const Demo1 = () => {
        const [val1, setVal1] = useState(null);
        const [val1n, setVal1n] = useState("");
        const [val2, setVal2] = useState("Banana");
        const [val2n, setVal2n] = useState("Banana");
        const [val3, setVal3] = useState(null);
        const [val3n, setVal3n] = useState("");
        const [val4, setVal4] = useState(null);
        const [val4n, setVal4n] = useState("");
        return (
          <div className="demo-section">
            <h2>Demo 1 — Basics</h2>

            <p>No default value</p>
            <Box flex spacing="m" wrap>
              <fieldset>
                <legend>Navi</legend>
                <Select
                  name="d1_no_default"
                  value={val1}
                  uiAction={(v) => setVal1(v)}
                >
                  <List role="listbox">
                    {DEMO1_OPTIONS.map((o, i) => (
                      <ListItem
                        key={o}
                        index={i}
                        id={o}
                        value={o}
                        selected={val1 === o}
                      >
                        {o}
                      </ListItem>
                    ))}
                  </List>
                </Select>
                <div className="value-display">{val1 ?? ""}</div>
              </fieldset>
              <fieldset>
                <legend>User agent</legend>
                <select
                  value={val1n}
                  onChange={(e) => setVal1n(e.target.value)}
                >
                  {DEMO1_OPTIONS.map((o) => (
                    <option key={o} value={o}>
                      {o}
                    </option>
                  ))}
                </select>
                <div className="value-display">{val1n}</div>
              </fieldset>
            </Box>

            <p>With default value</p>
            <Box flex spacing="m" wrap>
              <fieldset>
                <legend>Navi</legend>
                <Select
                  name="d1_default"
                  value={val2}
                  uiAction={(v) => setVal2(v)}
                >
                  <List role="listbox">
                    {DEMO1_OPTIONS.map((o, i) => (
                      <ListItem
                        key={o}
                        index={i}
                        id={o}
                        value={o}
                        selected={val2 === o}
                      >
                        {o}
                      </ListItem>
                    ))}
                  </List>
                </Select>
                <div className="value-display">{val2 ?? ""}</div>
              </fieldset>
              <fieldset>
                <legend>User agent</legend>
                <select
                  value={val2n}
                  onChange={(e) => setVal2n(e.target.value)}
                >
                  {DEMO1_OPTIONS.map((o) => (
                    <option key={o} value={o}>
                      {o}
                    </option>
                  ))}
                </select>
                <div className="value-display">{val2n}</div>
              </fieldset>
            </Box>

            <p>With placeholder</p>
            <Box flex spacing="m" wrap>
              <fieldset>
                <legend>Navi</legend>
                <Select
                  name="d1_placeholder"
                  value={val3}
                  placeholder="Pick a fruit…"
                  uiAction={(v) => setVal3(v)}
                >
                  <List role="listbox">
                    {DEMO1_OPTIONS.map((o, i) => (
                      <ListItem
                        key={o}
                        index={i}
                        id={o}
                        value={o}
                        selected={val3 === o}
                      >
                        {o}
                      </ListItem>
                    ))}
                  </List>
                </Select>
                <div className="value-display">{val3 ?? ""}</div>
              </fieldset>
              <fieldset>
                <legend>User agent</legend>
                <select
                  value={val3n}
                  onChange={(e) => setVal3n(e.target.value)}
                >
                  <option value="" disabled>
                    Pick a fruit…
                  </option>
                  {DEMO1_OPTIONS.map((o) => (
                    <option key={o} value={o}>
                      {o}
                    </option>
                  ))}
                </select>
                <div className="value-display">{val3n}</div>
              </fieldset>
            </Box>

            <p>With optgroups</p>
            <Box flex spacing="m" wrap>
              <fieldset>
                <legend>Navi</legend>
                <Select
                  name="d1_optgroups"
                  value={val4}
                  placeholder="Pick a color…"
                  uiAction={(v) => setVal4(v)}
                >
                  <List role="listbox" separator={<Separator margin="0" />}>
                    <ListItemGroup label="Warm">
                      {WARM_COLORS.map((c, i) => (
                        <ListItem
                          key={c}
                          index={i}
                          id={c}
                          value={c}
                          selected={val4 === c}
                        >
                          {c}
                        </ListItem>
                      ))}
                    </ListItemGroup>
                    <ListItemGroup label="Cool">
                      {COOL_COLORS.map((c, i) => (
                        <ListItem
                          key={c}
                          index={WARM_COLORS.length + i}
                          id={c}
                          value={c}
                          selected={val4 === c}
                        >
                          {c}
                        </ListItem>
                      ))}
                    </ListItemGroup>
                  </List>
                </Select>
                <div className="value-display">{val4 ?? ""}</div>
              </fieldset>
              <fieldset>
                <legend>User agent</legend>
                <select
                  value={val4n}
                  onChange={(e) => setVal4n(e.target.value)}
                >
                  <option value="">Pick a color…</option>
                  <optgroup label="Warm">
                    {WARM_COLORS.map((c) => (
                      <option key={c} value={c}>
                        {c}
                      </option>
                    ))}
                  </optgroup>
                  <optgroup label="Cool">
                    {COOL_COLORS.map((c) => (
                      <option key={c} value={c}>
                        {c}
                      </option>
                    ))}
                  </optgroup>
                </select>
                <div className="value-display">{val4n}</div>
              </fieldset>
            </Box>
          </div>
        );
      };

      const FRUITS = [
        "Apple",
        "Apricot",
        "Avocado",
        "Banana",
        "Blueberry",
        "Cherry",
        "Coconut",
        "Fig",
        "Grape",
        "Guava",
        "Kiwi",
        "Lemon",
        "Lime",
        "Mango",
        "Melon",
        "Orange",
        "Papaya",
        "Peach",
        "Pear",
        "Pineapple",
        "Plum",
        "Pomegranate",
        "Raspberry",
        "Strawberry",
        "Watermelon",
      ];

      // ── Demo 3: Placeholder and disabled states ───────────────────────────────

      const SIZES = ["XS", "S", "M", "L", "XL", "XXL"];

      const Demo3 = () => {
        const [size, setSize] = useState("");
        return (
          <div className="demo-section">
            <h2>Demo 3 — States</h2>
            <p>Pre-selected value and disabled state.</p>
            <Box flex spacing="m" paddingX="s" paddingY="s">
              <Select
                name="size"
                value={size}
                uiAction={(v) => setSize(v)}
                placeholder="Pick a size…"
                borderRadius="m"
                // borderWidth="10"
                scrollTrap={false}
              >
                <List role="listbox">
                  {SIZES.map((s, i) => (
                    <ListItem
                      key={s}
                      index={i}
                      id={s}
                      value={s}
                      selected={size === s}
                    >
                      {s}
                    </ListItem>
                  ))}
                </List>
              </Select>
              <Select
                uiAction={() => {}}
                name="size_disabled"
                value="L"
                disabled
              >
                <List role="listbox">
                  {SIZES.map((s, i) => (
                    <ListItem
                      key={s}
                      index={i}
                      id={s}
                      value={s}
                      selected={s === "L"}
                    >
                      {s}
                    </ListItem>
                  ))}
                </List>
              </Select>
              <Box background="orange" width="10px" height="70px"></Box>
            </Box>
            <div className="value-display">{size}</div>
          </div>
        );
      };

      // ── Demo 4: Form integration + required ──────────────────────────────────

      const COUNTRIES = ["France", "Germany", "Japan", "USA"];

      const Demo4 = () => {
        const [submitted, setSubmitted] = useState(null);
        const [country, setCountry] = useState(null);
        const [role, setRole] = useState(null);
        return (
          <div className="demo-section">
            <h2>Demo 4 — Form integration &amp; required</h2>
            <p>
              Hidden <code>&lt;input type="hidden"&gt;</code> fields carry the
              selected values on form submission. A <code>required</code> select
              blocks submission until a value is picked — closing the closed
              select also triggers form validation.
            </p>
            <Form
              action={(data) => {
                setSubmitted(data);
              }}
            >
              <Box flex spacing="m">
                <Box flex="y" spacing="m" alignX="start">
                  <Label flex spacing="s" alignY="center">
                    Country
                    <Select
                      name="country"
                      value={country}
                      placeholder="Pick a country…"
                      required
                      requiredMessage="Veuillez choisir un pays."
                      uiAction={(v) => setCountry(v)}
                    >
                      <List role="listbox">
                        {COUNTRIES.map((c, i) => (
                          <ListItem
                            key={c}
                            index={i}
                            id={c}
                            value={c}
                            selected={country === c}
                          >
                            {c}
                          </ListItem>
                        ))}
                      </List>
                    </Select>
                  </Label>

                  <Label flex spacing="s" alignY="center">
                    Role
                    <Select
                      name="role"
                      value={role}
                      uiAction={(v) => setRole(v)}
                      placeholder="Pick a role…"
                    >
                      <List role="listbox">
                        {["Admin", "Editor", "Viewer"].map((r, i) => (
                          <ListItem
                            key={r}
                            index={i}
                            id={r}
                            value={r}
                            selected={role === r}
                          >
                            {r}
                          </ListItem>
                        ))}
                      </List>
                    </Select>
                  </Label>

                  <Button type="submit">Submit</Button>
                </Box>
                {submitted && (
                  <div className="value-display">
                    {JSON.stringify(submitted, null, 2)}
                  </div>
                )}
              </Box>
            </Form>
          </div>
        );
      };

      // ── Demo 5: Custom trigger ────────────────────────────────────────────────

      const DECOUPAGES = [
        "Annuel",
        "Trimestriel",
        "Mensuel",
        "Hebdomadaire",
        "Journalier",
      ];

      const Demo5 = () => {
        const [decoupage, setDecoupage] = useState("Annuel");

        return (
          <div className="demo-section">
            <h2>Demo 5 — Custom trigger</h2>
            <p>
              A fully custom trigger passed via the <code>trigger</code> prop.
              The select has custom border color and radius via style props.
            </p>
            <Box flex spacing="m">
              <NaviDebug debugPopup debugFocus>
                <Select
                  name="decoupage"
                  value={decoupage}
                  uiAction={(v) => setDecoupage(v)}
                  borderRadius="s"
                  paddingX="m"
                  paddingY="xs"
                  borderColor="#e4e4e7"
                  borderWidth="5"
                  trigger={
                    <Box flex spacing="m" alignY="center">
                      <Text size="xs">
                        Découpage de la période
                        <br />
                        <Caption>{decoupage}</Caption>
                      </Text>
                      <Icon color="rgb(55, 60, 69)" size="xs">
                        <svg
                          viewBox="0 0 10 10"
                          xmlns="http://www.w3.org/2000/svg"
                        >
                          <path
                            d="M2 3.5L5 6.5L8 3.5"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            fill="none"
                          />
                        </svg>
                      </Icon>
                    </Box>
                  }
                >
                  <List role="listbox">
                    {DECOUPAGES.map((d, i) => (
                      <ListItem
                        key={d}
                        index={i}
                        id={d}
                        value={d}
                        selected={decoupage === d}
                      >
                        {d}
                      </ListItem>
                    ))}
                  </List>
                </Select>
              </NaviDebug>
              <Box background="orange" width="10px" height="70px" />
            </Box>
            <div className="value-display">{decoupage}</div>
          </div>
        );
      };

      // ── Demo 6: Popover style ─────────────────────────────────────────────────

      const SIZES_STYLE = ["XS", "S", "M", "L", "XL"];

      const StyleSelect = ({ label, wideList = false, ...props }) => {
        const [value, setValue] = useState(null);
        return (
          <Box flex="y" spacing="xs">
            <span style={{ fontSize: "12px", color: "#666" }}>{label}</span>
            <Select
              name="style_demo"
              value={value}
              placeholder="Pick a size…"
              uiAction={(v) => setValue(v)}
              {...props}
            >
              <List
                role="listbox"
                style={wideList ? { minWidth: "220px" } : undefined}
              >
                {SIZES_STYLE.map((s, i) => (
                  <ListItem
                    key={s}
                    index={i}
                    id={s}
                    value={s}
                    selected={value === s}
                  >
                    {s}
                  </ListItem>
                ))}
              </List>
            </Select>
            <div className="value-display">{value ?? ""}</div>
          </Box>
        );
      };

      const Demo6 = () => {
        const [rounded, setRounded] = useState(false);
        return (
          <div className="demo-section">
            <h2>Demo 6 — Popover mode</h2>

            <label
              style={{
                display: "flex",
                alignItems: "center",
                gap: "6px",
                fontSize: "13px",
                marginBottom: "16px",
                cursor: "pointer",
              }}
            >
              <input
                type="checkbox"
                checked={rounded}
                onChange={(e) => setRounded(e.target.checked)}
              />
              Rounded borders
            </label>

            {/* ── 3-column interactive examples ── */}
            <p
              style={{
                fontSize: "12px",
                color: "#888",
                margin: "0 0 8px",
                fontStyle: "italic",
              }}
            >
              Popover same width as trigger:
            </p>
            <Box
              flex
              spacing="xl"
              alignY="end"
              style={{ marginBottom: "24px" }}
            >
              <Box flex="y" spacing="xs" alignX="start">
                <StyleSelect
                  label='popoverMode="nearby" (default)'
                  borderRadius={rounded ? "m" : "0"}
                />
              </Box>
              <Box flex="y" spacing="xs" alignX="start">
                <StyleSelect
                  label='popoverMode="overlay"'
                  popoverMode="overlay"
                  borderRadius={rounded ? "m" : "0"}
                />
              </Box>
              <Box flex="y" spacing="xs" alignX="start">
                <StyleSelect
                  label='popoverMode="attached"'
                  popoverMode="attached"
                  borderRadius={rounded ? "m" : "0"}
                />
              </Box>
            </Box>

            {/* ── 3-column: popover wider than trigger ── */}
            <p
              style={{
                fontSize: "12px",
                color: "#888",
                margin: "0 0 8px",
                fontStyle: "italic",
              }}
            >
              Popover wider than trigger:
            </p>
            <Box
              flex
              spacing="xl"
              alignY="end"
              style={{ marginBottom: "24px" }}
            >
              <Box flex="y" spacing="xs" alignX="start">
                <StyleSelect
                  label='popoverMode="nearby" (default)'
                  wideList
                  borderRadius={rounded ? "m" : "0"}
                />
              </Box>
              <Box flex="y" spacing="xs" alignX="start">
                <StyleSelect
                  label='popoverMode="overlay"'
                  wideList
                  popoverMode="overlay"
                  borderRadius={rounded ? "m" : "0"}
                />
              </Box>
              <Box flex="y" spacing="xs" alignX="start">
                <StyleSelect
                  label='popoverMode="attached"'
                  wideList
                  popoverMode="attached"
                  borderRadius={rounded ? "m" : "0"}
                />
              </Box>
            </Box>

            {/* ── explanations ── */}
            <p style={{ fontSize: "13px", color: "#444", margin: "0 0 6px" }}>
              <b>"nearby"</b> is the default because it has the fewest
              trade-offs:
            </p>
            <ul
              style={{
                fontSize: "13px",
                color: "#444",
                margin: "0 0 12px",
                paddingLeft: "20px",
                lineHeight: "1.7",
              }}
            >
              <li>
                The trigger stays fully visible when the popover is open — the
                user always knows what they are editing.
              </li>
              <li>
                When the popover is wider than the trigger, only the popover
                grows — nothing else in the layout changes. This is the most
                natural behaviour and is used widely (GitHub, Linear, etc.).
              </li>
            </ul>
            <p style={{ fontSize: "13px", color: "#444", margin: "0 0 6px" }}>
              The other modes have valid use cases but come with trade-offs:
            </p>
            <ul
              style={{
                fontSize: "13px",
                color: "#444",
                margin: 0,
                paddingLeft: "20px",
                lineHeight: "1.7",
              }}
            >
              <li>
                <b>"overlay"</b> — the popover covers the trigger when open,
                which can feel disorienting.
              </li>
              <li>
                <b>"attached"</b> — when the popover is wider, the trigger grows
                with it, so two things change at once instead of one. If you use
                a custom trigger it needs to be fluid in width for this to work
                correctly.
              </li>
            </ul>
          </div>
        );
      };

      // ── Demo 7: List with search ──────────────────────────────────────────────
      const Demo7 = () => {
        const [fruit, setFruit] = useState(null);
        const [searchText, setSearchText] = useState("");
        const [items, getItemMatchInfo] = useSearchText(searchText, FRUITS);

        return (
          <div className="demo-section">
            <h2>Demo 7 — List with search</h2>
            <p>
              The popover contains a search input and a filterable list.
              Selecting a fruit closes the popover automatically.
            </p>
            <Box flex spacing="s" alignY="center">
              <NaviDebug debugFocus debugScroll debugPopup>
                <Select
                  name="fruit"
                  value={fruit}
                  uiAction={(v) => {
                    setFruit(v);
                  }}
                  placeholder="Pick a fruit…"
                  scrollTrap
                  focusTrap
                >
                  <List role="listbox">
                    <ListItemHeader padding="m" borderBottom="1px solid #eee">
                      <Input
                        uiAction={(v) => setSearchText(v)}
                        type="search"
                        placeholder="Search…"
                        value={searchText}
                        expandX
                      />
                    </ListItemHeader>
                    {items.map((f, i) => {
                      const { match, ranges } = getItemMatchInfo(f);
                      return (
                        <ListItem
                          key={f}
                          index={i}
                          id={f}
                          value={f}
                          selected={fruit === f}
                          filtered={!match}
                          highlight={ranges}
                        >
                          {f}
                        </ListItem>
                      );
                    })}
                  </List>
                </Select>
              </NaviDebug>
              Some text here (to show no layout impact when opening select)
            </Box>
            <div className="value-display">{fruit ?? ""}</div>
          </div>
        );
      };

      // ── App ───────────────────────────────────────────────────────────────────

      const App = () => {
        return (
          <div>
            <Demo1 />
            <Demo6 />
            <Demo3 />
            <Demo4 />
            <Demo5 />
            <Demo7 />
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
