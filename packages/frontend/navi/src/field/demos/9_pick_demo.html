<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pick Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      .demo-section {
        max-width: 500px;
        margin: 0 auto 40px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Pick } from "../pick.jsx";

      // ─── Demo 1: arbitrary dialog content ────────────────────────────────────

      const Demo1 = () => {
        const [value, setValue] = useState(null);

        return (
          <div class="demo-section">
            <h2>Demo 1 — Arbitrary dialog content</h2>
            <p>
              Clicking the trigger opens a centered dialog. The content is fully
              custom. Click outside (backdrop) to close.
            </p>
            <Pick
              value={value}
              placeholder="Choose a color…"
              onClose={() => {}}
            >
              <div style="padding: 20px; min-width: 260px;">
                <p style="margin: 0 0 12px; font-weight: 600;">Pick a color</p>
                {["Red", "Green", "Blue", "Yellow", "Purple"].map((color) => (
                  <button
                    key={color}
                    style="display:block;width:100%;margin-bottom:8px;padding:8px 12px;text-align:left;cursor:pointer;border:1px solid #ddd;border-radius:4px;background:white;font-size:14px"
                    onClick={() => {
                      setValue(color);
                      // Close dialog after selection
                      document
                        .querySelector("dialog.navi_pick_dialog")
                        ?.close();
                    }}
                  >
                    {color}
                  </button>
                ))}
              </div>
            </Pick>
            {value && (
              <p style="margin-top: 12px; font-size: 13px; color: #1a73e8;">
                Selected: <b>{value}</b>
              </p>
            )}
          </div>
        );
      };

      // ─── Demo 2: Pick + SuggestionListCombo ─────────────────────────────────

      import {
        Suggestion,
        SuggestionList,
        SuggestionListCombo,
      } from "@jsenv/navi";
      import { Input } from "@jsenv/navi";

      const FRUITS = [
        "Apple",
        "Apricot",
        "Avocado",
        "Banana",
        "Blackberry",
        "Blueberry",
        "Cherry",
        "Coconut",
        "Fig",
        "Grape",
        "Grapefruit",
        "Guava",
        "Kiwi",
        "Lemon",
        "Lime",
        "Lychee",
        "Mango",
        "Melon",
        "Nectarine",
        "Orange",
        "Papaya",
        "Peach",
        "Pear",
        "Pineapple",
        "Plum",
        "Pomegranate",
        "Raspberry",
        "Strawberry",
        "Tangerine",
        "Watermelon",
      ];

      const Demo2 = () => {
        const [value, setValue] = useState(null);
        // Keep a ref to all open Pick dialogs so we can close after selection.
        const closeDialog = () => {
          document.querySelectorAll("dialog.navi_pick_dialog").forEach((d) => {
            if (d.open) {
              d.close();
            }
          });
        };

        return (
          <div class="demo-section">
            <h2>Demo 2 — Pick + SuggestionListCombo (filterable)</h2>
            <p>
              Opening the dialog shows a filterable list of suggestions. Typing
              in the search input filters the options.
            </p>
            <Pick value={value} placeholder="Pick a fruit…">
              <SuggestionListCombo style="padding: 8px; min-width: 280px;">
                <Input placeholder="Filter…" expandX autoFocus />
                <SuggestionList
                  maxHeight="240px"
                  expandX
                  uiAction={(v) => {
                    setValue(v);
                    closeDialog();
                  }}
                >
                  {FRUITS.map((fruit) => (
                    <Suggestion key={fruit} value={fruit}>
                      {fruit}
                    </Suggestion>
                  ))}
                </SuggestionList>
              </SuggestionListCombo>
            </Pick>
            {value && (
              <p style="margin-top: 12px; font-size: 13px; color: #1a73e8;">
                Selected: <b>{value}</b>
              </p>
            )}
          </div>
        );
      };

      const App = () => (
        <div>
          <Demo1 />
          <Demo2 />
        </div>
      );

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
