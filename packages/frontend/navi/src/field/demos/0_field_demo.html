<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Demo</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Box, Field, Input, Label, Text } from "@jsenv/navi";

      const labelDotted = { border: "1px dotted #999" };

      const App = () => {
        return (
          <Box
            flex="y"
            spacing="m"
            style={{ padding: "20px", maxWidth: "520px" }}
          >
            <h1>Field</h1>
            <p style={{ margin: 0, color: "#555" }}>
              <code>Field</code> auto-wires a <code>Label</code> to its input
              via a generated id — no manual <code>htmlFor</code>/
              <code>id</code> needed. It also reflects the input's interactive /
              disabled / read-only state onto the label. The dotted border shows
              the label's clickable area.
            </p>
            <TableOfContents />
            <DefaultDemo />
            <DisabledDemo />
            <ReadOnlyDemo />
            <SizingDemo />
            <VerticalDemo />
          </Box>
        );
      };

      // Default: label to the left, input to the right (horizontal row layout)
      const TableOfContents = () => (
        <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
          <li>
            <a href="#default">Default (label to the left)</a>
          </li>
          <li>
            <a href="#disabled">Disabled</a>
          </li>
          <li>
            <a href="#readonly">Read-only</a>
          </li>
          <li>
            <a href="#sizing">Sizing</a>
          </li>
          <li>
            <a href="#vertical">Vertical (label above)</a>
          </li>
        </ol>
      );

      // Default: label to the left, input to the right (horizontal row layout)
      const DefaultDemo = () => (
        <Box flex="y" spacing="s" id="default">
          <h2 style={{ margin: 0 }}>Default (label to the left)</h2>
          <Field flex alignY="center" spacing="s">
            <Label style={labelDotted}>Username</Label>
            <Input type="text" name="username" placeholder="Enter username" />
          </Field>
          <Field flex alignY="center" spacing="s">
            <Label style={labelDotted}>Email</Label>
            <Input type="email" name="email" placeholder="Enter email" />
          </Field>
        </Box>
      );

      const VerticalDemo = () => (
        <Box flex="y" spacing="s" id="vertical">
          <h2 style={{ margin: 0 }}>Vertical (label above)</h2>
          <Field vertical spacing="s">
            <Label style={labelDotted}>Username</Label>
            <Input type="text" name="username_v" placeholder="Enter username" />
          </Field>
          <Field vertical spacing="s">
            <Label style={labelDotted}>Email</Label>
            <Input type="email" name="email_v" placeholder="Enter email" />
          </Field>
        </Box>
      );

      const DisabledDemo = () => (
        <Box flex="y" spacing="s" id="disabled">
          <h2 style={{ margin: 0 }}>Disabled</h2>
          <p style={{ margin: 0, fontSize: "0.85em", color: "#555" }}>
            The label dims automatically when the input is disabled.
          </p>
          <Field flex alignY="center" spacing="s">
            <Label style={labelDotted}>Username</Label>
            <Input
              type="text"
              name="username_disabled"
              defaultValue="john_doe"
              disabled
            />
          </Field>
        </Box>
      );

      const ReadOnlyDemo = () => (
        <Box flex="y" spacing="s" id="readonly">
          <h2 style={{ margin: 0 }}>Read-only</h2>
          <p style={{ margin: 0, fontSize: "0.85em", color: "#555" }}>
            The label dims automatically when the input is read-only.
          </p>
          <Field flex alignY="center" spacing="s">
            <Label style={labelDotted}>Username</Label>
            <Input
              type="text"
              name="username_readonly"
              defaultValue="john_doe"
              readOnly
            />
          </Field>
        </Box>
      );

      const SizingDemo = () => (
        <Box flex="y" spacing="s" id="sizing">
          <h2 style={{ margin: 0 }}>Sizing</h2>
          <Box flex="y" spacing="s">
            <Box flex="y" spacing="xs">
              <span>flex + block</span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow block>Short label</FieldRow>
                <FieldRow block>A much longer label text</FieldRow>
                <FieldRow block>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <span>flex + width 100%</span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow width="100%">Short label</FieldRow>
                <FieldRow width="100%">A much longer label text</FieldRow>
                <FieldRow width="100%">
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <span>flex only</span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow>Short label</FieldRow>
                <FieldRow>A much longer label text</FieldRow>
                <FieldRow>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <span>flex + expandX</span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow expandX>Short label</FieldRow>
                <FieldRow expandX>A much longer label text</FieldRow>
                <FieldRow expandX>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>
          </Box>
        </Box>
      );

      const FieldRow = ({ children, ...props }) => (
        <Field flex alignY="center" spacing="s" {...props}>
          <Label expandX style={labelDotted} overflowEllipsis noWrap>
            {children}
          </Label>
          <Input
            type="checkbox"
            appearance="toggle"
            selfAlignX="end"
            size="xs"
          />
        </Field>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
