<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selectable List Demo</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      h2.section-title {
        margin: 40px 0 12px;
        color: #555;
        font-weight: 700;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .value-display {
        min-height: 24px;
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }
    </style>
  </head>
  <body>
    <h1>Selectable List Demo</h1>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { NaviDebug, SelectableList, Selectable } from "@jsenv/navi";

      const App = () => {
        return (
          <>
            <NaviDebug debugAction debugInteraction>
              <BasicDemo />
              <ReadOnlyDemo />
              <FormDemo />
              <h2 className="section-title">Customization</h2>
              <InputDemo />
              <IconInputDemo />
            </NaviDebug>
          </>
        );
      };

      const FRUITS = ["Apple", "Banana", "Cherry", "Date", "Elderberry"];

      // ── Basic selectable list ──────────────────────────────────────────────────

      const BasicDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>Basic selectable list</h2>
            <p>
              A plain list of selectable items — only text, no{" "}
              <code>Selectable.Input</code>.
            </p>
            <SelectableList
              expandX
              action={(v) => {
                setSelected(v);
              }}
            >
              {FRUITS.map((fruit, i) => (
                <Selectable
                  key={fruit}
                  index={i}
                  id={`basic_${fruit.toLowerCase()}`}
                  value={fruit}
                  selected={selected === fruit}
                  flex
                  spacing="s"
                >
                  {fruit}
                </Selectable>
              ))}
            </SelectableList>
            <div className="value-display">
              {selected ? `Selected: ${selected}` : ""}
            </div>
          </div>
        );
      };

      // ── ReadOnly items ─────────────────────────────────────────────────────────

      const ReadOnlyDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>ReadOnly items</h2>
            <p>
              Items with <code>readOnly</code> show a callout on click instead
              of selecting.
            </p>
            <SelectableList
              action={(v) => {
                setSelected(v);
              }}
            >
              <Selectable
                index={0}
                id="ro_taken"
                value="taken"
                flex
                spacing="s"
                readOnly
                readOnlyMessage={
                  <>
                    This slot is already <strong>taken.</strong>
                  </>
                }
              >
                Taken (readonly, custom message)
              </Selectable>
              <Selectable
                index={1}
                id="ro_unavailable"
                value="unavailable"
                flex
                spacing="s"
                readOnly
              >
                Unavailable (readonly, default message)
              </Selectable>
              <Selectable
                index={2}
                id="ro_apple"
                value="Apple"
                selected={selected === "Apple"}
                flex
                spacing="s"
              >
                Apple (selectable)
              </Selectable>
              <Selectable
                index={3}
                id="ro_banana"
                value="Banana"
                selected={selected === "Banana"}
                flex
                spacing="s"
              >
                Banana (selectable)
              </Selectable>
              <Selectable
                index={4}
                id="ro_cherry"
                value="Cherry"
                selected={selected === "Cherry"}
                flex
                spacing="s"
              >
                Cherry (selectable)
              </Selectable>
            </SelectableList>
            <div className="value-display">
              {selected ? `Selected: ${selected}` : ""}
            </div>
          </div>
        );
      };

      // ── Form integration ───────────────────────────────────────────────────────

      const FormDemo = () => {
        const [selected, setSelected] = useState(null);
        const [submitted, setSubmitted] = useState(null);
        return (
          <div className="demo-section">
            <h2>Form integration</h2>
            <p>
              <code>SelectableList</code> works inside a native{" "}
              <code>&lt;form&gt;</code>. The selected value is submitted under
              the list's <code>name</code>.
            </p>
            <form
              onSubmit={(e) => {
                e.preventDefault();
                const data = new FormData(e.currentTarget);
                setSubmitted(data.get("fruit") ?? "(none)");
              }}
            >
              <SelectableList
                name="fruit"
                action={(v) => {
                  setSelected(v);
                }}
              >
                {FRUITS.map((fruit, i) => (
                  <Selectable
                    key={fruit}
                    index={i}
                    id={`form_${fruit.toLowerCase()}`}
                    value={fruit}
                    selected={selected === fruit}
                    flex
                    spacing="s"
                  >
                    {fruit}
                  </Selectable>
                ))}
              </SelectableList>
              <button
                type="submit"
                style={{
                  marginTop: 12,
                  padding: "6px 16px",
                  cursor: "pointer",
                }}
              >
                Submit
              </button>
            </form>
            <div className="value-display">
              {submitted !== null ? `Submitted: ${submitted}` : ""}
            </div>
          </div>
        );
      };

      // ── Selectable.Input — radio at the start ──────────────────────────────────

      const InputDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>Selectable.Input</h2>
            <p>
              <code>Selectable.Input</code> renders a decorative radio that
              mirrors the selection state. It is purely a visual cue — not
              mandatory — and can be placed anywhere inside the{" "}
              <code>Selectable</code>.
            </p>
            <SelectableList
              action={(v) => {
                setSelected(v);
              }}
            >
              {FRUITS.map((fruit, i) => (
                <Selectable
                  key={fruit}
                  index={i}
                  id={`input_${fruit.toLowerCase()}`}
                  value={fruit}
                  selected={selected === fruit}
                  flex
                  spacing="s"
                >
                  <Selectable.Input />
                  {fruit}
                </Selectable>
              ))}
            </SelectableList>
            <div className="value-display">
              {selected ? `Selected: ${selected}` : ""}
            </div>
          </div>
        );
      };

      // ── Custom icon input at the end ───────────────────────────────────────────

      const CircleIcon = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <circle
            cx="12"
            cy="12"
            r="9"
            stroke="currentColor"
            stroke-width="2.5"
          />
        </svg>
      );

      const CheckIcon = () => (
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
      );

      const IconInputDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>Custom icons</h2>
            <p>
              Pass <code>icons={`{[uncheckedIcon, checkedIcon]}`}</code> to{" "}
              <code>Selectable.Input</code> to render custom icons instead of
              the default radio mark. Here the input is placed at the{" "}
              <em>end</em> to show it can go anywhere.
            </p>
            <SelectableList
              action={(v) => {
                setSelected(v);
              }}
            >
              {FRUITS.map((fruit, i) => (
                <Selectable
                  key={fruit}
                  index={i}
                  id={`icon_${fruit.toLowerCase()}`}
                  value={fruit}
                  selected={selected === fruit}
                  flex
                  spacing="s"
                  expandX
                  alignY="center"
                >
                  <span style={{ flex: 1 }}>{fruit}</span>
                  <Selectable.Input icons={[<CircleIcon />, <CheckIcon />]} />
                </Selectable>
              ))}
            </SelectableList>
            <div className="value-display">
              {selected ? `Selected: ${selected}` : ""}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
