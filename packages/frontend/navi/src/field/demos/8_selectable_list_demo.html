<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selectable List Demo</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 40px 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 32px;
        color: #333;
        font-size: 1.8rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 32px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 8px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.1rem;
        border-bottom: 2px solid #eee;
      }

      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .value-display {
        min-height: 24px;
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }

      /* Icon radio styles */
      .icon-radio {
        display: flex;
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        align-items: center;
        justify-content: center;
        background: white;
        border: 2px solid #ccc;
        border-radius: 6px;
        transition:
          border-color 0.15s,
          background 0.15s;
        pointer-events: none;
      }
      [data-selected] .icon-radio {
        color: white;
        background: #1a73e8;
        border-color: #1a73e8;
      }
    </style>
  </head>
  <body>
    <h1>Selectable List Demo</h1>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Box, NaviDebug, SelectableList, Selectable } from "@jsenv/navi";

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <BasicDemo />
            <ReadOnlyDemo />
            <InputDemo />
            <IconInputDemo />
          </NaviDebug>
        );
      };

      // ── 1. Basic selectable list (no input shown) ──────────────────────────────

      const FRUITS = ["Apple", "Banana", "Cherry", "Date", "Elderberry"];

      const BasicDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>Basic selectable list</h2>
            <p>
              A plain list of selectable items. No <code>Selectable.Input</code>{" "}
              is used — only text is shown inside each item.
            </p>
            <SelectableList
              action={(v) => {
                setSelected(v);
              }}
            >
              {FRUITS.map((fruit, i) => (
                <Selectable
                  key={fruit}
                  index={i}
                  id={`basic_${fruit.toLowerCase()}`}
                  value={fruit}
                  selected={selected === fruit}
                  flex
                  spacing="s"
                >
                  {fruit}
                </Selectable>
              ))}
            </SelectableList>
            <div className="value-display">
              {selected ? `Selected: ${selected}` : ""}
            </div>
          </div>
        );
      };

      // ── 2. ReadOnly items ──────────────────────────────────────────────────────

      const ReadOnlyDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>ReadOnly items</h2>
            <p>
              Items with <code>readOnly</code> show a callout on click instead
              of selecting.
            </p>
            <SelectableList
              action={(v) => {
                setSelected(v);
              }}
            >
              <Selectable
                index={0}
                id="ro_taken"
                value="taken"
                flex
                spacing="s"
                readOnly
                readOnlyMessage={
                  <>
                    This slot is already <strong>taken.</strong>
                  </>
                }
              >
                Taken (readonly, custom message)
              </Selectable>
              <Selectable
                index={1}
                id="ro_unavailable"
                value="unavailable"
                flex
                spacing="s"
                readOnly
              >
                Unavailable (readonly, default message)
              </Selectable>
              <Selectable
                index={2}
                id="ro_apple"
                value="Apple"
                selected={selected === "Apple"}
                flex
                spacing="s"
              >
                Apple (selectable)
              </Selectable>
              <Selectable
                index={3}
                id="ro_banana"
                value="Banana"
                selected={selected === "Banana"}
                flex
                spacing="s"
              >
                Banana (selectable)
              </Selectable>
              <Selectable
                index={4}
                id="ro_cherry"
                value="Cherry"
                selected={selected === "Cherry"}
                flex
                spacing="s"
              >
                Cherry (selectable)
              </Selectable>
            </SelectableList>
            <div className="value-display">
              {selected ? `Selected: ${selected}` : ""}
            </div>
          </div>
        );
      };

      // ── 3. Selectable.Input — radio at the start ───────────────────────────────

      const InputDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>With Selectable.Input (radio at start)</h2>
            <p>
              <code>Selectable.Input</code> renders a decorative radio that
              mirrors the selection state. It is not mandatory — it is purely a
              visual cue and can be placed anywhere inside the{" "}
              <code>Selectable</code>.
            </p>
            <SelectableList
              action={(v) => {
                setSelected(v);
              }}
            >
              {FRUITS.map((fruit, i) => (
                <Selectable
                  key={fruit}
                  index={i}
                  id={`input_${fruit.toLowerCase()}`}
                  value={fruit}
                  selected={selected === fruit}
                  flex
                  spacing="s"
                >
                  <Selectable.Input />
                  {fruit}
                </Selectable>
              ))}
            </SelectableList>
            <div className="value-display">
              {selected ? `Selected: ${selected}` : ""}
            </div>
          </div>
        );
      };

      // ── 4. Custom icon input at the end ───────────────────────────────────────

      const CheckIcon = () => (
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
      );

      const IconInputDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>Custom icon input (at end)</h2>
            <p>
              <code>Selectable.Input</code> can be replaced by any decorative
              element. Here a custom icon badge is placed at the <em>end</em> of
              each item to indicate selection.
            </p>
            <SelectableList
              action={(v) => {
                setSelected(v);
              }}
            >
              {FRUITS.map((fruit, i) => (
                <Selectable
                  key={fruit}
                  index={i}
                  id={`icon_${fruit.toLowerCase()}`}
                  value={fruit}
                  selected={selected === fruit}
                  flex
                  spacing="s"
                  expandX
                  alignY="center"
                >
                  <span style={{ flex: 1 }}>{fruit}</span>
                  <span className="icon-radio">
                    {selected === fruit ? <CheckIcon /> : null}
                  </span>
                </Selectable>
              ))}
            </SelectableList>
            <div className="value-display">
              {selected ? `Selected: ${selected}` : ""}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
