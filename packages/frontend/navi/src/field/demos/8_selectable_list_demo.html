<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Demo</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 40px 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 32px;
        color: #333;
        font-size: 1.8rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 32px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 8px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.1rem;
        border-bottom: 2px solid #eee;
      }

      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .value-display {
        min-height: 24px;
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }
    </style>
  </head>
  <body>
    <h1>List Demo</h1>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Box, NaviDebug, SelectableList, Selectable } from "@jsenv/navi";

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <ReadOnlyDemo />
          </NaviDebug>
        );
      };

      // ── ReadOnly items demo ────────────────────────────────────────────────────

      const ReadOnlyDemo = () => {
        const [selected, setSelected] = useState(null);
        const [log, setLog] = useState([]);
        const addLog = (msg) => {
          setLog((prev) => [...prev.slice(-4), msg]);
        };
        return (
          <div className="demo-section">
            <h2>ReadOnly items</h2>
            <p>
              Items with <code>readOnly</code> show a callout on click instead
              of selecting. The <code>uiAction</code> and <code>action</code>{" "}
              callbacks must NOT be called for readonly items.
            </p>

            <SelectableList
              // name="fruits"
              action={(v) => {
                addLog(`action called with: "${v}"`);
                setSelected(v);
              }}
            >
              <Selectable
                index={0}
                id="readonly_default"
                value="readonly_default"
                flex
                spacing="s"
                readOnly
              >
                <Selectable.Input />
                Readonly (default message)
              </Selectable>
              <Selectable
                index={1}
                id="readonly_custom"
                value="readonly_custom"
                flex
                spacing="s"
                readOnly
                readOnlyMessage={
                  <>
                    Ce créneau est déjà <strong>réservé.</strong>
                  </>
                }
              >
                <Selectable.Input />
                Readonly (custom message)
              </Selectable>
              <Selectable
                index={2}
                id="apple"
                value="Apple"
                selected={selected === "Apple"}
                flex
                spacing="s"
              >
                <Selectable.Input />
                Apple (clickable)
              </Selectable>
              <Selectable
                index={3}
                id="banana"
                value="Banana"
                selected={selected === "Bannana"}
                flex
                spacing="s"
              >
                <Selectable.Input />
                Banana (clickable)
              </Selectable>
            </SelectableList>
            <div
              className="value-display"
              style={{ minHeight: 60, whiteSpace: "pre-line" }}
            >
              {log.length === 0 ? "(no callbacks fired yet)" : log.join("\n")}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
