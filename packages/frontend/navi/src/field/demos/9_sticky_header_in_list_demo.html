<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Header in List Demo</title>
    <style>
      body {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 24px;
        color: #333;
        font-size: 1.8rem;
        text-align: center;
      }

      .stats-bar {
        display: flex;
        margin-bottom: 12px;
        padding: 10px 14px;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
        color: #d4d4d4;
        font-size: 0.85rem;
        font-family: monospace;
        background: #1e1e1e;
        border-radius: 6px;
      }

      .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .stat-label {
        color: #888;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .stat-value {
        font-weight: bold;
        font-size: 1.1rem;
      }

      .stat-value.highlight {
        color: #4ec9b0;
      }

      .stat-value.warning {
        color: #ce9178;
      }

      .scroll-container {
        height: 400px;
        background: white;
        border: 2px solid #ccc;
        border-radius: 8px;
        overflow: auto;
      }

      .section-before,
      .section-after {
        padding: 20px;
        background: #f0f4ff;
      }

      .section-before {
        border-bottom: 2px dashed #b0c4f8;
      }

      .section-after {
        border-top: 2px dashed #b0c4f8;
      }

      .section-before h3,
      .section-after h3 {
        margin: 0 0 6px;
        color: #3a5bc7;
        font-size: 1rem;
      }

      .section-before p,
      .section-after p {
        margin: 0;
        color: #666;
        font-size: 0.85rem;
      }

      .sticky-header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 8px;
        background: white;
        border-bottom: 1px solid #e0e0e0;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      }

      .sticky-header input {
        box-sizing: border-box;
        width: 100%;
        padding: 6px 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      .sticky-header input:focus {
        border-color: transparent;
        outline: 2px solid #005fcc;
        outline-offset: -1px;
      }

      .value-display {
        min-height: 20px;
        margin-top: 12px;
        padding: 8px;
        color: #555;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Sticky Header in List Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useEffect, useRef } from "preact/hooks";
      import { SuggestionList, Suggestion } from "@jsenv/navi";

      // 100 items — every 5th is very wide to test horizontal scroll with sticky header
      const ITEMS = Array.from({ length: 100 }, (_, i) => {
        const names = [
          "Alpha",
          "Bravo",
          "Charlie",
          "Delta",
          "Echo",
          "Foxtrot",
          "Golf",
          "Hotel",
          "India",
          "Juliet",
        ];
        const base = names[i % names.length];
        const num = String(Math.floor(i / names.length) + 1).padStart(2, "0");
        const isWide = i % 5 === 4;
        const suffix = isWide
          ? " — This is a deliberately very long label to force horizontal scroll and test sticky header behaviour"
          : "";
        return `${base}-${num}${suffix}`;
      });

      const StatsBar = ({ totalItems, visibleItems, domItems }) => {
        const savedFromDom = visibleItems - domItems;
        return (
          <div className="stats-bar">
            <div className="stat">
              <span className="stat-label">Total items</span>
              <span className="stat-value">{totalItems}</span>
            </div>
            <div className="stat">
              <span className="stat-label">Visible (filter)</span>
              <span className="stat-value">{visibleItems}</span>
            </div>
            <div className="stat">
              <span className="stat-label">In DOM</span>
              <span
                className={`stat-value ${domItems < visibleItems ? "highlight" : ""}`}
              >
                {domItems}
              </span>
            </div>
            <div className="stat">
              <span className="stat-label">Saved from DOM</span>
              <span
                className={`stat-value ${savedFromDom > 0 ? "warning" : ""}`}
              >
                {savedFromDom}
              </span>
            </div>
          </div>
        );
      };

      const App = () => {
        const [filter, setFilter] = useState("");
        const [selected, setSelected] = useState(null);
        const [domItems, setDomItems] = useState(0);
        const listRef = useRef(null);

        const visible = filter
          ? ITEMS.filter((item) =>
              item.toLowerCase().includes(filter.toLowerCase()),
            )
          : ITEMS;

        // Track actual DOM option count via MutationObserver
        useEffect(() => {
          const updateCount = () => {
            if (!listRef.current) {
              return;
            }
            setDomItems(
              listRef.current.querySelectorAll("[role='option']").length,
            );
          };
          updateCount();
          const observer = new MutationObserver(updateCount);
          if (listRef.current) {
            observer.observe(listRef.current, {
              childList: true,
              subtree: true,
            });
          }
          return () => {
            observer.disconnect();
          };
        }, []);

        return (
          <div>
            <p
              style={{
                fontSize: "0.9rem",
                color: "#555",
                marginBottom: "12px",
              }}
            >
              The filter input lives <em>inside</em> the suggestion list as a
              sticky header. The list has no <code>max-height</code> — the
              parent container scrolls instead. The render budget is 20 out of
              100 items. Wide items (every 5th) test horizontal-scroll + sticky
              interaction.
            </p>

            <StatsBar
              totalItems={ITEMS.length}
              visibleItems={visible.length}
              domItems={domItems}
            />

            {/* The parent handles scrolling */}
            <div className="scroll-container">
              {/* Content before the list */}
              <div className="section-before">
                <h3>Section above the list</h3>
                <p>
                  This content sits above the suggestion list inside the same
                  scroll container. Scroll down to reach the list.
                </p>
              </div>

              {/* SuggestionList with no max-height — parent scroll container scrolls */}
              <SuggestionList
                ref={listRef}
                uiAction={setSelected}
                renderBudget={20}
                expandX
              >
                {/* Sticky filter header — rendered as a <li role="presentation"> inside the <ul> */}
                <li className="sticky-header" role="presentation">
                  <input
                    type="search"
                    placeholder="Filter…"
                    value={filter}
                    onInput={(e) => {
                      setFilter(e.target.value);
                    }}
                  />
                </li>

                {visible.map((item) => (
                  <Suggestion
                    key={item}
                    value={item}
                    selected={selected === item}
                  >
                    {item}
                  </Suggestion>
                ))}
              </SuggestionList>

              {/* Content after the list */}
              <div className="section-after">
                <h3>Section below the list</h3>
                <p>
                  This content sits below the suggestion list inside the same
                  scroll container.
                </p>
              </div>
            </div>

            <div className="value-display">
              {selected ? `Selected: ${selected}` : "(none selected)"}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
