<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Picker Color Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 4px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
      .states-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: start;
        gap: 16px;
      }
      .states-col-header {
        margin-bottom: 12px;
        color: #888;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Color Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Field,
        Label,
        Picker,
        Form,
        Button,
        NaviDebug,
      } from "@jsenv/navi";

      const App = () => (
        <Box flex="y" spacing="l">
          <StatesDemo />
          <WithActionDemo />
          <InFormDemo />
          <ValidationDemo />
          <CustomizationDemo />
        </Box>
      );

      // ── 1. États ──────────────────────────────────────────────────────────

      const StatesDemo = () => {
        const colorSignal = useSignal("#4caf50");
        return (
          <div class="demo-section">
            <h2>1. États</h2>
            <p class="desc">
              Comparaison jsenv Picker vs native{" "}
              <code>&lt;input type="color"&gt;</code> pour chaque état.
            </p>
            <div class="states-grid">
              <div>
                <div class="states-col-header">jsenv Picker</div>
                <Box flex="y" spacing="s">
                  <Field vertical>
                    <Label>Normal</Label>
                    <Picker
                      name="color_normal"
                      type="color"
                      value={colorSignal.value}
                      action={(v) => {
                        colorSignal.value = v;
                      }}
                    />
                  </Field>
                  <Field vertical>
                    <Label>Readonly</Label>
                    <Picker
                      name="color_readonly"
                      type="color"
                      value={colorSignal.value}
                      readOnly
                      action={() => {}}
                    />
                  </Field>
                  <Field vertical>
                    <Label>Disabled</Label>
                    <Picker
                      name="color_disabled"
                      type="color"
                      value={colorSignal.value}
                      action={() => {}}
                      disabled
                    />
                  </Field>
                  <Field vertical>
                    <Label>Loading</Label>
                    <Picker
                      name="color_loading"
                      type="color"
                      value={colorSignal.value}
                      action={() => {}}
                      loading
                    />
                  </Field>
                </Box>
              </div>
              <div>
                <div class="states-col-header">Native</div>
                <Box flex="y" spacing="s">
                  <Field vertical>
                    <Label>Normal</Label>
                    <input
                      type="color"
                      value={colorSignal.value}
                      onInput={(e) => {
                        colorSignal.value = e.target.value;
                      }}
                    />
                  </Field>
                  <Field vertical>
                    <Label>Readonly</Label>
                    <input type="color" value={colorSignal.value} readOnly />
                  </Field>
                  <Field vertical>
                    <Label>Disabled</Label>
                    <input type="color" value={colorSignal.value} disabled />
                  </Field>
                  <Field vertical>
                    <Label>Loading (n/a)</Label>
                    <input type="color" value={colorSignal.value} disabled />
                  </Field>
                </Box>
              </div>
            </div>
            <p class="value-display">
              Couleur sélectionnée :{" "}
              <strong
                style={{
                  color: colorSignal.value,
                  background: "#eee",
                  padding: "0 4px",
                  borderRadius: "3px",
                }}
              >
                {colorSignal.value}
              </strong>
            </p>
          </div>
        );
      };

      // ── 2. Avec une action ────────────────────────────────────────────────

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const WithActionDemo = () => {
        const colorSignal = useSignal("#3b82f6");
        const savedColorSignal = useSignal("#3b82f6");
        const logSignal = useSignal([]);

        const appendLog = (msg) => {
          logSignal.value = [...logSignal.value.slice(-4), msg];
        };

        return (
          <div class="demo-section">
            <h2>2. Avec une action</h2>
            <p class="desc">
              L'action est asynchrone (simule un appel réseau de 800 ms). Le
              picker passe en état loading pendant ce temps.
            </p>
            <Box flex="y" spacing="s" alignX="start">
              <Field vertical>
                <Label>Couleur du thème</Label>
                <Picker
                  name="theme_color"
                  type="color"
                  value={colorSignal.value}
                  action={async (v) => {
                    appendLog(`→ saving ${v}…`);
                    await sleep(800);
                    colorSignal.value = v;
                    savedColorSignal.value = v;
                    appendLog(`✓ saved ${v}`);
                  }}
                />
              </Field>
              <p class="value-display">
                Dernière valeur sauvegardée :{" "}
                <strong style={{ color: savedColorSignal.value }}>
                  {savedColorSignal.value}
                </strong>
              </p>
              {logSignal.value.length > 0 && (
                <pre style="margin:0;font-size:12px;background:#f0f0f0;padding:8px;border-radius:4px;width:100%;box-sizing:border-box;">
                  {logSignal.value.join("\n")}
                </pre>
              )}
            </Box>
          </div>
        );
      };

      // ── 3. Dans un form ───────────────────────────────────────────────────

      const InFormDemo = () => {
        const submittedSignal = useSignal(null);
        return (
          <div class="demo-section">
            <h2>3. Dans un form</h2>
            <p class="desc">
              Le picker participe à la soumission du formulaire comme n'importe
              quel champ.
            </p>
            <Form
              action={(values) => {
                submittedSignal.value = values;
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Couleur principale</Label>
                <Picker
                  name="primary_color"
                  type="color"
                  placeholder="Choisir une couleur"
                />
              </Field>
              <Field vertical>
                <Label>Couleur secondaire</Label>
                <Picker
                  name="secondary_color"
                  type="color"
                  placeholder="Choisir une couleur"
                />
              </Field>
              <Button type="submit">Soumettre</Button>
              {submittedSignal.value && (
                <pre style="margin:0;font-size:12px;background:#f0f0f0;padding:8px;border-radius:4px;width:100%;box-sizing:border-box;">
                  {JSON.stringify(submittedSignal.value, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      // ── 4. Validation dans un form (required) ─────────────────────────────

      const ValidationDemo = () => {
        const submittedSignal = useSignal(null);
        return (
          <div class="demo-section">
            <h2>4. Validation dans un form (required)</h2>
            <p class="desc">
              Champ obligatoire — la soumission échoue si aucune couleur n'est
              choisie.
            </p>
            <Form
              action={(values) => {
                submittedSignal.value = values;
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Couleur (obligatoire)</Label>
                <Picker
                  name="required_color"
                  type="color"
                  required
                  placeholder="Choisir une couleur"
                />
              </Field>
              <Field vertical>
                <Label>Couleur (message personnalisé)</Label>
                <Picker
                  name="required_color_custom"
                  type="color"
                  required
                  data-required-message="Merci de choisir une couleur."
                  placeholder="Choisir une couleur"
                />
              </Field>
              <Button type="submit">Soumettre</Button>
              {submittedSignal.value && (
                <pre style="margin:0;font-size:12px;background:#f0f0f0;padding:8px;border-radius:4px;width:100%;box-sizing:border-box;">
                  {JSON.stringify(submittedSignal.value, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      // ── 5. Customization ──────────────────────────────────────────────────

      const SWATCHES = [
        { label: "Rouge", value: "#ef4444" },
        { label: "Orange", value: "#f97316" },
        { label: "Jaune", value: "#eab308" },
        { label: "Vert", value: "#22c55e" },
        { label: "Bleu", value: "#3b82f6" },
        { label: "Violet", value: "#a855f7" },
        { label: "Rose", value: "#ec4899" },
      ];

      const CustomizationDemo = () => {
        const colorSignal = useSignal(null);
        return (
          <div class="demo-section">
            <h2>5. Customization</h2>
            <p class="desc">
              On passe des enfants au Picker pour remplacer le sélecteur natif
              par une palette de swatches personnalisée.{" "}
              <code>Picker.update(value, event)</code> met à jour la valeur et{" "}
              <code>Picker.close(event)</code> ferme le popover/dialog.
            </p>
            <Field vertical>
              <Label>Couleur de badge</Label>
              <Picker
                name="badge_color"
                type="color"
                value={colorSignal.value}
                action={(v) => {
                  colorSignal.value = v;
                }}
                placeholder="Choisir une couleur"
              >
                <Box flex="y" padding="s" spacing="xs">
                  {SWATCHES.map(({ label, value }) => (
                    <button
                      key={value}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: "10px",
                        width: "100%",
                        padding: "6px 10px",
                        background:
                          colorSignal.value === value ? "#f0f0f0" : "none",
                        border: "none",
                        borderRadius: "4px",
                        cursor: "pointer",
                        fontSize: "14px",
                        textAlign: "left",
                      }}
                      onClick={(e) => {
                        Picker.update(value, e);
                        Picker.close(e);
                      }}
                    >
                      <span
                        style={{
                          display: "inline-block",
                          width: "20px",
                          height: "20px",
                          borderRadius: "50%",
                          background: value,
                          border: "1px solid rgba(0,0,0,0.15)",
                          flexShrink: 0,
                        }}
                      />
                      {label}
                    </button>
                  ))}
                </Box>
              </Picker>
            </Field>
            <p class="value-display">
              Valeur :{" "}
              {colorSignal.value ? (
                <strong style={{ color: colorSignal.value }}>
                  {colorSignal.value}
                </strong>
              ) : (
                <span style={{ color: "#999" }}>—</span>
              )}
            </p>
          </div>
        );
      };

      render(
        <NaviDebug debugAction debugInteraction>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
