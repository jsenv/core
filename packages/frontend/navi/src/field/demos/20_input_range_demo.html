<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Range Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      fieldset {
        margin: 15px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      legend {
        padding: 0 10px;
        color: #555;
        font-weight: 500;
        white-space: nowrap;
      }

      .range-group {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .states-section {
        margin: 20px 0;
      }

      .states-title {
        margin: 0 0 15px 0;
        padding: 8px 12px;
        color: #495057;
        font-weight: 600;
        font-size: 0.95rem;
        text-align: center;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border: 1px solid #dee2e6;
        border-radius: 6px;
      }

      .enhanced-states-title {
        color: #1565c0;
        background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
        border-color: #2196f3;
      }

      .states-description {
        margin: 10px 0 15px 0;
        padding: 10px 15px;
        color: #666;
        font-style: italic;
        font-size: 0.9rem;
        background: #f8f9fa;
        border-left: 4px solid #007bff;
        border-radius: 0 4px 4px 0;
      }

      .value-display {
        min-width: 60px;
        padding: 4px 8px;
        color: #666;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      /* Custom thumb styles for native inputs */
      .small-thumb-range::-webkit-slider-thumb {
        width: 14px;
        height: 14px;
        background: #ff6b35;
        border: none;
        border-radius: 50%;
        -webkit-appearance: none;
        cursor: pointer;
      }

      .large-thumb-range::-webkit-slider-thumb {
        width: 24px;
        height: 24px;
        background: #4a90e2;
        border: none;
        border-radius: 50%;
        -webkit-appearance: none;
        cursor: pointer;
      }

      .square-thumb-range,
      .large-thumb-range,
      .small-thumb-range {
        --webkit-appearance: none;
        background: blue;
        border-radius: 6px;
        appearance: none;
      }
      .square-thumb-range::-webkit-slider-thumb {
        width: 20px;
        height: 20px;
        background: #9b59b6;
        border: none;
        border-radius: 3px;
        -webkit-appearance: none;
        cursor: pointer;
      }

      /* Firefox styles */
      .small-thumb-range::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: #ff6b35;
        border: none;
        border-radius: 50%;
        cursor: pointer;
      }

      .large-thumb-range::-moz-range-thumb {
        width: 24px;
        height: 24px;
        background: #4a90e2;
        border: none;
        border-radius: 50%;
        cursor: pointer;
      }

      .square-thumb-range::-moz-range-thumb {
        width: 20px;
        height: 20px;
        background: #9b59b6;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Input Range Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Box,
        Input,
        NaviDebug,
        route,
        setupRoutes,
        stateSignal,
      } from "@jsenv/navi";

      const basicDefaultSignal = stateSignal(50, {
        id: "basic_default",
        type: "number",
        min: 0,
        max: 100,
      });
      const focusValueSignal = stateSignal(30, {
        id: "focus_value",
        type: "number",
        min: 0,
        max: 100,
      });
      const immediateRadiusSignal = stateSignal(50, {
        id: "immediate_radius",
        type: "number",
        min: 10,
        max: 100,
      });
      const slowRadiusSignal = stateSignal(50, {
        id: "slow_radius",
        type: "number",
        min: 10,
        max: 100,
      });
      const debouncedRadiusSignal = stateSignal(50, {
        id: "debounced_radius",
        type: "number",
        min: 10,
        max: 100,
      });
      const redValueSignal = stateSignal(25, {
        id: "red_value",
        type: "number",
        min: 0,
        max: 100,
      });
      const greenValueSignal = stateSignal(50, {
        id: "green_value",
        type: "number",
        min: 0,
        max: 100,
      });
      const smallThumbSignal = stateSignal(30, {
        id: "small_thumb",
        type: "number",
        min: 0,
        max: 100,
      });
      const largeThumbSignal = stateSignal(70, {
        id: "large_thumb",
        type: "number",
        min: 0,
        max: 100,
      });

      const DEMO_ROUTE = route("", {
        searchParams: {
          basic_default: basicDefaultSignal,
          focus_value: focusValueSignal,
          immediate_radius: immediateRadiusSignal,
          slow_radius: slowRadiusSignal,
          debounced_radius: debouncedRadiusSignal,
          red_value: redValueSignal,
          green_value: greenValueSignal,
          small_thumb: smallThumbSignal,
          large_thumb: largeThumbSignal,
        },
      });
      setupRoutes([DEMO_ROUTE]);

      const App = () => {
        return (
          <NaviDebug debugInteraction debugAction>
            <div>
              <BasicStatesDemo />
              <FocusStatesDemo />
              <ActionHandlingDemo />
              <ColorVariationsDemo />
              <ThumbCustomizationDemo />
            </div>
          </NaviDebug>
        );
      };

      const BasicStatesDemo = () => {
        const [disabledValue] = useState(75);

        return (
          <div className="demo-section">
            <h2>Range Input States</h2>

            <div className="states-section">
              <div className="states-title">
                Standard HTML Range Input States
              </div>
              <p className="states-description">
                These states work exactly like user agent HTML range inputs,
                with enhanced styling and consistent behavior.
              </p>

              <Box column spacing="sm">
                <fieldset>
                  <legend>Default</legend>
                  <Box row spacing="sm" alignX="start">
                    <div className="range-group">
                      <Input
                        type="range"
                        value={basicDefaultSignal}
                        action={(v) => {
                          basicDefaultSignal.value = v;
                        }}
                        min="0"
                        max="100"
                      />
                      <div className="value-display">{basicDefaultSignal}</div>
                    </div>
                    <div className="range-group">
                      <input
                        type="range"
                        value={basicDefaultSignal.value}
                        onChange={(e) => {
                          basicDefaultSignal.value = Number(e.target.value);
                        }}
                        min="0"
                        max="100"
                      />
                      <div className="value-display">{basicDefaultSignal}</div>
                    </div>
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:disabled</legend>
                  <Box row spacing="sm" alignX="start">
                    <div className="range-group">
                      <Input
                        type="range"
                        value={disabledValue}
                        min="0"
                        max="100"
                        disabled
                        action={() => {}}
                      />
                      <div className="value-display">{disabledValue}</div>
                    </div>
                    <div className="range-group">
                      <input
                        type="range"
                        value={disabledValue}
                        min="0"
                        max="100"
                        disabled
                      />
                      <div className="value-display">{disabledValue}</div>
                    </div>
                  </Box>
                </fieldset>
              </Box>
            </div>

            <div className="states-section">
              <div className="states-title enhanced-states-title">
                Enhanced Navi States
              </div>
              <p className="states-description">
                These additional states provide enhanced UX patterns not
                available in standard HTML range inputs.
              </p>

              <Box column spacing="sm">
                <fieldset>
                  <legend>:read-only</legend>
                  <Box row spacing="sm" alignX="start">
                    <div className="range-group">
                      <Input
                        type="range"
                        value="60"
                        min="0"
                        max="100"
                        readOnly
                        action={() => {}}
                      />
                      <div className="value-display">60</div>
                    </div>
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:-navi-loading</legend>
                  <Box row spacing="sm" alignX="start">
                    <div className="range-group">
                      <Input
                        type="range"
                        value="40"
                        min="0"
                        max="100"
                        loading
                        action={() => {}}
                      />
                      <div className="value-display">40</div>
                    </div>
                  </Box>
                </fieldset>
              </Box>

              <div
                style={{
                  marginTop: "15px",
                  padding: "10px",
                  background: "#f8f9fa",
                  borderRadius: "4px",
                  fontSize: "0.85rem",
                  color: "#666",
                }}
              >
                <strong>Enhanced State Explanations:</strong>
                <ul style={{ margin: "5px 0", paddingLeft: "20px" }}>
                  <li>
                    <strong>Read-only:</strong> Visually indicates the range
                    cannot be changed, but remains focusable for accessibility
                  </li>
                  <li>
                    <strong>Loading:</strong> Shows a loader overlay while
                    maintaining the range's accessibility and preventing
                    interaction
                  </li>
                </ul>
              </div>
            </div>
          </div>
        );
      };

      const FocusStatesDemo = () => {
        return (
          <div className="demo-section">
            <h2>Focus States</h2>
            <p className="states-description">
              Focus states are crucial for accessibility and keyboard
              navigation. Read-only and loading ranges maintain their ability to
              receive focus, allowing screen readers and keyboard users to
              access them.
            </p>

            <Box column spacing="sm">
              <fieldset>
                <legend>:focus-visible</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value={focusValueSignal}
                      action={(v) => {
                        focusValueSignal.value = v;
                      }}
                      min="0"
                      max="100"
                      pseudoState={{ ":focus-visible": true }}
                    />
                    <div className="value-display">{focusValueSignal}</div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value={focusValueSignal.value}
                      onChange={(e) => {
                        focusValueSignal.value = Number(e.target.value);
                      }}
                      min="0"
                      max="100"
                      autoFocus
                    />
                    <div className="value-display">{focusValueSignal}</div>
                  </div>
                </Box>
              </fieldset>
            </Box>

            <Box column spacing="sm">
              <fieldset>
                <legend>:read-only + :focus-visible</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value="45"
                      min="0"
                      max="100"
                      readOnly
                      action={() => {}}
                      pseudoState={{ ":focus-visible": true }}
                    />
                    <div className="value-display">45</div>
                  </div>
                </Box>
              </fieldset>
              <fieldset>
                <legend>:-navi-loading + :focus-visible</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value="75"
                      min="0"
                      max="100"
                      loading
                      action={() => {}}
                      pseudoState={{ ":focus-visible": true }}
                    />
                    <div className="value-display">75</div>
                  </div>
                </Box>
              </fieldset>
            </Box>

            <div
              style={{
                marginTop: "15px",
                padding: "10px",
                background: "#f8f9fa",
                borderRadius: "4px",
                fontSize: "0.85rem",
                color: "#666",
              }}
            >
              <strong>Focus Accessibility:</strong>
              <p style={{ margin: "5px 0" }}>
                Read-only ranges maintain their ability to receive keyboard
                focus, which is essential for accessibility. This allows screen
                reader users and keyboard-only users to navigate to and
                understand the current value of the range input, even when they
                cannot modify it.
              </p>
              <p style={{ margin: "5px 0 0 0" }}>
                Loading ranges are typically both read-only and focusable,
                providing feedback about their state while maintaining
                accessibility.
              </p>
            </div>
          </div>
        );
      };

      const ActionHandlingDemo = () => {
        const [immediateCallCount, setImmediateCallCount] = useState(0);
        const [slowCallCount, setSlowCallCount] = useState(0);
        const [debouncedCallCount, setDebouncedCallCount] = useState(0);

        const slowAction = async (value, setter, counter, setCounter) => {
          setCounter((c) => c + 1);
          await new Promise((resolve) => setTimeout(resolve, 1500));
          setter(value);
        };

        const CircleVisualization = ({ radius, label, callCount }) => {
          const circleMaxRadius = 100 * 0.2;
          const circleRadius = radius * 0.2;
          return (
            <Box row>
              <Box
                row
                relative
                align="center"
                width={circleMaxRadius}
                height={circleMaxRadius}
                background="#eee"
              >
                <Box
                  width={circleRadius}
                  height={circleRadius}
                  circle
                  background="linear-gradient(135deg, #007bff, #0056b3)"
                />
              </Box>
              <Box>
                <div style={{ fontSize: "0.8rem", color: "#666" }}>{label}</div>
                <div style={{ fontSize: "0.75rem", color: "#999" }}>
                  Radius: {radius}px | Calls: {callCount}
                </div>
              </Box>
            </Box>
          );
        };

        const AfterChangeDemo = () => {
          const [uiValue, setUIValue] = useState(50); // Immediate UI state
          const [processedRadius, setProcessedRadius] = useState(50); // Async processed state
          const [afterChangeCallCount, setAfterChangeCallCount] = useState(0);

          return (
            <fieldset>
              <legend>Action After Change with Separate UI State</legend>
              <p className="states-description">
                Using <code>uiAction</code> for immediate UI updates and{" "}
                <code>actionAfterChange</code>
                for async processing. The slider shows the current UI value
                instantly, but the circle radius represents the processed result
                updated only after the action completes.
              </p>
              <Box column spacing="sm">
                <Input
                  type="range"
                  min="10"
                  max="100"
                  value={uiValue}
                  onInput={(e) => {
                    // Immediate UI update
                    setUIValue(e.target.valueAsNumber);
                  }}
                  action={(value) => {
                    // Async processing - only updates processed state
                    return slowAction(
                      value,
                      setProcessedRadius,
                      afterChangeCallCount,
                      setAfterChangeCallCount,
                    );
                  }}
                  actionAfterChange
                />
                <Box flex spacing="s">
                  <div
                    style={{
                      fontSize: "0.85rem",
                      color: "#666",
                      textAlign: "center",
                    }}
                  >
                    UI Value: {uiValue}px (immediate)
                  </div>
                  <CircleVisualization
                    radius={processedRadius}
                    label="Processed Radius (updates after action completes)"
                    callCount={afterChangeCallCount}
                  />
                </Box>
              </Box>
            </fieldset>
          );
        };

        return (
          <div className="demo-section">
            <h2>Action Handling</h2>

            <fieldset>
              <legend>Immediate Action</legend>
              <p className="states-description">
                Basic action called immediately on every input value change.
              </p>
              <Box column spacing="sm" alignX="start" alignY="center">
                <Input
                  type="range"
                  min="10"
                  max="100"
                  value={immediateRadiusSignal}
                  action={(value) => {
                    immediateRadiusSignal.value = value;
                    setImmediateCallCount((c) => c + 1);
                  }}
                />
                <CircleVisualization
                  radius={immediateRadiusSignal.value}
                  label="Immediate Response"
                  callCount={immediateCallCount}
                />
              </Box>
            </fieldset>

            <fieldset>
              <legend>Slow Action (Poor UX)</legend>
              <p className="states-description">
                When the action takes time, it blocks and creates poor user
                experience.
              </p>
              <Box column spacing="sm">
                <Input
                  type="range"
                  name="slow_action"
                  min="10"
                  max="100"
                  value={slowRadiusSignal}
                  action={(value) =>
                    slowAction(
                      parseInt(value),
                      (v) => {
                        slowRadiusSignal.value = v;
                      },
                      slowCallCount,
                      setSlowCallCount,
                    )
                  }
                />
                <CircleVisualization
                  radius={slowRadiusSignal.value}
                  label="Slow Response (1.5s delay)"
                  callCount={slowCallCount}
                />
              </Box>
            </fieldset>

            <fieldset>
              <legend>Debounced Action (Better UX)</legend>
              <p className="states-description">
                Using <code>actionDebounce={"300"}</code> waits 300ms before
                executing the slow action, making the experience much smoother
                during dragging.
              </p>
              <Box flex spacing="s">
                <Input
                  type="range"
                  min="10"
                  max="100"
                  value={debouncedRadiusSignal}
                  action={(value) =>
                    slowAction(
                      parseInt(value),
                      (v) => {
                        debouncedRadiusSignal.value = v;
                      },
                      debouncedCallCount,
                      setDebouncedCallCount,
                    )
                  }
                  actionDebounce={3000}
                />
                <CircleVisualization
                  radius={debouncedRadiusSignal.value}
                  label="Debounced Response (300ms + 1.5s delay)"
                  callCount={debouncedCallCount}
                />
              </Box>
            </fieldset>

            <AfterChangeDemo />
          </div>
        );
      };

      const ColorVariationsDemo = () => {
        return (
          <div className="demo-section">
            <h2>Color Variations</h2>
            <p className="states-description">
              Range inputs can be styled with different colors. Native inputs
              use CSS <code>accent-color</code>, while Navi's InputRange uses
              the <code>color</code> property for consistent theming.
            </p>

            <Box row spacing="sm">
              <fieldset>
                <legend>Red Theme</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value={redValueSignal}
                      action={(v) => {
                        redValueSignal.value = Number(v);
                      }}
                      min="0"
                      max="100"
                      accentColor="red"
                    />
                    <div className="value-display">{redValueSignal}</div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value={redValueSignal.value}
                      onChange={(e) => {
                        redValueSignal.value = Number(e.target.value);
                      }}
                      min="0"
                      max="100"
                      style={{ accentColor: "red" }}
                    />
                    <div className="value-display">{redValueSignal}</div>
                  </div>
                </Box>
              </fieldset>
              <fieldset>
                <legend>Different Thumb & Track Colors</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value="45"
                      min="0"
                      max="100"
                      uiAction={() => {}}
                      style={{
                        "--thumb-color": "#ff4444",
                        "--track-color": "#4444ff",
                        "--fill-color": "yellow",
                      }}
                    />
                    <div className="value-display">45</div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value="45"
                      min="0"
                      max="100"
                      id="custom_colors_range"
                    />
                    <div className="value-display">45</div>
                  </div>
                </Box>
                <p
                  style={{
                    fontSize: "0.8rem",
                    color: "#666",
                    margin: "8px 0 0 0",
                  }}
                >
                  <strong>Navi:</strong> Uses CSS variables --thumb-color,
                  --track-color, --track-filled-color
                  <br />
                  <strong>Native:</strong> Uses accent-color for thumb +
                  background gradient for track
                </p>
              </fieldset>
              <fieldset>
                <legend>Green Theme</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value={greenValueSignal}
                      action={(v) => {
                        greenValueSignal.value = v;
                      }}
                      min="0"
                      max="100"
                      accentColor="green"
                    />
                    <div className="value-display">{greenValueSignal}</div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value={greenValueSignal.value}
                      onChange={(e) => {
                        greenValueSignal.value = Number(e.target.value);
                      }}
                      min="0"
                      max="100"
                      style={{ accentColor: "green" }}
                    />
                    <div className="value-display">{greenValueSignal}</div>
                  </div>
                </Box>
              </fieldset>
              <fieldset style={{ background: "#1e1e1e" }}>
                <legend style={{ color: "white" }}>White Theme</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value="50"
                      uiAction={() => {}}
                      min="0"
                      max="100"
                      accentColor="white"
                    />
                    <div
                      className="value-display"
                      style={{ background: "black", color: "white" }}
                    >
                      50
                    </div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value="50"
                      onChange={() => {}}
                      min="0"
                      max="100"
                      style={{ accentColor: "white" }}
                    />
                    <div
                      className="value-display"
                      style={{ background: "black", color: "white" }}
                    >
                      50
                    </div>
                  </div>
                </Box>
              </fieldset>
            </Box>
          </div>
        );
      };

      const ThumbCustomizationDemo = () => {
        return (
          <div className="demo-section">
            <h2>Thumb Customization</h2>
            <p className="states-description">
              Customize the slider thumb (draggable handle) size and color. Navi
              uses CSS variables while native inputs use vendor-specific
              pseudo-elements.
            </p>

            <Box row spacing="sm">
              <fieldset>
                <legend>Small Thumb</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value={smallThumbSignal}
                      action={(v) => {
                        smallThumbSignal.value = v;
                      }}
                      min="0"
                      max="100"
                      style={{
                        "--thumb-size": "0.8em",
                        "--thumb-color": "#ff6b35",
                      }}
                    />
                    <div className="value-display">{smallThumbSignal}</div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value={smallThumbSignal.value}
                      onChange={(e) => {
                        smallThumbSignal.value = Number(e.target.value);
                      }}
                      min="0"
                      max="100"
                      className="small-thumb-range"
                    />
                    <div className="value-display">{smallThumbSignal}</div>
                  </div>
                </Box>
              </fieldset>
              <fieldset>
                <legend>Large Thumb</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value={largeThumbSignal}
                      action={(v) => {
                        largeThumbSignal.value = v;
                      }}
                      min="0"
                      max="100"
                      style={{
                        "--thumb-size": "1.5em",
                        "--thumb-color": "#4a90e2",
                      }}
                    />
                    <div className="value-display">{largeThumbSignal}</div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value={largeThumbSignal.value}
                      onChange={(e) => {
                        largeThumbSignal.value = Number(e.target.value);
                      }}
                      min="0"
                      max="100"
                      className="large-thumb-range"
                    />
                    <div className="value-display">{largeThumbSignal}</div>
                  </div>
                </Box>
              </fieldset>
              <fieldset>
                <legend>Square Thumb</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value="50"
                      min="0"
                      uiAction={() => {}}
                      max="100"
                      style={{
                        "--thumb-size": "1.2em",
                        "--thumb-color": "#9b59b6",
                        "--thumb-border-radius": "3px",
                      }}
                    />
                    <div className="value-display">50</div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value="50"
                      min="0"
                      max="100"
                      className="square-thumb-range"
                    />
                    <div className="value-display">50</div>
                  </div>
                </Box>
              </fieldset>
            </Box>
            <p
              style={{
                fontSize: "0.8rem",
                color: "#666",
                margin: "12px 0 0 0",
              }}
            >
              <strong>Navi:</strong> Uses --thumb-size, --thumb-color,
              --thumb-border-radius variables
              <br />
              <strong>Native:</strong> Uses ::-webkit-slider-thumb and
              ::-moz-range-thumb pseudo-elements
            </p>
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>

    <style>
      #custom_colors_range {
        accent-color: #ff4444;
      }

      #custom_colors_range::-webkit-slider-runnable-track {
        height: 6px;
        background: linear-gradient(
          to right,
          #4a90e2 0%,
          #4a90e2 var(--p),
          #bbb var(--p),
          #bbb 100%
        );
        border-radius: 8px;
      }

      #custom_colors_range::-webkit-slider-thumb {
        width: 16px;
        height: 16px;
        margin-top: -5px;
        background: yellow;
        border: 2px solid #666;
        border-radius: 50%;
        -webkit-appearance: none;
        appearance: none;
      }
    </style>
  </body>
</html>
