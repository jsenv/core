<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dropdown Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      .demo-section {
        max-width: 500px;
        margin: 0 auto 40px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Dropdown, useDropdownClose } from "../dropdown.jsx";
      import {
        Input,
        Suggestion,
        SuggestionList,
        SuggestionListCombo,
      } from "@jsenv/navi";

      // ── Reusable dialog header ────────────────────────────────────────────────

      const DialogHeader = ({ title }) => {
        return (
          <div style="padding:14px 16px 10px;border-bottom:1px solid #eee;">
            <span style="font-weight:600;font-size:15px;">{title}</span>
          </div>
        );
      };

      // ── Demo 1: arbitrary content ─────────────────────────────────────────────

      const COLORS = ["Red", "Green", "Blue", "Yellow", "Purple", "Orange"];

      const ColorList = ({ onSelect }) => {
        const close = useDropdownClose();
        return (
          <div style="padding: 20px; min-width: 260px;">
            <p style="margin: 0 0 12px; font-weight: 600;">Pick a color</p>
            {COLORS.map((color) => (
              <button
                key={color}
                style="display:block;width:100%;margin-bottom:8px;padding:8px 12px;text-align:left;cursor:pointer;border:1px solid #ddd;border-radius:4px;background:white;font-size:14px"
                onClick={() => {
                  onSelect(color);
                  close();
                }}
              >
                {color}
              </button>
            ))}
          </div>
        );
      };

      // ── Demo 2: filterable SuggestionListCombo ────────────────────────────────

      const FRUITS = [
        "Apple",
        "Apricot",
        "Avocado",
        "Banana",
        "Blackberry",
        "Blueberry",
        "Cherry",
        "Coconut",
        "Fig",
        "Grape",
        "Grapefruit",
        "Guava",
        "Kiwi",
        "Lemon",
        "Lime",
        "Lychee",
        "Mango",
        "Melon",
        "Nectarine",
        "Orange",
        "Papaya",
        "Peach",
        "Pear",
        "Pineapple",
        "Plum",
        "Pomegranate",
        "Raspberry",
        "Strawberry",
        "Tangerine",
        "Watermelon",
      ];

      const FruitPicker = ({ onSelect }) => {
        const close = useDropdownClose();
        return (
          <div style="min-width: 300px;">
            <DialogHeader title="Please select a fruit" />
            <SuggestionListCombo
              lockSize
              padding="m"
              paddingTop="s"
              flex="y"
              spacing="s"
              alignY="start"
              minWidth="inherit"
            >
              <Input
                placeholder="Filter…"
                expandX
                autoFocus
                paddingX="10"
                paddingY="6"
                size="m"
              />
              <SuggestionList
                maxHeight="240px"
                expandX
                border="none"
                uiAction={(v) => {
                  onSelect(v);
                  close();
                }}
              >
                {FRUITS.map((fruit) => (
                  <Suggestion key={fruit} value={fruit}>
                    {fruit}
                  </Suggestion>
                ))}
              </SuggestionList>
            </SuggestionListCombo>
          </div>
        );
      };

      // ── Demo 3: animal picker with radio inputs ───────────────────────────────

      const ANIMALS = [
        "Cat",
        "Dog",
        "Elephant",
        "Fox",
        "Giraffe",
        "Horse",
        "Lion",
        "Monkey",
        "Panda",
        "Rabbit",
        "Tiger",
        "Wolf",
        "Zebra",
      ];

      const AnimalPicker = ({ selected, onSelect }) => {
        const close = useDropdownClose();
        return (
          <div style="min-width: 260px;">
            <DialogHeader title="Pick an animal" />
            <SuggestionList
              border="none"
              uiAction={(v) => {
                onSelect(v);
                close();
              }}
            >
              {ANIMALS.map((animal, i) => (
                <>
                  {i > 0 && (
                    <li
                      role="presentation"
                      style="margin:0;padding:0;list-style:none;"
                    >
                      <hr style="margin:0;border:none;border-top:1px solid #eee;" />
                    </li>
                  )}
                  <Suggestion
                    key={animal}
                    value={animal}
                    selected={selected === animal}
                    style="display:flex;align-items:center;gap:10px;padding:10px 16px;"
                  >
                    <input
                      type="radio"
                      tabIndex="-1"
                      checked={selected === animal}
                      style="pointer-events:none;flex-shrink:0;"
                    />
                    {animal}
                  </Suggestion>
                </>
              ))}
            </SuggestionList>
          </div>
        );
      };

      // ── App ───────────────────────────────────────────────────────────────────

      const Demo1 = () => {
        const [color, setColor] = useState(null);
        return (
          <div class="demo-section">
            <h2>Demo 1 — Arbitrary content</h2>
            <p>Custom list of buttons inside the dialog.</p>
            <Dropdown value={color} placeholder="Choose a color…">
              <ColorList onSelect={setColor} />
            </Dropdown>
            {color && (
              <p style="margin-top:12px;font-size:13px;color:#1a73e8;">
                Selected: <b>{color}</b>
              </p>
            )}
          </div>
        );
      };

      const Demo2 = () => {
        const [fruit, setFruit] = useState(null);
        return (
          <div class="demo-section">
            <h2>Demo 2 — Filterable SuggestionListCombo</h2>
            <p>
              The dialog contains a search input and a suggestion list.
              Selecting a fruit closes the dialog automatically.
            </p>
            <Dropdown value={fruit} placeholder="Pick a fruit…">
              <FruitPicker onSelect={setFruit} />
            </Dropdown>
            {fruit && (
              <p style="margin-top:12px;font-size:13px;color:#1a73e8;">
                Selected: <b>{fruit}</b>
              </p>
            )}
          </div>
        );
      };

      const Demo3 = () => {
        const [animal, setAnimal] = useState(null);
        return (
          <div class="demo-section">
            <h2>Demo 3 — Radio list picker</h2>
            <p>
              Each item shows a radio input. A separator sits between items.
              Selecting an animal closes the dialog.
            </p>
            <Dropdown value={animal} placeholder="Pick an animal…">
              <AnimalPicker selected={animal} onSelect={setAnimal} />
            </Dropdown>
            {animal && (
              <p style="margin-top:12px;font-size:13px;color:#1a73e8;">
                Selected: <b>{animal}</b>
              </p>
            )}
          </div>
        );
      };

      const App = () => {
        return (
          <div>
            <Demo1 />
            <Demo2 />
            <Demo3 />
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
