<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dropdown Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      .demo-section {
        max-width: 500px;
        margin: 0 auto 40px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Dropdown, useDropdownClose } from "../dropdown.jsx";

      const COLORS = ["Red", "Green", "Blue", "Yellow", "Purple", "Orange"];

      const ColorList = ({ onSelect }) => {
        const close = useDropdownClose();
        return (
          <div style="padding: 20px; min-width: 260px;">
            <p style="margin: 0 0 12px; font-weight: 600;">Pick a color</p>
            {COLORS.map((color) => (
              <button
                key={color}
                style="display:block;width:100%;margin-bottom:8px;padding:8px 12px;text-align:left;cursor:pointer;border:1px solid #ddd;border-radius:4px;background:white;font-size:14px"
                onClick={() => {
                  onSelect(color);
                  close();
                }}
              >
                {color}
              </button>
            ))}
          </div>
        );
      };

      const App = () => {
        const [value, setValue] = useState(null);

        return (
          <div class="demo-section">
            <h2>Dropdown Demo</h2>
            <p>
              Clicking the trigger opens a centered dialog. The content is fully
              custom. Click the backdrop to close.
            </p>
            <Dropdown value={value} placeholder="Choose a color…">
              <ColorList onSelect={setValue} />
            </Dropdown>
            {value && (
              <p style="margin-top: 12px; font-size: 13px; color: #1a73e8;">
                Selected: <b>{value}</b>
              </p>
            )}
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
