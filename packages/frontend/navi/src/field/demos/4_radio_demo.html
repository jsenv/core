<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section h3 {
        margin: 0 0 10px;
        color: #333;
        font-size: 1.05rem;
      }

      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      .col-label {
        margin-bottom: 8px;
        color: #888;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .value-display {
        min-height: 24px;
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(no events yet)";
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      fieldset {
        margin: 15px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      legend {
        padding: 0 10px;
        color: #555;
        font-weight: 500;
        white-space: nowrap;
      }

      .states-section {
        margin-bottom: 30px;
      }

      .states-title {
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
        font-size: 1.1rem;
      }

      .enhanced-states-title {
        margin: 30px 0 8px 0;
        color: #333;
        font-weight: 600;
        font-size: 1.1rem;
      }

      .states-description {
        margin-bottom: 20px;
        color: #666;
        line-height: 1.5;
      }

      .radio-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .interactive-controls {
        display: flex;
        margin: 20px 0;
        flex-wrap: wrap;
        gap: 10px;
      }

      .control-button {
        padding: 8px 16px;
        color: #333;
        font-size: 0.9rem;
        background: #f8f9fa;
        border: 1px solid #ddd;
        border-radius: 4px;
        transition: all 0.2s ease;
        cursor: pointer;
      }

      .control-button:hover {
        background: #e9ecef;
      }

      .control-button.active {
        color: white;
        background: #007bff;
        border-color: #007bff;
      }

      code {
        padding: 2px 6px;
        font-size: 0.9em;
        font-family: "Consolas", "Monaco", "Courier New", monospace;
        background: #f8f9fa;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>

      const TableOfContents = () => {

          <div className="demo-section">

              </li>
              <li>

                <ol style={{ margin: 0, paddingLeft: "20px" }}>
                  <li>
                    <a href="#icon-appearance">Icon appearance</a>

                  <li>
                    <a href="#toggle-appearance">Toggle appearance</a>
                  </li>
                  <li>
                    <a href="#button-appearance">Button appearance</a>
                  </li>
                  <li>
                    <a href="#custom-colors">Custom colors</a>

              </li>
              <li>
                <a href="#proxy">Proxy</a>
              </li>
              <li>
                <a href="#interactive">Interactive Controls</a>
              </li>
              <li>
                <a href="./5_radio_fieldset_demo.html">RadioFieldset demo</a>
              </li>
            </ol>
          </div>
        );
      };

      const BasicStatesDemo = () => {
        return (
          <div id="radio-states" className="demo-section">
            <h2>Radio States</h2>

            <div className="states-section">
              <div className="states-title">Standard HTML Radio States</div>
              <p className="states-description">
                These states work exactly like user agent HTML radio buttons,
                with enhanced styling and consistent behavior. Here we show
                individual radios to focus on their appearance and behavior.
              </p>

              <Box flex spacing="s">
                <Box as="fieldset" width="250">
                  <legend>Default</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input
                        type="radio"
                        name="demo-default-navi"
                        value="1"
                        marginLeft="5"
                        marginRight="3"
                      />
                      Navi
                    </Field>
                    <label>
                      <input
                        type="radio"
                        name="demo-default-native"
                        value="1"
                      />
                      User agent
                    </label>
                  </Box>
                </Box>
                <Box as="fieldset" width="250">
                  <legend>:focus-visible</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input
                        type="radio"
                        name="demo-focus-navi"
                        value="1"
                        pseudoState={{ ":focus-visible": true }}
                        marginLeft="5"
                        marginRight="3"
                      />
                      <Label>Navi</Label>
                    </Field>
                    <label>
                      <input
                        type="radio"
                        name="demo-focus-native"
                        value="1"

              <Box flex spacing="s">
                <Box as="fieldset" width="250">

                        name="demo-disabled-navi"
                        value="1"
                        disabled
                        marginLeft="5"
                        marginRight="3"

                    <label>
                      <input
                        type="radio"
                        name="demo-disabled-native"
                        value="1"
                        disabled
                      />

                  </Box>

                <Box as="fieldset" width="250">
                  <legend>:checked</legend>

                    <Field>
                      <Input
                        type="radio"
                        name="demo-checked-navi"
                        value="1"
                        defaultChecked
                        marginLeft="5"
                        marginRight="3"
                      />
                      Navi
                    </Field>
                    <label>
                      <input
                        type="radio"
                        name="demo-checked-native"
                        value="1"
                        checked
                      />
                      User agent
                    </label>
                  </Box>
                </Box>
              </Box>
              <Box flex spacing="s">
                <Box as="fieldset" width="250">
                  <legend>:focus-visible:checked</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input
                        type="radio"

                        marginRight="3"

                <Box as="fieldset" width="250">
                  <legend>:disabled:checked</legend>
                  <Box flex="y" spacing="s" alignX="start">

                        defaultChecked

                        marginRight="3"

                    <label>
                      <input
                        type="radio"
                        name="demo-checked-disabled-native"

              <div className="enhanced-states-title">Enhanced Navi States</div>

              <Box flex spacing="s">
                <Box as="fieldset" width="200">
                  <legend>:read-only</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input

                        name="demo-enhanced-readonly"
                        value="1"

                <Box as="fieldset" width="200">

                  <Box flex="y" spacing="s" alignX="start">
                    <Field>

                  <Box flex="y" spacing="s" alignX="start">

                      <Input

      const IconAppearanceDemo = () => {
        return (
          <div id="icon-appearance" className="demo-section">
            <h3>Icon appearance</h3>
            <p>
              Pass an <code>icon</code> prop to display an icon instead of the
              radio circle. Use <code>style</code> to adjust opacity based on
              checked state.
            </p>

            <Box flex spacing="s">
              <Box as="fieldset" width="200">
                <legend>Default</legend>
                <Box flex="y" spacing="s" alignX="start">
                  <Field>
                    <Input
                      type="radio"
                      name="icon-demo"
                      value="1"
                      icon={<Icon>🎵</Icon>}
                      opacity="0.3"
                      style={{ ":checked": { opacity: 1 } }}
                    />
                    <Label>Music</Label>
                  </Field>
                  <Field>
                    <Input
                      type="radio"
                      name="icon-demo"
                      value="2"
                      icon={<Icon>🎨</Icon>}
                      opacity="0.3"
                      style={{ ":checked": { opacity: 1 } }}
                      defaultChecked
                    />
                    <Label>Art</Label>
                  </Field>
                  <Field>
                    <Input
                      type="radio"
                      name="icon-demo"
                      value="3"
                      icon={<Icon>🏃</Icon>}
                      opacity="0.3"
                      style={{ ":checked": { opacity: 1 } }}
                    />
                    <Label>Sports</Label>
                  </Field>
                </Box>
              </Box>

              <Box as="fieldset" width="200">
                <legend>:disabled</legend>
                <Box flex="y" spacing="s" alignX="start">
                  <Field>
                    <Input
                      type="radio"
                      name="icon-disabled"
                      value="1"
                      icon={<Icon>🎵</Icon>}
                      disabled
                    />
                    <Label>Music</Label>
                  </Field>
                  <Field>
                    <Input
                      type="radio"
                      name="icon-disabled"
                      value="2"
                      icon={<Icon>🎨</Icon>}
                      disabled
                      defaultChecked
                    />
                    <Label>Art</Label>
                  </Field>
                </Box>
              </Box>

              <Box as="fieldset" width="200">
                <legend>:read-only</legend>
                <Box flex="y" spacing="s" alignX="start">
                  <Field>
                    <Input
                      type="radio"
                      name="icon-readonly"
                      value="1"
                      icon={<Icon>🌅</Icon>}
                      readOnly
                    />
                    <Label>Morning</Label>
                  </Field>
                  <Field>
                    <Input
                      type="radio"
                      name="icon-readonly"
                      value="2"
                      icon={<Icon>☀️</Icon>}
                      readOnly
                      checked
                    />
                    <Label>Afternoon</Label>
                  </Field>
                </Box>
              </Box>
            </Box>
          </div>
        );
      };

      const ToggleAppearanceDemo = () => {
        return (
          <div id="toggle-appearance" className="demo-section">
            <h3>Toggle appearance</h3>
            <p>
              Pass <code>appearance="toggle"</code> to render the radio as a
              toggle switch. One radio per group can be checked; toggling a
              checked radio has no effect (radio semantics).
            </p>

            <Box flex spacing="s" wrap>
              <Box as="fieldset" width="200">
                <legend>Default (unchecked)</legend>
                <Field>
                  <Input
                    type="radio"
                    name="toggle-unchecked"
                    value="on"
                    appearance="toggle"
                  />
                  <Label>Notifications</Label>
                </Field>
              </Box>

              <Box as="fieldset" width="200">
                <legend>:checked</legend>
                <Field>
                  <Input
                    type="radio"
                    name="toggle-checked"
                    value="on"
                    appearance="toggle"
                    defaultChecked
                  />
                  <Label>Dark mode</Label>
                </Field>
              </Box>

              <Box as="fieldset" width="200">
                <legend>:disabled</legend>
                <Field>
                  <Input
                    type="radio"
                    name="toggle-disabled"
                    value="on"
                    appearance="toggle"
                    disabled
                  />
                  <Label>Auto-save</Label>
                </Field>
              </Box>

              <Box as="fieldset" width="200">
                <legend>:disabled:checked</legend>
                <Field>
                  <Input
                    type="radio"
                    name="toggle-disabled-checked"
                    value="on"
                    appearance="toggle"
                    disabled
                    defaultChecked
                  />
                  <Label>Two-factor auth</Label>
                </Field>
              </Box>

              <Box as="fieldset" width="200">
                <legend>:read-only:checked</legend>
                <Field>
                  <Input
                    type="radio"
                    name="toggle-readonly"
                    value="on"
                    appearance="toggle"
                    readOnly
                    checked
                  />
                  <Label>System setting</Label>
                </Field>
              </Box>
            </Box>
          </div>
        );
      };

      const ButtonAppearanceDemo = () => {
        return (
          <div id="button-appearance" className="demo-section">
            <h3>Button appearance</h3>
            <p>
              Use <code>appearance="button"</code> with an <code>icon</code> to
              render radios as toggle button groups. Button groups maintain
              radio semantics — exactly one item selected at a time.
            </p>

            <Box flex spacing="s">
              <Box as="fieldset" width="300">
                <legend>Default (one selected)</legend>
                <Box flex="y" spacing="s" alignX="start" wrap>
                  <Field>
                    <Input
                      borderRadius="s"
                      type="radio"
                      name="button-demo"
                      value="home"
                      square
                      alignX="center"
                      alignY="center"
                      width="36"
                      icon={<Icon>🏠</Icon>}
                      appearance="button"
                      defaultChecked
                    />
                    <Label>Home</Label>
                  </Field>
                  <Field>
                    <Input
                      borderRadius="s"
                      type="radio"
                      name="button-demo"
                      value="work"
                      square
                      width="36"
                      alignX="center"
                      alignY="center"
                      icon={<Icon>💼</Icon>}
                      appearance="button"
                    />
                    <Label>Work</Label>
                  </Field>
                  <Field>
                    <Input
                      borderRadius="s"
                      type="radio"
                      name="button-demo"
                      value="travel"
                      square
                      width="36"
                      alignX="center"
                      alignY="center"
                      icon={<Icon>✈️</Icon>}
                      appearance="button"
                    />
                    <Label>Travel</Label>

                <Box flex="y" spacing="s" alignX="start" wrap>

                      name="button-disabled"

                      icon={<Icon>📚</Icon>}
                      appearance="button"
                      disabled

                    <Label>Read</Label>
                  </Field>
                  <Field>
                    <Input
                      type="radio"
                      name="button-disabled"
                      value="write"
                      icon={<Icon>✍️</Icon>}
                      appearance="button"
                      defaultChecked

                    />
                    <Label>Write</Label>

                <Box flex="y" spacing="s" alignX="start" wrap>
                  <Field>
                    <Input
                      type="radio"
                      name="button-readonly"

                      name="button-readonly"

                      checked
                      readOnly
                    />
                    <Label>Afternoon</Label>
                  </Field>
                </Box>
              </Box>
            </Box>
          </div>
        );

              <fieldset style="margin: 0">
                <legend>Green</legend>
                <div
                  style={{
                    display: "grid",

                  <Field>
                    <Input

                    <input

                </div>
              </fieldset>
              <fieldset style="margin: 0">
                <legend>Dark grey</legend>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "max-content max-content",
                    gap: "4px 24px",
                    alignItems: "center",
                  }}
                >
                  <Field>
                    <Input
                      type="radio"
                      name="demo-dark"
                      value="unchecked"
                      accentColor="#34495e"
                    />
                    <Label>Navi</Label>
                  </Field>
                  <Field>
                    <Input
                      type="radio"
                      name="demo-dark"
                      value="checked"
                      accentColor="#34495e"
                      defaultChecked
                    />
                    <Label>Navi</Label>
                  </Field>
                  <label>
                    <input
                      type="radio"
                      name="demo-dark-native"
                      value="unchecked"

                  <label>
                    <input
                      type="radio"
                      name="demo-dark-native"
                      value="checked"
                      style={{ accentColor: "#34495e" }}
                      defaultChecked
                    />
                    Native
                  </label>
                </div>
              </fieldset>
              <fieldset style="margin: 0; background: lightgrey">
                <legend>Pink</legend>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "max-content max-content",
                    gap: "4px 24px",
                    alignItems: "center",

                >
                  <Field>
                    <Input

                    />

                  <label>

                  <Field>
                    <Input
                      type="radio"
                      name="demo-white"
                      value="unchecked"
                      accentColor="#ffffff"
                    />
                    <Label>Navi</Label>
                  </Field>
                  <Field>
                    <Input
                      type="radio"
                      name="demo-white"
                      value="checked"
                      accentColor="#ffffff"
                      defaultChecked
                    />
                    <Label>Navi</Label>
                  </Field>
                  <label>
                    <input
                      type="radio"
                      name="demo-white-native"
                      value="unchecked"
                      style={{ accentColor: "#ffffff" }}
                    />
                    Native
                  </label>
                  <label>
                    <input
                      type="radio"
                      name="demo-white-native"
                      value="checked"
                      style={{ accentColor: "#ffffff" }}
                      defaultChecked
                    />
                    Native
                  </label>
                </div>
              </fieldset>
            </Box>
          </div>
        );
      };

      const ProxyDemo = () => {
        return (
          <div id="proxy" className="demo-section">
            <h2>Proxy</h2>
            <p>
              Any element can act as a proxy for a radio input using the{" "}
              <code>navi-proxy-for</code> attribute. On mousedown the radio
              receives focus; on click the proxy's <code>value</code> prop is
              forwarded as the new checked state.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Radio (the actual field)</div>
                <Field>
                  <Input
                    type="radio"
                    id="proxy-demo-radio"
                    name="proxy-demo"
                    value="on"
                  />
                  <Label>Option</Label>
                </Field>
              </div>
              <div>
                <div className="col-label">Proxy buttons (try mousedown)</div>
                <Box flex="y" spacing="s">
                  <button navi-proxy-for="proxy-demo-radio" value={true}>
                    Enable
                  </button>
                  <button navi-proxy-for="proxy-demo-radio" value={false}>
                    Disable
                  </button>
                </Box>
              </div>
            </div>
          </div>
        );
      };

      const InteractiveDemo = () => {
        const [loading, setLoading] = useState(false);
        const [disabled, setDisabled] = useState(false);
        const [checked, setChecked] = useState(false);

        return (
          <div id="interactive" className="demo-section">
            <h2>Interactive Controls</h2>

            <fieldset>
              <legend>Toggle States</legend>
              <Box flex="y" spacing="s" alignX="start" wrap>
                <button
                  className={`control-button ${loading ? "active" : ""}`}
                  onClick={() => setLoading(!loading)}
                >
                  Loading: {loading ? "ON" : "OFF"}
                </button>
                <button
                  className={`control-button ${disabled ? "active" : ""}`}
                  onClick={() => setDisabled(!disabled)}
                >
                  Disabled: {disabled ? "ON" : "OFF"}
                </button>
                <button
                  className={`control-button ${checked ? "active" : ""}`}
                  onClick={() => !disabled && setChecked(!checked)}
                >
                  Checked: {checked ? "ON" : "OFF"}
                </button>
              </Box>
            </fieldset>

            <fieldset>
              <legend>Interactive Radio</legend>
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  <Input
                    type="radio"
                    name="interactive-demo"
                    value="option1"
                    checked={checked}
                    onUIStateChange={(newChecked) => {
                      if (!disabled) {
                        setChecked(newChecked);
                      }
                    }}
                    loading={loading}
                    disabled={disabled}
                  />
                  <Label>Interactive Radio</Label>
                </Field>
                <div
                  style={{
                    padding: "8px",
                    fontSize: "0.8rem",
                    fontFamily: "monospace",
                    background: "#f8f9fa",
                    border: "1px solid #dee2e6",
                    borderRadius: "4px",
                  }}
                >
                  State: checked={checked ? "true" : "false"} | loading=
                  {loading ? "true" : "false"} | disabled=
                  {disabled ? "true" : "false"}
                </div>
              </Box>
            </fieldset>
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
