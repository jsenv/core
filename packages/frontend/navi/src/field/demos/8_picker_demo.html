<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Picker Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        overflow-x: auto;
      }
      .demo-grid {
        display: grid;
        max-width: 1000px;
        margin: 0 auto;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 24px;
      }
      .demo-section {
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        max-width: 1000px;
        margin: 0 auto 24px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Field,
        Label,
        Picker,
        Time,
        Text,
        Icon,
        Form,
        Button,
        PickerInput,
        isToday,
        getNowHours,
        stateSignal,
      } from "@jsenv/navi";

      const App = () => (
        <div class="demo-grid">
          <DayHourPickerDemo />
          <DayPickerDemo />
          <MonthPickerDemo />
          <WeekPickerDemo />
          <TimePickerDemo />
          <DatetimePickerDemo />
          <ColorPickerDemo />
          <CustomUIDemo />
          <DisabledDemo />
          <FormIntegrationDemo />
        </div>
      );

      // ── date helpers ────────────────────────────────────────────────────────
      const today = new Date();
      const todayStr = today.toISOString().slice(0, 10);
      const in30days = new Date(today);
      in30days.setDate(today.getDate() + 30);
      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().slice(0, 10);

      const daySignal = stateSignal(todayStr, {
        type: "day",
        min: today,
        autoFix: true,
      });

      const DayHourPickerDemo = () => {
        const hourSignal = useSignal("07:00");
        const submittedSignal = useSignal(null);

        return (
          <div class="demo-section">
            <h2>Jour + Heure</h2>
            <p>
              Le picker d'heure ne propose que les créneaux disponibles. Si le
              jour sélectionné est aujourd'hui, les heures passées sont
              masquées.
            </p>
            <Form
              action={(values) => {
                submittedSignal.value = values;
              }}
              flex="y"
              spacing="s"
              alignX="start"
            >
              <Field vertical>
                <Label htmlFor="day">Jour</Label>
                <Box flex spacing="s">
                  <Picker
                    minWidth="200"
                    alignX="center"
                    id="day"
                    type="day"
                    name="day"
                    required
                    value={daySignal.value}
                    uiAction={(v) => {
                      daySignal.value = v;
                    }}
                    min={today}
                    max={in30days}
                  />
                  <Picker
                    type="hour"
                    name="hour"
                    required
                    min="07:00"
                    max="21:00"
                    step="00:30"
                    minHidden={
                      isToday(daySignal.value) ? getNowHours(-5) : undefined
                    }
                    value={hourSignal.value}
                    uiAction={(v) => {
                      hourSignal.value = v;
                    }}
                  />
                </Box>
              </Field>
              <Box flex spacing="s">
                <Button
                  type="button"
                  onClick={() => {
                    daySignal.value = yesterdayStr;
                  }}
                >
                  Forcer hier ({yesterdayStr})
                </Button>
                <Button type="submit">Soumettre</Button>
              </Box>
              {submittedSignal.value && (
                <pre style="margin:0;font-size:12px;background:#f0f0f0;padding:8px;border-radius:4px;">
                  {JSON.stringify(submittedSignal.value, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      // ── helpers ─────────────────────────────────────────────────

      const ValueDisplay = ({ label, value }) => (
        <p class="value-display">
          {label}: <strong>{value || "—"}</strong>
        </p>
      );

      // ── Demo sections ────────────────────────────────────────────
      const in10days = new Date(today);
      in10days.setDate(today.getDate() + 10);
      const tenDaysAgo = new Date(today);
      tenDaysAgo.setDate(today.getDate() - 10);

      const DayPickerDemo = () => {
        const daySignal = useSignal("");
        const dayLimitedSignal = useSignal("");
        const dayPastSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Day picker</h2>
            <p>Picks a calendar day. Min = today, max = today + 30 days.</p>
            <Field vertical>
              <Label>Date</Label>
              <Picker
                name="day"
                type="day"
                value={daySignal.value}
                uiAction={(v) => {
                  daySignal.value = v;
                }}
                min={today}
                max={in30days}
                placeholder="Choisir un jour"
              />
            </Field>
            <ValueDisplay label="Value" value={daySignal.value} />
            <p style="margin-top:16px">Max = aujourd'hui + 10 jours.</p>
            <Field vertical>
              <Label>Date (10 jours max)</Label>
              <Picker
                name="day_limited"
                type="day"
                value={dayLimitedSignal.value}
                uiAction={(v) => {
                  dayLimitedSignal.value = v;
                }}
                min={today}
                max={in10days}
                placeholder="Choisir un jour"
              />
            </Field>
            <ValueDisplay label="Value" value={dayLimitedSignal.value} />
            <p style="margin-top:16px">
              Autorise les jours passés (min = aujourd'hui - 10 jours).
            </p>
            <Field vertical>
              <Label>Date (passé autorisé)</Label>
              <Picker
                name="day_past"
                type="day"
                value={dayPastSignal.value}
                uiAction={(v) => {
                  dayPastSignal.value = v;
                }}
                min={tenDaysAgo}
                max={today}
                placeholder="Choisir un jour"
              />
            </Field>
            <ValueDisplay label="Value" value={dayPastSignal.value} />
          </div>
        );
      };

      const MonthPickerDemo = () => {
        const monthSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Month picker</h2>
            <p>Picks a year + month.</p>
            <Field vertical>
              <Label>Mois</Label>
              <Picker
                name="month"
                type="month"
                value={monthSignal.value}
                uiAction={(v) => {
                  monthSignal.value = v;
                }}
                placeholder="Choisir un mois"
              />
            </Field>
            <ValueDisplay label="Value" value={monthSignal.value} />
          </div>
        );
      };

      const WeekPickerDemo = () => {
        const weekSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Week picker</h2>
            <p>Picks an ISO week (year + week number).</p>
            <Field vertical>
              <Label>Semaine</Label>
              <Picker
                name="week"
                type="week"
                value={weekSignal.value}
                uiAction={(v) => {
                  weekSignal.value = v;
                }}
                placeholder="Choisir une semaine"
              />
            </Field>
            <ValueDisplay label="Value" value={weekSignal.value} />
          </div>
        );
      };

      const TimePickerDemo = () => {
        const timeSignal = useSignal("");
        const timeRestrictedSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Time picker</h2>
            <p>Picks a time of day (hours + minutes).</p>
            <Field vertical>
              <Label>Heure</Label>
              <Picker
                name="time"
                type="time"
                value={timeSignal.value}
                uiAction={(v) => {
                  timeSignal.value = v;
                }}
                min="08:00"
                max="20:00"
                step="00:15"
                placeholder="Choisir une heure"
              />
            </Field>
            <ValueDisplay label="Value" value={timeSignal.value} />
            <p style="margin-top:16px">
              Heures entre 7h et 21h, par tranche de 30 min.
            </p>
            <Field vertical>
              <Label>Heure (7h–21h, 30 min)</Label>
              <Picker
                name="time_restricted"
                type="time"
                value={timeRestrictedSignal.value}
                uiAction={(v) => {
                  timeRestrictedSignal.value = v;
                }}
                min="07:00"
                max="21:00"
                step="00:30"
                placeholder="Choisir une heure"
              />
            </Field>
            <ValueDisplay label="Value" value={timeRestrictedSignal.value} />
          </div>
        );
      };

      const DatetimePickerDemo = () => {
        const datetimeSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Datetime picker</h2>
            <p>Picks a date + time (datetime-local).</p>
            <Field vertical spacing="s">
              <Label>Date &amp; heure</Label>
              <Picker
                name="datetime"
                type="datetime"
                value={datetimeSignal.value}
                uiAction={(v) => {
                  datetimeSignal.value = v;
                }}
                placeholder="Choisir date &amp; heure"
              />
            </Field>
            <ValueDisplay label="Value" value={datetimeSignal.value} />
          </div>
        );
      };

      const ColorPickerDemo = () => {
        const colorSignal = useSignal(undefined);
        const colorWithPlaceholderSignal = useSignal(undefined);
        return (
          <div class="demo-section">
            <h2>Color picker</h2>
            <p>Picks a color using the browser color chooser.</p>
            <Field vertical spacing="s">
              <Label>Sans placeholder</Label>
              <Picker
                name="color"
                type="color"
                value={colorSignal.value}
                uiAction={(v) => {
                  colorSignal.value = v;
                }}
              />
            </Field>
            <ValueDisplay label="Value" value={colorSignal.value} />
            <Field vertical spacing="s">
              <Label>Avec placeholder</Label>
              <Picker
                name="color_with_placeholder"
                type="color"
                value={colorWithPlaceholderSignal.value}
                uiAction={(v) => {
                  colorWithPlaceholderSignal.value = v;
                }}
                placeholder="Choisir une couleur"
              />
            </Field>
            <ValueDisplay
              label="Value"
              value={colorWithPlaceholderSignal.value}
            />
          </div>
        );
      };

      const CustomUIDemo = () => {
        const daySignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Custom UI</h2>
            <p>
              Override both the placeholder and the value display with custom
              children.
            </p>
            <Field vertical spacing="s">
              <Label>Date de naissance</Label>
              <Picker
                name="birthday"
                type="day"
                value={daySignal.value}
                uiAction={(v) => {
                  daySignal.value = v;
                }}
                placeholder={
                  <Text>
                    <Icon>🎂</Icon> Choisir un anniversaire
                  </Text>
                }
                input={
                  <PickerInput>
                    {daySignal.value ? (
                      <Box flex alignY="center" spacing="xs">
                        🎂
                        <Time type="day" capitalize>
                          {daySignal.value}
                        </Time>
                      </Box>
                    ) : null}
                  </PickerInput>
                }
              />
            </Field>
            <ValueDisplay label="Value" value={daySignal.value} />
          </div>
        );
      };

      const DisabledDemo = () => (
        <div class="demo-section">
          <h2>Disabled</h2>
          <p>Picker is non-interactive when disabled.</p>
          <Field vertical spacing="s">
            <Label>Date</Label>
            <Picker
              type="day"
              value="2026-05-11"
              disabled
              placeholder="Choisir un jour"
            />
          </Field>
        </div>
      );

      const FormIntegrationDemo = () => {
        const submittedSignal = useSignal(null);
        return (
          <div class="demo-section">
            <h2>Form integration</h2>
            <p>
              Pickers participate in form submission. The day field is required.
            </p>
            <Form
              action={(values) => {
                submittedSignal.value = values;
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date de début (required)</Label>
                <Picker
                  name="start_date"
                  type="day"
                  required
                  placeholder="Choisir une date"
                />
              </Field>
              <Field vertical>
                <Label>Date de fin (custom message)</Label>
                <Picker
                  name="end_date"
                  type="day"
                  required
                  data-required-message="Veuillez choisir une date de fin."
                  placeholder="Choisir une date"
                />
              </Field>
              <Field vertical>
                <Label>Heure de début</Label>
                <Picker
                  name="start_time"
                  type="time"
                  min="08:00"
                  max="20:00"
                  placeholder="Choisir une heure"
                />
              </Field>
              <Button type="submit">Soumettre</Button>
              {submittedSignal.value && (
                <pre style="margin:0;font-size:12px;background:#f0f0f0;padding:8px;border-radius:4px;">
                  {JSON.stringify(submittedSignal.value, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
