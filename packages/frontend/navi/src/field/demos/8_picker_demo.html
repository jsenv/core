<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Picker Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      .demo-grid {
        display: grid;
        max-width: 1000px;
        margin: 0 auto;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 24px;
      }
      .demo-section {
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        max-width: 1000px;
        margin: 0 auto 24px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Picker Demo</h1>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import { Box, Label, Picker, Time, Text, Icon } from "@jsenv/navi";

      // ── helpers ─────────────────────────────────────────────────
      const today = new Date();
      const in30days = new Date(today);
      in30days.setDate(today.getDate() + 30);

      const ValueDisplay = ({ label, value }) => (
        <p class="value-display">
          {label}: <strong>{value || "—"}</strong>
        </p>
      );

      // ── Demo sections ────────────────────────────────────────────
      const DayPickerDemo = () => {
        const daySignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Day picker</h2>
            <p>Picks a calendar day. Min = today, max = today + 30 days.</p>
            <Box flex="y" spacing="s">
              <Label htmlFor="day-picker">Date</Label>
              <Picker
                id="day-picker"
                name="day"
                type="day"
                value={daySignal.value}
                uiAction={(v) => {
                  daySignal.value = v;
                }}
                min={today}
                max={in30days}
                placeholder="Choisir un jour"
              />
            </Box>
            <ValueDisplay label="Value" value={daySignal.value} />
          </div>
        );
      };

      const MonthPickerDemo = () => {
        const monthSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Month picker</h2>
            <p>Picks a year + month.</p>
            <Box flex="y" spacing="s">
              <Label htmlFor="month-picker">Mois</Label>
              <Picker
                id="month-picker"
                name="month"
                type="month"
                value={monthSignal.value}
                uiAction={(v) => {
                  monthSignal.value = v;
                }}
                placeholder="Choisir un mois"
              />
            </Box>
            <ValueDisplay label="Value" value={monthSignal.value} />
          </div>
        );
      };

      const WeekPickerDemo = () => {
        const weekSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Week picker</h2>
            <p>Picks an ISO week (year + week number).</p>
            <Box flex="y" spacing="s">
              <Label htmlFor="week-picker">Semaine</Label>
              <Picker
                id="week-picker"
                name="week"
                type="week"
                value={weekSignal.value}
                uiAction={(v) => {
                  weekSignal.value = v;
                }}
                placeholder="Choisir une semaine"
              />
            </Box>
            <ValueDisplay label="Value" value={weekSignal.value} />
          </div>
        );
      };

      const TimePickerDemo = () => {
        const timeSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Time picker</h2>
            <p>Picks a time of day (hours + minutes).</p>
            <Box flex="y" spacing="s">
              <Label htmlFor="time-picker">Heure</Label>
              <Picker
                id="time-picker"
                name="time"
                type="time"
                value={timeSignal.value}
                uiAction={(v) => {
                  timeSignal.value = v;
                }}
                min="08:00"
                max="20:00"
                step={900}
                placeholder="Choisir une heure"
              />
            </Box>
            <ValueDisplay label="Value" value={timeSignal.value} />
          </div>
        );
      };

      const DatetimePickerDemo = () => {
        const datetimeSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Datetime picker</h2>
            <p>Picks a date + time (datetime-local).</p>
            <Box flex="y" spacing="s">
              <Label htmlFor="datetime-picker">Date &amp; heure</Label>
              <Picker
                id="datetime-picker"
                name="datetime"
                type="datetime"
                value={datetimeSignal.value}
                uiAction={(v) => {
                  datetimeSignal.value = v;
                }}
                placeholder="Choisir date &amp; heure"
              />
            </Box>
            <ValueDisplay label="Value" value={datetimeSignal.value} />
          </div>
        );
      };

      const ColorPickerDemo = () => {
        const colorSignal = useSignal("");
        const colorWithPlaceholderSignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Color picker</h2>
            <p>Picks a color using the browser color chooser.</p>
            <Box flex="y" alignX="start" spacing="s">
              <Label htmlFor="color-picker">Sans placeholder</Label>
              <Picker
                id="color-picker"
                name="color"
                type="color"
                value={colorSignal.value}
                uiAction={(v) => {
                  colorSignal.value = v;
                }}
              />
            </Box>
            <ValueDisplay label="Value" value={colorSignal.value} />
            <Box flex="y" spacing="s">
              <Label htmlFor="color-picker-placeholder">Avec placeholder</Label>
              <Picker
                id="color-picker-placeholder"
                name="color_with_placeholder"
                type="color"
                value={colorWithPlaceholderSignal.value}
                uiAction={(v) => {
                  colorWithPlaceholderSignal.value = v;
                }}
                placeholder="Choisir une couleur"
              />
            </Box>
            <ValueDisplay
              label="Value"
              value={colorWithPlaceholderSignal.value}
            />
          </div>
        );
      };

      const CustomUIDemo = () => {
        const daySignal = useSignal("");
        return (
          <div class="demo-section">
            <h2>Custom UI</h2>
            <p>
              Override both the placeholder and the value display with custom
              children.
            </p>
            <Box flex="y" spacing="s">
              <Label htmlFor="custom-picker">Date de naissance</Label>
              <Picker
                id="custom-picker"
                name="birthday"
                type="day"
                value={daySignal.value}
                uiAction={(v) => {
                  daySignal.value = v;
                }}
                placeholder={
                  <Text>
                    <Icon>🎂</Icon> Choisir un anniversaire
                  </Text>
                }
              >
                {daySignal.value ? (
                  <Box flex alignY="center" spacing="xs">
                    🎂
                    <Time type="day" capitalize>
                      {daySignal.value}
                    </Time>
                  </Box>
                ) : null}
              </Picker>
            </Box>
            <ValueDisplay label="Value" value={daySignal.value} />
          </div>
        );
      };

      const DisabledDemo = () => (
        <div class="demo-section">
          <h2>Disabled</h2>
          <p>Picker is non-interactive when disabled.</p>
          <Box flex="y" spacing="s">
            <Label htmlFor="disabled-picker">Date</Label>
            <Picker
              id="disabled-picker"
              type="day"
              value="2026-05-11"
              disabled
              placeholder="Choisir un jour"
            />
          </Box>
        </div>
      );

      const FormIntegrationDemo = () => {
        const submittedSignal = useSignal(null);
        const onSubmit = (e) => {
          e.preventDefault();
          const data = Object.fromEntries(new FormData(e.target));
          submittedSignal.value = data;
        };
        return (
          <div class="demo-section">
            <h2>Form integration</h2>
            <p>
              Pickers participate in form submission. The day field is required.
            </p>
            <form onSubmit={onSubmit}>
              <Box flex="y" spacing="m">
                <Box flex="y" spacing="s">
                  <Label htmlFor="form-start-date">
                    Date de début (required)
                  </Label>
                  <Picker
                    id="form-start-date"
                    name="start_date"
                    type="day"
                    required
                    placeholder="Choisir une date"
                  />
                </Box>
                <Box flex="y" spacing="s">
                  <Label htmlFor="form-start-time">Heure de début</Label>
                  <Picker
                    id="form-start-time"
                    name="start_time"
                    type="time"
                    min="08:00"
                    max="20:00"
                    placeholder="Choisir une heure"
                  />
                </Box>
                <Box>
                  <button type="submit">Soumettre</button>
                </Box>
                {submittedSignal.value && (
                  <pre style="margin:0;font-size:12px;background:#f0f0f0;padding:8px;border-radius:4px;">
                    {JSON.stringify(submittedSignal.value, null, 2)}
                  </pre>
                )}
              </Box>
            </form>
          </div>
        );
      };

      // ── App ─────────────────────────────────────────────────────
      const App = () => (
        <div class="demo-grid">
          <DayPickerDemo />
          <MonthPickerDemo />
          <WeekPickerDemo />
          <TimePickerDemo />
          <DatetimePickerDemo />
          <ColorPickerDemo />
          <CustomUIDemo />
          <DisabledDemo />
          <FormIntegrationDemo />
        </div>
      );

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
