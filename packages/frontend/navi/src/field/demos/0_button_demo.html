<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      fieldset {
        margin: 15px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      legend {
        padding: 0 10px;
        color: #555;
        font-weight: 500;
        white-space: nowrap;
      }

      .button-group {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .comparison-section {
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-left: 4px solid #007bff;
        border-radius: 4px;
      }

      .comparison-title {
        margin: 0 0 15px 0;
        color: #495057;
        font-weight: 500;
        font-size: 0.9rem;
      }

      .comparison-group {
        display: flex;
        margin: 10px 0;
        align-items: center;
        gap: 15px;
      }

      .comparison-label {
        min-width: 80px;
        color: #666;
        font-size: 0.85rem;
      }

      .variation-grid {
        display: grid;
        margin: 15px 0;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      .variation-item {
        padding: 15px;
        text-align: center;
        background: #f8f9fa;
        border-radius: 6px;
      }

      .variation-label {
        margin: 0 0 10px 0;
        color: #666;
        font-size: 0.85rem;
      }

      .states-section {
        margin: 20px 0;
      }

      .states-title {
        margin: 0 0 15px 0;
        padding: 8px 12px;
        color: #495057;
        font-weight: 600;
        font-size: 0.95rem;
        text-align: center;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border: 1px solid #dee2e6;
        border-radius: 6px;
      }

      .enhanced-states-title {
        color: #1565c0;
        background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
        border-color: #2196f3;
      }

      .states-description {
        margin: 10px 0 15px 0;
        padding: 10px 15px;
        color: #666;
        font-style: italic;
        font-size: 0.9rem;
        background: #f8f9fa;
        border-left: 4px solid #007bff;
        border-radius: 0 4px 4px 0;
      }

      .demo-outer-padding .navi_button {
        --button-padding: 30px;
      }
      .demo-outer-padding-x .navi_button {
        --button-padding-x: 40px;
      }
      .demo-outer-padding-x-default .navi_button {
        --button-padding-x-default: 40px;
      }
    </style>
  </head>
  <body>
    <h1>Button Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Button, Box, Icon, EyeSvg, EyeClosedSvg } from "@jsenv/navi";

      const App = () => {
        return (
          <div>
            <PaddingDemo />
            <BasicStatesDemo />
            <SizeVariationsDemo />
            <ColorVariationsDemo />
            <FullWidthDemo />
            <IconToggleDemo />
            <DiscreteVariantDemo />
            <InteractiveDemo />
          </div>
        );
      };

      const PaddingScenario = ({ considering, nativeStyle, children }) => (
        <fieldset>
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              alignItems: "flex-start",
              gap: "4px",
            }}
          >
            <div style={{ flex: 1, fontSize: "0.85rem", color: "#555" }}>
              <div style={{ fontWeight: 600, marginBottom: "6px" }}>
                Considering
              </div>
              <ul style={{ margin: 0, paddingLeft: "16px", lineHeight: "1.6" }}>
                {considering.map((item, i) => (
                  <li key={i}>
                    <code>{item}</code>
                  </li>
                ))}
              </ul>
            </div>
            <div style="display: flex; gap: 10px;">
              <div style={{ textAlign: "center" }}>
                <div
                  style={{
                    fontSize: "0.75rem",
                    color: "#888",
                    marginBottom: 4,
                  }}
                >
                  expected
                </div>
                <button style={nativeStyle}>Button</button>
              </div>
              <div style={{ textAlign: "center" }}>
                <div
                  style={{
                    fontSize: "0.75rem",
                    color: "#888",
                    marginBottom: 4,
                  }}
                >
                  actual
                </div>
                {children}
              </div>
            </div>
          </div>
        </fieldset>
      );

      const PaddingDemo = () => {
        return (
          <div className="demo-section">
            <h2>Padding</h2>

            <PaddingScenario
              considering={["Nothing is passed (default behavior)"]}
              nativeStyle={{ paddingInline: "6px", paddingBlock: "1px" }}
            >
              <Button>Button</Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['padding="0"']}
              nativeStyle={{ padding: 0 }}
            >
              <Button padding="0">Button</Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['padding="20px"']}
              nativeStyle={{ padding: "20px" }}
            >
              <Button
                padding="20px"
                action={() => {
                  // eslint-disable-next-line no-alert
                  window.alert("Warning button clicked!");
                }}
              >
                Button
              </Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['paddingX="20px"']}
              nativeStyle={{ paddingInline: "20px", paddingBlock: "1px" }}
            >
              <Button paddingX="20px">Button</Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['paddingY="20px"']}
              nativeStyle={{ paddingBlock: "20px", paddingInline: "6px" }}
            >
              <Button paddingY="20px">Button</Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['paddingLeft="40px"']}
              nativeStyle={{
                paddingLeft: "40px",
                paddingRight: "6px",
                paddingBlock: "1px",
              }}
            >
              <Button paddingLeft="40px">Button</Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['paddingRight="40px"']}
              nativeStyle={{
                paddingRight: "40px",
                paddingLeft: "6px",
                paddingBlock: "1px",
              }}
            >
              <Button paddingRight="40px">Button</Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['padding="20px"', 'paddingX="0"']}
              nativeStyle={{ paddingInline: 0, paddingBlock: "20px" }}
            >
              <Button padding="20px" paddingX="0">
                Button
              </Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['padding="20px"', 'paddingLeft="0"']}
              nativeStyle={{
                paddingLeft: 0,
                paddingRight: "20px",
                paddingBlock: "20px",
              }}
            >
              <Button padding="20px" paddingLeft="0">
                Button
              </Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['paddingX="20px"', 'paddingLeft="0"']}
              nativeStyle={{
                paddingLeft: 0,
                paddingRight: "20px",
                paddingBlock: "1px",
              }}
            >
              <Button paddingX="20px" paddingLeft="0">
                Button
              </Button>
            </PaddingScenario>

            <PaddingScenario
              considering={['style={{ "--button-padding": "20px" }}']}
              nativeStyle={{ padding: "20px" }}
            >
              <Button style={{ "--button-padding": "20px" }}>Button</Button>
            </PaddingScenario>

            <PaddingScenario
              considering={[
                'style={{ "--button-padding": "20px" }}',
                'paddingX="0"',
              ]}
              nativeStyle={{ paddingInline: 0, paddingBlock: "20px" }}
            >
              <Button style={{ "--button-padding": "20px" }} paddingX="0">
                Button
              </Button>
            </PaddingScenario>

            <PaddingScenario
              considering={[
                "CSS: .my-container { --button-padding: 30px }",
                "Button is inside .my-container",
                'padding="0"',
              ]}
              nativeStyle={{ padding: 0 }}
            >
              <div class="demo-outer-padding">
                <Button padding="0">Button</Button>
              </div>
            </PaddingScenario>

            <PaddingScenario
              considering={[
                "CSS: .my-container { --button-padding-x: 40px }",
                "Button is inside .my-container",
                'padding="0"',
              ]}
              nativeStyle={{ padding: 0 }}
            >
              <div class="demo-outer-padding-x">
                <Button padding="0">Button</Button>
              </div>
            </PaddingScenario>

            <p
              style={{
                margin: "8px 0 4px",
                fontSize: "0.85rem",
                color: "#c00",
                fontStyle: "italic",
              }}
            >
              ↑ broken: --button-padding-x inherited from parent wins over
              padding="0" prop. Use --button-padding-x-default instead (see
              below).
            </p>

            <PaddingScenario
              considering={[
                "CSS: .my-container { --button-padding-x-default: 40px }",
                "Button is inside .my-container",
                'padding="0"',
              ]}
              nativeStyle={{ padding: 0 }}
            >
              <div class="demo-outer-padding-x-default">
                <Button padding="0">Button</Button>
              </div>
            </PaddingScenario>

            <p
              style={{
                margin: "8px 0 4px",
                fontSize: "0.85rem",
                color: "#555",
                fontStyle: "italic",
              }}
            >
              ↑ works: --button-padding-x-default is the last fallback in the
              chain, so padding="0" overrides it.
            </p>

            <PaddingScenario
              considering={[
                "CSS: .my-container { --button-padding-x-default: 40px }",
                "Button is inside .my-container",
                "(no prop — inherits the global default)",
              ]}
              nativeStyle={{ paddingInline: "40px", paddingBlock: "1px" }}
            >
              <div class="demo-outer-padding-x-default">
                <Button>Button</Button>
              </div>
            </PaddingScenario>

            <p
              style={{
                margin: "8px 0 4px",
                fontSize: "0.85rem",
                color: "#555",
                fontStyle: "italic",
              }}
            >
              ↑ also works: when no prop is passed, the global default is used
              as expected.
            </p>

            <p
              style={{
                margin: "16px 0 4px",
                fontSize: "0.85rem",
                color: "#555",
                background: "#f5f5f5",
                padding: "10px",
                borderRadius: "4px",
              }}
            >
              <strong>
                Why --button-padding-x-default and not --button-padding-x?
              </strong>
              <br />
              CSS custom properties inherit. If a parent sets{" "}
              <code>--button-padding-x</code>, that value travels down to the
              button and sits at the same "level" as
              <code>--button-padding</code> set inline — there is no cascade
              between vars. So <code>--button-padding-x</code> inherited from a
              parent would always win over <code>--button-padding</code> set as
              a prop, regardless of order.
              <br />
              <br />
              <code>--button-padding-x-default</code> is placed as the{" "}
              <em>last</em> fallback in the chain:{" "}
              <code>
                --button-padding-left → --button-padding-x → --button-padding →
                --button-padding-x-default
              </code>
              . This means any more-specific prop or var set closer to the
              button will override it. If you want to set a global default that
              can still be overridden per-button via props, always use{" "}
              <code>--button-padding-x-default</code> /{" "}
              <code>--button-padding-y-default</code>.
            </p>
          </div>
        );
      };

      const BasicStatesDemo = () => {
        return (
          <div className="demo-section">
            <h2>Button States</h2>

            <div className="states-section">
              <div className="states-title">Standard HTML Button States</div>
              <p className="states-description">
                These states work exactly like user agent HTML buttons, with
                enhanced styling and consistent behavior.
              </p>

              <Box column spacing="sm">
                <fieldset>
                  <legend>Default</legend>
                  <Box row spacing="sm" alignX="start">
                    <Button>Click Me</Button>
                    <button>Click Me</button>
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:focus-visible</legend>
                  <Box row spacing="sm" alignX="start">
                    <Button pseudoState={{ ":focus-visible": true }}>
                      Focused
                    </Button>
                    <button autofocus>Focused</button>
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:disabled</legend>
                  <Box row spacing="sm" alignX="start">
                    <Button disabled>Disabled</Button>
                    <button disabled>Disabled</button>
                  </Box>
                </fieldset>
              </Box>
            </div>

            <div className="states-section">
              <div className="states-title enhanced-states-title">
                Enhanced Navi States
              </div>
              <p className="states-description">
                These additional states provide enhanced UX patterns not
                available in standard HTML buttons.
              </p>

              <Box column spacing="sm">
                <fieldset>
                  <legend>:read-only</legend>
                  <Box row spacing="sm" alignX="start">
                    <Button readOnly>Read-only Button</Button>
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:read-only:focus-visible</legend>
                  <Box row spacing="sm" alignX="start">
                    <Button readOnly pseudoState={{ ":focus-visible": true }}>
                      Focused Read-only
                    </Button>
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:-navi-loading</legend>
                  <Box row spacing="sm" alignX="start">
                    <Button loading>Processing...</Button>
                  </Box>
                </fieldset>
              </Box>

              <div
                style={{
                  marginTop: "15px",
                  padding: "10px",
                  background: "#f8f9fa",
                  borderRadius: "4px",
                  fontSize: "0.85rem",
                  color: "#666",
                }}
              >
                <strong>Enhanced State Explanations:</strong>
                <ul style={{ margin: "5px 0", paddingLeft: "20px" }}>
                  <li>
                    <strong>Read-only:</strong> Visually indicates the button
                    cannot be interacted with, but remains focusable for
                    accessibility
                  </li>
                  <li>
                    <strong>Loading:</strong> Shows a spinner while maintaining
                    the button's size and preventing interaction
                  </li>
                </ul>
              </div>
            </div>
          </div>
        );
      };

      const SizeVariationsDemo = () => {
        return (
          <div className="demo-section">
            <h2>Size Variations</h2>

            <div className="variation-grid">
              <div className="variation-item">
                <p className="variation-label">Short</p>
                <Button>OK</Button>
              </div>

              <div className="variation-item">
                <p className="variation-label">Medium</p>
                <Button>Save Changes</Button>
              </div>

              <div className="variation-item">
                <p className="variation-label">Long text</p>
                <Button>This is a very long button text</Button>
              </div>

              <div className="variation-item">
                <p className="variation-label">Custom padding</p>
                <Button paddingX="xl" paddingY="md">
                  Large
                </Button>
              </div>
            </div>
          </div>
        );
      };

      const ColorVariationsDemo = () => {
        return (
          <div className="demo-section">
            <h2>Color Variations</h2>

            <div className="variation-grid">
              <div className="variation-item">
                <p className="variation-label">Success (Green background)</p>
                <Button backgroundColor="#28a745">Success</Button>
              </div>

              <div className="variation-item">
                <p className="variation-label">Danger (Red background)</p>
                <Button backgroundColor="#dc3545" color="white">
                  Danger
                </Button>
              </div>

              <div className="variation-item">
                <p className="variation-label">Icon + hover + colors</p>
                <Button
                  id="favorite"
                  backgroundColor="lightgrey"
                  color="#dc3545"
                  style={{
                    ":hover": {
                      backgroundColor: "#dc3545",
                      color: "white",
                    },
                  }}
                >
                  <Icon>
                    <svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
                      <rect
                        x="0"
                        y="0"
                        width="10"
                        height="10"
                        fill="currentColor"
                      />
                    </svg>
                  </Icon>
                  Add to Favorites
                </Button>
              </div>

              <div className="variation-item">
                <p className="variation-label">Outline style</p>
                <Button
                  borderColor="#007bff"
                  backgroundColor="transparent"
                  color="#007bff"
                >
                  Outline
                </Button>
              </div>
            </div>
          </div>
        );
      };

      const FullWidthDemo = () => {
        return (
          <div className="demo-section">
            <h2>Full Width</h2>

            <fieldset>
              <legend>
                Full width, centered text, custom background and border
              </legend>
              <Button
                width="100%"
                background="#1a1a2e"
                borderColor="#4a90e2"
                color="#ffffff"
                align="center"
              >
                Full width dark button
              </Button>
            </fieldset>

            <fieldset>
              <legend>Variations</legend>
              <div
                style={{ display: "flex", flexDirection: "column", gap: "8px" }}
              >
                <Button
                  flex
                  width="100%"
                  backgroundColor="#e8f5e9"
                  borderColor="#4caf50"
                  color="#2e7d32"
                >
                  Success — full width
                </Button>
                <Button
                  width="100%"
                  backgroundColor="#fff3e0"
                  borderColor="#ff9800"
                  color="#e65100"
                  alignX="center"
                >
                  Warning — full width
                </Button>
                <Button
                  width="100%"
                  backgroundColor="#fce4ec"
                  borderColor="#e91e63"
                  color="#880e4f"
                  alignX="end"
                >
                  Danger — full width
                </Button>
              </div>
            </fieldset>
          </div>
        );
      };

      const IconToggleDemo = () => {
        const [isVisible, setIsVisible] = useState(false);

        return (
          <div className="demo-section">
            <h2>Icon Button Toggle</h2>

            <fieldset>
              <legend>Toggle Eye Visibility</legend>
              <div className="button-group">
                <Button
                  onClick={() => setIsVisible(!isVisible)}
                  aria-label={isVisible ? "Hide content" : "Show content"}
                >
                  <Icon>{isVisible ? <EyeSvg /> : <EyeClosedSvg />}</Icon>
                </Button>
                <span style={{ marginLeft: "10px", color: "#666" }}>
                  Content is {isVisible ? "visible" : "hidden"}
                </span>
              </div>
            </fieldset>

            <fieldset>
              <legend>Different Sizes</legend>
              <div className="button-group">
                <Button
                  size="sm"
                  onClick={() => setIsVisible(!isVisible)}
                  aria-label={isVisible ? "Hide content" : "Show content"}
                >
                  <Icon size="sm">
                    {isVisible ? <EyeSvg /> : <EyeClosedSvg />}
                  </Icon>
                </Button>
                <Button
                  onClick={() => setIsVisible(!isVisible)}
                  aria-label={isVisible ? "Hide content" : "Show content"}
                >
                  <Icon>{isVisible ? <EyeSvg /> : <EyeClosedSvg />}</Icon>
                </Button>
                <Button
                  size="lg"
                  onClick={() => setIsVisible(!isVisible)}
                  aria-label={isVisible ? "Hide content" : "Show content"}
                >
                  <Icon size="lg">
                    {isVisible ? <EyeSvg /> : <EyeClosedSvg />}
                  </Icon>
                </Button>
              </div>
            </fieldset>

            <p style={{ color: "#666", fontSize: "0.9rem", margin: "10px 0" }}>
              Icon buttons that change state when clicked. The eye icon toggles
              between open and closed states based on the visibility toggle.
            </p>
          </div>
        );
      };

      const DiscreteVariantDemo = () => {
        return (
          <div className="demo-section">
            <h2>Discrete Variant</h2>

            <fieldset>
              <legend>Normal vs Discrete</legend>
              <div className="button-group">
                <Button>Regular Button</Button>
                <Button discrete>Discrete Button</Button>
              </div>
            </fieldset>

            <fieldset>
              <legend>Discrete States</legend>
              <div className="button-group">
                <Button discrete>Normal</Button>
                <Button discrete readOnly>
                  Read-only
                </Button>
                <Button discrete disabled>
                  Disabled
                </Button>
                <Button discrete loading>
                  Loading
                </Button>
              </div>
            </fieldset>

            <p style={{ color: "#666", fontSize: "0.9rem", margin: "10px 0" }}>
              Discrete buttons have minimal styling and blend better with
              content. Perfect for secondary actions or when you want less
              visual emphasis.
            </p>
          </div>
        );
      };

      const InteractiveDemo = () => {
        const [loading, setLoading] = useState(false);
        const [disabled, setDisabled] = useState(false);
        const [readOnly, setReadOnly] = useState(false);
        const [discrete, setDiscrete] = useState(false);

        return (
          <div className="demo-section">
            <h2>Interactive Controls</h2>

            <fieldset>
              <legend>Toggle States</legend>
              <div className="button-group">
                <button
                  style={{
                    padding: "8px 16px",
                    background: loading ? "#007bff" : "#f8f9fa",
                    color: loading ? "white" : "#333",
                    border: "1px solid #ddd",
                    borderRadius: "4px",
                    cursor: "pointer",
                  }}
                  onClick={() => setLoading(!loading)}
                >
                  Loading: {loading ? "ON" : "OFF"}
                </button>
                <button
                  style={{
                    padding: "8px 16px",
                    background: disabled ? "#007bff" : "#f8f9fa",
                    color: disabled ? "white" : "#333",
                    border: "1px solid #ddd",
                    borderRadius: "4px",
                    cursor: "pointer",
                  }}
                  onClick={() => setDisabled(!disabled)}
                >
                  Disabled: {disabled ? "ON" : "OFF"}
                </button>
                <button
                  style={{
                    padding: "8px 16px",
                    background: readOnly ? "#007bff" : "#f8f9fa",
                    color: readOnly ? "white" : "#333",
                    border: "1px solid #ddd",
                    borderRadius: "4px",
                    cursor: "pointer",
                  }}
                  onClick={() => setReadOnly(!readOnly)}
                >
                  Read-only: {readOnly ? "ON" : "OFF"}
                </button>
                <button
                  style={{
                    padding: "8px 16px",
                    background: discrete ? "#007bff" : "#f8f9fa",
                    color: discrete ? "white" : "#333",
                    border: "1px solid #ddd",
                    borderRadius: "4px",
                    cursor: "pointer",
                  }}
                  onClick={() => setDiscrete(!discrete)}
                >
                  Discrete: {discrete ? "ON" : "OFF"}
                </button>
              </div>
            </fieldset>

            <fieldset>
              <legend>Result</legend>
              <div className="button-group">
                <Button
                  loading={loading}
                  disabled={disabled}
                  readOnly={readOnly}
                  discrete={discrete}
                >
                  Interactive Button
                </Button>
              </div>
            </fieldset>
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
