<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InputCombobox Demo</title>
    <style>
      body {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      .value-display {
        min-height: 20px;
        margin-top: 10px;
        padding: 8px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }

      .option-pill {
        display: inline-flex;
        padding: 2px 8px;
        align-items: center;
        gap: 4px;
        color: #1a73e8;
        font-size: 0.8rem;
        background: #e8f0fe;
        border-radius: 12px;
      }

      .option-secondary {
        margin-left: 6px;
        color: #888;
        font-size: 0.875em;
      }
    </style>
  </head>
  <body>
    <h1>InputCombobox Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { InputCombobox } from "../input_combobox.jsx";

      // --- Data ---

      const FRUITS = [
        "Apple",
        "Apricot",
        "Banana",
        "Blueberry",
        "Cherry",
        "Grape",
        "Kiwi",
        "Lemon",
        "Mango",
        "Orange",
        "Peach",
        "Pear",
        "Pineapple",
        "Raspberry",
        "Strawberry",
        "Watermelon",
      ];

      const COUNTRIES = [
        { code: "fr", name: "France", region: "Europe" },
        { code: "de", name: "Germany", region: "Europe" },
        { code: "jp", name: "Japan", region: "Asia" },
        { code: "br", name: "Brazil", region: "South America" },
        { code: "us", name: "United States", region: "North America" },
        { code: "au", name: "Australia", region: "Oceania" },
        { code: "cn", name: "China", region: "Asia" },
        { code: "in", name: "India", region: "Asia" },
        { code: "mx", name: "Mexico", region: "North America" },
        { code: "za", name: "South Africa", region: "Africa" },
      ];

      // --- Demos ---

      const App = () => (
        <div>
          <SimpleStringsDemo />
          <ObjectsDemo />
          <LoadingDemo />
          <CustomRenderDemo />
        </div>
      );

      const SimpleStringsDemo = () => {
        const [value, setValue] = useState(null);
        return (
          <div className="demo-section">
            <h2>Simple strings</h2>
            <p>Basic usage with an array of strings.</p>
            <InputCombobox
              options={FRUITS}
              value={value}
              onChange={setValue}
              placeholder="Search a fruit…"
            />
            <div className="value-display">{value ?? ""}</div>
          </div>
        );
      };

      const ObjectsDemo = () => {
        const [value, setValue] = useState(null);
        return (
          <div className="demo-section">
            <h2>Objects with getOptionKey / getOptionLabel</h2>
            <p>Using country objects with custom key and label accessors.</p>
            <InputCombobox
              options={COUNTRIES}
              value={value}
              onChange={setValue}
              getOptionKey={(country) => country.code}
              getOptionLabel={(country) => country.name}
              placeholder="Search a country…"
            />
            <div className="value-display">
              {value ? `${value.name} (${value.code}) — ${value.region}` : ""}
            </div>
          </div>
        );
      };

      const LoadingDemo = () => {
        const [loading, setLoading] = useState(true);
        const [value, setValue] = useState(null);
        return (
          <div className="demo-section">
            <h2>Loading state</h2>
            <p>Renders a disabled input while data is being fetched.</p>
            <label>
              <input
                type="checkbox"
                checked={loading}
                onChange={(e) => setLoading(e.target.checked)}
              />{" "}
              loading
            </label>
            <br />
            <br />
            <InputCombobox
              options={FRUITS}
              value={value}
              onChange={setValue}
              loading={loading}
              loadingPlaceholder="Fetching fruits…"
              placeholder="Search a fruit…"
            />
          </div>
        );
      };

      const CustomRenderDemo = () => {
        const [value, setValue] = useState(null);

        const renderCountryOption = (country, { isActive }) => (
          <span>
            <span style={{ fontWeight: 500 }}>{country.name}</span>
            <span className="option-secondary">{country.region}</span>
          </span>
        );

        const filterCountries = (options, query) => {
          const q = query.toLowerCase();
          if (!q) {
            return options;
          }
          return options.filter(
            (c) =>
              c.name.toLowerCase().includes(q) ||
              c.region.toLowerCase().includes(q),
          );
        };

        return (
          <div className="demo-section">
            <h2>Custom renderOption + filterOptions</h2>
            <p>
              Country name and region shown per option. Filter also searches by
              region (try "asia" or "europe").
            </p>
            <InputCombobox
              options={COUNTRIES}
              value={value}
              onChange={setValue}
              getOptionKey={(c) => c.code}
              getOptionLabel={(c) => c.name}
              filterOptions={filterCountries}
              renderOption={renderCountryOption}
              placeholder="Search by name or region…"
            />
            {value && (
              <div className="value-display">
                <span className="option-pill">{value.name}</span>
                {" — "}
                {value.region}
              </div>
            )}
            {!value && <div className="value-display" />}
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
