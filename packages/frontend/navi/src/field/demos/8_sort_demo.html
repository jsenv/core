<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Suggestion Sort Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #app {
        max-width: 400px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";

      /**
       * Sort Demo — SuggestionList with a user-provided sort function.
       *
       * The sort function knows the full list of items and, given a filter string,
       * returns the rank (0-based index) of each suggestion among the visible ones.
       * Suggestions outside the virtual scroll window return null automatically
       * based on that rank — no DOM reordering needed.
       *
       * Sort logic: items that START with the filter come first (sorted
       * alphabetically), then items that CONTAIN the filter (sorted alphabetically).
       * Items that don't match at all get rank -1 (hidden).
       */

      import {
        Input,
        Suggestion,
        SuggestionList,
        SuggestionListCombo,
      } from "@jsenv/navi";
      import { useState } from "preact/hooks";
      import { SortContext } from "../suggestion_list.jsx";

      // 200 items so virtual scroll kicks in.
      const ITEMS = Array.from({ length: 200 }, (_, i) => {
        const names = [
          "Alpha",
          "Bravo",
          "Charlie",
          "Delta",
          "Echo",
          "Foxtrot",
          "Golf",
          "Hotel",
          "India",
          "Juliet",
          "Kilo",
          "Lima",
          "Mike",
          "November",
          "Oscar",
          "Papa",
          "Quebec",
          "Romeo",
          "Sierra",
          "Tango",
        ];
        const base = names[i % names.length];
        const num = String(Math.floor(i / names.length) + 1).padStart(2, "0");
        return `${base}-${num}`;
      });

      /**
       * Build a sort function over the given item list.
       * Returns getSortIndex(value, filter) => rank | -1.
       *
       * rank is the dense position of `value` among all matching items when sorted by:
       *   1. items that start with the filter (alphabetically)
       *   2. items that contain the filter (alphabetically)
       */
      const buildSortFn = (items) => (value, filter) => {
        if (!filter) {
          // No filter: original order.
          return items.indexOf(value);
        }
        const lower = filter.toLowerCase();
        const starts = [];
        const contains = [];
        for (const item of items) {
          const lowerItem = item.toLowerCase();
          if (lowerItem.startsWith(lower)) {
            starts.push(item);
          } else if (lowerItem.includes(lower)) {
            contains.push(item);
          }
        }
        starts.sort((a, b) => a.localeCompare(b));
        contains.sort((a, b) => a.localeCompare(b));
        const ranked = [...starts, ...contains];
        const idx = ranked.indexOf(value);
        return idx; // -1 if not in ranked list (filtered out)
      };

      const getSortIndex = buildSortFn(ITEMS);

      export const App = () => {
        const [selected, setSelected] = useState(null);

        return (
          <div>
            <h2>Suggestion Sort Demo</h2>
            <p style="font-size:13px;color:#555">
              Items starting with the filter appear first, then containing
              items. Virtual scroll is active (200 items).
            </p>
            {selected && (
              <p style="font-size:13px;color:#1a73e8">
                Selected: <b>{selected}</b>
              </p>
            )}
            <SortContext.Provider value={getSortIndex}>
              <SuggestionListCombo>
                <Input placeholder="Filter and sort…" expandX />
                <SuggestionList
                  maxHeight="220px"
                  uiAction={setSelected}
                  expandX
                >
                  {ITEMS.map((item) => (
                    <Suggestion key={item} value={item}>
                      {item}
                    </Suggestion>
                  ))}
                </SuggestionList>
              </SuggestionListCombo>
            </SortContext.Provider>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
