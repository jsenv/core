<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Suggestion Sort Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #app {
        max-width: 400px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";

      /**
       * Sort Demo — SuggestionList with a user-provided sort function.
       *
       * The sort function knows the full list of items and, given a filter string,
       * returns the rank (0-based index) of each suggestion among the visible ones.
       * Suggestions outside the virtual scroll window return null automatically
       * based on that rank — no DOM reordering needed.
       *
       * Sort logic: items that START with the filter come first (sorted
       * alphabetically), then items that CONTAIN the filter (sorted alphabetically).
       * Items that don't match at all get rank -1 (hidden).
       */

      import { Suggestion, SuggestionList } from "@jsenv/navi";
      import { useState } from "preact/hooks";

      const ALL_ITEMS = Array.from({ length: 200 }, (_, i) => {
        const names = [
          "Alpha",
          "Bravo",
          "Charlie",
          "Delta",
          "Echo",
          "Foxtrot",
          "Golf",
          "Hotel",
          "India",
          "Juliet",
          "Kilo",
          "Lima",
          "Mike",
          "November",
          "Oscar",
          "Papa",
          "Quebec",
          "Romeo",
          "Sierra",
          "Tango",
        ];
        const base = names[i % names.length];
        const num = String(Math.floor(i / names.length) + 1).padStart(2, "0");
        return `${base}-${num}`;
      });

      // Sort items based on a filter string:
      //   1. items that START with the filter (alphabetically)
      //   2. items that CONTAIN the filter (alphabetically)
      //   3. everything else at the end
      // No items are hidden — all 200 are always rendered, just reordered.
      const sortItems = (items, filter) => {
        if (!filter) {
          return items;
        }
        const lower = filter.toLowerCase();
        const starts = [];
        const contains = [];
        const rest = [];
        for (const item of items) {
          const lowerItem = item.toLowerCase();
          if (lowerItem.startsWith(lower)) {
            starts.push(item);
          } else if (lowerItem.includes(lower)) {
            contains.push(item);
          } else {
            rest.push(item);
          }
        }
        starts.sort((a, b) => a.localeCompare(b));
        contains.sort((a, b) => a.localeCompare(b));
        return [...starts, ...contains, ...rest];
      };

      export const App = () => {
        const [filter, setFilter] = useState("");
        const [selected, setSelected] = useState(null);
        const items = sortItems(ALL_ITEMS, filter);

        return (
          <div>
            <h2>Suggestion Sort Demo</h2>
            <p style="font-size:13px;color:#555">
              Items matching the filter bubble up to the top (sorted). Virtual
              scroll is active (200 items).
            </p>
            {selected && (
              <p style="font-size:13px;color:#1a73e8">
                Selected: <b>{selected}</b>
              </p>
            )}
            <input
              placeholder="Sort suggestions…"
              value={filter}
              onInput={(e) => setFilter(e.target.value)}
              style="display:block;width:100%;box-sizing:border-box;margin-bottom:4px;padding:6px 10px;font-size:14px;border:1px solid #ccc;border-radius:4px"
            />
            <SuggestionList maxHeight="220px" uiAction={setSelected}>
              {items.map((item) => (
                <Suggestion key={item} value={item}>
                  {item}
                </Suggestion>
              ))}
            </SuggestionList>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
