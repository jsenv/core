<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkbox Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      fieldset {
        margin: 15px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      legend {
        padding: 0 10px;
        color: #555;
        font-weight: 500;
        white-space: nowrap;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .comparison-section {
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-left: 4px solid #007bff;
        border-radius: 4px;
      }

      .comparison-title {
        margin: 0 0 15px 0;
        color: #495057;
        font-weight: 500;
        font-size: 0.9rem;
      }

      .comparison-group {
        display: flex;
        margin: 10px 0;
        align-items: center;
        gap: 15px;
      }

      .comparison-label {
        min-width: 80px;
        color: #666;
        font-size: 0.85rem;
      }

      .variation-grid {
        display: grid;
        margin: 15px 0;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      .variation-item {
        padding: 15px;
        text-align: center;
        background: #f8f9fa;
        border-radius: 6px;
      }

      .variation-label {
        margin: 0 0 10px 0;
        color: #666;
        font-size: 0.85rem;
      }

      .states-section {
        margin: 20px 0;
      }

      .states-title {
        margin: 0 0 15px 0;
        padding: 8px 12px;
        color: #495057;
        font-weight: 600;
        font-size: 0.95rem;
        text-align: center;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border: 1px solid #dee2e6;
        border-radius: 6px;
      }

      .enhanced-states-title {
        color: #1565c0;
        background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
        border-color: #2196f3;
      }

      .states-description {
        margin: 10px 0 15px 0;
        padding: 10px 15px;
        color: #666;
        font-style: italic;
        font-size: 0.9rem;
        background: #f8f9fa;
        border-left: 4px solid #007bff;
        border-radius: 0 4px 4px 0;
      }
    </style>
  </head>
  <body>
    <h1>Checkbox Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useRef } from "preact/hooks";
      import {
        Input,
        Field,
        Box,
        Icon,
        EyeSvg,
        EyeClosedSvg,
        HeartSvg,
        ExclamationSvg,
        Caption,
        NaviDebug,
        Button,
        Form,
        createAction,
        Label,
      } from "@jsenv/navi";

      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <div>
              <TableOfContents />
              <BasicStatesDemo />
              <InteractivityDemo />
              <SizeDemo />
              <ColorDemo />
              <ToggleAppearanceDemo />
              <IconDemo />
              <InteractiveDemo />
            </div>
          </NaviDebug>
        );
      };

      const TableOfContents = () => {
        return (
          <div class="demo-section">
            <h2>Table of contents</h2>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#states">Checkbox States</a>
              </li>
              <li>
                <a href="#interactivity">Interactivity (action &amp; form)</a>
              </li>
              <li>
                <a href="#sizes">Checkbox Sizes</a>
              </li>
              <li>
                <a href="#colors">Custom Colors</a>
              </li>
              <li>
                <a href="#toggle">Toggle Appearance</a>
              </li>
              <li>
                <a href="#icons">Custom Icons</a>
              </li>
              <li>
                <a href="#interactive-controls">Interactive Controls</a>
              </li>
              <li>
                <a href="./checkbox_fieldset_demo.html">
                  CheckboxFieldset demo
                </a>
              </li>
            </ol>
          </div>
        );
      };

      const toggleAction = createAction(async ({ notifications }) => {
        await delay(600);
        return `${notifications ? "✅" : "☐"} Notifications ${
          notifications ? "enabled" : "disabled"
        }`;
      });

      const InteractivityDemo = () => {
        return (
          <div class="demo-section" id="interactivity">
            <h2>Interactivity</h2>

            <div class="states-section">
              <div class="states-title">action</div>
              <p class="states-description">
                <code>action</code> is called when the user clicks. It receives
                the checkbox <code>value</code> when checked, or{" "}
                <code>undefined</code> when unchecked — mirroring how a standard
                checkbox behaves in a form (present or absent). When no{" "}
                <code>value</code> prop is set, it defaults to <code>"on"</code>
                . A read-only checkbox does not trigger it.
              </p>

              <ActionBasicDemo />
              <ActionCustomValueDemo />
              <ActionDefaultCheckedDemo />
              <ActionReadonlyDemo />
              <ActionAsyncSuccessDemo />
              <ActionAsyncAlwaysFailsDemo />
              <ActionAsyncDefaultCheckedAlwaysFailsDemo />
              <ActionAsyncControlledDemo />
              <ActionObjectDemo />
            </div>

            <div class="states-section">
              <div class="states-title">Form</div>
              <p class="states-description">
                Inside a <code>Form</code>, the checkbox value is submitted with
                the form. The server can reject the submission and the UI
                reflects the error.
              </p>

              <FormBackendRejectDemo />
              <FormRequiredDemo />
            </div>
          </div>
        );
      };

      const ActionBasicDemo = () => {
        const [lastValue, setLastValue] = useState(undefined);
        const [fired, setFired] = useState(false);
        return (
          <fieldset>
            <legend>
              Default value — action receives <code>"on"</code> or{" "}
              <code>undefined</code>
            </legend>
            <p class="states-description" style={{ marginTop: 0 }}>
              No <code>value</code> prop set. Checking calls action with{" "}
              <code>"on"</code>; unchecking calls it with <code>undefined</code>
              .
            </p>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <Field>
                <Input
                  type="checkbox"
                  name="enabled"
                  action={(value) => {
                    setLastValue(value);
                    setFired(true);
                  }}
                />
                <Label>Enable feature</Label>
              </Field>
              {fired && (
                <span style={{ fontSize: "0.85rem", color: "#555" }}>
                  action called with:{" "}
                  <code>
                    {lastValue === undefined
                      ? "undefined"
                      : JSON.stringify(lastValue)}
                  </code>
                </span>
              )}
            </Box>
          </fieldset>
        );
      };

      const ActionCustomValueDemo = () => {
        const [lastValue, setLastValue] = useState(undefined);
        const [fired, setFired] = useState(false);
        return (
          <fieldset>
            <legend>
              Custom value — action receives <code>"admin"</code> or{" "}
              <code>undefined</code>
            </legend>
            <p class="states-description" style={{ marginTop: 0 }}>
              <code>value="admin"</code> is set. Checking calls action with{" "}
              <code>"admin"</code>; unchecking calls it with{" "}
              <code>undefined</code>.
            </p>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <Field>
                <Input
                  type="checkbox"
                  name="role"
                  value="admin"
                  action={(value) => {
                    setLastValue(value);
                    setFired(true);
                  }}
                />
                <Label>Grant admin role</Label>
              </Field>
              {fired && (
                <span style={{ fontSize: "0.85rem", color: "#555" }}>
                  action called with:{" "}
                  <code>
                    {lastValue === undefined
                      ? "undefined"
                      : JSON.stringify(lastValue)}
                  </code>
                </span>
              )}
            </Box>
          </fieldset>
        );
      };

      const ActionDefaultCheckedDemo = () => {
        const [lastValue, setLastValue] = useState(undefined);
        const [fired, setFired] = useState(false);
        return (
          <fieldset>
            <legend>Default checked — starts checked, fires on change</legend>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <Field>
                <Input
                  type="checkbox"
                  name="enabled"
                  defaultChecked
                  action={(value) => {
                    setLastValue(value);
                    setFired(true);
                  }}
                />
                <Label>Enable feature</Label>
              </Field>
              {fired && (
                <span style={{ fontSize: "0.85rem", color: "#555" }}>
                  action called with:{" "}
                  <code>
                    {lastValue === undefined
                      ? "undefined"
                      : JSON.stringify(lastValue)}
                  </code>
                </span>
              )}
            </Box>
          </fieldset>
        );
      };

      const ActionReadonlyDemo = () => (
        <fieldset>
          <legend>
            Read-only — state is frozen, action is never triggered
          </legend>
          <p class="states-description" style={{ marginTop: 0 }}>
            A read-only checkbox cannot be checked or unchecked by the user. Its
            state is frozen in place, so action is never called.
          </p>
          <Box flex="y" spacing="s" alignX="start">
            <Field>
              <Input
                type="checkbox"
                readOnly
                action={(value) => {
                  console.log("this should never log", value);
                }}
              />
              <Label>Unchecked read-only</Label>
            </Field>
            <Field>
              <Input
                type="checkbox"
                readOnly
                defaultChecked
                action={(value) => {
                  console.log("this should never log", value);
                }}
              />
              <Label>Checked read-only</Label>
            </Field>
          </Box>
        </fieldset>
      );

      const ActionAsyncSuccessDemo = () => {
        const [result, setResult] = useState(null);
        return (
          <fieldset>
            <legend>Async — succeeds after 1s</legend>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <Field>
                <Input
                  type="checkbox"
                  name="enabled"
                  action={async (checked) => {
                    await delay(1000);
                    return `${checked ? "✅" : "☐"} ${
                      checked ? "checked" : "unchecked"
                    }`;
                  }}
                  onActionSuccess={(value) => setResult({ ok: true, value })}
                />
                <Label>Enable feature</Label>
              </Field>
              {result && (
                <span
                  style={{
                    fontSize: "0.85rem",
                    color: result.ok ? "#2a7a2a" : "#c00",
                  }}
                >
                  {result.value}
                </span>
              )}
            </Box>
          </fieldset>
        );
      };

      const ActionAsyncAlwaysFailsDemo = () => {
        const [error, setError] = useState(null);
        return (
          <fieldset>
            <legend>Async — always fails, checkbox reverts on error</legend>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <Field>
                <Input
                  type="checkbox"
                  name="dangerous"
                  action={async (checked) => {
                    await delay(1500);
                    throw new Error(
                      `Action failed for ${
                        checked ? "checked" : "unchecked"
                      } state`,
                    );
                  }}
                  onActionError={(err) => setError(err.message)}
                />
                <Label>Dangerous operation</Label>
              </Field>
              {error && (
                <span style={{ fontSize: "0.85rem", color: "#c00" }}>
                  ❌ {error}
                </span>
              )}
            </Box>
          </fieldset>
        );
      };

      const ActionAsyncDefaultCheckedAlwaysFailsDemo = () => {
        const [error, setError] = useState(null);
        return (
          <fieldset>
            <legend>
              Async + default checked — always fails, reverts to checked on
              error
            </legend>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <Field>
                <Input
                  type="checkbox"
                  name="risky"
                  defaultChecked
                  action={async (risky) => {
                    await delay(1200);
                    throw new Error(
                      `Operation failed for ${
                        risky ? "enabled" : "disabled"
                      } risky feature`,
                    );
                  }}
                  onActionError={(err) => setError(err.message)}
                />
                <Label>Enable risky feature</Label>
              </Field>
              {error && (
                <span style={{ fontSize: "0.85rem", color: "#c00" }}>
                  ❌ {error}
                </span>
              )}
            </Box>
          </fieldset>
        );
      };

      const ActionAsyncControlledDemo = () => {
        const [checked, setChecked] = useState(false);
        const [result, setResult] = useState(null);
        return (
          <fieldset>
            <legend>
              Async + controlled — fails when unchecked, reverts on error
            </legend>
            <p class="states-description" style={{ marginTop: 0 }}>
              The checked state comes from the server. On success the component
              re-renders with the new value; on failure it reverts.
            </p>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <Field>
                <Input
                  type="checkbox"
                  name="protection"
                  checked={checked}
                  action={async (protection) => {
                    await delay(1000);
                    if (!protection) {
                      throw new Error("Protection must be enabled");
                    }
                    setChecked(true);
                    return "✅ Protection enabled";
                  }}
                  onActionSuccess={(value) => setResult({ ok: true, value })}
                  onActionError={(err) =>
                    setResult({ ok: false, value: err.message })
                  }
                />
                <Label>Enable security protection</Label>
              </Field>
              {result && (
                <span
                  style={{
                    fontSize: "0.85rem",
                    color: result.ok ? "#2a7a2a" : "#c00",
                  }}
                >
                  {result.ok ? "" : "❌ "}
                  {result.value}
                </span>
              )}
            </Box>
          </fieldset>
        );
      };

      const ActionObjectDemo = () => {
        const [result, setResult] = useState(null);
        return (
          <fieldset>
            <legend>Action object — created with createAction</legend>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <Field>
                <Input
                  type="checkbox"
                  name="notifications"
                  action={(notifications) => toggleAction({ notifications })}
                  onActionStart={() => setResult({ pending: true })}
                  onActionEnd={(data) =>
                    setResult({ pending: false, value: data })
                  }
                />
                <Label>Enable notifications</Label>
              </Field>
              {result && (
                <span
                  style={{
                    fontSize: "0.85rem",
                    color: result.pending ? "#555" : "#2a7a2a",
                  }}
                >
                  {result.pending ? "Processing…" : result.value}
                </span>
              )}
            </Box>
          </fieldset>
        );
      };

      const FormBackendRejectDemo = () => {
        const [checked, setChecked] = useState(true);
        const [result, setResult] = useState(null);
        const ref = useRef();

        return (
          <fieldset>
            <legend>Backend rejects — server throws when unchecked</legend>
            <p class="states-description" style={{ marginTop: 0 }}>
              Demonstrates backend validation: the form submits, but the server
              throws if terms aren't agreed. No frontend constraint — only the
              backend enforces it.
            </p>
            <Form
              action={async ({ terms }) => {
                await delay(1000);
                if (!terms) {
                  throw new Error("You must agree to the terms and conditions");
                }
                setChecked(Boolean(terms));
                return "✅ Form submitted successfully!";
              }}
              onActionSuccess={(value) => setResult({ ok: true, value })}
              onActionError={(err) =>
                setResult({ ok: false, value: err.message })
              }
            >
              <Box flex="y" spacing="s" alignX="start">
                <Box flex spacing="s" alignX="start" alignY="center">
                  <Field>
                    <Input
                      ref={ref}
                      type="checkbox"
                      name="terms"
                      checked={checked}
                    />
                    <Label>I agree to the terms and conditions</Label>
                  </Field>
                  <Button
                    type="button"
                    action={() => {
                      ref.current.dispatchEvent(
                        new CustomEvent("navi_set_ui_state", {
                          detail: { value: true },
                        }),
                      );
                    }}
                  >
                    Accept
                  </Button>
                  <Button
                    type="button"
                    action={() => {
                      ref.current.dispatchEvent(
                        new CustomEvent("navi_set_ui_state", {
                          detail: { value: false },
                        }),
                      );
                    }}
                  >
                    Decline
                  </Button>
                </Box>
                <Button type="submit">Submit</Button>
              </Box>
            </Form>
            {result && (
              <div
                style={{
                  marginTop: "10px",
                  fontSize: "0.85rem",
                  color: result.ok ? "#2a7a2a" : "#c00",
                }}
              >
                {result.ok ? "" : "❌ "}
                {result.value}
              </div>
            )}
          </fieldset>
        );
      };

      const FormRequiredDemo = () => {
        const [result, setResult] = useState(null);

        return (
          <fieldset>
            <legend>Frontend required — callout blocks submission</legend>
            <p class="states-description" style={{ marginTop: 0 }}>
              The checkbox is marked <code>required</code>. The form action
              never runs while it is unchecked — a callout appears at the
              checkbox instead.
            </p>
            <Form
              action={async () => {
                await delay(1000);
                return "✅ Form submitted successfully!";
              }}
              onActionSuccess={(value) => setResult({ ok: true, value })}
              onActionError={(err) =>
                setResult({ ok: false, value: err.message })
              }
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  <Input type="checkbox" name="terms" required />
                  <Label>I agree to the terms and conditions</Label>
                </Field>
                <Button type="submit">Submit</Button>
              </Box>
            </Form>
            {result && (
              <div
                style={{
                  marginTop: "10px",
                  fontSize: "0.85rem",
                  color: result.ok ? "#2a7a2a" : "#c00",
                }}
              >
                {result.ok ? "" : "❌ "}
                {result.value}
              </div>
            )}
          </fieldset>
        );
      };

      const BasicStatesDemo = () => {
        return (
          <div className="demo-section" id="states">
            <h2>Checkbox States</h2>

            <div className="states-section">
              <div className="states-title">Standard HTML Checkbox States</div>
              <p className="states-description">
                These states work exactly like user agent HTML checkboxes, with
                enhanced styling and consistent behavior.
              </p>

              <Box flex spacing="s">
                <Box as="fieldset" width="100">
                  <legend>Default</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input type="checkbox" />
                      <Label>Navi</Label>
                    </Field>
                    <label>
                      <input type="checkbox" />
                      User Agent
                    </label>
                  </Box>
                </Box>
                <Box as="fieldset" width="200">
                  <legend>:focus-visible</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input
                        type="checkbox"
                        pseudoState={{ ":focus-visible": true }}
                      />
                      <Label>Navi</Label>
                    </Field>
                    <label>
                      <input type="checkbox" autofocus />
                      User agent
                    </label>
                  </Box>
                </Box>
                <Box as="fieldset" width="150">
                  <legend>:disabled</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input type="checkbox" disabled />
                      <Label>Navi</Label>
                    </Field>
                    <label>
                      <input type="checkbox" disabled />
                      User Agent
                    </label>
                  </Box>
                </Box>
              </Box>
              <Box flex spacing="s">
                <Box as="fieldset" width="100">
                  <legend>:checked</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input type="checkbox" defaultChecked />
                      <Label>Navi</Label>
                    </Field>
                    <label>
                      <input type="checkbox" checked />
                      User Agent
                    </label>
                  </Box>
                </Box>

                <Box as="fieldset" width="200">
                  <legend>:focus-visible:checked</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input
                        type="checkbox"
                        defaultChecked
                        pseudoState={{ ":focus-visible": true }}
                      />
                      <Label>Navi</Label>
                    </Field>
                    <label>
                      <input type="checkbox" autofocus defaultChecked />
                      User Agent
                    </label>
                  </Box>
                </Box>

                <Box as="fieldset" width="150">
                  <legend>:disabled:checked</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input type="checkbox" disabled defaultChecked />
                      <Label>Navi</Label>
                    </Field>
                    <label>
                      <input type="checkbox" disabled checked />
                      User agent
                    </label>
                  </Box>
                </Box>
              </Box>
            </div>

            <div className="states-section">
              <div className="states-title enhanced-states-title">
                Enhanced Navi States
              </div>
              <p className="states-description">
                These additional states provide enhanced UX patterns not
                available in standard HTML checkboxes.
              </p>

              <Box flex spacing="s">
                <Box as="fieldset" width="200">
                  <legend>:read-only</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input type="checkbox" readOnly />
                      <Label>Read-only</Label>
                    </Field>
                  </Box>
                </Box>
                <Box as="fieldset" width="200">
                  <legend>:-navi-loading</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input type="checkbox" loading />
                      <Label>Loading</Label>
                    </Field>
                  </Box>
                </Box>
              </Box>
              <Box flex spacing="s">
                <Box as="fieldset" width="200">
                  <legend>:read-only:checked</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input type="checkbox" readOnly checked />
                      <Label>Read-only</Label>
                    </Field>
                  </Box>
                </Box>
                <Box as="fieldset" width="200">
                  <legend>:-navi-loading:checked</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Field>
                      <Input type="checkbox" loading checked />
                      <Label>Loading</Label>
                    </Field>
                  </Box>
                </Box>
              </Box>

              <div
                style={{
                  marginTop: "15px",
                  padding: "10px",
                  background: "#f8f9fa",
                  borderRadius: "4px",
                  fontSize: "0.85rem",
                  color: "#666",
                }}
              >
                <strong>Enhanced State Explanations:</strong>
                <ul style={{ margin: "5px 0", paddingLeft: "20px" }}>
                  <li>
                    <strong>Read-only:</strong> Visually indicates the checkbox
                    cannot be interacted with, but remains focusable for
                    accessibility
                  </li>
                  <li>
                    <strong>Loading:</strong> Shows a spinner while allowing the
                    checkbox to remain interactive
                  </li>
                </ul>
              </div>
            </div>
          </div>
        );
      };

      const ColorDemo = () => {
        return (
          <div className="demo-section" id="colors">
            <h2>Custom Colors</h2>

            <div className="states-section">
              <div className="states-title">Custom Color Themes</div>

                >
                  State: checked={checked ? "true" : "false"} | loading=
                  {loading ? "true" : "false"} | disabled=
                  {disabled ? "true" : "false"}
                </div>
              </Box>
            </fieldset>
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
