<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Select Demo — Day Picker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      .demo-section {
        max-width: 400px;
        margin: 0 auto 40px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { signal } from "@preact/signals";
      import { Box, Icon, Label, Select, NaviDebug, Time } from "@jsenv/navi";

      const toDateKey = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      };

      const scheduledDaySignal = signal(toDateKey(new Date()));

      const App = () => {
        return (
          <div class="demo-section">
            <h2>Day Picker Select</h2>
            <p>
              Custom trigger, fixed options + "pick another date" item with a
              hidden date input overlaid on top. Selecting a custom date sets a
              day-offset signal.
            </p>
            <GameWhenField />
          </div>
        );
      };

      const GameWhenField = () => {
        return (
          <Box flex="y" gap="s">
            <Label
              htmlFor="date"
              flex
              alignY="center"
              size="l"
              spacing="xs"
              marginBottom="xs"
              bold
            >
              <Icon size="s">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z" />
                </svg>
              </Icon>
              Date & Heure
            </Label>
            <NaviDebug debugPopup debugFocus>
              <Select
                type="day"
                min={new Date()}
                custom
                value={scheduledDaySignal.value}
                uiAction={(dateKey) => {
                  scheduledDaySignal.value = dateKey;
                }}
                expandX
              />
            </NaviDebug>
            <p style="margin: 12px 0 0; font-size: 13px; color: #333;">
              Valeur sélectionnée :{" "}
              <Time type="">{scheduledDaySignal.value}</Time>
            </p>
          </Box>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
