      const searchPerson = createSearch({
        name: {
          getter: (item) => item.name,
          domSelector: ".item-name",
        },
        address: {
          getter: (item) => item.address,
          domSelector: ".item-address",
          priority: 0.5,
        },
      });

      const StatsBar = ({ totalItems, domItems }) => {
        const savedFromDom = totalItems - domItems;
        return (
          <div className="stats-bar">
            <div className="stat">
              <span className="stat-label">Total items</span>
              <span className="stat-value">{totalItems}</span>
            </div>
            <div className="stat">
              <span className="stat-label">In DOM</span>
              <span
                className={`stat-value ${domItems < totalItems ? "highlight" : ""}`}
              >
                {domItems}
              </span>
            </div>
            <div className="stat">
              <span className="stat-label">Saved from DOM</span>
              <span
                className={`stat-value ${savedFromDom > 0 ? "warning" : ""}`}
              >
                {savedFromDom}
              </span>
            </div>
          </div>
        );
      };

      const App = () => {
        const [selected, setSelected] = useState(null);
        const [search, setSearch] = useState("");
        const [orderedItems, getItemMatchInfo] = useSearchText(
          search,
          ITEMS,
          searchPerson,
        );

        return (
          <div>
            <p
              style={{
                fontSize: "0.9rem",
                color: "#555",
                marginBottom: "12px",
              }}
            >
              Sticky header inside the list. Each option shows a name + address
              (address wraps on narrow containers). The filter matches both name
              and address — highlights appear in both fields.
            </p>

            <div className="scroll-container">
              <p className="sticky-header-title">
                Veuillez sélectionner une suggestion
              </p>

              <Input
                type="search"
                placeholder="Filtrer par nom ou adresse…"
                expandX
                action={(v) => setSearch(v)}
                marginBottom="s"
              />
              <List
                role="listbox"
                fallback="No results"
                searchText={search}
                uiAction={setSelected}
                expandX
                maxHeight="320px"
                renderBudget={15}
                separator={<Separator margin="0" />}
              >
                {orderedItems.map((item, i) => {
                  const { score, match, ranges } = getItemMatchInfo(item);
                  return (
                    <ListItem
                      role="option"
                      key={item.name}
                      index={i}
                      value={item}
                      matchScore={score}
                      filtered={!match}
                      highlight={ranges}
                      selected={selected === item}
                    >
                      <div
                        style={{
                          display: "flex",
                          flexDirection: "column",
                          gap: "2px",
                        }}
                      >
                        <span className="item-name">{item.name}</span>
                        <span
                          className="item-address"
                          style={{ fontSize: "0.8em", opacity: 0.65 }}
                        >
                          {item.address}
                        </span>
                      </div>
                    </ListItem>
                  );
                })}
              </List>
            </div>

            <div className="value-display">
              {selected
                ? `${selected.name} — ${selected.address}`
                : "(none selected)"}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
