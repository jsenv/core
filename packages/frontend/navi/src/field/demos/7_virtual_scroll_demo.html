<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Scroll Demo</title>
    <style>
      body {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 16px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      .demo-section p {
        margin: 0 0 16px 0;
        color: #555;
        font-size: 0.95rem;
      }

      .stats-bar {
        display: flex;
        margin-bottom: 12px;
        padding: 10px 14px;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
        color: #d4d4d4;
        font-size: 0.85rem;
        font-family: monospace;
        background: #1e1e1e;
        border-radius: 6px;
      }

      .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .stat-label {
        color: #888;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .stat-value {
        font-weight: bold;
        font-size: 1.1rem;
      }

      .stat-value.highlight {
        color: #4ec9b0;
      }

      .stat-value.warning {
        color: #ce9178;
      }

      .value-display {
        min-height: 20px;
        margin-top: 12px;
        padding: 8px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }
    </style>
  </head>
  <body>
    <h1>Virtual Scroll Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useEffect, useRef } from "preact/hooks";
      import { Suggestion, SuggestionList } from "@jsenv/navi";

      const SUGGESTION_BG = "light-dark(#f0f4ff, #1a2040)";

      const GREEK_NAMES = [
        "Alpha",
        "Beta",
        "Gamma",
        "Delta",
        "Epsilon",
        "Zeta",
        "Eta",
        "Theta",
        "Iota",
        "Kappa",
        "Lambda",
        "Mu",
        "Nu",
        "Xi",
        "Omicron",
        "Pi",
        "Rho",
        "Sigma",
        "Tau",
        "Upsilon",
      ];
      const LARGE_LIST = Array.from({ length: 200 }, (_, i) => {
        const name = GREEK_NAMES[i % GREEK_NAMES.length];
        const num = String(Math.floor(i / GREEK_NAMES.length) + 1).padStart(
          2,
          "0",
        );
        return `${name}-${num}`;
      });

      const StatsBar = ({ totalItems, domItems }) => {
        const savedFromDom = totalItems - domItems;
        return (
          <div className="stats-bar">
            <div className="stat">
              <span className="stat-label">Total items</span>
              <span className="stat-value">{totalItems}</span>
            </div>
            <div className="stat">
              <span className="stat-label">In DOM</span>
              <span
                className={`stat-value ${domItems < totalItems ? "highlight" : ""}`}
              >
                {domItems}
              </span>
            </div>
            <div className="stat">
              <span className="stat-label">Saved from DOM</span>
              <span
                className={`stat-value ${savedFromDom > 0 ? "warning" : ""}`}
              >
                {savedFromDom}
              </span>
            </div>
          </div>
        );
      };

      const VirtualScrollDemo = () => {
        const [selected, setSelected] = useState(null);
        const [filter, setFilter] = useState("");
        const [maxHeight, setMaxHeight] = useState(280);
        const [maxHeightEnabled, setMaxHeightEnabled] = useState(true);
        const [scrollToIndex, setScrollToIndex] = useState("");
        const listRef = useRef(null);
        const [domItems, setDomItems] = useState(0);

        const lowerFilter = filter.toLowerCase();
        const allItems = filter
          ? [
              ...LARGE_LIST.filter((item) =>
                item.toLowerCase().includes(lowerFilter),
              ),
              ...LARGE_LIST.filter(
                (item) => !item.toLowerCase().includes(lowerFilter),
              ),
            ]
          : LARGE_LIST;

        // Track actual DOM option count via MutationObserver
        useEffect(() => {
          const updateCount = () => {
            if (!listRef.current) {
              return;
            }
            setDomItems(
              listRef.current.querySelectorAll("[role='option']").length,
            );
          };
          updateCount();
          const observer = new MutationObserver(updateCount);
          if (listRef.current) {
            observer.observe(listRef.current, {
              childList: true,
              subtree: true,
            });
          }
          return () => {
            observer.disconnect();
          };
        }, [allItems.length]);

        const scrollTo = (position) => {
          const el = listRef.current;
          if (!el) {
            return;
          }
          if (position === "top") {
            el.scrollTop = 0;
          } else if (position === "middle") {
            el.scrollTop = el.scrollHeight / 2;
          } else if (position === "bottom") {
            el.scrollTop = el.scrollHeight;
          }
        };

        const scrollToItem = () => {
          const idx = parseInt(scrollToIndex, 10);
          if (isNaN(idx)) {
            return;
          }
          const el = listRef.current;
          if (!el) {
            return;
          }
          // Estimate position: scrollHeight / totalItems * idx
          const estimated = (el.scrollHeight / allItems.length) * idx;
          el.scrollTop = estimated;
        };

        return (
          <div className="demo-section">
            <h2>200 items — virtual scroll</h2>
            <p>
              The list passes all {allItems.length} items to{" "}
              <code>SuggestionList</code>. Virtual scroll is automatically
              enabled because a <code>max-height</code> is set. Scroll
              programmatically below to verify the component renders the correct
              DOM items at each scroll position.
            </p>

            <StatsBar totalItems={allItems.length} domItems={domItems} />

            {/* Programmatic scroll controls */}
            <fieldset
              style={{
                display: "flex",
                gap: "8px",
                flexWrap: "wrap",
                marginBottom: "10px",
                alignItems: "center",
              }}
            >
              <legend style={{ fontSize: "0.85rem", color: "#555" }}>
                Scroll to
              </legend>
              <button onClick={() => scrollTo("top")}>Top</button>
              <button onClick={() => scrollTo("middle")}>Middle</button>
              <button onClick={() => scrollTo("bottom")}>Bottom</button>
              <span
                style={{ display: "flex", gap: "4px", alignItems: "center" }}
              >
                <span style={{ fontSize: "0.85rem", color: "#555" }}>
                  Item index:
                </span>
                <input
                  type="number"
                  min="0"
                  max={allItems.length - 1}
                  value={scrollToIndex}
                  onInput={(e) => {
                    setScrollToIndex(e.target.value);
                  }}
                  style={{
                    width: "70px",
                    padding: "4px 6px",
                    border: "1px solid #ccc",
                    borderRadius: "4px",
                  }}
                />
                <button onClick={scrollToItem}>Go</button>
              </span>
            </fieldset>

            {/* Search */}
            <input
              type="search"
              placeholder="Search to re-sort…"
              value={filter}
              onInput={(e) => {
                setFilter(e.target.value);
                setSelected(null);
              }}
              style={{
                display: "block",
                width: "100%",
                boxSizing: "border-box",
                marginBottom: "8px",
                padding: "8px 12px",
                border: "1px solid #ccc",
                borderRadius: "6px",
                fontSize: "1rem",
              }}
            />

            <SuggestionList
              ref={listRef}
              maxHeight={maxHeight}
              uiAction={setSelected}
              highlight={filter}
              expandX
            >
              {allItems.map((item, i) => (
                <Suggestion
                  key={item}
                  index={i}
                  value={item}
                  selected={selected === item}
                  style={{ backgroundColor: SUGGESTION_BG }}
                >
                  {item}
                </Suggestion>
              ))}
            </SuggestionList>

            <div className="value-display">{selected ?? ""}</div>

            {/* Advanced: max-height controls */}
            <details style={{ marginTop: "16px" }}>
              <summary
                style={{
                  cursor: "pointer",
                  fontSize: "0.85rem",
                  color: "#666",
                }}
              >
                Advanced — max-height controls
              </summary>
              <div
                style={{
                  marginTop: "10px",
                  display: "flex",
                  flexDirection: "column",
                  gap: "8px",
                }}
              >
                <label
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "8px",
                    fontSize: "0.9rem",
                  }}
                >
                  <input
                    type="checkbox"
                    checked={maxHeightEnabled}
                    onChange={(e) => {
                      setMaxHeightEnabled(e.target.checked);
                    }}
                  />
                  Enable max-height (virtual scroll active only when set)
                </label>
                {maxHeightEnabled && (
                  <label
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "8px",
                      fontSize: "0.9rem",
                    }}
                  >
                    max-height: <strong>{maxHeight}px</strong>
                    <input
                      type="range"
                      min="80"
                      max="800"
                      step="20"
                      value={maxHeight}
                      onInput={(e) => {
                        setMaxHeight(Number(e.target.value));
                      }}
                      style={{ flex: 1 }}
                    />
                  </label>
                )}
              </div>
            </details>
          </div>
        );
      };

      render(<VirtualScrollDemo />, document.getElementById("root"));
    </script>
  </body>
</html>
