<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Textual Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      fieldset {
        margin: 15px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      legend {
        padding: 0 10px;
        color: #555;
        font-weight: 500;
        white-space: nowrap;
      }

      .input-group {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .comparison-section {
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-left: 4px solid #007bff;
        border-radius: 4px;
      }

      .comparison-title {
        margin: 0 0 15px 0;
        color: #495057;
        font-weight: 500;
        font-size: 0.9rem;
      }

      .comparison-group {
        display: flex;
        margin: 10px 0;
        align-items: center;
        gap: 15px;
      }

      .comparison-label {
        min-width: 80px;
        color: #666;
        font-size: 0.85rem;
      }

      .variation-grid {
        display: grid;
        margin: 15px 0;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      .variation-item {
        padding: 15px;
        text-align: center;
        background: #f8f9fa;
        border-radius: 6px;
      }

      .variation-label {
        margin: 0 0 10px 0;
        color: #666;
        font-size: 0.85rem;
      }

      .value-display {
        min-height: 20px;
        padding: 8px;
        font-size: 0.8rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(empty)";
      }

      .states-section {
        margin: 20px 0;
      }

      .states-title {
        margin: 0 0 15px 0;
        padding: 8px 12px;
        color: #495057;
        font-weight: 600;
        font-size: 0.95rem;
        text-align: center;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border: 1px solid #dee2e6;
        border-radius: 6px;
      }

      .enhanced-states-title {
        color: #1565c0;
        background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
        border-color: #2196f3;
      }

      .states-description {
        margin: 10px 0 15px 0;
        padding: 10px 15px;
        color: #666;
        font-style: italic;
        font-size: 0.9rem;
        background: #f8f9fa;
        border-left: 4px solid #007bff;
        border-radius: 0 4px 4px 0;
      }
    </style>
  </head>
  <body>
    <h1>Input Textual Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useRef } from "preact/hooks";
      import {
        Input,
        Box,
        Form,
        Button,
        Field,
        Label,
        NaviDebug,
      } from "@jsenv/navi";

      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const App = () => {
        return (
          <div>
            <TableOfContents />
            <BasicStatesDemo />
            <InputInteractivityDemo />
            <ValidationDemo />
            <AccidentalReadOnlyDemo />
            <TypeVariationsDemo />
            <DatetimeDemo />
            <SizeVariationsDemo />
            <InteractiveDemo />
          </div>
        );
      };

      const TableOfContents = () => {
        return (
          <div class="demo-section">
            <h2>Table of contents</h2>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#states">Input UI States</a>
              </li>
              <li>
                <a href="#interactivity">Input Interactivity</a>
                <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
                  <li>
                    <a href="#interactivity-action">action</a>
                  </li>
                  <li>
                    <a href="#interactivity-form">Inside Form</a>
                  </li>
                </ol>
              </li>
              <li>
                <a href="#validation">Validation</a>
                <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
                  <li>
                    <a href="#validation-server">Server-side (form submit)</a>
                  </li>
                  <li>
                    <a href="#validation-client">
                      Client-side (HTML attributes)
                    </a>
                  </li>
                </ol>
              </li>
              <li>
                <a href="#accidental-readonly">Accidental Read-Only</a>
              </li>
              <li>
                <a href="#types">Input Types</a>
              </li>
              <li>
                <a href="#datetime">Datetime Input</a>
              </li>
              <li>
                <a href="#sizes">Size Variations</a>
              </li>
              <li>
                <a href="#interactive-controls">Interactive Controls</a>
              </li>
            </ol>
          </div>
        );
      };

      const BasicStatesDemo = () => {
        return (
          <div className="demo-section" id="states">
            <h2>Input UI States</h2>

            <div className="states-section">
              <div className="states-title">Standard HTML Input States</div>
              <p className="states-description">
                These states work exactly like user agent HTML inputs, with
                enhanced styling and consistent behavior.
              </p>

              <Box flex="y" spacing="s" alignX="start">
                <fieldset>
                  <legend>Default</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Input placeholder="Type here..." />
                    <input placeholder="Type here..." />
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:focus-visible</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Input
                      placeholder="Focus me"
                      pseudoState={{ ":focus-visible": true }}
                    />
                    <input
                      placeholder="Focus me"
                      // commented out cause it prevent brwoser from restoring scroll on reload
                      // autoFocus
                    />
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:read-only</legend>
                  <Box flex="y" spacing="s" alignX="start">
                    <Input value="Read-only content" />
                    <input readOnly value="Read-only content" />
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:disabled</legend>
                  <Box flex spacing="s" alignX="start">
                    <Input disabled placeholder="Disabled input" />
                    <input disabled placeholder="Disabled input" />
                  </Box>
                </fieldset>
              </Box>
            </div>

            <div className="states-section">
              <div className="states-title enhanced-states-title">
                Enhanced Navi States
              </div>
              <p className="states-description">
                These additional states provide enhanced UX patterns not
                available in standard HTML inputs.
              </p>

              <Box flex="y" spacing="s" alignX="start">
                <fieldset>
                  <legend>Loading state</legend>
                  <Box flex spacing="s" alignX="start">
                    <Input loading placeholder="Loading input..." />
                  </Box>
                </fieldset>
              </Box>

              <div
                style={{
                  marginTop: "15px",
                  padding: "10px",
                  background: "#f8f9fa",
                  borderRadius: "4px",
                  fontSize: "0.85rem",
                  color: "#666",
                }}
              >
                <strong>Enhanced State Explanations:</strong>
                <ul style={{ margin: "5px 0", paddingLeft: "20px" }}>
                  <li>
                    <strong>Loading:</strong> Shows a spinner while allowing
                    continued interaction and value updates
                  </li>
                </ul>
              </div>
            </div>
          </div>
        );
      };

      const TypeVariationsDemo = () => {
        const [textValue, setTextValue] = useState("Basic text");
        const [emailValue, setEmailValue] = useState("user@example.com");
        const [passwordValue, setPasswordValue] = useState("secret123");
        const [urlValue, setUrlValue] = useState("https://example.com");
        const [numberValue, setNumberValue] = useState("42");
        const [searchValue, setSearchValue] = useState("search query");
        const [telValue, setTelValue] = useState("+1-555-123-4567");
        const [dateValue, setDateValue] = useState("2024-06-15");
        const [timeValue, setTimeValue] = useState("14:30");
        const [datetimeValue, setDatetimeValue] = useState("2024-06-15T14:30");

        return (
          <div className="demo-section" id="types">
            <h2>Input Types</h2>

            <div
              className="variation-grid"
              style={{ gridTemplateColumns: "repeat(3, 1fr)" }}
            >
              <div className="variation-item">
                <p className="variation-label">Text</p>
                <Input
                  type="text"
                  value={textValue}
                  action={setTextValue}
                  placeholder="Enter text"
                />
                <input
                  type="text"
                  value={textValue}
                  onChange={() => {}}
                  placeholder="Enter text"
                />
              </div>

              <div className="variation-item">
                <p className="variation-label">Email</p>
                <Input
                  type="email"
                  value={emailValue}
                  action={setEmailValue}
                  placeholder="user@example.com"
                />
                <input
                  type="email"
                  value={emailValue}
                  onChange={() => {}}
                  placeholder="user@example.com"
                />
              </div>

              <div className="variation-item">
                <p className="variation-label">Password</p>
                <Input
                  type="password"
                  value={passwordValue}
                  action={setPasswordValue}
                  placeholder="Enter password"
                />
                <input
                  type="password"
                  value={passwordValue}
                  onChange={() => {}}
                  placeholder="Enter password"
                />
              </div>

              <div className="variation-item">
                <p className="variation-label">URL</p>
                <Input
                  type="url"
                  value={urlValue}
                  action={setUrlValue}
                  placeholder="https://example.com"
                />
                <input
                  type="url"
                  value={urlValue}
                  onChange={() => {}}
                  placeholder="https://example.com"
                />
              </div>

              <div className="variation-item">
                <p className="variation-label">Number</p>
                <Input
                  type="number"
                  value={numberValue}
                  action={setNumberValue}
                  placeholder="Enter number"
                />
                <input
                  type="number"
                  value={numberValue}
                  onChange={() => {}}
                  placeholder="Enter number"
                />
              </div>

              <div className="variation-item">
                <p className="variation-label">Search</p>
                <Input
                  type="search"
                  value={searchValue}
                  action={setSearchValue}
                  placeholder="Search..."
                />
                <input
                  type="search"
                  value={searchValue}
                  onChange={() => {}}
                  placeholder="Search..."
                />
              </div>

              <div className="variation-item">
                <p className="variation-label">Tel</p>
                <Input
                  type="tel"
                  value={telValue}
                  action={setTelValue}
                  placeholder="+1-555-000-0000"
                />
                <br />
                <input
                  type="tel"
                  value={telValue}
                  onChange={() => {}}
                  placeholder="+1-555-000-0000"
                />
              </div>

              <div className="variation-item">
                <p className="variation-label">Date</p>
                <Input type="date" value={dateValue} action={setDateValue} />
                <br />
                <input type="date" value={dateValue} onChange={() => {}} />
              </div>

              <div className="variation-item">
                <p className="variation-label">Time</p>
                <Input type="time" value={timeValue} action={setTimeValue} />
                <br />
                <input type="time" value={timeValue} onChange={() => {}} />
              </div>

              <div className="variation-item">
                <p className="variation-label">DateTime Local</p>
                <Input
                  type="datetime-local"
                  value={datetimeValue}
                  action={setDatetimeValue}
                />
                <br />
                <input
                  type="datetime-local"
                  value={datetimeValue}
                  onChange={() => {}}
                />
              </div>
            </div>
          </div>
        );
      };

      const InputInteractivityDemo = () => {
        const [controlledValue, setControlledValue] = useState("Controlled");
        const [uiStateValue, setUiStateValue] = useState("");
        const [basicActionValue, setBasicActionValue] = useState("");
        const [basicActionCallCount, setBasicActionCallCount] = useState(0);
        const [debouncedValue, setDebouncedValue] = useState("");
        const [debouncedCallCount, setDebouncedCallCount] = useState(0);
        const [afterChangeValue, setAfterChangeValue] = useState("");
        const [afterChangeCallCount, setAfterChangeCallCount] = useState(0);
        const [abortValue, setAbortValue] = useState("");
        const [abortCallCount, setAbortCallCount] = useState(0);
        const [abortedCount, setAbortedCount] = useState(0);
        const currentAbortControllerRef = useRef(null);
        const cancelPrevious = () => {
          if (currentAbortControllerRef.current) {
            currentAbortControllerRef.current.abort();
            setAbortedCount((c) => c + 1);
          }
          const controller = new AbortController();
          currentAbortControllerRef.current = controller;
          return controller.signal;
        };

        return (
          <div className="demo-section" id="interactivity">
            <h2>Input Interactivity</h2>

            <fieldset>
              <legend>value</legend>
              <p className="states-description">
                Use <code>defaultValue</code> for an initial value the user can
                freely change. Use <code>value</code> combined with{" "}
                <code>action</code> to control the input externally.
              </p>
              <Box flex="y" spacing="s" alignX="start">
                <div>
                  <label style={{ fontSize: "0.9rem" }}>defaultValue</label>
                  <Input
                    defaultValue="Hello World!"
                    placeholder="Enter text..."
                  />
                </div>
                <div>
                  <label style={{ fontSize: "0.9rem" }}>
                    value + action (controlled)
                  </label>
                  <Input
                    value={controlledValue}
                    action={setControlledValue}
                    placeholder="Controlled input"
                  />
                  <div className="value-display">{controlledValue}</div>
                </div>
              </Box>
            </fieldset>

            <h3 id="interactivity-action">action</h3>

            <fieldset>
              <legend>basic (sync)</legend>
              <p className="states-description">
                <code>action</code> fires on every user interaction, reflecting
                what the input currently shows.
              </p>
              <Box flex spacing="s">
                <Input
                  placeholder="Type something..."
                  action={setUiStateValue}
                />
                <div className="value-display">
                  Current value: "{uiStateValue}"
                </div>
              </Box>
            </fieldset>

            <fieldset>
              <legend>async</legend>
              <p className="states-description">
                When <code>action</code> is async, it is called on{" "}
                <strong>every keystroke</strong>. Type quickly to see multiple
                overlapping calls — the displayed value jumps as each one
                resolves. Use the options below to avoid this.
              </p>
              <Box flex spacing="s">
                <Input
                  placeholder="Type something..."
                  action={async (value) => {
                    setBasicActionCallCount((c) => c + 1);
                    await delay(1000);
                    setBasicActionValue(value);
                  }}
                />
                <div className="value-display">
                  Value: "{basicActionValue}" | Calls: {basicActionCallCount}
                </div>
              </Box>
            </fieldset>

            <fieldset>
              <legend>debounced</legend>
              <p className="states-description">
                Use <code>actionDebounce</code> to wait for the user to stop
                typing before calling the action. Ideal for search queries or
                any slow async operation.
              </p>
              <Box flex spacing="s">
                <Input
                  placeholder="Type something (debounced 600ms)..."
                  action={async (value) => {
                    setDebouncedCallCount((c) => c + 1);
                    await new Promise((resolve) => setTimeout(resolve, 1500));
                    setDebouncedValue(value);
                  }}
                  actionDebounce={600}
                />
                <div className="value-display">
                  Value: "{debouncedValue}" | Calls: {debouncedCallCount}
                </div>
              </Box>
            </fieldset>

            <fieldset>
              <legend>after change (blur / Enter)</legend>
              <p className="states-description">
                <code>actionAfterChange</code> delays the action until blur or
                Enter. The input shows a loading state and becomes read-only
                while the action is running.
              </p>
              <Box flex spacing="s">
                <Input
                  placeholder="Type and press Enter or blur..."
                  action={async (value) => {
                    setAfterChangeCallCount((c) => c + 1);
                    await new Promise((resolve) => setTimeout(resolve, 1500));
                    setAfterChangeValue(value);
                  }}
                  actionAfterChange
                />
                <div className="value-display">
                  Value: "{afterChangeValue}" | Calls: {afterChangeCallCount}
                </div>
              </Box>
            </fieldset>

            <fieldset>
              <legend>with abort</legend>
              <p className="states-description">
                Keep the action synchronous to stay non-blocking, and use an{" "}
                <code>AbortController</code> to cancel in-flight async work when
                a new value arrives.
              </p>
              <Box flex spacing="s">
                <Input
                  placeholder="Type something (with abort)..."
                  action={(value) => {
                    const abortSignal = cancelPrevious();
                    setAbortCallCount((c) => c + 1);
                    setTimeout(() => {
                      if (!abortSignal.aborted) {
                        setAbortValue(value);
                      }
                    }, 1500);
                  }}
                />
                <div className="value-display">
                  Value: "{abortValue}" | Calls: {abortCallCount} | Aborted:{" "}
                  {abortedCount}
                </div>
              </Box>
            </fieldset>

            <h3 id="interactivity-form">Inside Form</h3>

            <p className="states-description">
              When an input is inside a <code>Form</code>, its <code>name</code>{" "}
              is used to collect the value on submit.
            </p>

            <FormBasicDemo />
            <FormWithInputActionDemo />
          </div>
        );
      };

      const FormBasicDemo = () => {
        const [username, setUsername] = useState("dam");
        const [formResult, setFormResult] = useState("");

        return (
          <fieldset>
            <legend>Basic form submission</legend>
            <Form
              action={async ({ username }) => {
                await delay(1000);
                setFormResult(`Submitted! Username: "${username}"`);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field flex spacing="s">
                  <Label>Username</Label>
                  <Input
                    name="username"
                    value={username}
                    action={setUsername}
                    placeholder="Enter username"
                  />
                </Field>
                <Box flex spacing="s">
                  <Button type="submit">Submit</Button>
                  <Button
                    type="reset"
                    action={() => {
                      setUsername("");
                    }}
                  >
                    Reset
                  </Button>
                </Box>
                {formResult ? (
                  <div className="value-display">{formResult}</div>
                ) : null}
              </Box>
            </Form>
          </fieldset>
        );
      };

      const FormWithInputActionDemo = () => {
        const [actionLog, setActionLog] = useState("");
        const [formResult, setFormResult] = useState("");

        return (
          <fieldset>
            <legend>Input with own action inside a form</legend>
            <p className="states-description">
              The first input has its own <code>action</code> +{" "}
              <code>actionAfterChange</code>: pressing <kbd>Enter</kbd> should
              trigger its action — <strong>not</strong> submit the form. The
              second is a regular input. Both are named so their values appear
              in the form submission.
            </p>
            <Form
              action={async ({ search, note }) => {
                await delay(800);
                setFormResult(
                  `Form submitted! search: "${search}", note: "${note}"`,
                );
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field flex spacing="s">
                  <Label>Search (has own action)</Label>
                  <Input
                    name="search"
                    defaultValue="cats"
                    action={async (value) => {
                      setActionLog(`action called with: "${value}"`);
                      await delay(600);
                      setActionLog(`action done: "${value}"`);
                    }}
                    actionAfterChange
                  />
                </Field>
                <Field flex spacing="s">
                  <Label>Note (regular input)</Label>
                  <Input name="note" defaultValue="cute" />
                </Field>
                <Button type="submit">Submit form</Button>
                {actionLog ? (
                  <div className="value-display">Input action: {actionLog}</div>
                ) : null}
                {formResult ? (
                  <div className="value-display">Form: {formResult}</div>
                ) : null}
              </Box>
            </Form>
          </fieldset>
        );
      };

      const AccidentalReadOnlyDemo = () => {
        return (
          <div className="demo-section" id="accidental-readonly">
            <h2>Accidental Read-Only</h2>
            <p className="states-description">
              When <code>value</code> is passed without <code>action</code>, the
              input becomes read-only automatically. This is a visual reminder
              for developers: if the input feels frozen, it likely means the
              code provides a value but no way to update it.
            </p>
            <Input value="Frozen — no action provided" />
          </div>
        );
      };

      const ValidationDemo = () => {
        return (
          <div className="demo-section" id="validation">
            <h2>Validation</h2>

            <h3 id="validation-server">Server-side (form submit)</h3>
            <p className="states-description">
              The most natural place to validate is in the form action. When the
              action throws, the form shows an error state and the input's error
              appearance communicates the failure — no extra UI needed.
            </p>

            <fieldset>
              <legend>Action fails when text is too short</legend>
              <Form
                action={async ({ username }) => {
                  await delay(800);
                  if (!username || username.length < 5) {
                    throw new Error(
                      `Username must be at least 5 characters (got ${
                        username ? username.length : 0
                      })`,
                    );
                  }
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <Field>
                    <Label>Username</Label>
                    <Input
                      name="username"
                      placeholder="Enter at least 5 characters..."
                    />
                  </Field>
                  <Button type="submit">Submit</Button>
                </Box>
              </Form>
            </fieldset>

            <h3 id="validation-client">Client-side (HTML attributes)</h3>
            <p className="states-description">
              HTML constraint attributes are checked before the form action
              runs. If a constraint fails, the form is not submitted and the
              input shows an error with the browser's default message.
            </p>

            <fieldset>
              <legend>minLength attribute</legend>
              <Form
                action={async () => {
                  await delay(600);
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <Field flex spacing="s">
                    <Label>Username (at least 5 characters)</Label>
                    <Input
                      name="username"
                      minLength="5"
                      defaultValue="hi"
                      placeholder="Enter username..."
                    />
                  </Field>
                  <Button type="submit">Submit</Button>
                </Box>
              </Form>
            </fieldset>

            <fieldset>
              <legend>Custom message with minLengthMessage</legend>
              <p className="states-description">
                Overrides the default message with custom HTML.
              </p>
              <Form
                action={async () => {
                  await delay(600);
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <Field flex spacing="s">
                    <Label>Username (at least 5 characters)</Label>
                    <Input
                      name="username"
                      minLength="5"
                      defaultValue="hi"
                      minLengthMessage={
                        <span>
                          At least <strong>5 characters</strong> required —
                          currently only <strong>{"hi".length}</strong> 🙈
                        </span>
                      }
                      placeholder="Enter username..."
                    />
                  </Field>
                  <Button type="submit">Submit</Button>
                </Box>
              </Form>
            </fieldset>
          </div>
        );
      };

      const DatetimeDemo = () => {
        const [externalDateTime, setExternalDateTime] = useState(
          "2024-01-15T14:30:00Z",
        );
        const [uiDateTime, setUiDateTime] = useState(externalDateTime);
        const [saveResult, setSaveResult] = useState("");

        return (
          <div className="demo-section" id="datetime">
            <h2>Datetime Input</h2>
            <p className="states-description">
              The <code>datetime-local</code> input type works with UTC ISO
              strings: the <code>value</code> prop accepts a UTC string and the
              browser converts it to local time for display. The action receives
              the UTC string back, so no manual timezone conversion is needed.
            </p>

            <fieldset>
              <legend>datetime-local with action</legend>
              <p className="states-description">
                The input displays the value in local time. The external state
                below simulates what a server would store (UTC). Change the
                datetime and blur/press Enter to trigger the save action.
              </p>
              <Box flex="y" spacing="s" alignX="start">
                <div
                  style={{
                    padding: "10px 14px",
                    background: "#e3f2fd",
                    borderRadius: "4px",
                    fontSize: "0.85rem",
                  }}
                >
                  <strong>External state (UTC):</strong>{" "}
                  {externalDateTime || "(not set)"}
                  <Box flex spacing="s" style={{ marginTop: "8px" }}>
                    <Button
                      action={() => setExternalDateTime("2024-01-15T14:30:00Z")}
                    >
                      Jan 15, 2:30 PM UTC
                    </Button>
                    <Button
                      action={() => setExternalDateTime("2024-12-25T09:00:00Z")}
                    >
                      Dec 25, 9:00 AM UTC
                    </Button>
                    <Button action={() => setExternalDateTime(null)}>
                      Clear
                    </Button>
                  </Box>
                </div>
                <Field>
                  <Label>Datetime (displayed in local time)</Label>
                  <Input
                    type="datetime-local"
                    name="datetime"
                    value={externalDateTime}
                    uiAction={setUiDateTime}
                    action={async (value) => {
                      setSaveResult("Saving...");
                      await delay(1000);
                      setExternalDateTime(value);
                      setSaveResult(`Saved: ${value}`);
                    }}
                    actionAfterChange
                  />
                </Field>
                <div className="value-display">
                  UI state: {uiDateTime || "(empty)"}
                </div>
                <div className="value-display">
                  {saveResult || "Change value and blur/Enter to save..."}
                </div>
              </Box>
            </fieldset>
          </div>
        );
      };

      const SizeVariationsDemo = () => {
        return (
          <div className="demo-section" id="sizes">
            <h2>Size Variations</h2>

            <Box flex spacing="s">
              <Box flex="y" spacing="s" alignX="start">
                <div className="variation-item">
                  <p className="variation-label">Custom Padding</p>
                  <Input
                    placeholder="Large input"
                    paddingX="lg"
                    paddingY="md"
                  />
                </div>
                <div className="variation-item">
                  <p className="variation-label">Width 200</p>
                  <Input placeholder="Wide input" width="200px" />
                </div>
              </Box>
              <Box flex>
                <div className="variation-item">
                  <p className="variation-label">Full Width</p>
                  <Input placeholder="Full width" expandX />
                </div>
              </Box>
            </Box>
          </div>
        );
      };

      const InteractiveDemo = () => {
        const [value, setValue] = useState("Interactive input");
        const [loading, setLoading] = useState(false);
        const [disabled, setDisabled] = useState(false);
        const [type, setType] = useState("text");

        return (
          <div className="demo-section" id="interactive-controls">
            <h2>Interactive Controls</h2>

            <fieldset>
              <legend>Toggle States</legend>
              <Box flex spacing="s" alignX="start" wrap>
                <Button action={() => setLoading(!loading)}>
                  Loading: {loading ? "ON" : "OFF"}
                </Button>
                <Button action={() => setDisabled(!disabled)}>
                  Disabled: {disabled ? "ON" : "OFF"}
                </Button>
                <select
                  value={type}
                  onChange={(e) => setType(e.target.value)}
                  style={{
                    padding: "8px 16px",
                    border: "1px solid #ddd",
                    borderRadius: "4px",
                    background: "white",
                  }}
                >
                  <option value="text">Text</option>
                  <option value="email">Email</option>
                  <option value="password">Password</option>
                  <option value="url">URL</option>
                  <option value="number">Number</option>
                </select>
              </Box>
            </fieldset>

            <fieldset>
              <legend>Result</legend>
              <Box flex="y" spacing="s" alignX="start">
                <Input
                  type={type}
                  loading={loading}
                  disabled={disabled}
                  value={value}
                  action={setValue}
                  placeholder="Interactive input..."
                />
                <div className="value-display">
                  Value: "{value}" | Type: {type} | Loading:{" "}
                  {loading ? "Yes" : "No"} | Disabled: {disabled ? "Yes" : "No"}
                </div>
              </Box>
            </fieldset>
          </div>
        );
      };

      render(
        <NaviDebug debugAction debugInteraction>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
