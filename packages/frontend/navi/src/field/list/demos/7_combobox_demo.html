<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComboBox Demo</title>
    <style>
      body {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 16px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      .demo-section p {
        margin: 0 0 16px 0;
        color: #555;
        font-size: 0.95rem;
      }

      .value-display {
        min-height: 20px;
        margin-top: 12px;
        padding: 8px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }

      .option-secondary {
        margin-left: 8px;
        color: #888;
        font-size: 0.85em;
      }
    </style>
  </head>
  <body>
    <h1>ComboBox Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { List, ListItem, Form, Button, Input } from "@jsenv/navi";

      const FRUITS = [
        "Apple",
        "Apricot",
        "Banana",
        "Blueberry",
        "Cherry",
        "Grape",
        "Kiwi",
        "Lemon",
        "Mango",
        "Orange",
        "Peach",
        "Pear",
        "Pineapple",
        "Raspberry",
        "Strawberry",
        "Watermelon",
      ];

      const COUNTRIES = [
        { code: "au", name: "Australia", region: "Oceania" },
        { code: "br", name: "Brazil", region: "South America" },
        { code: "cn", name: "China", region: "Asia" },
        { code: "fr", name: "France", region: "Europe" },
        { code: "de", name: "Germany", region: "Europe" },
        { code: "in", name: "India", region: "Asia" },
        { code: "jp", name: "Japan", region: "Asia" },
        { code: "mx", name: "Mexico", region: "North America" },
        { code: "us", name: "United States", region: "North America" },
        { code: "za", name: "South Africa", region: "Africa" },
      ];

      const App = () => (
        <div>
          <BasicDemo />
          <CustomRenderDemo />
          <LargeSuggestionDemo />
          <InputWithActionDemo />
          <FormWithComboboxDemo />
        </div>
      );

      // --- 1. Simple string combobox ---

      const BasicDemo = () => {
        const [selected, setSelected] = useState(null);
        const [query, setQuery] = useState("");

        const matches = (f) => f.toLowerCase().includes(query.toLowerCase());

        return (
          <div className="demo-section">
            <h2>Basic combobox — strings</h2>
            <p>
              Type to filter. Arrow keys navigate, Enter selects, Escape closes.
              Clicking outside closes.
            </p>
            <Input
              type="search"
              suggestions="fruit-list"
              placeholder="Search a fruit…"
              onInput={(e) => {
                const val = e.target.value;
                setQuery(val);
                setSelected(FRUITS.includes(val) ? val : null);
              }}
            />
            <List
              listRole="listbox"
              fallback="No results"
              id="fruit-list"
              popover
              style={{ "--max-height": "220px" }}
              searchText={query}
            >
              {FRUITS.map((fruit, i) => (
                <ListItem
                  role="option"
                  key={fruit}
                  index={i}
                  value={fruit}
                  selected={selected === fruit}
                  hidden={!matches(fruit)}
                >
                  {fruit}
                </ListItem>
              ))}
            </List>
            <div className="value-display">{selected ?? ""}</div>
          </div>
        );
      };

      // --- 2. Custom option render (countries) ---

      const CustomRenderDemo = () => {
        const [selected, setSelected] = useState(null);
        const [query, setQuery] = useState("");

        const matches = (c) =>
          c.name.toLowerCase().includes(query.toLowerCase()) ||
          c.region.toLowerCase().includes(query.toLowerCase());

        const selectedCountry = COUNTRIES.find((c) => c.code === selected);

        return (
          <div className="demo-section">
            <h2>Custom option content — countries</h2>
            <p>
              Filter by country name or region (try "asia" or "europe"). Each
              option shows the region.
            </p>
            <Input
              type="text"
              suggestions="country-list"
              placeholder="Search a country…"
              onInput={(e) => {
                setQuery(e.target.value);
                const match = COUNTRIES.find((c) => c.name === e.target.value);
                setSelected(match ? match.code : null);
              }}
            />
            <List
              listRole="listbox"
              fallback="No results"
              id="country-list"
              popover
              style={{ "--max-height": "220px" }}
            >
              {COUNTRIES.map((country, i) => (
                <ListItem
                  role="option"
                  key={country.code}
                  index={i}
                  value={country.name}
                  selected={selected === country.code}
                  hidden={!matches(country)}
                >
                  <span style={{ fontWeight: 500 }}>{country.name}</span>
                  <span className="option-secondary">{country.region}</span>
                </ListItem>
              ))}
            </List>
            <div className="value-display">
              {selectedCountry
                ? `${selectedCountry.name} (${selectedCountry.code}) — ${selectedCountry.region}`
                : ""}
            </div>
          </div>
        );
      };

      // --- 3. Suggestion with large content ---

      const LargeSuggestionDemo = () => {
        const [selected, setSelected] = useState(null);
        const [query, setQuery] = useState("");

        const matchesQuery = (label, description) =>
          label.toLowerCase().includes(query.toLowerCase()) ||
          description.toLowerCase().includes(query.toLowerCase());

        const handleInput = (e) => {
          setQuery(e.target.value);
          if (e.target.value === "Option A") {
            setSelected("option-a");
          } else if (e.target.value === "Option B") {
            setSelected("option-b");
          } else if (e.target.value === "Option C") {
            setSelected("option-c");
          } else {
            setSelected(null);
          }
        };

        const descriptionA =
          "This is a very long description for option A that goes into extensive detail about what this option does and why you might want to choose it over the others available in the list.";
        const descriptionB =
          "Option B comes with an equally detailed explanation covering edge cases, performance implications, and recommended use cases for advanced users who need full context.";
        const descriptionC =
          "Option C is the simplest of the three, but its description is still intentionally verbose";

        return (
          <div className="demo-section">
            <h2>Large suggestion content</h2>
            <p>
              Without <code>whiteSpace: "nowrap"</code> the description wraps
              inside the popover. With it, the popover grows horizontally.
            </p>
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                gap: "2px",
                flexWrap: "wrap",
              }}
            >
              <div>
                <h3>Wrapping (default)</h3>
                <Input
                  type="text"
                  suggestions="large-list-wrap"
                  placeholder="Search an option…"
                  onInput={handleInput}
                />
                <List
                  listRole="listbox"
                  fallback="No results"
                  id="large-list-wrap"
                  popover
                >
                  <ListItem
                    role="option"
                    index={0}
                    value="Option A"
                    selected={selected === "option-a"}
                    hidden={!matchesQuery("Option A", descriptionA)}
                  >
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: "4px",
                      }}
                    >
                      <span style={{ fontWeight: 600 }}>Option A</span>
                      <span style={{ fontSize: "0.85em", color: "#666" }}>
                        {descriptionA}
                      </span>
                    </div>
                  </ListItem>
                  <ListItem
                    role="option"
                    index={1}
                    value="Option B"
                    selected={selected === "option-b"}
                    hidden={!matchesQuery("Option B", descriptionB)}
                  >
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: "4px",
                      }}
                    >
                      <span style={{ fontWeight: 600 }}>Option B</span>
                      <span style={{ fontSize: "0.85em", color: "#666" }}>
                        {descriptionB}
                      </span>
                    </div>
                  </ListItem>
                  <ListItem
                    role="option"
                    index={2}
                    value="Option C"
                    selected={selected === "option-c"}
                    hidden={!matchesQuery("Option C", descriptionC)}
                  >
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: "4px",
                      }}
                    >
                      <span style={{ fontWeight: 600 }}>Option C</span>
                      <span style={{ fontSize: "0.85em", color: "#666" }}>
                        {descriptionC}
                      </span>
                    </div>
                  </ListItem>
                </List>
              </div>
              <div style="width: 1500px; height: 2px; background: violet"></div>
              <div>
                <h3>No wrap</h3>
                <Input
                  type="text"
                  suggestions="large-list-nowrap"
                  placeholder="Search an option…"
                  onInput={handleInput}
                />
                <List
                  listRole="listbox"
                  fallback="No results"
                  id="large-list-nowrap"
                  popover
                >
                  <ListItem
                    role="option"
                    index={0}
                    value="Option A"
                    selected={selected === "option-a"}
                    hidden={!matchesQuery("Option A", descriptionA)}
                  >
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: "4px",
                      }}
                    >
                      <span style={{ fontWeight: 600 }}>Option A</span>
                      <span
                        style={{
                          fontSize: "0.85em",
                          color: "#666",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {descriptionA}
                      </span>
                    </div>
                  </ListItem>
                  <ListItem
                    role="option"
                    index={1}
                    value="Option B"
                    selected={selected === "option-b"}
                    hidden={!matchesQuery("Option B", descriptionB)}
                  >
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: "4px",
                      }}
                    >
                      <span style={{ fontWeight: 600 }}>Option B</span>
                      <span
                        style={{
                          fontSize: "0.85em",
                          color: "#666",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {descriptionB}
                      </span>
                    </div>
                  </ListItem>
                  <ListItem
                    role="option"
                    index={2}
                    value="Option C"
                    selected={selected === "option-c"}
                    hidden={!matchesQuery("Option C", descriptionC)}
                  >
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: "4px",
                      }}
                    >
                      <span style={{ fontWeight: 600 }}>Option C</span>
                      <span
                        style={{
                          fontSize: "0.85em",
                          color: "#666",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {descriptionC}
                      </span>
                    </div>
                  </ListItem>
                </List>
              </div>
            </div>
            <div className="value-display">{selected ?? ""}</div>
          </div>
        );
      };

      // --- 4. Input with async action ---

      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const InputWithActionDemo = () => {
        const [query, setQuery] = useState("");
        const [lastSaved, setLastSaved] = useState(null);

        const matches = (f) => f.toLowerCase().includes(query.toLowerCase());

        const saveFruit = async (value) => {
          await delay(800);
          setLastSaved(value);
        };

        return (
          <div className="demo-section">
            <h2>Combobox with async action on input</h2>
            <p>
              The <code>action</code> prop is called when the value changes
              (blur / Enter). Shows loading state while the async action runs.
            </p>
            <Input
              type="text"
              suggestions="fruit-action-list"
              placeholder="Search a fruit…"
              action={saveFruit}
              actionAfterChange
              uiAction={(v) => setQuery(v)}
            />
            <List
              listRole="listbox"
              fallback="No results"
              id="fruit-action-list"
              popover
              style={{ "--max-height": "220px" }}
            >
              {FRUITS.map((fruit, i) => (
                <ListItem
                  role="option"
                  key={fruit}
                  index={i}
                  value={fruit}
                  selected={query === fruit}
                  hidden={!matches(fruit)}
                >
                  {fruit}
                </ListItem>
              ))}
            </List>
            <div className="value-display">
              Last saved: {lastSaved ?? "(none)"}
            </div>
          </div>
        );
      };

      // --- 5. Combobox inside a form with async action ---

      const FormWithComboboxDemo = () => {
        const [fruitQuery, setFruitQuery] = useState("");
        const [countryQuery, setCountryQuery] = useState("");
        const [submitResult, setSubmitResult] = useState(null);

        const fruitMatches = (f) =>
          f.toLowerCase().includes(fruitQuery.toLowerCase());
        const countryMatches = (c) =>
          c.name.toLowerCase().includes(countryQuery.toLowerCase());

        const submitForm = async ({ fruit, country }) => {
          await delay(1000);
          setSubmitResult({ fruit, country });
        };

        return (
          <div className="demo-section">
            <h2>Combobox inside a Form with async action</h2>
            <p>
              Both combobox inputs are inside a <code>Form</code> whose{" "}
              <code>action</code> is async. Submitting collects the selected
              values as form fields.
            </p>
            <Form action={submitForm} flex="y" alignX="start" spacing="m">
              <label>
                Favourite fruit:
                <Input
                  type="text"
                  name="fruit"
                  suggestions="form-fruit-list"
                  placeholder="Search a fruit…"
                  required
                  data-one-of="#form-fruit-list"
                  uiAction={(v) => setFruitQuery(v)}
                />
                <List
                  listRole="listbox"
                  fallback="No results"
                  id="form-fruit-list"
                  popover
                  style={{ "--max-height": "180px" }}
                >
                  {FRUITS.map((fruit, i) => (
                    <ListItem
                      role="option"
                      key={fruit}
                      index={i}
                      value={fruit}
                      selected={fruitQuery === fruit}
                      hidden={!fruitMatches(fruit)}
                    >
                      {fruit}
                    </ListItem>
                  ))}
                </List>
              </label>

              <label>
                Country:
                <Input
                  type="text"
                  name="country"
                  suggestions="form-country-list"
                  placeholder="Search a country…"
                  required
                  data-one-of="#form-country-list"
                  uiAction={(v) => setCountryQuery(v)}
                />
                <List
                  listRole="listbox"
                  fallback="No results"
                  id="form-country-list"
                  popover
                  style={{ "--max-height": "180px" }}
                >
                  {COUNTRIES.map((c, i) => (
                    <ListItem
                      role="option"
                      key={c.code}
                      index={i}
                      value={c.name}
                      selected={countryQuery === c.name}
                      hidden={!countryMatches(c)}
                    >
                      {c.name}
                    </ListItem>
                  ))}
                </List>
              </label>

              <Button type="submit">Submit</Button>
            </Form>
            {submitResult && (
              <div className="value-display">
                Submitted — fruit: {submitResult.fruit ?? "(none)"}, country:{" "}
                {submitResult.country ?? "(none)"}
              </div>
            )}
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
