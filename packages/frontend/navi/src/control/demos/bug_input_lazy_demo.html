<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUG: Input text + lazy neighbor</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }
      h1 {
        margin-bottom: 12px;
        color: #333;
        font-size: 1.6rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .expected {
        margin: 0 0 16px;
        padding: 10px 14px;
        font-size: 13px;
        background: #fff8e1;
        border: 1px solid #ffe082;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>BUG repro: Input text + lazy neighbor</h1>
    <p class="expected">
      Type in the input. Expected: <code>uiAction</code> appears in the log on
      each keystroke. Actual (bug): nothing fires.
    </p>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { lazy, Suspense } from "preact/compat";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";
      import { Field, Input, Label, NaviDebug } from "@jsenv/navi";

      const LazyNeighbor = lazy(async () => {
        await new Promise((resolve) => setTimeout(resolve, 100));
        return "LazyNeighbor";
      });

      const App = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <NaviDebug debugAll>
            <div class="demo-section">
              <h2>Input text inside shared Suspense with a lazy neighbor</h2>

              <Suspense fallback="loading…">
                <Field vertical>
                  <Label>Name</Label>
                  <Input
                    type="text"
                    name="name"
                    placeholder="Type here…"
                    uiAction={(v) => {
                      push("uiAction", v);
                    }}
                    action={(v) => {
                      push("action", v);
                    }}
                  />
                </Field>

                <LazyNeighbor />
              </Suspense>

              <CallLog entries={entries} onClear={clear} />
            </div>
          </NaviDebug>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
