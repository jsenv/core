<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Selectable Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 12px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      .demo-section h3 {
        margin: 0 0 10px;
        color: #333;
        font-size: 1.05rem;
      }

      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      .col-label {
        margin-bottom: 8px;
        color: #888;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .value-display {
        min-height: 24px;
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }
    </style>
  </head>
  <body>
    <h1>Selectable List Demo</h1>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useLayoutEffect, useRef, useState } from "preact/hooks";
      import {
        NaviDebug,
        List,
        Form,
        Button,
        BadgeCount,
        useSearchText,
        Input,
        stateSignal,
        route,
        Box,
        setupRoutes,
        SelectableInput,
      } from "@jsenv/navi";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";

      const searchFruitSignal = stateSignal("", {
        id: "search_fruit",
        type: "string",
      });
      const fruitSignal = stateSignal("", {
        id: "fruit",
        type: "string",
      });
      const DEMO_ROUTE = route("", {
        searchParams: {
          search_fruit: searchFruitSignal,
          fruit: fruitSignal,
        },
      });
      setupRoutes([DEMO_ROUTE]);

      const App = () => {
        return (
          <NaviDebug debugAll>
            <div>
              <TableOfContents />
              <SearchableDemo />
              <BasicDemo />
              <ListValueDemo />
              <ReadOnlyDemo />
              <ExternalControlDemo />
              <FormDemo />
              <ValidationDemo />
              <div id="customization">
                <div class="demo-section">
                  <h2>Customization</h2>
                </div>
                <IconInputDemo />
                <SwitchDemo />
                <BgColorDemo />
                <ManualAreaDemo />
                <LegendDemo />
                <HorizontalDemo />
              </div>
            </div>
          </NaviDebug>
        );
      };

      const TableOfContents = () => {
        return (
          <div class="demo-section">
            <h2>Table of contents</h2>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#searchable">Searchable</a>
              </li>
              <li>
                <a href="#basic">Basic (with Selectable.Input)</a>
              </li>
              <li>
                <a href="#list-value">List-level value / defaultValue</a>
              </li>
              <li>
                <a href="#readonly">ReadOnly items</a>
              </li>
              <li>
                <a href="#external-control">External control</a>
              </li>
              <li>
                <a href="#form">Form integration</a>
              </li>
              <li>
                <a href="#validation">Validation</a>
              </li>
              <li>
                Customization
                <ol style={{ margin: 0, paddingLeft: "20px" }}>
                  <li>
                    <a href="#icons">Custom icons</a>
                  </li>
                  <li>
                    <a href="#switch">Switch appearance</a>
                  </li>
                  <li>
                    <a href="#bg-color">Background color indicator</a>
                  </li>
                  <li>
                    <a href="#manual-area">Manual selectable area</a>
                  </li>
                  <li>
                    <a href="#legend">Legend</a>
                  </li>
                  <li>
                    <a href="#horizontal">Horizontal</a>
                  </li>
                </ol>
              </li>
            </ol>
          </div>
        );
      };

      const FRUITS = ["Apple", "Banana", "Cherry", "Date", "Elderberry"];

      // ── Searchable ─────────────────────────────────────────────────────────────

      const SearchableDemo = () => {
        const searchText = searchFruitSignal.value;
        const selected = fruitSignal.value;
        const [matchingFruits, getMatchInfo] = useSearchText(
          searchText,
          FRUITS,
        );
        const [log, pushLog] = useCallLog();
        const [searchNoMatchMode, setSearchNoMatchMode] = useState("remove");
        return (
          <div id="searchable" className="demo-section">
            <h2>Searchable</h2>
            <p>
              A <code>stateSignal</code> persists the search text in the URL.
              <code>useSearchText</code> filters and ranks items.
            </p>
            <fieldset
              style={{
                display: "inline-flex",
                flexDirection: "column",
                gap: 6,
                marginBottom: 12,
                padding: "8px 12px",
                border: "1px solid #ddd",
                borderRadius: 6,
                fontSize: "0.85rem",
                color: "#555",
              }}
            >
              <legend style={{ padding: "0 4px", fontWeight: 600 }}>
                searchNoMatchMode
              </legend>
              {[
                { mode: "remove", desc: "removes non-matching items from DOM" },
                {
                  mode: "invisible_and_inert",
                  desc: "keeps layout but invisible and non-interactive",
                },
                {
                  mode: "muted",
                  desc: "keeps items visible, opacified, and still interactive",
                },
              ].map(({ mode, desc }) => (
                <label
                  key={mode}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 6,
                    cursor: "pointer",
                  }}
                >
                  <input
                    type="radio"
                    name="searchNoMatchMode"
                    value={mode}
                    checked={searchNoMatchMode === mode}
                    onChange={() => setSearchNoMatchMode(mode)}
                  />
                  <code>{mode}</code>
                  <span style={{ color: "#999" }}>({desc})</span>
                </label>
              ))}
            </fieldset>
            <Input
              type="search"
              placeholder="Search fruits…"
              value={searchText}
              action={(v) => {
                searchFruitSignal.value = v;
              }}
              expandX
              marginBottom="m"
              borderRadius="xs"
              paddingX="xs"
              paddingY="xs"
              navi-list="searchable-list"
            />
            <List
              selectable
              id="searchable-list"
              searchNoMatchMode={searchNoMatchMode}
              action={(v) => {
                fruitSignal.value = v;
                pushLog("action", v ?? "(none)");
              }}
              uiAction={(v) => {
                pushLog("uiAction", v ?? "(none)");
              }}
              expandX
              separator
            >
              {matchingFruits.map((fruit, i) => {
                const { score, ranges, match } = getMatchInfo(fruit);
                return (
                  <List.Item
                    selectable
                    key={fruit}
                    index={i}
                    id={`searchable_${fruit.toLowerCase()}`}
                    value={fruit}
                    selected={selected === fruit}
                    highlight={ranges}
                    matchScore={score}
                    match={match}
                    flex
                    spacing="s"
                  >
                    <SelectableInput />
                    {fruit}
                  </List.Item>
                );
              })}
            </List>
            <div className="value-display">{selected}</div>
            <CallLog entries={log} />
          </div>
        );
      };

      // ── Basic (with Selectable.Input) ──────────────────────────────────────────

      const BasicDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const [singleLog, pushSingleLog] = useCallLog();
        const [multipleLog, pushMultipleLog] = useCallLog();
        const commandTargetRef = useRef(null);
        useLayoutEffect(() => {
          const el = commandTargetRef.current;
          if (!el) {
            return undefined;
          }
          const onNaviCommand = (e) => {
            pushSingleLog("command", e.detail.command);
          };
          el.addEventListener("navi_command", onNaviCommand);
          return () => {
            el.removeEventListener("navi_command", onNaviCommand);
          };
        }, []);
        return (
          <div id="basic" className="demo-section">
            <h2>Basic (with Selectable.Input)</h2>
            <p>
              <code>Selectable.Input</code> lets you control where the input
              indicator appears inside the row. See the Customization section
              below for more advanced placements and appearances.
            </p>
            {/* Hidden node that receives --navi-void commands from the single list */}
            <div
              ref={commandTargetRef}
              id="basic-command-target"
              style={{ display: "none" }}
            />
            <div className="two-col">
              <div>
                <div className="col-label">Single (command="--navi-void")</div>
                <List
                  selectable
                  id="basic-single-list"
                  command="--navi-void"
                  commandFor="basic-command-target"
                  action={(v) => {
                    setSelectedSingle(v);
                    pushSingleLog("action", v ?? "(none)");
                  }}
                  uiAction={(v) => {
                    pushSingleLog("uiAction", v ?? "(none)");
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <List.Item
                      selectable
                      key={fruit}
                      index={i}
                      id={`basic_s_${fruit.toLowerCase()}`}
                      value={fruit}
                      selected={selectedSingle === fruit}
                      flex
                      spacing="s"
                    >
                      <SelectableInput />
                      {fruit}
                    </List.Item>
                  ))}
                </List>
                <CallLog entries={singleLog} />
              </div>
              <div>
                <div className="col-label">Multiple</div>
                <List
                  selectable
                  multiple
                  action={(v) => {
                    setSelectedMultiple(v);
                    pushMultipleLog(
                      "action",
                      v && v.length ? v.join(", ") : "(none)",
                    );
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <List.Item
                      selectable
                      key={fruit}
                      index={i}
                      id={`basic_m_${fruit.toLowerCase()}`}
                      value={fruit}
                      selected={selectedMultiple.includes(fruit)}
                      flex
                      spacing="s"
                    >
                      <SelectableInput />
                      {fruit}
                    </List.Item>
                  ))}
                </List>
                <CallLog entries={multipleLog} />
              </div>
            </div>
          </div>
        );
      };

      // ── List-level value / defaultValue ───────────────────────────────────────

      const ListValueDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const [singleLog, pushSingleLog] = useCallLog();
        const [multipleLog, pushMultipleLog] = useCallLog();
        return (
          <div id="list-value" className="demo-section">
            <h2>List-level value / defaultValue</h2>
            <p>
              Instead of putting <code>selected</code> on each item,{" "}
              <code>value</code> or <code>defaultValue</code> is set on{" "}
              <code>List</code>. The list derives each item's selected state
              internally — items don't need a <code>selected</code> prop.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single — controlled (value)</div>
                <List
                  selectable
                  value={selectedSingle}
                  action={(v) => {
                    setSelectedSingle(v);
                    pushSingleLog("action", v ?? "(none)");
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <List.Item
                      selectable
                      key={fruit}
                      index={i}
                      id={`lv_s_${fruit.toLowerCase()}`}
                      value={fruit}
                      flex
                      spacing="s"
                    >
                      <SelectableInput />
                      {fruit}
                    </List.Item>
                  ))}
                </List>
                <CallLog entries={singleLog} />
              </div>
              <div>
                <div className="col-label">Multiple — controlled (value)</div>
                <List
                  selectable
                  multiple
                  value={selectedMultiple}
                  action={(v) => {
                    setSelectedMultiple(v ?? []);
                    pushMultipleLog(
                      "action",
                      v && v.length ? v.join(", ") : "(none)",
                    );
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <List.Item
                      selectable
                      key={fruit}
                      index={i}
                      id={`lv_m_${fruit.toLowerCase()}`}
                      value={fruit}
                      flex
                      spacing="s"
                    >
                      <SelectableInput />
                      {fruit}
                    </List.Item>
                  ))}
                </List>
                <CallLog entries={multipleLog} />
              </div>
            </div>
            <h3 style={{ marginTop: 24, marginBottom: 8 }}>
              Uncontrolled (defaultValue)
            </h3>
            <p>
              <code>defaultValue</code> sets the initial selection without
              external state — items stay uncontrolled after that.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single — defaultValue="Cherry"</div>
                <List selectable defaultValue="Cherry" expandX>
                  {FRUITS.map((fruit, i) => (
                    <List.Item
                      selectable
                      key={fruit}
                      index={i}
                      id={`lvd_s_${fruit.toLowerCase()}`}
                      value={fruit}
                      flex
                      spacing="s"
                    >
                      <SelectableInput />
                      {fruit}
                    </List.Item>
                  ))}
                </List>
              </div>
              <div>
                <div className="col-label">
                  Multiple — defaultValue={`{["Banana", "Date"]}`}
                </div>
                <List
                  selectable
                  multiple
                  defaultValue={["Banana", "Date"]}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <List.Item
                      selectable
                      key={fruit}
                      index={i}
                      id={`lvd_m_${fruit.toLowerCase()}`}
                      value={fruit}
                      flex
                      spacing="s"
                    >
                      <SelectableInput />
                      {fruit}
                    </List.Item>
                  ))}
                </List>
              </div>
            </div>
          </div>
        );
      };

      // ── ReadOnly items ─────────────────────────────────────────────────────────

      const ReadOnlyDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const renderList = ({ multiple, selected, setSelected }) => (
          <List
            selectable
            multiple={multiple}
            action={(v) => {
              setSelected(multiple ? (v ?? []) : (v ?? null));
            }}
            expandX
          >
            <List.Item
              selectable
              index={0}
              id={`ro_taken_${multiple ? "m" : "s"}`}
              value="taken"
              flex
              spacing="s"
              readOnly
              readOnlyMessage={
                <>
                  This slot is already <strong>taken.</strong>
                </>
              }
            >
              <SelectableInput />
              Taken
            </List.Item>
            <List.Item
              selectable
              index={1}
              id={`ro_unavailable_${multiple ? "m" : "s"}`}
              value="unavailable"
              flex
              spacing="s"
              readOnly
            >
              <SelectableInput />
              Unavailable
            </List.Item>
            {FRUITS.slice(0, 3).map((fruit, i) => (
              <List.Item
                selectable
                key={fruit}
                index={i + 2}
                id={`ro_${multiple ? "m" : "s"}_${fruit.toLowerCase()}`}
                value={fruit}
                selected={
                  multiple ? selected.includes(fruit) : selected === fruit
                }
                flex
                spacing="s"
              >
                <SelectableInput />
                {fruit}
              </List.Item>
            ))}
          </List>
        );
        return (
          <div id="readonly" className="demo-section">
            <h2>ReadOnly items</h2>
            <p>
              Items with <code>readOnly</code> show a callout on click instead
              of selecting.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                {renderList({
                  multiple: false,
                  selected: selectedSingle,
                  setSelected: setSelectedSingle,
                })}
                <div className="value-display">
                  {selectedSingle ? `Selected: ${selectedSingle}` : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                {renderList({
                  multiple: true,
                  selected: selectedMultiple,
                  setSelected: setSelectedMultiple,
                })}
                <div className="value-display">
                  {selectedMultiple.length
                    ? `Selected: ${selectedMultiple.join(", ")}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── External control ───────────────────────────────────────────────────────

      const EXTERNAL_CTRL_FRUITS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
        "Honeydew",
        "Kiwi",
        "Lemon",
        "Mango",
        "Nectarine",
        "Orange",
        "Papaya",
        "Quince",
        "Raspberry",
        "Strawberry",
        "Tangerine",
        "Ugli fruit",
        "Vanilla bean",
        "Watermelon",
        "Ximenia",
        "Yuzu",
        "Zucchini",
        "Açaí",
        "Blackberry",
        "Cantaloupe",
        "Dragonfruit",
        "Feijoa",
        "Gooseberry",
        "Jackfruit",
        "Kumquat",
        "Longan",
        "Mulberry",
        "Persimmon",
      ];

      const ExternalControlDemo = () => {
        const listRef = useRef(null);
        const [selected, setSelected] = useState("Apple");
        const [actionLog, pushActionLog] = useCallLog();
        const toSelectableId = (fruit) =>
          `ext_s_${fruit.toLowerCase().replaceAll(" ", "_")}`;
        const [targetId, setTargetId] = useState(
          toSelectableId(EXTERNAL_CTRL_FRUITS[0]),
        );
        return (
          <div id="external-control" className="demo-section">
            <h2>External control</h2>
            <p>
              External UI can programmatically select or unselect items using{" "}
              <code>dispatchRequestSelect</code> and{" "}
              <code>dispatchRequestUnselect</code>. The list uses{" "}
              <code>renderBudget={"{30}"}</code> so some items are not in the
              DOM at any given time — the select/unselect still works via the
              in-memory UI state controller.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">
                  List (renderBudget=30, {EXTERNAL_CTRL_FRUITS.length} items)
                </div>
                <List
                  selectable
                  id="external-control-list"
                  ref={listRef}
                  renderBudget={30}
                  action={(v) => {
                    setSelected(v);
                    pushActionLog("action", v ?? "(none)");
                  }}
                  expandX
                  style={{ maxHeight: 200, overflowY: "auto" }}
                >
                  {EXTERNAL_CTRL_FRUITS.map((fruit, i) => (
                    <List.Item
                      selectable
                      key={fruit}
                      index={i}
                      id={`ext_s_${fruit.toLowerCase().replaceAll(" ", "_")}`}
                      value={fruit}
                      selected={selected === fruit}
                      flex
                      spacing="s"
                    >
                      <SelectableInput />
                      {fruit}
                    </List.Item>
                  ))}
                </List>
                <div className="value-display">
                  Selected: {selected ?? "(none)"}
                </div>
              </div>
              <div>
                <div className="col-label">External controls</div>
                <div
                  style={{ display: "flex", flexDirection: "column", gap: 8 }}
                >
                  <select
                    value={targetId}
                    onChange={(e) => setTargetId(e.currentTarget.value)}
                    style={{
                      padding: "6px 8px",
                      borderRadius: 4,
                      border: "1px solid #ccc",
                    }}
                  >
                    {EXTERNAL_CTRL_FRUITS.map((f) => (
                      <option key={f} value={toSelectableId(f)}>
                        {f}
                      </option>
                    ))}
                  </select>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Button
                      command="--navi-select"
                      commandFor="external-control-list"
                      value={targetId}
                    >
                      Select
                    </Button>
                    <Button
                      command="--navi-unselect"
                      commandFor="external-control-list"
                      value={targetId}
                    >
                      Unselect
                    </Button>
                    <Button
                      command="--navi-scroll"
                      commandFor="external-control-list"
                      value={targetId}
                    >
                      Scroll into view
                    </Button>
                  </div>
                  <div className="col-label" style={{ marginTop: 8 }}>
                    Action log
                  </div>
                  <CallLog entries={actionLog} />
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Form integration ───────────────────────────────────────────────────────

      const FormDemo = () => {
        const [submittedSingle, setSubmittedSingle] = useState(null);
        const [submittedMultiple, setSubmittedMultiple] = useState(null);
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        return (
          <div id="form" className="demo-section">
            <h2>Form integration</h2>
            <p>
              <code>SelectableList</code> works inside a <code>Form</code>. The
              selected value is submitted under the list's <code>name</code>.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedSingle(fruit ?? "(none)");
                    setSelectedSingle(fruit ?? null);
                  }}
                >
                  <List selectable name="fruit">
                    {FRUITS.map((fruit, i) => (
                      <List.Item
                        selectable
                        key={fruit}
                        index={i}
                        id={`form_s_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedSingle === fruit}
                        flex
                        spacing="s"
                      >
                        <SelectableInput />
                        {fruit}
                      </List.Item>
                    ))}
                  </List>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedSingle !== null
                    ? `Submitted: ${submittedSingle}`
                    : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedMultiple(fruit);
                    setSelectedMultiple(fruit);
                  }}
                >
                  <List selectable multiple name="fruit">
                    {FRUITS.map((fruit, i) => (
                      <List.Item
                        selectable
                        key={fruit}
                        index={i}
                        id={`form_m_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedMultiple.includes(fruit)}
                        flex
                        spacing="s"
                      >
                        <SelectableInput />
                        {fruit}
                      </List.Item>
                    ))}
                  </List>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedMultiple !== null
                    ? `Submitted: ${submittedMultiple.length ? submittedMultiple.join(", ") : "(none)"}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Validation ─────────────────────────────────────────────────────────────

      const ValidationDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState(null);
        const [selectedMultiple, setSelectedMultiple] = useState([]);
        const [submittedSingle, setSubmittedSingle] = useState(null);

                        fontWeight: isActive ? 600 : "normal",
                      }}
                    >
                      {label}
                    </div>
                  );
                })}
              </div>
              <List
                selectable
                selectedIndicator="backgroundColor"
                action={(value) => {
                  setSelected(value);
                }}
                maxHeight="200"
                border="1px solid grey"
              >
                {LEGEND_FRUITS.map((fruit, i) => (
                  <List.Item
                    selectable
                    key={fruit}
                    index={i}
                    id={`legend_${fruit.toLowerCase()}`}
                    value={fruit}
                    selected={selected === fruit}
                    pointed={FRUIT_SUGAR[fruit] === hoveredSugar}
                    onMouseEnter={() => {
                      setHoveredFruit(fruit);
                    }}
                    onMouseLeave={() => {
                      setHoveredFruit(null);
                    }}
                    style={{
                      "--list-item-background-color-pointed": "#dbeafe",
                    }}
                  >
                    {SUGAR_ICON[FRUIT_SUGAR[fruit]]} {fruit}
                  </List.Item>
                ))}
              </List>
            </div>
            <div className="value-display">{selected ?? ""}</div>
          </div>
        );
      };

      const SIZES = ["XS", "S", "M", "L", "XL"];

      const HorizontalSingleDemo = () => {
        const [selected, setSelected] = useState("M");
        return (
          <div className="demo-section">
            <h3>Single</h3>
            <List
              selectable
              horizontal
              spacing="xs"
              borderWidth="0"
              selectedIndicator="backgroundColor"
              action={(v) => {
                setSelected(v ?? null);
              }}
            >
              {SIZES.map((size, i) => (
                <List.Item
                  selectable
                  key={size}
                  index={i}
                  id={`h_s_${size}`}
                  value={size}
                  selected={selected === size}
                  paddingX="m"
                  paddingY="s"
                  borderRadius="s"
                  borderWidth="1"
                >
                  {size}
                </List.Item>
              ))}
            </List>
          </div>
        );
      };

      const HorizontalMultipleDemo = () => {
        const [selected, setSelected] = useState(["S", "L"]);
        return (
          <div className="demo-section">
            <h3>Multiple</h3>
            <List
              selectable
              horizontal
              multiple
              spacing="xs"
              borderWidth="0"
              selectedIndicator="backgroundColor"
              action={(v) => {
                setSelected(v ?? []);
              }}
            >
              {SIZES.map((size, i) => (
                <List.Item
                  selectable
                  key={size}
                  index={i}
                  id={`h_m_${size}`}
                  value={size}
                  selected={selected.includes(size)}
                  paddingX="m"
                  paddingY="s"
                  borderRadius="s"
                  borderWidth="1"
                >
                  {size}
                </List.Item>
              ))}
            </List>
          </div>
        );
      };

      const HorizontalYellowOutlineDemo = () => {
        const [selected, setSelected] = useState("M");
        return (
          <div className="demo-section">
            <h3>Yellow outline + forced focus-visible on "M"</h3>
            <List
              selectable
              horizontal
              spacing="xs"
              borderWidth="0"
              selectedIndicator="backgroundColor"
              style={{ "--list-item-outline-color": "yellow" }}
              action={(v) => {
                setSelected(v ?? null);
              }}
            >
              {SIZES.map((size, i) => (
                <List.Item
                  selectable
                  key={size}
                  index={i}
                  id={`h_fo_${size}`}
                  value={size}
                  selected={selected === size}
                  paddingX="m"
                  paddingY="s"
                  borderRadius="s"
                  borderWidth="1"
                  basePseudoState={
                    size === "M" ? { ":focus-visible": true } : undefined
                  }
                >
                  {size}
                </List.Item>
              ))}
            </List>
          </div>
        );
      };

      const HorizontalDemo = () => {
        return (
          <div id="horizontal">
            <div className="demo-section">
              <h2>Horizontal</h2>
              <p>
                La prop <code>horizontal</code> sur <code>SelectableList</code>{" "}
                dispose les items en ligne. Ici sans{" "}
                <code>Selectable.Input</code> visible : la sélection est
                indiquée uniquement par la couleur de fond.
              </p>
            </div>
            <HorizontalSingleDemo />
            <HorizontalMultipleDemo />
            <HorizontalYellowOutlineDemo />
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
