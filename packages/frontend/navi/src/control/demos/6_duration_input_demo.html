<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Duration Input Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      #toc {
        margin-bottom: 32px;
        padding: 16px 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      #toc ul {
        margin: 0;
        padding: 0 0 0 16px;
      }
      #toc li {
        margin: 4px 0;
        font-size: 14px;
      }
      #toc > ul {
        padding: 0;
        list-style: none;
      }
      #toc > ul > li > ul {
        list-style: disc;
      }
      .demo-section-group {
        margin-bottom: 32px;
      }
      .demo-section-group > h2 {
        margin: 0 0 12px;
        padding-bottom: 6px;
        font-size: 1.2rem;
        border-bottom: 2px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Duration Input Demo</h1>
      <nav id="toc">
        <ul>
          <li><a href="#unit-customization">Unit customization</a></li>
          <li>
            <a href="#interactivity">Interactivity</a>
            <ul>
              <li><a href="#outside-form">Outside form</a></li>
              <li><a href="#inside-form">Inside form</a></li>
              <li><a href="#inside-control-group">Inside control group</a></li>
              <li>
                <a href="#inside-picker-in-form">Inside picker (in form)</a>
              </li>
            </ul>
          </li>
        </ul>
      </nav>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Button,
        ControlGroup,
        Form,
        Input,
        Label,
        InputGroup,
        Unit,
        Picker,
        Text,
        Time,
        NaviDebug,
      } from "@jsenv/navi";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";

      const App = () => (
        <Box flex="y" spacing="l">
          <div class="demo-section-group" id="unit-customization">
            <h2>Unit customization</h2>
            <BasicDemo />
            <LongUnitDemo />
          </div>
          <div class="demo-section-group" id="interactivity">
            <h2>Interactivity</h2>
            <OutsideFormDemo />
            <InsideFormDemo />
            <InsideControlGroupDemo />
            <InsidePickerInFormDemo />
          </div>
        </Box>
      );

      const DurationInput = ({
        hour,
        minute,
        uiAction,
        action,
        unitHour = (
          <Unit
            unit="hour"
            plural
            color="secondary"
            // We need this because ":" is inside the first input so
            // in case unit pushes to the right it should account for the space of ":"
            marginRight="1ch"
          />
        ),
        unitMinute = <Unit unit="minute" plural color="secondary" />,
      }) => (
        <Box border="1px dotted #aaa" width="fit-content">
          <InputGroup flex spacing="xxs" width="fit-content">
            <Label flex="y" textAlign="right">
              <Input
                type="navi_hour"
                name="hour"
                unit={false}
                variant="underline"
                size="l"
                expandX
                value={hour}
                required
                uiAction={(v) => {
                  uiAction?.({ hour: v, minute });
                }}
                action={(v) => {
                  action?.({ hour: v, minute });
                }}
              >
                <Input.UI.UnitSlot>:</Input.UI.UnitSlot>
              </Input>
              {unitHour}
            </Label>
            <Label flex="y">
              <Input
                type="navi_minute"
                name="minute"
                size="l"
                unit={false}
                variant="underline"
                expandX
                value={minute}
                required
                uiAction={(v) => {
                  uiAction?.({ hour, minute: v });
                }}
                action={(v) => {
                  action?.({ hour, minute: v });
                }}
              />
              {unitMinute}
            </Label>
          </InputGroup>
        </Box>
      );

      // ── BasicDemo ─────────────────────────────────────────────────────────
      const BasicDemo = () => {
        const hourSignal = useSignal(2);
        const minuteSignal = useSignal(15);

        return (
          <div class="demo-section">
            <h2>Default units</h2>
            <p class="desc">
              Two <code>unit={"{false}"}</code> inputs side by side, each paired
              with its <code>&lt;Unit&gt;</code> label displayed below.
            </p>
            <DurationInput
              hour={hourSignal.value}
              minute={minuteSignal.value}
              uiAction={({ hour, minute }) => {
                hourSignal.value = hour;
                minuteSignal.value = minute;
              }}
            />
          </div>
        );
      };

      // ── LongUnitDemo ──────────────────────────────────────────────────────
      const LongUnitDemo = () => {
        const hourSignal = useSignal(1);
        const minuteSignal = useSignal(30);

        return (
          <div class="demo-section">
            <h2>Long unit labels → input stretches</h2>
            <p class="desc">
              When the unit label is wider than the input, the label dictates
              the column width and the input stretches to fill it.
            </p>
            <DurationInput
              hour={hourSignal.value}
              minute={minuteSignal.value}
              uiAction={({ hour, minute }) => {
                hourSignal.value = hour;
                minuteSignal.value = minute;
              }}
              unitHour={
                <Unit
                  unit="hour"
                  plural
                  color="secondary"
                  marginRight="1ch"
                  label="This is way longer"
                />
              }
            />
          </div>
        );
      };

      // ── OutsideFormDemo ───────────────────────────────────────────────────
      const OutsideFormDemo = () => {
        const hourSignal = useSignal(2);
        const minuteSignal = useSignal(15);
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="outside-form">
            <h2>Outside form</h2>
            <p class="desc">
              The duration input is used standalone, outside any{" "}
              <code>Form</code> or <code>ControlGroup</code>. Values are managed
              directly via signals and <code>uiAction</code> callbacks.
            </p>
            <Box flex="y" spacing="s" alignX="start">
              <DurationInput
                hour={hourSignal.value}
                minute={minuteSignal.value}
                uiAction={({ hour, minute }) => {
                  push("uiAction", { hour, minute });
                  hourSignal.value = hour;
                  minuteSignal.value = minute;
                }}
              />
              <CallLog entries={entries} onClear={clear} />
            </Box>
          </div>
        );
      };

      // ── InsideFormDemo ────────────────────────────────────────────────────
      const InsideFormDemo = () => {
        const hourSignal = useSignal(2);
        const minuteSignal = useSignal(15);
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="inside-form">
            <h2>Inside form</h2>
            <p class="desc">
              The duration input is wrapped in a <code>Form</code>. Submitting
              collects <code>{"{ hour, minute }"}</code> from the form values.
            </p>
            <Form
              action={(values) => {
                push("form action", values);
              }}
              uiAction={(values) => {
                push("form uiAction", values);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <DurationInput
                  hour={hourSignal.value}
                  minute={minuteSignal.value}
                  uiAction={({ hour, minute }) => {
                    hourSignal.value = hour;
                    minuteSignal.value = minute;
                  }}
                />
                <Button type="submit">Submit</Button>
                <CallLog entries={entries} onClear={clear} />
              </Box>
            </Form>
          </div>
        );
      };

      // ── InsideControlGroupDemo ────────────────────────────────────────────
      const InsideControlGroupDemo = () => {
        const hourSignal = useSignal(2);
        const minuteSignal = useSignal(15);
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="inside-control-group">
            <h2>Inside control group</h2>
            <p class="desc">
              The duration input is grouped inside a{" "}
              <code>ControlGroup name="duration"</code> (no surrounding{" "}
              <code>Form</code>). The group aggregates child state and fires{" "}
              <code>uiAction</code> with <code>{"{ hour, minute }"}</code> as
              the group value.
            </p>
            <Box flex="y" spacing="s" alignX="start">
              <ControlGroup
                name="duration"
                action={(values) => {
                  push("group action", values);
                }}
                uiAction={(v) => {
                  push("group uiAction", v);
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <DurationInput
                    hour={hourSignal.value}
                    minute={minuteSignal.value}
                    uiAction={({ hour, minute }) => {
                      hourSignal.value = hour;
                      minuteSignal.value = minute;
                    }}
                  />
                  <Button command="--navi-send">Submit</Button>
                </Box>
              </ControlGroup>
              <CallLog entries={entries} onClear={clear} />
            </Box>
          </div>
        );
      };

      // ── InsidePickerInFormDemo ──────────────────────────────────────────
      const InsidePickerInFormDemo = () => {
        const [entries, push, clear] = useCallLog();
        const pickerId = "duration-picker";
        const hourSignal = useSignal(null);
        const minuteSignal = useSignal(null);

        const DurationPickerUI = () => {
          const h = hourSignal.value;
          const m = minuteSignal.value;
          if (h === null && m === null) {
            return <Time type="time" />;
          }
          const hh = String(h ?? 0).padStart(2, "0");
          const mm = String(m ?? 0).padStart(2, "0");
          return <Time type="time">{`${hh}:${mm}`}</Time>;
        };

        return (
          <div class="demo-section" id="inside-picker-in-form">
            <h2>Inside picker (in form)</h2>
            <p class="desc">
              The duration input lives inside a{" "}
              <code>Picker type="controlgroup" name="duration"</code> which is
              itself inside a <code>Form</code>. The form receives{" "}
              <code>{"{ duration: { hour, minute } }"}</code> on submit.
            </p>
            <Form
              action={(values) => {
                push("form action", values);
              }}
              uiAction={(values) => {
                push("form uiAction", values);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Picker
                  id={pickerId}
                  name="duration"
                  type="controlgroup"
                  placeholder="Enter a duration"
                  ui={<DurationPickerUI />}
                  uiAction={(v) => {
                    push("picker uiAction", v);
                  }}
                >
                  <ControlGroup>
                    <Box flex="y" spacing="l" padding="s" alignX="center">
                      <Text bold>Enter a duration</Text>
                      <DurationInput
                        hour={hourSignal.value}
                        minute={minuteSignal.value}
                        uiAction={({ hour, minute }) => {
                          hourSignal.value = hour;
                          minuteSignal.value = minute;
                        }}
                      />
                      <Box flex="x" spacing="s" alignX="end" expandX>
                        <Button command="--navi-cancel" variant="discrete">
                          Cancel
                        </Button>
                        <Button command="--navi-define" variant="discrete">
                          Confirm
                        </Button>
                      </Box>
                    </Box>
                  </ControlGroup>
                </Picker>
                <Button command="--navi-send">Submit</Button>
                <CallLog entries={entries} onClear={clear} />
              </Box>
            </Form>
          </div>
        );
      };

      render(
        <NaviDebug debugAction debugInteraction>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
