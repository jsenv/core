<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Duration Input Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      #toc {
        margin-bottom: 32px;
        padding: 16px 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      #toc ul {
        margin: 0;
        padding: 0 0 0 16px;
      }
      #toc li {
        margin: 4px 0;
        font-size: 14px;
      }
      #toc > ul {
        padding: 0;
        list-style: none;
      }
      #toc > ul > li > ul {
        list-style: disc;
      }
      .demo-section-group {
        margin-bottom: 32px;
      }
      .demo-section-group > h2 {
        margin: 0 0 12px;
        padding-bottom: 6px;
        font-size: 1.2rem;
        border-bottom: 2px solid #ddd;
      }
      .states-grid {
        display: grid;
        grid-template-columns: repeat(2, auto);
        align-items: start;
        gap: 16px 32px;
      }
      .states-grid label {
        padding-top: 4px;
        color: #888;
        font-size: 12px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Duration Input Demo</h1>
      <nav id="toc">
        <ul>
          <li>
            <a href="#display">Display</a>
            <ul>
              <li><a href="#basic">Basic</a></li>
              <li><a href="#states">States</a></li>
            </ul>
          </li>
          <li>
            <a href="#interactivity">Interactivity</a>
            <ul>
              <li><a href="#outside-form">Outside form</a></li>
              <li><a href="#inside-form">Inside form</a></li>
              <li><a href="#inside-control-group">Inside control group</a></li>
              <li>
                <a href="#inside-picker-in-form">Inside picker (in form)</a>
              </li>
            </ul>
          </li>
          <li><a href="#customization">Customization</a></li>
        </ul>
      </nav>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Button,
        ControlGroup,
        Form,
        Unit,
        Picker,
        Text,
        Time,
        NaviDebug,
        InputDuration,
      } from "@jsenv/navi";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";

      const App = () => (
        <Box flex="y" spacing="l">
          <div class="demo-section-group" id="display">
            <h2>Display</h2>
            <BasicDemo />
            <StatesDemo />
          </div>
          <div class="demo-section-group" id="interactivity">
            <h2>Interactivity</h2>
            <OutsideFormDemo />
            <InsideFormDemo />
            <InsideControlGroupDemo />
            <InsidePickerInFormDemo />
          </div>
          <div class="demo-section-group" id="customization">
            <h2>Customization</h2>
            <UnitCustomizationDemo />
          </div>
        </Box>
      );

      // ── BasicDemo ─────────────────────────────────────────────────────────
      const BasicDemo = () => {
        const minutesSignal = useSignal(135); // 2h15

        return (
          <div class="demo-section" id="basic">
            <h2>Basic</h2>
            <InputDuration
              unit="minute"
              value={minutesSignal.value}
              uiAction={(v) => {
                minutesSignal.value = v;
              }}
            />
          </div>
        );
      };

      // ── StatesDemo ────────────────────────────────────────────────────────
      const StatesDemo = () => {
        return (
          <div class="demo-section" id="states">
            <h2>States</h2>
            <div class="states-grid">
              <label>:read-only</label>
              <InputDuration unit="minute" value={135} readOnly />

              <label>:disabled</label>
              <InputDuration unit="minute" value={135} disabled />

              <label>:-navi-loading</label>
              <InputDuration unit="minute" value={135} loading />
            </div>
          </div>
        );
      };

      // ── UnitCustomizationDemo ─────────────────────────────────────────────
      const UnitCustomizationDemo = () => {
        const minutesSignal = useSignal(90); // 1h30

        return (
          <div class="demo-section">
            <h2>Custom hour unit label</h2>
            <p class="desc">
              Pass <code>unitHour</code> to replace the default "hours" label.
              When the label is wider than the input, the input stretches to
              fill the column.
            </p>
            <InputDuration
              unit="minute"
              value={minutesSignal.value}
              uiAction={(v) => {
                minutesSignal.value = v;
              }}
              unitHour={
                <Unit
                  unit="hour"
                  plural
                  color="secondary"
                  marginRight="1ch"
                  label="This is way longer"
                />
              }
            />
          </div>
        );
      };

      // ── OutsideFormDemo ───────────────────────────────────────────────────
      const OutsideFormDemo = () => {
        const minutesSignal = useSignal(135); // 2h15
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="outside-form">
            <h2>Outside form</h2>
            <p class="desc">
              Standalone usage: <code>uiAction</code> fires on every change.
            </p>
            <Box flex="y" spacing="s" alignX="start">
              <InputDuration
                unit="minute"
                value={minutesSignal.value}
                uiAction={(v) => {
                  push("uiAction", v);
                  minutesSignal.value = v;
                }}
              />
              <CallLog entries={entries} onClear={clear} />
            </Box>
          </div>
        );
      };

      // ── InsideFormDemo ────────────────────────────────────────────────────
      const InsideFormDemo = () => {
        const minutesSignal = useSignal(135); // 2h15
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="inside-form">
            <h2>Inside form</h2>
            <p class="desc">
              Inside a <code>Form</code>: the form collects{" "}
              <code>{"{ duration: totalMinutes }"}</code> on submit.
            </p>
            <Form
              action={(values) => {
                push("form action", values);
              }}
              uiAction={(values) => {
                push("form uiAction", values);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <InputDuration
                  unit="minute"
                  name="duration"
                  value={minutesSignal.value}
                  uiAction={(v) => {
                    minutesSignal.value = v;
                  }}
                />
                <Button type="submit">Submit</Button>
                <CallLog entries={entries} onClear={clear} />
              </Box>
            </Form>
          </div>
        );
      };

      // ── InsideControlGroupDemo ────────────────────────────────────────────
      const InsideControlGroupDemo = () => {
        const minutesSignal = useSignal(135); // 2h15
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="inside-control-group">
            <h2>Inside control group</h2>
            <p class="desc">
              Inside a <code>ControlGroup name="duration"</code>: the group
              fires <code>uiAction</code> with{" "}
              <code>{"{ minutes: totalMinutes }"}</code>.
            </p>
            <Box flex="y" spacing="s" alignX="start">
              <ControlGroup
                name="duration"
                action={(values) => {
                  push("group action", values);
                }}
                uiAction={(v) => {
                  push("group uiAction", v);
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <InputDuration
                    unit="minute"
                    name="minutes"
                    value={minutesSignal.value}
                    uiAction={(v) => {
                      minutesSignal.value = v;
                    }}
                  />
                  <Button command="--navi-send">Submit</Button>
                </Box>
              </ControlGroup>
              <CallLog entries={entries} onClear={clear} />
            </Box>
          </div>
        );
      };

      // ── InsidePickerInFormDemo ──────────────────────────────────────────
      const InsidePickerInFormDemo = () => {
        const [entries, push, clear] = useCallLog();
        const pickerId = "duration-picker";
        const minuteSignal = useSignal(undefined);

        const DurationPickerUI = () => {
          const minute = minuteSignal.value;
          if (minute === undefined) {
            return <Time type="time" />;
          }
          return <Time type="minute">{minute}</Time>;
        };

        return (
          <div class="demo-section" id="inside-picker-in-form">
            <h2>Inside picker (in form)</h2>
            <p class="desc">
              Inside a <code>Picker type="controlgroup"</code> inside a{" "}
              <code>Form</code>: the form collects{" "}
              <code>{"{ duration: totalMinutes }"}</code> on submit.
            </p>
            <Form
              action={(values) => {
                push("form action", values);
              }}
              uiAction={(values) => {
                push("form uiAction", values);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Picker
                  id={pickerId}
                  name="duration"
                  type="controlgroup"
                  placeholder="Enter a duration"
                  ui={<DurationPickerUI />}
                  uiAction={(v) => {
                    push("picker uiAction", v);
                  }}
                >
                  <ControlGroup>
                    <Box flex="y" spacing="l" padding="s" alignX="center">
                      <Text bold>Enter a duration</Text>
                      <InputDuration
                        unit="minute"
                        value={minuteSignal.value}
                        uiAction={(value) => {
                          minuteSignal.value = value;
                        }}
                      />
                      <Box flex="x" spacing="s" alignX="end" expandX>
                        <Button command="--navi-cancel" variant="discrete">
                          Cancel
                        </Button>
                        <Button command="--navi-define" variant="discrete">
                          Confirm
                        </Button>
                      </Box>
                    </Box>
                  </ControlGroup>
                </Picker>
                <Button command="--navi-send">Submit</Button>
                <CallLog entries={entries} onClear={clear} />
              </Box>
            </Form>
          </div>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
