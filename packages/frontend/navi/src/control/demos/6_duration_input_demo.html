<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Duration Input Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Duration Input Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Button,
        ControlGroup,
        Form,
        Input,
        Label,
        InputGroup,
        Unit,
        Text,
        NaviDebug,
      } from "@jsenv/navi";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";

      const App = () => (
        <Box flex="y" spacing="l">
          <BasicDemo />
          <LongUnitDemo />
          <ControlGroupInFormDemo />
        </Box>
      );

      const DurationInputs = ({
        hours,
        minutes,
        onHours,
        onMinutes,
        unitHour,
        unitMinute,
        onPushEntry,
      }) => (
        <Box border="1px dotted #aaa" width="fit-content">
          <InputGroup flex spacing="xxs" width="fit-content">
            <Label flex="y" textAlign="right">
              <Input
                type="navi_hour"
                name="hours"
                unit={false}
                variant="underline"
                size="l"
                expandX
                value={hours}
                uiAction={(v) => {
                  onPushEntry?.("hour uiAction", v);
                }}
                action={(v) => {
                  onPushEntry?.("hour action", v);
                  onHours?.(v);
                }}
              >
                <Input.UI.UnitSlot>:</Input.UI.UnitSlot>
              </Input>
              {unitHour}
            </Label>
            <Label flex="y">
              <Input
                type="navi_minute"
                name="minutes"
                size="l"
                unit={false}
                variant="underline"
                expandX
                value={minutes}
                uiAction={(v) => {
                  onPushEntry?.("minute uiAction", v);
                }}
                action={(v) => {
                  onPushEntry?.("minute action", v);
                  onMinutes?.(v);
                }}
              />
              {unitMinute}
            </Label>
          </InputGroup>
        </Box>
      );

      const DurationInputWidget = ({
        hours,
        minutes,
        onHours,
        onMinutes,
        unitHour = (
          <Unit
            unit="hour"
            plural
            color="secondary"
            // We need this because ":" is inside the first input so
            // in case unit pushes to the right it should account for the space of ":
            marginRight="1ch"
          />
        ),
        unitMinute = <Unit unit="minute" plural color="secondary" />,
      }) => {
        const [entries, push, clear] = useCallLog();

        return (
          <Form
            action={(values) => {
              push("submit", values);
            }}
          >
            <Box flex="y" spacing="s" alignX="start">
              <DurationInputs
                hours={hours}
                minutes={minutes}
                onHours={onHours}
                onMinutes={onMinutes}
                unitHour={unitHour}
                unitMinute={unitMinute}
                onPushEntry={push}
              />
              <Button type="submit">Submit</Button>
              <CallLog entries={entries} onClear={clear} />
            </Box>
          </Form>
        );
      };

      // ── BasicDemo ─────────────────────────────────────────────────────────
      const BasicDemo = () => {
        const hoursSignal = useSignal(2);
        const minutesSignal = useSignal(15);
        const hours = hoursSignal.value;
        const minutes = minutesSignal.value;

        return (
          <div class="demo-section">
            <h2>Hours + minutes inputs with unit label</h2>
            <p class="desc">
              Deux inputs <code>unit={"{false}"}</code> côte à côte, chacun
              accompagné de son label d'unité (<code>&lt;Unit&gt;</code>)
              affiché en dessous.
            </p>
            <DurationInputWidget
              hours={hours}
              minutes={minutes}
              onHours={(v) => {
                hoursSignal.value = v;
              }}
              onMinutes={(v) => {
                minutesSignal.value = v;
              }}
            />
          </div>
        );
      };

      // ── LongUnitDemo ──────────────────────────────────────────────────────
      const LongUnitDemo = () => {
        const hoursSignal = useSignal(1);
        const minutesSignal = useSignal(30);
        const hours = hoursSignal.value;
        const minutes = minutesSignal.value;

        return (
          <div class="demo-section">
            <h2>Long unit labels → input stretches</h2>
            <p class="desc">
              Quand le label d'unité est plus large que l'input, c'est le label
              qui dicte la largeur de la colonne et l'input s'étire pour remplir
              cet espace.
            </p>
            <DurationInputWidget
              hours={hours}
              minutes={minutes}
              onHours={(v) => {
                hoursSignal.value = v;
              }}
              onMinutes={(v) => {
                minutesSignal.value = v;
              }}
              unitHour={
                <Text size="xs" marginRight="1ch">
                  This is way longer
                </Text>
              }
            />
          </div>
        );
      };

      // ── ControlGroupInFormDemo ────────────────────────────────────────────
      const ControlGroupInFormDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section">
            <h2>Duration inside ControlGroup inside Form</h2>
            <p class="desc">
              Le widget de durée est dans un{" "}
              <code>ControlGroup name="duration"</code> lui-même dans un{" "}
              <code>Form</code>. Le formulaire doit recevoir{" "}
              <code>{"{ duration: { hours, minutes } }"}</code> au submit.
            </p>
            <Form
              action={(values) => {
                push("form action", values);
              }}
              uiAction={(values) => {
                push("form uiAction", values);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <ControlGroup
                  name="duration"
                  uiAction={(v) => {
                    push("duration uiAction", v);
                  }}
                >
                  <DurationInputs onPushEntry={push} />
                </ControlGroup>
                <Button command="--navi-send">Submit</Button>
                <CallLog entries={entries} onClear={clear} />
              </Box>
            </Form>
          </div>
        );
      };

      render(
        <NaviDebug debugAction debugInteraction>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
