      const LABELS = ["Alpha", "Beta", "Gamma"];

      const PickerTextExternalDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();
        const pickerId = "picker-text-external-picker";
        const [label, setLabel] = useState("a name");

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Un <code>Input</code> texte à l'intérieur du picker. Les boutons
              extérieurs envoient <code>--navi-update</code> — l'input interne
              doit être mis à jour et son <code>uiAction</code> déclenché.
            </p>
            <fieldset>
              <legend>label</legend>
              <Picker
                id={pickerId}
                name="label"
                placeholder="Saisir un label"
                value={label}
                uiAction={(v) => {
                  pushEntry("uiAction (picker)", v);
                }}
                action={(v) => {
                  pushEntry("action (picker)", v);
                }}
              >
                <Box flex="y" spacing="s" padding="s" alignX="start">
                  <fieldset>
                    <legend>label</legend>
                    <Input
                      name="label"
                      placeholder="Texte libre"
                      value={label}
                      uiAction={(v) => {
                        setLabel(v);
                        pushEntry("uiAction (input)", v);
                      }}
                    />
                  </fieldset>
                  <Box flex="x" spacing="s">
                    <Button command="--navi-cancel">Annuler</Button>
                    <Button command="--navi-send">Confirmer</Button>
                  </Box>
                </Box>
              </Picker>
            </fieldset>
            <Box flex="x" spacing="s">

                  key={label}
                  command="--navi-update"
                  commandfor={pickerId}
                  value={label}

              </Button>
              <Button command="--navi-send" commandfor={pickerId}>
                Envoyer

            <CallLog entries={entries} onClear={clearEntries} />

      const COLORS = ["Red", "Green", "Blue", "Yellow", "Purple"];

      const ExternalMixedDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();
        const cgId = "external-control-mixed-cg";

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Un <code>ControlGroup</code> qui contient un champ texte{" "}
              <code>label</code> et une liste sélectable <code>color</code>. Les
              boutons extérieurs envoient <code>--navi-update</code> avec un
              objet <code>{"{ label, color }"}</code> pour mettre à jour les

            </p>
            <fieldset>
              <legend>info</legend>
              <ControlGroup
                id={cgId}
                name="info"
                action={(v) => {
                  pushEntry("action", v);
                }}
                uiAction={(v) => {
                  pushEntry("uiAction", v);
                }}

                <Box flex="y" spacing="s" alignX="start">
                  <fieldset>
                    <legend>label</legend>
                    <Input
                      type="text"
                      name="label"
                      placeholder="Saisir un label"
                      uiAction={(v) => {
                        pushEntry("uiAction (label)", v);
                      }}

                  </fieldset>
                  <fieldset>
                    <legend>color</legend>
                    <List
                      name="color"
                      selectable
                      uiAction={(v) => {
                        pushEntry("uiAction (color)", v);
                      }}
                      expandX
                    >
                      {COLORS.map((color, i) => (
                        <List.Item
                          selectable
                          key={color}
                          index={i}
                          value={color}
                          flex
                          spacing="s"
                        >
                          <SelectableInput />
                          {color}

                <Box flex="x" spacing="s" marginTop="s">

                    command="--navi-update"
                    value={{ label: "Ciel", color: "Blue" }}

                    command="--navi-update"
                    value={{ label: "Forêt", color: "Green" }}

                  <Button command="--navi-clear" />

            <CallLog entries={entries} onClear={clearEntries} />

        const listId = "external-control-multiple-list";
        const FRUITS = ["Apple", "Banana", "Cherry", "Date", "Elderberry"];

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>

              une valeur tableau sur une <code>List selectable multiple</code>{" "}
              (checkbox group). La sélection doit se mettre à jour et le{" "}
              <code>uiAction</code> de la liste doit être appelé.

              dans les logs que <code>uiAction</code>/<code>action</code> reçoit
              bien un tableau de nombres.
            </p>
            <fieldset>
              <legend>external-control-multiple-list</legend>
              <List
                id={listId}
                selectable
                multiple
                uiAction={(v) => {
                  pushEntry("uiAction", JSON.stringify(v));
                }}
                action={(v) => {
                  pushEntry("action", JSON.stringify(v));
                }}
                expandX
              >
                {FRUITS.map((fruit, i) => (
                  <List.Item
                    selectable
                    key={fruit}
                    id={`external-multiple-${fruit.toLowerCase()}`}
                    index={i}
                    value={FRUIT_VALUES[i]}
                    flex
                    spacing="s"
                  >
                    <SelectableInput />
                    {fruit} (value={FRUIT_VALUES[i]})
                  </List.Item>
                ))}
              </List>
              <Box flex="x" spacing="s" marginTop="s">
                <Button
                  command="--navi-update"
                  commandfor={listId}
                  value={[1, 3]}
                >
                  Apple + Cherry
                </Button>
                <Button
                  command="--navi-update"
                  commandfor={listId}
                  value={[2, 4, 5]}
                >
                  Banana + Date + Elderberry
                </Button>
                <Button command="--navi-clear" commandfor={listId}>
                  Tout désélectionner
                </Button>
                <Button command="--navi-send" commandfor={listId} />
              </Box>
            </fieldset>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const StandaloneDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              ControlGroup sans parent — agit comme un mini-formulaire.
            </p>
            <fieldset>
              <legend>address</legend>
              <ControlGroup
                name="address"
                action={(value) => {
                  pushEntry("action", value);
                }}
                uiAction={(value) => {
                  pushEntry("uiAction", value);
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <fieldset>
                    <legend>firstName</legend>
                    <Input type="text" name="firstName" defaultValue="dam" />
                  </fieldset>
                  <fieldset>
                    <legend>lastName</legend>
                    <Input type="text" name="lastName" />
                  </fieldset>
                  <Button command="--navi-send" />
                </Box>
              </ControlGroup>
            </fieldset>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const StandaloneClearDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              <code>Button command="--navi-clear"</code> réinitialise tous les
              champs à vide (chaîne vide). C'est le bouton à privilégier pour
              permettre à l'utilisateur de repartir de zéro. Le{" "}
              <code>uiAction</code> de l'input met à jour un signal — vérifier
              qu'il repasse à <code>""</code> après un Clear.
            </p>
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              nickNameSignalA :{" "}
              <strong>{JSON.stringify(nickNameSignalA.value)}</strong>
            </p>
            <fieldset>
              <legend>address</legend>
              <ControlGroup
                name="address"
                action={(value) => {
                  pushEntry("action", value);
                }}
                uiAction={(value) => {
                  pushEntry("uiAction", value);
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <fieldset>
                    <legend>firstName</legend>
                    <Input type="text" name="firstName" defaultValue="Jean" />
                  </fieldset>
                  <fieldset>
                    <legend>lastName</legend>
                    <Input type="text" name="lastName" defaultValue="Dupont" />
                  </fieldset>
                  <fieldset>
                    <legend>nickName (uiAction → signal)</legend>
                    <Input
                      type="text"
                      name="nickName"
                      uiAction={(v) => {
                        nickNameSignalA.value = v;
                      }}
                    />
                  </fieldset>
                  <Box flex="x" spacing="s">
                    <Button command="--navi-clear" />
                    <Button command="--navi-send" />
                  </Box>
                </Box>
              </ControlGroup>
            </fieldset>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const StandaloneResetDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              <code>Button command="--navi-reset"</code> remet les champs à leur{" "}
              <code>defaultValue</code>. Si un champ n'a pas de{" "}
              <code>defaultValue</code>, il revient à vide. À utiliser quand on
              veut annuler les modifications sans effacer les valeurs initiales.
            </p>
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              nickNameSignalB :{" "}
              <strong>{JSON.stringify(nickNameSignalB.value)}</strong>
            </p>
            <fieldset>
              <legend>address</legend>
              <ControlGroup
                name="address"
                action={(value) => {
                  pushEntry("action", value);
                }}
                uiAction={(value) => {
                  pushEntry("uiAction", value);
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <fieldset>
                    <legend>firstName (defaultValue="Jean")</legend>
                    <Input type="text" name="firstName" defaultValue="Jean" />
                  </fieldset>
                  <fieldset>
                    <legend>lastName (no defaultValue)</legend>
                    <Input type="text" name="lastName" />
                  </fieldset>
                  <fieldset>
                    <legend>nickName (defaultValue via signal)</legend>
                    <Input
                      type="text"
                      name="nickName"
                      defaultValue={nickNameSignalB.value}
                      uiAction={(v) => {
                        nickNameSignalB.value = v;
                        pushEntry("uiAction (nickName)", v);
                      }}
                    />
                  </fieldset>
                  <Box flex="x" spacing="s">
                    <Button command="--navi-reset" />
                    <Button command="--navi-send" />
                  </Box>
                </Box>
              </ControlGroup>
            </fieldset>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const TextRequiredDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Un <code>Input type="text" required</code> — soumettre sans le
              remplir doit bloquer l'action.
            </p>
            <fieldset>
              <legend>info</legend>
              <ControlGroup
                name="info"
                action={(value) => {
                  pushEntry("action", value);
                }}
                uiAction={(value) => {
                  pushEntry("uiAction", value);
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <fieldset>
                    <legend>label</legend>
                    <Input type="text" name="label" required />
                  </fieldset>
                  <Button command="--navi-send" />
                </Box>
              </ControlGroup>
            </fieldset>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const StandaloneRequiredDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Même chose avec <code>firstName</code> requis — soumettre sans le
              remplir doit bloquer l'action.
            </p>
            <fieldset>
              <legend>address</legend>
              <ControlGroup
                name="address"
                action={(value) => {
                  pushEntry("action", value);
                }}
                uiAction={(value) => {
                  pushEntry("uiAction", value);
                }}
              >
                <Box flex="y" spacing="s" alignX="start">
                  <fieldset>
                    <legend>firstName</legend>
                    <Input type="text" name="firstName" required />
                  </fieldset>
                  <fieldset>
                    <legend>lastName</legend>
                    <Input type="text" name="lastName" />
                  </fieldset>
                  <Button command="--navi-send" />
                </Box>
              </ControlGroup>
            </fieldset>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const InsideFormDemo = () => {
        const [formEntries, pushFormEntry, clearFormEntries] = useCallLog();
        const [groupEntries, pushGroupEntry, clearGroupEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Le ControlGroup (<code>name="address"</code>) produit une clé{" "}
              <code>address</code> dans la valeur du Form parent.
            </p>
            <Form
              action={(value) => {
                pushFormEntry("action", value);
              }}
              uiAction={(value) => {
                pushFormEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <fieldset>
                  <legend>name</legend>
                  <Input type="text" name="name" />
                </fieldset>
                <fieldset>
                  <legend>address</legend>
                  <ControlGroup
                    name="address"
                    uiAction={(value) => {
                      pushGroupEntry("uiAction", value);
                    }}
                    required
                  >
                    <Box flex="y" spacing="s" alignX="start">
                      <fieldset>
                        <legend>street</legend>
                        <Input type="text" name="street" />
                      </fieldset>
                      <fieldset>
                        <legend>city</legend>
                        <Input type="text" name="city" />
                      </fieldset>
                    </Box>
                  </ControlGroup>
                </fieldset>
                <Button command="--navi-send" />
              </Box>
            </Form>
            <p style={{ margin: 0, fontSize: "0.85rem", color: "#777" }}>
              ControlGroup
            </p>
            <CallLog entries={groupEntries} onClear={clearGroupEntries} />
            <p style={{ margin: 0, fontSize: "0.85rem", color: "#777" }}>
              Form
            </p>
            <CallLog entries={formEntries} onClear={clearFormEntries} />
          </Box>
        );
      };

      // ── Bubble-up demos ──────────────────────────────────────────────────

      const BubbleUpBasicDemo = () => {
        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Un <code>Input name="extra"</code> est placé dans un{" "}
              <code>List.Item</code>. Le radio_group le rejette (ce n'est pas un
              radio), il remonte et se fait enregistrer par le{" "}
              <code>ControlGroup</code> extérieur. La structure ci-dessous
              montre qui voit quoi.
            </p>
            <ControlGroup id="bubble-up-basic-cg" name="data">
              <List selectable name="choice">
                <List.Item selectable index={0} value="a" padding="s">
                  Option A
                  <Input name="extra" placeholder="extra info" />
                </List.Item>
                <List.Item selectable index={1} value="b" padding="s">
                  Option B
                </List.Item>
              </List>
            </ControlGroup>
            <DebugUIStateController id="bubble-up-basic-cg" />
          </Box>
        );
      };

      const BubbleUpBoundaryDemo = () => {
        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Deux <code>ControlGroup</code> imbriqués. L'input dans le
              List.Item remonte jusqu'au ControlGroup <em>interne</em>{" "}
              (frontière la plus proche) et s'arrête là. Le ControlGroup externe
              ne le voit pas.
            </p>
            <ControlGroup id="bubble-up-boundary-outer" name="outer">
              <ControlGroup id="bubble-up-boundary-inner" name="inner">
                <List selectable name="choice">
                  <List.Item selectable index={0} value="x" padding="s">
                    Option X
                    <Input name="extra" placeholder="extra" />
                  </List.Item>
                  <List.Item selectable index={1} value="y" padding="s">
                    Option Y
                  </List.Item>
                </List>
              </ControlGroup>
            </ControlGroup>
            <p
              style={{ margin: "8px 0 0", fontSize: "0.85rem", color: "#777" }}
            >
              outer ControlGroup :
            </p>
            <DebugUIStateController id="bubble-up-boundary-outer" />
          </Box>
        );
      };

      const BubbleUpPickerDemo = () => {
        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Un <code>Picker</code> placé dans un <code>List.Item</code>. Le
              radio_group le rejette, il remonte et se fait enregistrer par le{" "}
              <code>ControlGroup</code> extérieur.
            </p>
            <ControlGroup id="bubble-up-picker-cg" name="schedule">
              <List selectable name="duration">
                <List.Item selectable index={0} value="30min" padding="s">
                  30 min
                </List.Item>
                <List.Item selectable index={1} value="1h" padding="s">
                  1 h
                </List.Item>
                <List.Item selectable index={2} value="custom" padding="s">
                  Personnalisé
                  <Picker name="custom" type="controlgroup" placeholder="hh:mm">
                    <ControlGroup>
                      <Box flex="x" spacing="s" padding="s">
                        <fieldset>
                          <legend>h</legend>
                          <Input name="hour" type="number" placeholder="0" />
                        </fieldset>
                        <fieldset>
                          <legend>min</legend>
                          <Input name="minute" type="number" placeholder="0" />
                        </fieldset>
                      </Box>
                    </ControlGroup>
                    <Box flex spacing="s">
                      <Button command="--navi-cancel">Annuler</Button>
                      <Button command="--navi-define">Définir</Button>
                    </Box>
                  </Picker>
                </List.Item>
              </List>
            </ControlGroup>
            <DebugUIStateController id="bubble-up-picker-cg" />
          </Box>
        );
      };

      render(
        <NaviDebug debugCommand debugAction debugInteraction debugUIState>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
