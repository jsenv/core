      const LABELS = ["Alpha", "Beta", "Gamma"];

      const PickerTextExternalDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();
        const pickerId = "picker-text-external-picker";
        const [label, setLabel] = useState("a name");

        return (
          <div class="demo-section" id="facade-text">
            <h2>Input texte</h2>
            <Box flex="y" spacing="m" alignX="start">
              <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
                Un <code>Input</code> texte à l'intérieur du picker. Les boutons
                extérieurs envoient <code>--navi-update</code> — l'input interne
                doit être mis à jour et son <code>uiAction</code> déclenché.
              </p>
              <fieldset>
                <legend>label</legend>
                <Picker
                  id={pickerId}
                  name="label"
                  placeholder="Saisir un label"
                  value={label}
                  uiAction={(v) => {
                    pushEntry("uiAction (picker)", v);
                  }}
                  action={(v) => {
                    pushEntry("action (picker)", v);
                  }}
                >
                  <Box flex="y" spacing="s" padding="s" alignX="start">
                    <fieldset>
                      <legend>label</legend>
                      <Input
                        name="label"
                        placeholder="Texte libre"
                        value={label}
                        uiAction={(v) => {
                          setLabel(v);
                          pushEntry("uiAction (input)", v);
                        }}
                      />
                    </fieldset>
                    <Box flex="x" spacing="s">
                      <Button command="--navi-cancel">Annuler</Button>
                      <Button command="--navi-send">Confirmer</Button>
                    </Box>
                  </Box>
                </Picker>
              </fieldset>
              <Box flex="x" spacing="s">
                {LABELS.map((label) => (
                  <Button
                    key={label}
                    command="--navi-update"
                    commandfor={pickerId}
                    value={label}
                  >
                    {label}
                  </Button>
                ))}
                <Button command="--navi-clear" commandfor={pickerId}>
                  Vider
                </Button>
                <Button command="--navi-send" commandfor={pickerId}>
                  Envoyer
                </Button>
              </Box>
              <CallLog entries={entries} onClear={clearEntries} />
            </Box>
          </div>
        );
      };

      const CheckboxBasicDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();
        const checkboxId = "checkbox-basic-input";

        return (
          <div class="demo-section" id="checkbox-basic">

                <code>label</code> et une liste sélectable <code>color</code>.
                Les boutons extérieurs envoient <code>--navi-update</code> avec
                un objet <code>{"{ label, color }"}</code> pour mettre à jour
                les deux d'un coup.
              </p>

                <legend>info</legend>
                <ControlGroup
                  id={cgId}
                  name="info"
                  action={(v) => {
                    pushEntry("action", v);

                  uiAction={(v) => {
                    pushEntry("uiAction", v);

                      <legend>label</legend>

                        name="label"

                          pushEntry("uiAction (label)", v);
                        }}

                    <fieldset>
                      <legend>color</legend>

                        uiAction={(v) => {
                          pushEntry("uiAction (color)", v);
