<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RadioGroup Demo</title>
    <style>
      body {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>RadioGroup Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { lazy, Suspense } from "preact/compat";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";
      import {
        Button,
        Form,
        RadioGroup,
        Field,
        Label,
        Input,
        NaviDebug,
        route,
        setupRoutes,
        stateSignal,
      } from "@jsenv/navi";

      const mapStyleSignal = stateSignal("street", {
        id: "map_style",
        oneOf: ["street", "satellite", "discrete"],
      });
      const DEMO_ROUTE = route("", {
        searchParams: { map_style: mapStyleSignal },
      });
      setupRoutes([DEMO_ROUTE]);

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <div>
              <TableOfContents />
              <StandaloneDemo />
              <ImageButtonDemo />
              <InFormDemo />
              <RequiredDemo />
              <WithReadonlyDemo />
              <LazyNeighborDemo />
            </div>
          </NaviDebug>
        );
      };

      const TableOfContents = () => {
        return (
          <div class="demo-section">
            <h2>Table of contents</h2>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#standalone">Standalone</a>
              </li>
              <li>
                <a href="#image-buttons">Horizontal, image buttons</a>
              </li>
              <li>
                <a href="#in-form">In a form</a>
              </li>
              <li>
                <a href="#required">With required validation</a>
              </li>
              <li>
                <a href="#readonly">With readonly options</a>
              </li>
              <li>
                <a href="#lazy-neighbor">
                  BUG repro: RadioGroup + lazy neighbor
                </a>
              </li>
            </ol>
          </div>
        );
      };

      const StandaloneDemo = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div class="demo-section" id="standalone">
            <h2>Standalone</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              <code>uiAction</code> fires on every interaction (even re-clicking
              the already-selected radio). <code>action</code> fires only when
              the selected value changes.
            </p>

            <RadioGroup
              name="standalone_option"
              uiAction={(value) => {
                push("uiAction", value);
              }}
              action={(value) => {
                push("action", value);
              }}
              flex="y"
              alignX="start"
            >
              <legend>Pick an option</legend>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="alpha" />
                Alpha
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="beta" />
                Beta
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="gamma" />
                Gamma
              </Field>
            </RadioGroup>

            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const ImageButtonDemo = () => {
        const [entries, push, clear] = useCallLog();
        const mapStyle = mapStyleSignal.value;
        return (
          <div class="demo-section" id="image-buttons">
            <h2>Horizontal, image buttons</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              <code>RadioGroup</code> laid out horizontally (<code>flex</code> +{" "}
              <code>spacing</code>), each option an{" "}
              <code>Input type="radio"</code> with{" "}
              <code>appearance="button"</code> and an image in the{" "}
              <code>icon</code> prop. Selection is synced to the{" "}
              <code>?map_style=</code> URL search param.
            </p>

            <RadioGroup
              name="map_style"
              flex
              spacing="s"
              value={mapStyle}
              uiAction={(value) => {
                push("uiAction", value);
                mapStyleSignal.value = value;
              }}
              action={(value) => {
                push("action", value);
              }}
            >
              <legend>Map style</legend>
              <Input
                type="radio"
                value="street"
                appearance="button"
                borderRadius="s"
                icon={
                  <img
                    width="60"
                    height="60"
                    src="./radio_list_image/map_ui_street.avif"
                    alt="Street"
                  />
                }
              />
              <Input
                type="radio"
                value="satellite"
                appearance="button"
                borderRadius="s"
                icon={
                  <img
                    width="60"
                    height="60"
                    src="./radio_list_image/map_ui_satellite.avif"
                    alt="Satellite"
                  />
                }
              />
              <Input
                type="radio"
                value="discrete"
                appearance="button"
                borderRadius="s"
                icon={
                  <img
                    width="60"
                    height="60"
                    src="./radio_list_image/map_ui_discrete.avif"
                    alt="Discrete"
                  />
                }
              />
            </RadioGroup>

            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const InFormDemo = () => {
        const [submitted, setSubmitted] = useState(null);
        return (
          <div class="demo-section" id="in-form">
            <h2>In a form</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              A <code>RadioGroup</code> inside a <code>Form</code>. The selected
              value is submitted with the form.
            </p>
            <Form
              action={(params) => {
                setSubmitted(params);
              }}
            >
              <RadioGroup name="form_option" flex="y" alignX="start">
                <legend>Pick an option</legend>
                <Field
                  as="label"
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="alpha" />
                  Alpha
                </Field>
                <Field
                  as="label"
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="beta" />
                  Beta
                </Field>
                <Field
                  as="label"
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="gamma" />
                  Gamma
                </Field>
              </RadioGroup>

              <Button type="submit" style={{ marginTop: "12px" }}>
                Submit
              </Button>
              {submitted !== null && (
                <pre
                  style={{
                    marginTop: "12px",
                    padding: "8px",
                    fontFamily: "monospace",
                    background: "#f8f9fa",
                    border: "1px solid #dee2e6",
                    borderRadius: "4px",
                  }}
                >
                  {JSON.stringify(submitted, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      const RequiredDemo = () => {
        const [submitted, setSubmitted] = useState(null);
        return (
          <div class="demo-section" id="required">
            <h2>With required validation</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              The <code>required</code> attribute on a <code>RadioGroup</code>{" "}
              means an option must be selected before the form can be submitted.
            </p>
            <Form
              action={(params) => {
                setSubmitted(params);
              }}
            >
              <RadioGroup
                name="required_option"
                required
                flex="y"
                alignX="start"
              >
                <legend>Pick an option (required)</legend>
                <Field
                  as="label"
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="alpha" />
                  Alpha
                </Field>
                <Field
                  as="label"
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="beta" />
                  Beta
                </Field>
                <Field
                  as="label"
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="gamma" />
                  Gamma
                </Field>
              </RadioGroup>
              <Button type="submit" style={{ marginTop: "12px" }}>
                Submit
              </Button>
              {submitted !== null && (
                <pre
                  style={{
                    marginTop: "12px",
                    padding: "8px",
                    fontFamily: "monospace",
                    background: "#f8f9fa",
                    border: "1px solid #dee2e6",
                    borderRadius: "4px",
                  }}
                >
                  {JSON.stringify(submitted, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      const WithReadonlyDemo = () => {
        const ro = "This option is currently unavailable.";
        return (
          <div class="demo-section" id="readonly">
            <h2>With readonly options</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              Mix of normal and <code>readOnly</code> radios. Clicking a
              readonly one shows a message. Arrow key navigation skips readonly
              options.
            </p>

            <RadioGroup name="readonly_option" flex="y" alignX="start">
              <legend>Pick an option</legend>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="alpha" />
                Alpha (normal)
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="beta" />
                Beta (normal)
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input
                  type="radio"
                  value="gamma"
                  readOnly
                  readOnlyMessage={ro}
                />
                Gamma (readonly)
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input
                  type="radio"
                  value="delta"
                  readOnly
                  readOnlyMessage={ro}
                />
                Delta (readonly)
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="epsilon" />
                Epsilon (normal)
              </Field>
            </RadioGroup>
          </div>
        );
      };

      const LazyNeighbor = lazy(async () => {
        await new Promise((resolve) => setTimeout(resolve, 100));
        return "LazyNeighbor";
      });

      const LazyNeighborDemo = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div class="demo-section" id="lazy-neighbor">
            <h2>BUG repro: RadioGroup + lazy neighbor</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              <code>RadioGroup</code> inside a shared <code>Suspense</code>{" "}
              boundary with a lazy neighbor. Click a radio. Expected:{" "}
              <code>uiAction</code> appears in the log, and the underlying{" "}
              <code>{"<fieldset>"}</code> never gets a stray{" "}
              <code>name="undefined"</code>/<code>name=""</code> attribute
              (RadioGroup explicitly sets <code>name={"{undefined}"}</code> on
              its fieldset — the same prop shape that triggered the{" "}
              <code>{'<Field as="label">'}</code>{" "}
              <a href="00_field_demo.html#lazy-neighbor">
                <code>htmlFor</code> bug
              </a>
              ).
            </p>

            <Suspense fallback="loading…">
              <RadioGroup
                name="lazy_neighbor_option"
                flex="y"
                alignX="start"
                uiAction={(value) => {
                  push("uiAction", value);
                }}
                action={(value) => {
                  push("action", value);
                }}
              >
                <legend>Pick an option</legend>
                <Field
                  as="label"
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="alpha" />
                  Alpha
                </Field>
                <Field
                  as="label"
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="beta" />
                  Beta
                </Field>
                <Field
                  as="label"
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="gamma" />
                  Gamma
                </Field>
              </RadioGroup>

              <LazyNeighbor />
            </Suspense>

            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
