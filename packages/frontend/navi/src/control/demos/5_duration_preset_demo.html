<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Duration Preset + Custom Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .form-result {
        min-height: 32px;
        margin-top: 16px;
        padding: 10px 12px;
        color: #333;
        font-size: 12px;
        font-family: monospace;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Duration Preset + Custom Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import { stateSignal, route, setupRoutes } from "@jsenv/navi";
      import {
        Box,
        Field,
        Label,
        List,
        Input,
        InputGroup,
        Picker,
        Form,
        Text,
        Unit,
        Button,
        Time,
        Icon,
        NaviDebug,
      } from "@jsenv/navi";

      const PRESET_DURATIONS = [60, 90, 120];
      // Value is one of the preset numbers (60, 90, 120) or the string "custom".
      // When "custom", the actual duration is derived from customDurationHourSignal
      // and customDurationMinuteSignal.
      const durationSignal = stateSignal(90, {
        id: "duration",
        oneOf: [...PRESET_DURATIONS, "custom"],
        // persists: true,
      });
      const customDurationHourSignal = stateSignal(2, {
        id: "custom_hour",
        type: "hour",
        min: 0,
        max: 4,
        // persists: true,
      });
      const customDurationMinuteSignal = stateSignal(15, {
        id: "custom_minute",
        type: "minute",
        min: 0,
        max: 59,
        step: 5,
        // persists: true,
      });

      const dateSignal = stateSignal(Date.now(), {
        id: "date",
        type: "date",
      });

      const durationSignal2 = stateSignal(90, {
        id: "duration2",
        oneOf: [...PRESET_DURATIONS, "custom"],
      });
      const customDurationHourSignal2 = stateSignal(2, {
        id: "custom_hour2",
        type: "hour",
        min: 0,
        max: 4,
      });
      const customDurationMinuteSignal2 = stateSignal(15, {
        id: "custom_minute2",
        type: "minute",
        min: 0,
        max: 59,
        step: 5,
      });

      const DEMO_ROUTE = route("", {
        searchParams: {
          date: dateSignal,
          duration: durationSignal,
          custom_hour: customDurationHourSignal,
          custom_minute: customDurationMinuteSignal,
          duration2: durationSignal2,
          custom_hour2: customDurationHourSignal2,
          custom_minute2: customDurationMinuteSignal2,
        },
      });
      setupRoutes([DEMO_ROUTE]);

      const App = () => (
        <Box flex="y" spacing="l">
          <PresetsWithInlineCustomDemo />
          <PresetsWithPickerCustomDemo />
        </Box>
      );

      // ── PresetsWithInlineCustomDemo ───────────────────────────────────────
      const PresetsWithInlineCustomDemo = () => {
        const formResultSignal = useSignal(null);

        return (
          <div class="demo-section">
            <h2>Duration selector — presets + custom</h2>
            <p class="desc">
              3 preset options (60, 90, 120 min) and a "custom" option with a
              time Picker. The custom item is selected when the current value is
              not one of the presets. The Picker opens to let the user enter any
              duration. Everything is wired in a Form.
            </p>
            <Form
              action={({ duration }) => {
                if (duration === "custom") {
                  const hours = customDurationHourSignal.value || 0;
                  const minutes = customDurationMinuteSignal.value || 0;
                  duration = hours * 60 + minutes;
                }
                formResultSignal.value = { duration };
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <DurationControl />
              <Button type="submit">Submit</Button>
            </Form>
            {formResultSignal.value !== null ? (
              <div class="form-result">
                Form submitted:{" "}
                {JSON.stringify(formResultSignal.value, null, 2)}
              </div>
            ) : (
              <div class="form-result" style="color:#aaa">
                Submit the form to see values…
              </div>
            )}
          </div>
        );
      };

      // ── PresetsWithPickerCustomDemo ───────────────────────────────────────
      const PresetsWithPickerCustomDemo = () => {
        const formResultSignal = useSignal(null);

        return (
          <div class="demo-section">
            <h2>Duration selector — custom via Picker popup</h2>
            <p class="desc">
              Variante : l'option "Autre" contient un Picker. Cliquer dessus
              ouvre une popup avec un input heures et un input minutes. La
              sélection de l'option et l'ouverture du Picker se font en un seul
              clic.
            </p>
            <Form
              action={({ duration2 }) => {
                if (duration2 === "custom") {
                  const hours = customDurationHourSignal2.value || 0;
                  const minutes = customDurationMinuteSignal2.value || 0;
                  duration2 = hours * 60 + minutes;
                }
                formResultSignal.value = { duration: duration2 };
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <DurationControl2 />
              <Button type="submit">Submit</Button>
            </Form>
            {formResultSignal.value !== null ? (
              <div class="form-result">
                Form submitted:{" "}
                {JSON.stringify(formResultSignal.value, null, 2)}
              </div>
            ) : (
              <div class="form-result" style="color:#aaa">
                Submit the form to see values…
              </div>
            )}
          </div>
        );
      };

      // ── DurationControl ───────────────────────────────────────────────────
      const DurationControl = () => {
        const duration = durationSignal.value;

        return (
          <Field ownLabel vertical>
            <Label bold>Durée</Label>
            <List
              selectable
              horizontal
              spacing="s"
              id="duration"
              name="duration"
              required
              value={duration}
              uiAction={(v) => {
                durationSignal.value = v;
              }}
              border="none"
            >
              {PRESET_DURATIONS.map((minutes, i) => (
                <DurationPreset
                  key={minutes}
                  index={i}
                  id={minutes}
                  value={minutes}
                  selected={duration === String(minutes)}
                >
                  {minutes}
                </DurationPreset>
              ))}
              <CustomDurationOption
                index={PRESET_DURATIONS.length}
                id="custom"
                value="custom"
                selected={duration === "custom"}
              />
            </List>
          </Field>
        );
      };

      // ── DurationPreset ────────────────────────────────────────────────────

      const DurationPreset = ({ children, ...props }) => {
        return (
          <List.Item
            selectable
            borderRadius="s"
            borderWidth="1"
            minWidth="64"
            paddingX="m"
            paddingY="s"
            alignX="center"
            {...props}
          >
            <Time type="minute">{children}</Time>
          </List.Item>
        );
      };

      // ── CustomDurationOption ─────────────────────────────────────────────

      const CustomDurationOption = (props) => {
        const hours = customDurationHourSignal.value;
        const minutes = customDurationMinuteSignal.value;

        return (
          <List.Item
            selectable
            borderRadius="s"
            borderWidth="1"
            minWidth="64"
            paddingX="m"
            paddingY="s"
            alignX="center"
            noWrap
            {...props}
          >
            Autre
            <Box flex spacing="xxs">
              <Input
                type="navi_hour"
                value={hours}
                action={(v) => {
                  customDurationHourSignal.value = v;
                }}
              />
              <Input
                type="navi_minute"
                value={minutes}
                action={(v) => {
                  customDurationMinuteSignal.value = v;
                }}
              />
            </Box>
          </List.Item>
        );
      };

      // ── DurationControl2 (custom via Picker popup) ───────────────────────
      const DurationControl2 = () => {
        const duration = durationSignal2.value;

        return (
          <Field ownLabel vertical>
            <Label bold>Durée</Label>
            <List
              selectable
              horizontal
              spacing="s"
              id="duration2"
              name="duration2"
              required
              value={duration}
              uiAction={(v) => {
                durationSignal2.value = v;
              }}
              border="none"
            >
              {PRESET_DURATIONS.map((minutes, i) => (
                <DurationPreset
                  key={minutes}
                  index={i}
                  id={minutes}
                  value={minutes}
                  selected={duration === String(minutes)}
                >
                  {minutes}
                </DurationPreset>
              ))}
              <CustomDurationOptionWithPicker
                index={PRESET_DURATIONS.length}
                id="custom2"
                value="custom"
                selected={duration === "custom"}
              />
            </List>
          </Field>
        );
      };

      const CustomDurationOptionWithPicker = (props) => {
        const hours = customDurationHourSignal2.value;
        const minutes = customDurationMinuteSignal2.value;

        return (
          <List.Item
            selectable
            borderRadius="s"
            borderWidth="1"
            minWidth="64"
            paddingX="m"
            paddingY="s"
            alignX="center"
            noWrap
            flex
            spacing="xs"
            command="--navi-open"
            commandFor="custom_duration_picker2"
            // navi-command-target="child-control"
            {...props}
          >
            <Time type="minute">{hours * 60 + minutes}</Time>
            <Icon marginRight="-1ch">
              <Picker.UI.PencilSvg />
            </Icon>
            <Picker
              id="custom_duration_picker2"
              name="custom_duration_picker2"
              headless
              mode="dialog"
              borderRadius="s"
            >
              <Box flex="y" alignX="center" padding="m" spacing="m">
                <Text bold>Veuillez saisir une durée</Text>
                <InputGroup flex spacing="xxs">
                  <Box flex="y">
                    <Input
                      type="navi_hour"
                      unit={false}
                      variant="underline"
                      size="l"
                      expandX
                      value={hours}
                      action={(v) => {
                        customDurationHourSignal2.value = v;
                      }}
                      textAlign="right"
                    >
                      <Input.UI.UnitSlot>:</Input.UI.UnitSlot>
                    </Input>
                    <Unit unit="hour" plural marginRight="1ch" />
                  </Box>
                  <Box flex="y">
                    <Input
                      type="navi_minute"
                      unit={false}
                      variant="underline"
                      size="l"
                      expandX
                      value={minutes}
                      action={(v) => {
                        customDurationMinuteSignal2.value = v;
                      }}
                    />
                    <Unit unit="minute" plural />
                  </Box>
                </InputGroup>

                <Button command="--navi-cancel" />
                <Button command="--navi-define" />
              </Box>
            </Picker>
          </List.Item>
        );
      };

      // ── App ───────────────────────────────────────────────────────────────

      render(
        <NaviDebug debugCommand debugAction debugInteraction>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
