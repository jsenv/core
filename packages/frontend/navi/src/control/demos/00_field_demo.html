<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Demo</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }
      h1 {
        margin: 0 0 8px;
        color: #333;
        font-size: 2rem;
      }
      .demo-section {
        margin-bottom: 32px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .demo-section h2 {
        margin: 0 0 16px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.3rem;
        border-bottom: 2px solid #eee;
      }
      .demo-section p {
        margin: 0 0 14px;
        color: #555;
        font-size: 0.875rem;
        line-height: 1.5;
      }
      h3 {
        margin: 20px 0 4px;
        color: #666;
        font-weight: 600;
        font-size: 0.85rem;
      }
      h3:first-child {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { lazy, Suspense } from "preact/compat";
      import { Box, Text, Field, Icon, Input, Label } from "@jsenv/navi";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";

      const dotted = { outline: "1px dotted #999" };

      const App = () => (
        <Box flex="y" spacing="m">
          <h1>Field</h1>
          <p style={{ margin: 0, color: "#555" }}>
            <code>Field</code> connects a label to a form control so clicking
            the label focuses or activates the control. The dotted outline shows
            the interactive zone.
          </p>

          <nav>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: 2 }}>
              <li>
                <a href="#as-label">Field as="label"</a>
              </li>
              <li>
                <a href="#vertical-zone">Vertical — interactive zone</a>
              </li>
              <li>
                <a href="#spacing">spacingWithControl</a>
              </li>
              <li>
                <a href="#advanced">Advanced layout examples</a>
              </li>

              <li>
                <a href="#states">Disabled &amp; read-only</a>
              </li>
              <li>
                <a href="#explicit-id">Input with explicit id</a>
              </li>
              <li>
                <a href="#lazy-neighbor">
                  BUG repro: Field as="label" + lazy neighbor
                </a>
              </li>
            </ol>
          </nav>

          <AsLabelDemo />
          <InteractiveZoneDemo />
          <SpacingDemo />
          <AdvancedVerticalDemo />

          <DisabledReadonlyDemo />
          <ExplicitIdDemo />
          <LazyNeighborDemo />
        </Box>
      );

      /* ------------------------------------------------------------------ */
      /* 1. Field as="label"                                                  */
      /* ------------------------------------------------------------------ */
      const AsLabelDemo = () => (
        <div class="demo-section" id="as-label">
          <h2>
            <code>{'<Field as="label">'}</code>
          </h2>
          <p>
            The <code>{"<label>"}</code> element wraps the control directly. The
            browser connects them automatically — no <code>id</code>/
            <code>htmlFor</code> wiring needed. The whole label area is
            interactive.
          </p>

          <Box flex="y" spacing="s" alignX="start">
            <h3>label text left</h3>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Email
              <Input type="email" name="email_l" placeholder="Enter email" />
            </Field>

            <h3>label text right (checkbox / radio)</h3>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              <Input type="checkbox" name="agree" />I agree to the terms
            </Field>

            <h3>label text above (vertical)</h3>
            <Field
              as="label"
              flex="y"
              spacingWithControl="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              Username
              <Input type="text" name="uv_above" placeholder="Enter username" />
            </Field>

            <h3>label text below (vertical)</h3>
            <Field
              as="label"
              flex="y"
              spacingWithControl="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              <Input type="text" name="uv_below" placeholder="Enter username" />
              Username
            </Field>
          </Box>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 2. spacingWithControl                                                */
      /* ------------------------------------------------------------------ */
      const SpacingDemo = () => (
        <div class="demo-section" id="spacing">
          <h2>
            <code>spacingWithControl</code>
          </h2>

          <h3>as="label" — label text left</h3>
          <Field as="label" flex alignY="center" style={dotted}>
            Email <Input type="email" name="sp_ll_d" placeholder="…" />
          </Field>

          <h3>spacingWithControl="l"</h3>
          <Field
            as="label"
            flex
            alignY="center"
            spacingWithControl="l"
            style={dotted}
          >
            Email <Input type="email" name="sp_ll_l" placeholder="…" />
          </Field>

          <h3>as="label" — label text right (checkbox)</h3>
          <Field as="label" flex alignY="center" style={dotted}>
            <Input type="checkbox" name="sp_lr_d" /> I agree
          </Field>

          <h3>as="label" — vertical</h3>
          <Field
            as="label"
            flex="y"
            style={{ ...dotted, alignSelf: "flex-start" }}
          >
            Username
            <Input
              type="text"
              name="sp_v_d"
              placeholder="…"
              style={{ width: "160px" }}
            />
          </Field>

          <h3>vertical — spacingWithControl="l"</h3>
          <Field
            as="label"
            flex="y"
            spacingWithControl="l"
            style={{ ...dotted, alignSelf: "flex-start" }}
          >
            Username
            <Input
              type="text"
              name="sp_v_l"
              placeholder="…"
              style={{ width: "160px" }}
            />
          </Field>

          <h3>
            vertical — Label inside Field (interactive zone = label text only)
          </h3>
          <p>
            With <code>as="label"</code> the whole element is the hit area. If
            you want only the label text to be interactive, use a{" "}
            <code>{"<Label>"}</code> inside a container <code>Field</code>. The{" "}
            <code>spacingWithControl</code> then becomes a padding on the label,
            so the space between text and input stays inside the hit area.
          </p>
          <Field
            flex="y"
            spacingWithControl="l"
            style={{ alignSelf: "flex-start" }}
          >
            <Label style={dotted}>Username</Label>
            <Input
              type="text"
              name="sp_cv_l"
              placeholder="…"
              style={{ width: "160px" }}
            />
          </Field>

          <p style={{ marginTop: "16px", fontStyle: "italic" }}>
            For <code>as="label"</code>, <code>spacingWithControl</code> is
            internally a flex gap — <code>spacing</code> is interchangeable and
            wins if both are set.
          </p>
          <p style={{ fontStyle: "italic" }}>
            The container form also works horizontally (
            <code>{"<Field flex><Label /><Input /></Field>"}</code>) but{" "}
            <code>as="label"</code> is simpler in that case — the container
            variant is supported for completeness.
          </p>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 3. Vertical — interactive zone                                       */
      /* ------------------------------------------------------------------ */
      const InteractiveZoneDemo = () => (
        <div class="demo-section" id="vertical-zone">
          <h2>Vertical — interactive zone</h2>
          <p>
            In vertical layout, <code>as="label"</code> makes the entire element
            interactive — including the space next to the label text. To
            restrict the interactive area to the label text only, use a
            container <code>Field</code> with a <code>{"<Label>"}</code> inside.
          </p>

          <Box flex spacing="l" alignY="start">
            <Box flex="y" spacing="xs" alignX="start">
              <h3>as="label" — full area interactive</h3>
              <Field
                as="label"
                flex="y"
                style={{ ...dotted, alignSelf: "flex-start" }}
              >
                Short label text
                <Input
                  type="text"
                  name="wide_input"
                  placeholder="wider than label"
                  style={{ width: "200px" }}
                />
              </Field>
            </Box>

            <Box flex="y" spacing="xs" alignX="start">
              <h3>container Field — label text only</h3>
              <Field flex="y" style={{ alignSelf: "flex-start" }}>
                <Label style={dotted}>Short label text</Label>
                <Input
                  type="text"
                  name="precise_v"
                  placeholder="wider than label"
                  style={{ width: "200px" }}
                />
              </Field>
            </Box>
          </Box>

          <h3>dead zone with gap / margin</h3>
          <p>
            When label and input are spaced using a CSS gap or margin it creates
            a dead zone. It might feel clean but in practice it can be
            frustrating to click close to the label and not have the input
            focus.
          </p>
          <Box
            flex="y"
            style={{
              alignItems: "flex-start",
              alignSelf: "flex-start",
              gap: "8px",
            }}
          >
            <label
              htmlFor="dead_zone_input"
              style={{
                ...dotted,
                cursor: "pointer",
                userSelect: "none",
                display: "block",
              }}
            >
              Short label text
            </label>
            <Input
              id="dead_zone_input"
              type="text"
              name="dead_zone"
              placeholder="wider than label"
              style={{ width: "200px" }}
            />
          </Box>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 4. Advanced layout examples                                          */
      /* ------------------------------------------------------------------ */
      const AdvancedVerticalDemo = () => (
        <div class="demo-section" id="advanced">
          <h2>Advanced layout examples</h2>

          <h3>Icon + label text above input</h3>
          <Field
            flex="y"
            spacingWithControl="s"
            style={{ alignSelf: "flex-start", minWidth: "280px" }}
          >
            <Label
              flex
              alignY="center"
              spacing="xs"
              paddingBottom="s"
              size="l"
              bold
              border="1px dotted gray"
            >
              <Icon height="1cap">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                </svg>
              </Icon>
              Location
            </Label>
            <Input
              type="text"
              name="location"
              placeholder="Enter a location…"
            />
          </Field>

          <h3>Label text left — overflow ellipsis</h3>
          <Box flex="y" width="260">
            <Field as="label" flex alignY="center" style={dotted} paddingY="s">
              <Text expandX maxLines={1}>
                A very long label text that overflows with ellipsis
              </Text>
              <Input type="checkbox" switch selfAlignX="end" />
            </Field>
            <Field as="label" flex alignY="center" style={dotted} paddingY="s">
              <Text expandX maxLines={1}>
                A shorter text
              </Text>
              <Input type="checkbox" switch selfAlignX="end" />
            </Field>
          </Box>

          <h3>Label text right — overflow ellipsis</h3>
          <Box flex="y" width="260">
            <Field as="label" flex alignY="center" style={dotted} paddingY="s">
              <Input type="checkbox" switch />
              <Text expandX maxLines={1}>
                A very long label text that overflows with ellipsis
              </Text>
            </Field>
            <Field as="label" flex alignY="center" style={dotted} paddingY="s">
              <Input type="checkbox" switch />
              <Text expandX maxLines={1}>
                A shorter text
              </Text>
            </Field>
          </Box>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 5. Disabled / read-only                                             */
      /* ------------------------------------------------------------------ */
      const DisabledReadonlyDemo = () => (
        <div class="demo-section" id="states">
          <h2>Disabled &amp; read-only</h2>
          <p>
            The label reflects the control's state automatically — dimmed text
            and default cursor when disabled or read-only.
          </p>
          <Box flex="y" spacing="xs" alignX="start">
            <h3>disabled</h3>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Disabled
              <Input
                type="text"
                name="dis1"
                defaultValue="cannot edit"
                disabled
              />
            </Field>

            <h3>read-only</h3>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Read-only
              <Input type="text" name="ro1" defaultValue="read only" readOnly />
            </Field>

            <h3>disabled (container)</h3>
            <Field flex alignY="center">
              <Label style={dotted}>Disabled</Label>
              <Input
                type="text"
                name="dis2"
                defaultValue="cannot edit"
                disabled
              />
            </Field>

            <h3>read-only (container)</h3>
            <Field flex alignY="center">
              <Label style={dotted}>Read-only</Label>
              <Input type="text" name="ro2" defaultValue="read only" readOnly />
            </Field>
          </Box>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 6. Input with explicit id                                            */
      /* ------------------------------------------------------------------ */
      const ExplicitIdDemo = () => (
        <div class="demo-section" id="explicit-id">
          <h2>Input with explicit id</h2>
          <p>
            When a label wraps an input that has its own <code>id</code>, no{" "}
            <code>htmlFor</code> should be generated — implicit association
            handles the connection. These cases verify that neither{" "}
            <code>{'<Field as="label">'}</code> nor <code>{"<Label>"}</code>{" "}
            used standalone produce a mismatched <code>for</code> attribute.
          </p>

          <h3>as="label" + input with id="my_email"</h3>
          <Field as="label" flex alignY="center" spacing="s" style={dotted}>
            Email
            <Input
              type="email"
              id="my_email"
              name="email_explicit"
              placeholder="Enter email"
            />
          </Field>

          <h3>Label directly wrapping input with id="my_username"</h3>
          <Label flex alignY="center" spacing="s" style={dotted}>
            Username
            <Input
              type="text"
              id="my_username"
              name="username_explicit"
              placeholder="Enter username"
            />
          </Label>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 7. BUG repro: Field as="label" + lazy neighbor                       */
      /* ------------------------------------------------------------------ */
      const LazyNeighbor = lazy(async () => {
        await new Promise((resolve) => setTimeout(resolve, 100));
        return "LazyNeighbor";
      });

      const LazyNeighborDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="lazy-neighbor">
            <h2>
              BUG repro: <code>{'<Field as="label">'}</code> + lazy neighbor
            </h2>
            <p>
              <code>Field as="label"</code> wrapping an <code>Input</code>{" "}
              inside a shared <code>Suspense</code> boundary with a lazy
              neighbor. Type in the input. Expected: <code>uiAction</code>{" "}
              appears in the log on each keystroke.
            </p>

            <Suspense fallback="loading…">
              <Field as="label" flex alignY="center" spacing="s" style={dotted}>
                Name
                <Input
                  type="text"
                  name="lazy_neighbor_name"
                  placeholder="Type here…"
                  uiAction={(v) => {
                    push("uiAction", v);
                  }}
                  action={(v) => {
                    push("action", v);
                  }}
                />
              </Field>

              <LazyNeighbor />
            </Suspense>

            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
