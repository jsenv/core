<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Demo</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 40px 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 32px;
        color: #333;
        font-size: 1.8rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 32px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 8px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.1rem;
        border-bottom: 2px solid #eee;
      }

      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .value-display {
        min-height: 24px;
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }
    </style>
  </head>
  <body>
    <h1>List Demo</h1>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        List,
        ListItem,
        ListItemHeader,
        Input,
        useSearchText,
        Box,
        NaviDebug,
      } from "@jsenv/navi";

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <TableOfContents />
            <DisplayOnlyDemo />
            <SearchableExternalInputDemo />
            <SearchableDemo />
          </NaviDebug>
        );
      };

      const TableOfContents = () => {
        return (
          <div class="demo-section">
            <h2>Table of contents</h2>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#display-only">Display only</a>
              </li>
              <li>
                <a href="#search-external">
                  Search — input outside list (listId)
                </a>
              </li>
              <li>
                <a href="#search-inline">Search — input inside list</a>
              </li>
            </ol>
          </div>
        );
      };

      // ── 1. Display-only list ───────────────────────────────────────────────────

      const FRUITS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
        "Honeydew",
        "Kiwi",
        "Lemon",
        "Mango",
        "Nectarine",
        "Orange",
        "Papaya",
        "Quince",
      ];

      const DisplayOnlyDemo = () => {
        return (
          <div id="display-only" className="demo-section">
            <p>
              By default a <code>List</code> is purely presentational — no hover
              state, no selection, no keyboard navigation. Items render as
              read-only content.
            </p>
            <List>
              {FRUITS.slice(0, 5).map((fruit, i) => (
                <ListItem key={fruit} index={i} id={fruit} value={fruit}>
                  {fruit}
                </ListItem>
              ))}
            </List>
          </div>
        );
      };

      // ── 3b. Searchable list — input outside list (listId) ──────────────────────

      const SearchableExternalInputDemo = () => {
        const [searchText, setSearchText] = useState("");
        const [fruits, getItemMatchInfo] = useSearchText(searchText, FRUITS);
        return (
          <div id="search-external" className="demo-section">
            <p>
              When the input lives outside the list, pass <code>listId</code> on
              the <code>Input</code> pointing to the list's <code>id</code>.
              Keyboard forwarding and ARIA still wire up automatically.
            </p>
            <Box flex="y" spacing="s">
              <Input
                placeholder="Search fruits…"
                expandX
                paddingY="6"
                size="m"
                listId="searchable-fruits-list"
                borderColor="#7c3aed"
                borderRadius="m"
                action={(value) => {
                  setSearchText(value);
                }}
              />
              <List
                borderStyle="solid"
                borderWidth="1"
                borderColor="#7c3aed"
                borderRadius="m"
                id="searchable-fruits-list"
                expandX
              >
                {fruits.map((fruit, i) => {
                  const { match, ranges } = getItemMatchInfo(fruit);
                  return (
                    <ListItem
                      key={fruit}
                      index={i}
                      id={fruit}
                      value={fruit}
                      filtered={!match}
                      highlight={ranges}
                      paddingX="m"
                      paddingY="s"
                    >
                      {fruit}
                    </ListItem>
                  );
                })}
              </List>
            </Box>
          </div>
        );
      };

      // ── 3. Searchable list — input inside list ─────────────────────────────────

      const SearchableDemo = () => {
        const [searchText, setSearchText] = useState("");
        const [fruits, getItemMatchInfo] = useSearchText(searchText, FRUITS);
        return (
          <div id="search-inline" className="demo-section">
            <p>
              Placing an <code>Input</code> inside a <code>ListItemHeader</code>{" "}
              auto-connects it to the list via context. Keyboard events (arrows,
              enter, escape) forward from the input to the list automatically.
            </p>
            <List>
              <ListItemHeader>
                <Input
                  placeholder="Search fruits…"
                  expandX
                  paddingX="10"
                  paddingY="6"
                  size="m"
                  action={(value) => {
                    setSearchText(value);
                  }}
                />
              </ListItemHeader>
              {fruits.map((fruit, i) => {
                const { match, ranges } = getItemMatchInfo(fruit);
                return (
                  <ListItem
                    key={fruit}
                    index={i}
                    id={fruit}
                    value={fruit}
                    filtered={!match}
                    highlight={ranges}
                  >
                    {fruit}
                  </ListItem>
                );
              })}
            </List>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
