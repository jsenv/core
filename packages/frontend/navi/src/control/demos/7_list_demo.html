<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Demo</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 40px 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 32px;
        color: #333;
        font-size: 1.8rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 32px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 8px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.1rem;
        border-bottom: 2px solid #eee;
      }

      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .value-display {
        min-height: 24px;
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }
    </style>
  </head>
  <body>
    <h1>List Demo</h1>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        List,
        ListItem,
        ListItemGroup,
        ListItemHeader,
        Input,
        Text,
        useSearchText,
        Box,
        NaviDebug,
      } from "@jsenv/navi";

      // 200 auto-generated items
      const LARGE_LIST = Array.from({ length: 200 }, (_, i) => {
        const names = [
          "Alpha",
          "Beta",
          "Gamma",
          "Delta",
          "Epsilon",
          "Zeta",
          "Eta",
          "Theta",
          "Iota",
          "Kappa",
          "Lambda",
          "Mu",
          "Nu",
          "Xi",
          "Omicron",
          "Pi",
          "Rho",
          "Sigma",
          "Tau",
          "Upsilon",
        ];
        return `${names[i % names.length]}-${String(Math.floor(i / names.length) + 1).padStart(2, "0")}`;
      });

      const SUGGESTION_BG = "light-dark(#f0f4ff, #1a2040)";

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <TableOfContents />
            <DisplayOnlyDemo />
            <WidthDemo />
            <SearchableExternalInputDemo />
            <SearchableDemo />
            <GroupedSearchDemo />
            <ListItemGroupDemo />
            <SplitMatchDemo />
          </NaviDebug>
        );
      };

      const TableOfContents = () => {
        return (
          <div class="demo-section">
            <h2>Table of contents</h2>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#display-only">Display only</a>
              </li>
              <li>
                <a href="#width">Width behaviour</a>
              </li>
              <li>
                <a href="#search-external">
                  Search — input outside list (listId)
                </a>
              </li>
              <li>
                <a href="#search-inline">Search — input inside list</a>
              </li>
              <li>
                <a href="#large-list">Search — many items, grouped by letter</a>
              </li>
              <li>
                <a href="#grouped">Grouped suggestions</a>
              </li>
              <li>
                <a href="#split-match">Split matches / non-matches</a>
              </li>
            </ol>
          </div>
        );
      };

      // ── 1. Display-only list ───────────────────────────────────────────────────

      const FRUITS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
        "Honeydew",
        "Kiwi",
        "Lemon",
        "Mango",
        "Nectarine",
        "Orange",
        "Papaya",
        "Quince",
      ];

      const DisplayOnlyDemo = () => {
        return (
          <div id="display-only" className="demo-section">
            <p>
              By default a <code>List</code> is purely presentational — no hover
              state, no selection, no keyboard navigation. Items render as
              read-only content.
            </p>
            <List>
              {FRUITS.slice(0, 5).map((fruit, i) => (
                <ListItem key={fruit} index={i} id={fruit} value={fruit}>
                  {fruit}
                </ListItem>
              ))}
            </List>
          </div>
        );
      };
      // ── 2. Width behaviour ─────────────────────────────────────────────────────

      const SENTENCE =
        "This sentence is long enough to overflow and will wrap onto the next line.";
      const URL =
        "https://example.com/some/very/deep/path/to/a/resource?with=query&params=here";

      const WidthDemo = () => {
        return (
          <div id="width" className="demo-section">
            <h2>Width behaviour</h2>
            <p>
              The list is naturally as wide as its widest item. Use{" "}
              <code>expandX</code> to make it fill its parent instead. Items
              wrap long text by default; add <code>noWrap</code> +{" "}
              <code>overflowEllipsis</code> to truncate to a single line.
            </p>

            {/* ── Without expandX ── */}
            <strong
              style={{
                fontSize: "0.85rem",
                color: "#555",
                display: "block",
                marginBottom: "8px",
              }}
            >
              Without expandX
            </strong>
            <Box flex="y" spacing="l" alignX="start" marginBottom="24">
              <Box flex="y" spacing="xs" style={{ alignItems: "flex-start" }}>
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  Natural width
                </strong>
                <List>
                  <ListItem
                    index={0}
                    style={{ backgroundColor: "light-dark(#dbeafe, #1e3a5f)" }}
                  >
                    Short
                  </ListItem>
                  <ListItem
                    index={1}
                    style={{ backgroundColor: "light-dark(#dcfce7, #14532d)" }}
                  >
                    A somewhat longer item
                  </ListItem>
                </List>
              </Box>
              <Box flex="y" spacing="xs" style={{ alignItems: "flex-start" }}>
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  Wraps by default
                </strong>
                <List>
                  <ListItem
                    index={0}
                    style={{ backgroundColor: "light-dark(#dcfce7, #14532d)" }}
                  >
                    {SENTENCE}
                  </ListItem>
                  <ListItem
                    index={1}
                    style={{ backgroundColor: "light-dark(#fef9c3, #422006)" }}
                  >
                    {URL}
                  </ListItem>
                </List>
              </Box>
              <Box flex="y" spacing="xs" style={{ alignItems: "flex-start" }}>
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  noWrap + overflowEllipsis
                </strong>
                <List>
                  <ListItem
                    index={0}
                    noWrap
                    overflowEllipsis
                    style={{ backgroundColor: "light-dark(#dcfce7, #14532d)" }}
                  >
                    {SENTENCE}
                  </ListItem>
                  <ListItem
                    index={1}
                    noWrap
                    overflowEllipsis
                    style={{ backgroundColor: "light-dark(#fef9c3, #422006)" }}
                  >
                    {URL}
                  </ListItem>
                </List>
              </Box>
            </Box>

            {/* ── With expandX ── */}
            <strong
              style={{
                fontSize: "0.85rem",
                color: "#555",
                display: "block",
                marginBottom: "8px",
              }}
            >
              With expandX
            </strong>
            <Box flex="y" spacing="l" alignX="start">
              <Box flex="y" spacing="xs" expandX>
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  Natural width
                </strong>
                <List expandX>
                  <ListItem
                    index={0}
                    style={{ backgroundColor: "light-dark(#dbeafe, #1e3a5f)" }}
                  >
                    Short
                  </ListItem>
                  <ListItem
                    index={1}
                    style={{ backgroundColor: "light-dark(#dcfce7, #14532d)" }}
                  >
                    A somewhat longer item
                  </ListItem>
                </List>
              </Box>
              <Box flex="y" spacing="xs" expandX>
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  Wraps by default
                </strong>
                <List expandX>
                  <ListItem
                    index={0}
                    style={{ backgroundColor: "light-dark(#dcfce7, #14532d)" }}
                  >
                    {SENTENCE}
                  </ListItem>
                  <ListItem
                    index={1}
                    style={{ backgroundColor: "light-dark(#fef9c3, #422006)" }}
                  >
                    {URL}
                  </ListItem>
                </List>
              </Box>
              <Box flex="y" spacing="xs" expandX>
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  noWrap + overflowEllipsis
                </strong>
                <List expandX>
                  <ListItem
                    index={0}
                    noWrap
                    overflowEllipsis
                    style={{ backgroundColor: "light-dark(#dcfce7, #14532d)" }}
                  >
                    {SENTENCE}
                  </ListItem>
                  <ListItem
                    index={1}
                    noWrap
                    overflowEllipsis
                    style={{ backgroundColor: "light-dark(#fef9c3, #422006)" }}
                  >
                    {URL}
                  </ListItem>
                </List>
              </Box>
            </Box>
          </div>
        );
      };
      // ── 3b. Searchable list — input outside list (listId) ──────────────────────

      const SearchableExternalInputDemo = () => {
        const [searchText, setSearchText] = useState("");
        const [fruits, getItemMatchInfo] = useSearchText(searchText, FRUITS);
        return (
          <div id="search-external" className="demo-section">
            <p>
              When the input lives outside the list, pass <code>listId</code> on
              the <code>Input</code> pointing to the list's <code>id</code>.
              Keyboard forwarding and ARIA still wire up automatically.
            </p>
            <Box flex="y" spacing="s">
              <Input
                placeholder="Search fruits…"
                expandX
                paddingY="6"
                size="m"
                listId="searchable-fruits-list"
                borderColor="#7c3aed"
                borderRadius="m"
                action={(value) => {
                  setSearchText(value);
                }}
              />
              <List
                borderStyle="solid"
                borderWidth="1"
                borderColor="#7c3aed"
                borderRadius="m"
                id="searchable-fruits-list"
                expandX
              >
                {fruits.map((fruit, i) => {
                  const { match, ranges } = getItemMatchInfo(fruit);
                  return (
                    <ListItem
                      key={fruit}
                      index={i}
                      id={fruit}
                      value={fruit}
                      filtered={!match}
                      highlight={ranges}
                      paddingX="m"
                      paddingY="s"
                    >
                      {fruit}
                    </ListItem>
                  );
                })}
              </List>
            </Box>
          </div>
        );
      };

      // ── 3. Searchable list — input inside list ─────────────────────────────────

      const SearchableDemo = () => {
        const [searchText, setSearchText] = useState("");
        const [fruits, getItemMatchInfo] = useSearchText(searchText, FRUITS);
        return (
          <div id="search-inline" className="demo-section">
            <p>
              Placing an <code>Input</code> inside a <code>ListItemHeader</code>{" "}
              auto-connects it to the list via context. Keyboard events (arrows,
              enter, escape) forward from the input to the list automatically.
            </p>

            <Input
              placeholder="Search fruits…"
              paddingX="10"
              paddingY="6"
              size="m"
              action={(value) => {
                setSearchText(value);
              }}
            />

            <List>
              {fruits.map((fruit, i) => {
                const { match, ranges } = getItemMatchInfo(fruit);
                return (
                  <ListItem
                    key={fruit}
                    index={i}
                    id={fruit}
                    value={fruit}
                    filtered={!match}
                    highlight={ranges}
                  >
                    {fruit}
                  </ListItem>
                );
              })}
            </List>
          </div>
        );
      };

      // ── 4. Search — many items, grouped by letter ────────────────────────────

      const GroupedSearchDemo = () => {
        const [filter, setFilter] = useState("");
        const [sorted, getItemMatchInfo] = useSearchText(filter, LARGE_LIST);

        const groupMap = new Map();
        for (const item of sorted) {
          const letter = item[0].toUpperCase();
          if (!groupMap.has(letter)) {
            groupMap.set(letter, []);
          }
          groupMap.get(letter).push(item);
        }
        const groups = [...groupMap.entries()].map(([letter, items]) => ({
          letter,
          items,
        }));

        const matchCount = sorted.filter(
          (item) => getItemMatchInfo(item).match,
        ).length;

        return (
          <Box id="large-list" className="demo-section">
            <h2>Search — many items, grouped by letter</h2>
            <p>
              Matching items rise to the top, grouped by initial letter. All
              items remain visible.
            </p>
            <Input
              type="search"
              placeholder="Search…"
              value={filter}
              uiAction={(v) => {
                setFilter(v);
              }}
              expandX
              border="1px solid #ccc"
              borderRadius="6px"
              padding="8"
              marginBottom="s"
              size="1rem"
            />
            {filter && (
              <div
                style={{
                  marginBottom: "8px",
                  fontSize: "0.85rem",
                  color: "#555",
                }}
              >
                {matchCount} match{matchCount !== 1 ? "es" : ""} out of{" "}
                {LARGE_LIST.length}
              </div>
            )}
            <List fallback="No results" style={{ maxHeight: "280px" }}>
              {(() => {
                let globalIndex = 0;
                return groups.map((group) => (
                  <ListItemGroup key={group.letter} label={group.letter}>
                    {group.items.map((item) => {
                      const i = globalIndex++;
                      const { ranges } = getItemMatchInfo(item);
                      return (
                        <ListItem
                          key={item}
                          index={i}
                          highlight={ranges}
                          style={{ backgroundColor: SUGGESTION_BG }}
                        >
                          {item}
                        </ListItem>
                      );
                    })}
                  </ListItemGroup>
                ));
              })()}
            </List>
          </Box>
        );
      };

      // ── 5. Grouped suggestions with ListItemGroup ──────────────────────────────

      const GROUPED_ITEMS = [
        {
          label: (
            <Text background="red" flex expand padding="s">
              Fruits
            </Text>
          ),
          items: ["Apple", "Banana", "Cherry", "Mango", "Strawberry"],
        },
        {
          label: (
            <Text background="green" flex expand padding="s">
              Vegetables
            </Text>
          ),
          items: ["Broccoli", "Carrot", "Cucumber", "Spinach", "Tomato"],
        },
        {
          label: "Grains",
          items: ["Barley", "Oats", "Quinoa", "Rice", "Wheat"],
        },
      ];

      const ListItemGroupDemo = () => {
        return (
          <div id="grouped" className="demo-section">
            <h2>Grouped suggestions</h2>
            <p>Options organized into labeled groups using ListItemGroup.</p>
            <List fallback="No results" style={{ maxHeight: "280px" }} expandX>
              <ListItem index={0}>
                A very large suggestion to test how it behaves when the text is
                very large and exceeds the width of the list. It should be
                visible
              </ListItem>
              {(() => {
                let globalIndex = 1;
                return GROUPED_ITEMS.map((group) => (
                  <ListItemGroup key={group.label} label={group.label}>
                    {group.items.map((item) => {
                      const i = globalIndex++;
                      return (
                        <ListItem
                          key={item}
                          index={i}
                          style={{ backgroundColor: SUGGESTION_BG }}
                        >
                          {item}
                        </ListItem>
                      );
                    })}
                  </ListItemGroup>
                ));
              })()}
            </List>
          </div>
        );
      };

      // ── 6. Split matches / non-matches ────────────────────────────────────────

      const SplitMatchDemo = () => {
        const [filter, setFilter] = useState("");
        const [orderedItems, getItemMatchInfo] = useSearchText(
          filter,
          LARGE_LIST,
        );
        const matches = orderedItems.filter(
          (item) => getItemMatchInfo(item).match,
        );
        const nonMatches = orderedItems.filter(
          (item) => !getItemMatchInfo(item).match,
        );

        return (
          <div id="split-match" className="demo-section">
            <h2>Split matches / non-matches</h2>
            <p>
              Matching items and non-matching items are shown in separate
              groups, each with a count. When the search is empty, all items are
              shown as matches.
            </p>
            <input
              type="search"
              placeholder="Search…"
              value={filter}
              onInput={(e) => {
                setFilter(e.target.value);
              }}
              style={{
                display: "block",
                width: "100%",
                boxSizing: "border-box",
                marginBottom: "8px",
                padding: "8px 12px",
                border: "1px solid #ccc",
                borderRadius: "6px",
                fontSize: "1rem",
              }}
            />
            <List fallback="No results" style={{ maxHeight: "300px" }}>
              <ListItemGroup
                style={{ backgroundColor: "#f0faf3" }}
                label={
                  <Box
                    className="navi_suggestion_group_label"
                    style={{
                      color: "#1a6b2f",
                      backgroundColor: "#e6f4ea",
                      padding: "6px 12px 4px",
                    }}
                  >
                    Matches ({matches.length})
                  </Box>
                }
              >
                {matches.map((item, i) => {
                  const { ranges } = getItemMatchInfo(item);
                  return (
                    <ListItem
                      key={item}
                      index={i}
                      highlight={ranges}
                      style={{ backgroundColor: SUGGESTION_BG }}
                    >
                      {item}
                    </ListItem>
                  );
                })}
              </ListItemGroup>
              {nonMatches.length > 0 && (
                <ListItemGroup
                  style={{ backgroundColor: "#fef8f0" }}
                  label={
                    <Box
                      className="navi_suggestion_group_label"
                      style={{
                        color: "#7a3a00",
                        backgroundColor: "#fdf0e0",
                        padding: "6px 12px 4px",
                      }}
                    >
                      No match ({nonMatches.length})
                    </Box>
                  }
                >
                  {nonMatches.map((item, i) => (
                    <ListItem
                      key={item}
                      index={matches.length + i}
                      style={{ backgroundColor: SUGGESTION_BG }}
                    >
                      {item}
                    </ListItem>
                  ))}
                </ListItemGroup>
              )}
            </List>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
