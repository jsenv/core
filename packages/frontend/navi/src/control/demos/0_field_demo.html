<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Demo</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Box, Field, Input, Label } from "@jsenv/navi";

      const dotted = { outline: "1px dotted #999" };

      const App = () => (
        <Box
          flex="y"
          spacing="m"
          style={{ padding: "20px", maxWidth: "620px" }}
        >
          <h1 style={{ margin: 0 }}>Field</h1>
          <p style={{ margin: 0, color: "#555" }}>
            <code>Field</code> connects a label to a form control so clicking
            the label focuses or activates the control. The dotted outline shows
            the interactive zone.
          </p>

          <AsLabelDemo />
          <InteractiveZoneDemo />
          <SeparateLabelDemo />
          <SizingDemo />
          <DisabledReadonlyDemo />
        </Box>
      );

      /* ------------------------------------------------------------------ */
      /* 1. Field as="label" — base case                                     */
      /* ------------------------------------------------------------------ */
      const AsLabelDemo = () => (
        <Box flex="y" spacing="s">
          <h2 style={{ margin: 0 }}>
            <code>{'<Field as="label">'}</code>
          </h2>
          <p style={{ margin: 0, color: "#555" }}>
            The <code>{"<label>"}</code> element wraps the control directly. The
            browser connects them automatically — no <code>id</code>/
            <code>htmlFor</code> wiring needed. The whole label area is
            interactive.
          </p>

          <Box flex="y" spacing="xs" alignX="start">
            <span style={{ fontSize: "0.85em", color: "#888" }}>
              label left
            </span>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Email
              <Input type="email" name="email_l" placeholder="Enter email" />
            </Field>

            <span style={{ fontSize: "0.85em", color: "#888" }}>
              label right (checkbox / radio)
            </span>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              <Input type="checkbox" name="agree" />I agree to the terms
            </Field>

            <span style={{ fontSize: "0.85em", color: "#888" }}>
              label above (vertical)
            </span>
            <Field
              as="label"
              vertical
              spacing="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              Username
              <Input type="text" name="uv_above" placeholder="Enter username" />
            </Field>

            <span style={{ fontSize: "0.85em", color: "#888" }}>
              label below (vertical)
            </span>
            <Field
              as="label"
              vertical
              spacing="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              <Input type="text" name="uv_below" placeholder="Enter username" />
              Username
            </Field>
          </Box>
        </Box>
      );

      /* ------------------------------------------------------------------ */
      /* 2. Vertical interactive zone                                        */
      /* ------------------------------------------------------------------ */
      const InteractiveZoneDemo = () => (
        <Box flex="y" spacing="s">
          <h2 style={{ margin: 0 }}>Vertical — interactive zone</h2>
          <p style={{ margin: 0, color: "#555" }}>
            In vertical layout the interactive zone stretches to the width of
            the widest child. The space next to the label text is also clickable
            — which can surprise. Use <code>{"<Field>"}</code> with a{" "}
            <code>{"<Label>"}</code> inside to limit the hit area to the label
            text only. The <code>paddingWithControl</code> gap stays clickable
            (unlike a flex <code>gap</code> which would be a dead zone).
          </p>

          <Box flex="y" spacing="xs" alignX="start">
            <span style={{ fontSize: "0.85em", color: "#888" }}>
              vertical — label area only
            </span>
            <Field
              vertical
              paddingWithControl="s"
              style={{ alignSelf: "flex-start" }}
            >
              <Label style={dotted}>Short label</Label>
              <Input
                type="text"
                name="precise_v"
                placeholder="wider than the label text"
                style={{ width: "220px" }}
              />
            </Field>

            <span style={{ fontSize: "0.85em", color: "#888" }}>
              horizontal — gap between label and input is clickable
            </span>
            <Field flex alignY="center" paddingWithControl="l">
              <Label style={dotted}>Label</Label>
              <Input type="text" name="precise_h" placeholder="…" />
            </Field>
          </Box>
        </Box>
      );

      /* ------------------------------------------------------------------ */
      /* 3. Label in a separate component — explicit htmlFor                 */
      /* ------------------------------------------------------------------ */
      const SeparateLabelDemo = () => (
        <Box flex="y" spacing="s">
          <h2 style={{ margin: 0 }}>Label in a separate component</h2>
          <p style={{ margin: 0, color: "#555" }}>
            When the label cannot wrap the input — for instance the input is in
            a child component loaded separately — pass an explicit{" "}
            <code>htmlFor</code> to <code>{'<Field as="label">'}</code>. The
            inner control will receive the matching <code>id</code> via context
            so the wiring stays automatic.
          </p>

          <Box flex="y" alignX="start">
            <Field
              as="label"
              flex
              alignY="center"
              spacing="s"
              style={dotted}
              htmlFor="my_separate_input"
            >
              Password
            </Field>
            {/* The input lives elsewhere, receives id="my_separate_input" from context */}
            <SeparateInput />
          </Box>
        </Box>
      );

      const SeparateInput = () => (
        <Input
          id="my_separate_input"
          type="password"
          name="password_sep"
          placeholder="separate component"
        />
      );

      /* ------------------------------------------------------------------ */
      /* 4. Sizing                                                            */
      /* ------------------------------------------------------------------ */
      const SizingDemo = () => (
        <Box flex="y" spacing="s">
          <h2 style={{ margin: 0 }}>Sizing</h2>
          <Box flex="y" spacing="s">
            <Box flex="y" spacing="xs">
              <span style={{ fontSize: "0.85em", color: "#888" }}>
                flex + block
              </span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow block>Short label</FieldRow>
                <FieldRow block>A much longer label text</FieldRow>
                <FieldRow block>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <span style={{ fontSize: "0.85em", color: "#888" }}>
                flex + width 100%
              </span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow width="100%">Short label</FieldRow>
                <FieldRow width="100%">A much longer label text</FieldRow>
                <FieldRow width="100%">
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <span style={{ fontSize: "0.85em", color: "#888" }}>
                flex only
              </span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow>Short label</FieldRow>
                <FieldRow>A much longer label text</FieldRow>
                <FieldRow>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <span style={{ fontSize: "0.85em", color: "#888" }}>
                flex + expandX
              </span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow expandX>Short label</FieldRow>
                <FieldRow expandX>A much longer label text</FieldRow>
                <FieldRow expandX>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>
          </Box>
        </Box>
      );

      const FieldRow = ({ children, ...props }) => (
        <Field flex alignY="center" {...props}>
          <Label expandX style={dotted} maxLines={1} noWrap>
            {children}
          </Label>
          <Input type="checkbox" switch selfAlignX="end" size="xs" />
        </Field>
      );

      /* ------------------------------------------------------------------ */
      /* 5. Disabled / read-only                                             */
      /* ------------------------------------------------------------------ */
      const DisabledReadonlyDemo = () => (
        <Box flex="y" spacing="s">
          <h2 style={{ margin: 0 }}>Disabled &amp; read-only</h2>
          <p style={{ margin: 0, color: "#555" }}>
            The label reflects the control's state automatically — dimmed text
            and default cursor when disabled or read-only.
          </p>
          <Box flex="y" spacing="xs" alignX="start">
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Disabled
              <Input
                type="text"
                name="dis1"
                defaultValue="cannot edit"
                disabled
              />
            </Field>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Read-only
              <Input type="text" name="ro1" defaultValue="read only" readOnly />
            </Field>
            <Field flex alignY="center">
              <Label style={dotted}>Disabled (container)</Label>
              <Input
                type="text"
                name="dis2"
                defaultValue="cannot edit"
                disabled
              />
            </Field>
            <Field flex alignY="center">
              <Label style={dotted}>Read-only (container)</Label>
              <Input type="text" name="ro2" defaultValue="read only" readOnly />
            </Field>
          </Box>
        </Box>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
