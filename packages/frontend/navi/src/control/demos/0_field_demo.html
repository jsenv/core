<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Demo</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Box, Field, Input, Label, Text } from "@jsenv/navi";

      const labelDotted = { border: "1px dotted #999" };

      const App = () => {
        return (
          <Box
            flex="y"
            spacing="m"
            style={{ padding: "20px", maxWidth: "600px" }}
          >
            <h1>Field</h1>
            <p style={{ margin: 0, color: "#555" }}>
              <code>Field</code> connects a label to a form control. The dotted
              border shows the label's clickable area.
            </p>
            <TableOfContents />
            <FieldAsContainerDemo />
            <FieldAsLabelDemo />
            <DisabledDemo />
            <ReadOnlyDemo />
            <SizingDemo />
            <VerticalDemo />
          </Box>
        );
      };

      const TableOfContents = () => (
        <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
          <li>
            <a href="#container">Field as container — auto-wired via generated id</a>
          </li>
          <li>
            <a href="#as-label">Field as label — implicit association (no htmlFor)</a>
          </li>
          <li>
            <a href="#disabled">Disabled</a>
          </li>
          <li>
            <a href="#readonly">Read-only</a>
          </li>
          <li>
            <a href="#sizing">Sizing</a>
          </li>
          <li>
            <a href="#vertical">Vertical (label above)</a>
          </li>
        </ol>
      );

      // Field as a container: generates a controlId shared by the first Label (as htmlFor)
      // and the first control (as id). No manual wiring needed.
      const FieldAsContainerDemo = () => (
        <Box flex="y" spacing="s" alignX="start" id="container">
          <h2 style={{ margin: 0 }}>Field as container (auto-wired)</h2>
          <p style={{ margin: 0, fontSize: "0.85em", color: "#555" }}>
            <code>{"<Field>"}</code> auto-generates a shared id. The{" "}
            <code>{"<Label>"}</code> uses it as <code>htmlFor</code> and the
            input uses it as its <code>id</code> — clicking the label focuses
            the input.
          </p>
          <Field flex alignY="center">
            <Label style={labelDotted}>Username</Label>
            <Input type="text" name="username" placeholder="Enter username" />
          </Field>
          <Field flex alignY="center">
            <Label style={labelDotted}>Email</Label>
            <Input type="email" name="email" placeholder="Enter email" />
          </Field>
        </Box>
      );

      // Field as a label: the <label> element wraps the control directly (implicit
      // HTML association). No htmlFor needed — and none should be generated.
      //
      // With explicit htmlFor: the label's for= points to the given id, and the
      // control inside gets that id via ControlIdContext (explicit association).
      const FieldAsLabelDemo = () => (
        <Box flex="y" spacing="s" alignX="start" id="as-label">
          <h2 style={{ margin: 0 }}>Field as label</h2>

          <Box flex="y" spacing="xs" alignX="start">
            <strong style={{ fontSize: "0.9em" }}>
              Without <code>htmlFor</code> — implicit association (label wraps
              input)
            </strong>
            <p style={{ margin: 0, fontSize: "0.85em", color: "#555" }}>
              The <code>{"<label>"}</code> element wraps the input so no{" "}
              <code>for</code> attribute is needed. Click the label text to focus
              the input.
            </p>
            <Field
              as="label"
              flex
              alignY="center"
              spacing="s"
              style={labelDotted}
            >
              Email
              <Input type="email" name="email_implicit" placeholder="Enter email" />
            </Field>
            <Field
              as="label"
              flex
              alignY="center"
              spacing="s"
              style={labelDotted}
              vertical
            >
              Username (vertical)
              <Input
                type="text"
                name="username_implicit"
                placeholder="Enter username"
              />
            </Field>
          </Box>

          <Box flex="y" spacing="xs" alignX="start">
            <strong style={{ fontSize: "0.9em" }}>
              With explicit <code>htmlFor</code> — explicit association
            </strong>
            <p style={{ margin: 0, fontSize: "0.85em", color: "#555" }}>
              When <code>htmlFor</code> is provided, the label gets a{" "}
              <code>for=</code> attribute and the inner control gets the
              matching <code>id</code> via context.
            </p>
            <Field
              as="label"
              flex
              alignY="center"
              spacing="s"
              style={labelDotted}
              htmlFor="my_explicit_input"
            >
              Password
              <Input
                type="password"
                name="password_explicit"
                placeholder="Enter password"
              />
            </Field>
          </Box>
        </Box>
      );

      const DisabledDemo = () => (
        <Box flex="y" spacing="s" id="disabled">
          <h2 style={{ margin: 0 }}>Disabled</h2>
          <p style={{ margin: 0, fontSize: "0.85em", color: "#555" }}>
            The label dims automatically when the input is disabled.
          </p>
          <Field flex alignY="center">
            <Label style={labelDotted}>Username (container)</Label>
            <Input
              type="text"
              name="username_disabled"
              defaultValue="john_doe"
              disabled
            />
          </Field>
          <Field
            as="label"
            flex
            alignY="center"
            spacing="s"
            style={labelDotted}
          >
            Username (as label)
            <Input
              type="text"
              name="username_disabled_aslabel"
              defaultValue="john_doe"
              disabled
            />
          </Field>
        </Box>
      );

      const ReadOnlyDemo = () => (
        <Box flex="y" spacing="s" id="readonly">
          <h2 style={{ margin: 0 }}>Read-only</h2>
          <p style={{ margin: 0, fontSize: "0.85em", color: "#555" }}>
            The label dims automatically when the input is read-only.
          </p>
          <Field flex alignY="center" spacing="s">
            <Label style={labelDotted}>Username (container)</Label>
            <Input
              type="text"
              name="username_readonly"
              defaultValue="john_doe"
              readOnly
            />
          </Field>
          <Field
            as="label"
            flex
            alignY="center"
            spacing="s"
            style={labelDotted}
          >
            Username (as label)
            <Input
              type="text"
              name="username_readonly_aslabel"
              defaultValue="john_doe"
              readOnly
            />
          </Field>
        </Box>
      );

      const SizingDemo = () => (
        <Box flex="y" spacing="s" id="sizing">
          <h2 style={{ margin: 0 }}>Sizing</h2>
          <Box flex="y" spacing="s">
            <Box flex="y" spacing="xs">
              <span>flex + block</span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow block>Short label</FieldRow>
                <FieldRow block>A much longer label text</FieldRow>
                <FieldRow block>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <span>flex + width 100%</span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow width="100%">Short label</FieldRow>
                <FieldRow width="100%">A much longer label text</FieldRow>
                <FieldRow width="100%">
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <span>flex only</span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow>Short label</FieldRow>
                <FieldRow>A much longer label text</FieldRow>
                <FieldRow>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <span>flex + expandX</span>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow expandX>Short label</FieldRow>
                <FieldRow expandX>A much longer label text</FieldRow>
                <FieldRow expandX>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>
          </Box>
        </Box>
      );

      const VerticalDemo = () => (
        <Box flex="y" spacing="s" id="vertical">
          <h2 style={{ margin: 0 }}>Vertical (label above or below)</h2>
          <Field vertical>
            <Label style={labelDotted}>Username</Label>
            <Input type="text" name="username_v" placeholder="Enter username" />
          </Field>
          <Field vertical>
            <Input type="email" name="email_v" placeholder="Enter email" />
            <Label style={labelDotted}>Email</Label>
          </Field>
          <Field as="label" vertical style={labelDotted}>
            Username (as label, vertical)
            <Input
              type="text"
              name="username_v_aslabel"
              placeholder="Enter username"
            />
          </Field>
        </Box>
      );

      const FieldRow = ({ children, ...props }) => (
        <Field flex alignY="center" {...props}>
          <Label expandX style={labelDotted} maxLines={1} noWrap>
            {children}
          </Label>
          <Input type="checkbox" switch selfAlignX="end" size="xs" />
        </Field>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
