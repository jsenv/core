<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Demo</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }
      h1 {
        margin: 0 0 8px;
        color: #333;
        font-size: 2rem;
      }
      .demo-section {
        margin-bottom: 32px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .demo-section h2 {
        margin: 0 0 16px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.3rem;
        border-bottom: 2px solid #eee;
      }
      .demo-section p {
        margin: 0 0 14px;
        color: #555;
        font-size: 0.875rem;
        line-height: 1.5;
      }
      h3 {
        margin: 20px 0 4px;
        color: #666;
        font-weight: 600;
        font-size: 0.85rem;
      }
      h3:first-child {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Box, Field, Icon, Input, Label } from "@jsenv/navi";

      const dotted = { outline: "1px dotted #999" };

      const App = () => (
        <Box flex="y" spacing="m">
          <h1>Field</h1>
          <p style={{ margin: 0, color: "#555" }}>
            <code>Field</code> connects a label to a form control so clicking
            the label focuses or activates the control. The dotted outline shows
            the interactive zone.
          </p>

          <nav>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: 2 }}>
              <li>
                <a href="#as-label">Field as="label"</a>
              </li>
              <li>
                <a href="#vertical-zone">Vertical — interactive zone</a>
              </li>
              <li>
                <a href="#advanced-vertical">Advanced vertical label</a>
              </li>
              <li>
                <a href="#sizing">Sizing</a>
              </li>
              <li>
                <a href="#states">Disabled &amp; read-only</a>
              </li>
              <li>
                <a href="#explicit-id">Input with explicit id</a>
              </li>
            </ol>
          </nav>

          <AsLabelDemo />
          <InteractiveZoneDemo />
          <AdvancedVerticalDemo />
          <SizingDemo />
          <DisabledReadonlyDemo />
          <ExplicitIdDemo />
        </Box>
      );

      /* ------------------------------------------------------------------ */
      /* 1. Field as="label"                                                  */
      /* ------------------------------------------------------------------ */
      const AsLabelDemo = () => (
        <div class="demo-section" id="as-label">
          <h2>
            <code>{'<Field as="label">'}</code>
          </h2>
          <p>
            The <code>{"<label>"}</code> element wraps the control directly. The
            browser connects them automatically — no <code>id</code>/
            <code>htmlFor</code> wiring needed. The whole label area is
            interactive.
          </p>

          <Box flex="y" spacing="s" alignX="start">
            <h3>label left</h3>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Email
              <Input type="email" name="email_l" placeholder="Enter email" />
            </Field>

            <h3>label right (checkbox / radio)</h3>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              <Input type="checkbox" name="agree" />I agree to the terms
            </Field>

            <h3>label above (vertical)</h3>
            <Field
              as="label"
              vertical
              spacing="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              Username
              <Input type="text" name="uv_above" placeholder="Enter username" />
            </Field>

            <h3>label below (vertical)</h3>
            <Field
              as="label"
              vertical
              spacing="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              <Input type="text" name="uv_below" placeholder="Enter username" />
              Username
            </Field>
          </Box>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 2. Vertical — interactive zone                                       */
      /* ------------------------------------------------------------------ */
      const InteractiveZoneDemo = () => (
        <div class="demo-section" id="vertical-zone">
          <h2>Vertical — interactive zone</h2>
          <p>
            In vertical layout the interactive zone stretches to the width of
            the widest child. When the input is wider than the label text, the
            space next to the label is also clickable — which can surprise.
          </p>

          <Box flex="y" spacing="s" alignX="start">
            <h3>
              as="label" — full width interactive (try clicking next to the
              label text)
            </h3>
            <Field
              as="label"
              vertical
              spacing="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              Short label
              <Input
                type="text"
                name="wide_input"
                placeholder="wider than the label text"
                style={{ width: "240px" }}
              />
            </Field>

            <h3>without as — only the label text is interactive</h3>
            <Field
              vertical
              paddingWithControl="s"
              style={{ alignSelf: "flex-start" }}
            >
              <Label style={dotted}>Short label</Label>
              <Input
                type="text"
                name="precise_v"
                placeholder="wider than the label text"
                style={{ width: "240px" }}
              />
            </Field>
          </Box>

          <p>
            <code>paddingWithControl</code> controls the spacing between the
            label and the control. Because the spacing is a padding on the label
            element, clicking in it still activates the control. With a flex{" "}
            <code>gap</code> the space between them is outside the label and
            does nothing.
          </p>

          <Box flex spacing="l" alignY="start">
            <Box flex="y" spacing="xs" alignX="start">
              <h3>paddingWithControl — space is clickable</h3>
              <Field
                vertical
                paddingWithControl="xl"
                style={{ alignSelf: "flex-start" }}
              >
                <Label style={dotted}>Label</Label>
                <Input
                  type="text"
                  name="pad_demo"
                  placeholder="…"
                  style={{ width: "160px" }}
                />
              </Field>
            </Box>

            <Box flex="y" spacing="xs" alignX="start">
              <h3>gap — space is a dead zone</h3>
              <Box
                flex="y"
                style={{ alignSelf: "flex-start", gap: "var(--navi-xl)" }}
              >
                <label
                  htmlFor="gap_demo_input"
                  style={{ ...dotted, cursor: "pointer", userSelect: "none" }}
                >
                  Label
                </label>
                <Input
                  id="gap_demo_input"
                  type="text"
                  name="gap_demo"
                  placeholder="…"
                  style={{ width: "160px" }}
                />
              </Box>
            </Box>
          </Box>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 3. Advanced vertical label                                           */
      /* ------------------------------------------------------------------ */
      const AdvancedVerticalDemo = () => (
        <div class="demo-section" id="advanced-vertical">
          <h2>Advanced vertical label</h2>
          <p>
            Because the label and the control are separate elements, the label
            can use any layout or styling — icon, size, font, spacing — without
            affecting the control's hit area.
          </p>

          <Field
            vertical
            paddingWithControl="s"
            style={{ alignSelf: "flex-start", minWidth: "280px" }}
          >
            <Label
              flex
              alignY="center"
              spacing="xs"
              paddingBottom="s"
              size="l"
              bold
              border="1px dotted gray"
            >
              <Icon height="1cap">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                </svg>
              </Icon>
              Location
            </Label>
            <Input
              type="text"
              name="location"
              placeholder="Enter a location…"
            />
          </Field>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 4. Sizing                                                            */
      /* ------------------------------------------------------------------ */
      const SizingDemo = () => (
        <div class="demo-section" id="sizing">
          <h2>Sizing</h2>
          <Box flex="y" spacing="s">
            <Box flex="y" spacing="xs">
              <h3>flex + block</h3>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow block>Short label</FieldRow>
                <FieldRow block>A much longer label text</FieldRow>
                <FieldRow block>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <h3>flex + width 100%</h3>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow width="100%">Short label</FieldRow>
                <FieldRow width="100%">A much longer label text</FieldRow>
                <FieldRow width="100%">
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <h3>flex only</h3>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow>Short label</FieldRow>
                <FieldRow>A much longer label text</FieldRow>
                <FieldRow>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <h3>flex + expandX</h3>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow expandX>Short label</FieldRow>
                <FieldRow expandX>A much longer label text</FieldRow>
                <FieldRow expandX>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>
          </Box>
        </div>
      );

      const FieldRow = ({ children, ...props }) => (
        <Field flex alignY="center" {...props}>
          <Label expandX style={dotted} maxLines={1} noWrap>
            {children}
          </Label>
          <Input type="checkbox" switch selfAlignX="end" size="xs" />
        </Field>
      );

      /* ------------------------------------------------------------------ */
      /* 6. Disabled / read-only                                             */
      /* ------------------------------------------------------------------ */
      const DisabledReadonlyDemo = () => (
        <div class="demo-section" id="states">
          <h2>Disabled &amp; read-only</h2>
          <p>
            The label reflects the control's state automatically — dimmed text
            and default cursor when disabled or read-only.
          </p>
          <Box flex="y" spacing="xs" alignX="start">
            <h3>disabled</h3>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Disabled
              <Input
                type="text"
                name="dis1"
                defaultValue="cannot edit"
                disabled
              />
            </Field>

            <h3>read-only</h3>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Read-only
              <Input type="text" name="ro1" defaultValue="read only" readOnly />
            </Field>

            <h3>disabled (container)</h3>
            <Field flex alignY="center">
              <Label style={dotted}>Disabled</Label>
              <Input
                type="text"
                name="dis2"
                defaultValue="cannot edit"
                disabled
              />
            </Field>

            <h3>read-only (container)</h3>
            <Field flex alignY="center">
              <Label style={dotted}>Read-only</Label>
              <Input type="text" name="ro2" defaultValue="read only" readOnly />
            </Field>
          </Box>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 7. Input with explicit id                                            */
      /* ------------------------------------------------------------------ */
      const ExplicitIdDemo = () => (
        <div class="demo-section" id="explicit-id">
          <h2>Input with explicit id</h2>
          <p>
            When a label wraps an input that has its own <code>id</code>, no{" "}
            <code>htmlFor</code> should be generated — implicit association
            handles the connection. These cases verify that neither{" "}
            <code>{"<Field as=\"label\">"}</code> nor <code>{"<Label>"}</code>{" "}
            used standalone produce a mismatched <code>for</code> attribute.
          </p>

          <h3>as="label" + input with id="my_email"</h3>
          <Field as="label" flex alignY="center" spacing="s" style={dotted}>
            Email
            <Input
              type="email"
              id="my_email"
              name="email_explicit"
              placeholder="Enter email"
            />
          </Field>

          <h3>Label directly wrapping input with id="my_username"</h3>
          <Label flex alignY="center" spacing="s" style={dotted}>
            Username
            <Input
              type="text"
              id="my_username"
              name="username_explicit"
              placeholder="Enter username"
            />
          </Label>
        </div>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
