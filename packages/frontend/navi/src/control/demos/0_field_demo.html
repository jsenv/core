<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Demo</title>
    <style>
      body {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
        color: #333;
      }
      .demo-section {
        margin-bottom: 32px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .demo-section h2 {
        margin: 0 0 16px;
        padding-bottom: 10px;
        font-size: 1.3rem;
        color: #333;
        border-bottom: 2px solid #eee;
      }
      .demo-section p {
        margin: 0 0 14px;
        font-size: 0.875rem;
        color: #555;
        line-height: 1.5;
      }
      .row-label {
        font-size: 0.8rem;
        color: #999;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Box, Field, Icon, Input, Label } from "@jsenv/navi";

      const dotted = { outline: "1px dotted #999" };

      const App = () => (
        <Box flex="y" spacing="m">
          <h1>Field</h1>
          <p style={{ margin: 0, color: "#555" }}>
            <code>Field</code> connects a label to a form control so clicking
            the label focuses or activates the control. The dotted outline shows
            the interactive zone.
          </p>

          <nav>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: 2 }}>
              <li><a href="#as-label">Field as="label"</a></li>
              <li><a href="#vertical-zone">Vertical — interactive zone</a></li>
              <li><a href="#advanced-vertical">Advanced vertical label</a></li>
              <li><a href="#separate-label">Label in a separate component</a></li>
              <li><a href="#sizing">Sizing</a></li>
              <li><a href="#states">Disabled &amp; read-only</a></li>
            </ol>
          </nav>

          <AsLabelDemo />
          <InteractiveZoneDemo />
          <AdvancedVerticalDemo />
          <SeparateLabelDemo />
          <SizingDemo />
          <DisabledReadonlyDemo />
        </Box>
      );

      /* ------------------------------------------------------------------ */
      /* 1. Field as="label"                                                  */
      /* ------------------------------------------------------------------ */
      const AsLabelDemo = () => (
        <div class="demo-section" id="as-label">
          <h2>
            <code>{'<Field as="label">'}</code>
          </h2>
          <p>
            The <code>{"<label>"}</code> element wraps the control directly. The
            browser connects them automatically — no <code>id</code>/
            <code>htmlFor</code> wiring needed. The whole label area is
            interactive.
          </p>

          <Box flex="y" spacing="s" alignX="start">
            <p class="row-label">label left</p>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Email
              <Input type="email" name="email_l" placeholder="Enter email" />
            </Field>

            <p class="row-label">label right (checkbox / radio)</p>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              <Input type="checkbox" name="agree" />
              I agree to the terms
            </Field>

            <p class="row-label">label above (vertical)</p>
            <Field
              as="label"
              vertical
              spacing="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              Username
              <Input type="text" name="uv_above" placeholder="Enter username" />
            </Field>

            <p class="row-label">label below (vertical)</p>
            <Field
              as="label"
              vertical
              spacing="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              <Input type="text" name="uv_below" placeholder="Enter username" />
              Username
            </Field>
          </Box>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 2. Vertical — interactive zone                                       */
      /* ------------------------------------------------------------------ */
      const InteractiveZoneDemo = () => (
        <div class="demo-section" id="vertical-zone">
          <h2>Vertical — interactive zone</h2>
          <p>
            In vertical layout the interactive zone stretches to the width of
            the widest child. When the input is wider than the label text, the
            space next to the label is also clickable — which can surprise.
          </p>

          <Box flex="y" spacing="s" alignX="start">
            <p class="row-label">
              as="label" — full width interactive (try clicking next to the
              label text)
            </p>
            <Field
              as="label"
              vertical
              spacing="s"
              style={{ ...dotted, alignSelf: "flex-start" }}
            >
              Short label
              <Input
                type="text"
                name="wide_input"
                placeholder="wider than the label text"
                style={{ width: "240px" }}
              />
            </Field>

            <p class="row-label">
              without as — only the label text is interactive
            </p>
            <Field
              vertical
              paddingWithControl="s"
              style={{ alignSelf: "flex-start" }}
            >
              <Label style={dotted}>Short label</Label>
              <Input
                type="text"
                name="precise_v"
                placeholder="wider than the label text"
                style={{ width: "240px" }}
              />
            </Field>
          </Box>

          <p style={{ marginTop: "14px", marginBottom: 0 }}>
            Without <code>as</code>, <code>{"<Field>"}</code> generates a
            shared id between the <code>{"<Label>"}</code> and the control.
            Use <code>paddingWithControl</code> for the gap — it stays part of
            the label's hit area (unlike a flex <code>gap</code> which creates
            a dead zone).
          </p>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 3. Advanced vertical label                                           */
      /* ------------------------------------------------------------------ */
      const AdvancedVerticalDemo = () => (
        <div class="demo-section" id="advanced-vertical">
          <h2>Advanced vertical label</h2>
          <p>
            Because the label and the control are separate elements, the label
            can use any layout or styling — icon, size, font, spacing — without
            affecting the control's hit area.
          </p>

          <Field vertical paddingWithControl="s" style={{ alignSelf: "flex-start", minWidth: "280px" }}>
            <Label
              flex
              alignY="center"
              spacing="xs"
              paddingBottom="s"
              size="l"
              bold
            >
              <Icon height="1cap">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                </svg>
              </Icon>
              Location
            </Label>
            <Input type="text" name="location" placeholder="Enter a location…" />
          </Field>
        </div>
      );

      /* ------------------------------------------------------------------ */
      /* 4. Label in a separate component                                     */
      /* ------------------------------------------------------------------ */
      const SeparateLabelDemo = () => (
        <div class="demo-section" id="separate-label">
          <h2>Label in a separate component</h2>
          <p>
            When the label cannot wrap the input — the input is in a child
            component loaded lazily, or in a different part of the tree — pass
            an explicit <code>htmlFor</code> to{" "}
            <code>{'<Field as="label">'}</code>. The inner control receives the
            matching <code>id</code> via context.
          </p>

          <Box flex="y" spacing="xs" alignX="start">
            <Field
              as="label"
              flex
              alignY="center"
              spacing="s"
              style={dotted}
              htmlFor="my_separate_input"
            >
              Password
            </Field>
            {/* input lives in a separate component, gets id="my_separate_input" from context */}
            <SeparateInput />
          </Box>
        </div>
      );

      const SeparateInput = () => (
        <Input
          id="my_separate_input"
          type="password"
          name="password_sep"
          placeholder="separate component"
        />
      );

      /* ------------------------------------------------------------------ */
      /* 5. Sizing                                                            */
      /* ------------------------------------------------------------------ */
      const SizingDemo = () => (
        <div class="demo-section" id="sizing">
          <h2>Sizing</h2>
          <Box flex="y" spacing="s">
            <Box flex="y" spacing="xs">
              <p class="row-label">flex + block</p>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow block>Short label</FieldRow>
                <FieldRow block>A much longer label text</FieldRow>
                <FieldRow block>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <p class="row-label">flex + width 100%</p>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow width="100%">Short label</FieldRow>
                <FieldRow width="100%">A much longer label text</FieldRow>
                <FieldRow width="100%">
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <p class="row-label">flex only</p>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow>Short label</FieldRow>
                <FieldRow>A much longer label text</FieldRow>
                <FieldRow>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>

            <Box flex="y" spacing="xs">
              <p class="row-label">flex + expandX</p>
              <div
                style={{
                  width: "200px",
                  background: "rgba(255,200,0,0.3)",
                  padding: "8px",
                }}
              >
                <FieldRow expandX>Short label</FieldRow>
                <FieldRow expandX>A much longer label text</FieldRow>
                <FieldRow expandX>
                  This text is much much longer than the container width
                </FieldRow>
              </div>
            </Box>
          </Box>
        </div>
      );

      const FieldRow = ({ children, ...props }) => (
        <Field flex alignY="center" {...props}>
          <Label expandX style={dotted} maxLines={1} noWrap>
            {children}
          </Label>
          <Input type="checkbox" switch selfAlignX="end" size="xs" />
        </Field>
      );

      /* ------------------------------------------------------------------ */
      /* 6. Disabled / read-only                                             */
      /* ------------------------------------------------------------------ */
      const DisabledReadonlyDemo = () => (
        <div class="demo-section" id="states">
          <h2>Disabled &amp; read-only</h2>
          <p>
            The label reflects the control's state automatically — dimmed text
            and default cursor when disabled or read-only.
          </p>
          <Box flex="y" spacing="xs" alignX="start">
            <p class="row-label">disabled</p>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Disabled
              <Input type="text" name="dis1" defaultValue="cannot edit" disabled />
            </Field>

            <p class="row-label">read-only</p>
            <Field as="label" flex alignY="center" spacing="s" style={dotted}>
              Read-only
              <Input type="text" name="ro1" defaultValue="read only" readOnly />
            </Field>

            <p class="row-label">disabled (container)</p>
            <Field flex alignY="center">
              <Label style={dotted}>Disabled</Label>
              <Input type="text" name="dis2" defaultValue="cannot edit" disabled />
            </Field>

            <p class="row-label">read-only (container)</p>
            <Field flex alignY="center">
              <Label style={dotted}>Read-only</Label>
              <Input type="text" name="ro2" defaultValue="read only" readOnly />
            </Field>
          </Box>
        </div>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
