<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List as listbox Demo</title>
    <style>
      body {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 16px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      .demo-section p {
        margin: 0 0 16px 0;
        color: #555;
        font-size: 0.95rem;
      }

      .value-display {
        min-height: 20px;
        margin-top: 12px;
        padding: 8px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }
    </style>
  </head>
  <body>
    <h1>List as listbox Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useRef } from "preact/hooks";
      import { List, ListItem, Box, useSearchText } from "@jsenv/navi";

      const FRUITS = [
        "Apple",
        "Apricot",
        "Banana",
        "Blueberry",
        "Cherry",
        "Grape",
        "Kiwi",
        "Lemon",
        "Mango",
        "Orange",
        "Peach",
        "Pear",
        "Pineapple",
        "Raspberry",
        "Strawberry",
        "Watermelon",
      ];

      const COUNTRIES = [
        { code: "au", name: "Australia", region: "Oceania" },
        { code: "br", name: "Brazil", region: "South America" },
        { code: "cn", name: "China", region: "Asia" },
        { code: "fr", name: "France", region: "Europe" },
        { code: "de", name: "Germany", region: "Europe" },
        { code: "in", name: "India", region: "Asia" },
        { code: "jp", name: "Japan", region: "Asia" },
        { code: "mx", name: "Mexico", region: "North America" },
        { code: "us", name: "United States", region: "North America" },
        { code: "za", name: "South Africa", region: "Africa" },
      ];

      const App = () => (
        <div>
          <BasicDemo />
          <CustomRenderDemo />
          <ControlledDemo />
          <CustomStyleDemo />
          <SortedDemo />
          <PopoverDemo />
        </div>
      );

      // --- 1. Basic string suggestions ---

      const SUGGESTION_BG = "light-dark(#f0f4ff, #1a2040)";

      const BasicDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>Basic string suggestions</h2>
            <p>
              Click a suggestion or use keyboard (Tab to focus, Arrow keys to
              navigate, Enter to select, Escape to clear active).
            </p>
            <List
              role="listbox"
              fallback="No results"
              style={{ maxHeight: "220px" }}
              uiAction={setSelected}
            >
              {FRUITS.map((fruit, i) => (
                <ListItem
                  role="option"
                  key={fruit}
                  index={i}
                  id={fruit}
                  value={fruit}
                  selected={selected === fruit}
                >
                  {fruit}
                </ListItem>
              ))}
            </List>
            <div className="value-display">{selected ?? ""}</div>
          </div>
        );
      };

      // --- 2. Custom option rendering ---

      const CustomRenderDemo = () => {
        const [selected, setSelected] = useState(null);
        return (
          <div className="demo-section">
            <h2>Custom suggestion content</h2>
            <p>Each suggestion renders the country name + region badge.</p>
            <List
              role="listbox"
              fallback="No results"
              style={{ maxHeight: "220px" }}
              uiAction={setSelected}
            >
              <ListItem
                role="option"
                index={0}
                noWrap
                style={{ backgroundColor: SUGGESTION_BG }}
              >
                A very large suggestion to test how it behaves when the text is
                very large and exceeds the width of the list. It should be
                visible
              </ListItem>
              {COUNTRIES.map((country, i) => (
                <ListItem
                  role="option"
                  key={country.code}
                  index={i + 1}
                  value={country.code}
                  selected={selected === country.code}
                  style={{ backgroundColor: SUGGESTION_BG }}
                >
                  <span style={{ fontWeight: 500 }}>{country.name}</span>
                  <span
                    style={{
                      marginLeft: "8px",
                      fontSize: "0.8em",
                      color: "#888",
                    }}
                  >
                    {country.region}
                  </span>
                </ListItem>
              ))}
            </List>
            <div className="value-display">
              {selected
                ? (() => {
                    const c = COUNTRIES.find((c) => c.code === selected);
                    return c ? `${c.name} (${c.code}) — ${c.region}` : selected;
                  })()
                : ""}
            </div>
          </div>
        );
      };

      // --- 3. Controlled / dynamic options ---

      const ControlledDemo = () => {
        const [filter, setFilter] = useState("");
        const [selected, setSelected] = useState(null);

        const filtered = FRUITS.filter((f) =>
          f.toLowerCase().includes(filter.toLowerCase()),
        );

        return (
          <div className="demo-section">
            <h2>Controlled with external filter input</h2>
            <p>
              The list is filtered by the input above it. Shows how List works
              with an external query source.
            </p>
            <input
              type="text"
              placeholder="Filter fruits…"
              value={filter}
              onInput={(e) => {
                setFilter(e.target.value);
                setSelected(null);
              }}
              style={{
                display: "block",
                width: "100%",
                marginBottom: "8px",
                padding: "8px",
                boxSizing: "border-box",
                border: "1px solid #ccc",
                borderRadius: "6px",
                fontSize: "1rem",
              }}
            />
            <List
              role="listbox"
              fallback="No results"
              style={{ maxHeight: "220px" }}
              uiAction={setSelected}
              hidden={filtered.length === 0}
              expandX
            >
              {filtered.map((fruit, i) => (
                <ListItem
                  role="option"
                  key={fruit}
                  index={i}
                  value={fruit}
                  selected={selected === fruit}
                  style={{ backgroundColor: SUGGESTION_BG }}
                >
                  {fruit}
                </ListItem>
              ))}
            </List>
            {filtered.length === 0 && (
              <p style={{ color: "#999", fontStyle: "italic" }}>
                No results for "{filter}"
              </p>
            )}
            <div className="value-display">{selected ?? ""}</div>
          </div>
        );
      };

      // --- 4. Custom styles via CSS vars ---

      const CustomStyleDemo = () => {
        const [selected, setSelected] = useState("Apple");
        const [, getItemMatchInfo] = useSearchText("a", FRUITS);
        return (
          <div className="demo-section">
            <h2>Custom styles via CSS vars</h2>
            <p>
              The list and suggestions have custom background/text colors,
              including for pointed and highlighted states.
            </p>
            <List
              role="listbox"
              fallback="No results"
              style={{
                backgroundColor: "#1a1a2e",
                borderColor: "#e94560",
              }}
              uiAction={setSelected}
            >
              {FRUITS.map((fruit, i) => {
                return (
                  <ListItem
                    role="option"
                    key={fruit}
                    index={i}
                    value={fruit}
                    selected={selected === fruit}
                    matchInfo={getItemMatchInfo(fruit)}
                    style={{
                      "color": "#eaeaea",
                      "backgroundColor": "transparent",
                      ":-navi-pointed": {
                        color: "#1a1a2e",
                        backgroundColor: "#e94560",
                      },
                      ":hover": {
                        color: "#fff",
                        backgroundColor: "#16213e",
                      },
                      ":-navi-selected": {
                        color: "#fff",
                        backgroundColor: "#7b1a30",
                      },
                      "::highlight": {
                        color: "#fff",
                        backgroundColor: "#7c3aed",
                      },
                    }}
                  >
                    {fruit}
                  </ListItem>
                );
              })}
            </List>
            <div className="value-display">{selected ?? ""}</div>
          </div>
        );
      };

      // --- 5. Sort by match, show all ---

      const SortedDemo = () => {
        const [filter, setFilter] = useState("");
        const [selected, setSelected] = useState(null);
        const [sorted, getItemMatchInfo] = useSearchText(filter, FRUITS);

        return (
          <div className="demo-section">
            <h2>Search without hiding</h2>
            <p>
              Matching suggestions rise to the top to help the user find what
              they are looking for. Non-matching suggestions stay visible below.
            </p>
            <input
              type="search"
              placeholder="Search fruits…"
              value={filter}
              onInput={(e) => {
                setFilter(e.target.value);
                setSelected(null);
              }}
              style={{
                display: "block",
                width: "100%",
                marginBottom: "8px",
                padding: "8px",
                boxSizing: "border-box",
                border: "1px solid #ccc",
                borderRadius: "6px",
                fontSize: "1rem",
              }}
            />
            <List
              role="listbox"
              fallback="No results"
              style={{ maxHeight: "220px" }}
              uiAction={setSelected}
            >
              {sorted.map((fruit, i) => {
                // Force match: true — this demo shows all items regardless of
                // match (see above), only highlight/matchScore should reflect
                // the actual match info, not the match-based filtering.
                const matchInfo = { ...getItemMatchInfo(fruit), match: true };
                return (
                  <ListItem
                    role="option"
                    key={fruit}
                    index={i}
                    value={fruit}
                    selected={selected === fruit}
                    matchInfo={matchInfo}
                    style={{ backgroundColor: SUGGESTION_BG }}
                  >
                    {fruit}
                  </ListItem>
                );
              })}
            </List>
            <div className="value-display">{selected ?? ""}</div>
          </div>
        );
      };

      // --- 6. Popover mode ---

      const PopoverDemo = () => {
        const [selected, setSelected] = useState(null);
        const listRef = useRef(null);
        const buttonRef = useRef(null);

        const showPopover = () => {
          listRef.current?.dispatchEvent(
            new CustomEvent("navi_list_request_open", {
              detail: { anchor: buttonRef.current },
            }),
          );
        };
        const hidePopover = () => {
          listRef.current?.dispatchEvent(
            new CustomEvent("navi_list_request_close"),
          );
        };

        return (
          <div className="demo-section">
            <h2>Popover mode</h2>
            <p>The list is shown as a popover anchored to the buttons below.</p>
            <div style={{ display: "flex", gap: "8px", marginBottom: "12px" }}>
              <button ref={buttonRef} onClick={showPopover}>
                Show popover
              </button>
              <button onClick={hidePopover}>Hide popover</button>
            </div>
            <List
              role="listbox"
              fallback="No results"
              ref={listRef}
              popover
              uiAction={(value) => {
                setSelected(value);
                hidePopover();
              }}
            >
              {FRUITS.map((fruit, i) => (
                <ListItem
                  role="option"
                  key={fruit}
                  index={i}
                  value={fruit}
                  selected={selected === fruit}
                  style={{ backgroundColor: SUGGESTION_BG }}
                >
                  {fruit}
                </ListItem>
              ))}
            </List>
            <div className="value-display">{selected ?? ""}</div>
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
