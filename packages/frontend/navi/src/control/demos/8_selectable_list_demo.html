<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selectable List Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 12px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      .demo-section h3 {
        margin: 0 0 10px;
        color: #333;
        font-size: 1.05rem;
      }

      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      .col-label {
        margin-bottom: 8px;
        color: #888;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .value-display {
        min-height: 24px;
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }
    </style>
  </head>
  <body>
    <h1>Selectable List Demo</h1>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        NaviDebug,
        SelectableList,
        Selectable,
        Form,
        Button,
        BadgeCount,
      } from "@jsenv/navi";

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <div>
              <TableOfContents />
              <BasicDemo />
              <ReadOnlyDemo />
              <FormDemo />
              <ValidationDemo />
              <div id="customization">
                <div class="demo-section">
                  <h2>Customization</h2>
                </div>
                <IconInputDemo />
                <SwitchDemo />
                <BgColorDemo />
                <ManualAreaDemo />
                <LegendDemo />
              </div>
            </div>
          </NaviDebug>
        );
      };

      const TableOfContents = () => {
        return (
          <div class="demo-section">
            <h2>Table of contents</h2>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#basic">Basic (with Selectable.Input)</a>
              </li>
              <li>
                <a href="#readonly">ReadOnly items</a>
              </li>
              <li>
                <a href="#form">Form integration</a>
              </li>
              <li>
                <a href="#validation">Validation</a>
              </li>
              <li>
                Customization
                <ol style={{ margin: 0, paddingLeft: "20px" }}>
                  <li>
                    <a href="#icons">Custom icons</a>
                  </li>
                  <li>
                    <a href="#switch">Switch appearance</a>
                  </li>
                  <li>
                    <a href="#bg-color">Background color indicator</a>
                  </li>
                  <li>
                    <a href="#manual-area">Manual selectable area</a>
                  </li>
                  <li>
                    <a href="#legend">Legend</a>
                  </li>
                </ol>
              </li>
            </ol>
          </div>
        );
      };

      const FRUITS = ["Apple", "Banana", "Cherry", "Date", "Elderberry"];

      // ── Basic (with Selectable.Input) ──────────────────────────────────────────

      const BasicDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const [singleLog, setSingleLog] = useState([]);
        const [multipleLog, setMultipleLog] = useState([]);
        return (
          <div id="basic" className="demo-section">
            <h2>Basic (with Selectable.Input)</h2>
            <p>
              <code>Selectable.Input</code> lets you control where the input
              indicator appears inside the row. See the Customization section
              below for more advanced placements and appearances.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                <SelectableList
                  action={(v) => {
                    setSelectedSingle(v);
                    setSingleLog((prev) => [...prev, v ?? "(none)"]);
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <Selectable
                      key={fruit}
                      index={i}
                      id={`basic_s_${fruit.toLowerCase()}`}
                      value={fruit}
                      selected={selectedSingle === fruit}
                      flex
                      spacing="s"
                    >
                      <Selectable.Input />
                      {fruit}
                    </Selectable>
                  ))}
                </SelectableList>
                <div className="value-display">
                  {singleLog.length
                    ? singleLog.map((v, i) => <div key={i}>→ {v}</div>)
                    : "(no action yet)"}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                <SelectableList
                  multiple
                  action={(v) => {
                    setSelectedMultiple(v);
                    setMultipleLog((prev) => [
                      ...prev,
                      v && v.length ? v.join(", ") : "(none)",
                    ]);
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <Selectable
                      key={fruit}
                      index={i}
                      id={`basic_m_${fruit.toLowerCase()}`}
                      value={fruit}
                      selected={selectedMultiple.includes(fruit)}
                      flex
                      spacing="s"
                    >
                      <Selectable.Input />
                      {fruit}
                    </Selectable>
                  ))}
                </SelectableList>
                <div className="value-display">
                  {multipleLog.length
                    ? multipleLog.map((v, i) => <div key={i}>→ {v}</div>)
                    : "(no action yet)"}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── ReadOnly items ─────────────────────────────────────────────────────────

      const ReadOnlyDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const renderList = ({ multiple, selected, setSelected }) => (
          <SelectableList
            multiple={multiple}
            action={(v) => {
              setSelected(multiple ? (v ?? []) : (v ?? null));
            }}
            expandX
          >
            <Selectable
              index={0}
              id={`ro_taken_${multiple ? "m" : "s"}`}
              value="taken"
              flex
              spacing="s"
              readOnly
              readOnlyMessage={
                <>
                  This slot is already <strong>taken.</strong>
                </>
              }
            >
              <Selectable.Input />
              Taken
            </Selectable>
            <Selectable
              index={1}
              id={`ro_unavailable_${multiple ? "m" : "s"}`}
              value="unavailable"
              flex
              spacing="s"
              readOnly
            >
              <Selectable.Input />
              Unavailable
            </Selectable>
            {FRUITS.slice(0, 3).map((fruit, i) => (
              <Selectable
                key={fruit}
                index={i + 2}
                id={`ro_${multiple ? "m" : "s"}_${fruit.toLowerCase()}`}
                value={fruit}
                selected={
                  multiple ? selected.includes(fruit) : selected === fruit
                }
                flex
                spacing="s"
              >
                <Selectable.Input />
                {fruit}
              </Selectable>
            ))}
          </SelectableList>
        );
        return (
          <div id="readonly" className="demo-section">
            <h2>ReadOnly items</h2>
            <p>
              Items with <code>readOnly</code> show a callout on click instead
              of selecting.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                {renderList({
                  multiple: false,
                  selected: selectedSingle,
                  setSelected: setSelectedSingle,
                })}
                <div className="value-display">
                  {selectedSingle ? `Selected: ${selectedSingle}` : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                {renderList({
                  multiple: true,
                  selected: selectedMultiple,
                  setSelected: setSelectedMultiple,
                })}
                <div className="value-display">
                  {selectedMultiple.length
                    ? `Selected: ${selectedMultiple.join(", ")}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Form integration ───────────────────────────────────────────────────────

      const FormDemo = () => {
        const [submittedSingle, setSubmittedSingle] = useState(null);
        const [submittedMultiple, setSubmittedMultiple] = useState(null);
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        return (
          <div id="form" className="demo-section">
            <h2>Form integration</h2>
            <p>
              <code>SelectableList</code> works inside a <code>Form</code>. The
              selected value is submitted under the list's <code>name</code>.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedSingle(fruit ?? "(none)");
                    setSelectedSingle(fruit ?? null);
                  }}
                >
                  <SelectableList name="fruit">
                    {FRUITS.map((fruit, i) => (
                      <Selectable
                        key={fruit}
                        index={i}
                        id={`form_s_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedSingle === fruit}
                        flex
                        spacing="s"
                      >
                        <Selectable.Input />
                        {fruit}
                      </Selectable>
                    ))}
                  </SelectableList>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedSingle !== null
                    ? `Submitted: ${submittedSingle}`
                    : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedMultiple(fruit);
                    setSelectedMultiple(fruit);
                  }}
                >
                  <SelectableList multiple name="fruit">
                    {FRUITS.map((fruit, i) => (
                      <Selectable
                        key={fruit}
                        index={i}
                        id={`form_m_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedMultiple.includes(fruit)}
                        flex
                        spacing="s"
                      >
                        <Selectable.Input />
                        {fruit}
                      </Selectable>
                    ))}
                  </SelectableList>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedMultiple !== null
                    ? `Submitted: ${submittedMultiple.length ? submittedMultiple.join(", ") : "(none)"}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Validation ─────────────────────────────────────────────────────────────

      const ValidationDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState(null);
        const [selectedMultiple, setSelectedMultiple] = useState([]);
        const [submittedSingle, setSubmittedSingle] = useState(null);
        const [submittedMultiple, setSubmittedMultiple] = useState(null);
        return (
          <div id="validation" className="demo-section">
            <h2>Validation</h2>
            <p>
              Pass <code>required</code> to <code>SelectableList</code> to
              prevent form submission when nothing is selected. Try submitting
              without selecting anything.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedSingle(fruit ?? "(none)");
                    setSelectedSingle(fruit);
                  }}
                >
                  <SelectableList name="fruit" required>
                    {FRUITS.map((fruit, i) => (
                      <Selectable
                        key={fruit}
                        index={i}
                        id={`val_s_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedSingle === fruit}
                        flex
                        spacing="s"
                      >
                        <Selectable.Input />
                        {fruit}
                      </Selectable>
                    ))}
                  </SelectableList>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedSingle !== null
                    ? `Submitted: ${submittedSingle}`
                    : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedMultiple(fruit);
                    setSelectedMultiple(fruit);
                  }}
                >
                  <SelectableList multiple name="fruit" required>
                    {FRUITS.map((fruit, i) => (
                      <Selectable
                        key={fruit}
                        index={i}
                        id={`val_m_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedMultiple.includes(fruit)}
                        flex
                        spacing="s"
                      >
                        <Selectable.Input />
                        {fruit}
                      </Selectable>
                    ))}
                  </SelectableList>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedMultiple !== null
                    ? `Submitted: ${submittedMultiple.length ? submittedMultiple.join(", ") : "(none)"}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Custom icons ───────────────────────────────────────────────────────────

      const CircleIcon = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <circle
            cx="12"
            cy="12"
            r="9"
            stroke="currentColor"
            stroke-width="2.5"
          />
        </svg>
      );

      const CheckIcon = () => (
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
      );

      const IconInputDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const renderList = ({ multiple, selected, setSelected }) => (
          <SelectableList
            multiple={multiple}
            action={(v) => {
              setSelected(multiple ? (v ?? []) : (v ?? null));
            }}
          >
            {FRUITS.map((fruit, i) => (
              <Selectable
                key={fruit}
                index={i}
                id={`icon_${multiple ? "m" : "s"}_${fruit.toLowerCase()}`}
                value={fruit}
                selected={
                  multiple ? selected.includes(fruit) : selected === fruit
                }
                flex
                spacing="s"
                expandX
                alignY="center"
              >
                <span style={{ flex: 1 }}>{fruit}</span>
                <Selectable.Input icon={[<CircleIcon />, <CheckIcon />]} />
              </Selectable>
            ))}
          </SelectableList>
        );
        return (
          <div id="icons" className="demo-section">
            <h2>Custom icons</h2>
            <p>
              Pass <code>icon={`{[uncheckedIcon, checkedIcon]}`}</code> to{" "}
              <code>Selectable.Input</code> to render custom icons. Here the
              input is placed at the <em>end</em> of the row.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                {renderList({
                  multiple: false,
                  selected: selectedSingle,
                  setSelected: setSelectedSingle,
                })}
                <div className="value-display">
                  {selectedSingle ? `Selected: ${selectedSingle}` : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                {renderList({
                  multiple: true,
                  selected: selectedMultiple,
                  setSelected: setSelectedMultiple,
                })}
                <div className="value-display">
                  {selectedMultiple.length
                    ? `Selected: ${selectedMultiple.join(", ")}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Switch appearance ──────────────────────────────────────────────────────

      const SwitchDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        return (
          <div id="switch" className="demo-section">
            <h2>Switch appearance</h2>
            <p>
              Pass <code>appearance="switch"</code> to{" "}
              <code>Selectable.Input</code> to render a switch instead of a
              checkbox mark. Only available for multiple selection — switch and
              radio don't work well together in terms of affordance (a switch
              implies an independent on/off, not mutual exclusion).
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single — no switch</div>
                <SelectableList
                  action={(v) => {
                    setSelectedSingle(v);
                  }}
                >
                  {FRUITS.map((fruit, i) => (
                    <Selectable
                      key={fruit}
                      index={i}
                      id={`switch_s_${fruit.toLowerCase()}`}
                      value={fruit}
                      selected={selectedSingle === fruit}
                      flex
                      spacing="s"
                      expandX
                      alignY="center"
                    >
                      <span style={{ flex: 1 }}>{fruit}</span>
                      <Selectable.Input />
                    </Selectable>
                  ))}
                </SelectableList>
                <div className="value-display">
                  {selectedSingle ? `Selected: ${selectedSingle}` : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple — with switch</div>
                <SelectableList
                  multiple
                  action={(v) => {
                    setSelectedMultiple(v ?? []);
                  }}
                >
                  {FRUITS.map((fruit, i) => (
                    <Selectable
                      key={fruit}
                      index={i}
                      id={`switch_m_${fruit.toLowerCase()}`}
                      value={fruit}
                      selected={selectedMultiple.includes(fruit)}
                      flex
                      spacing="s"
                      expandX
                      alignY="center"
                    >
                      <span style={{ flex: 1 }}>{fruit}</span>
                      <Selectable.Input appearance="switch" />
                    </Selectable>
                  ))}
                </SelectableList>
                <div className="value-display">
                  {selectedMultiple.length
                    ? `Selected: ${selectedMultiple.join(", ")}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Background color indicator ─────────────────────────────────────────────

      const BgColorDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const [bgColor, setBgColor] = useState("#1a73e8");
        const customStyle = {
          "--list-item-background-color-selected": bgColor,
        };
        const renderList = ({ multiple, selected, setSelected }) => (
          <SelectableList
            multiple={multiple}
            selectedIndicator="backgroundColor"
            style={customStyle}
            action={(v) => {
              setSelected(multiple ? (v ?? []) : (v ?? null));
            }}
          >
            {FRUITS.map((fruit, i) => (
              <Selectable
                key={fruit}
                index={i}
                id={`bg_${multiple ? "m" : "s"}_${fruit.toLowerCase()}`}
                value={fruit}
                selected={
                  multiple ? selected.includes(fruit) : selected === fruit
                }
                flex
                spacing="s"
              >
                {fruit}
              </Selectable>
            ))}
          </SelectableList>
        );
        return (
          <div id="bg-color" className="demo-section">
            <h2>Background color indicator</h2>
            <p>
              Pass <code>selectedIndicator="backgroundColor"</code> to{" "}
              <code>SelectableList</code> to highlight selected items with a
              background color. This is opt-in — by default no background is
              applied so the visual indicator is entirely up to{" "}
              <code>Selectable.Input</code>. Override{" "}
              <code>--list-item-background-color-selected</code> to customize
              the color.
            </p>
            <div
              style={{
                marginBottom: 16,
                display: "flex",
                alignItems: "center",
                gap: 8,
              }}
            >
              <label style={{ fontSize: "0.85rem", color: "#555" }}>
                Background color:
              </label>
              <input
                type="color"
                value={bgColor}
                onInput={(e) => {
                  setBgColor(e.currentTarget.value);
                }}
                style={{
                  width: 40,
                  height: 28,
                  padding: 2,
                  cursor: "pointer",
                  border: "1px solid #ccc",
                  borderRadius: 4,
                }}
              />
              <span
                style={{
                  fontFamily: "monospace",
                  fontSize: "0.85rem",
                  color: "#555",
                }}
              >
                {bgColor}
              </span>
            </div>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                {renderList({
                  multiple: false,
                  selected: selectedSingle,
                  setSelected: setSelectedSingle,
                })}
                <div className="value-display">
                  {selectedSingle ? `Selected: ${selectedSingle}` : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                {renderList({
                  multiple: true,
                  selected: selectedMultiple,
                  setSelected: setSelectedMultiple,
                })}
                <div className="value-display">
                  {selectedMultiple.length
                    ? `Selected: ${selectedMultiple.join(", ")}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Manual selectable area ─────────────────────────────────────────────────

      const FRUIT_BADGES = {
        Apple: 3,
        Banana: 0,
        Cherry: 12,
        Date: 1,
        Elderberry: 0,
      };

      const ManualAreaItem = ({ fruit, index, selected, prefix }) => {
        const [lastAction, setLastAction] = useState(null);
        const badge = FRUIT_BADGES[fruit];
        const id = `manual_${prefix}_${fruit.toLowerCase()}`;
        return (
          <Selectable
            index={index}
            id={id}
            value={fruit}
            selected={selected}
            selectableArea="manual"
            flex
            expandX
            alignY="center"
            padding="0"
          >
            {/* The <label> wrapping Selectable.Input + text is the clickable selection zone */}
            <label
              // We must ensure our label points to the real input
              // (otherwise browser will try to focus the proxy and complain about aria-hidden)
              // htmlFor={`${id}_input`}
              // not mandatory since we transfer focus after click too
              style={{
                display: "flex",
                alignItems: "center",
                gap: 8,
                flex: 1,
                padding: "10px 12px",
                cursor: "pointer",
                border: "2px dotted #aaa",
                borderRadius: 6,
                margin: 4,
              }}
            >
              <Selectable.Input />
              <span>{fruit}</span>
              {badge > 0 && (
                <BadgeCount background="#e53e3e" color="white" selfAlignX="end">
                  {badge}
                </BadgeCount>
              )}
            </label>
            {/* Actions on the right — outside the label, so clicking them does NOT select */}
            <div
              style={{
                display: "flex",
                alignItems: "center",
                gap: 4,
                padding: "0 8px",
                flexShrink: 0,
              }}
            >
              <button
                type="button"
                title="Edit"
                onClick={() => {
                  setLastAction(`edit ${fruit}`);
                }}
                style={{
                  padding: "4px 8px",
                  border: "1px solid #ddd",
                  borderRadius: 4,
                  background: "white",
                  cursor: "pointer",
                  fontSize: "0.8rem",
                }}
              >
                ✏️
              </button>
              <button
                type="button"
                title="Delete"
                onClick={() => {
                  setLastAction(`delete ${fruit}`);
                }}
                style={{
                  padding: "4px 8px",
                  border: "1px solid #ddd",
                  borderRadius: 4,
                  background: "white",
                  cursor: "pointer",
                  fontSize: "0.8rem",
                }}
              >
                🗑️
              </button>
            </div>
            {lastAction && (
              <span
                style={{
                  fontSize: "0.75rem",
                  color: "#888",
                  paddingRight: 8,
                  fontStyle: "italic",
                  whiteSpace: "nowrap",
                }}
              >
                → {lastAction}
              </span>
            )}
          </Selectable>
        );
      };

      const ManualAreaDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const renderList = ({ multiple, selected, setSelected, prefix }) => (
          <SelectableList
            multiple={multiple}
            action={(v) => {
              setSelected(multiple ? (v ?? []) : (v ?? null));
            }}
          >
            {FRUITS.map((fruit, i) => (
              <ManualAreaItem
                key={fruit}
                fruit={fruit}
                index={i}
                selected={
                  multiple ? selected.includes(fruit) : selected === fruit
                }
                prefix={prefix}
              />
            ))}
          </SelectableList>
        );
        return (
          <div id="manual-area" className="demo-section">
            <h2>Manual selectable area</h2>
            <p>
              With <code>selectableArea="manual"</code> the row renders as a{" "}
              <code>{"<div>"}</code> instead of a <code>{"<label>"}</code>. You
              can then wrap <code>Selectable.Input</code> + text in your own{" "}
              <code>{"<label>"}</code> to define exactly which area is clickable
              (dotted border below), while placing independent actions on the
              right without affecting selection.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                {renderList({
                  multiple: false,
                  selected: selectedSingle,
                  setSelected: setSelectedSingle,
                  prefix: "s",
                })}
                <div className="value-display">
                  {selectedSingle ? `Selected: ${selectedSingle}` : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                {renderList({
                  multiple: true,
                  selected: selectedMultiple,
                  setSelected: setSelectedMultiple,
                  prefix: "m",
                })}
                <div className="value-display">
                  {selectedMultiple.length
                    ? `Selected: ${selectedMultiple.join(", ")}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Legend ────────────────────────────────────────────────────────────────

      const LEGEND_FRUITS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
        "Honeydew",
        "Kiwi",
        "Lemon",
        "Mango",
        "Nectarine",
        "Orange",
        "Papaya",
        "Quince",
      ];

      const FRUIT_SUGAR = {
        Apple: "medium",
        Banana: "high",
        Cherry: "high",
        Date: "high",
        Elderberry: "low",
        Fig: "high",
        Grape: "high",
        Honeydew: "medium",
        Kiwi: "medium",
        Lemon: "low",
        Mango: "high",
        Nectarine: "medium",
        Orange: "medium",
        Papaya: "medium",
        Quince: "low",
      };

      const SUGAR_ICON = { low: "🟢", medium: "🟡", high: "🔴" };
      const SUGAR_LEVELS = [
        { key: "low", label: "🟢 Peu sucré" },
        { key: "medium", label: "🟡 Moyennement sucré" },
        { key: "high", label: "🔴 Très sucré" },
      ];

      const LegendDemo = () => {
        const [selected, setSelected] = useState(null);
        const [hoveredFruit, setHoveredFruit] = useState(null);
        const [hoveredSugar, setHoveredSugar] = useState(null);
        return (
          <div id="legend" className="demo-section">
            <h2>Legend</h2>
            <p>
              A legend placed alongside the list can cross-highlight items.
              Hovering a sugar level highlights matching fruits; hovering a
              fruit highlights its category in the legend.
            </p>
            <div
              style={{ display: "flex", gap: "16px", alignItems: "flex-start" }}
            >
              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  gap: "6px",
                  paddingTop: "4px",
                  flexShrink: 0,
                }}
              >
                <div
                  style={{
                    fontSize: "0.8rem",
                    color: "#888",
                    marginBottom: "2px",
                    fontWeight: 600,
                    textTransform: "uppercase",
                    letterSpacing: "0.04em",
                    width: "220px",
                  }}
                >
                  Teneur en sucre
                </div>
                {SUGAR_LEVELS.map(({ key, label }) => {
                  const isHoveredFromList =
                    hoveredFruit !== null && FRUIT_SUGAR[hoveredFruit] === key;
                  const isHoveredFromLegend = hoveredSugar === key;
                  const isActive = isHoveredFromList || isHoveredFromLegend;
                  return (
                    <div
                      key={key}
                      onMouseEnter={() => {
                        setHoveredSugar(key);
                      }}
                      onMouseLeave={() => {
                        setHoveredSugar(null);
                      }}
                      style={{
                        padding: "5px 10px",
                        borderRadius: "4px",
                        fontSize: "0.85rem",
                        cursor: "default",
                        userSelect: "none",
                        background: isActive ? "#eef2ff" : "#f5f5f5",
                        border: isActive
                          ? "1px solid #c7d2fe"
                          : "1px solid #e5e5e5",
                        fontWeight: isActive ? 600 : "normal",
                      }}
                    >
                      {label}
                    </div>
                  );
                })}
              </div>
              <SelectableList
                selectedIndicator="backgroundColor"
                action={(value) => {
                  setSelected(value);
                }}
              >
                {LEGEND_FRUITS.map((fruit, i) => (
                  <Selectable
                    key={fruit}
                    index={i}
                    id={`legend_${fruit.toLowerCase()}`}
                    value={fruit}
                    selected={selected === fruit}
                    pointed={FRUIT_SUGAR[fruit] === hoveredSugar}
                    onMouseEnter={() => {
                      setHoveredFruit(fruit);
                    }}
                    onMouseLeave={() => {
                      setHoveredFruit(null);
                    }}
                    style={{
                      "--list-item-background-color-pointed": "#dbeafe",
                    }}
                  >
                    {SUGAR_ICON[FRUIT_SUGAR[fruit]]} {fruit}
                  </Selectable>
                ))}
              </SelectableList>
            </div>
            <div className="value-display">{selected ?? ""}</div>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
