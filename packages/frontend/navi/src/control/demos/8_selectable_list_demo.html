<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selectable List Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 12px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      .demo-section h3 {
        margin: 0 0 10px;
        color: #333;
        font-size: 1.05rem;
      }

      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      .col-label {
        margin-bottom: 8px;
        color: #888;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .value-display {
        min-height: 24px;
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      .value-display:empty::before {
        color: #999;
        font-style: italic;
        content: "(none selected)";
      }
    </style>
  </head>
  <body>
    <h1>Selectable List Demo</h1>
    <div id="app"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useLayoutEffect, useRef, useState } from "preact/hooks";
      import {
        NaviDebug,
        SelectableList,
        Selectable,
        Form,
        Button,
        BadgeCount,
        useSearchText,
        Input,
        stateSignal,
        route,
        setupRoutes,
        Text,
        Box,
        Icon,
      } from "@jsenv/navi";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";

      const searchFruitSignal = stateSignal("", {
        id: "search_fruit",
        type: "string",
      });
      const DEMO_ROUTE = route("", {
        searchParams: { search_fruit: searchFruitSignal },
      });
      setupRoutes([DEMO_ROUTE]);

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <div>
              <TableOfContents />
              <WidthDemo />
              <SearchableDemo />
              <BasicDemo />
              <ReadOnlyDemo />
              <ExternalControlDemo />
              <FormDemo />
              <ValidationDemo />
              <div id="customization">
                <div class="demo-section">
                  <h2>Customization</h2>
                </div>
                <IconInputDemo />
                <SwitchDemo />
                <BgColorDemo />
                <ManualAreaDemo />
                <LegendDemo />
              </div>
            </div>
          </NaviDebug>
        );
      };

      const TableOfContents = () => {
        return (
          <div class="demo-section">
            <h2>Table of contents</h2>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#width">Width behaviour</a>
              </li>
              <li>
                <a href="#searchable">Searchable</a>
              </li>
              <li>
                <a href="#basic">Basic (with Selectable.Input)</a>
              </li>
              <li>
                <a href="#readonly">ReadOnly items</a>
              </li>
              <li>
                <a href="#external-control">External control</a>
              </li>
              <li>
                <a href="#form">Form integration</a>
              </li>
              <li>
                <a href="#validation">Validation</a>
              </li>
              <li>
                Customization
                <ol style={{ margin: 0, paddingLeft: "20px" }}>
                  <li>
                    <a href="#icons">Custom icons</a>
                  </li>
                  <li>
                    <a href="#switch">Switch appearance</a>
                  </li>
                  <li>
                    <a href="#bg-color">Background color indicator</a>
                  </li>
                  <li>
                    <a href="#manual-area">Manual selectable area</a>
                  </li>
                  <li>
                    <a href="#legend">Legend</a>
                  </li>
                </ol>
              </li>
            </ol>
          </div>
        );
      };

      const FRUITS = ["Apple", "Banana", "Cherry", "Date", "Elderberry"];

      // ── Searchable ─────────────────────────────────────────────────────────────

      const SearchableDemo = () => {
        const searchText = searchFruitSignal.value;
        const [matchingFruits, getMatchInfo] = useSearchText(
          searchText,
          FRUITS,
        );
        const [selected, setSelected] = useState("");
        const [log, pushLog] = useCallLog();
        return (
          <div id="searchable" className="demo-section">
            <h2>Searchable</h2>
            <p>
              A <code>stateSignal</code> persists the search text in the URL.
              <code>useSearchText</code> filters and ranks items.
            </p>
            <Input
              type="search"
              placeholder="Search fruits…"
              value={searchText}
              action={(v) => {
                searchFruitSignal.value = v;
              }}
              expandX
              marginBottom="m"
              borderRadius="xs"
              paddingX="s"
              paddingY="xs"
              navi-list="searchable-list"
            />
            <SelectableList
              id="searchable-list"
              action={(v) => {
                setSelected(v);
                pushLog("action", v ?? "(none)");
              }}
              expandX
            >
              {matchingFruits.map((fruit, i) => {
                const { score, ranges, match } = getMatchInfo(fruit);
                return (
                  <Selectable
                    key={fruit}
                    index={i}
                    id={`searchable_${fruit.toLowerCase()}`}
                    value={fruit}
                    selected={selected === fruit}
                    highlight={ranges}
                    matchScore={score}
                    filtered={!match}
                    flex
                    spacing="s"
                  >
                    <Selectable.Input />
                    {fruit}
                  </Selectable>
                );
              })}
            </SelectableList>
            <div className="value-display">{selected}</div>
            <CallLog entries={log} />
          </div>
        );
      };

      // ── Basic (with Selectable.Input) ──────────────────────────────────────────

      const BasicDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const [singleLog, pushSingleLog] = useCallLog();
        const [multipleLog, pushMultipleLog] = useCallLog();
        return (
          <div id="basic" className="demo-section">
            <h2>Basic (with Selectable.Input)</h2>
            <p>
              <code>Selectable.Input</code> lets you control where the input
              indicator appears inside the row. See the Customization section
              below for more advanced placements and appearances.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                <SelectableList
                  action={(v) => {
                    setSelectedSingle(v);
                    pushSingleLog("action", v ?? "(none)");
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <Selectable
                      key={fruit}
                      index={i}
                      id={`basic_s_${fruit.toLowerCase()}`}
                      value={fruit}
                      selected={selectedSingle === fruit}
                      flex
                      spacing="s"
                    >
                      <Selectable.Input />
                      {fruit}
                    </Selectable>
                  ))}
                </SelectableList>
                <CallLog entries={singleLog} />
              </div>
              <div>
                <div className="col-label">Multiple</div>
                <SelectableList
                  multiple
                  action={(v) => {
                    setSelectedMultiple(v);
                    pushMultipleLog(
                      "action",
                      v && v.length ? v.join(", ") : "(none)",
                    );
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <Selectable
                      key={fruit}
                      index={i}
                      id={`basic_m_${fruit.toLowerCase()}`}
                      value={fruit}
                      selected={selectedMultiple.includes(fruit)}
                      flex
                      spacing="s"
                    >
                      <Selectable.Input />
                      {fruit}
                    </Selectable>
                  ))}
                </SelectableList>
                <CallLog entries={multipleLog} />
              </div>
            </div>
          </div>
        );
      };

      // ── ReadOnly items ─────────────────────────────────────────────────────────

      const ReadOnlyDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        const renderList = ({ multiple, selected, setSelected }) => (
          <SelectableList
            multiple={multiple}
            action={(v) => {
              setSelected(multiple ? (v ?? []) : (v ?? null));
            }}
            expandX
          >
            <Selectable
              index={0}
              id={`ro_taken_${multiple ? "m" : "s"}`}
              value="taken"
              flex
              spacing="s"
              readOnly
              readOnlyMessage={
                <>
                  This slot is already <strong>taken.</strong>
                </>
              }
            >
              <Selectable.Input />
              Taken
            </Selectable>
            <Selectable
              index={1}
              id={`ro_unavailable_${multiple ? "m" : "s"}`}
              value="unavailable"
              flex
              spacing="s"
              readOnly
            >
              <Selectable.Input />
              Unavailable
            </Selectable>
            {FRUITS.slice(0, 3).map((fruit, i) => (
              <Selectable
                key={fruit}
                index={i + 2}
                id={`ro_${multiple ? "m" : "s"}_${fruit.toLowerCase()}`}
                value={fruit}
                selected={
                  multiple ? selected.includes(fruit) : selected === fruit
                }
                flex
                spacing="s"
              >
                <Selectable.Input />
                {fruit}
              </Selectable>
            ))}
          </SelectableList>
        );
        return (
          <div id="readonly" className="demo-section">
            <h2>ReadOnly items</h2>
            <p>
              Items with <code>readOnly</code> show a callout on click instead
              of selecting.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                {renderList({
                  multiple: false,
                  selected: selectedSingle,
                  setSelected: setSelectedSingle,
                })}
                <div className="value-display">
                  {selectedSingle ? `Selected: ${selectedSingle}` : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                {renderList({
                  multiple: true,
                  selected: selectedMultiple,
                  setSelected: setSelectedMultiple,
                })}
                <div className="value-display">
                  {selectedMultiple.length
                    ? `Selected: ${selectedMultiple.join(", ")}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── External control ───────────────────────────────────────────────────────

      const EXTERNAL_CTRL_FRUITS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
        "Honeydew",
        "Kiwi",
        "Lemon",
        "Mango",
        "Nectarine",
        "Orange",
        "Papaya",
        "Quince",
        "Raspberry",
        "Strawberry",
        "Tangerine",
        "Ugli fruit",
        "Vanilla bean",
        "Watermelon",
        "Ximenia",
        "Yuzu",
        "Zucchini",
        "Açaí",
        "Blackberry",
        "Cantaloupe",
        "Dragonfruit",
        "Feijoa",
        "Gooseberry",
        "Jackfruit",
        "Kumquat",
        "Longan",
        "Mulberry",
        "Persimmon",
      ];

      const ExternalControlDemo = () => {
        const listRef = useRef(null);
        const [selected, setSelected] = useState("Apple");
        const [actionLog, pushActionLog] = useCallLog();
        const toSelectableId = (fruit) =>
          `ext_s_${fruit.toLowerCase().replaceAll(" ", "_")}`;
        const [targetId, setTargetId] = useState(
          toSelectableId(EXTERNAL_CTRL_FRUITS[0]),
        );
        return (
          <div id="external-control" className="demo-section">
            <h2>External control</h2>
            <p>
              External UI can programmatically select or unselect items using{" "}
              <code>dispatchRequestSelect</code> and{" "}
              <code>dispatchRequestUnselect</code>. The list uses{" "}
              <code>renderBudget={"{30}"}</code> so some items are not in the
              DOM at any given time — the select/unselect still works via the
              in-memory UI state controller.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">
                  List (renderBudget=30, {EXTERNAL_CTRL_FRUITS.length} items)
                </div>
                <SelectableList
                  id="external-control-list"
                  ref={listRef}
                  renderBudget={30}
                  action={(v) => {
                    setSelected(v);
                    pushActionLog("action", v ?? "(none)");
                  }}
                  expandX
                  style={{ maxHeight: 200, overflowY: "auto" }}
                >
                  {EXTERNAL_CTRL_FRUITS.map((fruit, i) => (
                    <Selectable
                      key={fruit}
                      index={i}
                      id={`ext_s_${fruit.toLowerCase().replaceAll(" ", "_")}`}
                      value={fruit}
                      selected={selected === fruit}
                      flex
                      spacing="s"
                    >
                      <Selectable.Input />
                      {fruit}
                    </Selectable>
                  ))}
                </SelectableList>
                <div className="value-display">
                  Selected: {selected ?? "(none)"}
                </div>
              </div>
              <div>
                <div className="col-label">External controls</div>
                <div
                  style={{ display: "flex", flexDirection: "column", gap: 8 }}
                >
                  <select
                    value={targetId}
                    onChange={(e) => setTargetId(e.currentTarget.value)}
                    style={{
                      padding: "6px 8px",
                      borderRadius: 4,
                      border: "1px solid #ccc",
                    }}
                  >
                    {EXTERNAL_CTRL_FRUITS.map((f) => (
                      <option key={f} value={toSelectableId(f)}>
                        {f}
                      </option>
                    ))}
                  </select>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Button
                      action="select"
                      action-target="external-control-list"
                      value={targetId}
                    >
                      Select
                    </Button>
                    <Button
                      action="unselect"
                      action-target="external-control-list"
                      value={targetId}
                    >
                      Unselect
                    </Button>
                    <Button
                      action="scroll"
                      action-target="external-control-list"
                      value={targetId}
                    >
                      Scroll into view
                    </Button>
                  </div>
                  <div className="col-label" style={{ marginTop: 8 }}>
                    Action log
                  </div>
                  <CallLog entries={actionLog} />
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Form integration ───────────────────────────────────────────────────────

      const FormDemo = () => {
        const [submittedSingle, setSubmittedSingle] = useState(null);
        const [submittedMultiple, setSubmittedMultiple] = useState(null);
        const [selectedSingle, setSelectedSingle] = useState("Apple");
        const [selectedMultiple, setSelectedMultiple] = useState([
          "Apple",
          "Cherry",
        ]);
        return (
          <div id="form" className="demo-section">
            <h2>Form integration</h2>
            <p>
              <code>SelectableList</code> works inside a <code>Form</code>. The
              selected value is submitted under the list's <code>name</code>.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedSingle(fruit ?? "(none)");
                    setSelectedSingle(fruit ?? null);
                  }}
                >
                  <SelectableList name="fruit">
                    {FRUITS.map((fruit, i) => (
                      <Selectable
                        key={fruit}
                        index={i}
                        id={`form_s_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedSingle === fruit}
                        flex
                        spacing="s"
                      >
                        <Selectable.Input />
                        {fruit}
                      </Selectable>
                    ))}
                  </SelectableList>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedSingle !== null
                    ? `Submitted: ${submittedSingle}`
                    : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedMultiple(fruit);
                    setSelectedMultiple(fruit);
                  }}
                >
                  <SelectableList multiple name="fruit">
                    {FRUITS.map((fruit, i) => (
                      <Selectable
                        key={fruit}
                        index={i}
                        id={`form_m_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedMultiple.includes(fruit)}
                        flex
                        spacing="s"
                      >
                        <Selectable.Input />
                        {fruit}
                      </Selectable>
                    ))}
                  </SelectableList>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedMultiple !== null
                    ? `Submitted: ${submittedMultiple.length ? submittedMultiple.join(", ") : "(none)"}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ── Validation ─────────────────────────────────────────────────────────────

      const ValidationDemo = () => {
        const [selectedSingle, setSelectedSingle] = useState(null);
        const [selectedMultiple, setSelectedMultiple] = useState([]);
        const [submittedSingle, setSubmittedSingle] = useState(null);
        const [submittedMultiple, setSubmittedMultiple] = useState(null);
        return (
          <div id="validation" className="demo-section">
            <h2>Validation</h2>
            <p>
              Pass <code>required</code> to <code>SelectableList</code> to
              prevent form submission when nothing is selected. Try submitting
              without selecting anything.
            </p>
            <div className="two-col">
              <div>
                <div className="col-label">Single</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedSingle(fruit ?? "(none)");
                    setSelectedSingle(fruit);
                  }}
                >
                  <SelectableList name="fruit" required>
                    {FRUITS.map((fruit, i) => (
                      <Selectable
                        key={fruit}
                        index={i}
                        id={`val_s_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedSingle === fruit}
                        flex
                        spacing="s"
                      >
                        <Selectable.Input />
                        {fruit}
                      </Selectable>
                    ))}
                  </SelectableList>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedSingle !== null
                    ? `Submitted: ${submittedSingle}`
                    : ""}
                </div>
              </div>
              <div>
                <div className="col-label">Multiple</div>
                <Form
                  action={({ fruit }) => {
                    setSubmittedMultiple(fruit);
                    setSelectedMultiple(fruit);
                  }}
                >
                  <SelectableList multiple name="fruit" required>
                    {FRUITS.map((fruit, i) => (
                      <Selectable
                        key={fruit}
                        index={i}
                        id={`val_m_${fruit.toLowerCase()}`}
                        value={fruit}
                        selected={selectedMultiple.includes(fruit)}
                        flex
                        spacing="s"
                      >
                        <Selectable.Input />
                        {fruit}
                      </Selectable>
                    ))}
                  </SelectableList>
                  <Button type="submit" style={{ marginTop: 12 }}>
                    Submit
                  </Button>
                </Form>
                <div className="value-display">
                  {submittedMultiple !== null
                    ? `Submitted: ${submittedMultiple.length ? submittedMultiple.join(", ") : "(none)"}`
                    : ""}
                </div>
              </div>
            </div>
            <h3 style={{ marginTop: 24, marginBottom: 8 }}>
              Required + virtualized list (selected item scrolled out of DOM)
            </h3>
            <p>
              Apple is selected but the list is scrolled to the bottom so its
              DOM node is not rendered. <code>required</code> must still pass
              because selection is tracked in-memory, not via DOM queries.
            </p>
            <VirtualizedRequiredDemo />
            <h3 style={{ marginTop: 24, marginBottom: 8 }}>
              Required + filter hiding the selected item
            </h3>
            <p>
              Apple is selected but filtered out of the visible list. Its DOM
              node is absent yet <code>required</code> must still pass.
            </p>
            <FilteredRequiredDemo />
          </div>
        );
      };

      const LONG_FRUITS = [
        "Apple",
        "Apricot",
        "Avocado",
        "Banana",
        "Blackberry",
        "Blueberry",
        "Cherry",
        "Clementine",
        "Coconut",
        "Cranberry",
        "Date",
        "Dragonfruit",
        "Elderberry",
        "Fig",
        "Gooseberry",
        "Grape",
        "Grapefruit",
        "Guava",
        "Jackfruit",
        "Kiwi",
        "Kumquat",
        "Lemon",
        "Lime",
        "Lychee",
        "Mandarin",
        "Mango",
        "Melon",
        "Nectarine",
        "Orange",
        "Papaya",
        "Peach",
        "Pear",
        "Persimmon",
        "Pineapple",
        "Plum",
        "Pomelo",
        "Raspberry",
        "Starfruit",
        "Strawberry",
        "Tangerine",
        "Watermelon",
      ];

      const VirtualizedRequiredDemo = () => {
        const [selected, setSelected] = useState("Apple");
        const [submitted, setSubmitted] = useState(null);
        const listRef = useRef(null);

        useLayoutEffect(() => {
          const list = listRef.current;
          if (list) {
            const listScrollContainer = list.querySelector(
              ".navi_list_scroll_container",
            );
            listScrollContainer.scrollTop = listScrollContainer.scrollHeight;
          }
        }, []);

        return (
          <Form
            flex="y"
            alignX="start"
            spacing="m"
            action={({ fruit }) => {
              setSubmitted(fruit ?? "(none)");
              setSelected(fruit);
            }}
          >
            <SelectableList
              ref={listRef}
              name="fruit"
              required
              renderBudget={10}
              renderBudgetSkipCheck
              style={{ maxHeight: 160, overflowY: "auto" }}
              action={(v) => {
                setSelected(v ?? null);
              }}
            >
              {LONG_FRUITS.map((fruit, i) => (
                <Selectable
                  key={fruit}
                  index={i}
                  id={`vreq_${fruit.toLowerCase()}`}
                  value={fruit}
                  selected={selected === fruit}
                  flex
                  spacing="s"
                >
                  <Selectable.Input />
                  {fruit}
                </Selectable>
              ))}
            </SelectableList>
            <Button type="submit">Submit</Button>
            <div className="value-display">
              {submitted !== null ? `Submitted: ${submitted}` : ""}
            </div>
          </Form>
        );
      };

      const FilteredRequiredDemo = () => {
        const [selected, setSelected] = useState("Apple");
        const [submitted, setSubmitted] = useState(null);
        const [searchText, setSearchText] = useState("ban");
        const [matchingFruits, getFruitMatchInfo] = useSearchText(
          searchText,
          FRUITS,
        );

        return (
          <Form
            action={({ fruit }) => {
              setSubmitted(fruit ?? "(none)");
              setSelected(fruit);
            }}
          >
            <Input
              name="search"
              type="search"
              placeholder="Filter fruits…"
              navi-list="filtered-required-list"
              value={searchText}
              action={(v) => {
                setSearchText(v);
              }}
              marginBottom="m"
              borderRadius="xs"
              paddingX="s"
              paddingY="xs"
              expandX
            />
            <SelectableList
              id="filtered-required-list"
              name="fruit"
              required
              action={(v) => {
                setSelected(v ?? null);
              }}
              expandX
              separator
              noMatchFallback={
                <div
                  style={{ padding: 12, color: "#666", fontStyle: "italic" }}
                >
                  No fruits match your search.
                </div>

                    overflowEllipsis
                  >
                    {SHORT}
                  </Selectable>
                  <Selectable
                    index={1}
                    style={{ backgroundColor: BG_CONTENT }}
                    noWrap
                    overflowEllipsis
                  >
                    {URL}
                  </Selectable>
                </SelectableList>
              </Box>
              <Box flex="y" spacing="xs" alignX="start">
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  Complex item (label + address overflow)
                </strong>
                <div
                  style={{
                    border: "2px dotted #f59e0b",
                    padding: "4px",
                    maxWidth: "250px",
                  }}
                >
                  <SelectableList separator>
                    <Selectable index={0} style={{ backgroundColor: BG_SHORT }}>
                      {SHORT}
                    </Selectable>
                    <Selectable
                      index={1}
                      style={{ backgroundColor: BG_CONTENT }}
                    >
                      <PlaceItem />
                    </Selectable>
                  </SelectableList>
                </div>
              </Box>
              <Box flex="y" spacing="xs" alignX="start">
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  Complex item + overflowEllipsis
                </strong>
                <div
                  style={{
                    border: "2px dotted #f59e0b",
                    padding: "4px",
                    maxWidth: "250px",
                  }}
                >
                  <SelectableList separator>
                    <Selectable index={0} style={{ backgroundColor: BG_SHORT }}>
                      {SHORT}
                    </Selectable>
                    <Selectable
                      index={1}
                      style={{ backgroundColor: BG_CONTENT }}
                    >
                      <PlaceItem overflowEllipsis />
                    </Selectable>
                  </SelectableList>
                </div>
              </Box>
              <Box flex="y" spacing="xs" alignX="start">
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  Complex item right column
                </strong>
                <div
                  style={{
                    border: "2px dotted #f59e0b",
                    padding: "4px",
                    maxWidth: "250px",
                  }}
                >
                  <SelectableList separator>
                    <Selectable index={0} style={{ backgroundColor: BG_SHORT }}>
                      {SHORT}
                    </Selectable>
                    <Selectable
                      flex
                      spacing="xs"
                      index={1}
                      style={{ backgroundColor: BG_CONTENT }}
                    >
                      <Box>Coucou</Box>
                      <PlaceItem />
                    </Selectable>
                  </SelectableList>
                </div>
              </Box>
              <Box flex="y" spacing="xs" alignX="start">
                <strong style={{ fontSize: "0.8rem", color: "#888" }}>
                  Complex item right column + overflowEllipsis
                </strong>
                <div
                  style={{
                    border: "2px dotted #f59e0b",
                    padding: "4px",
                    maxWidth: "250px",
                  }}
                >
                  <SelectableList separator>
                    <Selectable index={0} style={{ backgroundColor: BG_SHORT }}>
                      {SHORT}
                    </Selectable>
                    <Selectable
                      flex
                      spacing="xs"
                      index={1}
                      style={{ backgroundColor: BG_CONTENT }}
                    >
                      <Box>Coucou</Box>
                      <PlaceItem overflowEllipsis />
                    </Selectable>
                  </SelectableList>
                </div>
              </Box>
            </Box>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
