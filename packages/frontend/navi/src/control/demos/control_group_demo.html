<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ControlGroup Demo</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        Box,
        Button,
        ControlGroup,
        Field,
        Form,
        Input,
      } from "@jsenv/navi";
      import { NaviDebug } from "@jsenv/navi";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";

      const App = () => {
        return (
          <Box flex="y" spacing="xl" alignX="start" padding="m" maxWidth="640">
            <h1>ControlGroup</h1>
            <p style={{ margin: 0, color: "#555" }}>
              <code>ControlGroup</code> aggregates the values of its child
              controls into a single composite object — like a sub-form. It
              supports its own <code>action</code>, <code>command</code>,
              disabled, and read-only propagation, and can live inside or
              outside a <code>&lt;Form&gt;</code>.
            </p>

            {/* ── Standalone ────────────────────────────────────────────── */}
            <section>
              <h2>Standalone (outside a Form)</h2>
              <p style={{ color: "#555", fontSize: "0.9rem" }}>
                The group acts like a mini-form. Clicking "Submit group" fires
                its <code>action</code> with the aggregated object.
              </p>
              <StandaloneDemo />
            </section>

            {/* ── Inside a Form ────────────────────────────────────────── */}
            <section>
              <h2>Inside a Form</h2>
              <p style={{ color: "#555", fontSize: "0.9rem" }}>
                Fields inside the <code>ControlGroup</code> report to the group
                (its composite value is one key in the form state), while the
                field outside reports directly to the form.
              </p>
              <InsideFormDemo />
            </section>
          </Box>
        );
      };

      const StandaloneDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <ControlGroup
              name="address"
              action={(value) => {
                pushEntry("action", value);
              }}
              uiAction={(value) => {
                pushEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  <label>First name</label>
                  <Input type="text" name="firstName" />
                </Field>
                <Field>
                  <label>Last name</label>
                  <Input type="text" name="lastName" />
                </Field>
                <Button.Send />
              </Box>
            </ControlGroup>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const InsideFormDemo = () => {
        const [formEntries, pushFormEntry, clearFormEntries] = useCallLog();
        const [groupEntries, pushGroupEntry, clearGroupEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m">
            <Form
              action={(value) => {
                pushFormEntry("action", value);
              }}
              uiAction={(value) => {
                pushFormEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s">
                {/* This field belongs directly to the Form */}
                <Field>
                  <label>Email (form-level field)</label>
                  <Input type="email" name="email" />
                </Field>

                {/* This group produces one "address" key in the form value */}
                <fieldset>
                  <legend>Address (ControlGroup)</legend>
                  <ControlGroup
                    name="address"
                    uiAction={(value) => {
                      pushGroupEntry("uiAction", value);
                    }}
                  >
                    <Box flex="y" spacing="s">
                      <Field>
                        <label>Street</label>
                        <Input type="text" name="street" />
                      </Field>
                      <Field>
                        <label>City</label>
                        <Input type="text" name="city" />
                      </Field>
                    </Box>
                  </ControlGroup>
                </fieldset>

                <Button command="--navi-send">Submit form</Button>
              </Box>
            </Form>
            <p style={{ margin: 0, fontSize: "0.85rem", color: "#555" }}>
              ControlGroup calls:
            </p>
            <CallLog entries={groupEntries} onClear={clearGroupEntries} />
            <p style={{ margin: 0, fontSize: "0.85rem", color: "#555" }}>
              Form calls:
            </p>
            <CallLog entries={formEntries} onClear={clearFormEntries} />
          </Box>
        );
      };

      render(
        <NaviDebug debugCommand debugAction>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
