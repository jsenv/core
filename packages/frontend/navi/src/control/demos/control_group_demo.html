<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ControlGroup Demo</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        Box,
        Button,
        ControlGroup,
        Field,
        Form,
        Input,
        List,
        Picker,
        SelectableInput,
      } from "@jsenv/navi";
      import { NaviDebug } from "@jsenv/navi";
      import { signal } from "@preact/signals";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";

      const firstNameStateSignal = signal("Jean");
      const inputSignal = signal("");

      const App = () => {
        return (
          <Box flex="y" spacing="xl" alignX="start" padding="m" maxWidth="640">
            <h1>ControlGroup</h1>

            <nav>
              <ol>
                <li>
                  <a href="#external-control">
                    Contrôle externe (--navi-update)
                  </a>
                  <ol>
                    <li>
                      <a href="#external-control-object">
                        ControlGroup (objet nommé)
                      </a>
                    </li>
                    <li>
                      <a href="#external-control-single">
                        SelectableList (valeur unique)
                      </a>
                    </li>
                    <li>
                      <a href="#external-control-multiple">
                        SelectableList (valeurs multiples)
                      </a>
                    </li>
                    <li>
                      <a href="#picker-text-external">Picker texte simple</a>
                    </li>
                    <li>
                      <a href="#picker-controlgroup-external">
                        Picker ControlGroup
                      </a>
                    </li>
                  </ol>
                </li>
                <li>
                  <a href="#standalone-basic">Standalone — basique</a>
                </li>
                <li>
                  <a href="#standalone-clear">Standalone — Button.Clear</a>
                </li>
                <li>
                  <a href="#clear-signal">
                    Button.Clear + uiAction input + signal
                  </a>
                </li>
                <li>
                  <a href="#standalone-reset">Standalone — Button.Reset</a>
                </li>
                <li>
                  <a href="#number-empty">Number — sans valeur</a>
                </li>
                <li>
                  <a href="#text-required">Text — required</a>
                </li>
                <li>
                  <a href="#validation">Validation</a>
                </li>
                <li>
                  <a href="#inside-form">Inside a Form</a>
                </li>
              </ol>
            </nav>

            <section id="external-control">
              <h2>Contrôle externe (--navi-update)</h2>

              <section id="external-control-object">
                <h3>ControlGroup (objet nommé)</h3>
                <ExternalControlDemo />
              </section>

              <section id="external-control-single">
                <h3>SelectableList (valeur unique)</h3>
                <ExternalSelectableDemo />
              </section>

              <section id="external-control-multiple">
                <h3>SelectableList (valeurs multiples)</h3>
                <ExternalSelectableMultipleDemo />
              </section>

              <section id="picker-text-external">
                <h3>Picker texte simple</h3>
                <PickerTextExternalDemo />
              </section>

              <section id="picker-controlgroup-external">
                <h3>Picker ControlGroup</h3>
                <PickerControlGroupExternalDemo />
              </section>
            </section>

            <section id="standalone-basic">
              <h2>Standalone — basique</h2>
              <StandaloneDemo />
            </section>

            <section id="standalone-clear">
              <h2>Standalone — Button.Clear</h2>
              <StandaloneClearDemo />
            </section>

            <section id="clear-signal">
              <h2>Button.Clear + uiAction input + signal</h2>
              <ClearSignalDemo />
            </section>

            <section id="standalone-reset">
              <h2>Standalone — Button.Reset</h2>
              <StandaloneResetDemo />
            </section>

            <section id="number-empty">
              <h2>Number — sans valeur</h2>
              <NumberEmptyDemo />
            </section>

            <section id="text-required">
              <h2>Text — required</h2>
              <TextRequiredDemo />
            </section>

            <section id="validation">
              <h2>Validation</h2>
              <StandaloneRequiredDemo />
            </section>

            <section id="inside-form">
              <h2>Inside a Form</h2>
              <InsideFormDemo />
            </section>
          </Box>
        );
      };

      const LABELS = ["Alpha", "Beta", "Gamma"];

      const PickerTextExternalDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();
        const pickerId = "picker-text-external-picker";

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Un <code>Input</code> texte à l'intérieur du picker. Les boutons
              extérieurs envoient <code>--navi-update</code> — l'input interne
              doit être mis à jour et son <code>uiAction</code> déclenché.
            </p>
            <Field>
              Label
              <Picker
                id={pickerId}
                name="label"
                placeholder="Saisir un label"
                uiAction={(v) => {
                  pushEntry("uiAction (picker)", v);
                }}
                action={(v) => {
                  pushEntry("action (picker)", v);
                }}
              >
                <Box flex="y" spacing="s" padding="s" alignX="start">
                  <Input
                    name="label"
                    placeholder="Texte libre"
                    uiAction={(v) => {
                      pushEntry("uiAction (input)", v);
                    }}
                  />
                  <Box flex="x" spacing="s">
                    <Button command="--navi-send">Confirmer</Button>
                    <Button command="--navi-cancel">Annuler</Button>
                  </Box>
                </Box>
              </Picker>
            </Field>
            <Box flex="x" spacing="s">
              {LABELS.map((label) => (
                <Button
                  key={label}
                  command="--navi-update"
                  commandfor={pickerId}
                  value={label}
                >
                  {label}
                </Button>
              ))}
              <Button command="--navi-clear" commandfor={pickerId}>
                Vider
              </Button>
            </Box>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const PickerControlGroupExternalDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();
        const pickerId = "picker-controlgroup-external-picker";

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Des boutons extérieurs envoient <code>--navi-update</code> avec
              une valeur objet sur un <code>Picker type="controlgroup"</code>.
              Les champs internes doivent se mettre à jour et le{" "}
              <code>uiAction</code> doit être appelé.
            </p>
            <Field>
              Adresse
              <Picker
                id={pickerId}
                name="address"
                type="controlgroup"
                placeholder="Saisir une adresse"
                uiAction={(v) => {
                  pushEntry("uiAction", v);
                }}
                action={(v) => {
                  pushEntry("action", v);
                }}
              >
                <ControlGroup>
                  <Box flex="y" spacing="s" padding="s" alignX="start">
                    <Field>
                      Rue
                      <Input
                        name="street"
                        placeholder="Street"
                        uiAction={(v) => {
                          pushEntry("uiAction (street)", v);
                        }}
                      />
                    </Field>
                    <Field>
                      Ville
                      <Input
                        name="city"
                        placeholder="City"
                        uiAction={(v) => {
                          pushEntry("uiAction (city)", v);
                        }}
                      />
                    </Field>
                  </Box>
                </ControlGroup>
              </Picker>
            </Field>
            <Box flex="x" spacing="s">
              <Button
                command="--navi-update"
                commandfor={pickerId}
                value={{ street: "12 rue de la Paix", city: "Paris" }}
              >
                Paris
              </Button>
              <Button
                command="--navi-update"
                commandfor={pickerId}
                value={{ street: "1 place Bellecour", city: "Lyon" }}
              >
                Lyon
              </Button>
              <Button command="--navi-clear" commandfor={pickerId}>
                Vider
              </Button>
              <Button command="--navi-send" commandfor={pickerId}>
                Envoyer
              </Button>
            </Box>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const ExternalControlDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();
        const cgId = "external-control-object-cg";

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Des boutons extérieurs envoient <code>--navi-update</code> avec
              une valeur objet sur le ControlGroup. Les champs doivent se mettre
              à jour et les <code>uiAction</code> des inputs doivent être
              appelés (pour syncer les signaux).
            </p>
            <ControlGroup
              id={cgId}
              name="contact"
              action={(v) => {
                pushEntry("action (group)", v);
              }}
              uiAction={(v) => {
                pushEntry("uiAction (group)", v);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  First name
                  <Input
                    type="text"
                    name="firstName"
                    uiAction={(v) => {
                      pushEntry("uiAction (firstName)", v);
                    }}
                  />
                </Field>
                <Field>
                  Last name
                  <Input
                    type="text"
                    name="lastName"
                    uiAction={(v) => {
                      pushEntry("uiAction (lastName)", v);
                    }}
                  />
                </Field>
                <Button.Send />
              </Box>
            </ControlGroup>
            <Box flex="x" spacing="s">
              <Button
                command="--navi-update"
                commandfor={cgId}
                value={{ firstName: "Jean", lastName: "Dupont" }}
              >
                Set Jean Dupont
              </Button>
              <Button
                command="--navi-update"
                commandfor={cgId}
                value={{ firstName: "Marie", lastName: "Curie" }}
              >
                Set Marie Curie
              </Button>
              <Button
                command="--navi-update"
                commandfor={cgId}
                value={{ firstName: "", lastName: "" }}
              >
                Vider
              </Button>
            </Box>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const ExternalSelectableDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();
        const listId = "external-control-single-list";
        const FRUITS = ["Apple", "Banana", "Cherry", "Date", "Elderberry"];

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Des boutons extérieurs envoient <code>--navi-update</code> avec
              une valeur scalaire sur une <code>List selectable</code> (radio
              group). La sélection doit se mettre à jour et le{" "}
              <code>uiAction</code> de la liste doit être appelé.
            </p>
            {/* Contour du groupe */}
            <Box
              flex="y"
              spacing="m"
              alignX="start"
              padding="m"
              border="2px solid #6366f1"
              borderRadius="6px"
            >
              <span
                style={{
                  fontSize: "0.75rem",
                  color: "#6366f1",
                  fontWeight: "bold",
                  marginTop: "-4px",
                }}
              >
                Groupe
              </span>
              {/* Contour des champs */}
              <Box border="1px solid #a5b4fc" borderRadius="4px" padding="s">
                <span style={{ fontSize: "0.7rem", color: "#a5b4fc" }}>
                  Champs
                </span>
                <List
                  id={listId}
                  selectable
                  uiAction={(v) => {
                    pushEntry("uiAction", v);
                  }}
                  action={(v) => {
                    pushEntry("action", v);
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <List.Item
                      selectable
                      key={fruit}
                      id={`external-single-${fruit.toLowerCase()}`}
                      index={i}
                      value={fruit}
                      flex
                      spacing="s"
                    >
                      <SelectableInput />
                      {fruit}
                    </List.Item>
                  ))}
                </List>
              </Box>
              {/* Contour des commandes */}
              <Box
                flex="x"
                spacing="s"
                border="1px solid #f9a8d4"
                borderRadius="4px"
                padding="s"
              >
                <span
                  style={{
                    fontSize: "0.7rem",
                    color: "#f9a8d4",
                    alignSelf: "center",
                  }}
                >
                  Cmds
                </span>
                {FRUITS.map((fruit) => (
                  <Button
                    key={fruit}
                    command="--navi-update"
                    commandfor={listId}
                    value={fruit}
                  >
                    {fruit}
                  </Button>
                ))}
                <Button
                  command="--navi-update"
                  commandfor={listId}
                  value={null}
                >
                  Désélectionner
                </Button>
                <Button command="--navi-send" commandfor={listId}>
                  Envoyer
                </Button>
              </Box>
            </Box>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const ExternalSelectableMultipleDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();
        const listId = "external-control-multiple-list";
        const FRUITS = ["Apple", "Banana", "Cherry", "Date", "Elderberry"];

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Des boutons extérieurs envoient <code>--navi-update</code> avec
              une valeur tableau sur une <code>List selectable multiple</code>{" "}
              (checkbox group). La sélection doit se mettre à jour et le{" "}
              <code>uiAction</code> de la liste doit être appelé.
            </p>
            {/* Contour du groupe */}
            <Box
              flex="y"
              spacing="m"
              alignX="start"
              padding="m"
              border="2px solid #6366f1"
              borderRadius="6px"
            >
              <span
                style={{
                  fontSize: "0.75rem",
                  color: "#6366f1",
                  fontWeight: "bold",
                  marginTop: "-4px",
                }}
              >
                Groupe
              </span>
              {/* Contour des champs */}
              <Box border="1px solid #a5b4fc" borderRadius="4px" padding="s">
                <span style={{ fontSize: "0.7rem", color: "#a5b4fc" }}>
                  Champs
                </span>
                <List
                  id={listId}
                  selectable
                  multiple
                  uiAction={(v) => {
                    pushEntry("uiAction", JSON.stringify(v));
                  }}
                  action={(v) => {
                    pushEntry("action", JSON.stringify(v));
                  }}
                  expandX
                >
                  {FRUITS.map((fruit, i) => (
                    <List.Item
                      selectable
                      key={fruit}
                      id={`external-multiple-${fruit.toLowerCase()}`}
                      index={i}
                      value={fruit}
                      flex
                      spacing="s"
                    >
                      <SelectableInput />
                      {fruit}
                    </List.Item>
                  ))}
                </List>
              </Box>
              {/* Contour des commandes */}
              <Box
                flex="x"
                spacing="s"
                border="1px solid #f9a8d4"
                borderRadius="4px"
                padding="s"
              >
                <span
                  style={{
                    fontSize: "0.7rem",
                    color: "#f9a8d4",
                    alignSelf: "center",
                  }}
                >
                  Cmds
                </span>
                <Button
                  command="--navi-update"
                  commandfor={listId}
                  value={["Apple", "Cherry"]}
                >
                  Apple + Cherry
                </Button>
                <Button
                  command="--navi-update"
                  commandfor={listId}
                  value={["Banana", "Date", "Elderberry"]}
                >
                  Banana + Date + Elderberry
                </Button>
                <Button command="--navi-update" commandfor={listId} value={[]}>
                  Tout désélectionner
                </Button>
                <Button command="--navi-send" commandfor={listId}>
                  Envoyer
                </Button>
              </Box>
            </Box>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const StandaloneDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              ControlGroup sans parent — agit comme un mini-formulaire.
            </p>
            <ControlGroup
              name="address"
              action={(value) => {
                pushEntry("action", value);
              }}
              uiAction={(value) => {
                pushEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  First name
                  <Input type="text" name="firstName" />
                </Field>
                <Field>
                  Last name
                  <Input type="text" name="lastName" />
                </Field>
                <Button.Send />
              </Box>
            </ControlGroup>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const ClearSignalDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Le <code>uiAction</code> est sur l'input (pas sur le
              ControlGroup). Cliquer <code>Button.Clear</code> doit vider
              l'input et déclencher le <code>uiAction</code> de l'input — ce qui
              remet le signal à <code>""</code>.
            </p>
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Signal courant :{" "}
              <strong>
                {inputSignal.value === "" ? "(vide)" : inputSignal.value}
              </strong>
            </p>
            <ControlGroup
              name="info"
              action={(value) => {
                pushEntry("action", value);
              }}
              uiAction={(value) => {
                pushEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  Label
                  <Input
                    type="text"
                    name="label"
                    uiAction={(v) => {
                      inputSignal.value = v;
                      pushEntry("uiAction (input)", v);
                    }}
                  />
                </Field>
                <Box flex="x" spacing="s">
                  <Button.Clear />
                  <Button.Send />
                </Box>
              </Box>
            </ControlGroup>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const StandaloneClearDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              <code>Button.Clear</code> réinitialise tous les champs à vide
              (chaîne vide). C'est le bouton à privilégier pour permettre à
              l'utilisateur de repartir de zéro.
            </p>
            <ControlGroup
              name="address"
              action={(value) => {
                pushEntry("action", value);
              }}
              uiAction={(value) => {
                pushEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  First name
                  <Input type="text" name="firstName" defaultValue="Jean" />
                </Field>
                <Field>
                  Last name
                  <Input type="text" name="lastName" defaultValue="Dupont" />
                </Field>
                <Box flex="x" spacing="s">
                  <Button.Clear />
                  <Button.Send />
                </Box>
              </Box>
            </ControlGroup>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const StandaloneResetDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              <code>Button.Reset</code> remet les champs à leur{" "}
              <code>defaultValue</code>. Si un champ n'a pas de{" "}
              <code>defaultValue</code>, il revient à vide. À utiliser quand on
              veut annuler les modifications sans effacer les valeurs initiales.
            </p>
            <ControlGroup
              name="address"
              action={(value) => {
                pushEntry("action", value);
              }}
              uiAction={(value) => {
                pushEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  First name (defaultValue="Jean")
                  <Input type="text" name="firstName" defaultValue="Jean" />
                </Field>
                <Field>
                  Last name (no defaultValue)
                  <Input type="text" name="lastName" />
                </Field>
                <Field>
                  Nick name (value=signal "Jean")
                  <Input
                    type="text"
                    name="nickName"
                    value={firstNameStateSignal.value}
                  />
                </Field>
                <Box flex="x" spacing="s">
                  <Button.Reset />
                  <Button.Send />
                </Box>
              </Box>
            </ControlGroup>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const NumberEmptyDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Un <code>Input type="number"</code> sans valeur — est-ce qu'on
              peut soumettre ?
            </p>
            <ControlGroup
              name="qty"
              action={(value) => {
                pushEntry("action", value);
              }}
              uiAction={(value) => {
                pushEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  Quantity
                  <Input type="number" name="quantity" />
                </Field>
                <Button.Send />
              </Box>
            </ControlGroup>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const TextRequiredDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Un <code>Input type="text" required</code> — soumettre sans le
              remplir doit bloquer l'action.
            </p>
            <ControlGroup
              name="info"
              action={(value) => {
                pushEntry("action", value);
              }}
              uiAction={(value) => {
                pushEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  Label
                  <Input type="text" name="label" required />
                </Field>
                <Button.Send />
              </Box>
            </ControlGroup>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const StandaloneRequiredDemo = () => {
        const [entries, pushEntry, clearEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m" alignX="start">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Même chose avec <code>firstName</code> requis — soumettre sans le
              remplir doit bloquer l'action.
            </p>
            <ControlGroup
              name="address"
              action={(value) => {
                pushEntry("action", value);
              }}
              uiAction={(value) => {
                pushEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  First name
                  <Input type="text" name="firstName" required />
                </Field>
                <Field>
                  Last name
                  <Input type="text" name="lastName" />
                </Field>
                <Button.Send />
              </Box>
            </ControlGroup>
            <CallLog entries={entries} onClear={clearEntries} />
          </Box>
        );
      };

      const InsideFormDemo = () => {
        const [formEntries, pushFormEntry, clearFormEntries] = useCallLog();
        const [groupEntries, pushGroupEntry, clearGroupEntries] = useCallLog();

        return (
          <Box flex="y" spacing="m">
            <p style={{ margin: 0, color: "#555", fontSize: "0.9rem" }}>
              Le ControlGroup (<code>name="address"</code>) produit une clé{" "}
              <code>address</code> dans la valeur du Form parent.
            </p>
            <Form
              action={(value) => {
                pushFormEntry("action", value);
              }}
              uiAction={(value) => {
                pushFormEntry("uiAction", value);
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <Field>
                  Name
                  <Input type="text" name="name" />
                </Field>
                <fieldset>
                  <legend>Address</legend>
                  <ControlGroup
                    name="address"
                    uiAction={(value) => {
                      pushGroupEntry("uiAction", value);
                    }}
                    required
                  >
                    <Box flex="y" spacing="s" alignX="start">
                      <Field>
                        Street
                        <Input type="text" name="street" />
                      </Field>
                      <Field>
                        City
                        <Input type="text" name="city" />
                      </Field>
                    </Box>
                  </ControlGroup>
                </fieldset>
                <Button.Send />
              </Box>
            </Form>
            <p style={{ margin: 0, fontSize: "0.85rem", color: "#777" }}>
              ControlGroup
            </p>
            <CallLog entries={groupEntries} onClear={clearGroupEntries} />
            <p style={{ margin: 0, fontSize: "0.85rem", color: "#777" }}>
              Form
            </p>
            <CallLog entries={formEntries} onClear={clearFormEntries} />
          </Box>
        );
      };

      render(
        <NaviDebug debugCommand debugAction debugInteraction debugUIState>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
