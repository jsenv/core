<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Control Validity Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .page-description {
        margin: -20px 0 30px;
        color: #666;
        font-size: 0.95rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 20px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 16px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.2rem;
        border-bottom: 2px solid #ddd;
      }

      .demo-section > p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 24px;
      }

      .col {
        display: flex;
        min-width: 200px;
        flex-direction: column;
        gap: 8px;
      }

      nav ol {
        margin: 0;
        padding-left: 20px;
        line-height: 2;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useRef, useState } from "preact/hooks";
      import {
        Input,
        Button,
        Label,
        Field,
        Form,
        Box,
        NaviDebug,
      } from "@jsenv/navi";
      import { ControlValidityDebug } from "../utils/control_validity_debug.jsx";

      // ─── Section 1: uiAction vs action ──────────────────────────────────────────
      // uiAction fires on every keystroke; action fires only when value is committed
      // (blur / Enter for standalone input, form submit for form input).
      const UiActionVsActionDemo = () => {
        const inputRef = useRef();
        const [liveValue, setLiveValue] = useState("");
        const [committedValue, setCommittedValue] = useState("");

        return (
          <div className="demo-section">
            <h2>uiAction vs action — when does validation trigger?</h2>
            <p>
              <code>uiAction</code> is called on every keystroke (live).{" "}
              <code>action</code> is called only when the value is committed
              (blur or Enter). The validity debug panel updates in real time:
              notice how the constraint is re-evaluated on every key press, but
              the committed value only changes on blur/Enter.
            </p>
            <Box flex="y" spacing="s">
              <Field vertical>
                <Label>Username (min 4 chars)</Label>
                <Input
                  ref={inputRef}
                  name="username"
                  minLength="4"
                  placeholder="type something…"
                  autoComplete="off"
                  data-callout-position="above"
                  uiAction={(username) => {
                    setLiveValue(username);
                  }}
                  action={(username) => {
                    setCommittedValue(username);
                  }}
                />
              </Field>
              <Box
                flex="y"
                spacing="xs"
                style={{ fontSize: "0.85rem", color: "#555" }}
              >
                <span>
                  🖊 live (uiAction):{" "}
                  <strong>{JSON.stringify(liveValue)}</strong>
                </span>
                <span>
                  💾 committed (action):{" "}
                  <strong>{JSON.stringify(committedValue)}</strong>
                </span>
              </Box>
              <ControlValidityDebug
                inputRef={inputRef}
                committedValue={committedValue}
              />
            </Box>
          </div>
        );
      };

      // ─── Section 3: required ─────────────────────────────────────────────────────
      // required makes an empty value invalid.
      const RequiredDemo = () => {
        const inputRef = useRef();
        const [liveValue, setLiveValue] = useState("");
        const [committedValue, setCommittedValue] = useState("");

        return (
          <div className="demo-section">
            <h2>required — empty value is invalid</h2>
            <p>
              Without <code>required</code>, an empty input is valid even when{" "}
              <code>minLength</code> is set — length constraints only apply once
              the user starts typing. Adding <code>required</code> makes the
              empty value invalid on its own.
            </p>
            <Box flex="y" spacing="s">
              <Field vertical>
                <Label>Required field (minLength 4)</Label>
                <Input
                  ref={inputRef}
                  name="required_field"
                  required
                  minLength="4"
                  placeholder="type something…"
                  autoComplete="off"
                  uiAction={(value) => {
                    setLiveValue(value);
                  }}
                  action={(value) => {
                    setCommittedValue(value);
                  }}
                />
              </Field>
              <Box
                flex="y"
                spacing="xs"
                style={{ fontSize: "0.85rem", color: "#555" }}
              >
                <span>
                  🖊 live (uiAction):{" "}
                  <strong>{JSON.stringify(liveValue)}</strong>
                </span>
                <span>
                  💾 committed (action):{" "}
                  <strong>{JSON.stringify(committedValue)}</strong>
                </span>
              </Box>
              <ControlValidityDebug
                inputRef={inputRef}
                committedValue={committedValue}
              />
            </Box>
          </div>
        );
      };

      // ─── Section 4: Form — action fires on submit ────────────────────────────────
      const FormActionDemo = () => {
        const inputRef = useRef();
        const [committed, setCommitted] = useState("—");

        return (
          <div className="demo-section">
            <h2>Form — action fires on submit only</h2>
            <p>
              Inside a <code>{"<Form>"}</code> the input's own{" "}
              <code>action</code> is not triggered on blur. It fires only when
              the form is submitted (and all fields pass validation). Type an
              invalid value and blur — no commit. Submit with a valid value —
              commit happens.
            </p>
            <Box flex="y" spacing="s">
              <Form
                action={({ username }) => {
                  setCommitted(username ?? "");
                }}
              >
                <Field vertical>
                  <Label>Username (min 4 chars)</Label>
                  <Input
                    ref={inputRef}
                    name="username"
                    required
                    minLength="4"
                    placeholder="type something…"
                    autoComplete="off"
                  />
                </Field>
                <Button type="submit" style={{ marginTop: "8px" }}>
                  Submit
                </Button>
              </Form>
              <Box
                flex="y"
                spacing="xs"
                style={{ fontSize: "0.85rem", color: "#555" }}
              >
                <span>
                  💾 committed (action):{" "}
                  <strong>{JSON.stringify(committed)}</strong>
                </span>
              </Box>
              <ControlValidityDebug
                inputRef={inputRef}
                committedValue={committed}
              />
            </Box>
          </div>
        );
      };

      // ─── Section 2: Readonly — interaction state vs validity state ───────────────
      // "readonly" is an interaction constraint (prevents edits), but the value's
      // validity is still evaluated and reported — it is NOT always valid.
      const ReadonlyVsValidityDemo = () => {
        const readonlyRef = useRef();

        return (
          <div className="demo-section">
            <h2>Readonly — interaction state vs validity state</h2>
            <p>
              <code>readonly</code> prevents the user from editing the value,
              but it does <em>not</em> bypass validity. Constraints such as{" "}
              <code>minLength</code> are still evaluated and reported — a
              readonly input with an invalid value is still invalid.
            </p>
            <Box flex="y" spacing="s">
              <Field vertical>
                <Label>Readonly (minLength 6, value "hi")</Label>
                <Input
                  ref={readonlyRef}
                  name="readonly_field"
                  minLength="6"
                  value="hi"
                  readOnly
                />
              </Field>
              <ControlValidityDebug inputRef={readonlyRef} />
            </Box>
          </div>
        );
      };

      // ─── Section 4: --navi-update command ────────────────────────────────────────
      // --navi-update is blocked by readonly — it does NOT bypass interaction
      // constraints. Only a validatable (non-readonly) input can be updated.
      const NaviUpdateDemo = () => {
        const readonlyRef = useRef();
        const validatableRef = useRef();

        return (
          <div className="demo-section">
            <h2>--navi-update command — set a value via button</h2>
            <p>
              A button with <code>command="--navi-update"</code> requests a
              value change on the target input.{" "}
              <strong>It does not bypass readonly</strong> — the command is
              blocked just like a user edit would be.
            </p>

            <div className="row" style={{ marginBottom: "24px" }}>
              <div className="col">
                <h2 style={{ fontSize: "0.9rem", color: "#555" }}>
                  Readonly input
                </h2>
                <p style={{ margin: 0, fontSize: "0.85rem", color: "#888" }}>
                  --navi-update is blocked — the readonly constraint prevents
                  any value change, programmatic or not.
                </p>
                <Field vertical>
                  <Label>Config value (readonly)</Label>
                  <Input
                    ref={readonlyRef}
                    name="config"
                    id="config"
                    value="initial"
                    readOnly
                  />
                </Field>
                <Box flex spacing="s" style={{ flexWrap: "wrap" }}>
                  <Button
                    command="--navi-update"
                    commandFor="config"
                    value="updated"
                  >
                    Set "updated" (blocked)
                  </Button>
                </Box>
              </div>
              <ControlValidityDebug inputRef={readonlyRef} />
            </div>

            <div className="row">
              <div className="col">
                <h2 style={{ fontSize: "0.9rem", color: "#555" }}>
                  Validatable input (minLength 5)
                </h2>
                <p style={{ margin: 0, fontSize: "0.85rem", color: "#888" }}>
                  Not readonly — the update goes through. Setting an invalid
                  value shows the violation; a valid value clears it.
                </p>
                <Field vertical>
                  <Label>Code (min 5 chars)</Label>
                  <Input
                    ref={validatableRef}
                    name="code"
                    id="code"
                    defaultValue="hello"
                    minLength="5"
                  />
                </Field>
                <Box flex spacing="s" style={{ flexWrap: "wrap" }}>
                  <Button command="--navi-update" commandFor="code" value="ab">
                    Set "ab" (invalid)
                  </Button>
                  <Button
                    command="--navi-update"
                    commandFor="code"
                    defaultValue="hello"
                  >
                    Set "hello" (valid)
                  </Button>
                </Box>
              </div>
              <ControlValidityDebug inputRef={validatableRef} />
            </div>
          </div>
        );
      };

      // ─── App ─────────────────────────────────────────────────────────────────────
      const App = () => (
        <div>
          <h1>Control Validity Demo</h1>
          <p className="page-description">
            Explore how validity state works: when constraints are evaluated,
            the difference between interaction state (readonly) and validity
            state, and how <code>--navi-update</code> is blocked by readonly
            just like a user edit would be.
          </p>
          <nav style={{ marginBottom: "32px" }}>
            <ol>
              <li>
                <a href="#uiaction-vs-action">
                  uiAction vs action — when does validation trigger?
                </a>
              </li>
              <li>
                <a href="#readonly">
                  Readonly — interaction state vs validity state
                </a>
              </li>
              <li>
                <a href="#required">required — empty value is invalid</a>
              </li>
              <li>
                <a href="#form">Form — action fires on submit only</a>
              </li>
              <li>
                <a href="#navi-update">
                  --navi-update command — set a value via button
                </a>
              </li>
            </ol>
          </nav>
          <div id="uiaction-vs-action">
            <UiActionVsActionDemo />
          </div>
          <div id="readonly">
            <ReadonlyVsValidityDemo />
          </div>
          <div id="required">
            <RequiredDemo />
          </div>
          <div id="form">
            <FormActionDemo />
          </div>
          <div id="navi-update">
            <NaviUpdateDemo />
          </div>
        </div>
      );

      render(
        <NaviDebug debugUIState>
          <App />
        </NaviDebug>,
        document.getElementById("root"),
      );
    </script>
  </body>
</html>
