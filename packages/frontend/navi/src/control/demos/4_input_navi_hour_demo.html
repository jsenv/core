<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Input Navi Hour Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Input Navi Hour Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Button,
        Field,
        Form,
        Label,
        Input,
        NaviDebug,
      } from "@jsenv/navi";

      // ── TOC ───────────────────────────────────────────────────────────────
      const TOC = () => (
        <nav style="margin-bottom:32px">
          <strong>Contents</strong>
          <ol style="margin:8px 0 0;padding-left:20px;line-height:2">
            <li>
              <a href="#default">Default behavior</a>
            </li>
            <li>
              <a href="#min">min</a>
              <ol style="padding-left:16px;line-height:2">
                <li>
                  <a href="#min-basic">Basic min</a>
                </li>
                <li>
                  <a href="#min-negative">
                    Negative min (allows negative values)
                  </a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#max">max</a>
              <ol style="padding-left:16px;line-height:2">
                <li>
                  <a href="#max-basic">Basic max</a>
                </li>
                <li>
                  <a href="#max-large">Large max (3 digits)</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#step">step</a>
              <ol style="padding-left:16px;line-height:2">
                <li>
                  <a href="#step-basic">Integer step</a>
                </li>
                <li>
                  <a href="#step-float">Float step (decimal values)</a>
                </li>
                <li>
                  <a href="#step-negative">Float step with negative min</a>
                </li>
              </ol>
            </li>
          </ol>
        </nav>
      );

      // ── Shared helpers ────────────────────────────────────────────────────
      const CallLog = ({ entries }) => {
        if (entries.length === 0) {
          return null;
        }
        return (
          <div style="margin-top:12px;font-size:12px;color:#555;border-top:1px solid #eee;padding-top:8px">
            <strong>Call log</strong>
            <ol style="margin:4px 0 0;padding-left:20px">
              {entries.map((entry, i) => (
                <li key={i} style="font-family:monospace">
                  {entry}
                </li>
              ))}
            </ol>
          </div>
        );
      };

      const useCallLog = () => {
        const logSignal = useSignal([]);
        const log = (label, value) => {
          logSignal.value = [
            ...logSignal.value,
            `${label}(${JSON.stringify(value)})`,
          ];
        };
        return [logSignal, log];
      };

      const DemoForm = ({
        id,
        title,
        desc,
        children,
        inputProps,
        initialValue,
        name = "hour",
      }) => {
        const valueSignal = useSignal(initialValue);
        const submitSignal = useSignal(null);
        const [logSignal, log] = useCallLog();
        return (
          <div class="demo-section" id={id}>
            <h2>{title}</h2>
            {desc && <p class="desc">{desc}</p>}
            <Form
              action={(fields) => {
                log("form action", fields);
                submitSignal.value = fields[name];
              }}
              flex="y"
              alignX="start"
              spacing="s"
            >
              <Field>
                <Label>Heures</Label>
                <Input
                  name={name}
                  type="navi_hour"
                  value={valueSignal.value}
                  action={(v) => {
                    log("action", v);
                    valueSignal.value = v;
                  }}
                  {...inputProps}
                />
              </Field>
              {children}
              <Button type="submit">Submit</Button>
            </Form>
            <p class="value-display">
              Value: <strong>{String(valueSignal.value)}</strong>
              {submitSignal.value !== null && (
                <>
                  {" "}
                  — Last submitted:{" "}
                  <strong>{String(submitSignal.value)}</strong>
                </>
              )}
            </p>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      // ── App ───────────────────────────────────────────────────────────────
      const App = () => (
        <NaviDebug>
          <TOC />
          <Box flex="y" spacing="l">
            {/* ── 1. Default ── */}
            <DemoForm
              id="default"
              title="1. Default — 0 to 23h, step 1"
              desc="No explicit min/max/step. Defaults: min=0, max=23, step=1. Width is 2ch (2 digits). No spin buttons. 'h' suffix. Centered text."
              initialValue={8}
            />

            {/* ── 2. Min ── */}
            <h2 id="min" style="margin:0">
              2. min
            </h2>

            <DemoForm
              id="min-basic"
              title="2a. Basic min — min=2, max=23"
              desc="Values below 2 are invalid. Try submitting with value 1 to see the validation message."
              initialValue={5}
              inputProps={{ min: 2, max: 23 }}
            />

            <DemoForm
              id="min-negative"
              title="2b. Negative min — min=-10, max=10"
              desc="min is negative so the input can contain a '-' sign. maxLength accounts for the sign character. Try submitting -15 (below min) or 15 (above max)."
              initialValue={-3}
              inputProps={{ min: -10, max: 10 }}
            />

            {/* ── 3. Max ── */}
            <h2 id="max" style="margin:0">
              3. max
            </h2>

            <DemoForm
              id="max-basic"
              title="3a. Basic max — max=9"
              desc="Single-digit max → 1ch width. Values above 9 are invalid. Try submitting 10."
              initialValue={5}
              inputProps={{ max: 9 }}
            />

            <DemoForm
              id="max-large"
              title="3b. Large max — max=999"
              desc="3-digit max → 3ch width. Try submitting 1000."
              initialValue={120}
              inputProps={{ min: 0, max: 999 }}
            />

            {/* ── 4. Step ── */}
            <h2 id="step" style="margin:0">
              4. step
            </h2>

            <DemoForm
              id="step-basic"
              title="4a. Integer step — step=5, min=0, max=60"
              desc="Only multiples of 5 are valid (0, 5, 10, …). Try submitting 7."
              initialValue={15}
              inputProps={{ min: 0, max: 60, step: 5 }}
            />

            <DemoForm
              id="step-float"
              title="4b. Float step — step=0.5, min=0, max=9.5"
              desc="Step is 0.5 so values like 1.5 or 3.5 are valid. maxLength accounts for the decimal separator. Try submitting 1.3 (invalid step)."
              initialValue={2.5}
              inputProps={{ min: 0, max: 9.5, step: 0.5 }}
            />

            <DemoForm
              id="step-negative"
              title="4c. Float step + negative min — step=0.5, min=-5, max=5"
              desc="Combines negative min and float step. Width = sign + 1 integer digit + 1 separator + 1 decimal = 4ch. Try -3.5 (valid) or -3.3 (invalid step)."
              initialValue={-1.5}
              inputProps={{ min: -5, max: 5, step: 0.5 }}
            />
          </Box>
        </NaviDebug>
      );

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
