<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Input Navi Hour Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Input Navi Hour Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        Box,
        Button,
        Field,
        Form,
        Label,
        Input,
        NaviDebug,
        route,
        setupRoutes,
        stateSignal,
      } from "@jsenv/navi";

      // ── State signals (persisted in URL search params) ────────────────────

      const defaultSignal = stateSignal(8, {
        id: "default",
        type: "hour",
      });
      const invalidSignal = stateSignal("aa", {
        id: "invalid",
        type: "hour",
      });
      const minBasicSignal = stateSignal(1, {
        id: "min_basic",
        type: "hour",
        min: 2,
        max: 23,
      });
      const minNegativeSignal = stateSignal(-15, {
        id: "min_neg",
        type: "hour",
        min: -10,
        max: 10,
      });
      const maxBasicSignal = stateSignal(10, {
        id: "max_basic",
        type: "hour",
        max: 9,
      });
      const maxLargeSignal = stateSignal(1000, {
        id: "max_large",
        type: "hour",
        min: 0,
        max: 999,
      });
      const stepBasicSignal = stateSignal(7, {
        id: "step_int",
        type: "hour",
        min: 0,
        max: 60,
        step: 5,
      });
      const stepFloatSignal = stateSignal(1.3, {
        id: "step_float",
        type: "hour",
        min: 0,
        max: 9.5,
        step: 0.5,
      });

      const DEMO_ROUTE = route("", {
        searchParams: {
          default: defaultSignal,
          invalid: invalidSignal,
          min_basic: minBasicSignal,
          min_neg: minNegativeSignal,
          max_basic: maxBasicSignal,
          max_large: maxLargeSignal,
          step_int: stepBasicSignal,
          step_float: stepFloatSignal,
        },
      });
      setupRoutes([DEMO_ROUTE]);

      // ── TOC ───────────────────────────────────────────────────────────────
      const TOC = () => (
        <nav style="margin-bottom:32px">
          <strong>Contents</strong>
          <ol style="margin:8px 0 0;padding-left:20px;line-height:2">
            <li>
              <a href="#default">Default behavior</a>
            </li>
            <li>
              <a href="#invalid">Invalid (non-numeric) value</a>
            </li>
            <li>
              <a href="#min">min</a>
              <ol style="padding-left:16px;line-height:2">
                <li>
                  <a href="#min-basic">Basic min</a>
                </li>
                <li>
                  <a href="#min-negative">
                    Negative min (allows negative values)
                  </a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#max">max</a>
              <ol style="padding-left:16px;line-height:2">
                <li>
                  <a href="#max-basic">Basic max</a>
                </li>
                <li>
                  <a href="#max-large">Large max (3 digits)</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#step">step</a>
              <ol style="padding-left:16px;line-height:2">
                <li>
                  <a href="#step-basic">Integer step</a>
                </li>
                <li>
                  <a href="#step-float">Float step (decimal values)</a>
                </li>
              </ol>
            </li>
          </ol>
        </nav>
      );

      // ── Shared helpers ────────────────────────────────────────────────────
      const DemoForm = ({
        id,
        title,
        desc,
        children,
        inputProps,
        valueSignal,
        name = "hour",
      }) => {
        return (
          <div class="demo-section" id={id}>
            <h2>{title}</h2>
            {desc && <p class="desc">{desc}</p>}
            <Form
              action={(fields) => {
                valueSignal.value = fields[name];
              }}
              flex="y"
              alignX="start"
              spacing="s"
            >
              <Field>
                <Label>Heures</Label>
                <Input
                  name={name}
                  type="navi_hour"
                  value={valueSignal}
                  action={(v) => {
                    valueSignal.value = v;
                  }}
                  {...inputProps}
                />
              </Field>
              {children}
              <Button type="submit">Submit</Button>
            </Form>
            <p class="value-display">
              Value: <strong>{String(valueSignal.value)}</strong>
            </p>
          </div>
        );
      };

      // ── App ───────────────────────────────────────────────────────────────
      const App = () => (
        <NaviDebug>
          <TOC />
          <Box flex="y" spacing="l">
            {/* ── 1. Default ── */}
            <DemoForm
              id="default"
              title="1. Default — 0 to 23h, step 1"
              desc="No explicit min/max/step. Defaults: min=0, max=23, step=1. Width is 2ch (2 digits). No spin buttons. 'h' suffix. Centered text."
              valueSignal={defaultSignal}
            />

            {/* ── 2. Invalid value ── */}
            <DemoForm
              id="invalid"
              title='2. Invalid value — initialValue="aa"'
              desc='The initial value "aa" cannot be converted to a number. The type constraint fires and shows a validation message on submit.'
              valueSignal={invalidSignal}
            />

            {/* ── 3. Min ── */}
            <h2 id="min" style="margin:0">
              3. min
            </h2>

            <DemoForm
              id="min-basic"
              title="3a. Basic min — min=2, max=23"
              desc="Values below 2 are invalid. Initial value is 1 (below min) — submit to see the validation message."
              valueSignal={minBasicSignal}
            />

            <DemoForm
              id="min-negative"
              title="3b. Negative min — min=-10, max=10"
              desc="min is negative so the input can contain a '-' sign. Initial value is -15 (below min) — submit to see the validation message."
              valueSignal={minNegativeSignal}
            />

            {/* ── 4. Max ── */}
            <h2 id="max" style="margin:0">
              4. max
            </h2>

            <DemoForm
              id="max-basic"
              title="4a. Basic max — max=9"
              desc="Single-digit max → 1ch width. Initial value is 10 (above max) — submit to see the validation message."
              valueSignal={maxBasicSignal}
            />

            <DemoForm
              id="max-large"
              title="4b. Large max — max=999"
              desc="3-digit max → 3ch width. Initial value is 1000 (above max) — submit to see the validation message."
              valueSignal={maxLargeSignal}
              inputProps={{ width: "10ch" }}
            />

            {/* ── 5. Step ── */}
            <h2 id="step" style="margin:0">
              5. step
            </h2>

            <DemoForm
              id="step-basic"
              title="5a. Integer step — step=5, min=0, max=60"
              desc="Only multiples of 5 are valid. Initial value is 7 (not a multiple of 5) — submit to see the validation message."
              valueSignal={stepBasicSignal}
            />

            <DemoForm
              id="step-float"
              title="5b. Float step — step=0.5, min=0, max=9.5"
              desc="Step is 0.5 so values like 1.5 or 3.5 are valid. Initial value is 1.3 (invalid step) — submit to see the validation message."
              valueSignal={stepFloatSignal}
            />
          </Box>
        </NaviDebug>
      );

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
