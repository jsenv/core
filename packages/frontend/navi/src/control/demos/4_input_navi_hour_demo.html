<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Input Navi Hour Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Input Navi Hour Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Button,
        Field,
        Form,
        Label,
        Input,
        NaviDebug,
      } from "@jsenv/navi";

      const App = () => (
        <Box flex="y" spacing="l">
          <DefaultDemo />
          <SingleDigitDemo />
          <LargeMaxDemo />
          <TimeStringDemo />
        </Box>
      );

      // ── 1. Default (0–23h, step 1) ────────────────────────────────────────

      const DefaultDemo = () => {
        const valueSignal = useSignal(8);
        const submitSignal = useSignal(null);
        return (
          <div class="demo-section">
            <h2>1. Default — 0 to 23h</h2>
            <p class="desc">
              Max is 23 → 2 digits → input width is 2ch. No spin buttons. "h"
              suffix. Text centered.
            </p>
            <Form
              action={({ hour }) => {
                submitSignal.value = hour;
              }}
              flex="y"
              alignX="start"
              spacing="s"
            >
              <Field>
                Heure
                <Input
                  name="hour"
                  type="navi_hour"
                  value={valueSignal.value}
                  action={(v) => {
                    valueSignal.value = v;
                  }}
                />
              </Field>
              <Button type="submit">Submit</Button>
            </Form>
            <p class="value-display">
              Value: <strong>{valueSignal.value}</strong>
              {submitSignal.value !== null && (
                <>
                  {" "}
                  — Last submitted: <strong>{submitSignal.value}</strong>
                </>
              )}
            </p>
          </div>
        );
      };

      // ── 2. Single digit max (0–9h) ────────────────────────────────────────

      const SingleDigitDemo = () => {
        const valueSignal = useSignal(3);
        const submitSignal = useSignal(null);
        return (
          <div class="demo-section">
            <h2>2. Single digit max — 0 to 9h</h2>
            <p class="desc">Max is 9 → 1 digit → input width is 1ch.</p>
            <Form
              action={({ hour }) => {
                submitSignal.value = hour;
              }}
              flex="y"
              alignX="start"
              spacing="s"
            >
              <Field>
                <Label>Heure</Label>
                <Input
                  name="hour"
                  type="navi_hour"
                  max={9}
                  value={valueSignal.value}
                  action={(v) => {
                    valueSignal.value = Number(v);
                  }}
                />
              </Field>
              <Button type="submit">Submit</Button>
            </Form>
            <p class="value-display">
              Value: <strong>{valueSignal.value}</strong>
              {submitSignal.value !== null && (
                <>
                  {" "}
                  — Last submitted: <strong>{submitSignal.value}</strong>
                </>
              )}
            </p>
          </div>
        );
      };

      // ── 3. Large max (0–999h) ─────────────────────────────────────────────

      const LargeMaxDemo = () => {
        const valueSignal = useSignal(120);
        const submitSignal = useSignal(null);
        return (
          <div class="demo-section">
            <h2>3. Large max — 0 to 999h</h2>
            <p class="desc">Max is 999 → 3 digits → input width is 3ch.</p>
            <Form
              action={({ hour }) => {
                submitSignal.value = hour;
              }}
              flex="y"
              alignX="start"
              spacing="s"
            >
              <Field>
                <Label>Heures totales</Label>
                <Input
                  name="hour"
                  type="navi_hour"
                  min={0}
                  max={999}
                  step={1}
                  value={valueSignal.value}
                  action={(v) => {
                    valueSignal.value = Number(v);
                  }}
                />
              </Field>
              <Button type="submit">Submit</Button>
            </Form>
            <p class="value-display">
              Value: <strong>{valueSignal.value}</strong>
              {submitSignal.value !== null && (
                <>
                  {" "}
                  — Last submitted: <strong>{submitSignal.value}</strong>
                </>
              )}
            </p>
          </div>
        );
      };

      // ── 4. With time string min/max ───────────────────────────────────────

      const TimeStringDemo = () => {
        const valueSignal = useSignal(2);
        const submitSignal = useSignal(null);
        return (
          <div class="demo-section">
            <h2>4. Time string min/max — "00:30" to "12:00"</h2>
            <p class="desc">
              min="00:30" → 0.5h, max="12:00" → 12h. 2-digit width.
            </p>
            <Form
              action={({ hour }) => {
                submitSignal.value = hour;
              }}
              flex="y"
              alignX="start"
              spacing="s"
            >
              <Field>
                <Label>Heure</Label>
                <Input
                  name="hour"
                  type="navi_hour"
                  min="00:30"
                  max="12:00"
                  step="00:30"
                  value={valueSignal.value}
                  action={(v) => {
                    valueSignal.value = Number(v);
                  }}
                />
              </Field>
              <Button type="submit">Submit</Button>
            </Form>
            <p class="value-display">
              Value: <strong>{valueSignal.value}</strong>
              {submitSignal.value !== null && (
                <>
                  {" "}
                  — Last submitted: <strong>{submitSignal.value}</strong>
                </>
              )}
            </p>
          </div>
        );
      };

      render(
        <NaviDebug>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
