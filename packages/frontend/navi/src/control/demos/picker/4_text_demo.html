<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Text Picker Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-bottom: 24px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Text Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Field,
        Label,
        Picker,
        Input,
        Button,
        NaviDebug,
      } from "@jsenv/navi";

      const App = () => (
        <Box flex="y" spacing="l">
          <BasicDemo />
          <WithActionDemo />
          <LongValueDemo />
          <ReadonlyDemo />
        </Box>
      );

      // ── 1. Basic ──────────────────────────────────────────────────────────

      const BasicDemo = () => {
        const valueSignal = useSignal("");
        const actionCallsSignal = useSignal([]);
        return (
          <div class="demo-section">
            <h2>1. Basic text picker</h2>
            <p>
              A text picker with a popover containing a text input, a confirm
              button (<code>command="--navi-send"</code>), a clear button (
              <code>command="--navi-clear"</code>), and a cancel button (
              <code>command="--navi-cancel"</code>).
            </p>
            <Field vertical>
              <Label>Label</Label>
              <Picker
                type="text"
                name="text_basic"
                value={valueSignal.value}
                placeholder="Click to edit…"
                action={(v) => {
                  actionCallsSignal.value = [...actionCallsSignal.value, v];
                  valueSignal.value = v;
                }}
              >
                <Box flex="y" spacing="s" padding="s">
                  <Input
                    type="text"
                    command="--navi-update"
                    value={valueSignal.value}
                    placeholder="Type something…"
                    autoFocus
                  />
                  <Box flex spacing="s">
                    <Button command="--navi-clear">Clear</Button>
                    <Button command="--navi-cancel">Cancel</Button>
                    <Button command="--navi-send">Confirm</Button>
                  </Box>
                </Box>
              </Picker>
            </Field>
            <p class="value-display">
              Value:{" "}
              <strong>
                {valueSignal.value || <em style="color:#999">—</em>}
              </strong>
            </p>
            <p class="value-display">
              Action calls ({actionCallsSignal.value.length}):{" "}
              {actionCallsSignal.value.length === 0 ? (
                <em style="color:#999">none</em>
              ) : (
                actionCallsSignal.value.map((v, i) => (
                  <span
                    key={i}
                    style="margin-right:8px; background:#eee; padding:1px 5px; border-radius:3px; font-family:monospace"
                  >
                    {JSON.stringify(v)}
                  </span>
                ))
              )}
            </p>
          </div>
        );
      };

      // ── 2. With async action ──────────────────────────────────────────────

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const WithActionDemo = () => {
        const valueSignal = useSignal("Hello");
        const savedSignal = useSignal("Hello");
        const actionCallsSignal = useSignal([]);
        return (
          <div class="demo-section">
            <h2>2. With async action</h2>
            <p>
              The confirm action simulates a 600 ms network save. The picker
              shows a loading state during that time.
            </p>
            <Field vertical>
              <Label>Name</Label>
              <Picker
                type="text"
                name="text_async"
                value={valueSignal.value}
                placeholder="Click to edit…"
                action={async (v) => {
                  actionCallsSignal.value = [...actionCallsSignal.value, v];
                  await sleep(600);
                  valueSignal.value = v;
                  savedSignal.value = v;
                }}
              >
                <Box flex="y" spacing="s" padding="s">
                  <Input
                    type="text"
                    command="--navi-update"
                    value={valueSignal.value}
                    placeholder="Type something…"
                    autoFocus
                  />
                  <Box flex spacing="s">
                    <Button command="--navi-send">Save</Button>
                    <Button command="--navi-clear">Clear</Button>
                    <Button command="--navi-cancel">Cancel</Button>
                  </Box>
                </Box>
              </Picker>
            </Field>
            <p class="value-display">
              Saved value:{" "}
              <strong>
                {savedSignal.value || <em style="color:#999">—</em>}
              </strong>
            </p>
            <p class="value-display">
              Action calls ({actionCallsSignal.value.length}):{" "}
              {actionCallsSignal.value.length === 0 ? (
                <em style="color:#999">none</em>
              ) : (
                actionCallsSignal.value.map((v, i) => (
                  <span
                    key={i}
                    style="margin-right:8px; background:#eee; padding:1px 5px; border-radius:3px; font-family:monospace"
                  >
                    {JSON.stringify(v)}
                  </span>
                ))
              )}
            </p>
          </div>
        );
      };

      // ── 3. Long value ─────────────────────────────────────────────────────

      const LongValueDemo = () => {
        const longText =
          "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua";
        const valueSignal = useSignal(longText);
        const actionCallsSignal = useSignal([]);
        return (
          <div class="demo-section">
            <h2>3. Long value overflow</h2>
            <p>
              Checks how a very long value is displayed in the picker button.
            </p>
            <Field vertical>
              <Label>Description</Label>
              <Picker
                type="text"
                name="text_long"
                value={valueSignal.value}
                placeholder="Click to edit…"
                action={(v) => {
                  actionCallsSignal.value = [...actionCallsSignal.value, v];
                  valueSignal.value = v;
                }}
              >
                <Box flex="y" spacing="s" padding="s">
                  <Input
                    type="text"
                    command="--navi-update"
                    value={valueSignal.value}
                    placeholder="Type something…"
                    autoFocus
                  />
                  <Box flex spacing="s">
                    <Button command="--navi-send">Confirm</Button>
                    <Button command="--navi-clear">Clear</Button>
                    <Button command="--navi-cancel">Cancel</Button>
                  </Box>
                </Box>
              </Picker>
            </Field>
            <p class="value-display">
              Action calls ({actionCallsSignal.value.length}):{" "}
              {actionCallsSignal.value.length === 0 ? (
                <em style="color:#999">none</em>
              ) : (
                actionCallsSignal.value.map((v, i) => (
                  <span
                    key={i}
                    style="margin-right:8px; background:#eee; padding:1px 5px; border-radius:3px; font-family:monospace"
                  >
                    {JSON.stringify(v)}
                  </span>
                ))
              )}
            </p>
          </div>
        );
      };

      // ── 4. Readonly ───────────────────────────────────────────────────────

      const ReadonlyDemo = () => {
        return (
          <div class="demo-section">
            <h2>4. Readonly</h2>
            <p>A readonly text picker cannot be opened.</p>
            <Field vertical>
              <Label>Name</Label>
              <Picker
                type="text"
                name="text_readonly"
                value="John Doe"
                readOnly
                action={() => {}}
              />
            </Field>
          </div>
        );
      };

      render(
        <NaviDebug debugCommand debugAction debugInteraction debugPopup>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
