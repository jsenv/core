<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Multiselect Picker Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-bottom: 24px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
      /* Chips */
      .chip-list {
        display: flex;
        min-height: 28px;
        margin-top: 10px;
        flex-wrap: wrap;
        gap: 6px;
      }
      .chip {
        display: inline-flex;
        padding: 2px 10px;
        align-items: center;
        gap: 4px;
        color: #1a56cc;
        font-weight: 500;
        font-size: 13px;
        background: #e8f0fe;
        border-radius: 999px;
      }
      .chip-remove {
        display: inline-flex;
        width: 16px;
        height: 16px;
        padding: 0;
        align-items: center;
        justify-content: center;
        color: #1a56cc;
        font-size: 14px;
        line-height: 1;
        background: none;
        border: none;
        border-radius: 50%;
        opacity: 0.7;
        cursor: pointer;
      }
      .chip-remove:hover {
        background: #c6d8ff;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Multiselect Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import { useRef } from "preact/hooks";
      import {
        Box,
        Field,
        Label,
        Picker,
        Button,
        List,
        NaviDebug,
        Badge,
        BadgeList,
      } from "@jsenv/navi";

      const FRUIT_OPTIONS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
      ];

      const SKILL_OPTIONS = [
        "HTML",
        "CSS",
        "JavaScript",
        "TypeScript",
        "React",
        "Vue",
        "Angular",
        "Node.js",
        "Python",
        "Rust",
        "Go",
        "Java",
        "C++",
        "Swift",
        "Kotlin",
        "SQL",
      ];

      const App = () => (
        <Box flex="y" spacing="l">
          <TextDisplay />
          <ChipsSimpleDisplay />
          <ChipsWithDeleteDisplay />
        </Box>
      );

      // ── 1. Text display ───────────────────────────────────────────────────

      const TextDisplay = () => {
        const selectedSignal = useSignal([
          "Apple",
          "Banana",
          "Cherry",
          "Elderberry",
        ]);
        const selectedArray = selectedSignal.value;

        const selectedSignalMr1 = useSignal(["Apple", "Cherry"]);
        const selectedArrayMr1 = selectedSignalMr1.value;

        return (
          <div class="demo-section">
            <h2>1. Text display — comma-separated</h2>
            <p>
              <code>List selectable multiple action="update"</code> updates the
              picker's pending state on each click. Confirming commits the array
              to the action callback, which updates the displayed value.
            </p>
            <Box flex="y" spacing="m">
              <Field vertical>
                <Label>
                  Fruits <code style="font-weight:normal">(default)</code>
                </Label>
                <Picker
                  type="array"
                  name="multiselect_text"
                  placeholder="Select fruits, a very long placeholder to trigger multiline behavior"
                  value={selectedArray}
                  uiAction={(v) => {
                    selectedSignal.value = v;
                  }}
                  action={(v) => {
                    selectedSignal.value = v;
                  }}
                  maxWidth="150"
                >
                  <List selectable multiple action="update">
                    {FRUIT_OPTIONS.map((opt, i) => (
                      <List.Item
                        selectable
                        key={opt}
                        id={`${opt}_chip`}
                        index={i}
                        value={opt}
                        selected={selectedArray.includes(opt)}
                        padding="s"
                        spacing="s"
                      >
                        {opt}
                      </List.Item>
                    ))}
                  </List>
                </Picker>
              </Field>
              <Field vertical>
                <Label>
                  Fruits <code style="font-weight:normal">(maxRows=1)</code>
                </Label>
                <Picker
                  type="array"
                  name="multiselect_text_maxrows1"
                  placeholder="Select fruits, a very long placeholder to trigger multiline behavior"
                  value={selectedArrayMr1}
                  uiAction={(v) => {
                    selectedSignalMr1.value = v;
                  }}
                  action={(v) => {
                    selectedSignalMr1.value = v;
                  }}
                  maxWidth="150"
                  maxRows={1}
                >
                  <List selectable multiple action="update">
                    {FRUIT_OPTIONS.map((opt, i) => (
                      <List.Item
                        selectable
                        key={opt}
                        id={`${opt}_chip_mr1`}
                        index={i}
                        value={opt}
                        selected={selectedArrayMr1.includes(opt)}
                        padding="s"
                        spacing="s"
                      >
                        {opt}
                      </List.Item>
                    ))}
                  </List>
                </Picker>
              </Field>
            </Box>
          </div>
        );
      };

      // ── 2. Chips display (no delete) ──────────────────────────────────────

      const ChipsSimpleDisplay = () => {
        const selectedSignal = useSignal([
          "HTML",
          "CSS",
          "JavaScript",
          "TypeScript",
          "React",
          "Vue",
        ]);
        const selectedArray = selectedSignal.value;

        const selectedSignalMr1 = useSignal(["HTML", "React", "Vue"]);
        const selectedArrayMr1 = selectedSignalMr1.value;

        const ChipsUI = ({ arr }) => {
          return (
            <BadgeList
              fallback={
                <Badge
                  background="transparent"
                  color="var(--picker-placeholder-color)"
                >
                  Select skills…
                </Badge>
              }
            >
              {arr.map((opt) => (
                <Badge key={opt}>{opt}</Badge>
              ))}
            </BadgeList>
          );
        };

        return (
          <div class="demo-section">
            <h2>2. Chips display</h2>
            <p>
              Selected items appear as chip pills inside the picker. Clicking
              anywhere on the picker opens the dropdown where items can be
              toggled.
            </p>
            <p style="color: #b45309; background: #fef3c7; border: 1px solid #fde68a; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin: 0 0 16px">
              <strong>maxRows not supported with chips.</strong> Chips are
              flex items with spacing, not plain text — CSS{" "}
              <code>line-clamp</code> does not apply, and detecting which chips
              overflow and where they break across rows requires expensive DOM
              measurement on every render. This complexity is not worth it;
              use <code>max</code> on <code>BadgeList</code> to cap the number
              of visible chips instead.
            </p>
            <Box flex="y" spacing="m">
              <Field vertical>
                <Label>
                  Skills <code style="font-weight:normal">(default)</code>
                </Label>
                <Picker
                  type="array"
                  name="multiselect_chips_simple"
                  value={selectedArray}
                  ui={<ChipsUI arr={selectedArray} />}
                  uiAction={(v) => {
                    selectedSignal.value = v;
                  }}
                  action={(v) => {
                    selectedSignal.value = v;
                  }}
                  maxWidth="150"
                >
                  <List
                    selectable
                    multiple
                    id="skills_list_simple"
                    action="update"
                    style="min-width: 180px"
                  >
                    {SKILL_OPTIONS.map((opt, i) => (
                      <List.Item
                        selectable
                        key={opt}
                        id={`simple_${opt}`}
                        index={i}
                        value={opt}
                        selected={selectedArray.includes(opt)}
                        padding="s"
                        spacing="s"
                      >
                        {opt}
                      </List.Item>
                    ))}
                  </List>
                </Picker>
              </Field>
              <Field vertical>
                <Label>
                  Skills <code style="font-weight:normal">(maxRows=1)</code>
                </Label>
                <Picker
                  type="array"
                  name="multiselect_chips_simple_mr1"
                  value={selectedArrayMr1}
                  ui={<ChipsUI arr={selectedArrayMr1} />}
                  uiAction={(v) => {
                    selectedSignalMr1.value = v;
                  }}
                  action={(v) => {
                    selectedSignalMr1.value = v;
                  }}
                  maxWidth="150"
                  maxRows={1}
                >
                  <List
                    selectable
                    multiple
                    id="skills_list_simple_mr1"
                    action="update"
                    style="min-width: 180px"
                  >
                    {SKILL_OPTIONS.map((opt, i) => (
                      <List.Item
                        selectable
                        key={opt}
                        id={`simple_mr1_${opt}`}
                        index={i}
                        value={opt}
                        selected={selectedArrayMr1.includes(opt)}
                        padding="s"
                        spacing="s"
                      >
                        {opt}
                      </List.Item>
                    ))}
                  </List>
                </Picker>
              </Field>
            </Box>
          </div>
        );
      };

      // ── 3. Chips display (with delete button on badge) ────────────────────

      const ChipsWithDeleteDisplay = () => {
        const selectedSignal = useSignal([
          "HTML",
          "CSS",
          "JavaScript",
          "TypeScript",
          "React",
          "Vue",
          "Node.js",
          "Python",
        ]);
        const listRef = useRef(null);
        const selectedArray = selectedSignal.value;

        const selectedSignalMr1 = useSignal([
          "HTML",
          "CSS",
          "JavaScript",
          "TypeScript",
        ]);
        const selectedArrayMr1 = selectedSignalMr1.value;

        const ChipsUI = () => {
          if (selectedArray.length === 0) {
            return <span style="color: #999">Select skills…</span>;
          }
          return (
            <BadgeList>
              {selectedArray.map((opt) => (
                <Badge key={opt} data-has-button="">
                  {opt}
                  <Badge.Button
                    action="unselect"
                    action-target="skills_list_delete"
                    actionOnMouseDown
                    value={opt}
                    aria-label={`Remove ${opt}`}
                    onMouseDown={(e) => {
                      e.stopPropagation();
                    }}
                    onClick={(e) => {
                      e.stopPropagation();
                    }}
                  >
                    ×
                  </Badge.Button>
                </Badge>
              ))}
            </BadgeList>
          );
        };

        return (
          <div class="demo-section">
            <h2>3. Chips with delete button</h2>
            <p>
              Each chip has an × button to deselect without reopening the
              dropdown. Two UX drawbacks to be aware of: the interaction target
              is very small (the tiny × icon), and clicking the chip label
              itself — outside the × button — opens the picker instead of
              removing the chip, which can surprise users who expect the whole
              chip to be the delete target.
            </p>
            <p style="color: #b45309; background: #fef3c7; border: 1px solid #fde68a; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin: 0 0 16px">
              <strong>maxRows not supported with chips.</strong> Same reason as
              section 2 — use <code>max</code> on <code>BadgeList</code>
              instead.
            </p>
            <Box flex="y" spacing="m">
              <Field vertical>
                <Label>
                  Skills <code style="font-weight:normal">(default)</code>
                </Label>
                <Picker
                  type="array"
                  name="multiselect_chips_delete"
                  value={selectedArray}
                  ui={<ChipsUI />}
                  uiAction={(v) => {
                    selectedSignal.value = v;
                  }}
                  action={(v) => {
                    selectedSignal.value = v;
                  }}
                  maxWidth="200"
                >
                  <List
                    selectable
                    ref={listRef}
                    multiple
                    id="skills_list_delete"
                    action="update"
                    style="min-width: 180px"
                  >
                    {SKILL_OPTIONS.map((opt, i) => (
                      <List.Item
                        selectable
                        key={opt}
                        id={opt}
                        index={i}
                        value={opt}
                        selected={selectedArray.includes(opt)}
                        padding="s"
                        spacing="s"
                      >
                        {opt}
                      </List.Item>
                    ))}
                  </List>
                </Picker>
              </Field>
              <Field vertical>
                <Label>
                  Skills <code style="font-weight:normal">(maxRows=1)</code>
                </Label>
                <Picker
                  type="array"
                  name="multiselect_chips_delete_mr1"
                  value={selectedArrayMr1}
                  ui={
                    <BadgeList>
                      {selectedArrayMr1.map((opt) => (
                        <Badge key={opt} data-has-button="">
                          {opt}
                          <Badge.Button
                            action="unselect"
                            action-target="skills_list_delete_mr1"
                            actionOnMouseDown
                            value={opt}
                            aria-label={`Remove ${opt}`}
                            onMouseDown={(e) => e.stopPropagation()}
                            onClick={(e) => e.stopPropagation()}
                          >
                            ×
                          </Badge.Button>
                        </Badge>
                      ))}
                    </BadgeList>
                  }
                  uiAction={(v) => {
                    selectedSignalMr1.value = v;
                  }}
                  action={(v) => {
                    selectedSignalMr1.value = v;
                  }}
                  maxWidth="200"
                  maxRows={1}
                >
                  <List
                    selectable
                    multiple
                    id="skills_list_delete_mr1"
                    action="update"
                    style="min-width: 180px"
                  >
                    {SKILL_OPTIONS.map((opt, i) => (
                      <List.Item
                        selectable
                        key={opt}
                        id={`mr1_${opt}`}
                        index={i}
                        value={opt}
                        selected={selectedArrayMr1.includes(opt)}
                        padding="s"
                        spacing="s"
                      >
                        {opt}
                      </List.Item>
                    ))}
                  </List>
                </Picker>
              </Field>
            </Box>
          </div>
        );
      };

      render(
        <NaviDebug debugAction debugInteraction debugPopup>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
