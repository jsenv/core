<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Duration Preset + Custom Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .form-result {
        min-height: 32px;
        margin-top: 16px;
        padding: 10px 12px;
        color: #333;
        font-size: 12px;
        font-family: monospace;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Duration Preset + Custom Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import { stateSignal, route, setupRoutes } from "@jsenv/navi";
      import {
        Box,
        Field,
        Label,
        List,
        Picker,
        Form,
        Button,
        Time,
        NaviDebug,
      } from "@jsenv/navi";

      const durationSignal = stateSignal(90, {
        id: "duration",
        type: "minute",
        min: "00:15",
        max: "05:00",
        step: "00:05",
        persists: true,
      });

      const DEMO_ROUTE = route("", {
        searchParams: { duration: durationSignal },
      });
      setupRoutes([DEMO_ROUTE]);

      const PRESET_DURATIONS = [60, 90, 120];

      const isCustomDuration = (value) => {
        return value !== undefined && !PRESET_DURATIONS.includes(value);
      };

      // ── MinuteOption ─────────────────────────────────────────────────────

      const MinuteOption = ({ children, ...props }) => {
        return (
          <List.Item
            selectable
            borderRadius="s"
            borderWidth="1"
            minWidth="64"
            paddingX="m"
            paddingY="s"
            alignX="center"
            {...props}
          >
            <Time type="minute">{children}</Time>
          </List.Item>
        );
      };

      // ── CustomDurationOption ─────────────────────────────────────────────
      // A List.Item that is "selected" when the current value is not a preset.
      // It embeds a Picker so the user can type any minute value.

      const CustomDurationOption = ({ value, onSelect, index }) => {
        const isCustom = isCustomDuration(value);
        const customValue = isCustom ? value : undefined;

        return (
          <List.Item
            index={index}
            id="custom"
            value={customValue}
            selected={isCustom}
            borderRadius="s"
            borderWidth="1"
            minWidth="64"
            paddingX="xs"
            paddingY="xs"
            alignX="center"
          >
            <Picker
              type="number"
              min={durationSignal.options.min}
              min={durationSignal.options.max}
              step={durationSignal.options.step}
              placeholder="Autre"
              value={isCustom ? value : undefined}
              uiAction={(v) => {
                onSelect(Number(v));
              }}
            />
          </List.Item>
        );
      };

      // ── DurationField ─────────────────────────────────────────────────────

      const DurationField = () => {
        const value = durationSignal.value;

        return (
          <Field vertical>
            <Label>Durée</Label>
            <List
              selectable
              horizontal
              spacing="s"
              id="duration"
              name="duration"
              required
              value={value}
              uiAction={(v) => {
                durationSignal.value = Number(v);
              }}
            >
              {PRESET_DURATIONS.map((minutes, i) => (
                <MinuteOption
                  key={minutes}
                  index={i}
                  id={minutes}
                  value={minutes}
                >
                  {minutes}
                </MinuteOption>
              ))}
              <CustomDurationOption
                index={PRESET_DURATIONS.length}
                value={value}
                onSelect={(v) => {
                  durationSignal.value = v;
                }}
              />
            </List>
          </Field>
        );
      };

      // ── App ───────────────────────────────────────────────────────────────

      const App = () => {
        const formResultSignal = useSignal(null);

        return (
          <Box flex="y" spacing="l">
            <div class="demo-section">
              <h2>Duration selector — presets + custom</h2>
              <p class="desc">
                3 preset options (60, 90, 120 min) and a "custom" option with a
                time Picker. The custom item is selected when the current value
                is not one of the presets. The Picker opens to let the user
                enter any duration. Everything is wired in a Form.
              </p>
              <Form
                action={(values) => {
                  formResultSignal.value = values;
                }}
                flex="y"
                spacing="m"
                alignX="start"
              >
                <DurationField />
                <Button type="submit">Submit</Button>
              </Form>
              {formResultSignal.value !== null ? (
                <div class="form-result">
                  Form submitted:{" "}
                  {JSON.stringify(formResultSignal.value, null, 2)}
                </div>
              ) : (
                <div class="form-result" style="color:#aaa">
                  Submit the form to see values…
                </div>
              )}
            </div>
          </Box>
        );
      };

      render(
        <NaviDebug debugAction debugInteraction>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
