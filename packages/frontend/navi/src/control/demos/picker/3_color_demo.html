<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Picker Color Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 4px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
      .states-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: start;
        gap: 16px;
      }
      .states-col-header {
        margin: 0 0 12px;
        color: #888;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Color Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import { CallLog, useCallLog } from "../utils/call_log.jsx";
      import {
        Box,
        Field,
        Label,
        Picker,
        Color,
        Form,
        Button,
        List,
        NaviDebug,
      } from "@jsenv/navi";

      const App = () => (
        <Box flex="y" spacing="l">
          <TableOfContents />
          <StatesDemo />
          <InFormDemo />
          <WithActionDemo />
          <CustomizationDemo />
        </Box>
      );

      const TableOfContents = () => (
        <div class="demo-section">
          <h2>Table of contents</h2>
          <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
            <li>
              <a href="#states">États</a>
            </li>
            <li>
              Interactivity
              <ol style={{ paddingLeft: "20px" }}>
                <li>
                  <a href="#inside-form">Inside a form (+ required)</a>
                </li>
                <li>
                  <a href="#outside-form">Outside a form</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#customization">Customization</a>
            </li>
          </ol>
        </div>
      );

      // ── 1. États ──────────────────────────────────────────────────────────

      const DEFAULT_COLOR = "#4caf50";

      const StatesDemo = () => {
        return (
          <div class="demo-section" id="states">
            <p class="desc">
              Chaque état du picker couleur jsenv. La colonne native est fournie
              à titre de comparaison (elle ne supporte pas l'état "vide").
            </p>
            <div class="states-grid">
              <div>
                <div class="states-col-header">Navi Picker</div>
                <Box flex="y" spacing="s">
                  <Field flex="y">
                    <Label border="1px dotted grey">Vide</Label>
                    <Picker name="color_empty" type="color" />
                  </Field>
                  <Field flex="y">
                    <Label border="1px dotted grey">Vide + placeholder</Label>
                    <Picker
                      name="color_empty_placeholder"
                      type="color"
                      placeholder="Choisir une couleur"
                    />
                  </Field>
                  <Field flex="y">
                    <Label border="1px dotted grey">Avec valeur</Label>
                    <Picker
                      name="color_with_value"
                      type="color"
                      defaultValue={DEFAULT_COLOR}
                    />
                  </Field>
                  <Field flex="y">
                    <Label>Readonly</Label>
                    <Picker
                      name="color_readonly"
                      type="color"
                      defaultValue={DEFAULT_COLOR}
                      readOnly
                    />
                  </Field>
                  <Field flex="y">
                    <Label>Disabled</Label>
                    <Picker
                      name="color_disabled"
                      type="color"
                      defaultValue={DEFAULT_COLOR}
                      disabled
                    />
                  </Field>
                  <Field flex="y">
                    <Label>Loading</Label>
                    <Picker
                      name="color_loading"
                      type="color"
                      defaultValue={DEFAULT_COLOR}
                      loading
                    />
                  </Field>
                </Box>
              </div>
              <div>
                <div class="states-col-header">User agent</div>
                <Box flex="y" spacing="s">
                  <Field flex="y">
                    <Label>Vide (n/a — toujours noir)</Label>
                    <input type="color" />
                  </Field>
                  <Field flex="y">
                    <Label>Vide + placeholder (n/a)</Label>
                    <input type="color" />
                  </Field>
                  <Field flex="y">
                    <Label>Avec valeur</Label>
                    <input type="color" value={DEFAULT_COLOR} readOnly />
                  </Field>
                  <Field flex="y">
                    <Label>Readonly</Label>
                    <input type="color" value={DEFAULT_COLOR} readOnly />
                  </Field>
                  <Field flex="y">
                    <Label>Disabled</Label>
                    <input type="color" value={DEFAULT_COLOR} disabled />
                  </Field>
                  <Field flex="y">
                    <Label>Loading (n/a)</Label>
                    <input type="color" value={DEFAULT_COLOR} disabled />
                  </Field>
                </Box>
              </div>
            </div>
          </div>
        );
      };

      // ── 2. Interactivity — outside a form ───────────────────────────────────

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const WithActionDemo = () => {
        const [entries, push, clear] = useCallLog();
        const colorSignal = useSignal("#3b82f6");

        return (
          <div class="demo-section" id="outside-form">
            <h2>3. Interactivity — outside a form</h2>
            <p class="desc">
              L'action est asynchrone (simule un appel réseau de 800 ms). Le
              picker passe en état loading pendant ce temps.
            </p>
            <Box flex="y" spacing="m">
              <Field vertical>
                <Label>No initial color</Label>
                <Picker
                  name="theme_color_empty"
                  type="color"
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                  }}
                />
              </Field>
              <Field vertical>
                <Label>With initial color</Label>
                <Picker
                  name="theme_color"
                  type="color"
                  value={colorSignal.value}
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                    colorSignal.value = v;
                  }}
                />
              </Field>
              <Field vertical>
                <Label>Action throws after 500ms</Label>
                <Picker
                  name="theme_color_throws"
                  type="color"
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(500);
                    throw new Error("Action failed");
                  }}
                />
              </Field>
            </Box>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 4. Customization ──────────────────────────────────────────────────

      const InFormDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="inside-form">
            <h2>2. Interactivity — inside a form</h2>
            <p class="desc">
              Deux pickers obligatoires : l'un avec une valeur par défaut,
              l'autre sans. La soumission échoue si un champ est vide.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Couleur (avec valeur par défaut, required)</Label>
                <Picker
                  name="color_with_default"
                  type="color"
                  defaultValue="#3b82f6"
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (with default)", v);
                  }}
                />
              </Field>
              <Field vertical>
                <Label>Couleur (sans valeur, required)</Label>
                <Picker
                  name="color_no_default"
                  type="color"
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (no default)", v);
                  }}
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const SWATCHES = [
        { label: "Rouge", value: "#ef4444" },
        { label: "Orange", value: "#f97316" },
        { label: "Jaune", value: "#eab308" },
        { label: "Vert", value: "#22c55e" },
        { label: "Bleu", value: "#3b82f6" },
        { label: "Violet", value: "#a855f7" },
        { label: "Rose", value: "#ec4899" },
      ];

      const CustomizationDemo = () => {
        const colorSignal = useSignal("#3b82f6");
        return (
          <div class="demo-section" id="customization">
            <h2>4. Customization</h2>
            <p class="desc">
              On passe des enfants au Picker pour afficher une palette de
              swatches construite avec <code>List selectable</code> +{" "}
              <code>List.Item selectable</code>. La couleur sélectionnée est
              mise en évidence et le popover se ferme automatiquement.
            </p>
            <Box flex="y" spacing="m">
              <Field vertical>
                <Label>Interactive</Label>
                <SwatchPicker
                  name="badge_color"
                  value={colorSignal.value}
                  action={(v) => {
                    colorSignal.value = v;
                  }}
                />
              </Field>
              <Field vertical>
                <Label>Readonly</Label>
                <SwatchPicker
                  name="badge_color_readonly"
                  value={colorSignal.value}
                  readOnly
                  action={() => {}}
                />
              </Field>
              <Field vertical>
                <Label>Loading</Label>
                <SwatchPicker
                  name="badge_color_loading"
                  value={colorSignal.value}
                  loading
                  action={() => {}}
                />
              </Field>
            </Box>
            <p class="value-display">
              Valeur :{" "}
              {colorSignal.value ? (
                <strong style={{ color: colorSignal.value }}>
                  {colorSignal.value}
                </strong>
              ) : (
                <span style={{ color: "#999" }}>—</span>
              )}
            </p>

            <hr
              style={{
                margin: "20px 0",
                border: "none",
                borderTop: "1px solid #eee",
              }}
            />
            <h3 class="states-col-header">ui="default" — UI du navigateur</h3>
            <p class="desc">
              Passer <code>ui="default"</code> conserve le color picker natif du
              navigateur tout en bénéficiant du système navi (validation,
              action, états loading…).
            </p>
            <div class="states-grid">
              <div>
                <p
                  class="desc"
                  style={{ margin: "0 0 8px", fontStyle: "italic" }}
                >
                  Picker ui="default"
                </p>
                <Box flex="y" spacing="s" alignX="start">
                  <Picker
                    name="color_browser_empty"
                    type="color"
                    ui="default"
                  />
                  <Picker
                    name="color_browser_value"
                    type="color"
                    defaultValue={DEFAULT_COLOR}
                    ui="default"
                  />
                  <Picker
                    name="color_browser_readonly"
                    type="color"
                    defaultValue={DEFAULT_COLOR}
                    readOnly
                    ui="default"
                  />
                  <Picker
                    name="color_browser_disabled"
                    type="color"
                    defaultValue={DEFAULT_COLOR}
                    disabled
                    ui="default"
                  />
                </Box>
              </div>
              <div>
                <p
                  class="desc"
                  style={{ margin: "0 0 8px", fontStyle: "italic" }}
                >
                  input natif (référence)
                </p>
                <Box flex="y" spacing="s" alignX="start">
                  <input type="color" />
                  <input type="color" defaultValue={DEFAULT_COLOR} />
                  <input type="color" defaultValue={DEFAULT_COLOR} readOnly />
                  <input type="color" defaultValue={DEFAULT_COLOR} disabled />
                </Box>
              </div>
            </div>
          </div>
        );
      };

      const SwatchPicker = (props) => (
        <Picker type="color" {...props}>
          <List selectable command="--navi-send">
            {SWATCHES.map(({ label, value: swatchValue }, i) => (
              <List.Item
                selectable
                key={swatchValue}
                id={`${props.name}_${swatchValue}`}
                index={i}
                value={swatchValue}
                selected={props.value === swatchValue}
                flex
                alignY="center"
                spacing="s"
                padding="s"
              >
                <Color circle border="1px solid rgba(0,0,0,0.15)" height="18">
                  {swatchValue}
                </Color>
                {label}
              </List.Item>
            ))}
          </List>
        </Picker>
      );

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
