<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Picker Color Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 4px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .value-display {
        margin-top: 12px;
        color: #333;
        font-size: 13px;
      }
      .states-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: start;
        gap: 16px;
      }
      .states-col-header {
        margin-bottom: 12px;
        color: #888;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Color Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import { CallLog, useCallLog } from "../utils/call_log.jsx";
      import {
        Box,
        Field,
        Label,
        Picker,
        Color,
        Form,
        Button,
        SelectableList,
        Selectable,
        NaviDebug,
      } from "@jsenv/navi";

      const App = () => (
        <Box flex="y" spacing="l">
          <TableOfContents />
          <InteractivityDemo />
          <StatesDemo />
          <WithActionDemo />
          <InFormDemo />
          <ValidationDemo />
          <CustomizationDemo />
        </Box>
      );

      const TableOfContents = () => (
        <div class="demo-section">
          <h2>Table of contents</h2>
          <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
            <li>
              <a href="#interactivity">Interactivity</a>
            </li>
            <li>
              <a href="#states">États</a>
            </li>
            <li>
              <a href="#with-action">Avec une action</a>
            </li>
            <li>
              <a href="#in-form">Dans un form</a>
            </li>
            <li>
              <a href="#validation">Validation</a>
            </li>
            <li>
              <a href="#customization">Customization</a>
            </li>
          </ol>
        </div>
      );

      // ── 0. Interactivity ─────────────────────────────────────────────────

      const InteractivityDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="interactivity">
            <h2>0. Interactivity</h2>
            <p class="desc">
              Observe when <code>uiAction</code> and <code>action</code> are
              called and with what value.
            </p>
            <Field vertical>
              <Label>Color</Label>
              <Picker
                name="interactivity_color"
                type="color"
                defaultValue="#3b82f6"
                uiAction={(v) => {
                  push("Picker uiAction", v);
                }}
                action={(v) => {
                  push("Picker action", v);
                }}
              />
            </Field>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 1. États ──────────────────────────────────────────────────────────

      const DEFAULT_COLOR = "#4caf50";

      const StatesDemo = () => {
        return (
          <div class="demo-section" id="states">
            <p class="desc">
              Chaque état du picker couleur jsenv. La colonne native est fournie
              à titre de comparaison (elle ne supporte pas l'état "vide").
            </p>
            <div class="states-grid">
              <div>
                <div class="states-col-header">Navi Picker</div>
                <Box flex="y" spacing="s">
                  <Field vertical>
                    <Label>Vide</Label>
                    <Picker name="color_empty" type="color" />
                  </Field>
                  <Field vertical>
                    <Label>Vide + placeholder</Label>
                    <Picker
                      name="color_empty_placeholder"
                      type="color"
                      placeholder="Choisir une couleur"
                    />
                  </Field>
                  <Field vertical>
                    <Label>Avec valeur</Label>
                    <Picker
                      name="color_with_value"
                      type="color"
                      defaultValue={DEFAULT_COLOR}
                    />
                  </Field>
                  <Field vertical>
                    <Label>Readonly</Label>
                    <Picker
                      name="color_readonly"
                      type="color"
                      defaultValue={DEFAULT_COLOR}
                      readOnly
                    />
                  </Field>
                  <Field vertical>
                    <Label>Disabled</Label>
                    <Picker
                      name="color_disabled"
                      type="color"
                      defaultValue={DEFAULT_COLOR}
                      disabled
                    />
                  </Field>
                  <Field vertical>
                    <Label>Loading</Label>
                    <Picker
                      name="color_loading"
                      type="color"
                      defaultValue={DEFAULT_COLOR}
                      loading
                    />
                  </Field>
                </Box>
              </div>
              <div>
                <div class="states-col-header">User agent</div>
                <Box flex="y" spacing="s">
                  <Field vertical>
                    <Label>Vide (n/a — toujours noir)</Label>
                    <input type="color" />
                  </Field>
                  <Field vertical>
                    <Label>Vide + placeholder (n/a)</Label>
                    <input type="color" />
                  </Field>
                  <Field vertical>
                    <Label>Avec valeur</Label>
                    <input type="color" value={DEFAULT_COLOR} readOnly />
                  </Field>
                  <Field vertical>
                    <Label>Readonly</Label>
                    <input type="color" value={DEFAULT_COLOR} readOnly />
                  </Field>
                  <Field vertical>
                    <Label>Disabled</Label>
                    <input type="color" value={DEFAULT_COLOR} disabled />
                  </Field>
                  <Field vertical>
                    <Label>Loading (n/a)</Label>
                    <input type="color" value={DEFAULT_COLOR} disabled />
                  </Field>
                </Box>
              </div>
            </div>
          </div>
        );
      };

      // ── 2. Avec une action ────────────────────────────────────────────────

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const WithActionDemo = () => {
        const colorSignal = useSignal("#3b82f6");
        const savedColorSignal = useSignal("#3b82f6");

        return (
          <div class="demo-section" id="with-action">
            <h2>2. Avec une action</h2>
            <p class="desc">
              L'action est asynchrone (simule un appel réseau de 800 ms). Le
              picker passe en état loading pendant ce temps.
            </p>
            <Box flex="y" spacing="s" alignX="start">
              <Field vertical>
                <Label>Couleur du thème</Label>
                <Picker
                  name="theme_color"
                  type="color"
                  value={colorSignal.value}
                  action={async (v) => {
                    await sleep(800);
                    colorSignal.value = v;
                    savedColorSignal.value = v;
                  }}
                />
              </Field>
              <p class="value-display">
                Dernière valeur sauvegardée :{" "}
                <strong style={{ color: savedColorSignal.value }}>
                  {savedColorSignal.value}
                </strong>
              </p>
            </Box>
          </div>
        );
      };

      // ── 3. Dans un form ───────────────────────────────────────────────────

      const InFormDemo = () => {
        const submittedSignal = useSignal(null);
        return (
          <div class="demo-section" id="in-form">
            <h2>3. Dans un form</h2>
            <p class="desc">
              Le picker participe à la soumission du formulaire comme n'importe
              quel champ.
            </p>
            <Form
              action={(values) => {
                submittedSignal.value = values;
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Couleur principale</Label>
                <Picker name="primary_color" type="color" />
              </Field>
              <Field vertical>
                <Label>Couleur secondaire</Label>
                <Picker name="secondary_color" type="color" />
              </Field>
              <Button type="submit">Soumettre</Button>
              {submittedSignal.value && (
                <pre style="margin:0;font-size:12px;background:#f0f0f0;padding:8px;border-radius:4px;width:100%;box-sizing:border-box;">
                  {JSON.stringify(submittedSignal.value, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      // ── 4. Validation dans un form (required) ─────────────────────────────

      const ValidationDemo = () => {
        const submittedSignal = useSignal(null);
        return (
          <div class="demo-section" id="validation">
            <h2>4. Validation dans un form (required)</h2>
            <p class="desc">
              Champ obligatoire — la soumission échoue si aucune couleur n'est
              choisie.
            </p>
            <Form
              action={(values) => {
                submittedSignal.value = values;
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Couleur (obligatoire)</Label>
                <Picker name="required_color" type="color" required />
              </Field>
              <Field vertical>
                <Label>Couleur (message personnalisé)</Label>
                <Picker
                  name="required_color_custom"
                  type="color"
                  required
                  requiredMessage="Merci de choisir une couleur."
                />
              </Field>
              <Button type="submit">Soumettre</Button>
              {submittedSignal.value && (
                <pre style="margin:0;font-size:12px;background:#f0f0f0;padding:8px;border-radius:4px;width:100%;box-sizing:border-box;">
                  {JSON.stringify(submittedSignal.value, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      // ── 5. Customization ──────────────────────────────────────────────────

      const SWATCHES = [
        { label: "Rouge", value: "#ef4444" },
        { label: "Orange", value: "#f97316" },
        { label: "Jaune", value: "#eab308" },
        { label: "Vert", value: "#22c55e" },
        { label: "Bleu", value: "#3b82f6" },
        { label: "Violet", value: "#a855f7" },
        { label: "Rose", value: "#ec4899" },
      ];

      const CustomizationDemo = () => {
        const colorSignal = useSignal(null);
        return (
          <div class="demo-section" id="customization">
            <h2>5. Customization</h2>
            <p class="desc">
              On passe des enfants au Picker pour afficher une palette de
              swatches construite avec <code>SelectableList</code> +{" "}
              <code>Selectable</code>. La couleur sélectionnée est mise en
              évidence et le popover se ferme automatiquement.
            </p>
            <Field vertical>
              <Label>Couleur de badge</Label>
              <Picker
                name="badge_color"
                type="color"
                value={colorSignal.value}
                action={(v) => {
                  colorSignal.value = v;
                }}
              >
                <SelectableList
                  selectedIndicator="backgroundColor"
                  action="submit"
                >
                  {SWATCHES.map(({ label, value }, i) => (
                    <Selectable
                      key={value}
                      id={value}
                      index={i}
                      value={value}
                      selected={colorSignal.value === value}
                      flex
                      alignY="center"
                      spacing="s"
                      padding="s"
                    >
                      <Color
                        circle
                        border="1px solid rgba(0,0,0,0.15)"
                        height="18"
                      >
                        {value}
                      </Color>
                      {label}
                    </Selectable>
                  ))}
                </SelectableList>
              </Picker>
            </Field>
            <p class="value-display">
              Valeur :{" "}
              {colorSignal.value ? (
                <strong style={{ color: colorSignal.value }}>
                  {colorSignal.value}
                </strong>
              ) : (
                <span style={{ color: "#999" }}>—</span>
              )}
            </p>
          </div>
        );
      };

      render(
        <NaviDebug debugAction debugInteraction debugPopup>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
