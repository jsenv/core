<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Picker Date Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 4px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .states-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: start;
        gap: 16px;
      }
      .states-col-header {
        margin-bottom: 12px;
        color: #888;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Date Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import { CallLog, useCallLog } from "../utils/call_log.jsx";
      import {
        Box,
        Field,
        Label,
        Picker,
        Form,
        Button,
        NaviDebug,
      } from "@jsenv/navi";

      const App = () => (
        <Box flex="y" spacing="l">
          <TableOfContents />
          <StatesDemo />
          <WithActionDemo />
          <InFormDemo />
          <CustomizationDemo />
        </Box>
      );

      const TableOfContents = () => (
        <div class="demo-section">
          <h2>Table of contents</h2>
          <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
            <li>
              <a href="#states">États</a>
            </li>
            <li>
              Interactivity
              <ol style={{ paddingLeft: "20px" }}>
                <li>
                  <a href="#outside-form">Outside a form</a>
                </li>
                <li>
                  <a href="#inside-form">Inside a form (+ required)</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#customization">Customization</a>
            </li>
          </ol>
        </div>
      );

      // ── 1. États ──────────────────────────────────────────────────────────

      const DEFAULT_DATE = "2026-06-03";

      const StatesDemo = () => (
        <div class="demo-section" id="states">
          <h2>1. États</h2>
          <p class="desc">
            États principaux du picker date jsenv. La colonne native est fournie
            à titre de comparaison.
          </p>
          <div class="states-grid">
            <div>
              <div class="states-col-header">Navi Picker</div>
              <Box flex="y" spacing="s">
                <Field vertical>
                  <Label>Vide</Label>
                  <Picker name="date_empty" type="date" />
                </Field>
                <Field vertical>
                  <Label>Avec valeur</Label>
                  <Picker
                    name="date_with_value"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                  />
                </Field>
                <Field vertical>
                  <Label>Readonly</Label>
                  <Picker
                    name="date_readonly"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    readOnly
                  />
                </Field>
                <Field vertical>
                  <Label>Disabled</Label>
                  <Picker
                    name="date_disabled"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    disabled
                  />
                </Field>
              </Box>
            </div>
            <div>
              <div class="states-col-header">User agent</div>
              <Box flex="y" spacing="s">
                <Field vertical>
                  <Label>Vide</Label>
                  <input type="date" />
                </Field>
                <Field vertical>
                  <Label>Avec valeur</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} />
                </Field>
                <Field vertical>
                  <Label>Readonly</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} readOnly />
                </Field>
                <Field vertical>
                  <Label>Disabled</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} disabled />
                </Field>
              </Box>
            </div>
          </div>
        </div>
      );

      // ── 2. Interactivity — outside a form ─────────────────────────────────

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const WithActionDemo = () => {
        const [entries, push, clear] = useCallLog();
        const dateSignal = useSignal(DEFAULT_DATE);

        return (
          <div class="demo-section" id="outside-form">
            <h2>2. Interactivity — outside a form</h2>
            <p class="desc">
              L'action est asynchrone (simule un appel réseau de 800 ms). Le
              picker passe en état loading pendant ce temps.
            </p>
            <Box flex="y" spacing="m">
              <Field vertical>
                <Label>No initial date</Label>
                <Picker
                  name="date_no_initial"
                  type="date"
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                  }}
                />
              </Field>
              <Field vertical>
                <Label>With initial date</Label>
                <Picker
                  name="date_with_initial"
                  type="date"
                  value={dateSignal.value}
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                    dateSignal.value = v;
                  }}
                />
              </Field>
            </Box>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 3. Interactivity — inside a form ─────────────────────────────────

      const InFormDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="inside-form">
            <h2>3. Interactivity — inside a form</h2>
            <p class="desc">
              Deux pickers obligatoires : l'un avec une valeur par défaut,
              l'autre sans. La soumission échoue si un champ est vide.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (avec valeur par défaut, required)</Label>
                <Picker
                  name="date_with_default"
                  type="date"
                  defaultValue={DEFAULT_DATE}
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (with default)", v);
                  }}
                />
              </Field>
              <Field vertical>
                <Label>Date (sans valeur, required)</Label>
                <Picker
                  name="date_no_default"
                  type="date"
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (no default)", v);
                  }}
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 4. Customization ─────────────────────────────────────────────────

      const CustomizationDemo = () => (
        <div class="demo-section" id="customization">
          <h2>4. Customization — Picker.UI.Date</h2>
          <p class="desc">
            Passez <code>ui={"<Picker.UI.Date />"}</code> pour personnaliser
            l'affichage de la date. Les props <code>long</code> et{" "}
            <code>dayLabel</code> sont transmises au composant
            <code>&lt;Time type="date"&gt;</code> sous-jacent.
          </p>
          <Box flex="y" spacing="s">
            <Field vertical>
              <Label>Default (short, no relative label)</Label>
              <Picker
                name="date_default_ui"
                type="date"
                defaultValue={DEFAULT_DATE}
              />
            </Field>
            <Field vertical>
              <Label>long — format long ("mardi 3 juin 2026")</Label>
              <Picker
                name="date_long"
                type="date"
                defaultValue={DEFAULT_DATE}
                ui={<Picker.UI.Date long />}
              />
            </Field>
            <Field vertical>
              <Label>dayLabel — ajoute "aujourd'hui" / "demain" / "hier"</Label>
              <Picker
                name="date_daylabel"
                type="date"
                defaultValue={DEFAULT_DATE}
                ui={<Picker.UI.Date dayLabel />}
              />
            </Field>
            <Field vertical>
              <Label>long + dayLabel</Label>
              <Picker
                name="date_long_daylabel"
                type="date"
                defaultValue={DEFAULT_DATE}
                ui={<Picker.UI.Date long dayLabel />}
              />
            </Field>
          </Box>
        </div>
      );

      render(
        <NaviDebug debugAction debugInteraction debugPopup>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
