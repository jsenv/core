<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Picker Date Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 4px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .states-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: start;
        gap: 16px;
      }
      .states-col-header {
        margin: 0 0 12px;
        color: #888;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Date Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { CallLog, useCallLog } from "../utils/call_log.jsx";
      import {
        Box,
        Field,
        Label,
        Picker,
        Form,
        Button,
        NaviDebug,
        stateSignal,
        route,
        setupRoutes,
      } from "@jsenv/navi";

      const App = () => (
        <Box flex="y" spacing="l">
          <TableOfContents />
          <StatesDemo />
          <WithActionDemo />
          <InFormDemo />
          <ValidationDemo />
          <CustomizationDemo />
          <ClipboardDemo />
          <DateTimeComboDemo />
        </Box>
      );

      const TableOfContents = () => (
        <div class="demo-section">
          <h2>Table of contents</h2>
          <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
            <li>
              <a href="#states">États</a>
            </li>
            <li>
              Interactivity
              <ol style={{ paddingLeft: "20px" }}>
                <li>
                  <a href="#outside-form">Outside a form</a>
                </li>
                <li>
                  <a href="#inside-form">Inside a form (+ required)</a>
                </li>
              </ol>
            </li>
            <li>
              Validation
              <ol style={{ paddingLeft: "20px" }}>
                <li>
                  <a href="#validation-required">Required</a>
                </li>
                <li>
                  <a href="#validation-min">Min</a>
                </li>
                <li>
                  <a href="#validation-max">Max</a>
                </li>
                <li>
                  <a href="#validation-step">Step</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#customization">Customization</a>
            </li>
            <li>
              <a href="#clipboard">Clipboard</a>
            </li>
            <li>
              <a href="#date-time-combo">Date + Time combo</a>
            </li>
          </ol>
        </div>
      );

      // ── 1. États ──────────────────────────────────────────────────────────

      const DEFAULT_DATE = "2026-06-03";

      const StatesDemo = () => (
        <div class="demo-section" id="states">
          <h2>1. États</h2>
          <p class="desc">
            États principaux du picker date jsenv. La colonne native est fournie
            à titre de comparaison.
          </p>
          <div class="states-grid">
            <div>
              <div class="states-col-header">Navi Picker</div>
              <Box flex="y" spacing="s">
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Vide</Label>
                  <Picker name="date_empty" type="date" />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Avec valeur</Label>
                  <Picker
                    name="date_with_value"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                  />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Readonly</Label>
                  <Picker
                    name="date_readonly"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    readOnly
                  />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Disabled</Label>
                  <Picker
                    name="date_disabled"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    disabled
                  />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">
                    Overflow (width contrainte)
                  </Label>
                  <Picker
                    name="date_overflow"
                    type="date"
                    defaultValue="2026-09-11"
                    ui={<Picker.UI.Date long />}
                    style={{ width: "120px" }}
                  />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">
                    Width 200px + alignX center
                  </Label>
                  <Picker
                    name="date_align_center"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    width="200px"
                    textAlign="center"
                  />
                </Field>
              </Box>
            </div>
            <div>
              <div class="states-col-header">User agent</div>
              <Box flex="y" spacing="s">
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Vide</Label>
                  <input type="date" />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Avec valeur</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Readonly</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} readOnly />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Disabled</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} disabled />
                </Field>
              </Box>
            </div>
          </div>
        </div>
      );

      // ── 2. Interactivity — outside a form ─────────────────────────────────

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const noInitialDateSignal = stateSignal("", {
        id: "no_initial_date",
        type: "date",
      });
      const withInitialDateSignal = stateSignal(DEFAULT_DATE, {
        id: "with_initial_date",
        type: "date",
      });

      const now = new Date();
      const in30days = new Date(now);
      in30days.setDate(now.getDate() + 30);

      const dateSignalCombo = stateSignal(DEFAULT_DATE, {
        type: "date",
        min: now,
        autoFix: true,
      });
      const timeSignalCombo = stateSignal("09:00", {
        type: "time",
        min: "07:00",
        max: "21:00",
        step: "00:30",
      });

      const DEMO_ROUTE = route("", {
        searchParams: {
          no_initial_date: noInitialDateSignal,
          with_initial_date: withInitialDateSignal,

          combo_date: dateSignalCombo,
          combo_time: timeSignalCombo,
        },
      });
      setupRoutes([DEMO_ROUTE]);

      const WithActionDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="outside-form">
            <h2>2. Interactivity — outside a form</h2>
            <p class="desc">
              L'action est asynchrone (simule un appel réseau de 800 ms). Le
              picker passe en état loading pendant ce temps.
            </p>
            <Box flex="y" spacing="m">
              <Field vertical>
                <Label>No initial date</Label>
                <Picker
                  name="date_no_initial"
                  type="date"
                  value={noInitialDateSignal.value}
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                    noInitialDateSignal.value = v;
                  }}
                />
              </Field>
              <Field vertical>
                <Label>With initial date</Label>
                <Picker
                  name="date_with_initial"
                  type="date"
                  value={withInitialDateSignal.value}
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                    withInitialDateSignal.value = v;
                  }}
                />
              </Field>
            </Box>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 3. Interactivity — inside a form ─────────────────────────────────

      const InFormDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="inside-form">
            <h2>3. Interactivity — inside a form</h2>
            <p class="desc">
              Deux pickers obligatoires : l'un avec une valeur par défaut,
              l'autre sans. La soumission échoue si un champ est vide.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (avec valeur par défaut, required)</Label>
                <Picker
                  name="date_with_default"
                  type="date"
                  defaultValue={DEFAULT_DATE}
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (with default)", v);
                  }}
                />
              </Field>
              <Field vertical>
                <Label>Date (sans valeur, required)</Label>
                <Picker
                  name="date_no_default"
                  type="date"
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (no default)", v);
                  }}
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 4. Validation ───────────────────────────────────────────────────

      const ValidationRequired = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div>
            <h3
              id="validation-required"
              style={{ margin: "0 0 8px", fontSize: "0.95rem" }}
            >
              4.1 Required
            </h3>
            <p class="desc">
              Picker sans valeur, obligatoire. Soumettre déclenche le callout de
              validation.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (required)</Label>
                <Picker name="val_required" type="date" required />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const ValidationMin = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div>
            <h3
              id="validation-min"
              style={{ margin: "0 0 8px", fontSize: "0.95rem" }}
            >
              4.2 Min
            </h3>
            <p class="desc">
              Pré-rempli avec <code>2026-05-01</code> alors que{" "}
              <code>min="2026-06-01"</code>. Soumettre déclenche le callout de
              validation.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (min 2026-06-01, required)</Label>
                <Picker
                  name="val_min"
                  type="date"
                  required
                  min="2026-06-01"
                  defaultValue="2026-05-01"
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const ValidationMax = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div>
            <h3
              id="validation-max"
              style={{ margin: "0 0 8px", fontSize: "0.95rem" }}
            >
              4.3 Max
            </h3>
            <p class="desc">
              Pré-rempli avec <code>2026-12-01</code> alors que{" "}
              <code>max="2026-06-30"</code>. Soumettre déclenche le callout de
              validation.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (max 2026-06-30, required)</Label>
                <Picker
                  name="val_max"
                  type="date"
                  required
                  max="2026-06-30"
                  defaultValue="2026-12-01"
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const ValidationStep = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div>
            <h3
              id="validation-step"
              style={{ margin: "0 0 8px", fontSize: "0.95rem" }}
            >
              4.4 Step
            </h3>
            <p class="desc">
              Pré-rempli avec <code>2026-06-03</code> (mercredi) alors que{" "}
              <code>min="2026-06-01"</code> + <code>step="7"</code> (tous les 7
              jours). Les dates valides sont 2026-06-01, 2026-06-08, etc.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (step 7 jours, required)</Label>
                <Picker
                  name="val_step"
                  type="date"
                  required
                  min="2026-06-01"
                  step="7"
                  defaultValue="2026-06-03"
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const ValidationDemo = () => (
        <div class="demo-section" id="validation">
          <h2>4. Validation</h2>
          <Box flex="y" spacing="m">
            <ValidationRequired />
            <hr
              style={{
                margin: "4px 0",
                border: "none",
                borderTop: "1px solid #eee",
              }}
            />
            <ValidationMin />
            <hr
              style={{
                margin: "4px 0",
                border: "none",
                borderTop: "1px solid #eee",
              }}
            />
            <ValidationMax />
            <hr
              style={{
                margin: "4px 0",
                border: "none",
                borderTop: "1px solid #eee",
              }}
            />
            <ValidationStep />
          </Box>
        </div>
      );

      // ── 5. Customization ─────────────────────────────────────────────────

      // Dates chosen to contrast short vs long day/month names:
      // "2026-06-03" → mercredi 3 juin      (medium day, short month)
      // "2026-09-11" → vendredi 11 septembre (long day, long month)
      // "2026-01-20" → mardi 20 janvier      (short day, medium month)
      const DEMO_DATES = ["2026-06-03", "2026-09-11", "2026-01-20"];

      // Fixed reference point for dayLabel demos so yesterday/today/tomorrow
      // labels are always visible regardless of the actual current date.
      const DAY_LABEL_NOW = new Date("2026-06-03T12:00:00");
      const DAY_LABEL_YESTERDAY = "2026-06-02";
      const DAY_LABEL_TODAY = "2026-06-03";
      const DAY_LABEL_TOMORROW = "2026-06-04";

      const CustomizationDemo = () => (
        <div class="demo-section" id="customization">
          <h2>5. Customization — Picker.UI.Date</h2>
          <p class="desc">
            Passez <code>ui={"{<Picker.UI.Date />}"}</code> pour personnaliser
            l'affichage de la date sélectionnée. Les props sont transmises au
            composant <code>&lt;Time type="date"&gt;</code> sous-jacent.
          </p>

          <div class="states-grid">
            <div>
              <h3 class="states-col-header">Default — format long</h3>
              <p class="desc">
                Format par défaut&nbsp;: nom du jour et du mois en toutes
                lettres (ex&nbsp;: «&nbsp;mercredi 3 juin 2026&nbsp;»). La
                largeur varie davantage selon la date.
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                {DEMO_DATES.map((d, i) => (
                  <Picker
                    key={i}
                    name={`date_default_${i}`}
                    type="date"
                    defaultValue={d}
                  />
                ))}
              </Box>
              <hr
                style={{
                  margin: "12px 0",
                  border: "none",
                  borderTop: "1px solid #eee",
                }}
              />
              <p
                class="desc"
                style={{ margin: "0 0 8px", fontStyle: "italic" }}
              >
                avec dayLabel
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                <Picker
                  name="date_daylabel_yesterday"
                  type="date"
                  defaultValue={DAY_LABEL_YESTERDAY}
                  ui={<Picker.UI.Date dayLabel now={DAY_LABEL_NOW} />}
                />
                <Picker
                  name="date_daylabel_today"
                  type="date"
                  defaultValue={DAY_LABEL_TODAY}
                  ui={<Picker.UI.Date dayLabel now={DAY_LABEL_NOW} />}
                />
                <Picker
                  name="date_daylabel_tomorrow"
                  type="date"
                  defaultValue={DAY_LABEL_TOMORROW}
                  ui={<Picker.UI.Date dayLabel now={DAY_LABEL_NOW} />}
                />
              </Box>
            </div>
            <div>
              <h3 class="states-col-header">format="short" — format court</h3>
              <p class="desc">
                Forme abrégée via <code>format="short"</code> (ex&nbsp;:
                «&nbsp;Mer. 3 juin&nbsp;»). La largeur varie légèrement selon
                le mois, mais reste compacte.
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                {DEMO_DATES.map((d, i) => (
                  <Picker
                    key={i}
                    name={`date_short_${i}`}
                    type="date"
                    defaultValue={d}
                    ui={<Picker.UI.Date format="short" />}
                  />
                ))}
              </Box>
              <hr
                style={{
                  margin: "12px 0",
                  border: "none",
                  borderTop: "1px solid #eee",
                }}
              />
              <p
                class="desc"
                style={{ margin: "0 0 8px", fontStyle: "italic" }}
              >
                avec dayLabel
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                <Picker
                  name="date_short_daylabel_yesterday"
                  type="date"
                  defaultValue={DAY_LABEL_YESTERDAY}
                  ui={
                    <Picker.UI.Date
                      format="short"
                      dayLabel
                      now={DAY_LABEL_NOW}
                    />
                  }
                />
                <Picker
                  name="date_short_daylabel_today"
                  type="date"
                  defaultValue={DAY_LABEL_TODAY}
                  ui={
                    <Picker.UI.Date
                      format="short"
                      dayLabel
                      now={DAY_LABEL_NOW}
                    />
                  }
                />
                <Picker
                  name="date_short_daylabel_tomorrow"
                  type="date"
                  defaultValue={DAY_LABEL_TOMORROW}
                  ui={
                    <Picker.UI.Date
                      format="short"
                      dayLabel
                      now={DAY_LABEL_NOW}
                    />
                  }
                />
              </Box>
            </div>
          </div>

          <hr
            style={{
              margin: "20px 0",
              border: "none",
              borderTop: "1px solid #eee",
            }}
          />
          <h3 class="states-col-header">numeric — jj/mm/aaaa</h3>
          <p class="desc">
            Format numérique&nbsp;: chiffres uniquement, séparateurs selon la
            locale (ex&nbsp;: «&nbsp;03/06/2026&nbsp;» en français).
          </p>
          <Box flex="y" spacing="xs" alignX="start">
            {DEMO_DATES.map((d, i) => (
              <Picker
                key={i}
                name={`date_numeric_${i}`}
                type="date"
                defaultValue={d}
                ui={<Picker.UI.Date format="numeric" />}
              />
            ))}
          </Box>

          <hr
            style={{
              margin: "20px 0",
              border: "none",
              borderTop: "1px solid #eee",
            }}
          />
          <h3 class="states-col-header">
            Sizing, padding, border-radius, text-align
          </h3>
          <p class="desc">
            Le picker accepte <code>size</code> ("s", "m", "l"…), du padding via{" "}
            <code>paddingX</code> / <code>paddingY</code>, un border-radius via{" "}
            <code>borderRadius</code>, et <code>textAlign</code>.
          </p>
          <Box flex="y" spacing="s" alignX="start">
            <span style={{ color: "#888", fontSize: "12px" }}>
              size s / m / l
            </span>

            <Box flex spacing="s" alignX="start" alignY="center">
              <Picker
                name="date_size_s"
                type="date"
                defaultValue={DEMO_DATES[0]}
                size="s"
              />
              <Picker
                name="date_size_m"
                type="date"
                defaultValue={DEMO_DATES[0]}
                size="m"
              />
              <Picker
                name="date_size_l"
                type="date"
                defaultValue={DEMO_DATES[0]}
                size="l"
              />
            </Box>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <span style={{ color: "#888", fontSize: "12px" }}>
                padding x+xs / l+m
              </span>

              <Picker
                name="date_padding_xs"
                type="date"
                defaultValue={DEMO_DATES[0]}
                paddingX="s"
                paddingY="xs"
              />
              <Picker
                name="date_padding_m"
                type="date"
                defaultValue={DEMO_DATES[0]}
                paddingX="l"
                paddingY="m"
              />
            </Box>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <span style={{ color: "#888", fontSize: "12px" }}>
                padding + border-radius 0 / m
              </span>

              <Picker
                name="date_radius_0"
                type="date"
                defaultValue={DEMO_DATES[0]}
                borderRadius="0"
                padding="m"
              />
              <Picker
                name="date_radius_full"
                type="date"
                defaultValue={DEMO_DATES[0]}
                borderRadius="m"
                padding="m"
              />
            </Box>
            <Box flex="y" spacing="s" alignX="start" alignY="center">
              <span style={{ color: "#888", fontSize: "12px" }}>
                textAlign left / center / right
              </span>

              <Picker
                name="date_align_left"
                type="date"
                defaultValue={DEMO_DATES[0]}
                width="200px"
                textAlign="left"
              />
              <Picker
                name="date_align_center"
                type="date"
                defaultValue={DEMO_DATES[0]}
                width="200px"
                textAlign="center"
              />
              <Picker
                name="date_align_right"
                type="date"
                defaultValue={DEMO_DATES[0]}
                width="200px"
                textAlign="right"
              />
            </Box>
            <div>
              <p class="desc" style={{ margin: "0 0 8px" }}>
                <strong>Interactivité de la bordure et du border-radius</strong>
                <br />
                Cliquer sur la bordure elle-même ouvre le picker (la bordure
                fait partie de la surface cliquable). En revanche, les coins
                arrondis créés par le border-radius ne sont pas interactifs — le
                hit-area suit la forme rectangulaire de l'élément avant
                arrondissement.
              </p>
              <Picker
                name="date_border_demo"
                type="date"
                defaultValue={DEMO_DATES[0]}
                borderWidth="20"
                borderRadius="m"
              />
            </div>
          </Box>

          <hr
            style={{
              margin: "20px 0",
              border: "none",
              borderTop: "1px solid #eee",
            }}
          />
          <h3 class="states-col-header">ui="default" — UI du navigateur</h3>
          <p class="desc">
            Passer <code>ui="default"</code> conserve l'UI native du navigateur
            tout en bénéficiant du système navi (validation, action, états
            loading…).
          </p>
          <div class="states-grid">
            <div>
              <p
                class="desc"
                style={{ margin: "0 0 8px", fontStyle: "italic" }}
              >
                Picker ui="default"
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                {DEMO_DATES.map((d, i) => (
                  <Picker
                    key={i}
                    name={`date_browser_${i}`}
                    type="date"
                    defaultValue={d}
                    ui="default"
                  />
                ))}
              </Box>
            </div>
            <div>
              <p
                class="desc"
                style={{ margin: "0 0 8px", fontStyle: "italic" }}
              >
                input natif (référence)
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                {DEMO_DATES.map((d, i) => (
                  <input key={i} type="date" defaultValue={d} />
                ))}
              </Box>
            </div>
          </div>
        </div>
      );

      // ── 6. Clipboard ─────────────────────────────────────────────────────

      const INSPECT_TYPES = ["text/plain", "application/x-navi"];

      const ClipboardDemo = () => {
        const [clipEntries, setClipEntries] = useState(null);

        const onPaste = (e) => {
          e.preventDefault();
          const entries = INSPECT_TYPES.map((type) => ({
            type,
            value: e.clipboardData.getData(type),
          }));
          setClipEntries(entries);
        };

        return (
          <div class="demo-section" id="clipboard">
            <h2>6. Clipboard</h2>
            <p class="desc">
              La source est en <strong>français</strong> (
              <code>ui={"{<Picker.UI.Date lang=\"fr\" />}"}</code>) et la cible
              en <strong>anglais</strong> (
              <code>ui={"{<Picker.UI.Date lang=\"en\" />}"}</code>). Copier /
              couper dans la source puis coller dans la cible : le texte affiché
              change de langue mais la date sous-jacente est préservée.
            </p>
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "1fr 1fr",
                gap: "24px",
                alignItems: "start",
              }}
            >
              <Box flex="y" spacing="s" alignX="start">
                <p class="desc" style={{ margin: 0 }}>
                  Source — <strong>fr</strong> · sélectionnez puis{" "}
                  <kbd>Ctrl+C</kbd> / <kbd>⌘C</kbd> ou{" "}
                  <kbd>Ctrl+X</kbd> / <kbd>⌘X</kbd>
                </p>
                <Picker
                  name="clipboard_source"
                  type="date"
                  defaultValue={DEFAULT_DATE}
                  ui={<Picker.UI.Date lang="fr" />}
                />
              </Box>
              <Box flex="y" spacing="s" alignX="start">
                <p class="desc" style={{ margin: 0 }}>
                  Cible — <strong>en</strong> · <kbd>Ctrl+V</kbd> /{" "}
                  <kbd>⌘V</kbd> ici
                </p>
                <Picker
                  name="clipboard_target"
                  type="date"
                  ui={<Picker.UI.Date lang="en" />}
                />
              </Box>
            </div>
            <Box flex="y" spacing="xs" style={{ marginTop: "16px" }}>
              <p class="desc" style={{ margin: 0 }}>
                Collez ici pour inspecter le contenu du presse-papiers
              </p>
              <textarea
                rows={2}
                style={{
                  fontFamily: "monospace",
                  fontSize: "13px",
                  width: "100%",
                  boxSizing: "border-box",
                  padding: "6px 8px",
                  border: "1px solid #ccc",
                  borderRadius: "4px",
                }}
                placeholder="paste here…"
                onPaste={onPaste}
              />
              {clipEntries ? (
                <table
                  style={{
                    borderCollapse: "collapse",
                    fontSize: "13px",
                    width: "100%",
                  }}
                >
                  {clipEntries.map(({ type, value }) => (
                    <tr key={type} style={{ borderTop: "1px solid #e8e8e8" }}>
                      <td
                        style={{
                          padding: "4px 10px 4px 0",
                          fontFamily: "monospace",
                          color: "#888",
                          whiteSpace: "nowrap",
                          verticalAlign: "top",
                        }}
                      >
                        {type}
                      </td>
                      <td
                        style={{
                          padding: "4px 0",
                          fontFamily: "monospace",
                          wordBreak: "break-all",
                        }}
                      >
                        {value ? (
                          JSON.stringify(value)
                        ) : (
                          <span style={{ color: "#bbb" }}>(empty)</span>
                        )}
                      </td>
                    </tr>
                  ))}
                </table>
              ) : null}
            </Box>
          </div>
        );
      };

      // ── 7. Date + Time combo ─────────────────────────────────────────────

      const DateTimeComboDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="date-time-combo">
            <h2>7. Date + Time combo</h2>
            <p class="desc">
              Cas avancé combinant un picker de date et un picker d'heure. Le
              picker d'heure ne propose que les créneaux disponibles — si le
              jour sélectionné est aujourd'hui, <code>min</code> est calculé via{" "}
              <code>getNowHoursRoundedToStep</code> pour ne montrer que les
              créneaux futurs (arrondi au prochain pas supérieur).
            </p>

            <Form
              action={(values) => {
                push("Form action (dynamic)", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Jour</Label>
                <Box flex spacing="s">
                  <Field>
                    <Picker
                      name="combo_date"
                      type="date"
                      required
                      value={dateSignalCombo}
                      uiAction={(v) => {
                        dateSignalCombo.value = v;
                      }}
                    />
                  </Field>
                  <Field>
                    <Picker
                      name="combo_time"
                      type="time"
                      required
                      value={timeSignalCombo}
                      uiAction={(v) => {
                        timeSignalCombo.value = v;
                      }}
                    />
                  </Field>
                </Box>
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>

            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
