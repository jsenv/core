<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Picker Date Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 4px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .states-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: start;
        gap: 16px;
      }
      .states-col-header {
        margin-bottom: 12px;
        color: #888;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Date Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { CallLog, useCallLog } from "../utils/call_log.jsx";
      import {
        Box,
        Field,
        Label,
        Picker,
        Form,
        Button,
        NaviDebug,
        stateSignal,
        route,
        setupRoutes,
      } from "@jsenv/navi";

      const App = () => (
        <Box flex="y" spacing="l">
          <TableOfContents />
          <StatesDemo />
          <WithActionDemo />
          <InFormDemo />
          <ValidationDemo />
          <CustomizationDemo />
          <DateTimeComboDemo />
        </Box>
      );

      const TableOfContents = () => (
        <div class="demo-section">
          <h2>Table of contents</h2>
          <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
            <li>
              <a href="#states">États</a>
            </li>
            <li>
              Interactivity
              <ol style={{ paddingLeft: "20px" }}>
                <li>
                  <a href="#outside-form">Outside a form</a>
                </li>
                <li>
                  <a href="#inside-form">Inside a form (+ required)</a>
                </li>
              </ol>
            </li>
            <li>
              Validation
              <ol style={{ paddingLeft: "20px" }}>
                <li>
                  <a href="#validation-required">Required</a>
                </li>
                <li>
                  <a href="#validation-min">Min</a>
                </li>
                <li>
                  <a href="#validation-max">Max</a>
                </li>
                <li>
                  <a href="#validation-step">Step</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#customization">Customization</a>
            </li>
            <li>
              <a href="#date-time-combo">Date + Time combo</a>
            </li>
          </ol>
        </div>
      );

      // ── 1. États ──────────────────────────────────────────────────────────

      const DEFAULT_DATE = "2026-06-03";

      const StatesDemo = () => (
        <div class="demo-section" id="states">
          <h2>1. États</h2>
          <p class="desc">
            États principaux du picker date jsenv. La colonne native est fournie
            à titre de comparaison.
          </p>
          <div class="states-grid">
            <div>
              <div class="states-col-header">Navi Picker</div>
              <Box flex="y" spacing="s">
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Vide</Label>
                  <Picker name="date_empty" type="date" />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Avec valeur</Label>
                  <Picker
                    name="date_with_value"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                  />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Readonly</Label>
                  <Picker
                    name="date_readonly"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    readOnly
                  />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Disabled</Label>
                  <Picker
                    name="date_disabled"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    disabled
                  />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">
                    Overflow (width contrainte)
                  </Label>
                  <Picker
                    name="date_overflow"
                    type="date"
                    defaultValue="2026-09-11"
                    ui={<Picker.UI.Date long />}
                    style={{ width: "120px" }}
                  />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">
                    Width 200px + alignX center
                  </Label>
                  <Picker
                    name="date_align_center"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    width="200px"
                    textAlign="center"
                  />
                </Field>
              </Box>
            </div>
            <div>
              <div class="states-col-header">User agent</div>
              <Box flex="y" spacing="s">
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Vide</Label>
                  <input type="date" />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Avec valeur</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Readonly</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} readOnly />
                </Field>
                <Field ownLabel vertical>
                  <Label border="1px dotted grey">Disabled</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} disabled />
                </Field>
              </Box>
            </div>
          </div>
        </div>
      );

      // ── 2. Interactivity — outside a form ─────────────────────────────────

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const noInitialDateSignal = stateSignal("", {
        id: "no_initial_date",
        type: "date",
      });
      const withInitialDateSignal = stateSignal(DEFAULT_DATE, {
        id: "with_initial_date",
        type: "date",
      });

      const now = new Date();
      const in30days = new Date(now);
      in30days.setDate(now.getDate() + 30);

      const dateSignalCombo = stateSignal(DEFAULT_DATE, {
        type: "date",
        min: now,
        // autoFix: true,
      });
      const timeSignalCombo = stateSignal("09:00", {
        type: "time",
        min: "07:00",
        max: "21:00",
        step: "00:30",
      });

      const DEMO_ROUTE = route("", {
        searchParams: {
          no_initial_date: noInitialDateSignal,
          with_initial_date: withInitialDateSignal,

          combo_date: dateSignalCombo,
          combo_time: timeSignalCombo,
        },
      });
      setupRoutes([DEMO_ROUTE]);

      const WithActionDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="outside-form">
            <h2>2. Interactivity — outside a form</h2>
            <p class="desc">
              L'action est asynchrone (simule un appel réseau de 800 ms). Le
              picker passe en état loading pendant ce temps.
            </p>
            <Box flex="y" spacing="m">
              <Field vertical>
                <Label>No initial date</Label>
                <Picker
                  name="date_no_initial"
                  type="date"
                  value={noInitialDateSignal.value}
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                    noInitialDateSignal.value = v;
                  }}
                />
              </Field>
              <Field vertical>
                <Label>With initial date</Label>
                <Picker
                  name="date_with_initial"
                  type="date"
                  value={withInitialDateSignal.value}
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                    withInitialDateSignal.value = v;
                  }}
                />
              </Field>
            </Box>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 3. Interactivity — inside a form ─────────────────────────────────

      const InFormDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="inside-form">
            <h2>3. Interactivity — inside a form</h2>
            <p class="desc">
              Deux pickers obligatoires : l'un avec une valeur par défaut,
              l'autre sans. La soumission échoue si un champ est vide.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (avec valeur par défaut, required)</Label>
                <Picker
                  name="date_with_default"
                  type="date"
                  defaultValue={DEFAULT_DATE}
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (with default)", v);
                  }}
                />
              </Field>
              <Field vertical>
                <Label>Date (sans valeur, required)</Label>
                <Picker
                  name="date_no_default"
                  type="date"
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (no default)", v);
                  }}
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 4. Validation ───────────────────────────────────────────────────

      const ValidationRequired = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div>
            <h3
              id="validation-required"
              style={{ margin: "0 0 8px", fontSize: "0.95rem" }}
            >
              4.1 Required
            </h3>
            <p class="desc">
              Picker sans valeur, obligatoire. Soumettre déclenche le callout de
              validation.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (required)</Label>
                <Picker name="val_required" type="date" required />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const ValidationMin = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div>
            <h3
              id="validation-min"
              style={{ margin: "0 0 8px", fontSize: "0.95rem" }}
            >
              4.2 Min
            </h3>
            <p class="desc">
              Pré-rempli avec <code>2026-05-01</code> alors que{" "}
              <code>min="2026-06-01"</code>. Soumettre déclenche le callout de
              validation.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (min 2026-06-01, required)</Label>
                <Picker
                  name="val_min"
                  type="date"
                  required
                  min="2026-06-01"
                  defaultValue="2026-05-01"
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const ValidationMax = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div>
            <h3
              id="validation-max"
              style={{ margin: "0 0 8px", fontSize: "0.95rem" }}
            >
              4.3 Max
            </h3>
            <p class="desc">
              Pré-rempli avec <code>2026-12-01</code> alors que{" "}
              <code>max="2026-06-30"</code>. Soumettre déclenche le callout de
              validation.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (max 2026-06-30, required)</Label>
                <Picker
                  name="val_max"
                  type="date"
                  required
                  max="2026-06-30"
                  defaultValue="2026-12-01"
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const ValidationStep = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div>
            <h3
              id="validation-step"
              style={{ margin: "0 0 8px", fontSize: "0.95rem" }}
            >
              4.4 Step
            </h3>
            <p class="desc">
              Pré-rempli avec <code>2026-06-03</code> (mercredi) alors que{" "}
              <code>min="2026-06-01"</code> + <code>step="7"</code> (tous les 7
              jours). Les dates valides sont 2026-06-01, 2026-06-08, etc.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (step 7 jours, required)</Label>
                <Picker
                  name="val_step"
                  type="date"
                  required
                  min="2026-06-01"
                  step="7"
                  defaultValue="2026-06-03"
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const ValidationDemo = () => (
        <div class="demo-section" id="validation">
          <h2>4. Validation</h2>
          <Box flex="y" spacing="m">
            <ValidationRequired />
            <hr
              style={{
                margin: "4px 0",
                border: "none",
                borderTop: "1px solid #eee",
              }}
            />
            <ValidationMin />
            <hr
              style={{
                margin: "4px 0",
                border: "none",
                borderTop: "1px solid #eee",
              }}
            />
            <ValidationMax />
            <hr
              style={{
                margin: "4px 0",
                border: "none",
                borderTop: "1px solid #eee",
              }}
            />
            <ValidationStep />
          </Box>
        </div>
      );

      // ── 5. Customization ─────────────────────────────────────────────────

      // Dates chosen to contrast short vs long day/month names:
      // "2026-06-03" → mercredi 3 juin      (medium day, short month)
      // "2026-09-11" → vendredi 11 septembre (long day, long month)
      // "2026-01-20" → mardi 20 janvier      (short day, medium month)
      const DEMO_DATES = ["2026-06-03", "2026-09-11", "2026-01-20"];

      // Fixed reference point for dayLabel demos so yesterday/today/tomorrow
      // labels are always visible regardless of the actual current date.
      const DAY_LABEL_NOW = new Date("2026-06-03T12:00:00");
      const DAY_LABEL_YESTERDAY = "2026-06-02";
      const DAY_LABEL_TODAY = "2026-06-03";
      const DAY_LABEL_TOMORROW = "2026-06-04";

      const CustomizationDemo = () => (
        <div class="demo-section" id="customization">
          <h2>5. Customization — Picker.UI.Date</h2>
          <p class="desc">
            Passez <code>ui={"{<Picker.UI.Date />}"}</code> pour personnaliser
            l'affichage de la date sélectionnée. Les props sont transmises au
            composant <code>&lt;Time type="date"&gt;</code> sous-jacent.
          </p>

          <div class="states-grid">
            <div>
              <div class="states-col-header">Default — format court</div>
              <p class="desc">
                Forme abrégée (ex&nbsp;: «&nbsp;Mer. 3 juin&nbsp;»). La largeur
                varie légèrement selon le mois, mais reste compacte.
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                {DEMO_DATES.map((d, i) => (
                  <Picker
                    key={i}
                    name={`date_default_${i}`}
                    type="date"
                    defaultValue={d}
                  />
                ))}
              </Box>
              <hr
                style={{
                  margin: "12px 0",
                  border: "none",
                  borderTop: "1px solid #eee",
                }}
              />
              <p
                class="desc"
                style={{ margin: "0 0 8px", fontStyle: "italic" }}
              >
                avec dayLabel
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                <Picker
                  name="date_daylabel_yesterday"
                  type="date"
                  defaultValue={DAY_LABEL_YESTERDAY}
                  ui={<Picker.UI.Date dayLabel now={DAY_LABEL_NOW} />}
                />
                <Picker
                  name="date_daylabel_today"
                  type="date"
                  defaultValue={DAY_LABEL_TODAY}
                  ui={<Picker.UI.Date dayLabel now={DAY_LABEL_NOW} />}
                />
                <Picker
                  name="date_daylabel_tomorrow"
                  type="date"
                  defaultValue={DAY_LABEL_TOMORROW}
                  ui={<Picker.UI.Date dayLabel now={DAY_LABEL_NOW} />}
                />
              </Box>
            </div>
            <div>
              <div class="states-col-header">long — format long</div>
              <p class="desc">
                Nom du jour et du mois en toutes lettres (ex&nbsp;:
                «&nbsp;vendredi 11 septembre 2026&nbsp;»). La largeur varie
                davantage selon la date.
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                {DEMO_DATES.map((d, i) => (
                  <Picker
                    key={i}
                    name={`date_long_${i}`}
                    type="date"
                    defaultValue={d}
                    ui={<Picker.UI.Date long />}
                  />
                ))}
              </Box>
              <hr
                style={{
                  margin: "12px 0",
                  border: "none",
                  borderTop: "1px solid #eee",
                }}
              />
              <p
                class="desc"
                style={{ margin: "0 0 8px", fontStyle: "italic" }}
              >
                avec dayLabel
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                <Picker
                  name="date_long_daylabel_yesterday"
                  type="date"
                  defaultValue={DAY_LABEL_YESTERDAY}
                  ui={<Picker.UI.Date long dayLabel now={DAY_LABEL_NOW} />}
                />
                <Picker
                  name="date_long_daylabel_today"
                  type="date"
                  defaultValue={DAY_LABEL_TODAY}
                  ui={<Picker.UI.Date long dayLabel now={DAY_LABEL_NOW} />}
                />
                <Picker
                  name="date_long_daylabel_tomorrow"
                  type="date"
                  defaultValue={DAY_LABEL_TOMORROW}
                  ui={<Picker.UI.Date long dayLabel now={DAY_LABEL_NOW} />}
                />
              </Box>
            </div>
          </div>

          <hr
            style={{
              margin: "20px 0",
              border: "none",
              borderTop: "1px solid #eee",
            }}
          />
          <div class="states-col-header">numeric — jj/mm/aaaa</div>
          <p class="desc">
            Format numérique&nbsp;: chiffres uniquement, séparateurs selon la
            locale (ex&nbsp;: «&nbsp;03/06/2026&nbsp;» en français).
          </p>
          <Box flex="y" spacing="xs" alignX="start">
            {DEMO_DATES.map((d, i) => (
              <Picker
                key={i}
                name={`date_numeric_${i}`}
                type="date"
                defaultValue={d}
                ui={<Picker.UI.Date numeric />}
              />
            ))}
          </Box>
        </div>
      );

      // ── 5. Date + Time combo ─────────────────────────────────────────────

      const DateTimeComboDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="date-time-combo">
            <h2>5. Date + Time combo</h2>
            <p class="desc">
              Cas avancé combinant un picker de date et un picker d'heure. Le
              picker d'heure ne propose que les créneaux disponibles — si le
              jour sélectionné est aujourd'hui, <code>min</code> est calculé via{" "}
              <code>getNowHoursRoundedToStep</code> pour ne montrer que les
              créneaux futurs (arrondi au prochain pas supérieur).
            </p>

            <Form
              action={(values) => {
                push("Form action (dynamic)", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Jour</Label>
                <Box flex spacing="s">
                  <Picker
                    name="combo_date"
                    type="date"
                    required
                    value={dateSignalCombo.value}
                    uiAction={(v) => {
                      dateSignalCombo.value = v;
                    }}
                    min={now}
                    max={in30days}
                  />
                  <Picker
                    name="combo_time"
                    type="time"
                    required
                    value={timeSignalCombo}
                    uiAction={(v) => {
                      timeSignalCombo.value = v;
                    }}
                  />
                </Box>
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>

            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
