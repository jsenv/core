<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Picker Date Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 32px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 4px;
        font-size: 1.1rem;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      p.desc {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .states-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: start;
        gap: 16px;
      }
      .states-col-header {
        margin-bottom: 12px;
        color: #888;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Date Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import { CallLog, useCallLog } from "../utils/call_log.jsx";
      import {
        Box,
        Field,
        Label,
        Picker,
        Form,
        Button,
        NaviDebug,
        isToday,
        getNowHoursRoundedToStep,
        stateSignal,
      } from "@jsenv/navi";

      const App = () => (
        <Box flex="y" spacing="l">
          <TableOfContents />
          <StatesDemo />
          <WithActionDemo />
          <InFormDemo />
          <CustomizationDemo />
          <DateTimeComboDemo />
        </Box>
      );

      const TableOfContents = () => (
        <div class="demo-section">
          <h2>Table of contents</h2>
          <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
            <li>
              <a href="#states">États</a>
            </li>
            <li>
              Interactivity
              <ol style={{ paddingLeft: "20px" }}>
                <li>
                  <a href="#outside-form">Outside a form</a>
                </li>
                <li>
                  <a href="#inside-form">Inside a form (+ required)</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#customization">Customization</a>
            </li>
            <li>
              <a href="#date-time-combo">Date + Time combo</a>
            </li>
          </ol>
        </div>
      );

      // ── 1. États ──────────────────────────────────────────────────────────

      const DEFAULT_DATE = "2026-06-03";

      const StatesDemo = () => (
        <div class="demo-section" id="states">
          <h2>1. États</h2>
          <p class="desc">
            États principaux du picker date jsenv. La colonne native est fournie
            à titre de comparaison.
          </p>
          <div class="states-grid">
            <div>
              <div class="states-col-header">Navi Picker</div>
              <Box flex="y" spacing="s">
                <Field vertical>
                  <Label>Vide</Label>
                  <Picker name="date_empty" type="date" />
                </Field>
                <Field vertical>
                  <Label>Avec valeur</Label>
                  <Picker
                    name="date_with_value"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                  />
                </Field>
                <Field vertical>
                  <Label>Readonly</Label>
                  <Picker
                    name="date_readonly"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    readOnly
                  />
                </Field>
                <Field vertical>
                  <Label>Disabled</Label>
                  <Picker
                    name="date_disabled"
                    type="date"
                    defaultValue={DEFAULT_DATE}
                    disabled
                  />
                </Field>
              </Box>
            </div>
            <div>
              <div class="states-col-header">User agent</div>
              <Box flex="y" spacing="s">
                <Field vertical>
                  <Label>Vide</Label>
                  <input type="date" />
                </Field>
                <Field vertical>
                  <Label>Avec valeur</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} />
                </Field>
                <Field vertical>
                  <Label>Readonly</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} readOnly />
                </Field>
                <Field vertical>
                  <Label>Disabled</Label>
                  <input type="date" defaultValue={DEFAULT_DATE} disabled />
                </Field>
              </Box>
            </div>
          </div>
        </div>
      );

      // ── 2. Interactivity — outside a form ─────────────────────────────────

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const WithActionDemo = () => {
        const [entries, push, clear] = useCallLog();
        const dateSignal = useSignal(DEFAULT_DATE);

        return (
          <div class="demo-section" id="outside-form">
            <h2>2. Interactivity — outside a form</h2>
            <p class="desc">
              L'action est asynchrone (simule un appel réseau de 800 ms). Le
              picker passe en état loading pendant ce temps.
            </p>
            <Box flex="y" spacing="m">
              <Field vertical>
                <Label>No initial date</Label>
                <Picker
                  name="date_no_initial"
                  type="date"
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                  }}
                />
              </Field>
              <Field vertical>
                <Label>With initial date</Label>
                <Picker
                  name="date_with_initial"
                  type="date"
                  value={dateSignal.value}
                  uiAction={(v) => {
                    push("Picker uiAction", v);
                  }}
                  action={async (v) => {
                    push("Picker action", v);
                    await sleep(800);
                    dateSignal.value = v;
                  }}
                />
              </Field>
            </Box>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 3. Interactivity — inside a form ─────────────────────────────────

      const InFormDemo = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div class="demo-section" id="inside-form">
            <h2>3. Interactivity — inside a form</h2>
            <p class="desc">
              Deux pickers obligatoires : l'un avec une valeur par défaut,
              l'autre sans. La soumission échoue si un champ est vide.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Date (avec valeur par défaut, required)</Label>
                <Picker
                  name="date_with_default"
                  type="date"
                  defaultValue={DEFAULT_DATE}
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (with default)", v);
                  }}
                />
              </Field>
              <Field vertical>
                <Label>Date (sans valeur, required)</Label>
                <Picker
                  name="date_no_default"
                  type="date"
                  required
                  uiAction={(v) => {
                    push("Picker uiAction (no default)", v);
                  }}
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 4. Customization ─────────────────────────────────────────────────

      // Dates chosen to contrast short vs long day/month names:
      // "2026-06-03" → mercredi 3 juin      (medium day, short month)
      // "2026-09-11" → vendredi 11 septembre (long day, long month)
      // "2026-01-20" → mardi 20 janvier      (short day, medium month)
      const DEMO_DATES = ["2026-06-03", "2026-09-11", "2026-01-20"];

      const CustomizationDemo = () => (
        <div class="demo-section" id="customization">
          <h2>4. Customization — Picker.UI.Date</h2>
          <p class="desc">
            Passez <code>ui={"{<Picker.UI.Date />}"}</code> pour personnaliser
            l'affichage de la date sélectionnée. Les props sont transmises au
            composant <code>&lt;Time type="date"&gt;</code> sous-jacent.
          </p>

          <div class="states-grid">
            <div>
              <div class="states-col-header">Default — format court</div>
              <p class="desc">
                Forme abrégée (ex&nbsp;: «&nbsp;Mer. 3 juin&nbsp;»). La largeur
                varie légèrement selon le mois, mais reste compacte.
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                {DEMO_DATES.map((d, i) => (
                  <Picker
                    key={i}
                    name={`date_default_${i}`}
                    type="date"
                    defaultValue={d}
                  />
                ))}
              </Box>
              <hr
                style={{
                  margin: "12px 0",
                  border: "none",
                  borderTop: "1px solid #eee",
                }}
              />
              <p
                class="desc"
                style={{ margin: "0 0 8px", fontStyle: "italic" }}
              >
                avec dayLabel
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                <Picker
                  name="date_daylabel_yesterday"
                  type="date"
                  defaultValue="2026-06-02"
                  ui={<Picker.UI.Date dayLabel />}
                />
                <Picker
                  name="date_daylabel_today"
                  type="date"
                  defaultValue="2026-06-03"
                  ui={<Picker.UI.Date dayLabel />}
                />
                <Picker
                  name="date_daylabel_tomorrow"
                  type="date"
                  defaultValue="2026-06-04"
                  ui={<Picker.UI.Date dayLabel />}
                />
              </Box>
            </div>
            <div>
              <div class="states-col-header">long — format long</div>
              <p class="desc">
                Nom du jour et du mois en toutes lettres (ex&nbsp;:
                «&nbsp;vendredi 11 septembre 2026&nbsp;»). La largeur varie
                davantage selon la date.
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                {DEMO_DATES.map((d, i) => (
                  <Picker
                    key={i}
                    name={`date_long_${i}`}
                    type="date"
                    defaultValue={d}
                    ui={<Picker.UI.Date long />}
                  />
                ))}
              </Box>
              <hr
                style={{
                  margin: "12px 0",
                  border: "none",
                  borderTop: "1px solid #eee",
                }}
              />
              <p
                class="desc"
                style={{ margin: "0 0 8px", fontStyle: "italic" }}
              >
                avec dayLabel
              </p>
              <Box flex="y" spacing="xs" alignX="start">
                <Picker
                  name="date_long_daylabel_yesterday"
                  type="date"
                  defaultValue="2026-06-02"
                  ui={<Picker.UI.Date long dayLabel />}
                />
                <Picker
                  name="date_long_daylabel_today"
                  type="date"
                  defaultValue="2026-06-03"
                  ui={<Picker.UI.Date long dayLabel />}
                />
                <Picker
                  name="date_long_daylabel_tomorrow"
                  type="date"
                  defaultValue="2026-06-04"
                  ui={<Picker.UI.Date long dayLabel />}
                />
              </Box>
            </div>
          </div>
        </div>
      );

      // ── 5. Date + Time combo ─────────────────────────────────────────────

      const now = new Date();
      const in30days = new Date(now);
      in30days.setDate(now.getDate() + 30);

      const dateSignalCombo = stateSignal(DEFAULT_DATE, {
        type: "date",
        min: now,
        autoFix: true,
      });

      // Step-aligned min values for the fixed sub-examples.
      // getNowHoursRoundedToStep(30, -5) computes: current time minus 5 min, rounded up to next 30-min boundary.
      // At 9:32: 9:27 → ceil to 30 min → 9:30. At 9:38: 9:33 → ceil to 30 min → 10:00.
      const MIN_MORNING = "09:30"; // simulates getNowHoursRoundedToStep(30, -5) at 9:32
      const MIN_EVENING = "21:30"; // simulates getNowHoursRoundedToStep(30, -5) at 21:30 (past max → no slots)

      const DateTimeComboDemo = () => {
        const [entries, push, clear] = useCallLog();
        const hourSignal = useSignal("09:00");
        const hourMorningSignal = useSignal("");
        const hourEveningSignal = useSignal("");

        return (
          <div class="demo-section" id="date-time-combo">
            <h2>5. Date + Time combo</h2>
            <p class="desc">
              Cas avancé combinant un picker de date et un picker d'heure. Le
              picker d'heure ne propose que les créneaux disponibles — si le
              jour sélectionné est aujourd'hui, <code>min</code> est calculé via{" "}
              <code>getNowHoursRoundedToStep</code> pour ne montrer que les
              créneaux futurs (arrondi au prochain pas supérieur).
            </p>

            <p class="desc">
              <strong>Exemple dynamique</strong> — utilise l'heure courante.
            </p>
            <Form
              action={(values) => {
                push("Form action (dynamic)", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Jour</Label>
                <Box flex spacing="s">
                  <Picker
                    name="combo_date"
                    type="date"
                    required
                    value={dateSignalCombo.value}
                    action={(v) => {
                      dateSignalCombo.value = v;
                    }}
                    min={now}
                    max={in30days}
                  />
                  <Picker
                    name="combo_time"
                    type="navi_time"
                    required
                    min={
                      isToday(dateSignalCombo.value)
                        ? getNowHoursRoundedToStep(30, -5)
                        : "07:00"
                    }
                    max="21:00"
                    step="00:30"
                    value={hourSignal.value}
                    action={(v) => {
                      hourSignal.value = v;
                    }}
                  />
                </Box>
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>

            <hr
              style={{
                margin: "20px 0",
                border: "none",
                borderTop: "1px solid #eee",
              }}
            />
            <p class="desc">
              <strong>Simulated 9h32</strong> — le premier créneau disponible
              est 9h30 (getNowHoursRoundedToStep(30, -5) = 9h27 → arrondi au 30
              min supérieur = 9h30).
            </p>
            <Form
              action={(values) => {
                push("Form action (9h32)", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Heure</Label>
                <Picker
                  name="combo_time_morning"
                  type="navi_time"
                  required
                  min={MIN_MORNING}
                  max="21:00"
                  step="00:30"
                  value={hourMorningSignal.value}
                  action={(v) => {
                    hourMorningSignal.value = v;
                  }}
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>

            <hr
              style={{
                margin: "20px 0",
                border: "none",
                borderTop: "1px solid #eee",
              }}
            />
            <p class="desc">
              <strong>Simulated 21h30</strong> — l'heure actuelle dépasse le max
              (21h00). Aucun créneau n'est disponible. On peut tout de même
              soumettre pour observer le comportement du formulaire.
            </p>
            <Form
              action={(values) => {
                push("Form action (21h30)", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Heure</Label>
                <Picker
                  name="combo_time_evening"
                  type="navi_time"
                  required
                  min={MIN_EVENING}
                  max="21:00"
                  step="00:30"
                  value={hourEveningSignal.value}
                  action={(v) => {
                    hourEveningSignal.value = v;
                  }}
                />
              </Field>
              <Button type="submit">Soumettre</Button>
            </Form>

            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      render(
        <NaviDebug debugAction debugInteraction debugPopup>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
