<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Select Picker Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .call-log {
        min-height: 32px;
        margin-top: 16px;
        padding: 10px 12px;
        font-size: 12px;
        font-family: monospace;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
      }
      .call-log-entry {
        display: flex;
        align-items: baseline;
        gap: 8px;
        line-height: 1.6;
      }
      .call-log-entry .count {
        min-width: 20px;
        color: #888;
        font-size: 11px;
      }
      .call-log-entry .label-ui {
        color: #c07000;
        font-weight: bold;
      }
      .call-log-entry .label-action {
        color: #1a56cc;
        font-weight: bold;
      }
      .call-log-entry .value {
        color: #333;
      }
      h1 {
        margin-bottom: 32px;
        color: #333;
        font-size: 1.8rem;
        text-align: center;
      }
      .demo-section h3 {
        margin: 24px 0 6px;
        color: #555;
        font-weight: 600;
        font-size: 0.95rem;
      }
      .demo-section h2 {
        margin: 0 0 8px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.1rem;
        border-bottom: 2px solid #eee;
      }
      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .toc-list {
        margin: 0;
        padding-left: 20px;
        line-height: 2;
      }
      .toc-list a {
        color: #1a56cc;
        text-decoration: none;
      }
      .toc-list a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Select Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import { CallLog, useCallLog } from "../utils/call_log.jsx";
      import {
        Box,
        Field,
        Label,
        Input,
        Picker,
        Icon,
        List,
        SelectableInput,
        NaviDebug,
        Text,
        Form,
        Button,
        route,
        setupRoutes,
        stateSignal,
        useSearchText,
        createSearch,
      } from "@jsenv/navi";

      const searchPlace = createSearch({
        label: {
          getter: (p) => p.label,
          domSelector: ".place-label",
          priority: 2,
        },
        address: {
          getter: (p) => p.address,
          domSelector: ".place-address",
          priority: 1,
        },
      });

      const PLACES = [
        {
          id: "1ebff20a-e52b-4dc4-9ad4-7e250e039547",
          slug: "mouratoglou_sophia",
          label: "Mouratoglou Country Club",
          city: "Biot",
          address: "3550 road des Dolines, 06410 Biot",
        },
        {
          id: "e3a31a8c-e53c-462b-a86e-4a527939626e",
          slug: "tc_roquettan",
          label: "TC Roquettan",
          city: "La Roquette-sur-Siagne",
          address:
            "1691 avenue de la République, et encore plus long pour tester le overflow et ouais encore pluuuus, 06550 La Roquette-sur-Siagne",
        },
        {
          id: "d8adf2e6-f5d5-4821-b01d-7f195dd2768b",
          slug: "tca",
          label: "TCA",
          city: "Antibes",
          address: "330 avenue Jules Grec, 06600 Antibes",
        },
      ];

      const FRUIT_OPTIONS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
      ];

      // ── State signals (persisted in URL search params) ────────────────────

      const sendFruitSignal = stateSignal("Grape", {
        id: "send_fruit",
        type: "string",
      });
      const updateFruitSignal = stateSignal("Banana", {
        id: "update_fruit",
        type: "string",
      });
      const searchFruitSelectedSignal = stateSignal("", {
        id: "search_fruit_selected",
        type: "string",
      });
      const placeSlugSignal = stateSignal("", {
        id: "place_slug",
        type: "string",
      });

      const DEMO_ROUTE = route("", {
        searchParams: {
          send_fruit: sendFruitSignal,
          update_fruit: updateFruitSignal,
          search_fruit_selected: searchFruitSelectedSignal,
          place_slug: placeSlugSignal,
        },
      });
      setupRoutes([DEMO_ROUTE]);

      const TableOfContents = () => (
        <div class="demo-section">
          <h2>Table of contents</h2>
          <ol class="toc-list">
            <li>
              <a href="#section-1">
                1. Default behavior — stays open until closed
              </a>
            </li>
            <li>
              <a href="#section-2">
                2. <code>command="--navi-send"</code> — closes on click
              </a>
            </li>
            <li>
              <a href="#section-3">3. Inside a form</a>
            </li>
            <li>
              <a href="#section-4">4. Searchable select — empty list</a>
            </li>
            <li>
              <a href="#section-5">5. Searchable select — full list</a>
            </li>
            <li>
              <a href="#section-6">6. Searchable select — few results</a>
            </li>
            <li>
              <a href="#section-7">7. Searchable select — no results</a>
            </li>
            <li>
              <a href="#section-8">8. Place picker — rich items with search</a>
            </li>
          </ol>
        </div>
      );

      const App = () => (
        <NaviDebug
          debugUIState
          debugCommand
          debugAction
          debugInteraction
          debugPopup
        >
          <Box flex="y" spacing="l">
            <TableOfContents />
            <SelectWithUpdate />
            <SelectWithSend />
            <SelectInForm />
            <SearchableSelectEmpty />
            <SearchableSelectNormal />
            <SearchableSelectFewResults />
            <SearchableSelectNoResults />
            <PlacePickerDemo />
          </Box>
        </NaviDebug>
      );

      // ── 1. command="--navi-update" — default behavior ───────────────────────────
      // This is the default command for single-select pickers. The selected item is
      // highlighted immediately but the popover stays open, giving the user a chance
      // to review the choice or press Escape to cancel.
      //
      // Why it is the default:
      // - Consistent with multi-select: in a checkbox list the popover must stay open
      //   to allow selecting several items. Using the same behavior for single-select
      //   keeps the mental model uniform.
      // - Cancellable: pressing Escape restores the value that was active when the
      //   picker opened, analogous to releasing the mouse outside a button to abort
      //   a click.
      // - Side-effect friendly: when selecting an option triggers a visible preview
      //   (e.g. a color swatch, a map marker), the user can browse without committing.

      const SelectWithUpdate = () => {
        const selected = updateFruitSignal.value;
        const [entries, push, clear] = useCallLog();

        return (
          <div id="section-1" class="demo-section">
            <h2>1. Default behavior — stays open until closed</h2>
            <p>
              Clicking an item highlights it but keeps the popover open. The
              value is committed only when the popover closes (click outside,
              Enter, …). Pressing Escape cancels and restores the previous
              value. This is the default because it works for both single- and
              multi-select, allows cancellation, and lets side effects (e.g. a
              preview) be browsed before committing.
            </p>
            <Field vertical>
              <Label>Fruit</Label>
              <Picker
                name="select_update"
                placeholder="Select a fruit…"
                value={selected}
                uiAction={(v) => {
                  push("uiAction", v);
                }}
                action={(v) => {
                  push("action", v);
                  updateFruitSignal.value = v;
                }}
                minWidth="200"
              >
                <List selectable>
                  {FRUIT_OPTIONS.map((opt, i) => (
                    <List.Item
                      selectable
                      key={opt}
                      id={`update_${opt}`}
                      index={i}
                      value={opt}
                      selected={selected === opt}
                      padding="s"
                      spacing="s"
                    >
                      {opt}
                    </List.Item>
                  ))}
                </List>
              </Picker>
            </Field>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 2. command="--navi-send" — closes on click ────────────────────────────────
      // Each click immediately commits the value and closes the picker.
      // Use this when the single-select UX is a priority and you don't need
      // cancellation or side-effect previews.

      const SelectWithSend = () => {
        const selected = sendFruitSignal.value;
        const [entries, push, clear] = useCallLog();

        return (
          <div id="section-2" class="demo-section">
            <h2>
              2. <code>command="--navi-send"</code> — closes on click
            </h2>
            <p>
              Each click immediately commits the value and closes the picker.
              Useful for simple single-select where the choice is final and no
              preview or cancellation is needed.
            </p>
            <Field ownLabel vertical>
              <Label>Fruit</Label>
              <Picker
                name="select_send"
                placeholder="Select a fruit…"
                value={selected}
                uiAction={(v) => {
                  push("uiAction", v);
                }}
                action={(v) => {
                  push("action", v);
                  sendFruitSignal.value = v;
                }}
                minWidth="200"
              >
                <List selectable command="--navi-send">
                  {FRUIT_OPTIONS.map((opt, i) => (
                    <List.Item
                      selectable
                      key={opt}
                      id={`send_${opt}`}
                      index={i}
                      value={opt}
                      selected={selected === opt}
                      padding="s"
                      spacing="s"
                    >
                      {opt}
                    </List.Item>
                  ))}
                </List>
              </Picker>
            </Field>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 3. Inside a form ──────────────────────────────────────────────────

      const SelectInForm = () => {
        const [entries, push, clear] = useCallLog();

        return (
          <div id="section-3" class="demo-section">
            <h2>3. Inside a form</h2>
            <p>
              The picker participates in the form under its <code>name</code>.
              Submit to see the collected values.
            </p>
            <Form
              action={(values) => {
                push("Form action", values);
              }}
              flex="y"
              spacing="m"
              alignX="start"
            >
              <Field vertical>
                <Label>Fruit (required)</Label>
                <Picker
                  name="fruit"
                  placeholder="Select a fruit…"
                  required
                  minWidth="200"
                >
                  <List selectable command="--navi-send">
                    {FRUIT_OPTIONS.map((opt, i) => (
                      <List.Item
                        selectable
                        key={opt}
                        id={`form_${opt}`}
                        index={i}
                        value={opt}
                        padding="s"
                        spacing="s"
                      >
                        {opt}
                      </List.Item>
                    ))}
                  </List>
                </Picker>
              </Field>
              <Button type="submit">Submit</Button>
            </Form>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 4–7. Searchable select ────────────────────────────────────────────

      const SearchableSelectInner = ({
        id,
        selected,
        onSelect,
        items,
        searchText,
        onSearch,
        onLog,
      }) => {
        const [matchingItems, getMatchInfo] = useSearchText(searchText, items);

        return (
          <Picker
            name={id}
            placeholder="Select a fruit…"
            value={selected}
            uiAction={(v) => {
              onLog("uiAction", v);
            }}
            action={(v) => {
              onLog("action", v);
              onSelect(v);
            }}
            minWidth="240"
          >
            <Box flex="y" spacing="s" padding="s">
              <Input
                navi-list={`${id}_list`}
                type="search"
                placeholder="Search…"
                value={searchText}
                uiAction={(v) => {
                  onSearch(v);
                }}
                autoComplete="off"
                autoFocus="fallback"
                borderRadius="xs"
                paddingX="s"
                paddingY="xs"
                expandX
                discrete
              />
              <List
                selectable
                id={`${id}_list`}
                command="--navi-send"
                maxHeight="200"
                searchText={searchText}
                separator
                noMatchFallback={
                  <Box padding="s">No results match your search.</Box>
                }
              >
                {matchingItems.map((opt, i) => {
                  const { match, score, ranges } = getMatchInfo(opt);
                  return (
                    <List.Item
                      selectable
                      key={opt}
                      id={`${id}_${opt}`}
                      index={i}
                      value={opt}
                      selected={selected === opt}
                      highlight={ranges}
                      matchScore={score}
                      filtered={!match}
                      padding="s"
                      spacing="s"
                    >
                      {opt}
                    </List.Item>
                  );
                })}
              </List>
            </Box>
          </Picker>
        );
      };

      const SearchableSelectEmpty = () => {
        const selected = searchFruitSelectedSignal.value;
        const searchText = useSignal("").value;
        const [entries, push, clear] = useCallLog();
        return (
          <div id="section-4" class="demo-section">
            <h2>4. Searchable select — empty list</h2>
            <p>The list has no items at all.</p>
            <Field vertical>
              <Label>Fruit</Label>
              <SearchableSelectInner
                id="search_empty"
                selected={selected}
                onSelect={(v) => {
                  searchFruitSelectedSignal.value = v;
                }}
                items={[]}
                searchText={searchText}
                onSearch={() => {}}
                onLog={push}
              />
            </Field>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const SearchableSelectNormal = () => {
        const selected = searchFruitSelectedSignal.value;
        const searchTextSignal = useSignal("");
        const searchText = searchTextSignal.value;
        const [entries, push, clear] = useCallLog();
        return (
          <div id="section-5" class="demo-section">
            <h2>5. Searchable select — full list</h2>
            <p>All items shown, search is empty.</p>
            <Field vertical>
              <Label>Fruit</Label>
              <SearchableSelectInner
                id="search_normal"
                selected={selected}
                onSelect={(v) => {
                  searchFruitSelectedSignal.value = v;
                }}
                items={FRUIT_OPTIONS}
                searchText={searchText}
                onSearch={(v) => {
                  searchTextSignal.value = v;
                }}
                onLog={push}
              />
            </Field>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const SearchableSelectFewResults = () => {
        const selected = searchFruitSelectedSignal.value;
        const searchTextSignal = useSignal("rr");
        const searchText = searchTextSignal.value;
        const [entries, push, clear] = useCallLog();
        return (
          <div id="section-6" class="demo-section">
            <h2>6. Searchable select — few results</h2>
            <p>
              Search pre-filled with <code>"rr"</code> — matches Cherry and
              Elderberry.
            </p>
            <Field vertical>
              <Label>Fruit</Label>
              <SearchableSelectInner
                id="search_few"
                selected={selected}
                onSelect={(v) => {
                  searchFruitSelectedSignal.value = v;
                }}
                items={FRUIT_OPTIONS}
                searchText={searchText}
                onSearch={(v) => {
                  searchTextSignal.value = v;
                }}
                onLog={push}
              />
            </Field>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const SearchableSelectNoResults = () => {
        const selected = searchFruitSelectedSignal.value;
        const searchTextSignal = useSignal("appp");
        const searchText = searchTextSignal.value;
        const [entries, push, clear] = useCallLog();
        return (
          <div id="section-7" class="demo-section">
            <h2>7. Searchable select — no results</h2>
            <p>
              Search pre-filled with <code>"zzz"</code> — matches nothing.
            </p>
            <Field vertical>
              <Label>Fruit</Label>
              <SearchableSelectInner
                id="search_none"
                selected={selected}
                onSelect={(v) => {
                  searchFruitSelectedSignal.value = v;
                }}
                items={FRUIT_OPTIONS}
                searchText={searchText}
                onSearch={(v) => {
                  searchTextSignal.value = v;
                }}
                onLog={push}
              />
            </Field>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      // ── 8. Place picker — rich items with search ────────────────────────────

      const PlacePickerDemo = () => {
        const placeSlug = placeSlugSignal.value;
        const searchTextSignal = useSignal("");
        const searchText = searchTextSignal.value;
        const [entries, push, clear] = useCallLog();

        const selectedPlace = PLACES.find((p) => p.slug === placeSlug);
        const [matchingPlaces, getPlaceMatchInfo] = useSearchText(
          searchText,
          PLACES,
          searchPlace,
        );

        const PinSvg = () => (
          <svg
            width="10"
            height="13"
            viewBox="0 0 10 13"
            fill="currentColor"
            style={{ flexShrink: 0, marginRight: "2px" }}
          >
            <path d="M5 0C2.24 0 0 2.24 0 5c0 3.75 5 8 5 8s5-4.25 5-8c0-2.76-2.24-5-5-5zm0 6.5C4.17 6.5 3.5 5.83 3.5 5S4.17 3.5 5 3.5 6.5 4.17 6.5 5 5.83 6.5 5 6.5z" />
          </svg>
        );

        const PlaceItem = ({ maxLines }) => (
          <Box flex="y" expandX spacing="xs" minWidth="0">
            <Text bold maxLines={maxLines}>
              Boulangerie Artisanale et Pâtisserie du Vieux Marché de Lyon
            </Text>
            <Text size="xs" color="secondary" maxLines={maxLines}>
              <Icon>
                <PinSvg />
              </Icon>
              47 avenue du Général de Gaulle, Résidence Les Pins, Bâtiment C,
              42000 Saint-Étiennes
            </Text>
          </Box>
        );

        return (
          <div id="section-8" class="demo-section">
            <h2>8. Place picker — rich items with search</h2>
            <p>
              Each item shows a name and an address. The search filters across
              all fields. The trigger displays the selected place label (or a
              placeholder).
            </p>
            <Field vertical>
              <Label>Lieu</Label>
              <Picker
                name="place_picker"
                value={placeSlug}
                uiAction={(v) => push("uiAction", v)}
                action={(v) => {
                  push("action", v);
                  placeSlugSignal.value = v;
                }}
                borderRadius="s"
                padding="m"
                ui={selectedPlace ? selectedPlace.label : "Choisir un lieu"}
                expandX
                maxWidth="250"
              >
                <List
                  selectable
                  id="place_list"
                  command="--navi-send"
                  maxHeight="260"
                  searchText={searchText}
                  separator
                  noMatchFallback={
                    <Box paddingX="m" paddingY="s">
                      Aucun lieu ne correspond à votre recherche.
                    </Box>
                  }
                  maxWidth="250"
                >
                  {matchingPlaces.map((place, i) => {
                    const { match, score, ranges } = getPlaceMatchInfo(place);
                    return (
                      <List.Item
                        selectable
                        key={place.id}
                        id={place.id}
                        index={i}
                        value={place.slug}
                        highlight={ranges}
                        matchScore={score}
                        filtered={!match}
                        selected={place.slug === placeSlug}
                        flex
                        alignY="center"
                        spacing="m"
                        padding="m"
                      >
                        <SelectableInput marginLeft="-xs" />
                        <PlaceItem
                          maxLines={i === 0 ? undefined : i === 1 ? 2 : 1}
                        />
                      </List.Item>
                    );
                  })}
                </List>
              </Picker>
            </Field>
            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const SHORT_VALUE = "Apple";
      const MEDIUM_VALUE = "Elderberry";
      const LONG_SENTENCE =
        "A very long selected value that definitely overflows the picker trigger button";
      const LONG_WORD = "Supercalifragilisticexpialidocious";
      const VERY_LONG_TEXT =
        "This value is intentionally so long that it spans more than three lines inside the constrained picker width, so the line-clamp kicks in and an ellipsis appears at the end";

      // ── Renumbered sections ──────────────────────────────────────────

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
