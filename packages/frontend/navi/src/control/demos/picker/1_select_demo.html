<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Select Picker Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .call-log {
        min-height: 32px;
        margin-top: 16px;
        padding: 10px 12px;
        font-size: 12px;
        font-family: monospace;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
      }
      .call-log-entry {
        display: flex;
        align-items: baseline;
        gap: 8px;
        line-height: 1.6;
      }
      .call-log-entry .count {
        min-width: 20px;
        color: #888;
        font-size: 11px;
      }
      .call-log-entry .label-ui {
        color: #c07000;
        font-weight: bold;
      }
      .call-log-entry .label-action {
        color: #1a56cc;
        font-weight: bold;
      }
      .call-log-entry .value {
        color: #333;
      }
      h1 {
        margin-bottom: 24px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Select Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Field,
        Label,
        Picker,
        SelectableList,
        Selectable,
        NaviDebug,
      } from "@jsenv/navi";

      const FRUIT_OPTIONS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
      ];

      const CallLog = ({ entries }) => {
        if (entries.length === 0) {
          return (
            <div class="call-log" style="color: #aaa">
              No calls yet…
            </div>
          );
        }
        return (
          <div class="call-log">
            {entries.map((entry, i) => (
              <div key={i} class="call-log-entry">
                <span class="count">#{i + 1}</span>
                <span
                  class={
                    entry.type === "uiAction" ? "label-ui" : "label-action"
                  }
                >
                  {entry.type}
                </span>
                <span class="value">← {JSON.stringify(entry.value)}</span>
              </div>
            ))}
          </div>
        );
      };

      const App = () => (
        <Box flex="y" spacing="l">
          <SelectWithSend />
          <SelectWithUpdate />
        </Box>
      );

      // ── 1. action="send" — closes on click ────────────────────────────────
      // Required for single-select: each click sends the value immediately and
      // closes the popover. Without it the picker stays open and the user must
      // close it manually, which makes no sense for a single-value selection.

      const SelectWithSend = () => {
        const selectedSignal = useSignal("Grape");
        const selected = selectedSignal.value;
        const logSignal = useSignal([]);

        const pushLog = (type, value) => {
          logSignal.value = [...logSignal.value, { type, value }];
        };

        return (
          <div class="demo-section">
            <h2>
              1. <code>action="send"</code> — closes on click
            </h2>
            <p>
              Each click immediately commits the value and closes the picker.
              This is the correct behavior for single-select: once a value is
              chosen, there is nothing left to do in the popover.
            </p>
            <Field vertical>
              <Label>Fruit</Label>
              <Picker
                name="select_send"
                placeholder="Select a fruit…"
                value={selected}
                uiAction={(v) => {
                  pushLog("uiAction", v);
                }}
                action={(v) => {
                  pushLog("action", v);
                  selectedSignal.value = v;
                }}
                minWidth="200"
              >
                <SelectableList action="send">
                  {FRUIT_OPTIONS.map((opt, i) => (
                    <Selectable
                      key={opt}
                      id={`send_${opt}`}
                      index={i}
                      value={opt}
                      selected={selected === opt}
                      padding="s"
                      spacing="s"
                    >
                      {opt}
                    </Selectable>
                  ))}
                </SelectableList>
              </Picker>
            </Field>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      // ── 2. action="update" — stays open until closed ──────────────────────
      // Clicking an item updates the picker's pending value but keeps the
      // popover open. The value is committed only when the popover closes
      // (e.g. clicking outside or pressing Escape). Rarely useful for
      // single-select, but shown here for comparison.

      const SelectWithUpdate = () => {
        const selectedSignal = useSignal("Banana");
        const selected = selectedSignal.value;
        const logSignal = useSignal([]);

        const pushLog = (type, value) => {
          logSignal.value = [...logSignal.value, { type, value }];
        };

        return (
          <div class="demo-section">
            <h2>
              2. <code>action="update"</code> — stays open until closed
            </h2>
            <p>
              Clicking an item highlights it but keeps the popover open. The
              value is committed only when the popover closes (click outside,
              Enter, …). Pressing Escape cancels and restores the previous value
              — analogous to releasing the mouse outside a button to cancel a
              click. This is useful when selecting an option has visible side
              effects (e.g. a color preview): the user can browse options and
              decide to confirm or bail out before committing.
            </p>
            <Field vertical>
              <Label>Fruit</Label>
              <Picker
                name="select_update"
                placeholder="Select a fruit…"
                value={selected}
                uiAction={(v) => {
                  pushLog("uiAction", v);
                }}
                action={(v) => {
                  pushLog("action", v);
                  selectedSignal.value = v;
                }}
                minWidth="200"
              >
                <SelectableList action="update">
                  {FRUIT_OPTIONS.map((opt, i) => (
                    <Selectable
                      key={opt}
                      id={`update_${opt}`}
                      index={i}
                      value={opt}
                      selected={selected === opt}
                      padding="s"
                      spacing="s"
                    >
                      {opt}
                    </Selectable>
                  ))}
                </SelectableList>
              </Picker>
            </Field>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      render(
        <NaviDebug debugAction debugInteraction debugPopup>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
