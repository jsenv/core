<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Select Picker Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 600px;
        margin: 0 auto;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .call-log {
        min-height: 32px;
        margin-top: 16px;
        padding: 10px 12px;
        font-size: 12px;
        font-family: monospace;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
      }
      .call-log-entry {
        display: flex;
        align-items: baseline;
        gap: 8px;
        line-height: 1.6;
      }
      .call-log-entry .count {
        min-width: 20px;
        color: #888;
        font-size: 11px;
      }
      .call-log-entry .label-ui {
        color: #c07000;
        font-weight: bold;
      }
      .call-log-entry .label-action {
        color: #1a56cc;
        font-weight: bold;
      }
      .call-log-entry .value {
        color: #333;
      }
      h1 {
        margin-bottom: 32px;
        color: #333;
        font-size: 1.8rem;
        text-align: center;
      }
      .demo-section h2 {
        margin: 0 0 8px;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.1rem;
        border-bottom: 2px solid #eee;
      }
      .demo-section p {
        margin: 0 0 16px;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .toc-list {
        margin: 0;
        padding-left: 20px;
        line-height: 2;
      }
      .toc-list a {
        color: #1a56cc;
        text-decoration: none;
      }
      .toc-list a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Select Picker Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useSignal } from "@preact/signals";
      import {
        Box,
        Field,
        Label,
        Input,
        Picker,
        Icon,
        List,
        SelectableInput,
        NaviDebug,
        Text,
        route,
        setupRoutes,
        stateSignal,
        useSearchText,
        createSearch,
      } from "@jsenv/navi";

      const searchPlace = createSearch({
        label: {
          getter: (p) => p.label,
          domSelector: ".place-label",
          priority: 2,
        },
        address: {
          getter: (p) => p.address,
          domSelector: ".place-address",
          priority: 1,
        },
      });

      const PLACES = [
        {
          id: "1ebff20a-e52b-4dc4-9ad4-7e250e039547",
          slug: "mouratoglou_sophia",
          label: "Mouratoglou Country Club",
          city: "Biot",
          address: "3550 road des Dolines, 06410 Biot",
        },
        {
          id: "e3a31a8c-e53c-462b-a86e-4a527939626e",
          slug: "tc_roquettan",
          label: "TC Roquettan",
          city: "La Roquette-sur-Siagne",
          address:
            "1691 avenue de la République, et encore plus long pour tester le overflow et ouais encore pluuuus, 06550 La Roquette-sur-Siagne",
        },
        {
          id: "d8adf2e6-f5d5-4821-b01d-7f195dd2768b",
          slug: "tca",
          label: "TCA",
          city: "Antibes",
          address: "330 avenue Jules Grec, 06600 Antibes",
        },
      ];

      const FRUIT_OPTIONS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
      ];

      // ── State signals (persisted in URL search params) ────────────────────

      const sendFruitSignal = stateSignal("Grape", {
        id: "send_fruit",
        type: "string",
      });
      const updateFruitSignal = stateSignal("Banana", {
        id: "update_fruit",
        type: "string",
      });
      const searchFruitSelectedSignal = stateSignal("", {
        id: "search_fruit_selected",
        type: "string",
      });
      const placeSlugSignal = stateSignal("", {
        id: "place_slug",
        type: "string",
      });

      const DEMO_ROUTE = route("", {
        searchParams: {
          send_fruit: sendFruitSignal,
          update_fruit: updateFruitSignal,
          search_fruit_selected: searchFruitSelectedSignal,
          place_slug: placeSlugSignal,
        },
      });
      setupRoutes([DEMO_ROUTE]);

      const TableOfContents = () => (
        <div class="demo-section">
          <h2>Table of contents</h2>
          <ol class="toc-list">
            <li>
              <a href="#section-1">1. Customization — font size</a>
            </li>
            <li>
              <a href="#section-2">
                2. Overflow — long sentence &amp; long word
              </a>
            </li>
            <li>
              <a href="#section-3">
                3. <code>action="send"</code> — closes on click
              </a>
            </li>
            <li>
              <a href="#section-4">
                4. <code>action="update"</code> — stays open until closed
              </a>
            </li>
            <li>
              <a href="#section-5">5. Searchable select — empty list</a>
            </li>
            <li>
              <a href="#section-6">6. Searchable select — full list</a>
            </li>
            <li>
              <a href="#section-7">7. Searchable select — few results</a>
            </li>
            <li>
              <a href="#section-8">8. Searchable select — no results</a>
            </li>
            <li>
              <a href="#section-9">9. Place picker — rich items with search</a>
            </li>
          </ol>
        </div>
      );

      const App = () => (
        <Box flex="y" spacing="l">
          <TableOfContents />
          <CustomizationDemo />
          <OverflowDemo />
          <SelectWithSend />
          <SelectWithUpdate />
          <SearchableSelectEmpty />
          <SearchableSelectNormal />
          <SearchableSelectFewResults />
          <SearchableSelectNoResults />
          <PlacePickerDemo />
        </Box>
      );

      const CallLog = ({ entries }) => {
        if (entries.length === 0) {
          return (
            <div class="call-log" style="color: #aaa">
              No calls yet…
            </div>
          );
        }
        return (
          <div class="call-log">
            {entries.map((entry, i) => (
              <div key={i} class="call-log-entry">
                <span class="count">#{i + 1}</span>
                <span
                  class={
                    entry.type === "uiAction" ? "label-ui" : "label-action"
                  }
                >
                  {entry.type}
                </span>
                <span class="value">← {JSON.stringify(entry.value)}</span>
              </div>
            ))}
          </div>
        );
      };

      // ── 1. action="send" — closes on click ────────────────────────────────
      // Required for single-select: each click sends the value immediately and
      // closes the popover. Without it the picker stays open and the user must
      // close it manually, which makes no sense for a single-value selection.

      const SelectWithSend = () => {
        const selected = sendFruitSignal.value;
        const logSignal = useSignal([]);

        const pushLog = (type, value) => {
          logSignal.value = [...logSignal.value, { type, value }];
        };

        return (
          <div id="section-3" class="demo-section">
            <h2>
              3. <code>action="send"</code> — closes on click
            </h2>
            <p>
              Each click immediately commits the value and closes the picker.
              This is the correct behavior for single-select: once a value is
              chosen, there is nothing left to do in the popover.
            </p>
            <Field vertical>
              <Label>Fruit</Label>
              <Picker
                name="select_send"
                placeholder="Select a fruit…"
                value={selected}
                uiAction={(v) => {
                  pushLog("uiAction", v);
                }}
                action={(v) => {
                  pushLog("action", v);
                  sendFruitSignal.value = v;
                }}
                minWidth="200"
              >
                <List selectable action="send">
                  {FRUIT_OPTIONS.map((opt, i) => (
                    <List.Item
                      selectable
                      key={opt}
                      id={`send_${opt}`}
                      index={i}
                      value={opt}
                      selected={selected === opt}
                      padding="s"
                      spacing="s"
                    >
                      {opt}
                    </List.Item>
                  ))}
                </List>
              </Picker>
            </Field>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      // ── 2. action="update" — stays open until closed ──────────────────────
      // Clicking an item updates the picker's pending value but keeps the
      // popover open. The value is committed only when the popover closes
      // (e.g. clicking outside or pressing Escape). Rarely useful for
      // single-select, but shown here for comparison.

      const SelectWithUpdate = () => {
        const selected = updateFruitSignal.value;
        const logSignal = useSignal([]);

        const pushLog = (type, value) => {
          logSignal.value = [...logSignal.value, { type, value }];
        };

        return (
          <div id="section-4" class="demo-section">
            <h2>
              4. <code>action="update"</code> — stays open until closed
            </h2>
            <p>
              Clicking an item highlights it but keeps the popover open. The
              value is committed only when the popover closes (click outside,
              Enter, …). Pressing Escape cancels and restores the previous value
              — analogous to releasing the mouse outside a button to cancel a
              click. This is useful when selecting an option has visible side
              effects (e.g. a color preview): the user can browse options and
              decide to confirm or bail out before committing.
            </p>
            <Field vertical>
              <Label>Fruit</Label>
              <Picker
                name="select_update"
                placeholder="Select a fruit…"
                value={selected}
                uiAction={(v) => {
                  pushLog("uiAction", v);
                }}
                action={(v) => {
                  pushLog("action", v);
                  updateFruitSignal.value = v;
                }}
                minWidth="200"
              >
                <List selectable action="update">
                  {FRUIT_OPTIONS.map((opt, i) => (
                    <List.Item
                      selectable
                      key={opt}
                      id={`update_${opt}`}
                      index={i}
                      value={opt}
                      selected={selected === opt}
                      padding="s"
                      spacing="s"
                    >
                      {opt}
                    </List.Item>
                  ))}
                </List>
              </Picker>
            </Field>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      // ── 3–6. Searchable select ────────────────────────────────────────────

      const SearchableSelectInner = ({
        id,
        selected,
        onSelect,
        items,
        searchText,
        onSearch,
        logSignal,
      }) => {
        const [matchingItems, getMatchInfo] = useSearchText(searchText, items);
        const pushLog = (type, value) => {
          logSignal.value = [...logSignal.value, { type, value }];
        };

        return (
          <Picker
            name={id}
            placeholder="Select a fruit…"
            value={selected}
            uiAction={(v) => {
              pushLog("uiAction", v);
            }}
            action={(v) => {
              pushLog("action", v);
              onSelect(v);
            }}
            minWidth="240"
          >
            <Box flex="y" spacing="s" padding="s">
              <Input
                navi-list={`${id}_list`}
                type="search"
                placeholder="Search…"
                value={searchText}
                uiAction={(v) => {
                  onSearch(v);
                }}
                autoComplete="off"
                autoFocus="fallback"
                borderRadius="xs"
                paddingX="s"
                paddingY="xs"
                expandX
                discrete
              />
              <List
                selectable
                id={`${id}_list`}
                action="send"
                maxHeight="200"
                searchText={searchText}
                separator
                noMatchFallback={
                  <Box padding="s">No results match your search.</Box>
                }
              >
                {matchingItems.map((opt, i) => {
                  const { match, score, ranges } = getMatchInfo(opt);
                  return (
                    <List.Item
                      selectable
                      key={opt}
                      id={`${id}_${opt}`}
                      index={i}
                      value={opt}
                      selected={selected === opt}
                      highlight={ranges}
                      matchScore={score}
                      filtered={!match}
                      padding="s"
                      spacing="s"
                    >
                      {opt}
                    </List.Item>
                  );
                })}
              </List>
            </Box>
          </Picker>
        );
      };

      const SearchableSelectEmpty = () => {
        const selected = searchFruitSelectedSignal.value;
        const searchText = useSignal("").value;
        const logSignal = useSignal([]);
        return (
          <div id="section-5" class="demo-section">
            <h2>5. Searchable select — empty list</h2>
            <p>The list has no items at all.</p>
            <Field vertical>
              <Label>Fruit</Label>
              <SearchableSelectInner
                id="search_empty"
                selected={selected}
                onSelect={(v) => {
                  searchFruitSelectedSignal.value = v;
                }}
                items={[]}
                searchText={searchText}
                onSearch={() => {}}
                logSignal={logSignal}
              />
            </Field>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      const SearchableSelectNormal = () => {
        const selected = searchFruitSelectedSignal.value;
        const searchTextSignal = useSignal("");
        const searchText = searchTextSignal.value;
        const logSignal = useSignal([]);
        return (
          <div id="section-6" class="demo-section">
            <h2>6. Searchable select — full list</h2>
            <p>All items shown, search is empty.</p>
            <Field vertical>
              <Label>Fruit</Label>
              <SearchableSelectInner
                id="search_normal"
                selected={selected}
                onSelect={(v) => {
                  searchFruitSelectedSignal.value = v;
                }}
                items={FRUIT_OPTIONS}
                searchText={searchText}
                onSearch={(v) => {
                  searchTextSignal.value = v;
                }}
                logSignal={logSignal}
              />
            </Field>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      const SearchableSelectFewResults = () => {
        const selected = searchFruitSelectedSignal.value;
        const searchTextSignal = useSignal("rr");
        const searchText = searchTextSignal.value;
        const logSignal = useSignal([]);
        return (
          <div id="section-7" class="demo-section">
            <h2>7. Searchable select — few results</h2>
            <p>
              Search pre-filled with <code>"rr"</code> — matches Cherry and
              Elderberry.
            </p>
            <Field vertical>
              <Label>Fruit</Label>
              <SearchableSelectInner
                id="search_few"
                selected={selected}
                onSelect={(v) => {
                  searchFruitSelectedSignal.value = v;
                }}
                items={FRUIT_OPTIONS}
                searchText={searchText}
                onSearch={(v) => {
                  searchTextSignal.value = v;
                }}
                logSignal={logSignal}
              />
            </Field>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      const SearchableSelectNoResults = () => {
        const selected = searchFruitSelectedSignal.value;
        const searchTextSignal = useSignal("appp");
        const searchText = searchTextSignal.value;
        const logSignal = useSignal([]);
        return (
          <div id="section-8" class="demo-section">
            <h2>8. Searchable select — no results</h2>
            <p>
              Search pre-filled with <code>"zzz"</code> — matches nothing.
            </p>
            <Field vertical>
              <Label>Fruit</Label>
              <SearchableSelectInner
                id="search_none"
                selected={selected}
                onSelect={(v) => {
                  searchFruitSelectedSignal.value = v;
                }}
                items={FRUIT_OPTIONS}
                searchText={searchText}
                onSearch={(v) => {
                  searchTextSignal.value = v;
                }}
                logSignal={logSignal}
              />
            </Field>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      // ── 7. Place picker — rich items with search ──────────────────────────

      const PlacePickerDemo = () => {
        const placeSlug = placeSlugSignal.value;
        const searchTextSignal = useSignal("");
        const searchText = searchTextSignal.value;
        const logSignal = useSignal([]);
        const pushLog = (type, value) => {
          logSignal.value = [...logSignal.value, { type, value }];
        };

        const selectedPlace = PLACES.find((p) => p.slug === placeSlug);
        const [matchingPlaces, getPlaceMatchInfo] = useSearchText(
          searchText,
          PLACES,
          searchPlace,
        );

        const PinSvg = () => (
          <svg
            width="10"
            height="13"
            viewBox="0 0 10 13"
            fill="currentColor"
            style={{ flexShrink: 0, marginRight: "2px" }}
          >
            <path d="M5 0C2.24 0 0 2.24 0 5c0 3.75 5 8 5 8s5-4.25 5-8c0-2.76-2.24-5-5-5zm0 6.5C4.17 6.5 3.5 5.83 3.5 5S4.17 3.5 5 3.5 6.5 4.17 6.5 5 5.83 6.5 5 6.5z" />
          </svg>
        );

        const PlaceItem = ({ overflowEllipsis }) => (
          <Box flex="y" expandX spacing="xs" minWidth="0">
            <Text
              bold
              noWrap={overflowEllipsis}
              overflowEllipsis={overflowEllipsis}
            >
              Boulangerie Artisanale et Pâtisserie du Vieux Marché de Lyon
            </Text>
            <Text
              size="xs"
              color="secondary"
              noWrap={overflowEllipsis}
              overflowEllipsis={overflowEllipsis}
            >
              <Icon>
                <PinSvg />
              </Icon>
              47 avenue du Général de Gaulle, Résidence Les Pins, Bâtiment C,
              42000 Saint-Étiennes
            </Text>
          </Box>
        );

        return (
          <div id="section-9" class="demo-section">
            <h2>9. Place picker — rich items with search</h2>
            <p>
              Each item shows a name and an address. The search filters across
              all fields. The trigger displays the selected place label (or a
              placeholder).
            </p>
            <Field vertical>
              <Label>Lieu</Label>
              <Picker
                name="place_picker"
                value={placeSlug}
                uiAction={(v) => pushLog("uiAction", v)}
                action={(v) => {
                  pushLog("action", v);
                  placeSlugSignal.value = v;
                }}
                borderRadius="s"
                padding="m"
                ui={selectedPlace ? selectedPlace.label : "Choisir un lieu"}
                expandX
                maxWidth="250"
              >
                <List
                  selectable
                  id="place_list"
                  action="send"
                  maxHeight="260"
                  searchText={searchText}
                  separator
                  noMatchFallback={
                    <Box paddingX="m" paddingY="s">
                      Aucun lieu ne correspond à votre recherche.
                    </Box>
                  }
                  maxWidth="250"
                >
                  {matchingPlaces.map((place, i) => {
                    const { match, score, ranges } = getPlaceMatchInfo(place);
                    return (
                      <List.Item
                        selectable
                        key={place.id}
                        id={place.id}
                        index={i}
                        value={place.slug}
                        highlight={ranges}
                        matchScore={score}
                        filtered={!match}
                        selected={place.slug === placeSlug}
                        flex
                        alignY="center"
                        spacing="m"
                      >
                        <SelectableInput marginLeft="-xs" />
                        <PlaceItem overflowEllipsis={i === 0} />
                      </List.Item>
                    );
                  })}
                </List>
              </Picker>
            </Field>
            <CallLog entries={logSignal.value} />
          </div>
        );
      };

      // ── 1. Customization — font size ────────────────────────────────────

      const CustomizationDemo = () => {
        return (
          <div id="section-1" class="demo-section">
            <h2>1. Customization — font size</h2>
            <p>
              The picker inherits font size from its container. Below are the
              same fruit picker rendered at three different font sizes.
            </p>
            <Box flex="y" spacing="m">
              {["xs", "m", "xl", "xxl"].map((size) => (
                <Field key={size} vertical>
                  <Label>
                    Fruit <code style={{ fontWeight: "normal" }}>({size})</code>
                  </Label>
                  <Picker
                    name={`custom_font_${size}`}
                    placeholder="Select a fruit…"
                    value={sendFruitSignal.value}
                    action={(v) => {
                      sendFruitSignal.value = v;
                    }}
                    minWidth="200"
                    size={size}
                  >
                    <List selectable action="send">
                      {FRUIT_OPTIONS.map((opt, i) => (
                        <List.Item
                          selectable
                          key={opt}
                          id={`custom_${size}_${opt}`}
                          index={i}
                          value={opt}
                          selected={sendFruitSignal.value === opt}
                          padding="s"
                          spacing="s"
                        >
                          {opt}
                        </List.Item>
                      ))}
                    </List>
                  </Picker>
                </Field>
              ))}
            </Box>
          </div>
        );
      };

      // ── 2. Overflow — long sentence & long word ──────────────────────────

      const LONG_SENTENCE =
        "A very long selected value that definitely overflows the picker trigger button";
      const LONG_WORD = "Supercalifragilisticexpialidocious";
      const VERY_LONG_TEXT =
        "This value is intentionally so long that it spans more than three lines inside the constrained picker width, so the line-clamp kicks in and an ellipsis appears at the end";

      const OverflowPickerItems = ({ id, value, longValue }) => (
        <List selectable action="send">
          <List.Item
            selectable
            key="short"
            id={`${id}_short`}
            index={0}
            value="Short"
            selected={value === "Short"}
            padding="s"
            spacing="s"
          >
            Short
          </List.Item>
          <List.Item
            selectable
            key="long"
            id={`${id}_long`}
            index={1}
            value={longValue}
            selected={value === longValue}
            padding="s"
            spacing="s"
          >
            {longValue}
          </List.Item>
        </List>
      );

      const OverflowDemo = () => {
        const sentenceSignal = useSignal(LONG_SENTENCE);
        const wordSignal = useSignal(LONG_WORD);
        const veryLongSignal = useSignal(VERY_LONG_TEXT);

        return (
          <div id="section-2" class="demo-section">
            <h2>2. Overflow — long sentence &amp; long word</h2>
            <p>
              Shows how the picker trigger handles values wider than itself
              (constrained to <code>maxWidth="200"</code>), with and without{" "}
              <code>maxRows</code>.
            </p>
            <Box flex="y" spacing="l">
              <Box flex="x" spacing="m">
                <Field vertical>
                  <Label>
                    Long sentence{" "}
                    <code style={{ fontWeight: "normal" }}>(default)</code>
                  </Label>
                  <Picker
                    name="overflow_sentence"
                    value={sentenceSignal.value}
                    action={(v) => {
                      sentenceSignal.value = v;
                    }}
                    maxWidth="200"
                  >
                    <OverflowPickerItems
                      id="overflow_sentence"
                      value={sentenceSignal.value}
                      longValue={LONG_SENTENCE}
                    />
                  </Picker>
                </Field>
                <Field vertical>
                  <Label>
                    Long word{" "}
                    <code style={{ fontWeight: "normal" }}>(default)</code>
                  </Label>
                  <Picker
                    name="overflow_word"
                    value={wordSignal.value}
                    action={(v) => {
                      wordSignal.value = v;
                    }}
                    maxWidth="200"
                  >
                    <OverflowPickerItems
                      id="overflow_word"
                      value={wordSignal.value}
                      longValue={LONG_WORD}
                    />
                  </Picker>
                </Field>
              </Box>
              <Box flex="x" spacing="m">
                <Field vertical>
                  <Label>
                    Long sentence{" "}
                    <code style={{ fontWeight: "normal" }}>(maxRows=3)</code>
                  </Label>
                  <Picker
                    name="overflow_sentence_maxrows"
                    value={sentenceSignal.value}
                    action={(v) => {
                      sentenceSignal.value = v;
                    }}
                    maxWidth="200"
                    maxRows={3}
                  >
                    <OverflowPickerItems
                      id="overflow_sentence_ml"
                      value={sentenceSignal.value}
                      longValue={LONG_SENTENCE}
                    />
                  </Picker>
                </Field>
                <Field vertical>
                  <Label>
                    Long word{" "}
                    <code style={{ fontWeight: "normal" }}>(maxRows=3)</code>
                  </Label>
                  <Picker
                    name="overflow_word_maxrows"
                    value={wordSignal.value}
                    action={(v) => {
                      wordSignal.value = v;
                    }}
                    maxWidth="200"
                    maxRows={3}
                  >
                    <OverflowPickerItems
                      id="overflow_word_ml"
                      value={wordSignal.value}
                      longValue={LONG_WORD}
                    />
                  </Picker>
                </Field>
                <Field vertical>
                  <Label>
                    Very long text{" "}
                    <code style={{ fontWeight: "normal" }}>(maxRows=3 + ellipsis)</code>
                  </Label>
                  <Picker
                    name="overflow_very_long_maxrows"
                    value={veryLongSignal.value}
                    action={(v) => {
                      veryLongSignal.value = v;
                    }}
                    maxWidth="200"
                    maxRows={3}
                  >
                    <OverflowPickerItems
                      id="overflow_very_long_ml"
                      value={veryLongSignal.value}
                      longValue={VERY_LONG_TEXT}
                    />
                  </Picker>
                </Field>
              </Box>
            </Box>
          </div>
        );
      };

      // ── 3–9. Renumbered sections ──────────────────────────────────────────

      render(
        <NaviDebug debugAction debugInteraction debugPopup>
          <App />
        </NaviDebug>,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
