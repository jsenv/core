<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Range Demo</title>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }

      fieldset {
        margin: 15px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      legend {
        padding: 0 10px;
        color: #555;
        font-weight: 500;
        white-space: nowrap;
      }

      .range-group {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .states-section {
        margin: 20px 0;
      }

      .states-title {
        margin: 0 0 15px 0;
        padding: 8px 12px;
        color: #495057;
        font-weight: 600;
        font-size: 0.95rem;
        text-align: center;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border: 1px solid #dee2e6;
        border-radius: 6px;
      }

      .enhanced-states-title {
        color: #1565c0;
        background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
        border-color: #2196f3;
      }

      .states-description {
        margin: 10px 0 15px 0;
        padding: 10px 15px;
        color: #666;
        font-style: italic;
        font-size: 0.9rem;
        background: #f8f9fa;
        border-left: 4px solid #007bff;
        border-radius: 0 4px 4px 0;
      }

      .value-display {
        min-width: 60px;
        padding: 4px 8px;
        color: #666;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }

      /* Custom thumb styles for native inputs */
      .small-thumb-range::-webkit-slider-thumb {
        width: 14px;
        height: 14px;
        background: #ff6b35;
        border: none;
        border-radius: 50%;
        -webkit-appearance: none;
        cursor: pointer;
      }

      .large-thumb-range::-webkit-slider-thumb {
        width: 24px;
        height: 24px;
        background: #4a90e2;
        border: none;
        border-radius: 50%;
        -webkit-appearance: none;
        cursor: pointer;
      }

      .square-thumb-range,
      .large-thumb-range,
      .small-thumb-range {
        --webkit-appearance: none;
        background: blue;
        border-radius: 6px;
        appearance: none;
      }
      .square-thumb-range::-webkit-slider-thumb {
        width: 20px;
        height: 20px;
        background: #9b59b6;
        border: none;
        border-radius: 3px;
        -webkit-appearance: none;
        cursor: pointer;
      }

      /* Firefox styles */
      .small-thumb-range::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: #ff6b35;
        border: none;
        border-radius: 50%;
        cursor: pointer;
      }

      .large-thumb-range::-moz-range-thumb {
        width: 24px;
        height: 24px;
        background: #4a90e2;
        border: none;
        border-radius: 50%;
        cursor: pointer;
      }

      .square-thumb-range::-moz-range-thumb {
        width: 20px;
        height: 20px;
        background: #9b59b6;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Input Range Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Box,
        Input,
        NaviDebug,
        route,
        setupRoutes,
        stateSignal,
      } from "@jsenv/navi";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";

      const basicDefaultSignal = stateSignal(50, {
        id: "basic_default",
        type: "number",
        min: 0,
        max: 100,
      });
      const focusValueSignal = stateSignal(30, {
        id: "focus_value",
        type: "number",
        min: 0,
        max: 100,
      });
      const immediateRadiusSignal = stateSignal(50, {
        id: "immediate_radius",
        type: "number",
        min: 10,
        max: 100,
      });
      const slowRadiusSignal = stateSignal(50, {
        id: "slow_radius",
        type: "number",
        min: 10,
        max: 100,
      });
      const debouncedRadiusSignal = stateSignal(50, {
        id: "debounced_radius",
        type: "number",
        min: 10,
        max: 100,
      });
      const redValueSignal = stateSignal(25, {
        id: "red_value",
        type: "number",
        min: 0,
        max: 100,
      });
      const greenValueSignal = stateSignal(50, {
        id: "green_value",
        type: "number",
        min: 0,
        max: 100,
      });
      const whiteValueSignal = stateSignal(50, {
        id: "white_value",
        type: "number",
        min: 0,
        max: 100,
      });
      const smallThumbSignal = stateSignal(30, {
        id: "small_thumb",
        type: "number",
        min: 0,
        max: 100,
      });
      const largeThumbSignal = stateSignal(70, {
        id: "large_thumb",
        type: "number",
        min: 0,
        max: 100,
      });

      const DEMO_ROUTE = route("", {
        searchParams: {
          basic_default: basicDefaultSignal,
          focus_value: focusValueSignal,
          immediate_radius: immediateRadiusSignal,
          slow_radius: slowRadiusSignal,
          debounced_radius: debouncedRadiusSignal,
          red_value: redValueSignal,
          green_value: greenValueSignal,
          small_thumb: smallThumbSignal,
          large_thumb: largeThumbSignal,
        },
      });
      setupRoutes([DEMO_ROUTE]);

      const App = () => {
        return (
          <NaviDebug debugUIState debugInteraction debugAction>
            <div>
              <TableOfContents />
              <BasicStatesDemo />
              <FocusStatesDemo />
              <InteractivityDemo />
              <ColorVariationsDemo />
              <ThumbCustomizationDemo />
            </div>
          </NaviDebug>
        );
      };

      const TableOfContents = () => {
        return (
          <div className="demo-section">
            <h2>Table of contents</h2>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#states">Range Input States</a>
              </li>
              <li>
                <a href="#focus">Focus States</a>
              </li>
              <li>
                <a href="#interactivity">Interactivity</a>
                <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
                  <li>
                    <a href="#interactivity-outside-form">Outside Form</a>
                  </li>
                  <li>
                    <a href="#interactivity-inside-form">Inside Form</a>
                  </li>
                </ol>
              </li>
              <li>
                <a href="#colors">Color Variations</a>
              </li>
              <li>
                <a href="#thumb">Thumb Customization</a>
              </li>
            </ol>
          </div>
        );
      };

      const BasicStatesDemo = () => {
        const [disabledValue] = useState(75);

        return (
          <div className="demo-section" id="states">
            <h2>Range Input States</h2>

            <div className="states-section">
              <div className="states-title">
                Standard HTML Range Input States
              </div>
              <p className="states-description">
                These states work exactly like user agent HTML range inputs,
                with enhanced styling and consistent behavior.
              </p>

              <Box column spacing="sm">
                <fieldset>
                  <legend>Default</legend>
                  <Box row spacing="sm" alignX="start">
                    <div className="range-group">
                      <Input
                        type="range"
                        value={basicDefaultSignal}
                        action={(v) => {
                          basicDefaultSignal.value = v;
                        }}
                        min="0"
                        max="100"
                      />
                      <div className="value-display">{basicDefaultSignal}</div>
                    </div>
                    <div className="range-group">
                      <input
                        type="range"
                        value={basicDefaultSignal.value}
                        onChange={(e) => {
                          basicDefaultSignal.value = Number(e.target.value);
                        }}
                        min="0"
                        max="100"
                      />
                      <div className="value-display">{basicDefaultSignal}</div>
                    </div>
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:disabled</legend>
                  <Box row spacing="sm" alignX="start">
                    <div className="range-group">
                      <Input
                        type="range"
                        value={disabledValue}
                        min="0"
                        max="100"
                        disabled
                        action={() => {}}
                      />
                      <div className="value-display">{disabledValue}</div>
                    </div>
                    <div className="range-group">
                      <input
                        type="range"
                        value={disabledValue}
                        min="0"
                        max="100"
                        disabled
                      />
                      <div className="value-display">{disabledValue}</div>
                    </div>
                  </Box>
                </fieldset>
              </Box>
            </div>

            <div className="states-section">
              <div className="states-title enhanced-states-title">
                Enhanced Navi States
              </div>
              <p className="states-description">
                These additional states provide enhanced UX patterns not
                available in standard HTML range inputs.
              </p>

              <Box column spacing="sm">
                <fieldset>
                  <legend>:read-only</legend>
                  <Box row spacing="sm" alignX="start">
                    <div className="range-group">
                      <Input
                        type="range"
                        value="60"
                        min="0"
                        max="100"
                        readOnly
                        action={() => {}}
                      />
                      <div className="value-display">60</div>
                    </div>
                  </Box>
                </fieldset>
                <fieldset>
                  <legend>:-navi-loading</legend>
                  <Box row spacing="sm" alignX="start">
                    <div className="range-group">
                      <Input
                        type="range"
                        value="40"
                        min="0"
                        max="100"
                        loading
                        action={() => {}}
                      />
                      <div className="value-display">40</div>
                    </div>
                  </Box>
                </fieldset>
              </Box>

              <div
                style={{
                  marginTop: "15px",
                  padding: "10px",
                  background: "#f8f9fa",
                  borderRadius: "4px",
                  fontSize: "0.85rem",
                  color: "#666",
                }}
              >
                <strong>Enhanced State Explanations:</strong>
                <ul style={{ margin: "5px 0", paddingLeft: "20px" }}>
                  <li>
                    <strong>Read-only:</strong> Visually indicates the range
                    cannot be changed, but remains focusable for accessibility
                  </li>
                  <li>
                    <strong>Loading:</strong> Shows a loader overlay while
                    maintaining the range's accessibility and preventing
                    interaction
                  </li>
                </ul>
              </div>
            </div>
          </div>
        );
      };

      const FocusStatesDemo = () => {
        return (
          <div className="demo-section" id="focus">
            <h2>Focus States</h2>
            <p className="states-description">
              Focus states are crucial for accessibility and keyboard
              navigation. Read-only and loading ranges maintain their ability to
              receive focus, allowing screen readers and keyboard users to
              access them.
            </p>

            <Box column spacing="sm">
              <fieldset>
                <legend>:focus-visible</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value={focusValueSignal}
                      action={(v) => {
                        focusValueSignal.value = v;
                      }}
                      min="0"
                      max="100"
                      pseudoState={{ ":focus-visible": true }}
                    />
                    <div className="value-display">{focusValueSignal}</div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value={focusValueSignal.value}
                      onChange={(e) => {
                        focusValueSignal.value = Number(e.target.value);
                      }}
                      min="0"
                      max="100"
                    />
                    <div className="value-display">{focusValueSignal}</div>
                  </div>
                </Box>
              </fieldset>
            </Box>

            <Box column spacing="sm">
              <fieldset>
                <legend>:read-only + :focus-visible</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value="45"
                      min="0"
                      max="100"
                      readOnly
                      action={() => {}}
                      pseudoState={{ ":focus-visible": true }}
                    />
                    <div className="value-display">45</div>
                  </div>
                </Box>
              </fieldset>
              <fieldset>
                <legend>:-navi-loading + :focus-visible</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value="75"
                      min="0"
                      max="100"
                      loading
                      action={() => {}}
                      pseudoState={{ ":focus-visible": true }}
                    />
                    <div className="value-display">75</div>
                  </div>
                </Box>
              </fieldset>
            </Box>

            <div
              style={{
                marginTop: "15px",
                padding: "10px",
                background: "#f8f9fa",
                borderRadius: "4px",
                fontSize: "0.85rem",
                color: "#666",
              }}
            >
              <strong>Focus Accessibility:</strong>
              <p style={{ margin: "5px 0" }}>
                Read-only ranges maintain their ability to receive keyboard
                focus, which is essential for accessibility. This allows screen
                reader users and keyboard-only users to navigate to and
                understand the current value of the range input, even when they
                cannot modify it.
              </p>
              <p style={{ margin: "5px 0 0 0" }}>
                Loading ranges are typically both read-only and focusable,
                providing feedback about their state while maintaining
                accessibility.
              </p>
            </div>
          </div>
        );
      };

      const InteractivityDemo = () => {
        return (
          <>
            <ActionHandlingDemo />
            <RangeInsideFormDemo />
          </>
        );
      };

      const RangeInsideFormDemo = () => {
        const [submitValue, setSubmitValue] = useState(null);
        return (
          <div className="demo-section" id="interactivity-inside-form">
            <h2>Interactivity — Inside Form</h2>
            <p className="states-description">
              When a range input is inside a <code>Form</code>, its{" "}
              <code>name</code> is included in the form data on submit.
            </p>
            <fieldset>
              <legend>Form submit</legend>
              <form
                onSubmit={(e) => {
                  e.preventDefault();
                  const data = new FormData(e.currentTarget);
                  setSubmitValue(data.get("volume"));
                }}
              >
                <Box column spacing="sm">
                  <Input
                    type="range"
                    name="volume"
                    min="0"
                    max="100"
                    defaultValue="50"
                    action={() => {}}
                  />
                  <button type="submit">Submit</button>
                  {submitValue !== null && (
                    <div className="value-display">
                      Submitted: volume = {submitValue}
                    </div>
                  )}
                </Box>
              </form>
            </fieldset>
          </div>
        );
      };

      const ActionHandlingDemo = () => {
        const [immediateLog, pushImmediateLog, clearImmediateLog] =
          useCallLog();
        const [slowLog, pushSlowLog, clearSlowLog] = useCallLog();
        const [debouncedLog, pushDebouncedLog, clearDebouncedLog] =
          useCallLog();

        const slowAction = async (value, setter) => {
          await new Promise((resolve) => setTimeout(resolve, 15000));
          setter(value);
        };

        const CircleVisualization = ({ radius }) => {
          const maxSize = 100;
          const size = radius * 0.8;
          return (
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                gap: "6px",
              }}
            >
              <div
                style={{
                  width: `${maxSize}px`,
                  height: `${maxSize}px`,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  background: "#f0f4f8",
                  borderRadius: "6px",
                  border: "1px solid #dde3ea",
                }}
              >
                <div
                  style={{
                    width: `${size}px`,
                    height: `${size}px`,
                    borderRadius: "50%",
                    background: "linear-gradient(135deg, #007bff, #0056b3)",
                    transition: "width 0.15s, height 0.15s",
                  }}
                />
              </div>
              <div
                style={{
                  fontSize: "0.75rem",
                  color: "#888",
                  fontFamily: "monospace",
                }}
              >
                r = {radius}px
              </div>
            </div>
          );
        };

        const AfterChangeDemo = () => {
          const [uiValue, setUIValue] = useState(50);
          const [processedRadius, setProcessedRadius] = useState(50);
          const [afterChangeLog, pushAfterChangeLog, clearAfterChangeLog] =
            useCallLog();

          return (
            <fieldset>
              <legend>Action After Change</legend>
              <p className="states-description">
                <code>uiAction</code> updates the slider display immediately;{" "}
                <code>actionAfterChange</code> fires the async action only once
                the user stops dragging.
              </p>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 1fr",
                  gap: "16px",
                  alignItems: "center",
                }}
              >
                <div>
                  <div
                    style={{
                      fontSize: "0.8rem",
                      color: "#666",
                      marginBottom: "6px",
                    }}
                  >
                    Slider (immediate UI)
                  </div>
                  <Input
                    type="range"
                    min="10"
                    max="100"
                    value={uiValue}
                    uiAction={(value) => {
                      setUIValue(value);
                      pushAfterChangeLog("uiAction", value);
                    }}
                    action={(value) => {
                      pushAfterChangeLog("action", value);
                      return slowAction(value, setProcessedRadius);
                    }}
                    actionAfterChange
                  />
                </div>
                <div
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "center",
                    gap: "4px",
                  }}
                >
                  <div style={{ fontSize: "0.8rem", color: "#666" }}>
                    Circle (after action)
                  </div>
                  <CircleVisualization radius={processedRadius} />
                </div>
              </div>
              <CallLog entries={afterChangeLog} onClear={clearAfterChangeLog} />
            </fieldset>
          );
        };

        return (
          <div className="demo-section" id="interactivity-outside-form">
            <h2>Interactivity — Outside Form</h2>

            <fieldset>
              <legend>Immediate Action</legend>
              <p className="states-description">
                Action called immediately on every input change.
              </p>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 1fr",
                  gap: "16px",
                  alignItems: "center",
                }}
              >
                <div>
                  <div
                    style={{
                      fontSize: "0.8rem",
                      color: "#666",
                      marginBottom: "6px",
                    }}
                  >
                    Slider
                  </div>
                  <Input
                    type="range"
                    min="10"
                    max="100"
                    value={immediateRadiusSignal}
                    uiAction={(value) => {
                      pushImmediateLog("uiAction", value);
                    }}
                    action={(value) => {
                      immediateRadiusSignal.value = value;
                      pushImmediateLog("action", value);
                    }}
                  />
                </div>
                <div
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "center",
                    gap: "4px",
                  }}
                >
                  <div style={{ fontSize: "0.8rem", color: "#666" }}>
                    Circle
                  </div>
                  <CircleVisualization radius={immediateRadiusSignal.value} />
                </div>
              </div>
              <CallLog entries={immediateLog} onClear={clearImmediateLog} />
            </fieldset>

            <fieldset>
              <legend>Async Action (Poor UX)</legend>
              <p className="states-description">
                When the action takes time it blocks interaction — the input
                stays loading until it finishes.
              </p>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 1fr",
                  gap: "16px",
                  alignItems: "center",
                }}
              >
                <div>
                  <div
                    style={{
                      fontSize: "0.8rem",
                      color: "#666",
                      marginBottom: "6px",
                    }}
                  >
                    Slider
                  </div>
                  <Input
                    type="range"
                    name="slow_action"
                    min="10"
                    max="100"
                    value={slowRadiusSignal}
                    uiAction={(value) => {
                      pushSlowLog("uiAction", value);
                    }}
                    action={(value) => {
                      pushSlowLog("action", value);
                      return slowAction(parseInt(value), (v) => {
                        slowRadiusSignal.value = v;
                      });
                    }}
                  />
                </div>
                <div
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "center",
                    gap: "4px",
                  }}
                >
                  <div style={{ fontSize: "0.8rem", color: "#666" }}>
                    Circle (1.5s delay)
                  </div>
                  <CircleVisualization radius={slowRadiusSignal.value} />
                </div>
              </div>
              <CallLog entries={slowLog} onClear={clearSlowLog} />
            </fieldset>

            <fieldset>
              <legend>Debounced Action (Better UX)</legend>
              <p className="states-description">
                <code>actionDebounce={400}</code> waits 400ms after the user
                stops dragging before firing the async action.
              </p>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 1fr",
                  gap: "16px",
                  alignItems: "center",
                }}
              >
                <div>
                  <div
                    style={{
                      fontSize: "0.8rem",
                      color: "#666",
                      marginBottom: "6px",
                    }}
                  >
                    Slider
                  </div>
                  <Input
                    type="range"
                    min="10"
                    max="100"
                    value={debouncedRadiusSignal}
                    uiAction={(value) => {
                      pushDebouncedLog("uiAction", value);
                    }}
                    action={(value) => {
                      pushDebouncedLog("action", value);
                      return slowAction(parseInt(value), (v) => {
                        debouncedRadiusSignal.value = v;
                      });
                    }}
                    actionDebounce={400}
                  />
                </div>
                <div
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "center",
                    gap: "4px",
                  }}
                >
                  <div style={{ fontSize: "0.8rem", color: "#666" }}>
                    Circle (400ms + 1.5s delay)
                  </div>
                  <CircleVisualization radius={debouncedRadiusSignal.value} />
                </div>
              </div>
              <CallLog entries={debouncedLog} onClear={clearDebouncedLog} />
            </fieldset>

            <AfterChangeDemo />
          </div>
        );
      };

      const ColorVariationsDemo = () => {
        return (
          <div className="demo-section" id="colors">
            <h2>Color Variations</h2>
            <p className="states-description">
              Range inputs can be styled with different colors. Native inputs
              use CSS <code>accent-color</code>, while Navi's InputRange uses
              the <code>color</code> property for consistent theming.
            </p>

            <Box row spacing="sm">
              <fieldset>
                <legend>Red Theme</legend>
                <Box row spacing="sm" alignX="start">
                  <div className="range-group">
                    <Input
                      type="range"
                      value={redValueSignal}
                      action={(v) => {
                        redValueSignal.value = Number(v);
                      }}
                      min="0"
                      max="100"
                      accentColor="red"
                    />
                    <div className="value-display">{redValueSignal}</div>
                  </div>
                  <div className="range-group">
                    <input
                      type="range"
                      value={redValueSignal.value}
                      onChange={(e) => {
                        redValueSignal.value = Number(e.target.value);
                      }}
                      min="0"
