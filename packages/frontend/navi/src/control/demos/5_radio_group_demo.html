<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RadioGroup Demo</title>
    <style>
      body {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 30px;
        color: #333;
        font-size: 2rem;
        text-align: center;
      }

      .demo-section {
        margin-bottom: 40px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .demo-section h2 {
        margin: 0 0 20px 0;
        padding-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
        border-bottom: 2px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>RadioGroup Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { CallLog, useCallLog } from "./utils/call_log.jsx";
      import {
        Button,
        Form,
        RadioGroup,
        Field,
        Label,
        Input,
        NaviDebug,
      } from "@jsenv/navi";

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <div>
              <StandaloneDemo />
              <InFormDemo />
              <RequiredDemo />
              <WithReadonlyDemo />
            </div>
          </NaviDebug>
        );
      };

      const StandaloneDemo = () => {
        const [entries, push, clear] = useCallLog();
        return (
          <div class="demo-section">
            <h2>Standalone</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              <code>action</code> is called each time a radio is selected. It
              receives the selected value, or <code>undefined</code> when
              nothing is selected.
            </p>

            <RadioGroup
              name="standalone_option"
              action={(value) => {
                push("action", value);
              }}
              flex="y"
              alignX="start"
            >
              <legend>Pick an option</legend>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="alpha" />
                Alpha
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="beta" />
                Beta
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="gamma" />
                Gamma
              </Field>
            </RadioGroup>

            <CallLog entries={entries} onClear={clear} />
          </div>
        );
      };

      const InFormDemo = () => {
        const [submitted, setSubmitted] = useState(null);
        return (
          <div class="demo-section">
            <h2>In a form</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              A <code>RadioGroup</code> inside a <code>Form</code>. The selected
              value is submitted with the form.
            </p>
            <Form
              action={(params) => {
                setSubmitted(params);
              }}
            >
              <RadioGroup name="form_option" flex="y" alignX="start">
                <legend>Pick an option</legend>
                <Field
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="alpha" />
                  Alpha
                </Field>
                <Field
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="beta" />
                  Beta
                </Field>
                <Field
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="gamma" />
                  Gamma
                </Field>
              </RadioGroup>

              <Button type="submit" style={{ marginTop: "12px" }}>
                Submit
              </Button>
              {submitted !== null && (
                <pre
                  style={{
                    marginTop: "12px",
                    padding: "8px",
                    fontFamily: "monospace",
                    background: "#f8f9fa",
                    border: "1px solid #dee2e6",
                    borderRadius: "4px",
                  }}
                >
                  {JSON.stringify(submitted, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      const RequiredDemo = () => {
        const [submitted, setSubmitted] = useState(null);
        return (
          <div class="demo-section">
            <h2>With required validation</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              The <code>required</code> attribute on a <code>RadioGroup</code>{" "}
              means an option must be selected before the form can be submitted.
            </p>
            <Form
              action={(params) => {
                setSubmitted(params);
              }}
            >
              <RadioGroup
                name="required_option"
                required
                flex="y"
                alignX="start"
              >
                <legend>Pick an option (required)</legend>
                <Field
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="alpha" />
                  Alpha
                </Field>
                <Field
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="beta" />
                  Beta
                </Field>
                <Field
                  flex
                  alignY="center"
                  spacing="s"
                  border="1px dotted #ccc"
                >
                  <Input type="radio" value="gamma" />
                  Gamma
                </Field>
              </RadioGroup>
              <Button type="submit" style={{ marginTop: "12px" }}>
                Submit
              </Button>
              {submitted !== null && (
                <pre
                  style={{
                    marginTop: "12px",
                    padding: "8px",
                    fontFamily: "monospace",
                    background: "#f8f9fa",
                    border: "1px solid #dee2e6",
                    borderRadius: "4px",
                  }}
                >
                  {JSON.stringify(submitted, null, 2)}
                </pre>
              )}
            </Form>
          </div>
        );
      };

      const WithReadonlyDemo = () => {
        const ro = "This option is currently unavailable.";
        return (
          <div class="demo-section">
            <h2>With readonly options</h2>
            <p style={{ margin: "0 0 12px", color: "#555" }}>
              Mix of normal and <code>readOnly</code> radios. Clicking a
              readonly one shows a message. Arrow key navigation skips readonly
              options.
            </p>

            <RadioGroup name="readonly_option" flex="y" alignX="start">
              <legend>Pick an option</legend>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="alpha" />
                Alpha (normal)
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="beta" />
                Beta (normal)
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input
                  type="radio"
                  value="gamma"
                  readOnly
                  readOnlyMessage={ro}
                />
                Gamma (readonly)
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input
                  type="radio"
                  value="delta"
                  readOnly
                  readOnlyMessage={ro}
                />
                Delta (readonly)
              </Field>
              <Field
                as="label"
                flex
                alignY="center"
                spacing="s"
                border="1px dotted #ccc"
              >
                <Input type="radio" value="epsilon" />
                Epsilon (normal)
              </Field>
            </RadioGroup>
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
