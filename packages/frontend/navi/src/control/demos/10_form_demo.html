<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Demo</title>
    <style>
      .test-container {
        margin: 20px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .field {
        margin-bottom: 15px;
      }
      .status {
        margin-top: 20px;
        padding: 10px;
        border-radius: 4px;
      }
      .status.success {
        color: #155724;
        background-color: #d4edda;
        border: 1px solid #c3e6cb;
      }
      .status.error {
        color: #721c24;
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
      }
      .validation-errors {
        margin-top: 10px;
      }
      .validation-errors ul {
        margin: 0;
        padding-left: 20px;
      }
      /* ✅ Styles for form params display */
      .form-params {
        margin-top: 20px;
        padding: 15px;
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }
      .form-params h3 {
        margin-top: 0;
        color: #495057;
      }
      .form-params pre {
        margin: 0;
        padding: 10px;
        font-size: 14px;
        background-color: #e9ecef;
        border-radius: 4px;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Form,
        Button,
        Input,
        Field,
        Label,
        NaviDebug,
      } from "@jsenv/navi";

      const App = () => {
        return (
          <NaviDebug debugAction debugInteraction>
            <div>
              <h1>Form Demo</h1>
              <TableOfContents />
              <BasicFormDemo />
              <FormWithButtonActionDemo />
              <MultiFieldValidationTest />
              <h2 style={{ margin: "40px 20px 0" }}>Input types in forms</h2>
              <FormTextDemo />
              <FormEmailDemo />
              <FormPasswordDemo />
              <FormNumberDemo />
              <FormDateDemo />
              <FormDatetimeDemo />
              <FormTimeDemo />
              <FormSearchDemo />
              <FormTelDemo />
              <FormRangeDemo />
              <FormCheckboxDemo />
            </div>
          </NaviDebug>
        );
      };

      const TableOfContents = () => (
        <div className="test-container">
          <h2>Table of contents</h2>
          <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
            <li>
              <a href="#basic">Basic form</a>
            </li>
            <li>
              <a href="#button-action">Form with button action</a>
            </li>
            <li>
              <a href="#multi-field">Multi-field validation</a>
            </li>
            <li>
              Input types in forms
              <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
                <li>
                  <a href="#form-text">text</a>
                </li>
                <li>
                  <a href="#form-email">email</a>
                </li>
                <li>
                  <a href="#form-password">password</a>
                </li>
                <li>
                  <a href="#form-number">number</a>
                </li>
                <li>
                  <a href="#form-date">date</a>
                </li>
                <li>
                  <a href="#form-datetime">datetime-local</a>
                </li>
                <li>
                  <a href="#form-time">time</a>
                </li>
                <li>
                  <a href="#form-search">search</a>
                </li>
                <li>
                  <a href="#form-tel">tel</a>
                </li>
                <li>
                  <a href="#form-range">range</a>
                </li>
                <li>
                  <a href="#form-checkbox">checkbox</a>
                </li>
              </ol>
            </li>
          </ol>
        </div>
      );

      const BasicFormDemo = () => {
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="basic">
            <h2>Basic form</h2>
            <Form
              name="basic"
              action={async ({ username }) => {
                await new Promise((r) => setTimeout(r, 600));
                return `Hello, ${username}!`;
              }}
              onActionError={(err) =>
                setResult({ ok: false, value: err.message })
              }
              onActionEnd={(value) => setResult({ ok: true, value })}
            >
              <div className="field">
                <Field>
                  <Label>Username</Label>
                  <Input type="text" name="username" defaultValue="dam" />
                </Field>
              </div>
              <Button type="submit">Submit</Button>
            </Form>
            {result && (
              <div className={`status ${result.ok ? "success" : "error"}`}>
                {result.value}
              </div>
            )}
          </div>
        );
      };

      const FormWithButtonActionDemo = () => {
        const [formResult, setFormResult] = useState(null);
        const [previewResult, setPreviewResult] = useState(null);
        return (
          <div className="test-container" id="button-action">
            <h2>Form with a button that has its own action</h2>
            <p>
              The <strong>Preview</strong> button uses the form values but calls
              its own action — it does not submit the form. Only{" "}
              <strong>Submit</strong> triggers the form action.
            </p>
            <Form
              name="with-button-action"
              action={async ({ message }) => {
                await new Promise((r) => setTimeout(r, 600));
                return `Submitted: "${message}"`;
              }}
              onActionEnd={(value) => setFormResult({ ok: true, value })}
              onActionError={(err) =>
                setFormResult({ ok: false, value: err.message })
              }
            >
              <div className="field">
                <Field>
                  <Label>Message</Label>
                  <Input type="text" name="message" defaultValue="message" />
                </Field>
              </div>
              <div style={{ display: "flex", gap: "8px", marginTop: "8px" }}>
                <Button
                  action={async ({ message }) => {
                    await new Promise((r) => setTimeout(r, 400));
                    return `Preview: "${message}"`;
                  }}
                  onActionEnd={(value) => setPreviewResult({ ok: true, value })}
                  onActionError={(err) =>
                    setPreviewResult({ ok: false, value: err.message })
                  }
                >
                  Preview
                </Button>
                <Button type="submit">Submit</Button>
              </div>
            </Form>
            {previewResult && (
              <div
                className={`status ${previewResult.ok ? "success" : "error"}`}
              >
                {previewResult.value}
              </div>
            )}
            {formResult && (
              <div className={`status ${formResult.ok ? "success" : "error"}`}>
                {formResult.value}
              </div>
            )}
          </div>
        );
      };

      const MultiFieldValidationTest = () => {
        const [submitStatus, setSubmitStatus] = useState(null);
        const [validationErrors, setValidationErrors] = useState([]);
        const [formParams, setFormParams] = useState(null); // ✅ New state for form params

        const handleFormExecutePrevented = (event) => {
          console.log("❌ Form execute prevented event:", event);
          const reason = event.detail;

          if (reason === "validation_failed") {
            setSubmitStatus("error");
            setFormParams(null); // ✅ Clear params on validation failure

            // Collecter toutes les erreurs de validation
            const form = event.target;
            const errors = [];

            // Parcourir tous les éléments du formulaire
            const formElements = form.querySelectorAll(
              "input, select, textarea",
            );
            formElements.forEach((element) => {
              const validationInterface = element.__validationInterface__;
              if (validationInterface) {
                // Vérifier si l'élément a des erreurs
                if (
                  !element.checkValidity() ||
                  !validationInterface.checkValidity?.()
                ) {
                  const fieldName = element.name || element.id || element.type;
                  const validationMessage =
                    element.validationMessage || "Invalid value";
                  errors.push(`${fieldName}: ${validationMessage}`);
                }
              }
            });

            setValidationErrors(errors);
          }
        };

        return (
          <div className="test-container" id="multi-field">
            <h2>Formulaire avec validation multiple</h2>
            <p>
              Ce formulaire contient plusieurs champs avec différentes
              contraintes. Essayez de soumettre avec des valeurs invalides pour
              voir toutes les erreurs.
            </p>

            <Form
              onReset={() => {
                setSubmitStatus(null);
                setValidationErrors([]);
                setFormParams(null); // ✅ Clear params on reset
              }}
              onExecutePrevented={handleFormExecutePrevented}
              action={async (params) => {
                console.log("🎯 Form execute event with params:", params);

                // ✅ Store form params in state
                setFormParams(params);
                setSubmitStatus("executing...");
                setValidationErrors([]);
                await new Promise((resolve) => setTimeout(resolve, 2_000));
                setSubmitStatus("Form submitted successfully!");
              }}
            >
              {/* ✅ Champ requis */}
              <Field vertical>
                <Label>Nom (obligatoire) :</Label>
                <Input name="name" required placeholder="Entrez votre nom" />
              </Field>

              {/* ✅ Champ email avec validation type */}
              <Field vertical>
                <Label>Email (format email) :</Label>
                <Input
                  name="email"
                  type="email"
                  placeholder="exemple@domain.com"
                />
              </Field>

              {/* ✅ Champ avec pattern */}
              <Field vertical>
                <Label>Téléphone (format: 01-23-45-67-89) :</Label>
                <Input
                  name="phone"
                  pattern="[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}"
                  pattern-validation-message="Doit respecter le format <strong>01-23-45-67-89</strong>."
                  placeholder="01-23-45-67-89"
                />
              </Field>

              {/* ✅ Champ avec longueur minimum */}
              <Field vertical>
                <Label>Mot de passe (min 8 caractères) :</Label>
                <Input
                  name="password"
                  type="password"
                  minLength="8"
                  placeholder="Au moins 8 caractères"
                />
              </Field>

              {/* ✅ Champ avec contrainte personnalisée */}
              <Field vertical>
                <Label>Âge (18-99 ans) :</Label>
                <Input
                  name="age"
                  type="number"
                  min="18"
                  min-validation-message="L'age doit être de <strong>18</strong> ans ou plus."
                  max="99"
                  max-validation-message="L'age doit être de <strong>99</strong> ans ou moins."
                  placeholder="18"
                />
              </Field>

              {/* ✅ Bouton de soumission */}
              <div className="field">
                <Button type="submit">Valider le formulaire</Button>
                <Button type="reset">Reset Status</Button>
              </div>
            </Form>

            {/* ✅ Affichage des paramètres du formulaire */}
            {formParams && (
              <div className="form-params">
                <h3>📋 Paramètres du formulaire soumis :</h3>
                <pre>{JSON.stringify(formParams, null, 2)}</pre>
              </div>
            )}

            {/* ✅ Affichage du statut */}
            {submitStatus && (
              <div
                className={`status ${submitStatus === "error" ? "error" : "success"}`}
              >
                {submitStatus === "error" ? (
                  <div>
                    <strong>❌ Validation échouée</strong>
                    {validationErrors.length > 0 && (
                      <div className="validation-errors">
                        <p>Erreurs détectées :</p>
                        <ul>
                          {validationErrors.map((error, index) => (
                            <li key={index}>{error}</li>
                          ))}
                        </ul>
                      </div>
                    )}
                  </div>
                ) : (
                  <strong>✅ {submitStatus}</strong>
                )}
              </div>
            )}

            {/* ✅ Instructions de test */}
            <div
              style={{
                marginTop: "30px",
                padding: "15px",
                backgroundColor: "#f8f9fa",
                borderRadius: "4px",
              }}
            >
              <h3>Instructions de test :</h3>
              <ol>
                <li>
                  <strong>Test 1</strong> : Laissez tous les champs vides et
                  cliquez "Valider" → Doit montrer toutes les erreurs
                </li>
                <li>
                  <strong>Test 2</strong> : Remplissez partiellement (ex: nom
                  seulement) → Doit montrer les erreurs restantes
                </li>
                <li>
                  <strong>Test 3</strong> : Entrez des valeurs invalides (ex:
                  email sans @, âge inf. 18) → Doit montrer les erreurs
                  spécifiques
                </li>
                <li>
                  <strong>Test 4</strong> : Remplissez tout correctement → Doit
                  permettre la soumission et afficher les paramètres
                </li>
              </ol>
            </div>
          </div>
        );
      };

      const delay = (ms) => new Promise((r) => setTimeout(r, ms));

      // Helper to display what was submitted
      const SubmitResult = ({ result }) => {
        if (!result) {
          return null;
        }
        return (
          <div className="form-params">
            <strong>Submitted:</strong>
            <pre>{JSON.stringify(result, null, 2)}</pre>
          </div>
        );
      };

      const FormTextDemo = () => {
        const [username, setUsername] = useState("dam");
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-text">
            <h3>text</h3>
            <Form
              action={async ({ username: v }) => {
                await delay(600);
                setUsername(v);
                setResult({ username: v });
              }}
            >
              <Field>
                <Label>Username</Label>
                <Input
                  name="username"
                  required
                  minLength="2"
                  value={username}
                />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormEmailDemo = () => {
        const [email, setEmail] = useState("dam@example.com");
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-email">
            <h3>email</h3>
            <Form
              action={async ({ email: v }) => {
                await delay(600);
                setEmail(v);
                setResult({ email: v });
              }}
            >
              <Field>
                <Label>Email</Label>
                <Input name="email" type="email" required value={email} />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormPasswordDemo = () => {
        const [password, setPassword] = useState("secret123");
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-password">
            <h3>password</h3>
            <Form
              action={async ({ password: v }) => {
                await delay(600);
                setPassword(v);
                setResult({ password: "***" });
              }}
            >
              <Field>
                <Label>Password</Label>
                <Input
                  name="password"
                  type="password"
                  required
                  minLength="8"
                  value={password}
                />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormNumberDemo = () => {
        const [age, setAge] = useState(25);
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-number">
            <h3>number</h3>
            <Form
              action={async ({ age: v }) => {
                await delay(600);
                setAge(Number(v));
                setResult({ age: v });
              }}
            >
              <Field>
                <Label>Age</Label>
                <Input
                  name="age"
                  type="number"
                  required
                  min="0"
                  max="120"
                  value={age}
                />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormDateDemo = () => {
        const [date, setDate] = useState("2024-06-15");
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-date">
            <h3>date</h3>
            <Form
              action={async ({ birthday: v }) => {
                await delay(600);
                setDate(v);
                setResult({ birthday: v });
              }}
            >
              <Field>
                <Label>Birthday</Label>
                <Input name="birthday" type="date" required value={date} />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormDatetimeDemo = () => {
        const [datetime, setDatetime] = useState("2024-06-15T14:30");
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-datetime">
            <h3>datetime-local</h3>
            <Form
              action={async ({ meeting: v }) => {
                await delay(600);
                setDatetime(v);
                setResult({ meeting: v });
              }}
            >
              <Field>
                <Label>Meeting</Label>
                <Input
                  name="meeting"
                  type="datetime-local"
                  required
                  value={datetime}
                />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormTimeDemo = () => {
        const [time, setTime] = useState("09:00");
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-time">
            <h3>time</h3>
            <Form
              action={async ({ alarm: v }) => {
                await delay(600);
                setTime(v);
                setResult({ alarm: v });
              }}
            >
              <Field>
                <Label>Alarm</Label>
                <Input name="alarm" type="time" required value={time} />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormSearchDemo = () => {
        const [query, setQuery] = useState("cats");
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-search">
            <h3>search</h3>
            <Form
              action={async ({ q: v }) => {
                await delay(600);
                setQuery(v);
                setResult({ q: v });
              }}
            >
              <Field>
                <Label>Query</Label>
                <Input name="q" type="search" required value={query} />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormTelDemo = () => {
        const [tel, setTel] = useState("+33612345678");
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-tel">
            <h3>tel</h3>
            <Form
              action={async ({ phone: v }) => {
                await delay(600);
                setTel(v);
                setResult({ phone: v });
              }}
            >
              <Field>
                <Label>Phone</Label>
                <Input name="phone" type="tel" required value={tel} />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormRangeDemo = () => {
        const [volume, setVolume] = useState(60);
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-range">
            <h3>range</h3>
            <Form
              action={async ({ volume: v }) => {
                await delay(600);
                setVolume(Number(v));
                setResult({ volume: v });
              }}
            >
              <Field>
                <Label>Volume ({volume})</Label>
                <Input
                  name="volume"
                  type="range"
                  min="0"
                  max="100"
                  value={volume}
                />
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      const FormCheckboxDemo = () => {
        const [agreed, setAgreed] = useState(true);
        const [result, setResult] = useState(null);
        return (
          <div className="test-container" id="form-checkbox">
            <h3>checkbox</h3>
            <Form
              action={async ({ terms: v }) => {
                await delay(600);
                setAgreed(v === "on");
                setResult({ terms: v });
              }}
            >
              <Field flex spacing="s">
                <Input name="terms" type="checkbox" required checked={agreed} />
                <Label>I agree to the terms</Label>
              </Field>
              <Button type="submit" style={{ marginTop: "8px" }}>
                Submit
              </Button>
            </Form>
            <SubmitResult result={result} />
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
