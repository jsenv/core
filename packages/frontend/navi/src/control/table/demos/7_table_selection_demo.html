<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Cell Selection Demo - Preact</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }

      .demo-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* Status display */
      .status {
        margin-top: 20px;
        padding: 10px;
        font-size: 14px;
        font-family: monospace;
        background: #f0f8ff;
        border-radius: 4px;
      }

      .actions {
        margin-top: 15px;
      }

      button {
        margin-right: 8px;
        padding: 8px 16px;
        color: white;
        background: #0078d4;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background: #106ebe;
      }

      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Table,
        TableCell,
        Colgroup,
        Col,
        Thead,
        Tbody,
        Tr,
        RowNumberCol,
        RowNumberTableCell,
        useCellGridFromRows,
        useOrderedColumns,
        stringifyTableSelectionValue,
      } from "@jsenv/navi";

      const rows = [
        { id: "1", name: "1A", email: "2A", status: "3A" },
        { id: "2", name: "1B", email: "2B", status: "3B" },
        { id: "3", name: "1C", email: "2C", status: "3C" },
        { id: "4", name: "4A", email: "4B", status: "4C" },
      ];

      const columnsConfig = [
        { id: "name", header: "Name" },
        { id: "email", header: "Email" },
        { id: "status", header: "Status" },
      ];

      const TableDemo = () => {
        const [selection, setSelection] = useState([]);
        const [orderedColumns] = useOrderedColumns(columnsConfig);
        const orderedColumnIds = orderedColumns.map((col) => col.id);
        const cellGrid = useCellGridFromRows(rows, orderedColumnIds);

        return (
          <div className="demo-container">
            <h1>Table Cell Selection Demo - Preact</h1>
            <p>
              Click cells to select/deselect. Use Cmd/Ctrl+click for
              multi-select. Use Tab and arrow keys to navigate.
              <br />
              <strong>Click the # column to select entire rows.</strong>
              <br />
              <strong>Click column headers to select entire columns.</strong>
            </p>

            <Table
              selection={selection}
              onSelectionChange={(value) => {
                setSelection(value);
              }}
              borderCollapse
            >
              <Colgroup>
                <RowNumberCol />
                {orderedColumns.map((col) => (
                  <Col key={col.id} id={col.id} />
                ))}
              </Colgroup>
              <Thead>
                <Tr id="head">
                  <RowNumberTableCell />
                  {orderedColumns.map((col) => (
                    <TableCell key={col.id}>{col.header}</TableCell>
                  ))}
                </Tr>
              </Thead>
              <Tbody>
                {cellGrid.map((rowCells, rowIndex) => (
                  <Tr key={rows[rowIndex].id} id={rows[rowIndex].id}>
                    <RowNumberTableCell />
                    {rowCells.map((cellValue, columnIndex) => (
                      <TableCell key={orderedColumns[columnIndex].id}>
                        {cellValue}
                      </TableCell>
                    ))}
                  </Tr>
                ))}
              </Tbody>
            </Table>

            <div className="status">
              <div>
                Selection: <span>{JSON.stringify(selection)}</span>
              </div>
              <div>
                Total selection count: <span>{selection.length}</span>
              </div>
            </div>

            <div className="actions">
              <button onClick={() => setSelection([])}>Clear Selection</button>
              <button
                onClick={() => {
                  const allCells = [];
                  for (const row of rows) {
                    for (const col of orderedColumns) {
                      allCells.push(
                        stringifyTableSelectionValue("cell", {
                          columnId: col.id,
                          rowId: row.id,
                        }),
                      );
                    }
                  }
                  setSelection(allCells);
                }}
              >
                Select All
              </button>
            </div>
          </div>
        );
      };

      render(<TableDemo />, document.getElementById("root"));
    </script>
  </body>
</html>
