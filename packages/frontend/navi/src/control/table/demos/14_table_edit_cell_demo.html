<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table - Edit Cell Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
      }
      .demo-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        Table,
        TableCell,
        Colgroup,
        Col,
        Thead,
        Tbody,
        Tr,
        RowNumberCol,
        RowNumberTableCell,
        useCellGridFromRows,
        useOrderedColumns,
      } from "@jsenv/navi";
      import { useRowsState } from "./table_demo_helpers.js";

      // This demo illustrates the typical pattern in a real frontend app:
      //
      // - The BACKEND is the source of truth. It holds the data and exposes
      //   methods to mutate it (e.g. HTTP endpoints backed by a database).
      //   Here it is simulated by a component using useRowsState.
      //
      // - The FRONTEND receives the current state as props (rows) and can
      //   REQUEST mutations via callbacks (onCellChange). It never modifies
      //   state directly — it only reflects what the backend sends.
      //
      // The 1s delay on cell save simulates a real HTTP round-trip.

      const initialRows = [
        { id: 1, name: "Alice", age: 30, email: "alice@example.com" },
        { id: 2, name: "Bob", age: 25, email: "bob@example.com" },
        { id: 3, name: "Charlie", age: 35, email: "charlie@example.com" },
        { id: 4, name: "Diana", age: 28, email: "diana@example.com" },
      ];

      const columnsConfig = [
        { id: "name", header: "Name" },
        { id: "age", header: "Age" },
        { id: "email", header: "Email" },
      ];

      const columnIds = columnsConfig.map((c) => c.id);

      const Backend = () => {
        const [rows, { setCell }] = useRowsState(initialRows, columnIds);
        return (
          <div style={{ display: "flex", flexDirection: "column" }}>
            <div
              style={{
                border: "2px solid #6c757d",
                borderRadius: "8px",
                padding: "12px",
              }}
            >
              <div
                style={{
                  color: "#6c757d",
                  fontSize: "0.8em",
                  fontWeight: "bold",
                  marginBottom: "8px",
                }}
              >
                ⚙️ Backend (source of truth)
              </div>
              <ul style={{ listStyle: "none", padding: 0, margin: 0 }}>
                {rows.map((row) => (
                  <li
                    key={row.id}
                    style={{
                      fontSize: "0.85em",
                      color: "#495057",
                      marginBottom: "4px",
                    }}
                  >
                    #{row.id} {row.name} — age: {row.age} — {row.email}
                  </li>
                ))}
              </ul>
            </div>

            <div
              style={{
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                padding: "6px 0",
                fontSize: "0.75em",
                color: "#868e96",
                lineHeight: "1.4",
              }}
            >
              <span>rows ↓</span>
              <span style={{ fontSize: "1.4em", lineHeight: "1" }}>⇅</span>
              <span>onCellChange ↑</span>
            </div>

            <Frontend rows={rows} onCellChange={setCell} />
          </div>
        );
      };

      const Frontend = ({ rows, onCellChange }) => {
        const [orderedColumns] = useOrderedColumns(columnsConfig);
        const orderedColumnIds = orderedColumns.map((col) => col.id);
        const cellGrid = useCellGridFromRows(rows, orderedColumnIds);

        return (
          <div
            style={{
              border: "2px solid #0078d4",
              borderRadius: "8px",
              padding: "12px",
            }}
          >
            <div
              style={{
                color: "#0078d4",
                fontSize: "0.8em",
                fontWeight: "bold",
                marginBottom: "8px",
              }}
            >
              🖥️ Frontend (display + calls backend to update cells)
            </div>

            <Table borderCollapse>
              <Colgroup>
                <RowNumberCol />
                {orderedColumns.map((col) => (
                  <Col key={col.id} id={col.id} />
                ))}
              </Colgroup>
              <Thead>
                <Tr id="head">
                  <RowNumberTableCell />
                  {orderedColumns.map((col) => (
                    <TableCell key={col.id}>{col.header}</TableCell>
                  ))}
                </Tr>
              </Thead>
              <Tbody>
                {cellGrid.map((rowCells, rowIndex) => (
                  <Tr key={rows[rowIndex].id} id={rows[rowIndex].id}>
                    <RowNumberTableCell />
                    {rowCells.map((cellValue, columnIndex) => (
                      <TableCell
                        key={orderedColumns[columnIndex].id}
                        action={async (value) => {
                          await new Promise((resolve) =>
                            setTimeout(resolve, 1000),
                          );
                          onCellChange({ rowIndex, columnIndex }, value);
                        }}
                      >
                        {cellValue}
                      </TableCell>
                    ))}
                  </Tr>
                ))}
              </Tbody>
            </Table>
          </div>
        );
      };

      const App = () => (
        <div class="demo-container">
          <h1>Table — Edit Cell</h1>
          <p style={{ color: "#6c757d", marginBottom: "16px" }}>
            The <strong>backend</strong> (grey box) is the source of truth and
            reflects every saved value.
            <br />
            The <strong>frontend</strong> (blue box) lets you double-click a
            cell to edit it — the 1s delay on save simulates an HTTP round-trip.
          </p>
          <Backend />
        </div>
      );

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
