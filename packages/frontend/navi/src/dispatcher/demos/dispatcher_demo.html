<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <title>Dispatcher Demo</title>
    <style>
      @keyframes render-flash {
        0% {
          background-color: var(--flash-color);
          transform: scale(1.06);
        }
        60% {
          transform: scale(1);
        }
        100% {
          background-color: transparent;
        }
      }
      .render-flash {
        display: inline-block;
        animation: render-flash 600ms ease-out;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #render-log {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        padding: 8px 16px 10px;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 24px;
        color: #cdd6f4;
        font-size: 12px;
        font-family: monospace;
        background: #1e1e2e;
        border-bottom: 2px solid #45475a;
      }
      #render-log .log-title {
        width: 100%;
        margin-bottom: 2px;
        color: #6c7086;
        font-size: 11px;
      }
      .case-log {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .case-log-title {
        margin-bottom: 2px;
        color: #89b4fa;
        font-weight: bold;
        font-size: 11px;
      }
      #app {
        max-width: 860px;
        margin: 24px auto;
        padding: 0 16px;
      }
      h1 {
        margin-bottom: 4px;
        color: #333;
      }
      .case-section {
        margin-bottom: 32px;
      }
      .case-header {
        display: flex;
        margin-bottom: 8px;
        align-items: baseline;
        gap: 12px;
      }
      .case-title {
        color: #333;
        font-weight: 700;
        font-size: 15px;
      }
      .case-code {
        padding: 2px 6px;
        color: #666;
        font-size: 12px;
        font-family: monospace;
        background: #e8e8e8;
        border-radius: 3px;
      }
      .case-render {
        display: flex;
        min-height: 48px;
        padding: 16px 20px;
        align-items: center;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      /* component boxes in render tree */
      .cbox {
        margin: 4px 0;
        border: 2px solid;
        border-radius: 6px;
        overflow: hidden;
      }
      .cbox-header {
        display: flex;
        padding: 2px 8px;
        align-items: center;
        gap: 6px;
        font-weight: bold;
        font-size: 11px;
        font-family: monospace;
      }
      .cbox-body {
        padding: 6px 10px;
      }
      .cbox-wrapper {
        border-color: #818cf8;
      }
      .cbox-wrapper .cbox-header {
        color: #4338ca;
        background: #eef2ff;
      }
      .cbox-icon {
        border-color: #fb923c;
      }
      .cbox-icon .cbox-header {
        color: #c2410c;
        background: #fff7ed;
      }
      .cbox-button {
        border-color: #34d399;
      }
      .cbox-button .cbox-header {
        color: #065f46;
        background: #ecfdf5;
      }
    </style>
  </head>
  <body>
    <div id="render-log">
      <div class="log-title">
        Render tracker — calls per component per case (resets on re-render):
      </div>
    </div>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useLayoutEffect } from "preact/hooks";
      import { createComponentResolver, useNext } from "../dispatcher.jsx";

      // ── Render tracking (per case, plain DOM — never causes re-renders) ─────
      // Each case has its own counters keyed by component name.
      // TREE defines the display order and indent for each case.
      const CASES = ["case1", "case2", "case3", "case4", "case5"];

      // With createComponentResolver, every enhancer is always rendered as a component
      // in a chain: WrapperEnhancer → (passes through) → IconEnhancer → (passes through) → Button.
      // An enhancer that "matches" terminates the chain early by not calling Next.
      // An enhancer that does not match calls <Next {...props} /> to continue.
      const TREES = {
        case1: [
          { name: "WrapperEnhancer", indent: "" },
          { name: "IconEnhancer", indent: "  └─ " },
          { name: "Button", indent: "      └─ " },
        ],
        case2: [
          { name: "WrapperEnhancer", indent: "" },
          { name: "IconEnhancer", indent: "  └─ " },
          { name: "Button", indent: "      └─ " },
        ],
        case3: [
          { name: "WrapperEnhancer", indent: "" },
          { name: "WrapperEnhancer (re-render)", indent: "  └─ " },
          { name: "IconEnhancer (re-render)", indent: "      └─ " },
          { name: "Button", indent: "          └─ " },
        ],
        case4: [
          { name: "WrapperEnhancer", indent: "" },
          { name: "WrapperEnhancer (re-render)", indent: "  └─ " },
          { name: "IconEnhancer (re-render)", indent: "      └─ " },
          { name: "Button", indent: "          └─ " },
        ],
        case5: [
          { name: "WrapperEnhancer", indent: "" },
          { name: "IconEnhancer", indent: "  └─ " },
          { name: "Button (uiAction)", indent: "      └─ " },
        ],
      };

      const COLORS = {
        "WrapperEnhancer": "#818cf8",
        "WrapperEnhancer (re-render)": "#a5b4fc",
        "IconEnhancer": "#fb923c",
        "IconEnhancer (re-render)": "#fdba74",
        "Button": "#34d399",
        "Button (uiAction)": "#22d3ee",
      };

      const counts = {}; // counts[caseId][componentName] = number
      const pending = {}; // pending[caseId] = Set of names that flashed this batch

      for (const c of CASES) {
        counts[c] = {};
        pending[c] = new Set();
      }

      const trackRender = (caseId, name) => {
        counts[caseId][name] = (counts[caseId][name] || 0) + 1;
        pending[caseId].add(name);
      };

      const initLog = () => {
        const root = document.getElementById("render-log");
        for (const caseId of CASES) {
          const tree = TREES[caseId];
          const div = document.createElement("div");
          div.className = "case-log";
          div.id = `log-${caseId}`;
          const titleEl = document.createElement("div");
          titleEl.className = "case-log-title";
          titleEl.textContent = caseId.replace("case", "Case ");
          div.appendChild(titleEl);
          for (const { name, indent } of tree) {
            const color = COLORS[name] ?? "#cdd6f4";
            const line = document.createElement("div");
            line.style.cssText =
              "display:flex;align-items:center;gap:2px;font-size:11px;line-height:1.6";
            line.innerHTML = `<span style="white-space:pre;color:#6c7086">${indent}</span><span id="rc-${caseId}-${CSS.escape(name)}" style="color:${color};opacity:0.3;padding:0 3px;border-radius:3px;--flash-color:${color}cc">${name}&thinsp;<b>0</b></span>`;
            div.appendChild(line);
          }
          root.appendChild(div);
        }
      };

      const flushLog = () => {
        for (const caseId of CASES) {
          const tree = TREES[caseId];
          const flashing = new Set(pending[caseId]);
          pending[caseId].clear();
          for (const { name } of tree) {
            const span = document.getElementById(
              `rc-${caseId}-${CSS.escape(name)}`,
            );
            if (!span) {
              continue;
            }
            const count = counts[caseId][name] ?? 0;
            span.style.opacity = count === 0 ? "0.3" : "1";
            span.querySelector("b").textContent = count;
            if (flashing.has(name)) {
              span.classList.remove("render-flash");
              // eslint-disable-next-line no-unused-expressions
              span.offsetWidth;
              span.classList.add("render-flash");
              span.addEventListener(
                "animationend",
                () => span.classList.remove("render-flash"),
                { once: true },
              );
            }
          }
        }
      };

      initLog();
      flushLog();

      // ── Target component ────────────────────────────────────────────────────
      const Button = (props) => {
        const { caseId, children, label, icon, uiAction } = props;
        if (caseId) {
          trackRender(
            caseId,
            uiAction
              ? "Button (uiAction)"
              : icon
                ? "Button (via icon)"
                : "Button",
          );
        }
        const display = label ?? children ?? "button";
        return (
          <div class="cbox cbox-button">
            <div class="cbox-header">
              Button {uiAction ? "— uiAction received ✓" : ""}
            </div>
            <div class="cbox-body">
              <button style="padding:4px 12px;cursor:pointer;font-size:13px;">
                {display}
              </button>
            </div>
          </div>
        );
      };

      // ── Enhancers ───────────────────────────────────────────────────────────
      // Enhancers that don't match call <Next {...props} /> to pass through
      // to the next enhancer in the chain.
      const WrapperEnhancer = (props) => {
        const Next = useNext();
        const { caseId } = props;
        const isReRender = props["data-redispatch"];
        const trackName = isReRender
          ? "WrapperEnhancer (re-render)"
          : "WrapperEnhancer";
        if (caseId) {
          trackRender(caseId, trackName);
        }
        if (props.children === undefined) {
          return <Next {...props} />;
        }
        return (
          <div class="cbox cbox-wrapper">
            <div class="cbox-header">
              WrapperEnhancer {isReRender ? "(re-render)" : ""}
            </div>
            <div class="cbox-body">
              <Next {...props} data-redispatch={true} />
            </div>
          </div>
        );
      };

      const IconEnhancer = (props) => {
        const Next = useNext();
        const { caseId, icon } = props;
        const isReRender = props["data-redispatch"];
        const trackName = isReRender
          ? "IconEnhancer (re-render)"
          : "IconEnhancer";
        if (caseId) {
          trackRender(caseId, trackName);
        }
        if (!icon) {
          return <Next {...props} />;
        }
        const {
          // eslint-disable-next-line no-unused-vars
          icon: i,
          ...rest
        } = props;
        return (
          <div class="cbox cbox-icon">
            <div class="cbox-header">IconEnhancer — icon: {icon}</div>
            <div
              class="cbox-body"
              style="display:flex;align-items:center;gap:8px"
            >
              <span style="font-size:20px">{icon}</span>
              <Next {...rest} />
            </div>
          </div>
        );
      };

      const enhancers = [WrapperEnhancer, IconEnhancer];
      const renderButton = createComponentResolver(enhancers);

      const renderButtonTracked = (caseId, Target, props) => {
        return renderButton(Target, { ...props, caseId });
      };

      // ── App ─────────────────────────────────────────────────────────────────
      const CaseSection = ({ title, code, children }) => (
        <div class="case-section">
          <div class="case-header">
            <span class="case-title">{title}</span>
            <span class="case-code">{code}</span>
          </div>
          <div class="case-render">{children}</div>
        </div>
      );

      const App = () => {
        useLayoutEffect(flushLog);
        return (
          <div>
            <h1>Component Resolver Demo</h1>
            <p style="color:#555;font-size:13px;margin-bottom:24px">
              Each case shows the component tree rendered by
              createComponentResolver. The render log (top) counts how many
              times each enhancer was called.
            </p>

            <CaseSection
              title="Case 1 — no enhancer matches"
              code='renderButton(Button, { label: "Hello" })'
            >
              {renderButtonTracked("case1", Button, { label: "Hello" })}
            </CaseSection>

            <CaseSection
              title="Case 2 — IconEnhancer matches"
              code='renderButton(Button, { label: "Save", icon: "💾" })'
            >
              {renderButtonTracked("case2", Button, {
                label: "Save",
                icon: "💾",
              })}
            </CaseSection>

            <CaseSection
              title="Case 3 — WrapperEnhancer matches (children)"
              code="renderButton(Button, { children: <span>inner</span> })"
            >
              {renderButtonTracked("case3", Button, {
                children: (
                  <span style="color:#4338ca;font-weight:bold">
                    inner content
                  </span>
                ),
              })}
            </CaseSection>

            <CaseSection
              title="Case 4 — Both match: wrapper + icon"
              code='renderButton(Button, { icon: "⭐", children: <span>star</span> })'
            >
              {renderButtonTracked("case4", Button, {
                icon: "⭐",
                children: (
                  <span style="color:#4338ca;font-weight:bold">
                    star content
                  </span>
                ),
              })}
            </CaseSection>

            <CaseSection
              title="Case 5 — uiAction prop passes through to Button (no infinite loop)"
              code='renderButton(Button, { label: "Save", uiAction: (v) => {} })'
            >
              {renderButtonTracked("case5", Button, {
                label: "Save",
                uiAction: () => {},
              })}
            </CaseSection>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
