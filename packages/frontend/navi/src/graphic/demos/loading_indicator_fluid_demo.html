<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>LoadingIndicatorFluid Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useRef, useEffect } from "preact/hooks";
      import { LoadingIndicatorFluid, LoadingOutline } from "@jsenv/navi";

      const COLORS = [
        { label: "dark", value: "#383a36" },
        { label: "blue", value: "#4dabf7" },
        { label: "green", value: "#69db7c" },
        { label: "red", value: "#ff6b6b" },
        { label: "purple", value: "#da77f2" },
      ];

      const Cell = ({ label, width, height, radius, children }) => (
        <div
          style={{
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            gap: "8px",
          }}
        >
          <div
            style={{
              position: "relative",
              width: `${width}px`,
              height: `${height}px`,
              border: "1px dashed #ccc",
              borderRadius: radius ? `${radius}px` : undefined,
            }}
          >
            {children}
          </div>
          <span
            style={{ fontSize: "12px", color: "#888", fontFamily: "monospace" }}
          >
            {label}
          </span>
        </div>
      );

      const Demo = () => {
        const [color, setColor] = useState(COLORS[0].value);

        return (
          <div
            style={{
              fontFamily: "sans-serif",
              padding: "32px",
              display: "flex",
              flexDirection: "column",
              gap: "32px",
            }}
          >
            <h2 style={{ margin: 0 }}>LoadingIndicatorFluid</h2>

            <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
              <span style={{ fontSize: "14px" }}>Color:</span>
              {COLORS.map(({ label, value }) => (
                <label
                  key={value}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "6px",
                    cursor: "pointer",
                  }}
                >
                  <input
                    type="radio"
                    name="color"
                    value={value}
                    checked={color === value}
                    onChange={() => setColor(value)}
                  />
                  <span
                    style={{
                      display: "inline-block",
                      width: "14px",
                      height: "14px",
                      borderRadius: "50%",
                      background: value,
                      border: "1px solid rgba(0,0,0,0.15)",
                    }}
                  />
                  {label}
                </label>
              ))}
            </div>

            <div
              style={{
                display: "flex",
                flexWrap: "wrap",
                gap: "32px",
                alignItems: "flex-end",
              }}
            >
              <Cell label="200×60 rectangle" width={200} height={60}>
                <LoadingIndicatorFluid color={color} />
              </Cell>

              <Cell label="120×120 square" width={120} height={120}>
                <LoadingIndicatorFluid color={color} />
              </Cell>

              <Cell
                label="200×120 rounded"
                width={200}
                height={120}
                radius={16}
              >
                <LoadingIndicatorFluid color={color} />
              </Cell>

              <Cell label="80×80 circle" width={80} height={80} radius={40}>
                <LoadingIndicatorFluid color={color} />
              </Cell>

              <Cell label="300×48 pill" width={300} height={48} radius={24}>
                <LoadingIndicatorFluid color={color} />
              </Cell>

              <Cell label="size=4" width={160} height={80}>
                <LoadingIndicatorFluid color={color} size={4} />
              </Cell>
            </div>

            <h3 style={{ margin: 0 }}>Resize to see it adapt</h3>
            <p style={{ margin: 0, fontSize: "14px", color: "#555" }}>
              Drag the corner of the box below — the indicator redraws to match.
            </p>
            <div
              style={{
                position: "relative",
                width: "300px",
                height: "80px",
                borderRadius: "12px",
                border: "1px dashed #aaa",
                resize: "both",
                overflow: "hidden",
                minWidth: "80px",
                minHeight: "40px",
              }}
            >
              <LoadingIndicatorFluid color={color} />
            </div>

            <DebounceDemo color={color} />
          </div>
        );
      };

      const DebounceDemo = ({ color }) => {
        const [loading, setLoading] = useState(false);
        const [debounce, setDebounce] = useState(1000);
        const [duration, setDuration] = useState(5000);
        const timerRef = useRef(null);

        const startLoad = () => {
          if (loading) {
            return;
          }
          setLoading(true);
          timerRef.current = setTimeout(() => {
            setLoading(false);
          }, duration);
        };

        useEffect(() => {
          return () => {
            if (timerRef.current) {
              clearTimeout(timerRef.current);
            }
          };
        }, []);

        return (
          <div
            style={{ display: "flex", flexDirection: "column", gap: "16px" }}
          >
            <h3 style={{ margin: 0 }}>Debounce — delayed display</h3>
            <p style={{ margin: 0, fontSize: "14px", color: "#555" }}>
              The outline is hidden for <strong>debounce ms</strong> after
              loading starts. The animation begins immediately so when the
              outline appears it is already mid-rotation — conveying that work
              was already in progress.
            </p>

            <div style={{ display: "flex", gap: "24px", flexWrap: "wrap" }}>
              <label
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: "8px",
                  fontSize: "14px",
                }}
              >
                Debounce (ms):
                <input
                  type="number"
                  min="0"
                  max="2000"
                  step="50"
                  value={debounce}
                  onInput={(e) => setDebounce(Number(e.currentTarget.value))}
                  style={{ width: "70px" }}
                />
              </label>
              <label
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: "8px",
                  fontSize: "14px",
                }}
              >
                Load duration (ms):
                <input
                  type="number"
                  min="100"
                  max="10000"
                  step="100"
                  value={duration}
                  onInput={(e) => setDuration(Number(e.currentTarget.value))}
                  style={{ width: "80px" }}
                />
              </label>
            </div>

            <div
              style={{
                display: "flex",
                gap: "32px",
                flexWrap: "wrap",
                alignItems: "flex-end",
              }}
            >
              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  alignItems: "center",
                  gap: "8px",
                }}
              >
                <div
                  style={{
                    position: "relative",
                    width: "200px",
                    height: "60px",
                    border: "1px dashed #ccc",
                    borderRadius: "8px",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    fontSize: "13px",
                    color: "#888",
                  }}
                >
                  <LoadingOutline
                    loading={loading}
                    debounce={debounce}
                    color={color}
                  />
                  {loading
                    ? debounce > 0
                      ? `hidden for ${debounce}ms…`
                      : "loading…"
                    : "idle"}
                </div>
                <span
                  style={{
                    fontSize: "12px",
                    color: "#888",
                    fontFamily: "monospace",
                  }}
                >
                  debounce={debounce}ms
                </span>
              </div>

              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  alignItems: "center",
                  gap: "8px",
                }}
              >
                <div
                  style={{
                    position: "relative",
                    width: "200px",
                    height: "60px",
                    border: "1px dashed #ccc",
                    borderRadius: "8px",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    fontSize: "13px",
                    color: "#888",
                  }}
                >
                  <LoadingOutline
                    loading={loading}
                    debounce={0}
                    color={color}
                  />
                  {loading ? "loading…" : "idle"}
                </div>
                <span
                  style={{
                    fontSize: "12px",
                    color: "#888",
                    fontFamily: "monospace",
                  }}
                >
                  debounce=0ms (no delay, for comparison)
                </span>
              </div>
            </div>

            <button
              type="button"
              disabled={loading}
              onClick={startLoad}
              style={{
                width: "fit-content",
                padding: "6px 16px",
                fontSize: "14px",
              }}
            >
              {loading ? `loading… (${duration}ms)` : "Start load"}
            </button>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
