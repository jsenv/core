<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Image Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useEffect } from "preact/hooks";
      import { Image } from "@jsenv/navi";

      // Register service worker — serves SVG images at ./image_demo_asset?theme=&delay=
      const swReadyPromise = (async () => {
        const registration =
          await window.navigator.serviceWorker.register("./image_demo_sw.js");
        if (registration.active) {
          return;
        }
        const sw = registration.installing || registration.waiting;
        await new Promise((resolve) => {
          sw.addEventListener("statechange", function onStateChange() {
            if (sw.state === "activated") {
              sw.removeEventListener("statechange", onStateChange);
              resolve();
            }
          });
        });
      })();

      const SPEEDS = {
        fast: 100,
        normal: 500,
        slow: 2000,
      };

      const THEMES = ["light", "dark", "colorful"];

      const NoHeightSection = ({ delay, theme }) => {
        const [key, setKey] = useState(0);
        return (
          <section
            style={{ display: "flex", flexDirection: "column", gap: "12px" }}
          >
            <h3 style={{ margin: 0 }}>Without height — layout shift</h3>
            <p style={{ margin: 0, fontSize: "14px", color: "#555" }}>
              No height is set. The page shifts when the image loads.
            </p>
            <button
              onClick={() => setKey((k) => k + 1)}
              style={{
                alignSelf: "flex-start",
                padding: "6px 14px",
                fontSize: "14px",
                cursor: "pointer",
                borderRadius: "4px",
                border: "1px solid #adb5bd",
                background: "#f8f9fa",
              }}
            >
              Reload
            </button>
            <Image
              key={key}
              src={`./image_demo_asset?theme=${theme}&delay=${delay}&v=${key}`}
              alt="Demo image without height"
              width="400px"
            />
          </section>
        );
      };

      const WithHeightSection = ({ delay, theme }) => {
        const [key, setKey] = useState(0);
        return (
          <section
            style={{ display: "flex", flexDirection: "column", gap: "12px" }}
          >
            <h3 style={{ margin: 0 }}>With height — no layout shift</h3>
            <p style={{ margin: 0, fontSize: "14px", color: "#555" }}>
              Height is set explicitly. Space is reserved while the image loads.
            </p>
            <button
              onClick={() => setKey((k) => k + 1)}
              style={{
                alignSelf: "flex-start",
                padding: "6px 14px",
                fontSize: "14px",
                cursor: "pointer",
                borderRadius: "4px",
                border: "1px solid #adb5bd",
                background: "#f8f9fa",
              }}
            >
              Reload
            </button>
            <Image
              key={key}
              src={`./image_demo_asset?theme=${theme}&delay=${delay}&v=${key}`}
              alt="Demo image with height"
              width="400px"
              height="300px"
            />
          </section>
        );
      };

      const Demo = () => {
        const [swReady, setSwReady] = useState(false);
        const [speed, setSpeed] = useState("normal");
        const [theme, setTheme] = useState("light");

        useEffect(() => {
          swReadyPromise.then(() => {
            setSwReady(true);
          });
        }, []);

        const delay = SPEEDS[speed];

        return (
          <div
            style={{
              fontFamily: "sans-serif",
              padding: "32px",
              display: "flex",
              flexDirection: "column",
              gap: "40px",
              maxWidth: "560px",
            }}
          >
            <h2 style={{ margin: 0 }}>Image</h2>

            {!swReady && (
              <p style={{ margin: 0, color: "#868e96", fontSize: "14px" }}>
                Activating service worker…
              </p>
            )}

            {swReady && (
              <>
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "24px",
                    flexWrap: "wrap",
                  }}
                >
                  <label
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "8px",
                      fontSize: "14px",
                    }}
                  >
                    Loading speed:
                    <select
                      value={speed}
                      onChange={(e) => setSpeed(e.target.value)}
                      style={{ fontSize: "14px", padding: "4px 8px" }}
                    >
                      <option value="fast">fast (0.1s)</option>
                      <option value="normal">normal (0.5s)</option>
                      <option value="slow">slow (2s)</option>
                    </select>
                  </label>
                  <label
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "8px",
                      fontSize: "14px",
                    }}
                  >
                    Image:
                    <select
                      value={theme}
                      onChange={(e) => setTheme(e.target.value)}
                      style={{ fontSize: "14px", padding: "4px 8px" }}
                    >
                      {THEMES.map((t) => (
                        <option key={t} value={t}>
                          {t}
                        </option>
                      ))}
                    </select>
                  </label>
                </div>

                <NoHeightSection delay={delay} theme={theme} />
                <WithHeightSection delay={delay} theme={theme} />
              </>
            )}
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
