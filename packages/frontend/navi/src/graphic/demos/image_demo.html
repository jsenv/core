<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Image Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useEffect } from "preact/hooks";
      import { Image } from "@jsenv/navi";

      // Register service worker — serves SVG images at ./image_demo_asset?theme=&delay=
      const swReadyPromise = (async () => {
        await window.navigator.serviceWorker.register("./image_demo_sw.js");
        if (window.navigator.serviceWorker.controller) {
          return;
        }
        await new Promise((resolve) => {
          window.navigator.serviceWorker.addEventListener(
            "controllerchange",
            resolve,
            {
              once: true,
            },
          );
        });
      })();

      const SPEEDS = {
        fast: 100,
        normal: 500,
        slow: 1000,
        never: -1,
      };

      const THEMES = ["light", "dark", "colorful"];

      const ReloadButton = ({ onClick }) => (
        <button
          onClick={onClick}
          style={{
            alignSelf: "flex-start",
            padding: "4px 12px",
            fontSize: "14px",
            cursor: "pointer",
            borderRadius: "4px",
            border: "1px solid #adb5bd",
            background: "#f8f9fa",
          }}
        >
          Reload
        </button>
      );

      const NoHeightSection = ({ delay, theme }) => {
        const [key, setKey] = useState(0);
        return (
          <section
            style={{ display: "flex", flexDirection: "column", gap: "8px" }}
          >
            <h3 style={{ margin: 0 }}>Without height — layout shift</h3>
            <ReloadButton onClick={() => setKey((k) => k + 1)} />
            <Image
              key={key}
              src={`./image_demo_asset?section=no-height&theme=${theme}&delay=${delay}&v=${key}`}
              width="200px"
            />
            <p style={{ margin: 0, fontSize: "14px" }}>
              Text after the image — it shifts down when the image loads.
            </p>
          </section>
        );
      };

      const WithHeightSection = ({ delay, theme }) => {
        const [key, setKey] = useState(0);
        return (
          <section
            style={{ display: "flex", flexDirection: "column", gap: "8px" }}
          >
            <h3 style={{ margin: 0 }}>With height — no layout shift</h3>
            <ReloadButton onClick={() => setKey((k) => k + 1)} />
            <Image
              key={key}
              src={`./image_demo_asset?section=with-height&theme=${theme}&delay=${delay}&v=${key}`}
              width="200px"
              height="150px"
            />
            <p style={{ margin: 0, fontSize: "14px" }}>
              Text after the image — it stays in place while the image loads.
            </p>
          </section>
        );
      };

      const DarkBackgroundSection = ({ delay, theme }) => {
        const [key, setKey] = useState(0);
        return (
          <section
            style={{ display: "flex", flexDirection: "column", gap: "8px" }}
          >
            <h3 style={{ margin: 0 }}>On dark background</h3>
            <ReloadButton onClick={() => setKey((k) => k + 1)} />
            <div
              style={{
                background: "#111827",
                padding: "16px",
                borderRadius: "8px",
                display: "flex",
                flexDirection: "column",
                gap: "8px",
              }}
            >
              <Image
                key={key}
                src={`./image_demo_asset?section=dark-bg&theme=${theme}&delay=${delay}&v=${key}`}
                width="200px"
                height="150px"
                placeholderDark
              />
              <p style={{ margin: 0, fontSize: "14px", color: "#9ca3af" }}>
                Text after the image
              </p>
            </div>
          </section>
        );
      };

      const Demo = () => {
        const [swReady, setSwReady] = useState(false);
        const [speed, setSpeed] = useState("normal");
        const [theme, setTheme] = useState("light");

        useEffect(() => {
          swReadyPromise.then(() => {
            setSwReady(true);
          });
        }, []);

        const delay = SPEEDS[speed];

        return (
          <div
            style={{
              fontFamily: "sans-serif",
              padding: "32px",
              display: "flex",
              flexDirection: "column",
              gap: "40px",
              maxWidth: "560px",
            }}
          >
            <h2 style={{ margin: 0 }}>Image</h2>

            {!swReady && (
              <p style={{ margin: 0, color: "#868e96", fontSize: "14px" }}>
                Activating service worker…
              </p>
            )}

            {swReady && (
              <>
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "16px",
                    flexWrap: "wrap",
                    fontSize: "14px",
                  }}
                >
                  <label
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "6px",
                    }}
                  >
                    Loading speed:
                    <select
                      value={speed}
                      onChange={(e) => setSpeed(e.target.value)}
                      style={{ fontSize: "14px" }}
                    >
                      <option value="fast">fast (0.1s)</option>
                      <option value="normal">normal (0.5s)</option>
                      <option value="slow">slow (1s)</option>
                      <option value="never">never loads</option>
                    </select>
                  </label>
                  <label
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "6px",
                    }}
                  >
                    Image:
                    <select
                      value={theme}
                      onChange={(e) => setTheme(e.target.value)}
                      style={{ fontSize: "14px" }}
                    >
                      {THEMES.map((t) => (
                        <option key={t} value={t}>
                          {t}
                        </option>
                      ))}
                    </select>
                  </label>
                </div>

                <NoHeightSection delay={delay} theme={theme} />
                <WithHeightSection delay={delay} theme={theme} />
                <DarkBackgroundSection delay={delay} theme={theme} />
              </>
            )}
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
