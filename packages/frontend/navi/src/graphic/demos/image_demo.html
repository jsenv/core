<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Image Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useCallback, useEffect } from "preact/hooks";
      import { Image } from "@jsenv/navi";
      import { LoadingIndicator } from "@jsenv/navi";

      // Register service worker — it intercepts ./image_demo_asset requests
      // and responds with a generated SVG after a configurable delay
      const swReadyPromise = (async () => {
        const registration =
          await window.navigator.serviceWorker.register("./image_demo_sw.js");
        if (registration.active) {
          return;
        }
        const sw = registration.installing || registration.waiting;
        await new Promise((resolve) => {
          sw.addEventListener("statechange", function onStateChange() {
            if (sw.state === "activated") {
              sw.removeEventListener("statechange", onStateChange);
              resolve();
            }
          });
        });
      })();

      const ImageWithLoadingState = ({ src, alt, width, height }) => {
        const [status, setStatus] = useState("loading");

        const onLoad = useCallback(() => {
          setStatus("loaded");
        }, []);

        const onError = useCallback(() => {
          setStatus("error");
        }, []);

        return (
          <div
            style={{
              position: "relative",
              width,
              height,
              background: "#f1f3f5",
              borderRadius: "8px",
              overflow: "hidden",
              border: "1px solid #dee2e6",
            }}
          >
            {status === "loading" && (
              <div
                style={{
                  position: "absolute",
                  inset: 0,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  color: "#868e96",
                }}
              >
                <LoadingIndicator height="32px" />
              </div>
            )}
            {status === "error" && (
              <div
                style={{
                  position: "absolute",
                  inset: 0,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  color: "#fa5252",
                  fontSize: "14px",
                }}
              >
                Failed to load image
              </div>
            )}
            <Image
              src={src}
              alt={alt}
              width="100%"
              height="100%"
              style={{
                objectFit: "cover",
                opacity: status === "loaded" ? 1 : 0,
                transition: "opacity 0.3s ease",
              }}
              onLoad={onLoad}
              onError={onError}
            />
          </div>
        );
      };

      const Demo = () => {
        const [swReady, setSwReady] = useState(false);
        const [delay, setDelay] = useState(2000);
        const [reloadKey, setReloadKey] = useState(0);
        const [hue, setHue] = useState(210);

        useEffect(() => {
          swReadyPromise.then(() => {
            setSwReady(true);
          });
        }, []);

        const reload = useCallback(() => {
          setHue((h) => (h + 60) % 360);
          setReloadKey((k) => k + 1);
        }, []);

        const src = `./image_demo_asset?delay=${delay}&hue=${hue}&v=${reloadKey}`;

        return (
          <div
            style={{
              fontFamily: "sans-serif",
              padding: "32px",
              display: "flex",
              flexDirection: "column",
              gap: "32px",
              maxWidth: "640px",
            }}
          >
            <h2 style={{ margin: 0 }}>Image</h2>

            {!swReady && (
              <p style={{ margin: 0, color: "#868e96", fontSize: "14px" }}>
                Activating service worker…
              </p>
            )}

            {swReady && (
              <>
                <div
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    gap: "12px",
                  }}
                >
                  <label
                    style={{
                      display: "flex",
                      flexDirection: "column",
                      gap: "4px",
                    }}
                  >
                    <span style={{ fontSize: "14px", color: "#555" }}>
                      Loading delay:{" "}
                      <strong>
                        {delay === 0 ? "instant" : `${delay / 1000}s`}
                      </strong>
                    </span>
                    <input
                      type="range"
                      min="0"
                      max="5000"
                      step="500"
                      value={delay}
                      onInput={(e) => setDelay(Number(e.target.value))}
                      style={{ width: "300px" }}
                    />
                  </label>
                  <div>
                    <button
                      onClick={reload}
                      style={{
                        padding: "6px 14px",
                        fontSize: "14px",
                        cursor: "pointer",
                        borderRadius: "4px",
                        border: "1px solid #adb5bd",
                        background: "#f8f9fa",
                      }}
                    >
                      Load new image
                    </button>
                  </div>
                </div>

                <ImageWithLoadingState
                  key={`${delay}-${reloadKey}`}
                  src={src}
                  alt="A demo image served by the service worker"
                  width="100%"
                  height="360px"
                />
              </>
            )}
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
