<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>LoadingIndicator Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { LoadingIndicator } from "@jsenv/navi";

      const COLORS = [
        { label: "dark", value: "#383a36" },
        { label: "blue", value: "#4dabf7" },
        { label: "green", value: "#69db7c" },
        { label: "red", value: "#ff6b6b" },
        { label: "purple", value: "#da77f2" },
      ];

      const Cell = ({ label, width, height, radius, children }) => (
        <div
          style={{
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            gap: "8px",
          }}
        >
          <div
            style={{
              position: "relative",
              width: `${width}px`,
              height: `${height}px`,
              border: "1px dashed #ccc",
              borderRadius: radius ? `${radius}px` : undefined,
            }}
          >
            {children}
          </div>
          <span
            style={{ fontSize: "12px", color: "#888", fontFamily: "monospace" }}
          >
            {label}
          </span>
        </div>
      );

      const Demo = () => {
        const [color, setColor] = useState(COLORS[0].value);

        return (
          <div
            style={{
              fontFamily: "sans-serif",
              padding: "32px",
              display: "flex",
              flexDirection: "column",
              gap: "32px",
            }}
          >
            <h2 style={{ margin: 0 }}>LoadingIndicator</h2>

            <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
              <span style={{ fontSize: "14px" }}>Color:</span>
              {COLORS.map(({ label, value }) => (
                <label
                  key={value}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "6px",
                    cursor: "pointer",
                  }}
                >
                  <input
                    type="radio"
                    name="color"
                    value={value}
                    checked={color === value}
                    onChange={() => setColor(value)}
                  />
                  <span
                    style={{
                      display: "inline-block",
                      width: "14px",
                      height: "14px",
                      borderRadius: "50%",
                      background: value,
                      border: "1px solid rgba(0,0,0,0.15)",
                    }}
                  />
                  {label}
                </label>
              ))}
            </div>

            <div
              style={{
                display: "flex",
                flexWrap: "wrap",
                gap: "32px",
                alignItems: "flex-end",
              }}
            >
              <Cell label="200×60 rectangle" width={200} height={60}>
                <LoadingIndicator color={color} />
              </Cell>

              <Cell label="120×120 square" width={120} height={120}>
                <LoadingIndicator color={color} />
              </Cell>

              <Cell
                label="200×120 rounded (radius=16)"
                width={200}
                height={120}
                radius={16}
              >
                <LoadingIndicator color={color} radius={16} />
              </Cell>

              <Cell
                label="80×80 circle (radius=40)"
                width={80}
                height={80}
                radius={40}
              >
                <LoadingIndicator color={color} radius={40} />
              </Cell>

              <Cell
                label="300×48 pill (radius=24)"
                width={300}
                height={48}
                radius={24}
              >
                <LoadingIndicator color={color} radius={24} />
              </Cell>

              <Cell label="size=4" width={160} height={80}>
                <LoadingIndicator color={color} size={4} />
              </Cell>

              <Cell label="radius=inherit" width={160} height={80} radius={20}>
                <LoadingIndicator color={color} radius="inherit" />
              </Cell>
            </div>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
