<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>LoadingIndicator Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { LoadingIndicator } from "@jsenv/navi";

      const Demo = () => {
        const [loading, setLoading] = useState(true);

        return (
          <div
            style={{
              fontFamily: "sans-serif",
              padding: "32px",
              display: "flex",
              flexDirection: "column",
              gap: "40px",
              maxWidth: "600px",
            }}
          >
            <h2 style={{ margin: 0 }}>LoadingIndicator</h2>

            <label
              style={{ display: "flex", alignItems: "center", gap: "8px" }}
            >
              <input
                type="checkbox"
                checked={loading}
                onChange={(e) => setLoading(e.target.checked)}
              />
              loading
            </label>

            {/* Inline next to text — inherits text color */}
            <section
              style={{ display: "flex", flexDirection: "column", gap: "12px" }}
            >
              <h3 style={{ margin: 0 }}>Inline with text</h3>
              <p style={{ margin: 0, fontSize: "14px", color: "#555" }}>
                The indicator inherits <code>currentColor</code> by default, so
                it matches the surrounding text without any extra props.
              </p>
              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  gap: "10px",
                }}
              >
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "8px",
                    fontSize: "16px",
                    color: "#383a36",
                  }}
                >
                  {loading && <LoadingIndicator />}
                  Saving changes…
                </div>
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "8px",
                    fontSize: "16px",
                    color: "#4dabf7",
                  }}
                >
                  {loading && <LoadingIndicator />}
                  <span style={{ color: "#4dabf7" }}>Syncing data…</span>
                </div>
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "8px",
                    fontSize: "22px",
                    color: "#ff6b6b",
                  }}
                >
                  {loading && <LoadingIndicator />}
                  <span style={{ color: "#ff6b6b" }}>Uploading file…</span>
                </div>
              </div>
            </section>

            {/* Block loading state */}
            <section
              style={{ display: "flex", flexDirection: "column", gap: "12px" }}
            >
              <h3 style={{ margin: 0 }}>Block loading state</h3>
              <p style={{ margin: 0, fontSize: "14px", color: "#555" }}>
                Place the indicator in the center of a block to indicate the
                whole area is loading.
              </p>
              <div
                style={{
                  position: "relative",
                  width: "100%",
                  height: "160px",
                  background: "#f8f9fa",
                  border: "1px solid #dee2e6",
                  borderRadius: "8px",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                }}
              >
                {loading ? (
                  <LoadingIndicator height="48px" color="#4dabf7" />
                ) : (
                  <span style={{ color: "#555" }}>Content loaded ✓</span>
                )}
              </div>
            </section>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
