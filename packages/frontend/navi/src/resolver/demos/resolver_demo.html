<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <title>Resolver Demo</title>
    <style>
      @keyframes render-flash {
        0% {
          background-color: var(--flash-color);
          transform: scale(1.06);
        }
        60% {
          transform: scale(1);
        }
        100% {
          background-color: transparent;
        }
      }
      .render-flash {
        display: inline-block;
        animation: render-flash 600ms ease-out;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #app {
        max-width: 860px;
        margin: 24px auto;
        padding: 0 16px;
      }
      h1 {
        margin-bottom: 4px;
        color: #333;
      }
      .case-section {
        margin-bottom: 32px;
      }
      .case-header {
        display: flex;
        margin-bottom: 8px;
        align-items: baseline;
        gap: 12px;
      }
      .case-title {
        color: #333;
        font-weight: 700;
        font-size: 15px;
      }
      .case-code {
        padding: 2px 6px;
        color: #666;
        font-size: 12px;
        font-family: monospace;
        background: #e8e8e8;
        border-radius: 3px;
      }
      .case-render {
        display: flex;
        min-height: 48px;
        padding: 16px 20px;
        align-items: center;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      /* component boxes in render tree */
      .cbox {
        margin: 4px 0;
        border: 2px solid;
        border-radius: 6px;
        overflow: hidden;
      }
      .cbox-header {
        display: flex;
        padding: 2px 8px;
        align-items: center;
        gap: 6px;
        font-weight: bold;
        font-size: 11px;
        font-family: monospace;
      }
      .cbox-body {
        padding: 6px 10px;
      }
      .cbox-wrapper {
        border-color: #818cf8;
      }
      .cbox-wrapper .cbox-header {
        color: #4338ca;
        background: #eef2ff;
      }
      .cbox-icon {
        border-color: #fb923c;
      }
      .cbox-icon .cbox-header {
        color: #c2410c;
        background: #fff7ed;
      }
      .cbox-button {
        border-color: #34d399;
      }
      .cbox-button .cbox-header {
        color: #065f46;
        background: #ecfdf5;
      }
      .render-count {
        margin-left: auto;
        padding: 1px 5px;
        color: #888;
        font-weight: normal;
        font-size: 10px;
        background: #f0f0f0;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useRef, useLayoutEffect } from "preact/hooks";
      import {
        createComponentResolver,
        useNextResolver,
      } from "../resolver.jsx";

      // ── Render flash — triggers CSS animation on every render ────────────────
      const useRenderFlash = () => {
        const ref = useRef(null);
        useLayoutEffect(() => {
          const el = ref.current;
          if (!el) {
            return;
          }
          el.classList.remove("render-flash");
          // eslint-disable-next-line no-void
          void el.offsetWidth;
          el.classList.add("render-flash");
        });
        return ref;
      };

      const useRenderCount = () => {
        const ref = useRef(0);
        ref.current += 1;
        return ref.current;
      };

      // ── Target component ────────────────────────────────────────────────────
      const Button = (props) => {
        const { children, label, highlight } = props;
        const [ownCount, setOwnCount] = useState(0);
        const renderCount = useRenderCount();
        const flashRef = useRenderFlash();
        const display = label ?? children ?? "button";
        return (
          <div
            class="cbox cbox-button"
            ref={flashRef}
            style={
              highlight ? "--flash-color:#86efac;outline:2px solid #22c55e" : ""
            }
          >
            <div class="cbox-header">
              Button {highlight ? "— highlight ✓" : ""}
              <span class="render-count">render #{renderCount}</span>
            </div>
            <div
              class="cbox-body"
              style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"
            >
              <button style="padding:4px 12px;cursor:pointer;font-size:13px;">
                {display}
              </button>
              <span style="font-size:12px;color:#065f46">
                own state: {ownCount}
                <button
                  style="margin-left:6px;padding:1px 7px;cursor:pointer;font-size:11px"
                  onClick={() => setOwnCount((n) => n + 1)}
                >
                  +1
                </button>
              </span>
            </div>
          </div>
        );
      };

      // ── Resolvers ───────────────────────────────────────────────────────────
      const WrapperResolver = (props) => {
        const Next = useNextResolver();
        const [ownCount, setOwnCount] = useState(0);
        const renderCount = useRenderCount();
        const flashRef = useRenderFlash();
        if (props.children === undefined) {
          return <Next {...props} />;
        }
        return (
          <div class="cbox cbox-wrapper" ref={flashRef}>
            <div class="cbox-header">
              WrapperResolver
              <span class="render-count">render #{renderCount}</span>
            </div>
            <div class="cbox-body">
              <div style="margin-bottom:6px;font-size:12px;color:#4338ca">
                own state: {ownCount}
                <button
                  style="margin-left:6px;padding:1px 7px;cursor:pointer;font-size:11px"
                  onClick={() => setOwnCount((n) => n + 1)}
                >
                  +1
                </button>
              </div>
              <Next {...props} />
            </div>
          </div>
        );
      };

      const IconResolver = (props) => {
        const Next = useNextResolver();
        const { icon, ...rest } = props;
        const [ownCount, setOwnCount] = useState(0);
        const renderCount = useRenderCount();
        const flashRef = useRenderFlash();
        if (!icon) {
          return <Next {...props} />;
        }
        return (
          <div class="cbox cbox-icon" ref={flashRef}>
            <div class="cbox-header">
              IconResolver — icon: {icon}
              <span class="render-count">render #{renderCount}</span>
            </div>
            <div
              class="cbox-body"
              style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"
            >
              <span style="font-size:20px">{icon}</span>
              <span style="font-size:12px;color:#c2410c">
                own state: {ownCount}
                <button
                  style="margin-left:6px;padding:1px 7px;cursor:pointer;font-size:11px"
                  onClick={() => setOwnCount((n) => n + 1)}
                >
                  +1
                </button>
              </span>
              <Next {...rest} />
            </div>
          </div>
        );
      };

      const resolvers = [WrapperResolver, IconResolver];
      const renderButton = createComponentResolver(resolvers);

      // ── App ─────────────────────────────────────────────────────────────────
      const CaseSection = ({ title, children }) => (
        <div class="case-section">
          <div class="case-header">
            <span class="case-title">{title}</span>
          </div>
          <div class="case-render">{children}</div>
        </div>
      );

      const App = () => {
        // Case 3: root can toggle between WrapperResolver (children) or IconResolver (icon)
        const [case3Mode, setCase3Mode] = useState("wrapper");
        // Case 4: WrapperResolver own-count (forwarded as prop after 5 clicks)
        const [wrapperBoost, setWrapperBoost] = useState(0);
        const boostActive = wrapperBoost >= 5;
        return (
          <div>
            <h1>Component Resolver Demo</h1>
            <p style="color:#555;font-size:13px;margin-bottom:24px">
              Each resolver and Button have their own state (+1 button).
              Clicking +1 re-renders only that component and its subtree. The
              flash animation and render # track each re-render.{" "}
              <strong>Case 3</strong> shows branch switching from the root.{" "}
              <strong>Case 4</strong> shows a resolver forwarding its own state
              as a prop once it reaches a threshold.
            </p>

            <CaseSection title="Case 1 — no resolver matches → plain Button">
              {renderButton(Button, { label: "Hello" })}
            </CaseSection>

            <CaseSection title="Case 2 — IconResolver matches">
              {renderButton(Button, { label: "Save", icon: "💾" })}
            </CaseSection>

            <CaseSection
              title={`Case 3 — root toggles branch (currently: ${case3Mode === "wrapper" ? "WrapperResolver" : "IconResolver"})`}
            >
              <div style="margin-bottom:10px">
                <button
                  style="padding:4px 12px;cursor:pointer;font-size:12px"
                  onClick={() =>
                    setCase3Mode((m) => (m === "wrapper" ? "icon" : "wrapper"))
                  }
                >
                  Switch to{" "}
                  {case3Mode === "wrapper"
                    ? "IconResolver branch"
                    : "WrapperResolver branch"}
                </button>
                <span style="margin-left:10px;font-size:11px;color:#888">
                  root state changes → resolver chain re-evaluates → different
                  component renders
                </span>
              </div>
              {case3Mode === "wrapper"
                ? renderButton(Button, {
                    children: (
                      <span style="color:#4338ca;font-weight:bold">
                        inner content
                      </span>
                    ),
                  })
                : renderButton(Button, { label: "Switched!", icon: "🔀" })}
            </CaseSection>

            <CaseSection
              title={`Case 4 — WrapperResolver forwards own state to Button after 5 clicks (${boostActive ? "active 🎉" : `${wrapperBoost}/5`})`}
            >
              <div style="margin-bottom:10px">
                <button
                  style="padding:4px 12px;cursor:pointer;font-size:12px"
                  onClick={() => setWrapperBoost((n) => n + 1)}
                >
                  Root +1 ({wrapperBoost})
                </button>
                <span style="margin-left:10px;font-size:11px;color:#888">
                  after 5 clicks, WrapperResolver passes <code>highlight</code>{" "}
                  prop → Button changes
                </span>
              </div>
              {renderButton(Button, {
                children: "wrapper content",
                highlight: boostActive,
              })}
            </CaseSection>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
