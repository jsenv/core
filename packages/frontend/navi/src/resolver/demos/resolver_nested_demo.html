<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <title>Resolver Nested Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #app {
        max-width: 900px;
        margin: 24px auto;
        padding: 0 16px;
      }
      h1 {
        margin-bottom: 4px;
        color: #333;
      }
      h2 {
        margin: 0 0 6px;
        color: #555;
        font-size: 15px;
      }
      .description {
        margin-bottom: 24px;
        color: #666;
        font-size: 13px;
      }
      .case-section {
        margin-bottom: 32px;
      }
      .case-header {
        display: flex;
        margin-bottom: 8px;
        align-items: baseline;
        gap: 12px;
      }
      .case-title {
        color: #333;
        font-weight: 700;
        font-size: 15px;
      }
      .case-code {
        padding: 2px 6px;
        color: #666;
        font-size: 12px;
        font-family: monospace;
        background: #e8e8e8;
        border-radius: 3px;
      }
      .case-render {
        display: flex;
        min-height: 48px;
        padding: 16px 20px;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 16px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .cbox {
        margin: 4px 0;
        border: 2px solid;
        border-radius: 6px;
        overflow: hidden;
      }
      .cbox-header {
        display: flex;
        padding: 2px 8px;
        align-items: center;
        gap: 6px;
        font-weight: bold;
        font-size: 11px;
        font-family: monospace;
      }
      .cbox-body {
        padding: 6px 10px;
      }
      /* Dispatcher A — blue/indigo */
      .cbox-a-wrapper {
        border-color: #818cf8;
      }
      .cbox-a-wrapper .cbox-header {
        color: #4338ca;
        background: #eef2ff;
      }
      .cbox-a-icon {
        border-color: #fb923c;
      }
      .cbox-a-icon .cbox-header {
        color: #c2410c;
        background: #fff7ed;
      }
      /* Dispatcher B — teal/emerald */
      .cbox-b-badge {
        border-color: #2dd4bf;
      }
      .cbox-b-badge .cbox-header {
        color: #0f766e;
        background: #f0fdfa;
      }
      .cbox-b-tooltip {
        border-color: #a78bfa;
      }
      .cbox-b-tooltip .cbox-header {
        color: #6d28d9;
        background: #f5f3ff;
      }
      /* leaf */
      .cbox-leaf {
        border-color: #34d399;
      }
      .cbox-leaf .cbox-header {
        color: #065f46;
        background: #ecfdf5;
      }
      .info-box {
        padding: 10px 14px;
        color: #1e40af;
        font-size: 12px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import {
        createComponentResolver,
        useNextResolver,
      } from "../resolver.jsx";

      // ── Resolver A — augments with icon and wrapper ──────────────────────────
      const WrapperResolverA = (props) => {
        const Next = useNextResolver();
        if (props.children === undefined) {
          return <Next {...props} />;
        }
        return (
          <div class="cbox cbox-a-wrapper">
            <div class="cbox-header">A: WrapperResolver</div>
            <div class="cbox-body">
              <Next {...props} data-wrapped />
            </div>
          </div>
        );
      };

      const IconResolverA = (props) => {
        const Next = useNextResolver();
        if (!props.icon) {
          return <Next {...props} />;
        }
        const { icon, ...rest } = props;
        return (
          <div class="cbox cbox-a-icon">
            <div class="cbox-header">A: IconResolver — {icon}</div>
            <div
              class="cbox-body"
              style="display:flex;align-items:center;gap:8px"
            >
              <span style="font-size:20px">{icon}</span>
              <Next {...rest} />
            </div>
          </div>
        );
      };

      const renderA = createComponentResolver([
        WrapperResolverA,
        IconResolverA,
      ]);

      // ── Resolver B — augments with badge and tooltip ─────────────────────────
      // B's resolvers are completely unaware of A's resolver chain.
      const BadgeResolverB = (props) => {
        const Next = useNextResolver();
        if (!props.badge) {
          return <Next {...props} />;
        }
        const { badge, ...rest } = props;
        return (
          <div class="cbox cbox-b-badge">
            <div class="cbox-header">B: BadgeResolver — badge: {badge}</div>
            <div class="cbox-body">
              <Next {...rest} />
            </div>
          </div>
        );
      };

      const TooltipResolverB = (props) => {
        const Next = useNextResolver();
        if (!props.tooltip) {
          return <Next {...props} />;
        }
        const { tooltip, ...rest } = props;
        return (
          <div class="cbox cbox-b-tooltip">
            <div class="cbox-header">B: TooltipResolver — "{tooltip}"</div>
            <div class="cbox-body">
              <Next {...rest} />
            </div>
          </div>
        );
      };

      const renderB = createComponentResolver([
        BadgeResolverB,
        TooltipResolverB,
      ]);

      // ── Leaf component (target for both resolvers) ───────────────────────────
      const Leaf = (props) => {
        const next = useNextResolver();
        return (
          <div class="cbox cbox-leaf">
            <div class="cbox-header">
              Leaf {props.label ? `— ${props.label}` : ""}
            </div>
            <div class="cbox-body" style="font-size:12px;color:#555">
              <div>
                useNextResolver() inside Leaf ={" "}
                <strong>{next === null ? "null ✓" : "NOT null ✗"}</strong>
              </div>
              {props["data-wrapped"] ? (
                <div style="color:#6d28d9">data-wrapped prop received ✓</div>
              ) : null}
            </div>
          </div>
        );
      };

      // ── A resolver that contains a B render ──────────────────────────────────
      // Tests that when A's resolver calls renderB inside its render,
      // B's resolvers get B's Next (not A's) — no cross-contamination.
      const ContainerResolverA = (props) => {
        const Next = useNextResolver();
        if (!props.innerBadge && !props.innerTooltip) {
          return <Next {...props} />;
        }
        const { innerBadge, innerTooltip, ...rest } = props;
        return (
          <div class="cbox cbox-a-wrapper">
            <div class="cbox-header">
              A: ContainerResolver (contains B render)
            </div>
            <div class="cbox-body">
              <div style="margin-bottom:8px;font-size:11px;color:#6c7086">
                outer A resolver continues:
              </div>
              <Next {...rest} />
              <div style="margin:8px 0 4px;font-size:11px;color:#6c7086">
                inner B resolver (independent):
              </div>
              {renderB(Leaf, {
                label: "inner-B target",
                badge: innerBadge,
                tooltip: innerTooltip,
              })}
            </div>
          </div>
        );
      };

      const renderAWithContainer = createComponentResolver([
        ContainerResolverA,
        IconResolverA,
      ]);

      // ── App ──────────────────────────────────────────────────────────────────
      const CaseSection = ({ title, code, children }) => (
        <div class="case-section">
          <div class="case-header">
            <span class="case-title">{title}</span>
            {code ? <span class="case-code">{code}</span> : null}
          </div>
          <div class="case-render">{children}</div>
        </div>
      );

      const App = () => (
        <div>
          <h1>Component Resolver — Nested Demo</h1>
          <p class="description">
            Verifies that nested resolvers are fully isolated: each resolver's
            resolvers see only their own Next via <code>useNextResolver()</code>
            , and the target component (Leaf) always gets <code>null</code> from
            <code>useNextResolver()</code> — never a stale reference.
          </p>

          <CaseSection
            title="Case 1 — Resolver A only"
            code="renderA(Leaf, { label: 'hello', icon: '🌟' })"
          >
            {renderA(Leaf, { label: "hello", icon: "🌟" })}
          </CaseSection>

          <CaseSection
            title="Case 2 — Resolver B only"
            code="renderB(Leaf, { label: 'world', badge: '3', tooltip: 'hi' })"
          >
            {renderB(Leaf, { label: "world", badge: "3", tooltip: "hi" })}
          </CaseSection>

          <CaseSection
            title="Case 3 — A render wrapping a B render"
            code="renderA(Leaf, { children: renderB(Leaf, { badge: '!' }) })"
          >
            {renderA(Leaf, {
              label: "outer-A target",
              children: renderB(Leaf, {
                label: "inner-B target",
                badge: "!",
              }),
            })}
          </CaseSection>

          <CaseSection
            title="Case 4 — A resolver that internally calls renderB"
            code="renderAWithContainer(Leaf, { icon: '🔥', innerBadge: '99', innerTooltip: 'hello' })"
          >
            {renderAWithContainer(Leaf, {
              label: "outer-A target",
              icon: "🔥",
              innerBadge: "99",
              innerTooltip: "from B",
            })}
          </CaseSection>

          <CaseSection title="Case 5 — Leaf confirms useNextResolver() === null">
            <div class="info-box">
              Each Leaf above shows{" "}
              <strong>useNextResolver() inside Leaf = null ✓</strong>. This
              confirms the NextResolverContext is reset to null once the chain
              is exhausted — the target component cannot accidentally re-enter
              any resolver chain.
            </div>
          </CaseSection>
        </div>
      );

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
