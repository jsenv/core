<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <title>Resolver Nested Demo</title>
    <style>
      @keyframes render-flash {
        0% {
          background-color: var(--flash-color);
          transform: scale(1.06);
        }
        60% {
          transform: scale(1);
        }
        100% {
          background-color: transparent;
        }
      }
      .render-flash {
        display: inline-block;
        animation: render-flash 600ms ease-out;
      }
      .render-count {
        margin-left: auto;
        padding: 1px 5px;
        color: #888;
        font-weight: normal;
        font-size: 10px;
        background: #f0f0f0;
        border-radius: 3px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #app {
        max-width: 900px;
        margin: 24px auto;
        padding: 0 16px;
      }
      h1 {
        margin-bottom: 4px;
        color: #333;
      }
      h2 {
        margin: 0 0 6px;
        color: #555;
        font-size: 15px;
      }
      .description {
        margin-bottom: 24px;
        color: #666;
        font-size: 13px;
      }
      .case-section {
        margin-bottom: 32px;
      }
      .case-header {
        display: flex;
        margin-bottom: 8px;
        align-items: baseline;
        gap: 12px;
      }
      .case-title {
        color: #333;
        font-weight: 700;
        font-size: 15px;
      }
      .case-code {
        padding: 2px 6px;
        color: #666;
        font-size: 12px;
        font-family: monospace;
        background: #e8e8e8;
        border-radius: 3px;
      }
      .case-render {
        display: flex;
        min-height: 48px;
        padding: 16px 20px;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 16px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .cbox {
        margin: 4px 0;
        border: 2px solid;
        border-radius: 6px;
        overflow: hidden;
      }
      .cbox-header {
        display: flex;
        padding: 2px 8px;
        align-items: center;
        gap: 6px;
        font-weight: bold;
        font-size: 11px;
        font-family: monospace;
      }
      .cbox-body {
        padding: 6px 10px;
      }
      /* Dispatcher A — blue/indigo */
      .cbox-a-wrapper {
        border-color: #818cf8;
      }
      .cbox-a-wrapper .cbox-header {
        color: #4338ca;
        background: #eef2ff;
      }
      .cbox-a-icon {
        border-color: #fb923c;
      }
      .cbox-a-icon .cbox-header {
        color: #c2410c;
        background: #fff7ed;
      }
      /* Dispatcher B — teal/emerald */
      .cbox-b-badge {
        border-color: #2dd4bf;
      }
      .cbox-b-badge .cbox-header {
        color: #0f766e;
        background: #f0fdfa;
      }
      .cbox-b-tooltip {
        border-color: #a78bfa;
      }
      .cbox-b-tooltip .cbox-header {
        color: #6d28d9;
        background: #f5f3ff;
      }
      /* leaf */
      .cbox-leaf {
        border-color: #34d399;
      }
      .cbox-leaf .cbox-header {
        color: #065f46;
        background: #ecfdf5;
      }
      .info-box {
        padding: 10px 14px;
        color: #1e40af;
        font-size: 12px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useRef, useLayoutEffect } from "preact/hooks";
      import {
        createComponentResolver,
        useNextResolver,
      } from "../resolver.jsx";

      const useRenderFlash = () => {
        const ref = useRef(null);
        useLayoutEffect(() => {
          const el = ref.current;
          if (!el) {
            return;
          }
          el.classList.remove("render-flash");
          // eslint-disable-next-line no-void
          void el.offsetWidth;
          el.classList.add("render-flash");
        });
        return ref;
      };

      const useRenderCount = () => {
        const ref = useRef(0);
        ref.current += 1;
        return ref.current;
      };

      const Counter = ({ color, onIncrement, count }) => (
        <span style={`font-size:11px;color:${color}`}>
          state: {count}
          <button
            style="margin-left:5px;padding:1px 6px;cursor:pointer;font-size:10px"
            onClick={onIncrement}
          >
            +1
          </button>
        </span>
      );

      // ── Resolver A — augments with icon and wrapper ──────────────────────────
      const WrapperResolverA = (props) => {
        const Next = useNextResolver();
        const [count, setCount] = useState(0);
        const renderCount = useRenderCount();
        const flashRef = useRenderFlash();
        if (props.children === undefined) {
          return <Next {...props} />;
        }
        return (
          <div
            class="cbox cbox-a-wrapper"
            ref={flashRef}
            style="--flash-color:#818cf8aa"
          >
            <div class="cbox-header">
              A: WrapperResolver
              <Counter
                color="#4338ca"
                count={count}
                onIncrement={() => setCount((n) => n + 1)}
              />
              <span class="render-count">render #{renderCount}</span>
            </div>
            <div class="cbox-body">
              <Next {...props} data-wrapped />
            </div>
          </div>
        );
      };

      const IconResolverA = (props) => {
        const Next = useNextResolver();
        const [count, setCount] = useState(0);
        const renderCount = useRenderCount();
        const flashRef = useRenderFlash();
        if (!props.icon) {
          return <Next {...props} />;
        }
        const { icon, ...rest } = props;
        return (
          <div
            class="cbox cbox-a-icon"
            ref={flashRef}
            style="--flash-color:#fb923caa"
          >
            <div class="cbox-header">
              A: IconResolver — {icon}
              <Counter
                color="#c2410c"
                count={count}
                onIncrement={() => setCount((n) => n + 1)}
              />
              <span class="render-count">render #{renderCount}</span>
            </div>
            <div
              class="cbox-body"
              style="display:flex;align-items:center;gap:8px"
            >
              <span style="font-size:20px">{icon}</span>
              <Next {...rest} />
            </div>
          </div>
        );
      };

      // ── Leaf component (target for both resolvers) ───────────────────────────
      const Leaf = (props) => {
        const next = useNextResolver();
        const [count, setCount] = useState(0);
        const renderCount = useRenderCount();
        const flashRef = useRenderFlash();
        return (
          <div
            class="cbox cbox-leaf"
            ref={flashRef}
            style="--flash-color:#34d399aa"
          >
            <div class="cbox-header">
              Leaf {props.label ? `— ${props.label}` : ""}
              <Counter
                color="#065f46"
                count={count}
                onIncrement={() => setCount((n) => n + 1)}
              />
              <span class="render-count">render #{renderCount}</span>
            </div>
            <div class="cbox-body" style="font-size:12px;color:#555">
              <div>
                useNextResolver() ={" "}
                <strong>{next === null ? "null ✓" : "NOT null ✗"}</strong>
              </div>
              {props["data-wrapped"] ? (
                <div style="color:#6d28d9">data-wrapped prop received ✓</div>
              ) : null}
            </div>
          </div>
        );
      };

      const A = createComponentResolver([
        WrapperResolverA,
        IconResolverA,
        Leaf,
      ]);

      // ── Resolver B — augments with badge and tooltip ─────────────────────────
      // B's resolvers are completely unaware of A's resolver chain.
      const BadgeResolverB = (props) => {
        const Next = useNextResolver();
        const [count, setCount] = useState(0);
        const renderCount = useRenderCount();
        const flashRef = useRenderFlash();
        if (!props.badge) {
          return <Next {...props} />;
        }
        const { badge, ...rest } = props;
        return (
          <div
            class="cbox cbox-b-badge"
            ref={flashRef}
            style="--flash-color:#2dd4bfaa"
          >
            <div class="cbox-header">
              B: BadgeResolver — badge: {badge}
              <Counter
                color="#0f766e"
                count={count}
                onIncrement={() => setCount((n) => n + 1)}
              />
              <span class="render-count">render #{renderCount}</span>
            </div>
            <div class="cbox-body">
              <Next {...rest} />
            </div>
          </div>
        );
      };

      const TooltipResolverB = (props) => {
        const Next = useNextResolver();
        const [count, setCount] = useState(0);
        const renderCount = useRenderCount();
        const flashRef = useRenderFlash();
        if (!props.tooltip) {
          return <Next {...props} />;
        }
        const { tooltip, ...rest } = props;
        return (
          <div
            class="cbox cbox-b-tooltip"
            ref={flashRef}
            style="--flash-color:#a78bfaaa"
          >
            <div class="cbox-header">
              B: TooltipResolver — "{tooltip}"
              <Counter
                color="#6d28d9"
                count={count}
                onIncrement={() => setCount((n) => n + 1)}
              />
              <span class="render-count">render #{renderCount}</span>
            </div>
            <div class="cbox-body">
              <Next {...rest} />
            </div>
          </div>
        );
      };

      const B = createComponentResolver([
        BadgeResolverB,
        TooltipResolverB,
        Leaf,
      ]);

      // ── A resolver that contains a B render ──────────────────────────────────
      // Tests that when A's resolver renders <B> inside its render,
      // B's resolvers get B's Next (not A's) — no cross-contamination.
      const ContainerResolverA = (props) => {
        const Next = useNextResolver();
        const [count, setCount] = useState(0);
        const renderCount = useRenderCount();
        const flashRef = useRenderFlash();
        if (!props.innerBadge && !props.innerTooltip) {
          return <Next {...props} />;
        }
        const { innerBadge, innerTooltip, ...rest } = props;
        return (
          <div
            class="cbox cbox-a-wrapper"
            ref={flashRef}
            style="--flash-color:#818cf8aa"
          >
            <div class="cbox-header">
              A: ContainerResolver
              <Counter
                color="#4338ca"
                count={count}
                onIncrement={() => setCount((n) => n + 1)}
              />
              <span class="render-count">render #{renderCount}</span>
            </div>
            <div class="cbox-body">
              <div style="margin-bottom:8px;font-size:11px;color:#6c7086">
                outer A continues:
              </div>
              <Next {...rest} />
              <div style="margin:8px 0 4px;font-size:11px;color:#6c7086">
                inner B (independent):
              </div>
              <B
                label="inner-B target"
                badge={innerBadge}
                tooltip={innerTooltip}
              />
            </div>
          </div>
        );
      };

      const AWithContainer = createComponentResolver([
        ContainerResolverA,
        IconResolverA,
        Leaf,
      ]);

      // ── Case 5: A nested inside itself via a custom wrapper ─────────────────
      // CustomA renders an outer <A> and passes two inner <A> as children.
      // This tests that renderComponent resets ResolverIndexContext to 0 so
      // the inner <A> instances don't inherit the stale index from the outer chain.
      const CustomA = () => {
        return (
          <A label="outer (CustomA wrapper)">
            <A label="inner-child-1" icon="🌿" />
            <A label="inner-child-2" badge="new" />
          </A>
        );
      };

      const CaseSection = ({ title, code, children }) => (
        <div class="case-section">
          <div class="case-header">
            <span class="case-title">{title}</span>
            {code ? <span class="case-code">{code}</span> : null}
          </div>
          <div class="case-render">{children}</div>
        </div>
      );

      const App = () => {
        // Case 3: toggle between A wrapping B, or A with icon only
        const [case3Mode, setCase3Mode] = useState("nested");
        // Case 4: root can toggle ContainerResolver's inner badge
        const [showBadge, setShowBadge] = useState(true);
        return (
          <div>
            <h1>Component Resolver — Nested Demo</h1>
            <p class="description">
              Verifies nested resolvers are fully isolated. Each resolver has
              its own state (+1) and flashes on re-render. Root state changes
              demonstrate that the chain re-evaluates correctly.
            </p>

            <CaseSection
              title="Case 1 — Resolver A only"
              code="<A label='hello' icon='🌟' />"
            >
              <A label="hello" icon="🌟" />
            </CaseSection>

            <CaseSection
              title="Case 2 — Resolver B only"
              code="<B label='world' badge='3' tooltip='hi' />"
            >
              <B label="world" badge="3" tooltip="hi" />
            </CaseSection>

            <CaseSection
              title={`Case 3 — root toggles branch (${case3Mode === "nested" ? "A wraps B" : "A with icon"})`}
            >
              <div style="margin-bottom:10px">
                <button
                  style="padding:4px 12px;cursor:pointer;font-size:12px"
                  onClick={() =>
                    setCase3Mode((m) => (m === "nested" ? "icon" : "nested"))
                  }
                >
                  Switch to{" "}
                  {case3Mode === "nested" ? "A icon branch" : "A wrapping B"}
                </button>
              </div>
              {case3Mode === "nested" ? (
                <A label="outer-A">
                  <B label="inner-B" badge="!" />
                </A>
              ) : (
                <A label="icon mode" icon="🔄" />
              )}
            </CaseSection>

            <CaseSection
              title={`Case 4 — A resolver containing B render (inner badge: ${showBadge ? "on" : "off"})`}
            >
              <div style="margin-bottom:10px">
                <button
                  style="padding:4px 12px;cursor:pointer;font-size:12px"
                  onClick={() => setShowBadge((b) => !b)}
                >
                  Toggle inner B badge
                </button>
              </div>
              <AWithContainer
                label="outer-A"
                icon="🔥"
                innerBadge={showBadge ? "99" : undefined}
                innerTooltip="from B"
              />
            </CaseSection>

            <CaseSection
              title="Case 5 — A nested inside itself via a custom wrapper (ResolverIndexContext reset)"
              code="<CustomA> must render inner <A> children correctly"
            >
              <p style="font-size:12px;color:#555;margin:0 0 8px">
                CustomA renders an outer {"<A>"} and passes inner {"<A>"} as
                children. Without the ResolverIndexContext reset in
                renderComponent, the inner {"<A>"} would see a stale index and
                render null.
              </p>
              <CustomA />
            </CaseSection>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
