<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slot Demo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Box,
        Button,
        Caption,
        createSlot,
        Link,
        Paragraph,
        SidePanel,
        Text,
        Title,
      } from "@jsenv/navi";

      const [ToolbarSlot, ToolbarSlotFill] = createSlot();
      const [PanelSlot, PanelSlotFill] = createSlot();
      const [LeftSlot, LeftSlotFill] = createSlot();
      const [RightSlot, RightSlotFill] = createSlot();

      // Each SlotRenderer here is a SidePanel preset to its own side —
      // any button anywhere can open content into either one, without
      // knowing about the other or about whatever else might already be
      // open there.
      // defaultOpen, not open: each SlotFill below only ever mounts a fresh
      // instance of this renderer (conditional rendering, see TwoPanelsDemo),
      // so "just mounted" already means "should show up open" — no need to
      // separately track and re-derive an open/closed boolean over that
      // instance's lifetime, and no onClose here either: closing is the
      // *consumer's* concern (see TwoPanelsDemo's own onClose props) — this
      // renderer only cares that it starts open when it exists at all.
      const LeftSidePanel = (props) => (
        <SidePanel
          layer="local"
          side="left"
          defaultOpen
          width={220}
          animation
          {...props}
        />
      );
      const [LeftPanelSlot, LeftPanelSlotFill] = createSlot(LeftSidePanel);
      const RightSidePanel = (props) => (
        <SidePanel
          layer="local"
          side="right"
          defaultOpen
          width={220}
          animation
          {...props}
        />
      );
      const [RightPanelSlot, RightPanelSlotFill] = createSlot(RightSidePanel);

      const TONE_COLORS = {
        info: { background: "#d0ebff", color: "#1864ab" },
        success: { background: "#d3f9d8", color: "#2b8a3e" },
        error: { background: "#ffe3e3", color: "#c92a2a" },
      };
      const StatusBadge = ({ label, tone = "info" }) => (
        <Text
          style={{
            display: "inline-block",
            padding: "4px 10px",
            borderRadius: "999px",
            fontSize: "0.85em",
            fontWeight: 600,
            ...TONE_COLORS[tone],
          }}
        >
          {label}
        </Text>
      );
      const [StatusSlot, StatusSlotFill] = createSlot(StatusBadge);

      const DeepChild = () => (
        <ToolbarSlotFill flex gap="8px" alignY="center">
          <Button variant="discrete">Save</Button>
          <Button variant="discrete">Share</Button>
        </ToolbarSlotFill>
      );
      const PageContent = () => (
        <Box padding="m" flex="y" gap="8px">
          <Text>Page content…</Text>
          <DeepChild />
        </Box>
      );
      const ToolbarDemo = () => (
        <Box border="1px solid #dee2e6" borderRadius="m">
          <Box
            as="header"
            padding="s"
            background="#f1f3f5"
            borderBottom="1px solid #dee2e6"
          >
            <ToolbarSlot />
          </Box>
          <PageContent />
        </Box>
      );

      const PanelDemo = () => {
        const [variant, setVariant] = useState("red");
        return (
          <Box flex="y" gap="8px">
            <Box flex gap="8px">
              <Button action={() => setVariant("red")}>Red</Button>
              <Button action={() => setVariant("green")}>Green</Button>
              <Button action={() => setVariant("blue")}>Blue</Button>
              <Button action={() => setVariant(null)}>Clear</Button>
            </Box>
            <Box
              border="1px dashed #adb5bd"
              padding="s"
              style={{ minHeight: "48px" }}
            >
              <PanelSlot />
            </Box>
            {variant === "red" && (
              <PanelSlotFill padding="m" background="#ffe3e3" borderRadius="m">
                Red panel.
              </PanelSlotFill>
            )}
            {variant === "green" && (
              <PanelSlotFill padding="m" background="#d3f9d8" borderRadius="m">
                Green panel.
              </PanelSlotFill>
            )}
            {variant === "blue" && (
              <PanelSlotFill padding="m" background="#d0ebff" borderRadius="m">
                Blue panel.
              </PanelSlotFill>
            )}
          </Box>
        );
      };

      const MultiSlotDemo = () => (
        <Box flex gap="12px">
          <Box flex="y" gap="4px" expand>
            <Caption>Left slot</Caption>
            <Box
              border="1px dashed #adb5bd"
              padding="s"
              style={{ minHeight: "40px" }}
            >
              <LeftSlot />
            </Box>
          </Box>
          <Box flex="y" gap="4px" expand>
            <Caption>Right slot</Caption>
            <Box
              border="1px dashed #adb5bd"
              padding="s"
              style={{ minHeight: "40px" }}
            >
              <RightSlot />
            </Box>
          </Box>
          <LeftSlotFill>Left content.</LeftSlotFill>
          <RightSlotFill background="#fff3bf" padding="s">
            Right content.
          </RightSlotFill>
        </Box>
      );

      const StatusDemo = () => {
        const [status, setStatus] = useState("idle");
        return (
          <Box flex="y" gap="8px">
            <Box flex gap="8px">
              <Button action={() => setStatus("idle")}>Idle</Button>
              <Button action={() => setStatus("saving")}>Saving</Button>
              <Button action={() => setStatus("saved")}>Saved</Button>
              <Button action={() => setStatus("error")}>Error</Button>
            </Box>
            <Box flex alignY="center" gap="8px">
              <Caption>Status:</Caption>
              <StatusSlot />
            </Box>
            {status === "idle" && <StatusSlotFill label="Idle" tone="info" />}
            {status === "saving" && (
              <StatusSlotFill label="Saving…" tone="info" />
            )}
            {status === "saved" && (
              <StatusSlotFill label="Saved ✓" tone="success" />
            )}
            {status === "error" && (
              <StatusSlotFill label="Error ✕" tone="error" />
            )}
          </Box>
        );
      };

      const PanelContent = ({ item }) => (
        <>
          <SidePanel.Head
            flex
            spacing="m"
            paddingX="m"
            paddingY="s"
            alignY="center"
          >
            <Box expand>
              <strong>{item.title}</strong>
            </Box>
            <Button command="--navi-close" variant="discrete" marginRight="-s">
              ×
            </Button>
          </SidePanel.Head>
          <Box padding="m">{item.body}</Box>
        </>
      );

      // Left panel: driven by "current nav item" state, the way a route
      // would — only one item is ever active, "home" has no panel content
      // at all. onClose doesn't unmount anything itself; it just resets the
      // nav state back to "home", which then stops rendering
      // LeftPanelSlotFill — that's what actually closes the panel.
      const NAV_ITEMS = [
        { key: "home", label: "Home", content: null },
        { key: "a", label: "A", content: { title: "A", body: "Section A." } },
        { key: "b", label: "B", content: { title: "B", body: "Section B." } },
      ];

      // Right panel: driven by "whichever item was last clicked in the main
      // content" — a one-off, no natural default to fall back to. onClose
      // clears it back to null instead.
      const WIDGETS = [
        { key: "cpu", title: "CPU", body: "42% usage." },
        { key: "memory", title: "Memory", body: "3.1 GB used." },
        { key: "disk", title: "Disk", body: "128 GB free." },
      ];

      const TwoPanelsDemo = () => {
        const [navKey, setNavKey] = useState("home");
        const [widgetKey, setWidgetKey] = useState(null);
        const activeNav = NAV_ITEMS.find((item) => item.key === navKey);
        const activeWidget = WIDGETS.find((item) => item.key === widgetKey);

        return (
          // The page itself: englobes the nav, the main content, and both
          // side panels — flush edges, no border-radius, unlike the other
          // demo boxes on this page.
          <Box
            border="1px solid #dee2e6"
            relative
            style={{ height: "260px", overflow: "hidden" }}
          >
            <Box flex style={{ height: "100%" }}>
              <Box
                as="nav"
                flex="y"
                gap="4px"
                padding="s"
                borderRight="1px solid #dee2e6"
                style={{ width: "110px" }}
              >
                {NAV_ITEMS.map((item) => (
                  <Button
                    key={item.key}
                    variant={navKey === item.key ? undefined : "discrete"}
                    action={() => setNavKey(item.key)}
                  >
                    {item.label}
                  </Button>
                ))}
              </Box>

              {/* Both panels dock within this sub-container, not the page
                  itself — so a sliding panel never covers the nav. */}
              <Box relative expand style={{ overflow: "hidden" }}>
                <Box as="main" padding="m" flex="y" gap="4px">
                  {WIDGETS.map((widget) => (
                    <Button
                      key={widget.key}
                      variant="discrete"
                      action={() => setWidgetKey(widget.key)}
                    >
                      {widget.title}
                    </Button>
                  ))}
                </Box>

                <LeftPanelSlot />
                <RightPanelSlot />

                {activeNav.content && (
                  <LeftPanelSlotFill onClose={() => setNavKey("home")}>
                    <PanelContent item={activeNav.content} />
                  </LeftPanelSlotFill>
                )}
                {activeWidget && (
                  <RightPanelSlotFill onClose={() => setWidgetKey(null)}>
                    <PanelContent item={activeWidget} />
                  </RightPanelSlotFill>
                )}
              </Box>
            </Box>
          </Box>
        );
      };

      const TableOfContents = () => (
        <Box as="nav" marginBottom="xl">
          <Box flex="y" spacing="xs">
            <Link href="#no-prop-drilling">1. No prop drilling</Link>
            <Link href="#passing-props">2. Passing props to the slot</Link>
            <Link href="#multiple-slots">3. Multiple independent slots</Link>
            <Link href="#custom-renderer">4. Custom SlotRenderer</Link>
            <Link href="#two-side-panels">5. Two side-panel slots</Link>
          </Box>
        </Box>
      );

      const Demo = () => (
        <div
          style={{
            padding: "20px",
            fontFamily: "system-ui, sans-serif",
            maxWidth: "760px",
            lineHeight: "1.6",
          }}
        >
          <Title as="h1">Slot Demo</Title>
          <Paragraph>
            <code>createSlot()</code> returns a <code>[Slot, SlotFill]</code>{" "}
            pair: render <code>&lt;Slot /&gt;</code> where content should
            appear, <code>&lt;SlotFill&gt;</code> anywhere else to supply it.
          </Paragraph>

          <TableOfContents />

          <Box as="section" marginTop="xl">
            <Title as="h2">
              <Link anchor href="#no-prop-drilling" />
              1. No prop drilling
            </Title>
            <Paragraph>
              The toolbar below is filled by a component 3 levels deep, with
              nothing passed down to connect the two.
            </Paragraph>
            <ToolbarDemo />
          </Box>

          <Box as="section" marginTop="xl">
            <Title as="h2">
              <Link anchor href="#passing-props" />
              2. Passing props to the slot
            </Title>
            <Paragraph>
              Props given to <code>SlotFill</code> are passed to the slot's
              content. Here it's used to pass a custom background color.
            </Paragraph>
            <PanelDemo />
          </Box>

          <Box as="section" marginTop="xl">
            <Title as="h2">
              <Link anchor href="#multiple-slots" />
              3. Multiple independent slots
            </Title>
            <Paragraph>
              Each <code>createSlot()</code> call is independent.
            </Paragraph>
            <MultiSlotDemo />
          </Box>

          <Box as="section" marginTop="xl">
            <Title as="h2">
              <Link anchor href="#custom-renderer" />
              4. Custom SlotRenderer
            </Title>
            <Paragraph>
              <code>createSlot(StatusBadge)</code> renders{" "}
              <code>StatusBadge</code> instead of the default <code>Box</code>.
            </Paragraph>
            <StatusDemo />
          </Box>

          <Box as="section" marginTop="xl">
            <Title as="h2">
              <Link anchor href="#two-side-panels" />
              5. Two side-panel slots
            </Title>
            <Paragraph>
              Each slot's <code>SlotRenderer</code> is a <code>SidePanel</code>
              preset to its own side. Left is driven by a nav-item state (
              <code>onClose</code> resets it to "Home"); right by a clicked-item
              state (<code>onClose</code> clears it) — either way,{" "}
              <code>onClose</code> only ever updates state, never touches the
              slot directly.
            </Paragraph>
            <TwoPanelsDemo />
          </Box>
        </div>
      );

      render(<Demo />, document.querySelector("#root"));
    </script>
  </body>
</html>
