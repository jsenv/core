<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dialog scroll test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui;
        cursor: pointer;
      }
      .scroll-content {
        display: grid;
        width: max-content;
        padding: 8px;
        grid-template-columns: repeat(10, 200px);
        grid-template-rows: repeat(10, 200px);
        gap: 8px;
      }
      .cell {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #444;
        font-size: 13px;
        background: hsl(calc(var(--i) * 36), 60%, 85%);
        border-radius: 8px;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <dialog id="d" onclick="">
      <p>Clique en dehors pour fermer</p>
    </dialog>
    <div class="scroll-content" id="grid"></div>
    <script>
      const grid = document.getElementById("grid");
      for (let i = 0; i < 100; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.style.setProperty("--i", i);
        cell.textContent = `${i + 1}`;
        grid.appendChild(cell);
      }

      const dialog = document.getElementById("d");
      dialog.onclick = (e) => {
        e.stopPropagation();
        if (e.target === dialog) {
          dialog.close();
        }
      };

      document.body.onclick = async () => {
        const scrollContainer = document.body;
        // showModal() triggers an internal focus() which causes the browser to
        // scrollIntoView the dialog. Temporarily locking overflow on <html>
        // prevents the scroll from happening at all.
        const prevOverflow = scrollContainer.style.overflow;
        document.documentElement.style.overflow = "hidden";
        scrollContainer.style.overflow = "hidden";
        dialog.showModal();
        requestAnimationFrame(() => {
          document.documentElement.style.overflow = "auto";
          scrollContainer.style.overflow = prevOverflow;
        });
      };
    </script>
  </body>
</html>
