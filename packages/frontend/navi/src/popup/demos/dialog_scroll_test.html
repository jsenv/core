<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dialog scroll test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        padding: 8px;
        font-family: system-ui;
        cursor: pointer;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 200px);
        gap: 8px;
      }
      .cell {
        display: flex;
        height: 120px;
        align-items: center;
        justify-content: center;
        color: #444;
        font-size: 13px;
        background: hsl(calc(var(--i) * 20), 60%, 85%);
        border-radius: 8px;
      }
      dialog {
        position: fixed;
        inset: 0;
        margin: auto;
        padding: 32px 40px;
        font-size: 16px;
        text-align: center;
        background: white;
        border: 2px solid #333;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <dialog id="d">
      <p>Clique en dehors pour fermer</p>
    </dialog>
    <div class="grid" id="grid"></div>
    <script>
      const grid = document.getElementById("grid");
      for (let i = 0; i < 40; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.style.setProperty("--i", i);
        cell.textContent = `${i + 1}`;
        grid.appendChild(cell);
      }

      const dialog = document.getElementById("d");
      dialog.onclick = (e) => {
        e.stopPropagation();
        if (e.target === dialog) {
          dialog.close();
        }
      };

      document.body.onclick = () => {
        dialog.showModal();
      };
    </script>
  </body>
</html>
