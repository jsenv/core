<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dialog scroll test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui;
        cursor: pointer;
      }
      .scroll-content {
        display: grid;
        width: max-content;
        padding: 8px;
        grid-template-columns: repeat(10, 200px);
        grid-template-rows: repeat(10, 200px);
        gap: 8px;
      }
      .cell {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #444;
        font-size: 13px;
        background: hsl(calc(var(--i) * 36), 60%, 85%);
        border-radius: 8px;
      }
      dialog {
        position: fixed;
        inset: 0;
        margin: auto;
        padding: 32px 40px;
        font-size: 16px;
        text-align: center;
        background: white;
        border: 2px solid #333;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body onclick="document.getElementById('d').showModal()">
    <div class="scroll-content" id="grid"></div>

    <dialog
      id="d"
      onclick="
        event.stopPropagation();
        if (event.target === this) this.close();
      "
    >
      <p>Clique en dehors pour fermer</p>
    </dialog>
    <script>
      const grid = document.getElementById("grid");
      for (let i = 0; i < 100; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.style.setProperty("--i", i);
        cell.textContent = `${i + 1}`;
        grid.appendChild(cell);
      }
    </script>
  </body>
</html>
