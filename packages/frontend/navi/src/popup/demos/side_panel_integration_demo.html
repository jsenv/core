<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SidePanel Integration Demo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .demo-controls {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .demo-controls button {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useMemo, useState } from "preact/hooks";
      import {
        BadgeCount,
        Box,
        Text,
        Button,
        List,
        ListItem,
        SidePanel,
      } from "@jsenv/navi";

      // A small, deterministic pool of adjective/noun combos reads far closer
      // to a real inventory than "Item 1"/"Item 2" — enough variety (12 * 26
      // = 312 combos) to avoid obvious repetition even at the 500-item
      // dataset size, without pulling in random word lists.
      const ADJECTIVES = [
        "Wireless",
        "Ergonomic",
        "Compact",
        "Premium",
        "Portable",
        "Adjustable",
        "Heavy-Duty",
        "Slim",
        "Rechargeable",
        "Foldable",
        "Industrial",
        "Standard",
      ];
      const NOUNS = [
        "Mouse",
        "Keyboard",
        "Monitor Stand",
        "Desk Lamp",
        "Office Chair",
        "Headset",
        "Webcam",
        "USB-C Hub",
        "Power Strip",
        "Speaker",
        "Cable Organizer",
        "Whiteboard",
        "Notebook",
        "Pen Set",
        "Stapler",
        "Filing Cabinet",
        "Backpack",
        "Water Bottle",
        "Coffee Mug",
        "Desk Organizer",
        "Monitor Arm",
        "Laptop Stand",
        "External SSD",
        "Printer",
        "Paper Shredder",
        "Conference Phone",
      ];
      const createItems = (count) =>
        Array.from({ length: count }, (_, i) => ({
          id: `item-${i}`,
          label: `${ADJECTIVES[i % ADJECTIVES.length]} ${NOUNS[Math.floor(i / ADJECTIVES.length) % NOUNS.length]}`,
          in: Math.floor(Math.random() * 20),
          out: Math.floor(Math.random() * 20),
        }));

      // Same 3-column row shape shared by the column-header row, every data
      // row, and the totals row — the Name cell grows to fill whatever space
      // isn't taken by the two numeric columns. Column widths only stay
      // aligned across all three because they're all real flex rows of the
      // same List (same width as each other), not because anything
      // explicitly synchronizes them.
      //
      // List rows are virtualized (position: absolute — see list.jsx), so
      // they aren't normal-flow siblings of each other: a real CSS grid
      // spanning all rows (the usual way to get "auto-size to the widest
      // cell in this column" for free) isn't an option here, the same way
      // an HTML <table> wouldn't be either. Instead each numeric column's
      // width is derived from its own worst case — the Total row's value,
      // always >= any single item's value — in `ch` units (paired with
      // tabular-nums below so digits actually render at a consistent
      // width), computed once per dataset in App and passed down as a prop.
      const NameCell = (props) => (
        <Text expandX shrinkX maxLines={1} {...props} />
      );
      const NumberCell = ({ width, ...props }) => (
        <Text
          as="span"
          shrinkX={false}
          width={width}
          textAlign="right"
          style={{ fontVariantNumeric: "tabular-nums" }}
          {...props}
        />
      );

      // `header`/`footer` on ListItem render as `position: sticky` rows
      // inside the List itself (bypassing virtualization entirely — they're
      // not part of the tracked/virtual item set) rather than living in
      // SidePanel.Head/Foot: that's what keeps their own Name/In/Out cells
      // real flex-row siblings of the data rows, so column widths track
      // each other for free. A plain title has no columns to align, so it
      // stays in SidePanel.Head instead, outside the List entirely.
      const App = () => {
        const panelId = useId();
        // Small dataset (below the panel's own content, no overflow at all)
        // vs. large (well beyond it, forcing virtual scroll) — toggled from
        // outside the panel specifically to see where the sticky Total row
        // ends up either way: pinned to the bottom of the *panel* when the
        // list has no overflow of its own, vs. pinned to the bottom of the
        // *list's own scroll* once it does.
        const [itemCount, setItemCount] = useState(500);
        const items = useMemo(() => createItems(itemCount), [itemCount]);
        const totalIn = items.reduce((sum, item) => sum + item.in, 0);
        const totalOut = items.reduce((sum, item) => sum + item.out, 0);
        // +1 for the leading "+"/"−" sign — the Total row is always the
        // widest value in its column (a sum of many items), so sizing off
        // it alone is enough to guarantee no other row ever overflows it.
        const inColumnWidth = `${String(totalIn).length + 1}ch`;
        const outColumnWidth = `${String(totalOut).length + 1}ch`;

        return (
          <>
            <div class="demo-controls">
              <Button command="--navi-toggle" commandFor={panelId}>
                Toggle panel
              </Button>
              <button onClick={() => setItemCount(5)}>5 items</button>
              <button onClick={() => setItemCount(500)}>500 items</button>
            </div>
            <SidePanel id={panelId} animation defaultOpen width={380} flex="y">
              <SidePanel.Head flex spacing="m" paddingX="m" paddingY="m">
                <Box flex alignY="center" gap="8px" expand>
                  <Text>
                    <strong style={{ fontSize: "1.05em" }}>Inventory</strong>
                    <BadgeCount max="none">{itemCount}</BadgeCount>
                  </Text>
                </Box>
                <Button
                  className="navi_side_panel_head_close_button"
                  aria-label="Close panel"
                  command="--navi-close"
                  variant="discrete"
                  autoFocus="fallback"
                  marginRight="-s"
                >
                  ×
                </Button>
              </SidePanel.Head>
              <List expandY border="none">
                <ListItem
                  header
                  paddingX="m"
                  paddingY="s"
                  bold
                  color="#495057"
                  uppercase
                  size="s"
                  background="#f1f3f5"
                  borderBottom="1px solid #dee2e6"
                  letterSpacing="0.03em"
                  flex
                  alignY="center"
                  spacing="s"
                >
                  <NameCell>Name</NameCell>
                  <NumberCell
                    width={inColumnWidth}
                    color="#2b8a3e"
                    borderLeft="1px solid #e9ecef"
                    paddingLeft="8px"
                  >
                    In
                  </NumberCell>
                  <NumberCell width={outColumnWidth} color="#c92a2a">
                    Out
                  </NumberCell>
                </ListItem>
                {items.map((item, i) => (
                  <ListItem
                    key={item.id}
                    index={i}
                    id={item.id}
                    value={item.label}
                    paddingX="m"
                    paddingY="s"
                    flex
                    alignY="center"
                    spacing="s"
                    background={i % 2 === 0 ? "#ffffff" : "#f8f9fa"}
                  >
                    <NameCell>{item.label}</NameCell>
                    <NumberCell
                      width={inColumnWidth}
                      color="#2b8a3e"
                      borderLeft="1px solid #e9ecef"
                      paddingLeft="8px"
                    >
                      +{item.in}
                    </NumberCell>
                    <NumberCell width={outColumnWidth} color="#c92a2a">
                      −{item.out}
                    </NumberCell>
                  </ListItem>
                ))}
                <ListItem
                  footer
                  paddingX="m"
                  paddingY="s"
                  flex
                  alignY="center"
                  spacing="s"
                  bold
                  background="#f1f3f5"
                  borderTop="2px solid #dee2e6"
                >
                  <NameCell>Total</NameCell>
                  <NumberCell
                    width={inColumnWidth}
                    color="#2b8a3e"
                    borderLeft="1px solid #e9ecef"
                    paddingLeft="8px"
                  >
                    +{totalIn}
                  </NumberCell>
                  <NumberCell width={outColumnWidth} color="#c92a2a">
                    −{totalOut}
                  </NumberCell>
                </ListItem>
              </List>
            </SidePanel>
          </>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
