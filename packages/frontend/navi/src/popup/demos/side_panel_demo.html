<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SidePanel Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-section {
        margin-bottom: 24px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
      }
      .demo-container {
        position: relative;
        width: 500px;
        height: 320px;
        background: #f5f5f5;
        border: 2px dashed #999;
        border-radius: 12px;
        /* auto rather than hidden: a side panel that isn't actually
           clamped by its own max-width/max-height would otherwise make
           this container scroll, which is exactly what these demos are
           checking for. */
        overflow: auto;
      }
      .demo-toc {
        margin-bottom: 24px;
        padding: 12px 16px;
        background: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .demo-toc ul {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      .demo-row {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useEffect, useId, useState } from "preact/hooks";
      import { Button, SidePanel } from "@jsenv/navi";

      // Same pattern as dialog_demo.html/popover_demo.html: persisted so the
      // choice survives a page reload while testing.
      const useStoredBoolean = (key, defaultValue) => {
        const [value, setValue] = useState(() => {
          const stored = localStorage.getItem(key);
          return stored === null ? defaultValue : stored === "true";
        });
        useEffect(() => {
          localStorage.setItem(key, String(value));
        }, [key, value]);
        return [value, setValue];
      };

      // Deliberately tiny — used for the very first demo, to show off a
      // panel sized to its own content without a "reasonable width" being a
      // coincidence of a bigger, more talkative content block.
      const MinimalPanelContent = () => (
        <div style={{ padding: "24px" }}>
          <p>A few words of content.</p>
          <Button command="--navi-close">Close</Button>
        </div>
      );

      const PanelContent = () => {
        const [innerCount, setInnerCount] = useState(0);

        return (
          <div style={{ padding: "24px" }}>
            <h2 style={{ marginTop: 0 }}>Side Panel</h2>
            <p>
              This content is inside the side panel. Press <kbd>Escape</kbd> or
              click the button below to close.
            </p>
            <p style={{ color: "#6c757d", fontSize: "0.9em" }}>
              The panel auto-focuses on open so keyboard navigation works
              immediately.
            </p>
            <div>
              <span>Panel content counter: {innerCount}</span>
              <button
                onClick={() => setInnerCount((c) => c + 1)}
                style={{ marginLeft: "8px" }}
              >
                Increment panel counter
              </button>
            </div>
            <Button command="--navi-close" marginTop="m">
              Close panel
            </Button>
          </div>
        );
      };

      const TallPanelContent = () => (
        <div style={{ padding: "24px" }}>
          <h2 style={{ marginTop: 0 }}>Tall content</h2>
          <p>
            This panel contains content taller than the viewport, to check that
            the panel scrolls internally instead of overflowing.
          </p>
          <Button command="--navi-close">Close panel</Button>
          {Array.from({ length: 40 }, (_, i) => (
            <p key={i}>Line {i + 1} of tall content.</p>
          ))}
        </div>
      );

      // Purely command-driven — no isOpen/open/onClose at all, mirroring
      // Dialog/Popover's own uncontrolled id + --navi-toggle pattern. No
      // width passed either: with MinimalPanelContent's own short content,
      // the resulting content-sized width is already reasonable on its own.
      const CommandDrivenPanelDemo = ({ animation }) => {
        const panelId = useId();
        return (
          <>
            <Button command="--navi-toggle" commandFor={panelId}>
              Toggle side panel
            </Button>
            <SidePanel id={panelId} animation={animation}>
              <MinimalPanelContent />
            </SidePanel>
          </>
        );
      };

      // layer="local" docks the panel against .demo-container below instead
      // of the viewport — confined to (and clipped by) it, at 100% of its
      // own height, rather than taking over the whole screen. Also covers
      // the docked axis's own ceiling: it's still capped at 90% of the
      // container (unlike the perpendicular/fill axis, intentionally
      // uncapped — see side_panel.jsx's own CSS) — a reasonable
      // width={200} below fits well within it, an oversized width={1000}
      // gets clamped down instead of overflowing the container or making
      // it scroll (the container uses overflow: auto specifically so a
      // regression here would show up as a scrollbar).
      const LocalContainerDemo = ({ label, width, animation }) => {
        const panelId = useId();
        return (
          <div class="demo-container">
            <p style={{ margin: "12px" }}>{label}</p>
            <Button command="--navi-toggle" commandFor={panelId}>
              Toggle panel (width={width})
            </Button>
            <SidePanel
              id={panelId}
              layer="local"
              width={width}
              closeOnClickOutside
              animation={animation}
            >
              <PanelContent />
            </SidePanel>
          </div>
        );
      };

      // Enough content to force scrolling, so SidePanel.Head/Foot staying
      // put (sticky) while this scrolls underneath is actually observable.
      const HeadFootContent = () => (
        <>
          <SidePanel.Head style={{ padding: "12px 16px" }}>
            <Button
              className="navi_side_panel_head_close_button"
              aria-label="Close panel"
              command="--navi-close"
              variant="discrete"
            >
              ×
            </Button>
            <strong>
              Sticky head with a bit of extra text so the close button's float
              actually has something to wrap around.
            </strong>
          </SidePanel.Head>
          <div style={{ padding: "16px" }}>
            {Array.from({ length: 30 }, (_, i) => (
              <p key={i}>Scrollable line {i + 1}.</p>
            ))}
          </div>
          <SidePanel.Foot>
            <Button command="--navi-close">Close</Button>
          </SidePanel.Foot>
        </>
      );

      // Same HeadFootContent, but docked inside .demo-container (layer="local")
      // instead of the viewport, command-driven like LocalContainerDemo above.
      const HeadFootLocalDemo = ({ animation }) => {
        const panelId = useId();
        return (
          <div class="demo-container">
            <p style={{ margin: "12px" }}>
              This box is the panel's own positioned ancestor.
            </p>
            <Button command="--navi-toggle" commandFor={panelId}>
              Toggle panel
            </Button>
            <SidePanel
              id={panelId}
              layer="local"
              width={220}
              closeOnClickOutside
              animation={animation}
            >
              <HeadFootContent />
            </SidePanel>
          </div>
        );
      };

      // Mounted lazily (only once "Render" is clicked) so defaultOpen's
      // no-entrance-animation guarantee is actually observable — mounting
      // it unconditionally at page load would show it already-open before
      // there's anything to compare against.
      const LazyMount = ({ label, renderContent }) => {
        const [mounted, setMounted] = useState(false);
        return mounted ? (
          renderContent()
        ) : (
          <Button onClick={() => setMounted(true)}>{label}</Button>
        );
      };

      const App = () => {
        const [parentCount, setParentCount] = useState(0);
        const [isOpenWide, setIsOpenWide] = useState(false);
        const [isOpenNarrow, setIsOpenNarrow] = useState(false);
        const [isOpenClickOutside, setIsOpenClickOutside] = useState(false);
        const [isOpenTall, setIsOpenTall] = useState(false);
        const [isOpen, setIsOpen] = useState(false);
        const [isOpenLeft, setIsOpenLeft] = useState(false);
        const [isOpenTop, setIsOpenTop] = useState(false);
        const [isOpenBottom, setIsOpenBottom] = useState(false);
        const [isOpenHeadFoot, setIsOpenHeadFoot] = useState(false);
        const [animationEnabled, setAnimationEnabled] = useStoredBoolean(
          "side_panel_demo_animation",
          false,
        );

        return (
          <div>
            <h1>SidePanel demos</h1>

            <nav class="demo-toc">
              <strong>Contents</strong>
              <ul>
                <li>
                  <a href="#command-driven">Opened via command</a>
                </li>
                <li>
                  <a href="#click-outside">Close on click outside</a>
                </li>
                <li>
                  <a href="#width">Explicit width</a>
                </li>
                <li>
                  <a href="#tall-content">Tall content (internal scroll)</a>
                </li>
                <li>
                  <a href="#open-prop">open / defaultOpen</a>
                </li>
                <li>
                  <a href="#local-layer">layer="local"</a>
                </li>
                <li>
                  <a href="#side">side (left/top/bottom/right)</a>
                </li>
                <li>
                  <a href="#head-foot">SidePanel.Head / SidePanel.Foot</a>
                </li>
              </ul>
            </nav>

            <div class="demo-section">
              <label>
                <input
                  type="checkbox"
                  checked={animationEnabled}
                  onChange={(e) => setAnimationEnabled(e.target.checked)}
                />
                Enable animations (applies to every panel below)
              </label>
            </div>

            <div class="demo-section">
              <span>Parent render counter: {parentCount}</span>
              <button
                onClick={() => setParentCount((c) => c + 1)}
                style={{ marginLeft: "8px" }}
              >
                Re-render parent
              </button>
            </div>

            <div id="command-driven" class="demo-section">
              <h3>Opened via command (--navi-toggle), no isOpen/open at all</h3>
              <p>
                A button commanding <code>--navi-toggle</code> opens/closes the
                panel — same declarative, id-driven pattern as
                `Dialog`/`Popover` themselves, no controlled state needed. No
                <code>width</code> passed either: with this little content, the
                resulting content-sized width is already reasonable on its own.
              </p>
              <CommandDrivenPanelDemo animation={animationEnabled} />
            </div>

            <div id="click-outside" class="demo-section">
              <h3>Close on click outside</h3>
              <p>
                <code>closeOnClickOutside</code> closes the panel on an outside
                click instead of just absorbing it. Every demo below this point
                enables it too.
              </p>
              <button onClick={() => setIsOpenClickOutside(true)}>
                Open panel (click outside to close)
              </button>
              <SidePanel
                open={isOpenClickOutside}
                onClose={() => setIsOpenClickOutside(false)}
                closeOnClickOutside
                width={300}
                animation={animationEnabled}
              >
                <PanelContent />
              </SidePanel>
            </div>

            <div id="width" class="demo-section">
              <h3>Explicit width</h3>
              <p>
                <code>width</code> can force the panel larger than its content
                (below: <code>width=400</code>) — but in practice it's more
                often used the other way around, to *constrain* the panel's
                content to fit a given space (below: <code>width=180</code>,
                narrower than this content's own natural width, wrapping it
                instead).
              </p>
              <div class="demo-row">
                <div>
                  <button onClick={() => setIsOpenWide(true)}>
                    Open wide panel (width=400)
                  </button>
                  <SidePanel
                    open={isOpenWide}
                    onClose={() => setIsOpenWide(false)}
                    closeOnClickOutside
                    width={400}
                    animation={animationEnabled}
                  >
                    <PanelContent />
                  </SidePanel>
                </div>
                <div>
                  <button onClick={() => setIsOpenNarrow(true)}>
                    Open narrow panel (width=180)
                  </button>
                  <SidePanel
                    open={isOpenNarrow}
                    onClose={() => setIsOpenNarrow(false)}
                    closeOnClickOutside
                    width={180}
                    animation={animationEnabled}
                  >
                    <PanelContent />
                  </SidePanel>
                </div>
              </div>
            </div>

            <div id="tall-content" class="demo-section">
              <h3>Tall content (internal scroll)</h3>
              <button onClick={() => setIsOpenTall(true)}>
                Open panel with tall content
              </button>
              <SidePanel
                open={isOpenTall}
                onClose={() => setIsOpenTall(false)}
                closeOnClickOutside
                width={300}
                animation={animationEnabled}
              >
                <TallPanelContent />
              </SidePanel>
            </div>

            <div id="open-prop" class="demo-section">
              <h3>open / defaultOpen</h3>
              <p>
                <code>open</code> (controlled, below) lets a parent own the open
                state directly. <code>defaultOpen</code> (uncontrolled,
                mount-only) instead opens the panel the moment it's first
                rendered — click "Render" to actually mount it (rather than
                forcing it open on every page load): it appears already open,
                with no entrance animation even when animations are enabled
                above, since nothing was ever shown as "closed" for the user to
                see it transition away from.
              </p>
              <div class="demo-row">
                <div>
                  <button onClick={() => setIsOpen(true)}>
                    Open panel (open prop)
                  </button>
                  <SidePanel
                    open={isOpen}
                    onClose={() => setIsOpen(false)}
                    closeOnClickOutside
                    width={300}
                    animation={animationEnabled}
                  >
                    <PanelContent />
                  </SidePanel>
                </div>
                <LazyMount
                  label="Render (defaultOpen)"
                  renderContent={() => (
                    <SidePanel
                      defaultOpen
                      closeOnClickOutside
                      width={300}
                      animation={animationEnabled}
                    >
                      <PanelContent />
                    </SidePanel>
                  )}
                />
              </div>
            </div>

            <div id="local-layer" class="demo-section">
              <h3>layer="local"</h3>
              <p>
                Docked against a real DOM ancestor (the dashed box below)
                instead of the viewport — confined to (and clipped by) it, 100%
                of *its* height rather than the screen's. The docked axis still
                has a real ceiling though: 90% of the container. A reasonable{" "}
                <code>width=200</code> fits well within it; an oversized{" "}
                <code>width=1000</code> gets clamped down instead of overflowing
                the container or making it scroll (the container uses{" "}
                <code>overflow: auto</code> specifically so a regression here
                would show up as a scrollbar).
              </p>
              <div class="demo-row">
                <LocalContainerDemo
                  label="width=200"
                  width={200}
                  animation={animationEnabled}
                />
                <LocalContainerDemo
                  label="width=1000, clamped to 90% of the container"
                  width={1000}
                  animation={animationEnabled}
                />
              </div>
            </div>

            <div id="side" class="demo-section">
              <h3>side (left/top/bottom/right)</h3>
              <p>
                Each <code>side</code> value docks flush against a different
                edge — <code>side</code> isn't expected to change at runtime for
                a given panel, so these are separate panels below, not one panel
                switching sides.
              </p>
              <div class="demo-row">
                <div>
                  <button onClick={() => setIsOpenLeft(true)}>
                    Open left panel
                  </button>
                  <SidePanel
                    open={isOpenLeft}
                    onClose={() => setIsOpenLeft(false)}
                    side="left"
                    closeOnClickOutside
                    width={300}
                    animation={animationEnabled}
                  >
                    <PanelContent />
                  </SidePanel>
                </div>
                <div>
                  <button onClick={() => setIsOpenTop(true)}>
                    Open top panel
                  </button>
                  <SidePanel
                    open={isOpenTop}
                    onClose={() => setIsOpenTop(false)}
                    side="top"
                    closeOnClickOutside
                    height={220}
                    animation={animationEnabled}
                  >
                    <PanelContent />
                  </SidePanel>
                </div>
                <div>
                  <button onClick={() => setIsOpenBottom(true)}>
                    Open bottom panel
                  </button>
                  <SidePanel
                    open={isOpenBottom}
                    onClose={() => setIsOpenBottom(false)}
                    side="bottom"
                    closeOnClickOutside
                    height={220}
                    animation={animationEnabled}
                  >
                    <PanelContent />
                  </SidePanel>
                </div>
              </div>
            </div>

            <div id="head-foot" class="demo-section">
              <h3>SidePanel.Head / SidePanel.Foot</h3>
              <p>
                Both are sticky within the panel's own scrollable area — only
                the content between them scrolls. Enough lines below to force
                scrolling in both a viewport panel and a container-docked one.
              </p>
              <div class="demo-row">
                <div>
                  <button onClick={() => setIsOpenHeadFoot(true)}>
                    Open panel (in viewport)
                  </button>
                  <SidePanel
                    open={isOpenHeadFoot}
                    onClose={() => setIsOpenHeadFoot(false)}
                    closeOnClickOutside
                    width={280}
                    animation={animationEnabled}
                  >
                    <HeadFootContent />
                  </SidePanel>
                </div>
                <HeadFootLocalDemo animation={animationEnabled} />
              </div>
            </div>
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
