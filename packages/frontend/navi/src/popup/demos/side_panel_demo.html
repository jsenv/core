<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SidePanel Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-section {
        margin-bottom: 24px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
      }
      .demo-container {
        position: relative;
        width: 500px;
        height: 320px;
        background: #f5f5f5;
        border: 2px dashed #999;
        border-radius: 12px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useState } from "preact/hooks";
      import { Button, SidePanel } from "@jsenv/navi";

      const PanelContent = () => {
        const [innerCount, setInnerCount] = useState(0);

        return (
          <div style={{ padding: "24px" }}>
            <h2 style={{ marginTop: 0 }}>Side Panel</h2>
            <p>
              This content is inside the side panel. Press <kbd>Escape</kbd> or
              click the button below to close.
            </p>
            <p style={{ color: "#6c757d", fontSize: "0.9em" }}>
              The panel auto-focuses on open so keyboard navigation works
              immediately.
            </p>
            <div>
              <span>Panel content counter: {innerCount}</span>
              <button
                onClick={() => setInnerCount((c) => c + 1)}
                style={{ marginLeft: "8px" }}
              >
                Increment panel counter
              </button>
            </div>
            <Button command="--navi-close" marginTop="m">
              Close panel
            </Button>
          </div>
        );
      };

      const TallPanelContent = () => (
        <div style={{ padding: "24px" }}>
          <h2 style={{ marginTop: 0 }}>Tall content</h2>
          <p>
            This panel contains content taller than the viewport, to check that
            the panel scrolls internally instead of overflowing.
          </p>
          <Button command="--navi-close">Close panel</Button>
          {Array.from({ length: 40 }, (_, i) => (
            <p key={i}>Line {i + 1} of tall content.</p>
          ))}
        </div>
      );

      // Purely command-driven — no isOpen/open/onClose at all, mirroring
      // Dialog/Popover's own uncontrolled id + --navi-toggle pattern.
      const CommandDrivenPanelDemo = () => {
        const panelId = useId();
        return (
          <>
            <Button command="--navi-toggle" commandFor={panelId}>
              Toggle side panel
            </Button>
            <SidePanel id={panelId}>
              <PanelContent />
            </SidePanel>
          </>
        );
      };

      // layer="local" docks the panel against .demo-container below instead
      // of the viewport — confined to (and clipped by) it, at 100% of its
      // own height, rather than taking over the whole screen.
      const LocalContainerPanelDemo = () => {
        const panelId = useId();
        return (
          <div class="demo-container">
            <p style={{ margin: "12px" }}>
              This box is the panel's own positioned ancestor.
            </p>
            <Button command="--navi-toggle" commandFor={panelId}>
              Toggle local panel
            </Button>
            <SidePanel id={panelId} layer="local">
              <PanelContent />
            </SidePanel>
          </div>
        );
      };

      const App = () => {
        const [parentCount, setParentCount] = useState(0);
        const [isOpen, setIsOpen] = useState(false);
        const [isOpenWide, setIsOpenWide] = useState(false);
        const [isOpenClickOutside, setIsOpenClickOutside] = useState(false);
        const [isOpenTall, setIsOpenTall] = useState(false);
        const [isOpenLeft, setIsOpenLeft] = useState(false);
        const [isOpenTop, setIsOpenTop] = useState(false);

        return (
          <div>
            <h1>SidePanel demos</h1>

            <div class="demo-section">
              <span>Parent render counter: {parentCount}</span>
              <button
                onClick={() => setParentCount((c) => c + 1)}
                style={{ marginLeft: "8px" }}
              >
                Re-render parent
              </button>
            </div>

            <div class="demo-section">
              <h3>
                Default (dynamic width — sized to content, close on Escape only)
              </h3>
              <p>
                No <code>size</code> passed: the panel's docked-axis width just
                follows its own content, same as `Dialog`/`Popover` would (still
                capped by the popup's own max-width).
              </p>
              <button onClick={() => setIsOpen(true)}>Open side panel</button>
              <SidePanel isOpen={isOpen} onClose={() => setIsOpen(false)}>
                <PanelContent />
              </SidePanel>
            </div>

            <div class="demo-section">
              <h3>
                Forced width (size=400) and a min-size floor (minSize=250)
              </h3>
              <button onClick={() => setIsOpenWide(true)}>
                Open wide panel
              </button>
              <SidePanel
                isOpen={isOpenWide}
                onClose={() => setIsOpenWide(false)}
                size={400}
                minSize={250}
              >
                <PanelContent />
              </SidePanel>
            </div>

            <div class="demo-section">
              <h3>Opened via command (--navi-toggle), no isOpen/open at all</h3>
              <p>
                A button commanding <code>--navi-toggle</code> opens/closes the
                panel — same declarative, id-driven pattern as
                `Dialog`/`Popover` themselves, no controlled state needed.
              </p>
              <CommandDrivenPanelDemo />
            </div>

            <div class="demo-section">
              <h3>Close on click outside</h3>
              <button onClick={() => setIsOpenClickOutside(true)}>
                Open panel (click outside to close)
              </button>
              <SidePanel
                isOpen={isOpenClickOutside}
                onClose={() => setIsOpenClickOutside(false)}
                closeOnClickOutside
              >
                <PanelContent />
              </SidePanel>
            </div>

            <div class="demo-section">
              <h3>Tall content (internal scroll)</h3>
              <button onClick={() => setIsOpenTall(true)}>
                Open panel with tall content
              </button>
              <SidePanel
                isOpen={isOpenTall}
                onClose={() => setIsOpenTall(false)}
              >
                <TallPanelContent />
              </SidePanel>
            </div>

            <div class="demo-section">
              <h3>side="left", animated (slide-from-left)</h3>
              <button onClick={() => setIsOpenLeft(true)}>
                Open panel from the left
              </button>
              <SidePanel
                isOpen={isOpenLeft}
                onClose={() => setIsOpenLeft(false)}
                side="left"
                animation
              >
                <PanelContent />
              </SidePanel>
            </div>

            <div class="demo-section">
              <h3>side="top", animated (slide-from-top)</h3>
              <button onClick={() => setIsOpenTop(true)}>
                Open panel from the top
              </button>
              <SidePanel
                isOpen={isOpenTop}
                onClose={() => setIsOpenTop(false)}
                side="top"
                size={220}
                animation
              >
                <PanelContent />
              </SidePanel>
            </div>

            <div class="demo-section">
              <h3>layer="local" — docked inside a custom container</h3>
              <p>
                Same panel, but confined to (and clipped by) the dashed box
                below instead of the viewport — 100% of *its* height, not the
                screen's.
              </p>
              <LocalContainerPanelDemo />
            </div>
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
