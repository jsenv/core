<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dialog animation demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-section {
        margin-bottom: 32px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo_dialog_box {
        width: 280px;
        padding: 20px 24px;
        background: white;
        border: none;
        border-radius: 10px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId } from "preact/hooks";
      import { Button, Dialog } from "@jsenv/navi";

      // No openController here: without one, Dialog creates its own and
      // self-wires to --navi-toggle/--navi-close commands.
      const TriggeredDialog = ({ label, animation, fadeAnimation }) => {
        const dialogId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={dialogId}>
              {label}
            </Button>
            <Dialog
              id={dialogId}
              animation={animation}
              fadeAnimation={fadeAnimation}
              className="demo_dialog_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Dialog>
          </>
        );
      };

      const App = () => {
        return (
          <div>
            <h1>Dialog animation demo</h1>

            <div class="demo-section">
              <h3>none (default)</h3>
              <div class="demo-row">
                <TriggeredDialog label="no animation" />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                fadeAnimation — controls opacity fading independently of
                animation; defaults to true
              </h3>
              <div class="demo-row">
                <TriggeredDialog label="fade only (default)" />
                <TriggeredDialog
                  label="fadeAnimation={false} (pops instantly)"
                  fadeAnimation={false}
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>clip (grows from the dialog's own center)</h3>
              <div class="demo-row">
                <TriggeredDialog label="clip" animation="clip" />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                slide — explicit direction (dialogs are centered, so "auto"
                direction from an anchor doesn't apply — only explicit
                directions are supported)
              </h3>
              <div class="demo-row">
                <TriggeredDialog
                  label="slide-from-top"
                  animation="slide-from-top"
                />
                <TriggeredDialog
                  label="slide-from-bottom"
                  animation="slide-from-bottom"
                />
                <TriggeredDialog
                  label="slide-from-left"
                  animation="slide-from-left"
                />
                <TriggeredDialog
                  label="slide-from-right"
                  animation="slide-from-right"
                />
              </div>
            </div>
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
