<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dialog demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-toc {
        margin-bottom: 32px;
        padding: 12px 16px;
        background: #f6f6f6;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-toc ol {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      .demo-toc li {
        margin-bottom: 4px;
      }
      .demo-section {
        margin-bottom: 32px;
        scroll-margin-top: 16px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo-lazy-mount {
        /* Fixed footprint, kept identical whether showing the placeholder
           or the actually-rendered content — swapping between them (on
           "Render") must not shift the rest of the page's own layout. */
        display: flex;
        width: 220px;
        height: 90px;
        align-items: center;
        justify-content: center;
      }
      .demo-lazy-placeholder {
        display: flex;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        padding: 8px 12px;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 8px;
        color: #777;
        font-size: 12px;
        background: #f0f0f0;
        border: 1px dashed #bbb;
        border-radius: 8px;
      }
      .demo-animate-controls {
        display: flex;
        margin-top: 8px;
        gap: 12px;
      }
      .demo-animate-toggle {
        display: block;
        font-size: 13px;
      }
      .demo_dialog_box {
        width: 280px;
        padding: 20px 24px;
        background: white;
        border: none;
        border-radius: 10px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      }
      .demo_dialog_flex_box {
        /* No fixed size, unlike .demo_dialog_box above — sizes to its
           content, so this section can show how Dialog copes with small
           vs. large content instead of hiding it behind a fixed box. */
        max-width: 320px;
        padding: 20px 24px;
        background: white;
        border: none;
        border-radius: 10px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      }
      .demo-container {
        position: relative;
        display: flex;
        width: 100%;
        max-width: 100%;
        height: 240px;
        margin-bottom: 8px;
        align-items: center;
        justify-content: center;
        border: 1px dotted #999;
        border-radius: 8px;
        overflow: hidden;
      }
      .demo-container-label {
        color: #999;
        font-size: 12px;
      }
      .demo-important-note {
        margin: 8px 0;
        padding: 8px 12px;
        color: #7a5b00;
        font-size: 13px;
        background: #fff8e1;
        border: 1px solid #f0dca0;
        border-radius: 6px;
      }
      .demo-content-wide-block {
        width: 460px;
        max-width: none;
        height: 22px;
        margin: 4px 0;
        background: #eef3fb;
        border: 1px solid #cfe0f5;
      }
      .demo-content-tall-block {
        /* flex-shrink: 0 (+ matching min-height) so a flex/column ancestor
           can't shrink these back down — the whole point is to force the
           dialog taller, not to be squeezed to fit. Tall enough on its own
           (8 of them) to overflow most viewports and exercise the same
           overflow handling as the dedicated "exceeds viewport" example. */
        height: 120px;
        min-height: 120px;
        margin: 4px 0;
        flex-shrink: 0;
        background: #eef3fb;
        border: 1px solid #cfe0f5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useState, useEffect } from "preact/hooks";
      import { Button, Dialog } from "@jsenv/navi";

      // Backs each section's own "Slow" checkbox/"Animation" select —
      // independent per section, so slowing/changing one doesn't affect the
      // others while you're testing (same pattern as popover_demo.html).
      const useStoredBoolean = (key, defaultValue) => {
        const [value, setValue] = useState(() => {
          const stored = localStorage.getItem(key);
          return stored === null ? defaultValue : stored === "true";
        });
        useEffect(() => {
          localStorage.setItem(key, String(value));
        }, [key, value]);
        return [value, setValue];
      };
      const useStoredString = (key, defaultValue) => {
        const [value, setValue] = useState(
          () => localStorage.getItem(key) ?? defaultValue,
        );
        useEffect(() => {
          localStorage.setItem(key, value);
        }, [key, value]);
        return [value, setValue];
      };

      // "none" maps to no `animation` prop at all. "sliding" isn't offered
      // here — a dialog is always centered, with no anchor to auto-resolve a
      // direction from, so sliding only makes sense as an explicit
      // slide-from-* value (see its own dedicated section below).
      const ANIMATION_CHOICES = ["none", "auto", "fading", "scaling"];

      const useAnimateControls = (storageKey) => {
        const [animationChoice, setAnimationChoice] = useStoredString(
          `${storageKey}_animation`,
          "none",
        );
        const [slow, setSlow] = useStoredBoolean(`${storageKey}_slow`, true);
        const animation =
          animationChoice === "none" ? undefined : animationChoice;
        const animationDuration = animation && slow ? "0.6s" : undefined;
        return {
          animation,
          animationDuration,
          controlsProps: { animationChoice, setAnimationChoice, slow, setSlow },
        };
      };

      const AnimateControls = ({
        animationChoice,
        setAnimationChoice,
        slow,
        setSlow,
      }) => (
        <div class="demo-animate-controls">
          <label class="demo-animate-toggle">
            Animation:{" "}
            <select
              value={animationChoice}
              onChange={(e) => setAnimationChoice(e.target.value)}
            >
              {ANIMATION_CHOICES.map((choice) => (
                <option key={choice} value={choice}>
                  {choice}
                </option>
              ))}
            </select>
          </label>
          <label class="demo-animate-toggle">
            <input
              type="checkbox"
              checked={slow}
              onChange={(e) => setSlow(e.target.checked)}
            />
            Slow
          </label>
        </div>
      );

      // Just the "Slow" half of the controls above, for sections where the
      // animation kind itself is fixed per button (sliding's own explicit
      // directions) rather than picked from a dropdown.
      const useSlowToggle = (storageKey) => {
        const [slow, setSlow] = useStoredBoolean(`${storageKey}_slow`, true);
        return {
          animationDuration: slow ? "0.6s" : undefined,
          toggle: (
            <label class="demo-animate-toggle">
              <input
                type="checkbox"
                checked={slow}
                onChange={(e) => setSlow(e.target.checked)}
              />
              Slow
            </label>
          ),
        };
      };

      // No openController here: without one, Dialog creates its own and
      // self-wires to --navi-toggle/--navi-close commands.
      const TriggeredDialog = ({
        label,
        animation,
        animationDuration,
        pointerInteractionOutsideEffect,
      }) => {
        const dialogId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={dialogId}>
              {label}
            </Button>
            <Dialog
              id={dialogId}
              animation={animation}
              animationDuration={animationDuration}
              pointerInteractionOutsideEffect={pointerInteractionOutsideEffect}
              className="demo_dialog_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Dialog>
          </>
        );
      };

      const AnimationSection = () => {
        const { animation, animationDuration, controlsProps } =
          useAnimateControls("dialog_demo_animation");
        return (
          <section id="animation" class="demo-section">
            <h2>3. Animation</h2>
            <p>
              <code>animation</code> or <code>animation="auto"</code> resolves
              to <code>"scaling"</code> — a dialog has no anchor to grow out of
              or slide from, so scaling (from its own center) is the auto
              default, same conclusion as Popover's own dead-center case.
            </p>
            <div class="demo-row">
              <TriggeredDialog
                label="animated"
                animation={animation}
                animationDuration={animationDuration}
              />
            </div>
            <AnimateControls {...controlsProps} />
          </section>
        );
      };

      const SlidingSection = () => {
        const { animationDuration, toggle } = useSlowToggle(
          "dialog_demo_sliding",
        );
        return (
          <section id="sliding" class="demo-section">
            <h2>4. sliding</h2>
            <p>
              Explicit direction only — a dialog is always centered, with no
              anchor to auto-resolve a direction from.
            </p>
            <div class="demo-row">
              <TriggeredDialog
                label="slide-from-top"
                animation="slide-from-top"
                animationDuration={animationDuration}
              />
              <TriggeredDialog
                label="slide-from-bottom"
                animation="slide-from-bottom"
                animationDuration={animationDuration}
              />
              <TriggeredDialog
                label="slide-from-left"
                animation="slide-from-left"
                animationDuration={animationDuration}
              />
              <TriggeredDialog
                label="slide-from-right"
                animation="slide-from-right"
                animationDuration={animationDuration}
              />
            </div>
            {toggle}
          </section>
        );
      };

      const PointerInteractionOutsideSection = () => {
        const { animation, animationDuration, controlsProps } =
          useAnimateControls("dialog_demo_pointer_interaction_outside");
        return (
          <section id="pointer-interaction-outside" class="demo-section">
            <h2>5. pointerInteractionOutsideEffect</h2>
            <p>
              <code>"close"</code> (default) closes on an outside click.{" "}
              <code>"capture"</code>/<code>"none"</code> both just absorb it —
              <code>showModal()</code> already makes the rest of the page inert,
              so there's nothing for the click to reach either way (see
              dialog.jsx's own top comment).
            </p>
            <div class="demo-row">
              <TriggeredDialog
                label="close (default)"
                animation={animation}
                animationDuration={animationDuration}
                pointerInteractionOutsideEffect="close"
              />
              <TriggeredDialog
                label="capture"
                animation={animation}
                animationDuration={animationDuration}
                pointerInteractionOutsideEffect="capture"
              />
            </div>
            <AnimateControls {...controlsProps} />
          </section>
        );
      };

      // layer="local" — a real <dialog>, but shown via .show() instead of
      // showModal(), so it stays in normal document flow: position: absolute
      // relative to its own positioned ancestor (here, .demo-container),
      // genuinely clipped by that ancestor's own overflow: hidden — same
      // idea as Popover's own "Custom container" section. Focus trap and
      // Escape-to-close are both reimplemented in JS for this renderer (see
      // dialog.jsx's own top comment) — try Tab/Shift+Tab and Escape to
      // confirm both still work despite there being no real showModal().
      const LocalDialog = ({ label }) => {
        const dialogId = useId();
        return (
          <>
            <Button command="--navi-toggle" commandFor={dialogId}>
              {label}
            </Button>
            <Dialog
              id={dialogId}
              layer="local"
              animation
              animationDuration="0.6s"
              className="demo_dialog_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <input placeholder="focusable input" />
              <div>
                <Button command="--navi-close">Close</Button>
              </div>
            </Dialog>
          </>
        );
      };

      const CustomContainerSection = () => (
        <section id="custom-container" class="demo-section">
          <h2>6. Custom container (layer="local")</h2>
          <p>
            Confined to the container below instead of the whole viewport —
            genuinely clipped by its <code>overflow: hidden</code>. Trades away
            one thing a real <code>showModal()</code> dialog gets for free:
            there is no way to reimplement the hardware/gesture back button
            closing it (e.g. Android's system back gesture) — a known, accepted
            limitation of <code>layer="local"</code>, not a bug.
          </p>
          <div class="demo-container">
            <span class="demo-container-label">container</span>
            <LocalDialog label="Open local dialog" />
          </div>
        </section>
      );

      // Mounting a component with its dialog already open is only
      // interesting to test *on demand* — rendered directly in the page's
      // own initial render, every reload would pop it open immediately
      // (even more disruptive for a Dialog than a Popover). This
      // placeholder defers rendering `renderContent()` until clicked.
      const LazyMount = ({ label, renderContent }) => {
        const [mounted, setMounted] = useState(false);
        return (
          <div class="demo-lazy-mount">
            {mounted ? (
              renderContent()
            ) : (
              <div class="demo-lazy-placeholder">
                <span>{label}</span>
                <Button onClick={() => setMounted(true)}>Render</Button>
              </div>
            )}
          </div>
        );
      };

      // Mounts already open, with animation on — the entrance animation
      // should NOT play (same idea as popover_demo.html's own "Open from
      // the start" section — see its comment there for why).
      const OpenFromStartDialog = ({ label, ...props }) => {
        const dialogId = useId();
        return (
          <>
            <Button command="--navi-toggle" commandFor={dialogId}>
              {label}
            </Button>
            <Dialog
              id={dialogId}
              animation
              animationDuration="0.6s"
              className="demo_dialog_box"
              {...props}
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Dialog>
          </>
        );
      };

      const OpenFromStartSection = () => (
        <section id="open-from-start" class="demo-section">
          <h2>7. Open from the start</h2>
          <p>
            <code>open={"{true}"}</code> (controlled) or{" "}
            <code>defaultOpen</code> (uncontrolled, mount-only) mount the dialog
            already open — animation is on for both below, but it should never
            actually play on mount, only on a later close/reopen. Click "Render"
            below to actually mount each one (rather than forcing it open on
            every page load).
          </p>
          <div class="demo-row">
            <LazyMount
              label={"open={true}"}
              renderContent={() => (
                <OpenFromStartDialog label={"open={true}"} open />
              )}
            />
            <LazyMount
              label="defaultOpen"
              renderContent={() => (
                <OpenFromStartDialog label="defaultOpen" defaultOpen />
              )}
            />
          </div>
        </section>
      );

      // Basic --navi-toggle-driven open/close, no anchor concept at all
      // (unlike Popover — Dialog is never positioned relative to whatever
      // triggered it).
      const ControlledByButtonSection = () => {
        const { animation, animationDuration, controlsProps } =
          useAnimateControls("dialog_demo_controlled_by_button");
        return (
          <section id="controlled-by-button" class="demo-section">
            <h2>1. Controlled by button</h2>
            <p>
              A button commanding <code>--navi-toggle</code> opens/closes the
              dialog.
            </p>
            <div class="demo-row">
              <TriggeredDialog
                label="Button commanding dialog"
                animation={animation}
                animationDuration={animationDuration}
              />
            </div>
            <AnimateControls {...controlsProps} />
          </section>
        );
      };

      // No fixed size on the dialog itself (see .demo_dialog_flex_box) —
      // each button below opens the same dialog with a different amount of
      // content, small to large enough to exceed the viewport, to see how
      // Dialog's default (always-centered) sizing copes.
      const ContentSizeDialog = ({
        label,
        content,
        animation,
        animationDuration,
      }) => {
        const dialogId = useId();
        return (
          <>
            <Button command="--navi-toggle" commandFor={dialogId}>
              {label}
            </Button>
            <Dialog
              id={dialogId}
              scrollCapture
              animation={animation}
              animationDuration={animationDuration}
              className="demo_dialog_flex_box"
            >
              <p style={{ marginTop: 0, fontWeight: "bold" }}>{label}</p>
              {content}
              <Button command="--navi-close">Close</Button>
            </Dialog>
          </>
        );
      };

      // Same idea, but the content grows/shrinks *while already open* (via
      // local state, not a different dialog instance) — shows whether the
      // dialog reacts to its own size changing after it's already shown.
      const ExpandCollapseDialog = ({
        label,
        animation,
        animationDuration,
      }) => {
        const dialogId = useId();
        const [expanded, setExpanded] = useState(false);
        return (
          <>
            <Button command="--navi-toggle" commandFor={dialogId}>
              {label}
            </Button>
            <Dialog
              id={dialogId}
              scrollCapture
              animation={animation}
              animationDuration={animationDuration}
              className="demo_dialog_flex_box"
            >
              <p style={{ marginTop: 0 }}>Content grows/shrinks below.</p>
              <Button onClick={() => setExpanded((v) => !v)}>
                {expanded ? "Collapse" : "Expand"}
              </Button>
              {expanded &&
                Array.from({ length: 10 }).map((_, i) => (
                  <div key={i} class="demo-content-tall-block" />
                ))}
              <Button command="--navi-close">Close</Button>
            </Dialog>
          </>
        );
      };

      const ContentSizeSection = () => {
        const { animation, animationDuration, controlsProps } =
          useAnimateControls("dialog_demo_content_size");
        return (
          <section id="content-size" class="demo-section">
            <h2>2. Content dimensions</h2>
            <p>
              Dialog has no fixed size of its own either — always centered, it
              sizes to whatever's inside it, from a short line of text to
              content that exceeds the viewport.
            </p>
            <div class="demo-row">
              <ContentSizeDialog
                label="small"
                content={<p style={{ margin: 0 }}>Just a short line.</p>}
                animation={animation}
                animationDuration={animationDuration}
              />
              <ContentSizeDialog
                label="tall"
                content={Array.from({ length: 8 }).map((_, i) => (
                  <div key={i} class="demo-content-tall-block" />
                ))}
                animation={animation}
                animationDuration={animationDuration}
              />
              <ContentSizeDialog
                label="wide"
                content={<div class="demo-content-wide-block" />}
                animation={animation}
                animationDuration={animationDuration}
              />
              <ContentSizeDialog
                label="tall + wide"
                content={
                  <>
                    <div class="demo-content-wide-block" />
                    {Array.from({ length: 8 }).map((_, i) => (
                      <div key={i} class="demo-content-tall-block" />
                    ))}
                  </>
                }
                animation={animation}
                animationDuration={animationDuration}
              />
              <ContentSizeDialog
                label="exceeds viewport"
                content={
                  <>
                    <div
                      class="demo-content-wide-block"
                      style={{ width: "1400px" }}
                    />
                    {Array.from({ length: 20 }).map((_, i) => (
                      <div key={i} class="demo-content-tall-block" />
                    ))}
                  </>
                }
                animation={animation}
                animationDuration={animationDuration}
              />
            </div>

            <h3>Expanding/collapsing content while open</h3>
            <div class="demo-row">
              <ExpandCollapseDialog
                label="expand/collapse"
                animation={animation}
                animationDuration={animationDuration}
              />
            </div>
            <AnimateControls {...controlsProps} />
          </section>
        );
      };

      const TableOfContents = () => (
        <nav class="demo-toc">
          <strong>Contents</strong>
          <ol>
            <li>
              <a href="#controlled-by-button">Controlled by button</a>
            </li>
            <li>
              <a href="#content-size">Content dimensions</a>
            </li>
            <li>
              <a href="#animation">Animation</a>
            </li>
            <li>
              <a href="#sliding">sliding</a>
            </li>
            <li>
              <a href="#pointer-interaction-outside">
                pointerInteractionOutsideEffect
              </a>
            </li>
            <li>
              <a href="#custom-container">Custom container (layer="local")</a>
            </li>
            <li>
              <a href="#open-from-start">Open from the start</a>
            </li>
          </ol>
        </nav>
      );

      const App = () => (
        <div>
          <h1>Dialog demo</h1>

          <TableOfContents />

          <ControlledByButtonSection />
          <ContentSizeSection />
          <AnimationSection />
          <SlidingSection />
          <PointerInteractionOutsideSection />
          <CustomContainerSection />
          <OpenFromStartSection />
        </div>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
