<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover animation demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-section {
        margin-bottom: 32px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo_popover_box {
        max-width: 220px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      /* pushes the "auto direction" anchors near the bottom of the viewport
         so the popover is forced to flip and open above them instead */
      .bottom-anchor-spacer {
        height: 70vh;
      }
      .demo-container {
        position: relative;
        width: 500px;
        max-width: 100%;
        height: 260px;
        border: 1px dashed #999;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useRef } from "preact/hooks";
      import { Button, Popover, NaviDebug } from "@jsenv/navi";

      const App = () => {
        const containerRef = useRef(null);
        return (
          <div>
            <h1>Popover animation demo</h1>

            <div class="demo-section">
              <h3>fade</h3>
              <div class="demo-row">
                <AnchoredPopover label="fade" animation="fade" />
                <AnchorlessPopover label="fade (no anchor)" animation="fade" />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                scale (grows from a point — anchor center when anchored, pointer
                position when not; slowed down here via animationDuration to
                make the growth visible)
              </h3>
              <div class="demo-row">
                <AnchoredPopover
                  label="scale (anchored)"
                  animation="scale"
                  animationDuration="0.6s"
                />
                <AnchorlessPopover
                  label="scale (no anchor — grows from the pointer)"
                  animation="scale"
                  animationDuration="0.6s"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                animation="auto" — picks slide when anchored, scale when not
              </h3>
              <div class="demo-row">
                <AnchoredPopover
                  label="auto (anchored → slide)"
                  animation="auto"
                  animationDuration="0.6s"
                />
                <AnchorlessPopover
                  label="auto (no anchor → scale)"
                  animation="auto"
                  animationDuration="0.6s"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>slide — auto direction (flips based on available space)</h3>
              <div class="demo-row">
                <AnchoredPopover
                  label="slide (opens below → slides down from top)"
                  animation="slide"
                  positionY="below"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>slide — explicit direction</h3>
              <div class="demo-row">
                <AnchoredPopover
                  label="slide-from-top"
                  animation="slide-from-top"
                />
                <AnchoredPopover
                  label="slide-from-bottom"
                  animation="slide-from-bottom"
                />
                <AnchoredPopover
                  label="slide-from-left"
                  animation="slide-from-left"
                />
                <AnchoredPopover
                  label="slide-from-right"
                  animation="slide-from-right"
                />
              </div>
            </div>

            <div class="bottom-anchor-spacer" />

            <div class="demo-section">
              <h3>
                slide — auto direction flips to "above" near the bottom edge
              </h3>
              <div class="demo-row">
                <AnchoredPopover
                  label="slide (forced near viewport bottom)"
                  animation="slide"
                  positionY="below"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                stickTo — sided to the viewport (slide only makes sense here,
                there's no anchor to slide relative to)
              </h3>
              <div class="demo-row">
                <StickToPopover
                  label="top-left"
                  animation="slide"
                  stickTo="top-left"
                  spacing={16}
                />
                <StickToPopover
                  label="top-right"
                  animation="slide"
                  stickTo="top-right"
                  spacing={16}
                />
                <StickToPopover
                  label="bottom-left"
                  animation="slide"
                  stickTo="bottom-left"
                  spacing={16}
                />
                <StickToPopover
                  label="bottom-right"
                  animation="slide"
                  stickTo="bottom-right"
                  spacing={16}
                />
                <StickToPopover
                  label="center"
                  animation="scale"
                  stickTo="center"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                stickTo — sided to a container instead of the viewport
                (stickToContainerRef, 100px spacing into the container)
              </h3>
              <div class="demo-row">
                <div class="demo-container" ref={containerRef}>
                  <StickToPopover
                    label="top-right in container"
                    animation="slide"
                    stickTo="top-right"
                    stickToContainerRef={containerRef}
                    spacing={100}
                  />
                </div>
              </div>
            </div>
          </div>
        );
      };

      // No openController here: without one, Popover creates its own (see
      // open_controller.js). It self-wires to --navi-toggle/--navi-close
      // commands, and the button that triggers --navi-toggle is forwarded
      // as the anchor automatically (the command's "source" ends up as
      // navi_request_open's detail.source).
      const AnchoredPopover = ({
        label,
        animation,
        animationDuration,
        positionX,
        positionY,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              positionX={positionX}
              positionY={positionY}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>animation="{animation}"</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // Still command-driven (--navi-toggle), but anchor="ignore" tells the
      // popover not to use the toggle button as its anchor, so it centers
      // itself in the viewport instead.
      const AnchorlessPopover = ({ label, animation, animationDuration }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              anchor="ignore"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>animation="{animation}"</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // `stickTo` pins the popover to a corner/edge of its container (the
      // viewport by default, or `stickToContainerRef` when given) instead of
      // positioning relative to an anchor. This is what makes `slide` (auto
      // direction) meaningful without an anchor: top-* sides slide down,
      // bottom-* sides slide up (see data-position-y-current wiring in
      // popover.jsx).
      const StickToPopover = ({
        label,
        animation,
        stickTo,
        stickToContainerRef,
        spacing,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              stickTo={stickTo}
              stickToContainerRef={stickToContainerRef}
              spacing={spacing}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>stickTo="{stickTo}"</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
