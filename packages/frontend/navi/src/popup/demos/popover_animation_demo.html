<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover animation demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-section {
        margin-bottom: 32px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo_popover_box {
        max-width: 220px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      /* pushes the "flips to above" anchors near the bottom of the viewport
         so the popover is forced to open above them instead */
      .bottom-anchor-spacer {
        height: 70vh;
      }
      .demo-container {
        position: relative;
        width: 500px;
        max-width: 100%;
        height: 260px;
        border: 1px dashed #999;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useRef } from "preact/hooks";
      import { Button, Popover, NaviDebug } from "@jsenv/navi";

      const App = () => {
        const containerRef = useRef(null);
        return (
          <div>
            <h1>Popover animation demo</h1>

            <div class="demo-section">
              <h3>fade</h3>
              <div class="demo-row">
                <AnchoredPopover label="fade" animation="fade" />
                <AnchorlessPopover label="fade (no anchor)" animation="fade" />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                clip, anchored to a real element: clips vertically only (out of
                the anchor's edge) via clip-path — never a scale/transform, so
                the content inside never visually shrinks or distorts, and the
                box's real layout size is never touched, only what's painted.
                Slowed down here via animationDuration to make it visible.
              </h3>
              <div class="demo-row">
                <AnchoredPopover
                  label="clip (opens below anchor)"
                  animation="clip"
                  animationDuration="0.6s"
                  positionY="below"
                />
              </div>
            </div>

            <div class="bottom-anchor-spacer" />

            <div class="demo-section">
              <h3>
                clip — flips to originate from the bottom edge when the popover
                ends up placed above the anchor (near the viewport bottom)
              </h3>
              <div class="demo-row">
                <AnchoredPopover
                  label="clip (forced near viewport bottom)"
                  animation="clip"
                  animationDuration="0.6s"
                  positionY="below"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                clip, no anchor: clips both axes around a point (the click
                position), combined with a translate from that point to the
                final resting position — the whole thing glides from the click
                to where it ends up while it grows.
              </h3>
              <div class="demo-row">
                <AnchorlessPopover
                  label="clip (no anchor — grows from + glides in from the pointer)"
                  animation="clip"
                  animationDuration="0.6s"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                animation="auto" — picks "clip" either way (vertical-only when
                anchored to a real element, both axes otherwise); "slide"
                instead when anchored to a point (see further down)
              </h3>
              <div class="demo-row">
                <AnchoredPopover
                  label="auto (anchored → clip, vertical)"
                  animation="auto"
                  animationDuration="0.6s"
                />
                <AnchorlessPopover
                  label="auto (no anchor → clip, both axes)"
                  animation="auto"
                  animationDuration="0.6s"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>slide — explicit direction, real translate-based entrance</h3>
              <div class="demo-row">
                <AnchoredPopover
                  label="slide-from-top"
                  animation="slide-from-top"
                />
                <AnchoredPopover
                  label="slide-from-bottom"
                  animation="slide-from-bottom"
                />
                <AnchoredPopover
                  label="slide-from-left"
                  animation="slide-from-left"
                />
                <AnchoredPopover
                  label="slide-from-right"
                  animation="slide-from-right"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                anchor="&lt;point&gt;" — pins to an anchor point of the viewport
                (a corner, an edge center, or "center") instead of a real
                element. This is what makes "slide" (or "auto", which resolves
                to "slide" here) meaningful without an anchor: it slides in from
                just outside its own footprint on that side.
              </h3>
              <div class="demo-row">
                <AnchorPointPopover
                  label="top-left"
                  anchor="top-left"
                  spacing={16}
                />
                <AnchorPointPopover label="top" anchor="top" spacing={16} />
                <AnchorPointPopover
                  label="top-right"
                  anchor="top-right"
                  spacing={16}
                />
                <AnchorPointPopover label="left" anchor="left" spacing={16} />
                <AnchorPointPopover label="right" anchor="right" spacing={16} />
                <AnchorPointPopover
                  label="bottom-left"
                  anchor="bottom-left"
                  spacing={16}
                />
                <AnchorPointPopover
                  label="bottom"
                  anchor="bottom"
                  spacing={16}
                />
                <AnchorPointPopover
                  label="bottom-right"
                  anchor="bottom-right"
                  spacing={16}
                />
                <AnchorPointPopover
                  label="center"
                  anchor="center"
                  animation="clip"
                />
              </div>
            </div>

            <div class="demo-section">
              <h3>
                anchor="relative-&lt;point&gt;" — same as above, but relative to
                a container instead of the viewport (stickToContainerRef, 100px
                spacing into the container)
              </h3>
              <div class="demo-row">
                <div class="demo-container" ref={containerRef}>
                  <AnchorPointPopover
                    label="relative-top-right"
                    anchor="relative-top-right"
                    stickToContainerRef={containerRef}
                    spacing={100}
                  />
                </div>
              </div>
            </div>
          </div>
        );
      };

      // No openController here: without one, Popover creates its own (see
      // open_controller.js). It self-wires to --navi-toggle/--navi-close
      // commands, and the button that triggers --navi-toggle is forwarded
      // as the anchor automatically (the command's "source" ends up as
      // navi_request_open's detail.source).
      const AnchoredPopover = ({
        label,
        animation,
        animationDuration,
        positionX,
        positionY,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              positionX={positionX}
              positionY={positionY}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>animation="{animation}"</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // Still command-driven (--navi-toggle), but anchor="ignore" tells the
      // popover not to use the toggle button as its anchor, so it centers
      // itself in the viewport instead.
      const AnchorlessPopover = ({ label, animation, animationDuration }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              anchor="ignore"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>animation="{animation}"</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // anchor="top"/"top-left"/"relative-right"/etc pins the popover to an
      // anchor point of the viewport (or of stickToContainerRef, when the
      // "relative-" prefix is used) instead of positioning relative to a
      // real element. animation defaults to "auto", which resolves to
      // "slide" whenever anchor is one of these anchor point values.
      const AnchorPointPopover = ({
        label,
        anchor,
        stickToContainerRef,
        spacing,
        animation = "auto",
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              anchor={anchor}
              stickToContainerRef={stickToContainerRef}
              spacing={spacing}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>anchor="{anchor}"</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
