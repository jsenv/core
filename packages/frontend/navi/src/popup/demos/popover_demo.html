<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-toc {
        margin-bottom: 32px;
        padding: 12px 16px;
        background: #f6f6f6;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-toc ol {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      .demo-toc li {
        margin-bottom: 4px;
      }
      .demo-section {
        margin-bottom: 32px;
        scroll-margin-top: 16px;
      }
      .demo-subsection {
        margin-top: 20px;
        margin-left: 8px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo_popover_box {
        max-width: 220px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #d0d0d0;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      /* pushes the "flips to above" anchors near the bottom of the viewport
         so the popover is forced to open above them instead */
      .bottom-anchor-spacer {
        height: 70vh;
      }
      .demo-container {
        position: relative;
        width: 500px;
        max-width: 100%;
        height: 260px;
        border: 2px dotted #999;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useRef } from "preact/hooks";
      import { Button, Popover, NaviDebug } from "@jsenv/navi";

      const App = () => {
        const containerRef = useRef(null);
        return (
          <div>
            <h1>Popover demo</h1>

            <nav class="demo-toc">
              <strong>Contents</strong>
              <ol>
                <li>
                  <a href="#anchor">Anchor</a>
                  <ol>
                    <li>
                      <a href="#anchor-animation">Animation</a>
                    </li>
                  </ol>
                </li>
                <li>
                  <a href="#anchor-placement">
                    Placement relative to the anchor
                  </a>
                  <ol>
                    <li>
                      <a href="#anchor-placement-animation">Animation</a>
                    </li>
                  </ol>
                </li>
                <li>
                  <a href="#anchor-point">Anchor as a point</a>
                  <ol>
                    <li>
                      <a href="#anchor-point-animation">Animation</a>
                    </li>
                  </ol>
                </li>
                <li>
                  <a href="#anchor-point-relative">
                    Anchor as a relative point
                  </a>
                </li>
                <li>
                  <a href="#anchor-ignore">Ignoring the anchor</a>
                  <ol>
                    <li>
                      <a href="#anchor-ignore-animation">Animation</a>
                    </li>
                  </ol>
                </li>
                <li>
                  <a href="#fading">Fading</a>
                </li>
              </ol>
            </nav>

            <section id="anchor" class="demo-section">
              <h2>1. Anchor</h2>
              <p>
                A popover opened via a <code>--navi-toggle</code> command
                anchors itself to the button that triggered it automatically —
                no anchorRef to wire up.
              </p>
              <div class="demo-row">
                <AnchoredPopover label="anchored (default)" />
              </div>

              <div id="anchor-animation" class="demo-subsection">
                <h3>Animation</h3>
                <p>
                  Turning on <code>animation</code> for an anchored popover
                  gives a "clip" out of the anchor's edge — it grows downward
                  without anything translating (fadeAnimation is off here to
                  isolate the effect).
                </p>
                <div class="demo-row">
                  <AnchoredPopover
                    label="animated"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                </div>

                <div class="bottom-anchor-spacer" />

                <p>
                  Forced near the viewport bottom — the clip flips to originate
                  from the bottom edge instead of the top:
                </p>
                <div class="demo-row">
                  <AnchoredPopover
                    label="animated, forced near viewport bottom"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                </div>
              </div>
            </section>

            <section id="anchor-placement" class="demo-section">
              <h2>2. Placement relative to the anchor</h2>
              <p>
                <code>positionY</code> (above/below the anchor) and
                <code>positionX</code> (left/right of the anchor) — both
                auto-flip to the opposite side when there isn't enough room,
                which is why this demo uses
                <code>positionYFixed</code>/<code>positionXFixed</code>
                instead: same values, but they skip the fit check, so what you
                pick is what you always get (useful here to see each value
                unambiguously; <code>positionY</code>/<code>positionX</code>
                are what you want in real usage).
              </p>
              <div class="demo-subsection">
                <h3>positionX / positionXFixed</h3>
                <div class="demo-row">
                  <AnchoredPopover
                    label="to-the-right"
                    positionXFixed="to-the-right"
                  />
                  <AnchoredPopover
                    label="left-aligned"
                    positionXFixed="left-aligned"
                  />
                  <AnchoredPopover
                    label="center (default)"
                    positionXFixed="center"
                  />
                  <AnchoredPopover
                    label="right-aligned"
                    positionXFixed="right-aligned"
                  />
                  <AnchoredPopover
                    label="to-the-left"
                    positionXFixed="to-the-left"
                  />
                </div>
              </div>
              <div class="demo-subsection">
                <h3>positionY / positionYFixed</h3>
                <div class="demo-row">
                  <AnchoredPopover label="above" positionYFixed="above" />
                  <AnchoredPopover
                    label="above-overlap"
                    positionYFixed="above-overlap"
                  />
                  <AnchoredPopover label="center" positionYFixed="center" />
                  <AnchoredPopover
                    label="below-overlap"
                    positionYFixed="below-overlap"
                  />
                  <AnchoredPopover
                    label="below (default)"
                    positionYFixed="below"
                  />
                </div>
              </div>

              <div id="anchor-placement-animation" class="demo-subsection">
                <h3>Animation</h3>
                <p>Same positions, animated:</p>
                <div class="demo-row">
                  <AnchoredPopover
                    label="to-the-right"
                    positionXFixed="to-the-right"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchoredPopover
                    label="left-aligned"
                    positionXFixed="left-aligned"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchoredPopover
                    label="center"
                    positionXFixed="center"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchoredPopover
                    label="right-aligned"
                    positionXFixed="right-aligned"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchoredPopover
                    label="to-the-left"
                    positionXFixed="to-the-left"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                </div>
                <div class="demo-row">
                  <AnchoredPopover
                    label="above"
                    positionYFixed="above"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchoredPopover
                    label="above-overlap"
                    positionYFixed="above-overlap"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchoredPopover
                    label="center"
                    positionYFixed="center"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchoredPopover
                    label="below-overlap"
                    positionYFixed="below-overlap"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchoredPopover
                    label="below"
                    positionYFixed="below"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                </div>
              </div>
            </section>

            <section id="anchor-point" class="demo-section">
              <h2>3. Anchor as a point</h2>
              <p>
                <code>anchor="&lt;point&gt;"</code> pins the popover to a point
                of the viewport (a corner, an edge center, or "center") instead
                of a real element — one of <code>top</code>,
                <code>top-right</code>, <code>right</code>,
                <code>bottom-right</code>, <code>bottom</code>,
                <code>bottom-left</code>, <code>left</code>,
                <code>top-left</code>, <code>center</code>.
              </p>
              <div class="demo-row">
                <AnchorPointPopover
                  label="top-left"
                  anchor="top-left"
                  spacing={16}
                />
                <AnchorPointPopover label="top" anchor="top" spacing={16} />
                <AnchorPointPopover
                  label="top-right"
                  anchor="top-right"
                  spacing={16}
                />
                <AnchorPointPopover label="left" anchor="left" spacing={16} />
                <AnchorPointPopover label="right" anchor="right" spacing={16} />
                <AnchorPointPopover
                  label="bottom-left"
                  anchor="bottom-left"
                  spacing={16}
                />
                <AnchorPointPopover
                  label="bottom"
                  anchor="bottom"
                  spacing={16}
                />
                <AnchorPointPopover
                  label="bottom-right"
                  anchor="bottom-right"
                  spacing={16}
                />
                <AnchorPointPopover label="center" anchor="center" />
              </div>

              <div id="anchor-point-animation" class="demo-subsection">
                <h3>Animation</h3>
                <p>
                  Same points, animated — "slide" in from just outside the
                  viewport on that side, except "center" which gets "clip"
                  instead (sliding in to land exactly centered would look odd):
                </p>
                <div class="demo-row">
                  <AnchorPointPopover
                    label="top-left"
                    anchor="top-left"
                    spacing={16}
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchorPointPopover
                    label="top"
                    anchor="top"
                    spacing={16}
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchorPointPopover
                    label="top-right"
                    anchor="top-right"
                    spacing={16}
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchorPointPopover
                    label="left"
                    anchor="left"
                    spacing={16}
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchorPointPopover
                    label="right"
                    anchor="right"
                    spacing={16}
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchorPointPopover
                    label="bottom-left"
                    anchor="bottom-left"
                    spacing={16}
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchorPointPopover
                    label="bottom"
                    anchor="bottom"
                    spacing={16}
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchorPointPopover
                    label="bottom-right"
                    anchor="bottom-right"
                    spacing={16}
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                  <AnchorPointPopover
                    label="center"
                    anchor="center"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                </div>
              </div>
            </section>

            <section id="anchor-point-relative" class="demo-section">
              <h2>4. Anchor as a relative point</h2>
              <p>
                <code>anchor="relative-&lt;point&gt;"</code> — same as above,
                but relative to a container (<code>stickToContainerRef</code>)
                instead of the viewport. The triggering buttons don't need to be
                inside the container — only the container itself matters for
                positioning. Each point has a plain trigger and an animated one
                (simpler to click through than a checkbox toggling the same
                button).
              </p>
              <div class="demo-row">
                <div class="demo-container" ref={containerRef} />
              </div>
              <div class="demo-row">
                <AnchorPointPopover
                  label="relative-top-left"
                  anchor="relative-top-left"
                  stickToContainerRef={containerRef}
                  spacing={16}
                />
                <AnchorPointPopover
                  label="relative-top-left (animated)"
                  anchor="relative-top-left"
                  stickToContainerRef={containerRef}
                  spacing={16}
                  animation
                  animationDuration="0.6s"
                  fadeAnimation={false}
                />
                <AnchorPointPopover
                  label="relative-top"
                  anchor="relative-top"
                  stickToContainerRef={containerRef}
                  spacing={16}
                />
                <AnchorPointPopover
                  label="relative-top (animated)"
                  anchor="relative-top"
                  stickToContainerRef={containerRef}
                  spacing={16}
                  animation
                  animationDuration="0.6s"
                  fadeAnimation={false}
                />
                <AnchorPointPopover
                  label="relative-top-right"
                  anchor="relative-top-right"
                  stickToContainerRef={containerRef}
                  spacing={16}
                />
                <AnchorPointPopover
                  label="relative-top-right (animated)"
                  anchor="relative-top-right"
                  stickToContainerRef={containerRef}
                  spacing={16}
                  animation
                  animationDuration="0.6s"
                  fadeAnimation={false}
                />
                <AnchorPointPopover
                  label="relative-left"
                  anchor="relative-left"
                  stickToContainerRef={containerRef}
                  spacing={16}
                />
                <AnchorPointPopover
                  label="relative-left (animated)"
                  anchor="relative-left"
                  stickToContainerRef={containerRef}
                  spacing={16}
                  animation
                  animationDuration="0.6s"
                  fadeAnimation={false}
                />
                <AnchorPointPopover
                  label="relative-right"
                  anchor="relative-right"
                  stickToContainerRef={containerRef}
                  spacing={16}
                />
                <AnchorPointPopover
                  label="relative-right (animated)"
                  anchor="relative-right"
                  stickToContainerRef={containerRef}
                  spacing={16}
                  animation
                  animationDuration="0.6s"
                  fadeAnimation={false}
                />
                <AnchorPointPopover
                  label="relative-bottom-left"
                  anchor="relative-bottom-left"
                  stickToContainerRef={containerRef}
                  spacing={16}
                />
                <AnchorPointPopover
                  label="relative-bottom-left (animated)"
                  anchor="relative-bottom-left"
                  stickToContainerRef={containerRef}
                  spacing={16}
                  animation
                  animationDuration="0.6s"
                  fadeAnimation={false}
                />
                <AnchorPointPopover
                  label="relative-bottom"
                  anchor="relative-bottom"
                  stickToContainerRef={containerRef}
                  spacing={16}
                />
                <AnchorPointPopover
                  label="relative-bottom (animated)"
                  anchor="relative-bottom"
                  stickToContainerRef={containerRef}
                  spacing={16}
                  animation
                  animationDuration="0.6s"
                  fadeAnimation={false}
                />
                <AnchorPointPopover
                  label="relative-bottom-right"
                  anchor="relative-bottom-right"
                  stickToContainerRef={containerRef}
                  spacing={16}
                />
                <AnchorPointPopover
                  label="relative-bottom-right (animated)"
                  anchor="relative-bottom-right"
                  stickToContainerRef={containerRef}
                  spacing={16}
                  animation
                  animationDuration="0.6s"
                  fadeAnimation={false}
                />
                <AnchorPointPopover
                  label="relative-center"
                  anchor="relative-center"
                  stickToContainerRef={containerRef}
                />
                <AnchorPointPopover
                  label="relative-center (animated)"
                  anchor="relative-center"
                  stickToContainerRef={containerRef}
                  animation
                  animationDuration="0.6s"
                  fadeAnimation={false}
                />
              </div>
            </section>

            <section id="anchor-ignore" class="demo-section">
              <h2>5. Ignoring the anchor</h2>
              <p>
                <code>anchor="ignore"</code> tells the popover not to use the
                toggle button as its anchor, so it centers itself in the
                viewport instead.
              </p>
              <div class="demo-row">
                <AnchorlessPopover label='anchor="ignore"' />
              </div>

              <div id="anchor-ignore-animation" class="demo-subsection">
                <h3>Animation</h3>
                <p>
                  "clip" here grows both axes around the click position,
                  combined with a translate from that point to the final
                  centered position — it glides from the click to where it ends
                  up while it grows:
                </p>
                <div class="demo-row">
                  <AnchorlessPopover
                    label="animated"
                    animation
                    animationDuration="0.6s"
                    fadeAnimation={false}
                  />
                </div>
              </div>
            </section>

            <section id="fading" class="demo-section">
              <h2>6. Fading</h2>
              <p>
                <code>fadeAnimation</code> (defaults to <code>true</code>)
                controls opacity fading independently of <code>animation</code>{" "}
                — it combines with any of the animations above, or works on its
                own with no <code>animation</code> at all. To disable it, simply
                don't pass the prop.
              </p>
              <div class="demo-row">
                <AnchoredPopover label="fade" />
              </div>
            </section>
          </div>
        );
      };

      // No openController here: without one, Popover creates its own (see
      // open_controller.js). It self-wires to --navi-toggle/--navi-close
      // commands, and the button that triggers --navi-toggle is forwarded
      // as the anchor automatically (the command's "source" ends up as
      // navi_request_open's detail.source).
      const AnchoredPopover = ({
        label,
        animation,
        animationDuration,
        fadeAnimation,
        positionX,
        positionY,
        positionXFixed,
        positionYFixed,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              fadeAnimation={fadeAnimation}
              borderRadius="8px"
              positionX={positionX}
              positionY={positionY}
              positionXFixed={positionXFixed}
              positionYFixed={positionYFixed}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // Still command-driven (--navi-toggle), but anchor="ignore" tells the
      // popover not to use the toggle button as its anchor, so it centers
      // itself in the viewport instead.
      const AnchorlessPopover = ({
        label,
        animation,
        animationDuration,
        fadeAnimation,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              fadeAnimation={fadeAnimation}
              borderRadius="8px"
              anchor="ignore"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // anchor="top"/"top-left"/"relative-right"/etc pins the popover to an
      // anchor point of the viewport (or of stickToContainerRef, when the
      // "relative-" prefix is used) instead of positioning relative to a
      // real element. No animation by default.
      const AnchorPointPopover = ({
        label,
        anchor,
        stickToContainerRef,
        spacing,
        animation,
        animationDuration,
        fadeAnimation,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              fadeAnimation={fadeAnimation}
              borderRadius="8px"
              anchor={anchor}
              stickToContainerRef={stickToContainerRef}
              spacing={spacing}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
