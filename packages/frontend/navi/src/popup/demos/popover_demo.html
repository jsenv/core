<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-toc {
        margin-bottom: 32px;
        padding: 12px 16px;
        background: #f6f6f6;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-toc ol {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      .demo-toc li {
        margin-bottom: 4px;
      }
      .demo-slow-toggle {
        margin-bottom: 24px;
      }
      .demo-section {
        margin-bottom: 32px;
        scroll-margin-top: 16px;
      }
      .demo-subsection {
        margin-top: 20px;
        margin-left: 8px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo_popover_box {
        max-width: 220px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #d0d0d0;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .demo-container {
        position: relative;
        display: flex;
        width: 300px;
        max-width: 100%;
        height: 180px;
        margin-bottom: 8px;
        align-items: center;
        justify-content: center;
        border: 1px dotted #999;
        border-radius: 8px;
      }
      .demo-container-label {
        color: #999;
        font-size: 12px;
      }
      .demo-side-by-side {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 24px;
      }
      .demo-point-grid {
        display: grid;
        width: fit-content;
        margin-top: 8px;
        padding: 8px;
        grid-template-areas:
          "top-left top top-right"
          "left center right"
          "bottom-left bottom bottom-right";
        grid-template-columns: repeat(3, 80px);
        grid-template-rows: repeat(3, 48px);
        border: 1px solid #999;
      }
      .demo-point-cell {
        display: flex;
        border: 1px solid #ccc;
      }
      .demo-point-button {
        display: flex;
        width: 100%;
        height: 100%;
        padding: 2px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useState, useEffect } from "preact/hooks";
      import { Button, Popover, NaviDebug } from "@jsenv/navi";

      const POINTS = [
        "top-left",
        "top",
        "top-right",
        "left",
        "center",
        "right",
        "bottom-left",
        "bottom",
        "bottom-right",
      ];

      const SLOW_DOWN_STORAGE_KEY = "popover_demo_slow_down_animations";

      const App = () => {
        // Defaults to checked: absence of the key (never saved before) means
        // "true", not the string comparison's natural "false" default —
        // only an explicit previous "false" should turn it off.
        const [slowDown, setSlowDown] = useState(() => {
          const stored = localStorage.getItem(SLOW_DOWN_STORAGE_KEY);
          return stored === null ? true : stored === "true";
        });
        useEffect(() => {
          localStorage.setItem(SLOW_DOWN_STORAGE_KEY, String(slowDown));
        }, [slowDown]);
        const animatedDuration = slowDown ? "0.6s" : undefined;

        return (
          <div>
            <h1>Popover demo</h1>

            <p>
              Most sections below have an "Animated" part: the same buttons,
              with <code>animation</code> turned on — the best animation for
              that context gets picked automatically (the Fading section is the
              one exception, since it only demonstrates{" "}
              <code>fadeAnimation</code>). Animations are quick by default;
              check the box below to slow them down so you can actually see them
              play out.
            </p>
            <SlowDownToggle slowDown={slowDown} onChange={setSlowDown} />

            <TableOfContents />

            <AnchorSection animatedDuration={animatedDuration} />
            <AnchorPlacementSection animatedDuration={animatedDuration} />
            <AnchorPointSection animatedDuration={animatedDuration} />
            <AnchorPointRelativeSection animatedDuration={animatedDuration} />
            <AnchorIgnoreSection animatedDuration={animatedDuration} />
            <FadingSection />
            <PointerInteractionOutsideSection />
          </div>
        );
      };

      const SlowDownToggle = ({ slowDown, onChange }) => (
        <label class="demo-slow-toggle">
          <input
            type="checkbox"
            checked={slowDown}
            onChange={(e) => onChange(e.target.checked)}
          />
          Slow down animations
        </label>
      );

      const TableOfContents = () => (
        <nav class="demo-toc">
          <strong>Contents</strong>
          <ol>
            <li>
              <a href="#anchor">Anchor</a>
            </li>
            <li>
              <a href="#anchor-placement">Placement relative to the anchor</a>
            </li>
            <li>
              <a href="#anchor-point">Anchor as a point</a>
            </li>
            <li>
              <a href="#anchor-point-relative">
                Anchor relative to nearest positioned ancestor
              </a>
            </li>
            <li>
              <a href="#anchor-ignore">Ignoring the anchor</a>
            </li>
            <li>
              <a href="#fading">Fading</a>
            </li>
            <li>
              <a href="#pointer-interaction-outside">
                pointerInteractionOutsideEffect
              </a>
            </li>
          </ol>
        </nav>
      );

      const AnchorSection = ({ animatedDuration }) => (
        <section id="anchor" class="demo-section">
          <h2>1. Anchor</h2>
          <p>
            A popover opened via a <code>--navi-toggle</code> command anchors
            itself to the button that triggered it automatically — no anchorRef
            to wire up.
          </p>
          <div class="demo-row">
            <AnchoredPopover label="anchored (default)" />
            <AnchoredPopover
              label="animated"
              animation
              animationDuration={animatedDuration}
            />
          </div>
        </section>
      );

      const AnchorPlacementSection = ({ animatedDuration }) => (
        <section id="anchor-placement" class="demo-section">
          <h2>2. Placement relative to the anchor</h2>
          <p>
            <code>position</code> ("top", "top-right", "right", ... — the same 9
            compass values as section 3 below) places the popover relative to a
            real anchor element, auto-flipping to the opposite side when there
            isn't enough room — which is why this demo uses{" "}
            <code>positionFixed</code> instead: same values, but it skips the
            fit check, so what you pick is what you always get (useful here to
            see each value unambiguously; <code>position</code> is what you want
            in real usage).
          </p>
          {/* marginLeft gives the grid's own "left"/"top-left"/"bottom-left"
              cases room to open leftward — they'd otherwise butt straight
              into the page's left edge, since (unlike section 3's
              viewport-relative points) these are positioned relative to the
              clicked button's own position on the page. */}
          <div class="demo-side-by-side" style={{ marginLeft: "240px" }}>
            <PointGrid
              renderCell={(point) => (
                <AnchoredPopover label={point} positionFixed={point} />
              )}
            />
            <PointGrid
              renderCell={(point) => (
                <AnchoredPopover
                  label={point}
                  positionFixed={point}
                  animation
                  animationDuration={animatedDuration}
                />
              )}
            />
          </div>

          <p>
            <em>
              Note: <code>positionFixed</code> exists specifically for when you
              don't want that auto-flip-based-on-available-space behavior — a
              bit of an unusual thing to want, but here we are.
            </em>
          </p>
        </section>
      );

      const AnchorPointSection = ({ animatedDuration }) => (
        <section id="anchor-point" class="demo-section">
          <h2>3. Anchor as a point</h2>
          <p>
            <code>anchor="viewport"</code> +{" "}
            <code>position="&lt;point&gt;"</code> pins the popover to a point of
            the viewport (a corner, an edge center, or "center") instead of a
            real element — one of <code>top</code>, <code>top-right</code>,{" "}
            <code>right</code>, <code>bottom-right</code>,<code>bottom</code>,{" "}
            <code>bottom-left</code>, <code>left</code>,<code>top-left</code>,{" "}
            <code>center</code>.
          </p>
          <div class="demo-side-by-side">
            <PointGrid
              renderCell={(point) => (
                <AnchorPointPopover
                  label={point}
                  anchor="viewport"
                  position={point}
                  spacing={16}
                />
              )}
            />
            <PointGrid
              renderCell={(point) => (
                <AnchorPointPopover
                  label={point}
                  anchor="viewport"
                  position={point}
                  spacing={16}
                  animation
                  animationDuration={animatedDuration}
                />
              )}
            />
          </div>
        </section>
      );

      // anchor="offsetParent" positions the popover relative to its own
      // nearest positioned ancestor instead of the viewport — the popover
      // must be rendered inside that ancestor to find it (that's
      // .demo-container below, which has position: relative), but the
      // trigger button doesn't have to be (a possible future addition would
      // let a container be referenced by CSS selector instead, so a popover
      // could target one without being a DOM descendant of it — not needed
      // yet since offsetParent already covers today's case).
      const AnchorPointRelativeSection = ({ animatedDuration }) => (
        <section id="anchor-point-relative" class="demo-section">
          <h2>4. Anchor relative to nearest positioned ancestor</h2>
          <p>
            <code>anchor="offsetParent"</code> — positions the popover relative
            to its nearest positioned ancestor (the dotted box in the middle)
            instead of the viewport.
          </p>
          <AnchorPointRelativeDemo animatedDuration={animatedDuration} />
        </section>
      );

      // The container comes first, with the buttons that control the
      // popovers it holds below it — the container itself doesn't need to be
      // rendered inside anything, but the popovers do (that's how
      // anchor="offsetParent" finds it), and the trigger buttons don't have
      // to be inside it at all.
      const AnchorPointRelativeDemo = ({ animatedDuration }) => {
        const baseId = useId();
        return (
          <>
            <div class="demo-container">
              <span class="demo-container-label">container</span>
              {POINTS.map((point) => (
                <Popover
                  key={`plain-${point}`}
                  id={`${baseId}-plain-${point}`}
                  borderRadius="8px"
                  anchor="offsetParent"
                  position={point}
                  spacing={16}
                  pointerInteractionOutsideEffect="lock"
                  className="demo_popover_box"
                >
                  <p style={{ marginTop: 0 }}>{point}</p>
                  <Button command="--navi-close">Close</Button>
                </Popover>
              ))}
              {POINTS.map((point) => (
                <Popover
                  key={`animated-${point}`}
                  id={`${baseId}-animated-${point}`}
                  animation
                  animationDuration={animatedDuration}
                  borderRadius="8px"
                  anchor="offsetParent"
                  position={point}
                  spacing={16}
                  pointerInteractionOutsideEffect="lock"
                  className="demo_popover_box"
                >
                  <p style={{ marginTop: 0 }}>{point}</p>
                  <Button command="--navi-close">Close</Button>
                </Popover>
              ))}
            </div>
            <div class="demo-side-by-side">
              <PointGrid
                renderCell={(point) => (
                  <Button
                    command="--navi-toggle"
                    commandFor={`${baseId}-plain-${point}`}
                    className="demo-point-button"
                    style={pointAlignStyle(point)}
                  >
                    {point}
                  </Button>
                )}
              />
              <PointGrid
                renderCell={(point) => (
                  <Button
                    command="--navi-toggle"
                    commandFor={`${baseId}-animated-${point}`}
                    className="demo-point-button"
                    style={pointAlignStyle(point)}
                  >
                    {point}
                  </Button>
                )}
              />
            </div>
          </>
        );
      };

      const AnchorIgnoreSection = ({ animatedDuration }) => (
        <section id="anchor-ignore" class="demo-section">
          <h2>5. Ignoring the anchor</h2>
          <p>
            Setting <code>anchor="viewport"</code> (with{" "}
            <code>position="center"</code>) forces the popover to ignore the
            toggle button as its anchor and center itself in the viewport
            instead — once <code>anchor</code> is set to anything, the event's
            own carried anchor is never consulted.
          </p>
          <div class="demo-row">
            <AnchorlessPopover label='anchor="viewport"' />
            <AnchorlessPopover
              label="animated"
              animation
              animationDuration={animatedDuration}
            />
          </div>
        </section>
      );

      const FadingSection = () => (
        <section id="fading" class="demo-section">
          <h2>6. Fading</h2>
          <p>
            <code>fadeAnimation</code> (defaults to <code>false</code>) controls
            opacity fading independently of <code>animation</code> — it combines
            with any of the animations above, or works on its own with no{" "}
            <code>animation</code> at all.
          </p>
          <div class="demo-row">
            <AnchoredPopover label="fade" fadeAnimation />
          </div>
        </section>
      );

      const PointerInteractionOutsideSection = () => (
        <section id="pointer-interaction-outside" class="demo-section">
          <h2>7. pointerInteractionOutsideEffect</h2>
          <p>
            Controls what a pointer interaction (mousedown) landing outside the
            popover does while it's open:
          </p>
          <ul>
            <li>
              <code>"none"</code> (default) — nothing special: the popover
              doesn't intercept it at all (no backdrop), and never closes from
              it.
            </li>
            <li>
              <code>"close"</code> — closes the popover.
            </li>
            <li>
              <code>"lock"</code> — prevents interacting with the rest of the
              document (the click is absorbed) without closing the popover.
            </li>
          </ul>
          <p>
            Open a popover below, then click "Click the rest of the page" — the
            counter and the popover's open/closed state show which one actually
            happened.
          </p>
          <div class="demo-row">
            <PointerInteractionOutsideDemo label="none (default)" />
            <PointerInteractionOutsideDemo
              label="close"
              pointerInteractionOutsideEffect="close"
            />
            <PointerInteractionOutsideDemo
              label="lock"
              pointerInteractionOutsideEffect="lock"
            />
          </div>
        </section>
      );

      // Positions a point-grid button's label within its own box to match
      // the point it represents — "top-left" reads in the top-left corner
      // of its button, "bottom" reads bottom-center, etc.
      const pointAlignStyle = (point) => ({
        justifyContent: point.includes("left")
          ? "flex-start"
          : point.includes("right")
            ? "flex-end"
            : "center",
        alignItems: point.startsWith("top")
          ? "flex-start"
          : point.startsWith("bottom")
            ? "flex-end"
            : "center",
      });

      // Pins each rendered cell to the anchor-point-shaped area matching its
      // name (grid-template-areas in the CSS uses the same 9 names), so the
      // grid visually mirrors the actual corners/edges/center it represents.
      const PointGrid = ({ renderCell }) => (
        <div class="demo-point-grid">
          {POINTS.map((point) => (
            <div
              key={point}
              class="demo-point-cell"
              style={{ gridArea: point }}
            >
              {renderCell(point)}
            </div>
          ))}
        </div>
      );

      // No openController here: without one, Popover creates its own (see
      // open_controller.js). It self-wires to --navi-toggle/--navi-close
      // commands, and the button that triggers --navi-toggle is forwarded
      // as the anchor automatically (the command's "source" ends up as
      // navi_request_open's detail.source).
      const AnchoredPopover = ({
        label,
        animation,
        animationDuration,
        fadeAnimation,
        positionFixed,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              fadeAnimation={fadeAnimation}
              borderRadius="8px"
              positionFixed={positionFixed}
              pointerInteractionOutsideEffect="close"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // Still command-driven (--navi-toggle), but anchor="viewport" tells
      // the popover not to use the toggle button as its anchor, so it
      // centers itself in the viewport instead (position="center").
      const AnchorlessPopover = ({ label, animation, animationDuration }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              borderRadius="8px"
              anchor="viewport"
              position="center"
              pointerInteractionOutsideEffect="close"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // The counter button represents "the rest of the document" — clicking
      // it while the popover is open exercises whatever
      // pointerInteractionOutsideEffect actually does: increments and
      // closes the popover ("close"), doesn't increment and keeps it open
      // ("lock"), or increments and keeps it open, same as if the popover
      // weren't there at all ("none").
      const PointerInteractionOutsideDemo = ({
        label,
        pointerInteractionOutsideEffect,
      }) => {
        const popoverId = useId();
        const [count, setCount] = useState(0);

        return (
          <div>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              borderRadius="8px"
              pointerInteractionOutsideEffect={pointerInteractionOutsideEffect}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
            <p>
              Background clicks: {count}
              <br />
              <Button onClick={() => setCount((c) => c + 1)}>
                Click the rest of the page
              </Button>
            </p>
          </div>
        );
      };

      // anchor="viewport"/"offsetParent" + position="top"/"top-left"/etc
      // pins the popover to a point instead of positioning relative to a
      // real element. No animation by default.
      const AnchorPointPopover = ({
        label,
        anchor,
        position,
        spacing,
        animation,
        animationDuration,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button
              command="--navi-toggle"
              commandFor={popoverId}
              className="demo-point-button"
              style={pointAlignStyle(label)}
            >
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              borderRadius="8px"
              anchor={anchor}
              position={position}
              spacing={spacing}
              pointerInteractionOutsideEffect="close"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
