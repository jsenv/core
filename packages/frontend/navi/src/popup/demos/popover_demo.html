<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-toc {
        margin-bottom: 32px;
        padding: 12px 16px;
        background: #f6f6f6;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-toc ol {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      .demo-toc li {
        margin-bottom: 4px;
      }
      .demo-slow-toggle {
        margin-bottom: 24px;
      }
      .demo-section {
        margin-bottom: 32px;
        scroll-margin-top: 16px;
      }
      .demo-subsection {
        margin-top: 20px;
        margin-left: 8px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo_popover_box {
        max-width: 220px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #d0d0d0;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .demo-container {
        position: relative;
        width: 300px;
        max-width: 100%;
        height: 180px;
        margin-bottom: 8px;
        border: 1px dotted #999;
        border-radius: 8px;
      }
      .demo-point-grid {
        display: grid;
        width: fit-content;
        margin-top: 8px;
        padding: 8px;
        grid-template-areas:
          "top-left top top-right"
          "left center right"
          "bottom-left bottom bottom-right";
        grid-template-columns: repeat(3, 80px);
        grid-template-rows: repeat(3, 48px);
        border: 1px solid #999;
      }
      .demo-point-cell {
        display: flex;
        border: 1px solid #ccc;
      }
      .demo-point-button {
        display: flex;
        width: 100%;
        height: 100%;
        padding: 2px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useRef, useState, useEffect } from "preact/hooks";
      import { Button, Popover, NaviDebug } from "@jsenv/navi";

      const POINTS = [
        "top-left",
        "top",
        "top-right",
        "left",
        "center",
        "right",
        "bottom-left",
        "bottom",
        "bottom-right",
      ];

      const SLOW_DOWN_STORAGE_KEY = "popover_demo_slow_down_animations";

      const App = () => {
        // Defaults to checked: absence of the key (never saved before) means
        // "true", not the string comparison's natural "false" default —
        // only an explicit previous "false" should turn it off.
        const [slowDown, setSlowDown] = useState(() => {
          const stored = localStorage.getItem(SLOW_DOWN_STORAGE_KEY);
          return stored === null ? true : stored === "true";
        });
        useEffect(() => {
          localStorage.setItem(SLOW_DOWN_STORAGE_KEY, String(slowDown));
        }, [slowDown]);
        const animatedDuration = slowDown ? "0.6s" : undefined;

        return (
          <div>
            <h1>Popover demo</h1>

            <p>
              Each section below has an "Animated" part: the same buttons, with{" "}
              <code>animation</code> turned on — the best animation for that
              context gets picked automatically. Animations are quick by
              default; check the box below to slow them down so you can actually
              see them play out.
            </p>
            <SlowDownToggle slowDown={slowDown} onChange={setSlowDown} />

            <TableOfContents />

            <AnchorSection animatedDuration={animatedDuration} />
            <AnchorPlacementSection animatedDuration={animatedDuration} />
            <AnchorPointSection animatedDuration={animatedDuration} />
            <AnchorPointRelativeSection animatedDuration={animatedDuration} />
            <AnchorIgnoreSection animatedDuration={animatedDuration} />
            <FadingSection />
          </div>
        );
      };

      const SlowDownToggle = ({ slowDown, onChange }) => (
        <label class="demo-slow-toggle">
          <input
            type="checkbox"
            checked={slowDown}
            onChange={(e) => onChange(e.target.checked)}
          />
          Slow down animations
        </label>
      );

      const TableOfContents = () => (
        <nav class="demo-toc">
          <strong>Contents</strong>
          <ol>
            <li>
              <a href="#anchor">Anchor</a>
              <ol>
                <li>
                  <a href="#anchor-animation">Animated</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#anchor-placement">Placement relative to the anchor</a>
            </li>
            <li>
              <a href="#anchor-point">Anchor as a point</a>
              <ol>
                <li>
                  <a href="#anchor-point-animation">Animated</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#anchor-point-relative">Anchor as a relative point</a>
            </li>
            <li>
              <a href="#anchor-ignore">Ignoring the anchor</a>
              <ol>
                <li>
                  <a href="#anchor-ignore-animation">Animated</a>
                </li>
              </ol>
            </li>
            <li>
              <a href="#fading">Fading</a>
            </li>
          </ol>
        </nav>
      );

      const AnchorSection = ({ animatedDuration }) => (
        <section id="anchor" class="demo-section">
          <h2>1. Anchor</h2>
          <p>
            A popover opened via a <code>--navi-toggle</code> command anchors
            itself to the button that triggered it automatically — no anchorRef
            to wire up.
          </p>
          <div class="demo-row">
            <AnchoredPopover label="anchored (default)" />
          </div>

          <div id="anchor-animation" class="demo-subsection">
            <h3>Animated</h3>
            <div class="demo-row">
              <AnchoredPopover
                label="animated"
                animation
                animationDuration={animatedDuration}
              />
            </div>
          </div>
        </section>
      );

      const AnchorPlacementSection = ({ animatedDuration }) => (
        <section id="anchor-placement" class="demo-section">
          <h2>2. Placement relative to the anchor</h2>
          <p>
            <code>positionY</code> (above/below the anchor) and
            <code>positionX</code> (left/right of the anchor) — both auto-flip
            to the opposite side when there isn't enough room, which is why this
            demo uses <code>positionYFixed</code>/<code>positionXFixed</code>{" "}
            instead: same values, but they skip the fit check, so what you pick
            is what you always get (useful here to see each value unambiguously;
            <code>positionY</code>/<code>positionX</code> are what you want in
            real usage).
          </p>

          <div class="demo-subsection">
            <h3>positionX / positionXFixed</h3>
            <div class="demo-row">
              <AnchoredPopover
                label="to-the-right"
                positionXFixed="to-the-right"
              />
              <AnchoredPopover
                label="left-aligned"
                positionXFixed="left-aligned"
              />
              <AnchoredPopover
                label="center (default)"
                positionXFixed="center"
              />
              <AnchoredPopover
                label="right-aligned"
                positionXFixed="right-aligned"
              />
              <AnchoredPopover
                label="to-the-left"
                positionXFixed="to-the-left"
              />
            </div>
            <div class="demo-subsection">
              <h4>Animated</h4>
              <div class="demo-row">
                <AnchoredPopover
                  label="to-the-right"
                  positionXFixed="to-the-right"
                  animation
                  animationDuration={animatedDuration}
                />
                <AnchoredPopover
                  label="left-aligned"
                  positionXFixed="left-aligned"
                  animation
                  animationDuration={animatedDuration}
                />
                <AnchoredPopover
                  label="center"
                  positionXFixed="center"
                  animation
                  animationDuration={animatedDuration}
                />
                <AnchoredPopover
                  label="right-aligned"
                  positionXFixed="right-aligned"
                  animation
                  animationDuration={animatedDuration}
                />
                <AnchoredPopover
                  label="to-the-left"
                  positionXFixed="to-the-left"
                  animation
                  animationDuration={animatedDuration}
                />
              </div>
            </div>
          </div>

          <div class="demo-subsection">
            <h3>positionY / positionYFixed</h3>
            <div class="demo-row">
              <AnchoredPopover label="above" positionYFixed="above" />
              <AnchoredPopover
                label="above-overlap"
                positionYFixed="above-overlap"
              />
              <AnchoredPopover label="center" positionYFixed="center" />
              <AnchoredPopover
                label="below-overlap"
                positionYFixed="below-overlap"
              />
              <AnchoredPopover label="below (default)" positionYFixed="below" />
            </div>
            <div class="demo-subsection">
              <h4>Animated</h4>
              <div class="demo-row">
                <AnchoredPopover
                  label="above"
                  positionYFixed="above"
                  animation
                  animationDuration={animatedDuration}
                />
                <AnchoredPopover
                  label="above-overlap"
                  positionYFixed="above-overlap"
                  animation
                  animationDuration={animatedDuration}
                />
                <AnchoredPopover
                  label="center"
                  positionYFixed="center"
                  animation
                  animationDuration={animatedDuration}
                />
                <AnchoredPopover
                  label="below-overlap"
                  positionYFixed="below-overlap"
                  animation
                  animationDuration={animatedDuration}
                />
                <AnchoredPopover
                  label="below"
                  positionYFixed="below"
                  animation
                  animationDuration={animatedDuration}
                />
              </div>
            </div>
          </div>
        </section>
      );

      const AnchorPointSection = ({ animatedDuration }) => (
        <section id="anchor-point" class="demo-section">
          <h2>3. Anchor as a point</h2>
          <p>
            <code>anchor="&lt;point&gt;"</code> pins the popover to a point of
            the viewport (a corner, an edge center, or "center") instead of a
            real element — one of <code>top</code>, <code>top-right</code>,
            <code>right</code>, <code>bottom-right</code>,<code>bottom</code>,{" "}
            <code>bottom-left</code>, <code>left</code>,<code>top-left</code>,{" "}
            <code>center</code>.
          </p>
          <PointGrid
            renderCell={(point) => (
              <AnchorPointPopover label={point} anchor={point} spacing={16} />
            )}
          />

          <div id="anchor-point-animation" class="demo-subsection">
            <h3>Animated</h3>
            <PointGrid
              renderCell={(point) => (
                <AnchorPointPopover
                  label={point}
                  anchor={point}
                  spacing={16}
                  animation
                  animationDuration={animatedDuration}
                />
              )}
            />
          </div>
        </section>
      );

      const AnchorPointRelativeSection = ({ animatedDuration }) => {
        const containerRef = useRef(null);
        return (
          <section id="anchor-point-relative" class="demo-section">
            <h2>4. Anchor as a relative point</h2>
            <p>
              <code>anchor="relative-&lt;point&gt;"</code> — same as above, but
              relative to a container (<code>stickToContainerRef</code>) instead
              of the viewport. The triggering buttons don't need to be inside
              the container — only the container itself matters for positioning.
            </p>
            <div class="demo-container" ref={containerRef} />
            <PointGrid
              renderCell={(point) => (
                <AnchorPointPopover
                  label={point}
                  anchor={`relative-${point}`}
                  stickToContainerRef={containerRef}
                  spacing={16}
                />
              )}
            />

            <div class="demo-subsection">
              <h3>Animated</h3>
              <PointGrid
                renderCell={(point) => (
                  <AnchorPointPopover
                    label={point}
                    anchor={`relative-${point}`}
                    stickToContainerRef={containerRef}
                    spacing={16}
                    animation
                    animationDuration={animatedDuration}
                  />
                )}
              />
            </div>
          </section>
        );
      };

      const AnchorIgnoreSection = ({ animatedDuration }) => (
        <section id="anchor-ignore" class="demo-section">
          <h2>5. Ignoring the anchor</h2>
          <p>
            <code>anchor="ignore"</code> tells the popover not to use the toggle
            button as its anchor, so it centers itself in the viewport instead.
          </p>
          <div class="demo-row">
            <AnchorlessPopover label='anchor="ignore"' />
          </div>

          <div id="anchor-ignore-animation" class="demo-subsection">
            <h3>Animated</h3>
            <div class="demo-row">
              <AnchorlessPopover
                label="animated"
                animation
                animationDuration={animatedDuration}
              />
            </div>
          </div>
        </section>
      );

      const FadingSection = () => (
        <section id="fading" class="demo-section">
          <h2>6. Fading</h2>
          <p>
            <code>fadeAnimation</code> (defaults to <code>false</code>) controls
            opacity fading independently of <code>animation</code> — it combines
            with any of the animations above, or works on its own with no{" "}
            <code>animation</code> at all.
          </p>
          <div class="demo-row">
            <AnchoredPopover label="fade" fadeAnimation />
          </div>
        </section>
      );

      // Positions a point-grid button's label within its own box to match
      // the point it represents — "top-left" reads in the top-left corner
      // of its button, "bottom" reads bottom-center, etc.
      const pointAlignStyle = (point) => ({
        justifyContent: point.includes("left")
          ? "flex-start"
          : point.includes("right")
            ? "flex-end"
            : "center",
        alignItems: point.startsWith("top")
          ? "flex-start"
          : point.startsWith("bottom")
            ? "flex-end"
            : "center",
      });

      // Pins each rendered cell to the anchor-point-shaped area matching its
      // name (grid-template-areas in the CSS uses the same 9 names), so the
      // grid visually mirrors the actual corners/edges/center it represents.
      const PointGrid = ({ renderCell }) => (
        <div class="demo-point-grid">
          {POINTS.map((point) => (
            <div
              key={point}
              class="demo-point-cell"
              style={{ gridArea: point }}
            >
              {renderCell(point)}
            </div>
          ))}
        </div>
      );

      // No openController here: without one, Popover creates its own (see
      // open_controller.js). It self-wires to --navi-toggle/--navi-close
      // commands, and the button that triggers --navi-toggle is forwarded
      // as the anchor automatically (the command's "source" ends up as
      // navi_request_open's detail.source).
      const AnchoredPopover = ({
        label,
        animation,
        animationDuration,
        fadeAnimation,
        positionX,
        positionY,
        positionXFixed,
        positionYFixed,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              fadeAnimation={fadeAnimation}
              borderRadius="8px"
              positionX={positionX}
              positionY={positionY}
              positionXFixed={positionXFixed}
              positionYFixed={positionYFixed}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // Still command-driven (--navi-toggle), but anchor="ignore" tells the
      // popover not to use the toggle button as its anchor, so it centers
      // itself in the viewport instead.
      const AnchorlessPopover = ({ label, animation, animationDuration }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              borderRadius="8px"
              anchor="ignore"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // anchor="top"/"top-left"/"relative-right"/etc pins the popover to an
      // anchor point of the viewport (or of stickToContainerRef, when the
      // "relative-" prefix is used) instead of positioning relative to a
      // real element. No animation by default.
      const AnchorPointPopover = ({
        label,
        anchor,
        stickToContainerRef,
        spacing,
        animation,
        animationDuration,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button
              command="--navi-toggle"
              commandFor={popoverId}
              className="demo-point-button"
              style={pointAlignStyle(label)}
            >
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              borderRadius="8px"
              anchor={anchor}
              stickToContainerRef={stickToContainerRef}
              spacing={spacing}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
