<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-toc {
        margin-bottom: 32px;
        padding: 12px 16px;
        background: #f6f6f6;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-toc ol {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      .demo-toc li {
        margin-bottom: 4px;
      }
      .demo-slow-toggle {
        margin-bottom: 24px;
      }
      .demo-section {
        margin-bottom: 32px;
        scroll-margin-top: 16px;
      }
      .demo-subsection {
        margin-top: 20px;
        margin-left: 8px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo_popover_box {
        max-width: 220px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #d0d0d0;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .demo-container {
        position: relative;
        display: flex;
        width: 300px;
        max-width: 100%;
        height: 180px;
        margin-bottom: 8px;
        align-items: center;
        justify-content: center;
        border: 1px dotted #999;
        border-radius: 8px;
      }
      .demo-container-label {
        color: #999;
        font-size: 12px;
      }
      .demo-side-by-side {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 24px;
      }
      .demo-point-grid {
        display: grid;
        width: fit-content;
        margin-top: 8px;
        padding: 8px;
        grid-template-areas:
          "top-left top top-right"
          "left center right"
          "bottom-left bottom bottom-right";
        grid-template-columns: repeat(3, 80px);
        grid-template-rows: repeat(3, 48px);
        border: 1px solid #999;
      }
      .demo-point-cell {
        display: flex;
        border: 1px solid #ccc;
      }
      .demo-point-button {
        display: flex;
        width: 100%;
        height: 100%;
        padding: 2px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useState, useEffect } from "preact/hooks";
      import { Button, Popover, NaviDebug } from "@jsenv/navi";

      // The 9 classic compass presets anchorArea accepts directly (also
      // used to lay out PointGrid's cells, matching the CSS
      // grid-template-areas names above).
      const POINTS = [
        "top-left",
        "top",
        "top-right",
        "left",
        "center",
        "right",
        "bottom-left",
        "bottom",
        "bottom-right",
      ];

      // Beyond the 9 presets, each axis has its own non-overlapping value
      // ("above"/"below" for Y, "to-the-left"/"to-the-right" for X) — the
      // presets' "top"/"bottom"/"left"/"right" all overlap the anchor
      // (edges aligned); these don't.
      const ANCHOR_AREA_EXTRA_VALUES = [
        "above",
        "below",
        "to-the-left",
        "to-the-right",
      ];

      const SLOW_DOWN_STORAGE_KEY = "popover_demo_slow_down_animations";

      const App = () => {
        // Defaults to checked: absence of the key (never saved before) means
        // "true", not the string comparison's natural "false" default —
        // only an explicit previous "false" should turn it off.
        const [slowDown, setSlowDown] = useState(() => {
          const stored = localStorage.getItem(SLOW_DOWN_STORAGE_KEY);
          return stored === null ? true : stored === "true";
        });
        useEffect(() => {
          localStorage.setItem(SLOW_DOWN_STORAGE_KEY, String(slowDown));
        }, [slowDown]);
        const animatedDuration = slowDown ? "0.6s" : undefined;

        return (
          <div>
            <h1>Popover demo</h1>

            <p>
              Most sections below have an "Animated" part: the same buttons,
              with <code>animation</code> turned on — the best animation for
              that context gets picked automatically (the anchorArea and Fading
              sections are the exceptions, since they're not about animation).
              Animations are quick by default; check the box below to slow them
              down so you can actually see them play out.
            </p>
            <SlowDownToggle slowDown={slowDown} onChange={setSlowDown} />

            <TableOfContents />

            <AnchorSection animatedDuration={animatedDuration} />
            <AnchorAreaSection />
            <AnchorIgnoreSection animatedDuration={animatedDuration} />
            <FadingSection />
            <PointerInteractionOutsideSection />
          </div>
        );
      };

      const SlowDownToggle = ({ slowDown, onChange }) => (
        <label class="demo-slow-toggle">
          <input
            type="checkbox"
            checked={slowDown}
            onChange={(e) => onChange(e.target.checked)}
          />
          Slow down animations
        </label>
      );

      const TableOfContents = () => (
        <nav class="demo-toc">
          <strong>Contents</strong>
          <ol>
            <li>
              <a href="#anchor">Anchor</a>
            </li>
            <li>
              <a href="#anchor-area">anchorArea</a>
            </li>
            <li>
              <a href="#anchor-ignore">Ignoring the anchor</a>
            </li>
            <li>
              <a href="#fading">Fading</a>
            </li>
            <li>
              <a href="#pointer-interaction-outside">
                pointerInteractionOutsideEffect
              </a>
            </li>
          </ol>
        </nav>
      );

      const AnchorSection = ({ animatedDuration }) => (
        <section id="anchor" class="demo-section">
          <h2>1. Anchor</h2>
          <p>
            A popover opened via a <code>--navi-toggle</code> command anchors
            itself to the button that triggered it automatically — no anchorRef
            to wire up.
          </p>
          <div class="demo-row">
            <AnchoredPopover label="anchored (default)" />
            <AnchoredPopover
              label="animated"
              animation
              animationDuration={animatedDuration}
            />
          </div>
        </section>
      );

      // This section is always relative to *an* anchor — a real element by
      // default, or "viewport"/"offsetParent" (see the 2nd/3rd subsections
      // below) — so it's anchorArea itself that's worth documenting, not
      // "placement" as some separate idea.
      const AnchorAreaSection = () => (
        <section id="anchor-area" class="demo-section">
          <h2>2. anchorArea</h2>
          <p>
            <code>anchorArea</code> places the popover relative to{" "}
            <code>anchor</code> (a real element by default, or{" "}
            <code>"viewport"</code>/<code>"offsetParent"</code>). Written as{" "}
            <code>"&lt;y&gt; &lt;x&gt;"</code> (e.g. <code>"top left"</code>),
            with 9 classic compass presets as one-word/hyphenated shortcuts:{" "}
            <code>top-left</code>, <code>top</code>, <code>top-right</code>,{" "}
            <code>left</code>, <code>center</code>, <code>right</code>,{" "}
            <code>bottom-left</code>, <code>bottom</code>,{" "}
            <code>bottom-right</code>.
          </p>
          <p>
            Beyond the 9 presets, each axis has its own full vocabulary you can
            combine explicitly: <code>above</code>/<code>top</code>/
            <code>center</code>/<code>bottom</code>/<code>below</code> for Y,{" "}
            <code>to-the-left</code>/<code>left</code>/<code>center</code>/
            <code>right</code>/<code>to-the-right</code> for X. <code>top</code>
            /<code>bottom</code>/<code>left</code>/<code>right</code> overlap
            the anchor (the matching edges align); <code>above</code>/
            <code>below</code>/<code>to-the-left</code>/
            <code>to-the-right</code> don't (there's a gap, no overlap). A
            single recognized word alone pairs with "center" on the other axis —{" "}
            <code>"left"</code> alone means <code>"center left"</code>.
          </p>

          <h3>anchor left on the trigger button (default)</h3>
          <AnchorAreaGrid />

          <h3>
            anchor<code>="viewport"</code>
          </h3>
          <AnchorAreaGrid anchor="viewport" />

          <h3>
            anchor<code>="offsetParent"</code>
          </h3>
          <AnchorAreaOffsetParentDemo />
        </section>
      );

      const AnchorIgnoreSection = ({ animatedDuration }) => (
        <section id="anchor-ignore" class="demo-section">
          <h2>3. Ignoring the anchor</h2>
          <p>
            Setting <code>anchor="viewport"</code> (with{" "}
            <code>anchorArea="center"</code>) forces the popover to ignore the
            toggle button as its anchor and center itself in the viewport
            instead — once <code>anchor</code> is set to anything, the event's
            own carried anchor is never consulted.
          </p>
          <div class="demo-row">
            <AnchorlessPopover label='anchor="viewport"' />
            <AnchorlessPopover
              label="animated"
              animation
              animationDuration={animatedDuration}
            />
          </div>
        </section>
      );

      const FadingSection = () => (
        <section id="fading" class="demo-section">
          <h2>4. Fading</h2>
          <p>
            <code>fadeAnimation</code> (defaults to <code>false</code>) controls
            opacity fading independently of <code>animation</code> — it combines
            with any of the animations above, or works on its own with no{" "}
            <code>animation</code> at all.
          </p>
          <div class="demo-row">
            <AnchoredPopover label="fade" fadeAnimation />
          </div>
        </section>
      );

      const PointerInteractionOutsideSection = () => (
        <section id="pointer-interaction-outside" class="demo-section">
          <h2>5. pointerInteractionOutsideEffect</h2>
          <p>
            Controls what a pointer interaction (mousedown) landing outside the
            popover does while it's open. Click each button below, then click it
            again while its popover is open to see the difference.
          </p>
          <div class="demo-row">
            <PointerInteractionOutsideDemo
              label="none (default)"
              description="Clicking again just toggles it closed, same as if there were no popover at all."
            />
            <PointerInteractionOutsideDemo
              label="close"
              pointerInteractionOutsideEffect="close"
              description="Clicking again closes it (via the backdrop, not the toggle)."
            />
            <PointerInteractionOutsideDemo
              label="capture"
              pointerInteractionOutsideEffect="capture"
              description="Clicking again does nothing — the click is absorbed."
            />
          </div>
        </section>
      );

      // Positions a point-grid button's label within its own box to match
      // the point it represents — "top-left" reads in the top-left corner
      // of its button, "bottom" reads bottom-center, etc.
      const pointAlignStyle = (point) => ({
        justifyContent: point.includes("left")
          ? "flex-start"
          : point.includes("right")
            ? "flex-end"
            : "center",
        alignItems: point.startsWith("top")
          ? "flex-start"
          : point.startsWith("bottom")
            ? "flex-end"
            : "center",
      });

      // Pins each rendered cell to the anchor-point-shaped area matching its
      // name (grid-template-areas in the CSS uses the same 9 names), so the
      // grid visually mirrors the actual corners/edges/center it represents.
      const PointGrid = ({ renderCell }) => (
        <div class="demo-point-grid">
          {POINTS.map((point) => (
            <div
              key={point}
              class="demo-point-cell"
              style={{ gridArea: point }}
            >
              {renderCell(point)}
            </div>
          ))}
        </div>
      );

      // No openController here: without one, Popover creates its own (see
      // open_controller.js). It self-wires to --navi-toggle/--navi-close
      // commands, and the button that triggers --navi-toggle is forwarded
      // as the anchor automatically (the command's "source" ends up as
      // navi_request_open's detail.source).
      const AnchoredPopover = ({
        label,
        animation,
        animationDuration,
        fadeAnimation,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              fadeAnimation={fadeAnimation}
              borderRadius="8px"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // Still command-driven (--navi-toggle), but anchor="viewport" tells
      // the popover not to use the toggle button as its anchor, so it
      // centers itself in the viewport instead (anchorArea="center").
      const AnchorlessPopover = ({ label, animation, animationDuration }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              borderRadius="8px"
              anchor="viewport"
              anchorArea="center"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // The same button doubles as the popover's own anchor and as "the rest
      // of the page" to click on once it's open — no separate elements
      // needed to see what pointerInteractionOutsideEffect actually does.
      const PointerInteractionOutsideDemo = ({
        label,
        pointerInteractionOutsideEffect,
        description,
      }) => {
        const popoverId = useId();

        return (
          <div>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              borderRadius="8px"
              pointerInteractionOutsideEffect={pointerInteractionOutsideEffect}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
            <p>{description}</p>
          </div>
        );
      };

      // anchor is left undefined (real anchor, from the toggle event) unless
      // explicitly passed as "viewport"/"offsetParent". No animation — this
      // section is about placement, not animation, and always uses the
      // flexible anchorArea (never anchorAreaFixed): what you'd actually use
      // day to day.
      const AnchorAreaPopover = ({
        label,
        anchor,
        anchorArea,
        gridStyle = false,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button
              command="--navi-toggle"
              commandFor={popoverId}
              className={gridStyle ? "demo-point-button" : undefined}
              style={gridStyle ? pointAlignStyle(label) : undefined}
            >
              {label}
            </Button>
            <Popover
              id={popoverId}
              borderRadius="8px"
              anchor={anchor}
              anchorArea={anchorArea}
              spacing={16}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      const AnchorAreaGrid = ({ anchor }) => (
        <>
          <PointGrid
            renderCell={(preset) => (
              <AnchorAreaPopover
                label={preset}
                anchor={anchor}
                anchorArea={preset}
                gridStyle
              />
            )}
          />
          <div class="demo-row">
            {ANCHOR_AREA_EXTRA_VALUES.map((value) => (
              <AnchorAreaPopover
                key={value}
                label={value}
                anchor={anchor}
                anchorArea={value}
              />
            ))}
          </div>
        </>
      );

      // anchor="offsetParent" needs the popovers rendered *inside* the
      // positioned container to find it — the trigger buttons don't, so
      // they live outside it, in their own grid/row below.
      const AnchorAreaOffsetParentDemo = () => {
        const baseId = useId();
        return (
          <>
            <div class="demo-container">
              <span class="demo-container-label">container</span>
              {[...POINTS, ...ANCHOR_AREA_EXTRA_VALUES].map((value) => (
                <Popover
                  key={value}
                  id={`${baseId}-${value}`}
                  borderRadius="8px"
                  anchor="offsetParent"
                  anchorArea={value}
                  spacing={16}
                  className="demo_popover_box"
                >
                  <p style={{ marginTop: 0 }}>{value}</p>
                  <Button command="--navi-close">Close</Button>
                </Popover>
              ))}
            </div>
            <PointGrid
              renderCell={(preset) => (
                <Button
                  command="--navi-toggle"
                  commandFor={`${baseId}-${preset}`}
                  className="demo-point-button"
                  style={pointAlignStyle(preset)}
                >
                  {preset}
                </Button>
              )}
            />
            <div class="demo-row">
              {ANCHOR_AREA_EXTRA_VALUES.map((value) => (
                <Button
                  key={value}
                  command="--navi-toggle"
                  commandFor={`${baseId}-${value}`}
                >
                  {value}
                </Button>
              ))}
            </div>
          </>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
