<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-toc {
        margin-bottom: 32px;
        padding: 12px 16px;
        background: #f6f6f6;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-toc ol {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      .demo-toc li {
        margin-bottom: 4px;
      }
      .demo-slow-toggle {
        margin-bottom: 24px;
      }
      .demo-section {
        margin-bottom: 32px;
        scroll-margin-top: 16px;
      }
      .demo-subsection {
        margin-top: 20px;
        margin-left: 8px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo_popover_box {
        max-width: 220px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #d0d0d0;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .demo-container {
        position: relative;
        display: flex;
        width: 300px;
        max-width: 100%;
        height: 180px;
        margin-bottom: 8px;
        align-items: center;
        justify-content: center;
        border: 1px dotted #999;
        border-radius: 8px;
      }
      .demo-container-label {
        color: #999;
        font-size: 12px;
      }
      .demo-side-by-side {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 24px;
      }
      .demo-area-grid {
        display: grid;
        width: fit-content;
        margin-top: 8px;
        padding: 8px;
        grid-template-columns: repeat(5, 100px);
        grid-template-rows: repeat(5, 48px);
        gap: 2px;
        border: 1px solid #999;
      }
      .demo-area-cell {
        display: flex;
        border: 1px solid #ccc;
      }
      .demo-area-button {
        display: flex;
        width: 100%;
        height: 100%;
        padding: 2px;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        text-align: center;
        line-height: 1.2;
        white-space: normal;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useState, useEffect } from "preact/hooks";
      import { Button, Popover, NaviDebug } from "@jsenv/navi";

      // Every value anchorArea's Y/X axes accept — the grid below shows all
      // 25 combinations (order-independent: "above on-the-left" and
      // "on-the-left above" mean the same thing).
      const ANCHOR_AREA_Y_VALUES = [
        "above",
        "aligned-top",
        "center",
        "aligned-bottom",
        "below",
      ];
      const ANCHOR_AREA_X_VALUES = [
        "on-the-left",
        "aligned-left",
        "center",
        "aligned-right",
        "on-the-right",
      ];

      const SLOW_DOWN_STORAGE_KEY = "popover_demo_slow_down_animations";

      const App = () => {
        // Defaults to checked: absence of the key (never saved before) means
        // "true", not the string comparison's natural "false" default —
        // only an explicit previous "false" should turn it off.
        const [slowDown, setSlowDown] = useState(() => {
          const stored = localStorage.getItem(SLOW_DOWN_STORAGE_KEY);
          return stored === null ? true : stored === "true";
        });
        useEffect(() => {
          localStorage.setItem(SLOW_DOWN_STORAGE_KEY, String(slowDown));
        }, [slowDown]);
        const animatedDuration = slowDown ? "0.6s" : undefined;

        return (
          <div>
            <h1>Popover demo</h1>

            <p>
              Most sections below have an "Animated" part: the same buttons,
              with <code>animation</code> turned on — the best animation for
              that context gets picked automatically (the anchorArea and Fading
              sections are the exceptions, since they're not about animation).
              Animations are quick by default; check the box below to slow them
              down so you can actually see them play out.
            </p>
            <SlowDownToggle slowDown={slowDown} onChange={setSlowDown} />

            <TableOfContents />

            <AnchorSection animatedDuration={animatedDuration} />
            <AnchorAreaSection />
            <AnchorIgnoreSection animatedDuration={animatedDuration} />
            <FadingSection />
            <PointerInteractionOutsideSection />
          </div>
        );
      };

      const SlowDownToggle = ({ slowDown, onChange }) => (
        <label class="demo-slow-toggle">
          <input
            type="checkbox"
            checked={slowDown}
            onChange={(e) => onChange(e.target.checked)}
          />
          Slow down animations
        </label>
      );

      const TableOfContents = () => (
        <nav class="demo-toc">
          <strong>Contents</strong>
          <ol>
            <li>
              <a href="#anchor">Anchor</a>
            </li>
            <li>
              <a href="#anchor-area">anchorArea</a>
            </li>
            <li>
              <a href="#anchor-ignore">Ignoring the anchor</a>
            </li>
            <li>
              <a href="#fading">Fading</a>
            </li>
            <li>
              <a href="#pointer-interaction-outside">
                pointerInteractionOutsideEffect
              </a>
            </li>
          </ol>
        </nav>
      );

      const AnchorSection = ({ animatedDuration }) => (
        <section id="anchor" class="demo-section">
          <h2>1. Anchor</h2>
          <p>
            A popover opened via a <code>--navi-toggle</code> command anchors
            itself to the button that triggered it automatically — no anchorRef
            to wire up.
          </p>
          <div class="demo-row">
            <AnchoredPopover label="anchored (default)" />
            <AnchoredPopover
              label="animated"
              animation
              animationDuration={animatedDuration}
            />
          </div>
        </section>
      );

      // This section is always relative to *an* anchor — a real element by
      // default, or "viewport"/"offsetParent" (see the 2nd/3rd subsections
      // below) — so it's anchorArea itself that's worth documenting, not
      // "placement" as some separate idea.
      const AnchorAreaSection = () => (
        <section id="anchor-area" class="demo-section">
          <h2>2. anchorArea</h2>
          <p>
            <code>anchorArea</code> places the popover relative to{" "}
            <code>anchor</code> (a real element by default, or{" "}
            <code>"viewport"</code>/<code>"offsetParent"</code>). Written as two
            space-separated words — one Y value, one X value, in either order
            (every value but <code>"center"</code> belongs to exactly one axis,
            so <code>"above on-the-left"</code> and{" "}
            <code>"on-the-left above"</code> mean the same thing). The grid
            below shows all 25 combinations: rows are <code>above</code>/
            <code>aligned-top</code>/<code>center</code>/
            <code>aligned-bottom</code>/<code>below</code>, columns are{" "}
            <code>on-the-left</code>/<code>aligned-left</code>/
            <code>center</code>/<code>aligned-right</code>/
            <code>on-the-right</code>. The plain words (<code>above</code>/
            <code>below</code>/<code>on-the-left</code>/
            <code>on-the-right</code>) sit outside the anchor with a gap; the{" "}
            <code>aligned-*</code> words overlap it (the matching edges align).
            A single recognized word alone pairs with <code>"center"</code> on
            the other axis — <code>"on-the-left"</code> alone means{" "}
            <code>"center on-the-left"</code>. The 4 corner compass names (
            <code>top-left</code>, <code>top-right</code>,{" "}
            <code>bottom-left</code>, <code>bottom-right</code>) are also
            accepted as shortcuts for the corresponding <code>aligned-*</code>/
            <code>aligned-*</code> cell.
          </p>

          <h3>anchor left on the trigger button (default)</h3>
          <AnchorAreaGrid />

          <h3>
            anchor<code>="viewport"</code>
          </h3>
          <AnchorAreaGrid anchor="viewport" />

          <h3>
            anchor<code>="offsetParent"</code>
          </h3>
          <AnchorAreaOffsetParentDemo />
        </section>
      );

      const AnchorIgnoreSection = ({ animatedDuration }) => (
        <section id="anchor-ignore" class="demo-section">
          <h2>3. Ignoring the anchor</h2>
          <p>
            Setting <code>anchor="viewport"</code> (with{" "}
            <code>anchorArea="center"</code>) forces the popover to ignore the
            toggle button as its anchor and center itself in the viewport
            instead — once <code>anchor</code> is set to anything, the event's
            own carried anchor is never consulted.
          </p>
          <div class="demo-row">
            <AnchorlessPopover label='anchor="viewport"' />
            <AnchorlessPopover
              label="animated"
              animation
              animationDuration={animatedDuration}
            />
          </div>
        </section>
      );

      const FadingSection = () => (
        <section id="fading" class="demo-section">
          <h2>4. Fading</h2>
          <p>
            <code>fadeAnimation</code> (defaults to <code>false</code>) controls
            opacity fading independently of <code>animation</code> — it combines
            with any of the animations above, or works on its own with no{" "}
            <code>animation</code> at all.
          </p>
          <div class="demo-row">
            <AnchoredPopover label="fade" fadeAnimation />
          </div>
        </section>
      );

      const PointerInteractionOutsideSection = () => (
        <section id="pointer-interaction-outside" class="demo-section">
          <h2>5. pointerInteractionOutsideEffect</h2>
          <p>
            Controls what a pointer interaction (mousedown) landing outside the
            popover does while it's open. Click each button below, then click it
            again while its popover is open to see the difference.
          </p>
          <div class="demo-row">
            <PointerInteractionOutsideDemo
              label="none (default)"
              description="Clicking again just toggles it closed, same as if there were no popover at all."
            />
            <PointerInteractionOutsideDemo
              label="close"
              pointerInteractionOutsideEffect="close"
              description="Clicking again closes it (via the backdrop, not the toggle)."
            />
            <PointerInteractionOutsideDemo
              label="capture"
              pointerInteractionOutsideEffect="capture"
              description="Clicking again does nothing — the click is absorbed."
            />
          </div>
        </section>
      );

      // Renders all 25 Y × X combinations, row-major (Y varies per row, X
      // per column) so the grid visually reads the same as the prose above
      // (rows = Y values top to bottom, columns = X values left to right).
      const AreaGrid = ({ renderCell }) => (
        <div class="demo-area-grid">
          {ANCHOR_AREA_Y_VALUES.flatMap((y) =>
            ANCHOR_AREA_X_VALUES.map((x) => (
              <div key={`${y} ${x}`} class="demo-area-cell">
                {renderCell(y, x)}
              </div>
            )),
          )}
        </div>
      );

      // No openController here: without one, Popover creates its own (see
      // open_controller.js). It self-wires to --navi-toggle/--navi-close
      // commands, and the button that triggers --navi-toggle is forwarded
      // as the anchor automatically (the command's "source" ends up as
      // navi_request_open's detail.source).
      const AnchoredPopover = ({
        label,
        animation,
        animationDuration,
        fadeAnimation,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              fadeAnimation={fadeAnimation}
              borderRadius="8px"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // Still command-driven (--navi-toggle), but anchor="viewport" tells
      // the popover not to use the toggle button as its anchor, so it
      // centers itself in the viewport instead (anchorArea="center").
      const AnchorlessPopover = ({ label, animation, animationDuration }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              borderRadius="8px"
              anchor="viewport"
              anchorArea="center"
              pointerInteractionOutsideEffect="close"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // The same button doubles as the popover's own anchor and as "the rest
      // of the page" to click on once it's open — no separate elements
      // needed to see what pointerInteractionOutsideEffect actually does.
      const PointerInteractionOutsideDemo = ({
        label,
        pointerInteractionOutsideEffect,
        description,
      }) => {
        const popoverId = useId();

        return (
          <div>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              borderRadius="8px"
              pointerInteractionOutsideEffect={pointerInteractionOutsideEffect}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
            <p>{description}</p>
          </div>
        );
      };

      // anchor is left undefined (real anchor, from the toggle event) unless
      // explicitly passed as "viewport"/"offsetParent". No animation — this
      // section is about placement, not animation, and always uses the
      // flexible anchorArea (never anchorAreaFixed): what you'd actually use
      // day to day.
      const AnchorAreaPopover = ({ anchor, anchorArea }) => {
        const popoverId = useId();

        return (
          <>
            <Button
              command="--navi-toggle"
              commandFor={popoverId}
              className="demo-area-button"
            >
              {anchorArea}
            </Button>
            <Popover
              id={popoverId}
              borderRadius="8px"
              anchor={anchor}
              anchorArea={anchorArea}
              spacing={16}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{anchorArea}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      const AnchorAreaGrid = ({ anchor }) => (
        <AreaGrid
          renderCell={(y, x) => (
            <AnchorAreaPopover anchor={anchor} anchorArea={`${y} ${x}`} />
          )}
        />
      );

      // anchor="offsetParent" needs the popovers rendered *inside* the
      // positioned container to find it — the trigger buttons don't, so
      // they live outside it, in their own grid below.
      const AnchorAreaOffsetParentDemo = () => {
        const baseId = useId();
        return (
          <>
            <div class="demo-container">
              <span class="demo-container-label">container</span>
              {ANCHOR_AREA_Y_VALUES.flatMap((y) =>
                ANCHOR_AREA_X_VALUES.map((x) => (
                  <Popover
                    key={`${y} ${x}`}
                    id={`${baseId}-${y}-${x}`}
                    borderRadius="8px"
                    anchor="offsetParent"
                    anchorArea={`${y} ${x}`}
                    spacing={16}
                    className="demo_popover_box"
                  >
                    <p style={{ marginTop: 0 }}>{`${y} ${x}`}</p>
                    <Button command="--navi-close">Close</Button>
                  </Popover>
                )),
              )}
            </div>
            <AreaGrid
              renderCell={(y, x) => (
                <Button
                  command="--navi-toggle"
                  commandFor={`${baseId}-${y}-${x}`}
                  className="demo-area-button"
                >
                  {`${y} ${x}`}
                </Button>
              )}
            />
          </>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
