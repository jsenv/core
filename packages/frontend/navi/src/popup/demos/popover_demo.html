<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-toc {
        margin-bottom: 32px;
        padding: 12px 16px;
        background: #f6f6f6;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-toc ol {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      .demo-toc li {
        margin-bottom: 4px;
      }
      .demo-section {
        margin-bottom: 32px;
        scroll-margin-top: 16px;
      }
      .demo-subsection {
        margin-top: 20px;
        margin-left: 8px;
      }
      .demo-row {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .demo_popover_box {
        /* Fixed size — content (a label of varying length + a Close button)
           must not influence it, so every popover in a grid demo is
           directly comparable regardless of which anchorArea it shows. */
        width: 130px;
        height: 70px;
        padding: 6px 8px;
        font-size: 11px;
        background: white;
        border: 1px solid #d0d0d0;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        overflow: auto;
      }
      .demo-container {
        position: relative;
        display: flex;
        width: 100%;
        max-width: 100%;
        height: 240px;
        margin-bottom: 8px;
        align-items: center;
        justify-content: center;
        border: 1px dotted #999;
        border-radius: 8px;
      }
      .demo-important-note {
        margin: 8px 0;
        padding: 8px 12px;
        color: #7a5b00;
        font-size: 13px;
        background: #fff8e1;
        border: 1px solid #f0dca0;
        border-radius: 6px;
      }
      .demo-animate-controls {
        display: flex;
        margin-top: 8px;
        gap: 12px;
      }
      .demo-animate-toggle {
        display: block;
        font-size: 13px;
      }
      .demo-container-label {
        color: #999;
        font-size: 12px;
      }
      .demo-side-by-side {
        display: flex;
        margin-top: 8px;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 24px;
      }
      .demo-area-grid {
        display: grid;
        width: fit-content;
        margin-top: 8px;
        padding: 8px;
        grid-template-columns: repeat(5, 100px);
        grid-template-rows: repeat(5, 48px);
        gap: 2px;
        border: 1px solid #999;
      }
      .demo-area-cell {
        display: flex;
        border: 1px solid #ccc;
      }
      .demo-area-button {
        display: flex;
        width: 100%;
        height: 100%;
        padding: 2px;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        text-align: center;
        line-height: 1.2;
        white-space: normal;
      }
      .demo-area-button[data-duplicate] {
        opacity: 0.35;
      }
      .demo-static-anchor-wrapper {
        position: relative;
        display: flex;
        width: fit-content;
        /* Left/right margin gives "on-the-left"/"on-the-right" popovers
           (130px wide) room to render without being clipped by the
           viewport edge. */
        margin: 16px 150px 44px;
        align-items: center;
        justify-content: center;
      }
      .demo-static-anchor {
        padding: 10px 16px;
        color: #666;
        font-size: 12px;
        background: #f6f6f6;
        border: 1px dashed #999;
        border-radius: 6px;
      }
      .demo-zone-label {
        position: absolute;
        color: #bbb;
        font-size: 10px;
        white-space: nowrap;
      }
      .demo-zone-label-above {
        bottom: 100%;
        margin-bottom: 4px;
      }
      .demo-zone-label-below {
        top: 100%;
        margin-top: 4px;
      }
      .demo-zone-label-left {
        right: 100%;
        margin-right: 8px;
      }
      .demo-zone-label-right {
        left: 100%;
        margin-left: 8px;
      }
      .demo-legend {
        display: flex;
        margin: 8px 0 4px;
        align-items: center;
        gap: 10px;
        color: #555;
        font-size: 13px;
      }
      .demo-legend-example {
        display: flex;
        width: 90px;
        height: 32px;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        text-align: center;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .demo-legend-example[data-duplicate] {
        opacity: 0.35;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useId, useState, useEffect } from "preact/hooks";
      import { Button, Popover, NaviDebug } from "@jsenv/navi";

      // Every value anchorArea's Y/X axes accept — the grid below shows all
      // 25 combinations (order-independent: "above on-the-left" and
      // "on-the-left above" mean the same thing).
      const ANCHOR_AREA_Y_VALUES = [
        "above",
        "aligned-top",
        "center",
        "aligned-bottom",
        "below",
      ];
      const ANCHOR_AREA_X_VALUES = [
        "on-the-left",
        "aligned-left",
        "center",
        "aligned-right",
        "on-the-right",
      ];

      // Drops "center" from a label when the other axis already carries the
      // real information — "center on-the-left" reads as "on-the-left".
      const formatAreaLabel = (y, x) => {
        if (y === "center" && x === "center") {
          return "center";
        }
        if (y === "center") {
          return x;
        }
        if (x === "center") {
          return y;
        }
        return `${y} ${x}`;
      };

      // Pinned to a point/corner (anchor="viewport" or "offsetParent" — no
      // real anchor box), overlap and no-overlap collapse to the same
      // placement, so "aligned-top" lands exactly where "above" does (ditto
      // "aligned-bottom"/"below" and "aligned-left"/"on-the-left"/
      // "aligned-right"/"on-the-right").
      const isDuplicatePointArea = (y, x) =>
        y === "aligned-top" ||
        y === "aligned-bottom" ||
        x === "aligned-left" ||
        x === "aligned-right";

      // Backs each grid demo's own "Animate"/"Slow" checkboxes — independent
      // per section, so slowing down one doesn't affect the others while
      // you're testing.
      const useStoredBoolean = (key, defaultValue) => {
        const [value, setValue] = useState(() => {
          const stored = localStorage.getItem(key);
          return stored === null ? defaultValue : stored === "true";
        });
        useEffect(() => {
          localStorage.setItem(key, String(value));
        }, [key, value]);
        return [value, setValue];
      };

      // Backs a section's own "Animate"/"Fade"/"Slow" checkboxes and computes
      // the animationDuration to pass down — storageKey scopes all three to
      // that one section, independent of every other section's own toggles.
      // Returns plain values/setters (not a component) so the checkboxes
      // stay one stable component across renders — a component created fresh
      // on every call (as this used to return) gets a new identity each
      // render, and Preact remounts it whenever anything in the parent
      // re-renders, discarding whatever the user was in the middle of
      // clicking.
      const useAnimateControls = (storageKey) => {
        const [animate, setAnimate] = useStoredBoolean(
          `${storageKey}_animate`,
          false,
        );
        const [fade, setFade] = useStoredBoolean(`${storageKey}_fade`, false);
        const [slow, setSlow] = useStoredBoolean(`${storageKey}_slow`, true);
        const animationDuration = animate && slow ? "0.6s" : undefined;
        return {
          animate,
          fade,
          animationDuration,
          controlsProps: { animate, setAnimate, fade, setFade, slow, setSlow },
        };
      };

      const AnimateToggle = ({ animate, onChange }) => (
        <label class="demo-animate-toggle">
          <input
            type="checkbox"
            checked={animate}
            onChange={(e) => onChange(e.target.checked)}
          />
          Animate
        </label>
      );

      const AnimateControls = ({
        animate,
        setAnimate,
        fade,
        setFade,
        slow,
        setSlow,
      }) => (
        <div class="demo-animate-controls">
          <AnimateToggle animate={animate} onChange={setAnimate} />
          <label class="demo-animate-toggle">
            <input
              type="checkbox"
              checked={fade}
              onChange={(e) => setFade(e.target.checked)}
            />
            Fade
          </label>
          <label class="demo-animate-toggle">
            <input
              type="checkbox"
              checked={slow}
              onChange={(e) => setSlow(e.target.checked)}
            />
            Slow
          </label>
        </div>
      );

      const App = () => (
        <div>
          <h1>Popover demo</h1>

          <p>
            Most sections below have an "Animated" part — the same buttons, with{" "}
            <code>animation</code> turned on — the best animation for that
            context gets picked automatically (Fading is the exception, since
            it's not about <code>animation</code>). Where there's an "Animate"
            checkbox, a "Slow" checkbox next to it slows that section's
            animations down so you can actually see them play out.
          </p>

          <TableOfContents />

          <AnchorSection />
          <AnchorAreaSection />
          <AnchorIgnoreSection />
          <AnchorSpacingSection />
          <FadingSection />
          <PointerInteractionOutsideSection />
        </div>
      );

      const TableOfContents = () => (
        <nav class="demo-toc">
          <strong>Contents</strong>
          <ol>
            <li>
              <a href="#anchor">Anchor</a>
            </li>
            <li>
              <a href="#anchor-area">anchorArea</a>
            </li>
            <li>
              <a href="#anchor-ignore">Ignoring the anchor</a>
            </li>
            <li>
              <a href="#anchor-spacing">anchorSpacing</a>
            </li>
            <li>
              <a href="#fading">Fading</a>
            </li>
            <li>
              <a href="#pointer-interaction-outside">
                pointerInteractionOutsideEffect
              </a>
            </li>
          </ol>
        </nav>
      );

      const AnchorSection = () => (
        <section id="anchor" class="demo-section">
          <h2>1. Anchor</h2>
          <div class="demo-row">
            <AnchoredPopover label="anchored (default)" />
            <AnchoredPopover
              label="animated"
              animation
              animationDuration="0.6s"
            />
          </div>
        </section>
      );

      // This section is always relative to *an* anchor — a real element by
      // default, or "viewport"/"offsetParent" (see the 2nd/3rd subsections
      // below) — so it's anchorArea itself that's worth documenting, not
      // "placement" as some separate idea.
      const AnchorAreaSection = () => (
        <section id="anchor-area" class="demo-section">
          <h2>2. anchorArea</h2>

          <h3>default (anchor is trigger button)</h3>
          <p>
            The buttons below are wired to the anchor above (via{" "}
            <code>navi-command-proxy-for</code>) instead of anchoring to
            themselves — useful for this demo, but also in practice.
          </p>
          <AnchorAreaDefaultDemo />

          <h3>
            anchor<code>="viewport"</code>
          </h3>
          <AnchorAreaViewportDemo />

          <h3>
            anchor<code>="offsetParent"</code>
          </h3>
          <AnchorAreaOffsetParentDemo />
        </section>
      );

      const AnchorIgnoreSection = () => (
        <section id="anchor-ignore" class="demo-section">
          <h2>3. Ignoring the anchor</h2>
          <p>
            Setting <code>anchor="viewport"</code> (with{" "}
            <code>anchorArea="center"</code>) forces the popover to ignore the
            toggle button as its anchor and center itself in the viewport
            instead — once <code>anchor</code> is set to anything, the event's
            own carried anchor is never consulted.
          </p>
          <div class="demo-row">
            <AnchorlessPopover label='anchor="viewport"' />
            <AnchorlessPopover
              label="animated"
              animation
              animationDuration="0.6s"
            />
          </div>
        </section>
      );

      const AnchorSpacingSection = () => (
        <section id="anchor-spacing" class="demo-section">
          <h2>4. anchorSpacing</h2>
          <p>
            The gap between the popover and its anchor — defaults to{" "}
            <code>0</code> (touching).
          </p>
          <div class="demo-row">
            <AnchoredPopover label="anchorSpacing={0} (default)" />
            <AnchoredPopover label="anchorSpacing={16}" anchorSpacing={16} />
            <AnchoredPopover
              label="animated"
              anchorSpacing={16}
              animation
              animationDuration="0.6s"
            />
          </div>
        </section>
      );

      const FadingSection = () => (
        <section id="fading" class="demo-section">
          <h2>5. Fading</h2>
          <p>
            <code>fadeAnimation</code> (defaults to <code>false</code>) controls
            opacity fading independently of <code>animation</code> — it combines
            with any of the animations above, or works on its own with no{" "}
            <code>animation</code> at all.
          </p>
          <div class="demo-row">
            <AnchoredPopover label="fade" fadeAnimation />
          </div>
        </section>
      );

      const PointerInteractionOutsideSection = () => {
        const { animate, fade, animationDuration, controlsProps } =
          useAnimateControls("popover_demo_pointer_interaction_outside");
        return (
          <section id="pointer-interaction-outside" class="demo-section">
            <h2>6. pointerInteractionOutsideEffect</h2>
            <p>
              <code>"none"</code> (default) — interactions outside the popover
              happen normally. <code>"close"</code> — a mousedown outside closes
              it. <code>"capture"</code> — pointer interactions outside the
              popover don't reach the page at all.
            </p>
            <div class="demo-row">
              <PointerInteractionOutsideDemo
                label="none (default)"
                animation={animate}
                fadeAnimation={fade}
                animationDuration={animationDuration}
              />
              <PointerInteractionOutsideDemo
                label="close"
                pointerInteractionOutsideEffect="close"
                animation={animate}
                fadeAnimation={fade}
                animationDuration={animationDuration}
              />
              <PointerInteractionOutsideDemo
                label="capture"
                pointerInteractionOutsideEffect="capture"
                animation={animate}
                fadeAnimation={fade}
                animationDuration={animationDuration}
              />
            </div>
            <AnimateControls {...controlsProps} />
          </section>
        );
      };

      // Renders all 25 Y × X combinations, row-major (Y varies per row, X
      // per column) so the grid visually reads the same as the prose above
      // (rows = Y values top to bottom, columns = X values left to right).
      const AreaGrid = ({ renderCell }) => (
        <div class="demo-area-grid">
          {ANCHOR_AREA_Y_VALUES.flatMap((y) =>
            ANCHOR_AREA_X_VALUES.map((x) => (
              <div key={`${y} ${x}`} class="demo-area-cell">
                {renderCell(y, x)}
              </div>
            )),
          )}
        </div>
      );

      // No openController here: without one, Popover creates its own (see
      // open_controller.js). It self-wires to --navi-toggle/--navi-close
      // commands, and the button that triggers --navi-toggle is forwarded
      // as the anchor automatically (the command's "source" ends up as
      // navi_request_open's detail.source).
      const AnchoredPopover = ({
        label,
        animation,
        animationDuration,
        fadeAnimation,
        anchorSpacing,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              fadeAnimation={fadeAnimation}
              anchorSpacing={anchorSpacing}
              borderRadius="8px"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // Still command-driven (--navi-toggle), but anchor="viewport" tells
      // the popover not to use the toggle button as its anchor, so it
      // centers itself in the viewport instead (anchorArea="center").
      const AnchorlessPopover = ({ label, animation, animationDuration }) => {
        const popoverId = useId();

        return (
          <>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              animationDuration={animationDuration}
              borderRadius="8px"
              anchor="viewport"
              anchorArea="center"
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // The same button doubles as the popover's own anchor and as "the rest
      // of the page" to click on once it's open — no separate elements
      // needed to see what pointerInteractionOutsideEffect actually does.
      // The backdrop's opacity (see the CSS at the top) makes "close"/
      // "capture" visually distinct from "none" (fully transparent) without
      // needing more prose.
      const PointerInteractionOutsideDemo = ({
        label,
        pointerInteractionOutsideEffect,
        animation,
        fadeAnimation,
        animationDuration,
      }) => {
        const popoverId = useId();

        return (
          <div>
            <Button command="--navi-toggle" commandFor={popoverId}>
              {label}
            </Button>
            <Popover
              id={popoverId}
              borderRadius="8px"
              pointerInteractionOutsideEffect={pointerInteractionOutsideEffect}
              animation={animation}
              fadeAnimation={fadeAnimation}
              animationDuration={animationDuration}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </div>
        );
      };

      // anchor is left undefined (real anchor, from the toggle event) unless
      // explicitly passed as "viewport"/"offsetParent". Always uses the
      // flexible anchorArea (never anchorAreaFixed): what you'd actually use
      // day to day. commandProxyFor redirects the trigger button's anchor to
      // another element (see navi-command-proxy-for on the Button below) —
      // used by the default-anchor subsection so every button anchors to one
      // shared static box instead of to itself.
      const AnchorAreaPopover = ({
        anchor,
        anchorArea,
        label = anchorArea,
        duplicate = false,
        commandProxyFor,
        animation,
        fadeAnimation,
        animationDuration,
      }) => {
        const popoverId = useId();

        return (
          <>
            <Button
              command="--navi-toggle"
              commandFor={popoverId}
              navi-command-proxy-for={commandProxyFor}
              className="demo-area-button"
              data-duplicate={duplicate ? "" : undefined}
            >
              {label}
            </Button>
            <Popover
              id={popoverId}
              animation={animation}
              fadeAnimation={fadeAnimation}
              animationDuration={animationDuration}
              borderRadius="8px"
              anchor={anchor}
              anchorArea={anchorArea}
              className="demo_popover_box"
            >
              <p style={{ marginTop: 0 }}>{label}</p>
              <Button command="--navi-close">Close</Button>
            </Popover>
          </>
        );
      };

      // A single static box, with faint labels hinting at the four
      // directions around it, that every button below anchors its popover
      // to (via navi-command-proxy-for) instead of to itself.
      const AnchorAreaDefaultDemo = () => {
        const anchorId = useId();
        const { animate, fade, animationDuration, controlsProps } =
          useAnimateControls("popover_demo_area_anchor");
        return (
          <>
            <div class="demo-static-anchor-wrapper">
              <span class="demo-zone-label demo-zone-label-above">above</span>
              <span class="demo-zone-label demo-zone-label-below">below</span>
              <span class="demo-zone-label demo-zone-label-left">
                on-the-left
              </span>
              <span class="demo-zone-label demo-zone-label-right">
                on-the-right
              </span>
              <div id={anchorId} class="demo-static-anchor">
                anchor
              </div>
            </div>
            <AreaGrid
              renderCell={(y, x) => (
                <AnchorAreaPopover
                  anchorArea={`${y} ${x}`}
                  label={formatAreaLabel(y, x)}
                  commandProxyFor={anchorId}
                  animation={animate}
                  fadeAnimation={fade}
                  animationDuration={animationDuration}
                />
              )}
            />
            <AnimateControls {...controlsProps} />
          </>
        );
      };

      // Shared by both point-mode subsections (viewport and offsetParent):
      // pinned to a point/corner of referenceLabel instead of a real anchor
      // box, the popover can only sit flush against its edges — never
      // floating outside with a gap the way "above"/"below" do against a
      // real anchor. That collapses the overlap distinction, so some
      // positions are equivalent (faded in the grid below).
      const PointModeNote = ({ referenceLabel }) => (
        <>
          <p>
            Pinned to a point/corner of {referenceLabel} instead of a real
            anchor box, the popover can only sit flush against its edges — never
            floating outside with a gap. That collapses the overlap distinction:
            some positions below are equivalent (faded) in terms of where they
            land, but with "Animate" on they still pick a different animation
            (slide vs scale) — a side effect of the pair still choosing the
            animation independently of the actual position, which turns out to
            be a handy way to control it directly (e.g. "on-the-left" slides in
            from the side, "aligned-left" scales in place, same spot either
            way).
          </p>
          <p class="demo-legend">
            <span class="demo-legend-example">on-the-left</span>
            <span class="demo-legend-example" data-duplicate="">
              aligned-left
            </span>
            <span>same placement as each other.</span>
          </p>
        </>
      );

      const AnchorAreaViewportDemo = () => {
        const { animate, fade, animationDuration, controlsProps } =
          useAnimateControls("popover_demo_area_viewport");
        return (
          <>
            <PointModeNote referenceLabel="the viewport" />
            <AreaGrid
              renderCell={(y, x) => (
                <AnchorAreaPopover
                  anchor="viewport"
                  anchorArea={`${y} ${x}`}
                  label={formatAreaLabel(y, x)}
                  duplicate={isDuplicatePointArea(y, x)}
                  animation={animate}
                  fadeAnimation={fade}
                  animationDuration={animationDuration}
                />
              )}
            />
            <AnimateControls {...controlsProps} />
          </>
        );
      };

      // anchor="offsetParent" needs the popovers rendered *inside* the
      // positioned container to find it — the trigger buttons don't, so
      // they live outside it, in their own grid below.
      const AnchorAreaOffsetParentDemo = () => {
        const baseId = useId();
        const { animate, fade, animationDuration, controlsProps } =
          useAnimateControls("popover_demo_area_offset_parent");
        return (
          <>
            <PointModeNote referenceLabel="the container" />
            <p class="demo-important-note">
              The popover is promoted to the top layer once shown, so it isn't
              actually clipped by the container's own{" "}
              <code>overflow: hidden</code>/<code>auto</code> the way normal
              in-flow content would be — it can render outside the container
              regardless of what the container's overflow is set to.
            </p>
            <div class="demo-container">
              <span class="demo-container-label">container</span>
              {ANCHOR_AREA_Y_VALUES.flatMap((y) =>
                ANCHOR_AREA_X_VALUES.map((x) => (
                  <Popover
                    key={`${y} ${x}`}
                    id={`${baseId}-${y}-${x}`}
                    animation={animate}
                    fadeAnimation={fade}
                    animationDuration={animationDuration}
                    borderRadius="8px"
                    anchor="offsetParent"
                    anchorArea={`${y} ${x}`}
                    className="demo_popover_box"
                  >
                    <p style={{ marginTop: 0 }}>{formatAreaLabel(y, x)}</p>
                    <Button command="--navi-close">Close</Button>
                  </Popover>
                )),
              )}
            </div>
            <AreaGrid
              renderCell={(y, x) => (
                <Button
                  command="--navi-toggle"
                  commandFor={`${baseId}-${y}-${x}`}
                  className="demo-area-button"
                  data-duplicate={isDuplicatePointArea(y, x) ? "" : undefined}
                >
                  {formatAreaLabel(y, x)}
                </Button>
              )}
            />
            <AnimateControls {...controlsProps} />
          </>
        );
      };

      render(
        <NaviDebug debugAll>
          <App />
        </NaviDebug>,
        document.querySelector("#root"),
      );
    </script>
  </body>
</html>
