<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Virtual Scroll + Sort Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #app {
        max-width: 400px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useRef, useEffect } from "preact/hooks";

      /**
       * Virtual Scroll + Sort Demo
       *
       * 200 items — virtual scroll is always active (maxHeight="220px").
       * Typing in the input re-sorts items in state (no items are hidden):
       *   1. items that START with the query (alphabetically)
       *   2. items that CONTAIN the query (alphabetically)
       *   3. everything else at the end
       *
       * No items are hidden — filter state drives sort only. The Input is
       * a plain input; keyboard shortcuts are not wired to the list.
       */

      import { Input, Suggestion, SuggestionList } from "@jsenv/navi";

      const ALL_ITEMS = Array.from({ length: 200 }, (_, i) => {
        const names = [
          "Alpha",
          "Bravo",
          "Charlie",
          "Delta",
          "Echo",
          "Foxtrot",
          "Golf",
          "Hotel",
          "India",
          "Juliet",
          "Kilo",
          "Lima",
          "Mike",
          "November",
          "Oscar",
          "Papa",
          "Quebec",
          "Romeo",
          "Sierra",
          "Tango",
        ];
        const base = names[i % names.length];
        const num = String(Math.floor(i / names.length) + 1).padStart(2, "0");
        return `${base}-${num}`;
      });

      // Sort items based on a filter string:
      //   1. items that START with the filter (alphabetically)
      //   2. items that CONTAIN the filter (alphabetically)
      //   3. everything else at the end
      // No items are hidden — all 200 are always rendered, just reordered.
      const sortItems = (items, filter) => {
        if (!filter) {
          return items;
        }
        const lower = filter.toLowerCase();
        const starts = [];
        const contains = [];
        const rest = [];
        for (const item of items) {
          const lowerItem = item.toLowerCase();
          if (lowerItem.startsWith(lower)) {
            starts.push(item);
          } else if (lowerItem.includes(lower)) {
            contains.push(item);
          } else {
            rest.push(item);
          }
        }
        starts.sort((a, b) => a.localeCompare(b));
        contains.sort((a, b) => a.localeCompare(b));
        return [...starts, ...contains, ...rest];
      };

      const StatsBar = ({ totalItems, domItems }) => {
        const savedFromDom = totalItems - domItems;
        return (
          <div
            style={{
              display: "flex",
              gap: "16px",
              marginBottom: "10px",
              padding: "10px 14px",
              color: "#d4d4d4",
              fontSize: "0.85rem",
              fontFamily: "monospace",
              background: "#1e1e1e",
              borderRadius: "6px",
            }}
          >
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                gap: "2px",
              }}
            >
              <span
                style={{
                  color: "#888",
                  fontSize: "0.7rem",
                  textTransform: "uppercase",
                  letterSpacing: "0.05em",
                }}
              >
                Total items
              </span>
              <span style={{ fontWeight: "bold", fontSize: "1.1rem" }}>
                {totalItems}
              </span>
            </div>
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                gap: "2px",
              }}
            >
              <span
                style={{
                  color: "#888",
                  fontSize: "0.7rem",
                  textTransform: "uppercase",
                  letterSpacing: "0.05em",
                }}
              >
                In DOM
              </span>
              <span
                style={{
                  fontWeight: "bold",
                  fontSize: "1.1rem",
                  color: domItems < totalItems ? "#4ec9b0" : undefined,
                }}
              >
                {domItems}
              </span>
            </div>
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                gap: "2px",
              }}
            >
              <span
                style={{
                  color: "#888",
                  fontSize: "0.7rem",
                  textTransform: "uppercase",
                  letterSpacing: "0.05em",
                }}
              >
                Saved from DOM
              </span>
              <span
                style={{
                  fontWeight: "bold",
                  fontSize: "1.1rem",
                  color: savedFromDom > 0 ? "#ce9178" : undefined,
                }}
              >
                {savedFromDom}
              </span>
            </div>
          </div>
        );
      };

      export const App = () => {
        const [filter, setFilter] = useState("");
        const [selected, setSelected] = useState(null);
        const [domItems, setDomItems] = useState(0);
        const listRef = useRef(null);
        const items = sortItems(ALL_ITEMS, filter);

        useEffect(() => {
          const updateCount = () => {
            if (!listRef.current) {
              return;
            }
            setDomItems(
              listRef.current.querySelectorAll("[role='option']").length,
            );
          };
          updateCount();
          const observer = new MutationObserver(updateCount);
          if (listRef.current) {
            observer.observe(listRef.current, {
              childList: true,
              subtree: true,
            });
          }
          return () => {
            observer.disconnect();
          };
        }, []);

        return (
          <div>
            <h2>Virtual Scroll + Sort Demo</h2>
            <p style="font-size:13px;color:#555">
              200 items — virtual scroll active. Typing re-sorts: matching items
              bubble up (starts-with first, then contains), nothing is hidden.
            </p>
            <StatsBar totalItems={ALL_ITEMS.length} domItems={domItems} />
            {selected && (
              <p style="font-size:13px;color:#1a73e8">
                Selected: <b>{selected}</b>
              </p>
            )}
            <Input
              placeholder="Sort suggestions…"
              expandX
              onInput={(e) => setFilter(e.target.value)}
            />
            <SuggestionList
              ref={listRef}
              maxHeight="220px"
              uiAction={setSelected}
              expandX
            >
              {items.map((item) => (
                <Suggestion key={item} value={item}>
                  {item}
                </Suggestion>
              ))}
            </SuggestionList>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
