<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Header in List Demo</title>
    <style>
      body {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
      }

      h1 {
        margin-bottom: 24px;
        color: #333;
        font-size: 1.8rem;
        text-align: center;
      }

      .stats-bar {
        display: flex;
        margin-bottom: 12px;
        padding: 10px 14px;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
        color: #d4d4d4;
        font-size: 0.85rem;
        font-family: monospace;
        background: #1e1e1e;
        border-radius: 6px;
      }

      .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .stat-label {
        color: #888;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .stat-value {
        font-weight: bold;
        font-size: 1.1rem;
      }

      .stat-value.highlight {
        color: #4ec9b0;
      }

      .stat-value.warning {
        color: #ce9178;
      }

      .scroll-container {
        background: white;
        border: 2px solid #ccc;
        border-radius: 8px;
      }

      .sticky-header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 8px;
        background: white;
        border-bottom: 1px solid #e0e0e0;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      }

      .sticky-header-title {
        margin: 0 0 6px;
        color: #444;
        font-weight: 600;
        font-size: 0.85rem;
      }

      .value-display {
        min-height: 20px;
        margin-top: 12px;
        padding: 8px;
        color: #555;
        font-size: 0.85rem;
        font-family: monospace;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Sticky Header in List Demo</h1>
    <div id="root"></div>

    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState, useEffect, useRef } from "preact/hooks";
      import {
        SuggestionList,
        Suggestion,
        Input,
        Separator,
      } from "@jsenv/navi";

      // Each item has a name + address. Some addresses are long to test text wrapping.
      const ITEMS = [
        { name: "Alice Dupont", address: "12 rue de la Paix, 75001 Paris" },
        {

        {

        },
        {

          address: "47 rue du Faubourg Saint-Antoine, 75011 Paris",
        },
        { name: "Emma Petit", address: "2 place de la Bastille, 75012 Paris" },
        { name: "François Moreau", address: "19 rue de Rivoli, 75004 Paris" },
        { name: "Gabriel Simon", address: "5 allée des Roses, 69001 Lyon" },
        {
          name: "Hélène Laurent",
          address: "31 cours Mirabeau, 13100 Aix-en-Provence",
        },
        {
          name: "Ivan Thomas",
          address: "14 rue de la République, 13001 Marseille",
        },
        {
          name: "Julie Robert",
          address: "22 grande rue de la Croix-de-Seguey, 33000 Bordeaux",
        },
        { name: "Kévin Richard", address: "9 rue du Capitole, 31000 Toulouse" },
        {
          name: "Laura Durand",
          address: "6 place du Général de Gaulle, 59000 Lille",
        },
        { name: "Marc Lefebvre", address: "18 rue Nationale, 44000 Nantes" },
        {
          name: "Nadia Fontaine",
          address: "27 avenue Jean Médecin, 06000 Nice",
        },
        { name: "Olivier Mercier", address: "4 place Bellecour, 69002 Lyon" },
        {
          name: "Pauline Rousseau",
          address: "11 rue de la Monnaie, 59800 Lille",
        },
        {
          name: "Quentin Blanc",
          address: "33 impasse des Lilas, 33200 Bordeaux",
        },
        {
          name: "Rachel Guerin",
          address: "7 rue du Palais de Justice, 13002 Marseille",
        },
        {
          name: "Samuel Faure",
          address: "55 rue du Maréchal Joffre, 69003 Lyon",
        },
        {
          name: "Théa Vincent",
          address: "1 place de la Comédie, 34000 Montpellier",
        },
        {
          name: "Ulysse Garnier",
          address: "88 avenue de la Liberté, 67000 Strasbourg",
        },
        {
          name: "Valérie Chevalier",
          address: "15 rue des Jacobins, 80000 Amiens",
        },
        {
          name: "William Lemaire",
          address: "4 rue du Grand-Cerf, 76000 Rouen",
        },
        {
          name: "Xénia Bonnet",
          address: "72 boulevard de la Mer, 29200 Brest",
        },
        { name: "Yannick Perrin", address: "9 place du Marché, 35000 Rennes" },
        { name: "Zoé Aubert", address: "3 rue des Tanneurs, 67000 Strasbourg" },
        { name: "Antoine Girard", address: "21 rue Victor Hugo, 69002 Lyon" },
        {
          name: "Béatrice Leclercq",
          address: "6 allée des Peupliers, 59000 Lille",
        },
        {
          name: "Cédric Moulin",
          address: "18 avenue du Président Wilson, 75016 Paris",
        },
        {
          name: "Delphine Renard",
          address: "44 rue Saint-Nicolas, 57000 Metz",
        },
        {
          name: "Étienne Barbier",
          address: "11 rue du Général Foy, 75008 Paris",
        },
        { name: "Fanny Colin", address: "30 rue de la Forge, 54000 Nancy" },
        { name: "Guillaume Dufour", address: "7 place Stanislas, 54000 Nancy" },
        { name: "Inès Gaillard", address: "2 rue du Palais, 21000 Dijon" },
        {
          name: "Julien Morin",
          address: "16 rue de la Préfecture, 38000 Grenoble",
        },
        {
          name: "Karen Noel",
          address: "5 boulevard Gambetta, 63000 Clermont-Ferrand",
        },
        {
          name: "Lionel Picard",
          address: "28 avenue de la Gare, 87000 Limoges",
        },
        {
          name: "Manon Schmitt",
          address: "13 rue du Maréchal Foch, 67100 Strasbourg",
        },
        {
          name: "Nicolas Bertrand",
          address: "9 rue de la Cathédrale, 51100 Reims",
        },
        {
          name: "Océane Rolland",
          address: "55 avenue de la République, 86000 Poitiers",
        },
        {
          name: "Pierre Fournier",
          address: "3 place du Palais-Royal, 75001 Paris",
        },
        { name: "Quentin Vasseur", address: "19 rue du Temple, 75003 Paris" },
        {
          name: "Romain Carpentier",
          address: "8 boulevard de la Victoire, 67000 Strasbourg",
        },
        { name: "Sophie Jacquet", address: "41 rue d'Alsace, 68100 Mulhouse" },
        { name: "Tristan Muller", address: "7 rue du Sauvage, 68000 Colmar" },
        { name: "Ursula Poirier", address: "22 avenue Foch, 57000 Metz" },
        {
          name: "Vincent Guillot",
          address: "14 rue du Commerce, 45000 Orléans",
        },
        { name: "Wendy Legrand", address: "6 rue de la Croix, 76600 Le Havre" },
        { name: "Xavier Brun", address: "33 rue du Port, 56100 Lorient" },
        {
          name: "Yvonne Caron",
          address: "10 place de la Mairie, 49000 Angers",
        },
      ];

      // Match on both name and address
      const matchItem = (value, lowerFilter) => {
        return (
          value.name.toLowerCase().includes(lowerFilter) ||
          value.address.toLowerCase().includes(lowerFilter)
        );
      };

      const StatsBar = ({ totalItems, domItems }) => {
        const savedFromDom = totalItems - domItems;
        return (
          <div className="stats-bar">
            <div className="stat">
              <span className="stat-label">Total items</span>
              <span className="stat-value">{totalItems}</span>
            </div>
            <div className="stat">
              <span className="stat-label">In DOM</span>
              <span
                className={`stat-value ${domItems < totalItems ? "highlight" : ""}`}
              >
                {domItems}
              </span>
            </div>
            <div className="stat">
              <span className="stat-label">Saved from DOM</span>
              <span
                className={`stat-value ${savedFromDom > 0 ? "warning" : ""}`}
              >
                {savedFromDom}
              </span>
            </div>
          </div>
        );
      };

      const App = () => {
        const [selected, setSelected] = useState(null);
        const [domItems, setDomItems] = useState(0);
        const listRef = useRef(null);

        useEffect(() => {
          const updateCount = () => {
            if (!listRef.current) {
              return;
            }
            setDomItems(
              listRef.current.querySelectorAll("[role='option']").length,
            );
          };
          updateCount();
          const observer = new MutationObserver(updateCount);
          if (listRef.current) {
            observer.observe(listRef.current, {
              childList: true,
              subtree: true,
            });
          }
          return () => {
            observer.disconnect();
          };
        }, []);

        return (
          <div>
            <p
              style={{
                fontSize: "0.9rem",
                color: "#555",
                marginBottom: "12px",
              }}
            >
              Sticky header inside the list. Each option shows a name + address
              (address wraps on narrow containers). The filter matches both name
              and address — highlights appear in both fields.
            </p>

            <StatsBar totalItems={ITEMS.length} domItems={domItems} />

            <div className="scroll-container">
              <SuggestionList
                withSearch
                ref={listRef}
                match={matchItem}
                uiAction={setSelected}
                expandX
                maxHeight="320px"
                renderBudget={15}
                separator={<Separator margin="0" />}
              >
                <li className="sticky-header" role="presentation">
                  <p className="sticky-header-title">
                    Veuillez sélectionner une suggestion
                  </p>
                  <Input
                    type="search"
                    placeholder="Filtrer par nom ou adresse…"
                    expandX
                  />
                </li>

                {ITEMS.map((item) => (
                  <Suggestion
                    key={item.name}
                    value={item}
                    selected={selected === item}
                  >
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: "2px",
                      }}
                    >
                      <span>{item.name}</span>
                      <span style={{ fontSize: "0.8em", opacity: 0.65 }}>
                        {item.address}
                      </span>
                    </div>
                  </Suggestion>
                ))}
              </SuggestionList>
            </div>

            <div className="value-display">
              {selected
                ? `${selected.name} — ${selected.address}`
                : "(none selected)"}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
