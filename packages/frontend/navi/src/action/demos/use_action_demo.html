<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>use(action) Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      h2 {
        margin-bottom: 6px;
      }
      .demo-section {
        margin-bottom: 40px;
        padding: 16px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-description {
        margin: 0 0 12px;
        color: #555;
        font-size: 0.9em;
      }
      .buttons {
        display: flex;
        margin-bottom: 12px;
        gap: 8px;
      }
      .card {
        margin-top: 12px;
        padding: 16px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .card-loading {
        margin-top: 12px;
        padding: 16px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      .card-error {
        margin-top: 12px;
        padding: 16px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render, Component } from "preact";
      import { Suspense } from "preact/compat";
      import { useState } from "preact/hooks";
      import { createAction, use, ErrorBoundary, Button } from "@jsenv/navi";

      const delay = (ms) => new Promise((res) => setTimeout(res, ms));

      const UserCard = ({ action }) => {
        const user = use(action);
        return (
          <div class="card">
            <strong>{user.name}</strong>
            <div style={{ color: "#555", fontSize: "0.9em" }}>{user.email}</div>
          </div>
        );
      };

      const DemoSection = ({ title, description, children }) => (
        <div class="demo-section">
          <h2>{title}</h2>
          <p class="demo-description">{description}</p>
          {children}
        </div>
      );

      // Each example owns its action instances so they don't interfere
      const example1Success = createAction(async () => {
        await delay(800);
        return { name: "Alice", email: "alice@example.com" };
      });
      const example1Fail = createAction(async () => {
        await delay(800);
        throw new Error("Network error");
      });

      const example2Success = createAction(async () => {
        await delay(800);
        return { name: "Bob", email: "bob@example.com" };
      });
      const example2Fail = createAction(async () => {
        await delay(800);
        throw new Error("Network error");
      });

      const example3Success = createAction(async () => {
        await delay(800);
        return { name: "Carol", email: "carol@example.com" };
      });
      const example3Fail = createAction(async () => {
        await delay(800);
        throw new Error("Network error");
      });

      const example4Success = createAction(async () => {
        await delay(800);
        return { name: "Dave", email: "dave@example.com" };
      });
      const example4Fail = createAction(async () => {
        await delay(800);
        throw new Error("Network error");
      });

      const Example1 = () => {
        const [action, setAction] = useState(null);
        return (
          <DemoSection
            title="1. No Suspense"
            description="use() throws a promise but nothing catches it — expect an error/blank render while loading."
          >
            <div class="buttons">
              <Button
                action={() => {
                  setAction(example1Success);
                  return example1Success.rerun();
                }}
              >
                Fetch user (success)
              </Button>
              <Button
                action={() => {
                  setAction(example1Fail);
                  return example1Fail.rerun();
                }}
              >
                Fetch user (throw)
              </Button>
            </div>
            {action && <UserCard action={action} />}
          </DemoSection>
        );
      };

      const Example2 = () => {
        const [action, setAction] = useState(null);
        return (
          <DemoSection
            title="2. Wrapped with Suspense (no fallback)"
            description="Suspense catches the thrown promise. Without a fallback, nothing renders while loading."
          >
            <div class="buttons">
              <Button
                action={() => {
                  setAction(example2Success);
                  return example2Success.rerun();
                }}
              >
                Fetch user (success)
              </Button>
              <Button
                action={() => {
                  setAction(example2Fail);
                  return example2Fail.rerun();
                }}
              >
                Fetch user (throw)
              </Button>
            </div>
            {action && (
              <Suspense>
                <UserCard action={action} />
              </Suspense>
            )}
          </DemoSection>
        );
      };

      const Example3 = () => {
        const [action, setAction] = useState(null);
        return (
          <DemoSection
            title="3. Suspense with fallback"
            description="Shows a loading state while the action is running."
          >
            <div class="buttons">
              <Button
                action={() => {
                  setAction(example3Success);
                  return example3Success.rerun();
                }}
              >
                Fetch user (success)
              </Button>
              <Button
                action={() => {
                  setAction(example3Fail);
                  return example3Fail.rerun();
                }}
              >
                Fetch user (throw)
              </Button>
            </div>
            {action && (
              <Suspense fallback={<div class="card-loading">Loading…</div>}>
                <UserCard action={action} />
              </Suspense>
            )}
          </DemoSection>
        );
      };

      const Example4 = () => {
        const [action, setAction] = useState(null);
        return (
          <DemoSection
            title="4. Suspense + ErrorBoundary"
            description="Errors thrown by use() bubble up and are caught by the ErrorBoundary."
          >
            <div class="buttons">
              <Button
                action={() => {
                  setAction(example4Success);
                  return example4Success.rerun();
                }}
              >
                Fetch user (success)
              </Button>
              <Button
                action={() => {
                  setAction(example4Fail);
                  return example4Fail.rerun();
                }}
              >
                Fetch user (throw)
              </Button>
            </div>
            {action && (
              <ErrorBoundary
                fallback={({ error, resetError }) => (
                  <div class="card-error">
                    <div
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: "8px",
                        marginBottom: "8px",
                      }}
                    >
                      <span style={{ fontSize: "1.2em" }}>⚠️</span>
                      <strong>Error caught by ErrorBoundary</strong>
                    </div>
                    <div
                      style={{
                        fontFamily: "monospace",
                        fontSize: "0.9em",
                        marginBottom: "12px",
                      }}
                    >
                      {error.message}
                    </div>
                    <Button
                      onClick={() => {
                        resetError();
                      }}
                    >
                      Dismiss
                    </Button>
                  </div>
                )}
              >
                <Suspense fallback={<div class="card-loading">Loading…</div>}>
                  <UserCard action={action} />
                </Suspense>
              </ErrorBoundary>
            )}
          </DemoSection>
        );
      };

      const App = () => (
        <div>
          <h1>use(action) Demo</h1>
          <Example1 />
          <Example2 />
          <Example3 />
          <Example4 />
        </div>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
