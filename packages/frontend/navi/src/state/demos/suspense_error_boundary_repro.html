<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Suspense + ErrorBoundary repro</title>
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      button {
        margin-right: 8px;
        padding: 6px 14px;
        cursor: pointer;
      }
      .error {
        margin-top: 12px;
        padding: 12px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
      .card {
        margin-top: 12px;
        padding: 12px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .loading {
        margin-top: 12px;
        padding: 12px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      h2 {
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Suspense } from "preact/compat";
      import { useState, useRef, useErrorBoundary } from "preact/hooks";

      // ─── Minimal suspense promise machinery ──────────────────────────────────
      // A "task" is { promise, resolve, reject, state, result, error }

      const makeTask = () => {
        let resolve;
        let reject;
        const promise = new Promise((res, rej) => {
          resolve = res;
          reject = rej;
        });
        return {
          promise,
          resolve,
          reject,
          state: "pending",
          result: null,
          error: null,
        };
      };

      // pendingPromise WeakMap: tracks the currently-thrown promise per task slot
      const pendingMap = new WeakMap();

      // useTask: throws a promise while pending, throws error if rejected, returns result if resolved
      const useTask = (task) => {
        if (!task) return null;
        if (task.state === "resolved") return task.result;
        if (task.state === "rejected") throw task.error;
        // pending — throw the promise
        let p = pendingMap.get(task);
        if (!p) {
          p = task.promise.then(
            () => {
              pendingMap.delete(task);
            },
            () => {
              pendingMap.delete(task);
            },
          );
          pendingMap.set(task, p);
        }
        throw p;
      };

      // ─── ErrorBoundary ────────────────────────────────────────────────────────
      const ErrorBoundary = ({ children }) => {
        const [error, resetError] = useErrorBoundary();
        const [dismissed, setDismissed] = useState(false);

        if (error && !dismissed) {
          return (
            <div class="error">
              <strong>⚠️ Error caught by ErrorBoundary</strong>
              <div style="margin: 6px 0; font-family: monospace;">
                {error.message}
              </div>
              <button
                onClick={() => {
                  setDismissed(true);
                  resetError();
                }}
              >
                Dismiss
              </button>
            </div>
          );
        }
        if (dismissed) {
          return null;
        }
        return children;
      };

      // ─── Child component that suspends ────────────────────────────────────────
      const Child = ({ task }) => {
        const data = useTask(task);
        if (data === null) return <div class="card">(no data yet)</div>;
        return (
          <div class="card">
            ✅ Result: <strong>{data}</strong>
          </div>
        );
      };

      // ─── App ──────────────────────────────────────────────────────────────────
      const App = () => {
        const taskRef = useRef(null);
        const [task, setTask] = useState(null);
        const [boundaryKey, setBoundaryKey] = useState(0);

        const run = (shouldFail) => {
          const t = makeTask();
          taskRef.current = t;
          setBoundaryKey((k) => k + 1);
          setTask(t);

          setTimeout(() => {
            if (shouldFail) {
              t.state = "rejected";
              t.error = new Error("Server error: something went wrong");
              t.reject(t.error);
            } else {
              t.state = "resolved";
              t.result = "Hello, world!";
              t.resolve();
            }
            setTask({ ...t }); // new object reference to force re-render
          }, 800);
        };

        return (
          <div>
            <h1>Suspense + ErrorBoundary repro</h1>
            <h2>Controls</h2>
            <button onClick={() => run(false)}>✅ Fetch (success)</button>
            <button onClick={() => run(true)}>❌ Fetch (fail)</button>
            <h2>Output</h2>
            <ErrorBoundary key={boundaryKey}>
              <Suspense fallback={<div class="loading">Loading…</div>}>
                {task && <Child task={taskRef.current} />}
              </Suspense>
            </ErrorBoundary>
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
