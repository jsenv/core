<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Suspense + ErrorBoundary repro</title>
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      button {
        margin-right: 8px;
        padding: 6px 14px;
        cursor: pointer;
      }
      .error {
        margin-top: 12px;
        padding: 12px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
      .card {
        margin-top: 12px;
        padding: 12px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .loading {
        margin-top: 12px;
        padding: 12px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      h2 {
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render, createContext } from "preact";
      import { Suspense } from "preact/compat";
      import {
        useState,
        useRef,
        useContext,
        useErrorBoundary,
      } from "preact/hooks";

      // ─── Minimal suspense promise machinery ──────────────────────────────────
      // A "task" is { promise, resolve, reject, state, result, error }

      const makeTask = () => {
        let resolve;
        let reject;
        const promise = new Promise((res, rej) => {
          resolve = res;
          reject = rej;
        });
        return {
          promise,
          resolve,
          reject,
          state: "pending",
          result: null,
          error: null,
        };
      };

      // pendingPromise WeakMap: tracks the currently-thrown promise per task slot
      const pendingMap = new WeakMap();
      const ErrorBoundaryResetContext = createContext(null);

      // useTask: throws a promise while pending, throws error if rejected, returns result if resolved.
      // When a new pending task starts, calls reset() from ErrorBoundaryResetContext so the boundary
      // auto-dismisses — no props needed on ErrorBoundary.
      const useTask = (task) => {
        const resetRef = useContext(ErrorBoundaryResetContext);
        if (!task) return null;
        if (task.state === "resolved") return task.result;
        if (task.state === "rejected") throw task.error;
        // pending — new task starting: reset the error boundary before suspending
        if (resetRef && resetRef.current) {
          resetRef.current();
        }
        let p = pendingMap.get(task);
        if (!p) {
          p = task.promise.then(
            () => {
              pendingMap.delete(task);
            },
            () => {
              pendingMap.delete(task);
            },
          );
          pendingMap.set(task, p);
        }
        throw p;
      };

      // ─── ErrorBoundary ────────────────────────────────────────────────────────
      // Provides reset via context so useTask can auto-dismiss when a new task starts.
      // Children are always rendered (inside <Suspense fallback={null}> during error state)
      // so useTask keeps running and can call reset() even while error is showing.
      const ErrorBoundary = ({ children }) => {
        const [error, resetError] = useErrorBoundary();
        const [dismissed, setDismissed] = useState(false);
        const resetRef = useRef(null);

        const reset = () => {
          setDismissed(false);
          resetError();
        };
        resetRef.current = reset;

        if (error && !dismissed) {
          return (
            <>
              <div class="error">
                <strong>⚠️ Error caught by ErrorBoundary</strong>
                <div style="margin: 6px 0; font-family: monospace;">
                  {error.message}
                </div>
                <button
                  onClick={() => {
                    setDismissed(true);
                    resetError();
                  }}
                >
                  Dismiss
                </button>
              </div>
              <ErrorBoundaryResetContext.Provider value={resetRef}>
                <Suspense fallback={null}>{children}</Suspense>
              </ErrorBoundaryResetContext.Provider>
            </>
          );
        }
        if (dismissed) {
          return (
            <ErrorBoundaryResetContext.Provider value={resetRef}>
              <Suspense fallback={null}>{children}</Suspense>
            </ErrorBoundaryResetContext.Provider>
          );
        }
        return (
          <ErrorBoundaryResetContext.Provider value={resetRef}>
            {children}
          </ErrorBoundaryResetContext.Provider>
        );
      };

      // ─── Child component that suspends ────────────────────────────────────────
      const Child = ({ task }) => {
        const data = useTask(task);
        if (data === null) return <div class="card">(no data yet)</div>;
        return (
          <div class="card">
            ✅ Result: <strong>{data}</strong>
          </div>
        );
      };

      // ─── App ──────────────────────────────────────────────────────────────────
      const App = () => {
        const taskRef = useRef(null);
        const [task, setTask] = useState(null);

        const run = (shouldFail) => {
          const t = makeTask();
          taskRef.current = t;
          setTask(t);

          setTimeout(() => {
            if (shouldFail) {
              t.state = "rejected";
              t.error = new Error("Server error: something went wrong");
              t.reject(t.error);
            } else {
              t.state = "resolved";
              t.result = "Hello, world!";
              t.resolve();
            }
            setTask({ ...t }); // new object reference to force re-render
          }, 800);
        };

        return (
          <div>
            <h1>Suspense + ErrorBoundary repro</h1>
            <h2>Controls</h2>
            <button onClick={() => run(false)}>✅ Fetch (success)</button>
            <button onClick={() => run(true)}>❌ Fetch (fail)</button>
            <h2>Output</h2>
            <ErrorBoundary>
              <Suspense fallback={<div class="loading">Loading…</div>}>
                {task && <Child task={taskRef.current} />}
              </Suspense>
            </ErrorBoundary>
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
