<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Suspense + ErrorBoundary repro</title>
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      button {
        margin-right: 8px;
        padding: 6px 14px;
        cursor: pointer;
      }
      .error {
        margin-top: 12px;
        padding: 12px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
      .card {
        margin-top: 12px;
        padding: 12px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .loading {
        margin-top: 12px;
        padding: 12px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      h2 {
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render, createContext } from "preact";
      import { Suspense } from "preact/compat";
      import {
        useState,
        useEffect,
        useRef,
        useContext,
        useErrorBoundary,
      } from "preact/hooks";

      // ─── Design specs ─────────────────────────────────────────────────────────
      //
      // 1. ErrorBoundary takes only `children` — no props, no context.
      //    All information it needs (e.g. which task failed) comes from the
      //    thrown error itself (error.task).
      //
      // 2. Child components must never be called with null/undefined data.
      //    They should not have to handle the "no data yet" case.
      //    This is enforced by useTask(): as long as there is no data available,
      //    useTask() throws (a promise or an error), keeping Suspense or
      //    ErrorBoundary in control. Child code only runs when real data exists.
      //
      // ─────────────────────────────────────────────────────────────────────────

      // ─── Task ─────────────────────────────────────────────────────────────────
      // Tasks live outside JSX so they survive component lifecycle.
      // They have a subscribe() so ErrorBoundary can react when the task re-runs.

      const makeTask = () => {
        const listeners = new Set();
        const task = {
          state: "idle",
          result: null,
          error: null,
          subscribe: (fn) => {
            listeners.add(fn);
            return () => {
              listeners.delete(fn);
            };
          },
          reset: () => {
            task.state = "idle";
            task.error = null;
            // keep task.result so previous data is visible after dismiss
            task._notify();
          },
          _notify: () => {
            for (const fn of listeners) {
              fn(task);
            }
          },
        };
        return task;
      };

      const runTask = (task, shouldFail) => {
        task.state = "running";
        task.error = null;
        // keep task.result so previous data is available during re-run
        task._notify();
        setTimeout(() => {
          if (shouldFail) {
            task.state = "rejected";
            task.error = new Error("Server error: something went wrong");
          } else {
            task.state = "resolved";
            task.result = "Hello, world!";
          }
          task._notify();
        }, 800);
      };

      // ─── useTask ──────────────────────────────────────────────────────────────
      // Subscribes to task for re-renders. Throws a promise while running or idle
      // with no data (spec #2). Writes the suspension reason into LoadingContext
      // so that <Loading> fallback knows whether to show a spinner or nothing.

      const LoadingContext = createContext(null);
      // LoadingContext value type: React.MutableRefObject<{ reason: "idle"|"loading", task }>

      const pendingMap = new WeakMap();

      const useTask = (task) => {
        const loadingRef = useContext(LoadingContext);
        const [, setTick] = useState(0);
        useEffect(() => {
          return task.subscribe(() => {
            setTick((n) => n + 1);
          });
        }, [task]);

        if (task.state === "resolved") return task.result;
        if (task.state === "rejected") {
          const error = task.error;
          error.task = task;
          throw error;
        }
        // idle (with stale data after dismiss) — return stale result immediately
        if (task.state === "idle" && task.result !== null) return task.result;

        // idle (no data) or running — suspend
        const reason = task.state === "running" ? "loading" : "idle";
        if (loadingRef) {
          loadingRef.current = { reason, task };
        }
        let p = pendingMap.get(task);
        if (!p) {
          p = new Promise((resolve) => {
            const unsub = task.subscribe((t) => {
              if (t.state !== "idle" && t.state !== "running") {
                // resolved or rejected — unblock Suspense
                pendingMap.delete(task);
                unsub();
                resolve();
              } else if (reason === "idle" && t.state === "running") {
                // idle→running transition: unblock so reason can be updated
                pendingMap.delete(task);
                unsub();
                resolve();
              }
            });
          });
          pendingMap.set(task, p);
        }
        throw p;
      };

      // ─── Loading ──────────────────────────────────────────────────────────────
      // Wraps Suspense. Provides LoadingContext so useTask can communicate the
      // reason for suspension. The fallback component reads that reason and
      // subscribes to the task to re-render when state changes.
      const LoadingFallback = ({ loadingRef, fallback }) => {
        const [, setTick] = useState(0);
        const { task } = loadingRef.current;
        useEffect(() => {
          if (!task) {
            return undefined;
          }
          return task.subscribe(() => {
            setTick((n) => n + 1);
          });
        }, [task]);
        if (loadingRef.current.reason === "loading") {
          return fallback;
        }
        return null;
      };

      const Loading = ({ fallback, children }) => {
        const loadingRef = useRef({ reason: "idle", task: null });
        return (
          <LoadingContext.Provider value={loadingRef}>
            <Suspense
              fallback={
                <LoadingFallback loadingRef={loadingRef} fallback={fallback} />
              }
            >
              {children}
            </Suspense>
          </LoadingContext.Provider>
        );
      };

      // ─── ErrorBoundary ────────────────────────────────────────────────────────
      // Reads error.task and subscribes to it — resets when the task re-runs.
      // Also hides children after dismissing with no stale data, until task re-runs.
      const ErrorBoundary = ({ children }) => {
        const [error, resetError] = useErrorBoundary();
        // null = not dismissed; "stale" = dismissed with data; "hidden" = dismissed without data
        const [dismissedTask, setDismissedTask] = useState(null);
        const [dismissMode, setDismissMode] = useState(null);

        useEffect(() => {
          if (!error) {
            return undefined;
          }
          // New error arrived — clear any previous dismiss state
          setDismissMode(null);
          setDismissedTask(null);
          const task = error.task;
          if (!task) {
            return undefined;
          }
          return task.subscribe((t) => {
            if (t.state === "running") {
              setDismissMode(null);
              resetError();
            }
          });
        }, [error]);

        useEffect(() => {
          if (!dismissedTask || dismissMode !== "hidden") {
            return undefined;
          }
          return dismissedTask.subscribe((t) => {
            if (t.state === "running") {
              setDismissMode(null);
              setDismissedTask(null);
            }
          });
        }, [dismissedTask, dismissMode]);

        if (error) {
          return (
            <div class="error">
              <strong>⚠️ Error caught by ErrorBoundary</strong>
              <div style="margin: 6px 0; font-family: monospace;">
                {error.message}
              </div>
              <button
                onClick={() => {
                  const task = error.task;
                  const hasStaleData = task && task.result !== null;
                  task?.reset();
                  setDismissedTask(task || null);
                  setDismissMode(hasStaleData ? "stale" : "hidden");
                  resetError();
                }}
              >
                Dismiss
              </button>
            </div>
          );
        }
        if (dismissMode === "hidden") {
          return null;
        }
        return children;
      };

      // ─── Child component that suspends ────────────────────────────────────────
      // Data is always non-null here — useTask() enforces this via spec #2.
      const Child = ({ task }) => {
        const data = useTask(task);
        return (
          <div class="card">
            ✅ Result: <strong>{data}</strong>
          </div>
        );
      };

      // ─── Tasks live outside JSX ───────────────────────────────────────────────
      const myTask = makeTask();

      // ─── App ──────────────────────────────────────────────────────────────────
      const App = () => {
        return (
          <div>
            <h1>Suspense + ErrorBoundary repro</h1>
            <h2>Controls</h2>
            <button
              onClick={() => {
                runTask(myTask, false);
              }}
            >
              ✅ Fetch (success)
            </button>
            <button
              onClick={() => {
                runTask(myTask, true);
              }}
            >
              ❌ Fetch (fail)
            </button>
            <h2>Output</h2>
            <ErrorBoundary>
              <Loading fallback={<div class="loading">Loading…</div>}>
                <Child task={myTask} />
              </Loading>
            </ErrorBoundary>
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
