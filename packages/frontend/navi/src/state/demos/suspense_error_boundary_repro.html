<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Suspense + ErrorBoundary repro</title>
    <style>
      body {
        margin: 20px;
        font-family: system-ui, sans-serif;
      }
      button {
        margin-right: 8px;
        padding: 6px 14px;
        cursor: pointer;
      }
      .error {
        margin-top: 12px;
        padding: 12px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
      .card {
        margin-top: 12px;
        padding: 12px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .loading {
        margin-top: 12px;
        padding: 12px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      h2 {
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Suspense } from "preact/compat";
      import { useState, useEffect, useErrorBoundary } from "preact/hooks";

      // ─── Task ─────────────────────────────────────────────────────────────────
      // Tasks live outside JSX so they survive component lifecycle.
      // They have a subscribe() so ErrorBoundary can react when the task re-runs.

      const makeTask = () => {
        const listeners = new Set();
        const task = {
          state: "idle",
          result: null,
          error: null,
          subscribe: (fn) => {
            listeners.add(fn);
            return () => {
              listeners.delete(fn);
            };
          },
          reset: () => {
            task.state = "idle";
            task.error = null;
            // keep task.result so previous data is visible after dismiss
            task._notify();
          },
          _notify: () => {
            for (const fn of listeners) {
              fn(task);
            }
          },
        };
        return task;
      };

      const runTask = (task, shouldFail) => {
        task.state = "running";
        task.error = null;
        // keep task.result so previous data is available during re-run
        task._notify();
        setTimeout(() => {
          if (shouldFail) {
            task.state = "rejected";
            task.error = new Error("Server error: something went wrong");
          } else {
            task.state = "resolved";
            task.result = "Hello, world!";
          }
          task._notify();
        }, 800);
      };

      // ─── useTask ──────────────────────────────────────────────────────────────
      // Subscribes to task for re-renders. Throws a promise while running,
      // throws error (with error.task = task) if rejected, returns result if resolved.

      const pendingMap = new WeakMap();

      const useTask = (task) => {
        const [, setTick] = useState(0);
        useEffect(() => {
          return task.subscribe(() => {
            setTick((n) => n + 1);
          });
        }, [task]);

        if (task.state === "idle") return task.result;
        if (task.state === "resolved") return task.result;
        if (task.state === "rejected") {
          const error = task.error;
          error.task = task;
          throw error;
        }
        // running — suspend
        let p = pendingMap.get(task);
        if (!p) {
          p = new Promise((resolve) => {
            const unsub = task.subscribe((t) => {
              if (t.state !== "running") {
                pendingMap.delete(task);
                unsub();
                resolve();
              }
            });
          });
          pendingMap.set(task, p);
        }
        throw p;
      };

      // ─── ErrorBoundary ────────────────────────────────────────────────────────
      // Reads error.task and subscribes to it — resets when the task re-runs.
      const ErrorBoundary = ({ children }) => {
        const [error, resetError] = useErrorBoundary();
        const [dismissed, setDismissed] = useState(false);

        useEffect(() => {
          if (!error) {
            return undefined;
          }
          // New error arrived — ensure dismissed is cleared so the fallback shows
          setDismissed(false);
          const task = error.task;
          if (!task) {
            return undefined;
          }
          return task.subscribe((t) => {
            if (t.state === "running") {
              setDismissed(false);
              resetError();
            }
          });
        }, [error]);

        if (error && !dismissed) {
          return (
            <div class="error">
              <strong>⚠️ Error caught by ErrorBoundary</strong>
              <div style="margin: 6px 0; font-family: monospace;">
                {error.message}
              </div>
              <button
                onClick={() => {
                  const task = error.task;
                  const hasStaleData = task && task.result !== null;
                  task?.reset();
                  if (hasStaleData) {
                    setDismissed(true);
                  }
                  resetError();
                }}
              >
                Dismiss
              </button>
            </div>
          );
        }
        if (dismissed) {
          return children;
        }
        return children;
      };

      // ─── Child component that suspends ────────────────────────────────────────
      const Child = ({ task }) => {
        const data = useTask(task);
        return (
          <div class="card">
            ✅ Result: <strong>{data}</strong>
          </div>
        );
      };

      // ─── Tasks live outside JSX ───────────────────────────────────────────────
      const myTask = makeTask();

      // ─── App ──────────────────────────────────────────────────────────────────
      const App = () => {
        const [, setTick] = useState(0);
        useEffect(() => {
          return myTask.subscribe(() => {
            setTick((n) => n + 1);
          });
        }, []);

        const showChild = myTask.state !== "idle" || myTask.result !== null;

        return (
          <div>
            <h1>Suspense + ErrorBoundary repro</h1>
            <h2>Controls</h2>
            <button
              onClick={() => {
                runTask(myTask, false);
              }}
            >
              ✅ Fetch (success)
            </button>
            <button
              onClick={() => {
                runTask(myTask, true);
              }}
            >
              ❌ Fetch (fail)
            </button>
            <h2>Output</h2>
            <ErrorBoundary>
              <Suspense fallback={<div class="loading">Loading…</div>}>
                {showChild && <Child task={myTask} />}
              </Suspense>
            </ErrorBoundary>
          </div>
        );
      };

      render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
