<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading + ErrorBoundary Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      h2 {
        margin-bottom: 4px;
      }
      .demo-section {
        margin-bottom: 40px;
        padding: 16px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-description {
        margin: 0 0 12px;
        color: #555;
        font-size: 0.9em;
        line-height: 1.5;
      }
      .buttons {
        display: flex;
        margin-bottom: 12px;
        gap: 8px;
      }
      .card {
        margin-top: 12px;
        padding: 16px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .card-field {
        display: flex;
        margin-top: 6px;
        align-items: center;
        gap: 6px;
        font-size: 0.95em;
      }
      .card-label {
        min-width: 48px;
        color: #888;
        font-size: 0.85em;
      }
      .skeleton {
        display: inline-block;
        height: 1em;
        background: linear-gradient(
          90deg,
          #e0e0e0 25%,
          #f0f0f0 50%,
          #e0e0e0 75%
        );
        background-size: 200% 100%;
        border-radius: 4px;
        animation: shimmer 1.2s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .card-loading {
        margin-top: 12px;
        padding: 16px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      .card-error {
        margin-top: 12px;
        padding: 16px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { signal } from "@preact/signals";
      import { useEffect, useState } from "preact/hooks";
      import {
        createAction,
        useAsyncData,
        Loading,
        ErrorBoundary,
        Button,
      } from "@jsenv/navi";

      const delay = (ms) => new Promise((res) => setTimeout(res, ms));

      const DemoSection = ({ title, description, children }) => (
        <div class="demo-section">
          <h2>{title}</h2>
          <p class="demo-description">{description}</p>
          {children}
        </div>
      );

      const FetchControls = ({ action, shouldFail }) => (
        <div class="buttons">
          <Button action={action}>Fetch user</Button>
          <label
            style={{
              display: "flex",
              alignItems: "center",
              gap: "6px",
              fontSize: "0.9em",
              color: "#555",
              cursor: "pointer",
            }}
          >
            <input
              type="checkbox"
              checked={shouldFail.value}
              onChange={(e) => {
                shouldFail.value = e.target.checked;
              }}
            />
            Simulate server error
          </label>
        </div>
      );

      // ─── Action factory ───────────────────────────────────────────────────────

      const makeExample = (name) => {
        const shouldFail = signal(false);
        const action = createAction(
          async () => {
            await delay(800);
            if (shouldFail.peek()) {
              throw new Error("Network error: failed to fetch user");
            }
            return { name: "Alice", email: "alice@example.com" };
          },
          { name },
        );
        return { action, shouldFail };
      };

      // ─── UserCard variants ────────────────────────────────────────────────────

      const UserCardFields = ({ name, email }) => (
        <div class="card">
          <div class="card-field">
            <span class="card-label">Name</span>
            <strong>{name}</strong>
          </div>
          <div class="card-field">
            <span class="card-label">Email</span>
            <span style={{ color: "#555" }}>{email}</span>
          </div>
        </div>
      );

      // Used with <Loading fallback>: suspends until data is ready.
      // The component itself never sees loading state.
      const UserCard = ({ action }) => {
        const { data: user } = useAsyncData(action);
        return <UserCardFields name={user.name} email={user.email} />;
      };

      // Used without <Loading fallback>: receives loading state and renders
      // skeleton placeholders while waiting. Same layout as UserCard.
      const UserCardWithSkeleton = ({ action }) => {
        const { data: user, loading } = useAsyncData(action);
        if (!user && !loading) {
          return null;
        }
        return (
          <UserCardFields
            name={
              loading ? (
                <span class="skeleton" style={{ width: "80px" }} />
              ) : (
                user.name
              )
            }
            email={
              loading ? (
                <span class="skeleton" style={{ width: "140px" }} />
              ) : (
                user.email
              )
            }
          />
        );
      };

      const ErrorCard = ({ error, resetError }) => (
        <div class="card-error">
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              marginBottom: "8px",
            }}
          >
            <span style={{ fontSize: "1.2em" }}>⚠️</span>
            <strong>Error caught by ErrorBoundary</strong>
          </div>
          <div
            style={{
              fontFamily: "monospace",
              fontSize: "0.9em",
              marginBottom: "12px",
            }}
          >
            {error.message}
          </div>
          <Button onClick={resetError}>Dismiss</Button>
        </div>
      );

      // ─── Component-managed loading ──────────────────────────────────────────

      const ex1 = makeExample("fetchUser1");
      const ExampleComponentManagedLoading = () => {
        const [started, setStarted] = useState(false);
        return (
          <DemoSection
            title="Component-managed loading"
            description="useAsyncData() returns { data, loading } when there is no <Loading fallback> above.
The component renders skeleton placeholders itself while waiting. No Suspense boundary involved."
          >
            <FetchControls
              action={() => {
                setStarted(true);
                return ex1.action.rerun();
              }}
              shouldFail={ex1.shouldFail}
            />
            {started && <UserCardWithSkeleton action={ex1.action} />}
          </DemoSection>
        );
      };

      // ─── Suspense-managed loading ───────────────────────────────────────────

      const ex3 = makeExample("fetchUser3");
      const ExampleSuspenseManagedLoading = () => {
        const [started, setStarted] = useState(false);
        return (
          <DemoSection
            title="Suspense-managed loading"
            description="When a fallback is provided, <Loading> wraps children in <Suspense>.
useAsyncData() throws a promise while loading — the component never sees loading state and only renders once data is ready."
          >
            <FetchControls
              action={() => {
                setStarted(true);
                return ex3.action.rerun();
              }}
              shouldFail={ex3.shouldFail}
            />
            {started && (
              <Loading fallback={<div class="card-loading">Loading…</div>}>
                <UserCard action={ex3.action} />
              </Loading>
            )}
          </DemoSection>
        );
      };

      // ─── Error boundary + Suspense ──────────────────────────────────────────

      const ex4 = makeExample("fetchUser4");
      const ExampleErrorBoundaryWithSuspense = () => {
        const [started, setStarted] = useState(false);
        return (
          <DemoSection
            title="Error boundary + Suspense"
            description="ErrorBoundary catches errors thrown by useAsyncData().
Dismiss hides the error boundary and renders nothing until the action settles.
Re-fetching auto-dismisses the error boundary."
          >
            <FetchControls
              action={() => {
                setStarted(true);
                return ex4.action.rerun();
              }}
              shouldFail={ex4.shouldFail}
            />
            {started && (
              <ErrorBoundary fallback={ErrorCard}>
                <Loading fallback={<div class="card-loading">Loading…</div>}>
                  <UserCard action={ex4.action} />
                </Loading>
              </ErrorBoundary>
            )}
          </DemoSection>
        );
      };

      // ─── Stale-while-revalidate ──────────────────────────────────────────────

      // Keeps showing the last known data while a re-fetch is in progress.
      // On first load (no previous data): shows skeleton.
      // On re-fetch: shows current data with a "Refreshing…" badge.
      const UserCardStaleWhileRevalidate = ({ action }) => {
        const { data: freshUser, loading } = useAsyncData(action);
        const [lastUser, setLastUser] = useState(null);

        useEffect(() => {
          if (freshUser) {
            setLastUser(freshUser);
          }
        }, [freshUser]);

        const displayUser = freshUser || lastUser;

        if (!displayUser) {
          // Initial load — show skeleton at card size
          return (
            <UserCardFields
              name={<span class="skeleton" style={{ width: "80px" }} />}
              email={<span class="skeleton" style={{ width: "140px" }} />}
            />
          );
        }
        return (
          <div>
            <UserCardFields name={displayUser.name} email={displayUser.email} />
            {loading && (
              <div
                style={{
                  marginTop: "8px",
                  fontSize: "0.85em",
                  color: "#888",
                  fontStyle: "italic",
                }}
              >
                Refreshing…
              </div>
            )}
          </div>
        );
      };

      const ex5 = makeExample("fetchUser5");
      const ExampleStaleWhileRevalidate = () => {
        const [started, setStarted] = useState(false);
        return (
          <DemoSection
            title="Stale-while-revalidate"
            description="The component keeps showing the last known data while a re-fetch is in progress.
On first load it shows skeleton placeholders. On re-fetch it shows the current data with a refreshing indicator."
          >
            <FetchControls
              action={() => {
                setStarted(true);
                return ex5.action.rerun();
              }}
              shouldFail={ex5.shouldFail}
            />
            {started && <UserCardStaleWhileRevalidate action={ex5.action} />}
          </DemoSection>
        );
      };

      const App = () => (
        <div>
          <h1>Loading + ErrorBoundary Demo</h1>
          <ExampleComponentManagedLoading />
          <ExampleSuspenseManagedLoading />
          <ExampleErrorBoundaryWithSuspense />
          <ExampleStaleWhileRevalidate />
        </div>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
