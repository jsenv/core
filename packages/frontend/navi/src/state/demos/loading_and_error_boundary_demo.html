<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading + ErrorBoundary Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      h2 {
        margin-bottom: 4px;
      }
      .demo-section {
        margin-bottom: 40px;
        padding: 16px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-description {
        margin: 0 0 12px;
        color: #555;
        font-size: 0.9em;
        line-height: 1.5;
      }
      .state-badges {
        display: flex;
        margin-bottom: 14px;
        flex-wrap: wrap;
        gap: 16px;
      }
      .state-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8em;
      }
      .state-badge-label {
        color: #888;
        font-weight: 500;
        font-size: 0.85em;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .badge {
        padding: 2px 8px;
        font-weight: 500;
        font-size: 0.9em;
        border: 1px solid transparent;
        border-radius: 12px;
      }
      .badge-component {
        color: #1565c0;
        background: #e8f4fd;
        border-color: #90caf9;
      }
      .badge-delegated {
        color: #6a1b9a;
        background: #f3e8fd;
        border-color: #ce93d8;
      }
      .demo-variant {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px dashed #e0e0e0;
      }
      .demo-variant-title {
        margin: 0 0 4px;
        color: #444;
        font-weight: 600;
        font-size: 0.9em;
      }
      .demo-variant-description {
        margin: 0 0 10px;
        color: #777;
        font-size: 0.85em;
      }
      .buttons {
        display: flex;
        margin-bottom: 12px;
        gap: 8px;
      }
      .card {
        margin-top: 12px;
        padding: 16px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .card-field {
        display: flex;
        margin-top: 6px;
        align-items: center;
        gap: 6px;
        font-size: 0.95em;
      }
      .card-label {
        min-width: 48px;
        color: #888;
        font-size: 0.85em;
      }
      .skeleton {
        display: inline-block;
        height: 1em;
        background: linear-gradient(
          90deg,
          #e0e0e0 25%,
          #f0f0f0 50%,
          #e0e0e0 75%
        );
        background-size: 200% 100%;
        border-radius: 4px;
        animation: shimmer 1.2s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .card-loading {
        margin-top: 12px;
        padding: 16px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      .card-error {
        margin-top: 12px;
        padding: 16px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { signal } from "@preact/signals";
      import { useEffect, useState } from "preact/hooks";
      import {
        createAction,
        useAsyncData,
        Loading,
        ErrorBoundary,
        Button,
      } from "@jsenv/navi";

      const delay = (ms) => new Promise((res) => setTimeout(res, ms));

      const DemoSection = ({ title, titleExtra, description, children }) => (
        <div class="demo-section">
          <h2 style={{ display: "flex", alignItems: "center", gap: "12px" }}>
            {title}
            {titleExtra}
          </h2>
          {description && <p class="demo-description">{description}</p>}
          {children}
        </div>
      );

      const FetchControls = ({ action, shouldFail }) => (
        <div class="buttons">
          <Button actionErrorEffect="ignore" action={action}>
            Fetch user
          </Button>
          <label
            style={{
              display: "flex",
              alignItems: "center",
              gap: "6px",
              fontSize: "0.9em",
              color: "#555",
              cursor: "pointer",
            }}
          >
            <input
              type="checkbox"
              checked={shouldFail.value}
              onChange={(e) => {
                shouldFail.value = e.target.checked;
              }}
            />
            Simulate server error
          </label>
        </div>
      );

      // ─── Action factory ───────────────────────────────────────────────────────

      const makeExample = (name) => {
        const shouldFail = signal(false);
        const action = createAction(
          async () => {
            await delay(800);
            if (shouldFail.peek()) {
              throw new Error("Network error: failed to fetch user");
            }
            return { name: "Alice", email: "alice@example.com" };
          },
          { name },
        );
        return { action, shouldFail };
      };

      // ─── UserCard variants ────────────────────────────────────────────────────

      const UserCardFields = ({
        name,
        email,
        count,
        onIncrement,
        outerCount,
      }) => (
        <div class="card">
          <div class="card-field">
            <span class="card-label">Name</span>
            <strong>{name}</strong>
          </div>
          <div class="card-field">
            <span class="card-label">Email</span>
            <span style={{ color: "#555" }}>{email}</span>
          </div>
          {outerCount !== undefined && (
            <div class="card-field">
              <span class="card-label">Outer</span>
              <span>{outerCount}</span>
            </div>
          )}
          <div class="card-field" style={{ marginTop: "10px" }}>
            <button onClick={onIncrement} disabled={!onIncrement}>
              Count:{" "}
              {count !== null && count !== undefined ? (
                count
              ) : (
                <span
                  class="skeleton"
                  style={{ width: "20px", verticalAlign: "middle" }}
                />
              )}
            </button>
          </div>
        </div>
      );

      const ErrorCard = ({ error, resetError }) => (
        <div class="card-error">
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              marginBottom: "8px",
            }}
          >
            <span style={{ fontSize: "1.2em" }}>⚠️</span>
            <strong>Error caught by ErrorBoundary</strong>
          </div>
          <div
            style={{
              fontFamily: "monospace",
              fontSize: "0.9em",
              marginBottom: "12px",
            }}
          >
            {error.message}
          </div>
          <Button onClick={resetError}>Dismiss</Button>
        </div>
      );

      // ─── Manages nothing ──────────────────────────────────────────────────────

      // Suspends until data is ready — never sees loading or error state.
      const UserCard = ({ action, outerCount }) => {
        const user = useAsyncData(action);
        const [count, setCount] = useState(0);
        return (
          <UserCardFields
            name={user.name}
            email={user.email}
            count={count}
            onIncrement={() => setCount((n) => n + 1)}
            outerCount={outerCount}
          />
        );
      };

      const exManagesNothing = makeExample("fetchUser1");
      const ManagesNothingDemo = () => {
        const [started, setStarted] = useState(false);
        const [outerCount, setOuterCount] = useState(0);
        return (
          <DemoSection
            title="Manages nothing"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="Neither loading nor errors reach the component: it only ever renders with ready data. Loading bubbles up to nearest <Loading>, error bubbles up to nearest <ErrorBoundary>."
          >
            <FetchControls
              action={() => {
                setStarted(true);
                return exManagesNothing.action.rerun();
              }}
              shouldFail={exManagesNothing.shouldFail}
            />
            {started && (
              <ErrorBoundary fallback={ErrorCard}>
                <Loading fallback={<div class="card-loading">Loading…</div>}>
                  <UserCard
                    action={exManagesNothing.action}
                    outerCount={outerCount}
                  />
                </Loading>
              </ErrorBoundary>
            )}
          </DemoSection>
        );
      };

      // ─── Manages loading ──────────────────────────────────────────────────────

      // Receives { loading } and renders skeleton placeholders while waiting.

      const exManagesLoading = makeExample("fetchUser2");
      const ManagesLoadingDemo = () => {
        const [started, setStarted] = useState(false);
        const [outerCount, setOuterCount] = useState(0);
        return (
          <DemoSection
            title="Manages loading"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="The skeleton lives in <Loading fallback> alongside the component, not inside it. This keeps UserCard always pure, at the cost of co-locating the skeleton with the usage site rather than the component definition. Loading/error bubble up to their respective parents — tradeoff: more dev work per usage, better UX (skeleton matches the card shape)."
          >
            <FetchControls
              action={() => {
                setStarted(true);
                return exManagesLoading.action.rerun();
              }}
              shouldFail={exManagesLoading.shouldFail}
            />
            {started && (
              <ErrorBoundary fallback={ErrorCard}>
                <Loading fallback={<UserCardSkeleton />}>
                  <UserCard
                    action={exManagesLoading.action}
                    outerCount={outerCount}
                  />
                </Loading>
              </ErrorBoundary>
            )}
          </DemoSection>
        );
      };
      const UserCardSkeleton = () => {
        return (
          <UserCardFields
            name={<span class="skeleton" style={{ width: "80px" }} />}
            email={<span class="skeleton" style={{ width: "140px" }} />}
          />
        );
      };

      // ─── Manages loading and error ────────────────────────────────────────────

      // Handles loading and error entirely — no ErrorBoundary or Loading needed.
      const UserCardWithErrorHandling = ({ action }) => {
        const { data: user, loading, error } = useAsyncData(action);
        const [count, setCount] = useState(0);
        if (error) {
          return (
            <div class="card-error">
              <span style={{ fontSize: "1.2em" }}>⚠️</span> {error.message}
            </div>
          );
        }
        return (
          <UserCardFields
            name={
              loading ? (
                <span class="skeleton" style={{ width: "80px" }} />
              ) : (
                user.name
              )
            }
            email={
              loading ? (
                <span class="skeleton" style={{ width: "140px" }} />
              ) : (
                user.email
              )
            }
            count={count}
            onIncrement={() => setCount((n) => n + 1)}
          />
        );
      };

      const exManagesLoadingAndError = makeExample("fetchUser3");
      const ManagesLoadingAndErrorDemo = () => {
        const [started, setStarted] = useState(false);
        return (
          <DemoSection
            title="Manages loading and error"
            description="The component handles everything itself. No ErrorBoundary or Loading needed."
          >
            <FetchControls
              action={() => {
                setStarted(true);
                return exManagesLoadingAndError.action.rerun();
              }}
              shouldFail={exManagesLoadingAndError.shouldFail}
            />
            {started && (
              <UserCardWithErrorHandling
                action={exManagesLoadingAndError.action}
              />
            )}
          </DemoSection>
        );
      };

      // ─── Manages loading (stale-while-revalidate variant) ─────────────────────

      // Shows previous data while re-fetching instead of going back to skeletons.
      const UserCardStaleWhileRevalidate = ({ action }) => {
        const { data: freshUser, loading } = useAsyncData(action);
        const [count, setCount] = useState(0);
        const [lastUser, setLastUser] = useState(null);

        useEffect(() => {
          if (freshUser) {
            setLastUser(freshUser);
          }
        }, [freshUser]);

        const displayUser = freshUser || lastUser;

        if (!displayUser) {
          return (
            <UserCardFields
              name={<span class="skeleton" style={{ width: "80px" }} />}
              email={<span class="skeleton" style={{ width: "140px" }} />}
            />
          );
        }
        return (
          <div>
            <UserCardFields
              name={displayUser.name}
              email={displayUser.email}
              count={count}
              onIncrement={() => setCount((n) => n + 1)}
            />
            {loading && (
              <div
                style={{
                  marginTop: "8px",
                  fontSize: "0.85em",
                  color: "#888",
                  fontStyle: "italic",
                }}
              >
                Refreshing…
              </div>
            )}
          </div>
        );
      };

      const exStaleWhileRevalidate = makeExample("fetchUser4");
      const StaleWhileRevalidateDemo = () => {
        const [started, setStarted] = useState(false);
        return (
          <DemoSection
            title="Manages loading (stale-while-revalidate variant)"
            description="Shows the previous data while re-fetching instead of going back to skeletons. Errors bubble up to the nearest <ErrorBoundary>."
          >
            <FetchControls
              action={() => {
                setStarted(true);
                return exStaleWhileRevalidate.action.rerun();
              }}
              shouldFail={exStaleWhileRevalidate.shouldFail}
            />
            {started && (
              <ErrorBoundary fallback={ErrorCard}>
                <UserCardStaleWhileRevalidate
                  action={exStaleWhileRevalidate.action}
                />
              </ErrorBoundary>
            )}
          </DemoSection>
        );
      };

      const App = () => (
        <div>
          <h1>Loading + ErrorBoundary Demo</h1>
          <ManagesNothingDemo />
          <ManagesLoadingDemo />
          <ManagesLoadingAndErrorDemo />
          <StaleWhileRevalidateDemo />
        </div>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
