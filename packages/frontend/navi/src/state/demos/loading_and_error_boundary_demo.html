<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading + ErrorBoundary Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      h2 {
        margin-bottom: 4px;
      }
      .demo-section {
        margin-bottom: 40px;
        padding: 16px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-description {
        margin: 0 0 12px;
        color: #555;
        font-size: 0.9em;
        line-height: 1.5;
      }
      .buttons {
        display: flex;
        margin-bottom: 12px;
        gap: 8px;
      }
      .card {
        margin-top: 12px;
        padding: 16px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .card-field {
        display: flex;
        margin-top: 6px;
        align-items: center;
        gap: 6px;
        font-size: 0.95em;
      }
      .card-label {
        min-width: 48px;
        color: #888;
        font-size: 0.85em;
      }
      .skeleton {
        display: inline-block;
        height: 1em;
        background: linear-gradient(
          90deg,
          #e0e0e0 25%,
          #f0f0f0 50%,
          #e0e0e0 75%
        );
        background-size: 200% 100%;
        border-radius: 4px;
        animation: shimmer 1.2s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .card-loading {
        margin-top: 12px;
        padding: 16px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      .card-error {
        margin-top: 12px;
        padding: 16px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        createAction,
        useAsyncData,
        Loading,
        ErrorBoundary,
        Button,
      } from "@jsenv/navi";

      const delay = (ms) => new Promise((res) => setTimeout(res, ms));
      const useFunction = (v) => {
        const [fn, setFunction] = useState(v);
        return [fn, (v) => setFunction(() => v)];
      };

      const DemoSection = ({ title, description, children }) => (
        <div class="demo-section">
          <h2>{title}</h2>
          <p class="demo-description">{description}</p>
          {children}
        </div>
      );

      const ActionButtons = ({ onSuccess, onFail }) => (
        <div class="buttons">
          <Button action={onSuccess}>Fetch user (success)</Button>
          <Button action={onFail}>Fetch user (fail)</Button>
        </div>
      );

      // ─── Shared actions per example ───────────────────────────────────────────

      const makeActions = (name) => ({
        success: createAction(
          async () => {
            await delay(800);
            return { name: "Alice", email: "alice@example.com" };
          },
          { name: `${name}Success` },
        ),
        fail: createAction(
          async () => {
            console.log("start running fail action");
            await delay(800);
            throw new Error("Network error: failed to fetch user");
          },
          { name: `${name}Fail` },
        ),
      });

      // ─── UserCard variants ────────────────────────────────────────────────────

      const UserCardFields = ({ name, email }) => (
        <div class="card">
          <div class="card-field">
            <span class="card-label">Name</span>
            <strong>{name}</strong>
          </div>
          <div class="card-field">
            <span class="card-label">Email</span>
            <span style={{ color: "#555" }}>{email}</span>
          </div>
        </div>
      );

      // Used with <Loading fallback>: suspends until data is ready.
      // The component itself never sees loading state.
      const UserCard = ({ action }) => {
        const { data: user } = useAsyncData(action);
        return <UserCardFields name={user.name} email={user.email} />;
      };

      // Used without <Loading fallback>: receives loading state and renders
      // skeleton placeholders while waiting. Same layout as UserCard.
      const UserCardWithSkeleton = ({ action }) => {
        const { data: user, loading } = useAsyncData(action);
        if (!user && !loading) {
          return null;
        }
        return (
          <UserCardFields
            name={
              loading ? (
                <span class="skeleton" style={{ width: "80px" }} />
              ) : (
                user.name
              )
            }
            email={
              loading ? (
                <span class="skeleton" style={{ width: "140px" }} />
              ) : (
                user.email
              )
            }
          />
        );
      };

      const ErrorCard = ({ error, resetError }) => (
        <div class="card-error">
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              marginBottom: "8px",
            }}
          >
            <span style={{ fontSize: "1.2em" }}>⚠️</span>
            <strong>Error caught by ErrorBoundary</strong>
          </div>
          <div
            style={{
              fontFamily: "monospace",
              fontSize: "0.9em",
              marginBottom: "12px",
            }}
          >
            {error.message}
          </div>
          <Button onClick={resetError}>Dismiss</Button>
        </div>
      );

      // ─── Example 1: Component handles loading itself ──────────────────────────

      const ex1 = makeActions("ex1");
      const Example1 = () => {
        const [action, setAction] = useFunction();
        return (
          <DemoSection
            title="1. Component handles loading (no <Loading>)"
            description="useAsyncData() returns { data, loading } when there is no <Loading fallback> above.
The component decides how to render each state. No Suspense boundary is involved."
          >
            <ActionButtons
              onSuccess={() => {
                setAction(ex1.success);
                return ex1.success.rerun();
              }}
              onFail={() => {
                setAction(ex1.fail);
                return ex1.fail.rerun();
              }}
            />
            {action && <UserCardWithSkeleton action={action} />}
          </DemoSection>
        );
      };

      // ─── Example 2: <Loading> without fallback ────────────────────────────────

      const ex2 = makeActions("ex2");
      const Example2 = () => {
        const [action, setAction] = useFunction();
        return (
          <DemoSection
            title="2. <Loading> without fallback"
            description="<Loading> with no fallback prop still provides the LoadingContext but does not wrap with Suspense.
useAsyncData() returns { data, loading } — same as example 1. The component handles the state."
          >
            <ActionButtons
              onSuccess={() => {
                setAction(ex2.success);
                return ex2.success.rerun();
              }}
              onFail={() => {
                setAction(ex2.fail);
                return ex2.fail.rerun();
              }}
            />
            {action && (
              <Loading>
                <UserCardWithSkeleton action={action} />
              </Loading>
            )}
          </DemoSection>
        );
      };

      // ─── Example 3: <Loading fallback> — Suspense with loading skeleton ───────

      const ex3 = makeActions("ex3");
      const Example3 = () => {
        const [action, setAction] = useFunction();
        return (
          <DemoSection
            title="3. <Loading fallback> — Suspense loading skeleton"
            description="When fallback is provided, <Loading> wraps children in <Suspense>.
useAsyncData() throws a promise while loading, causing the fallback to show.
The component only renders once data is ready — it never sees loading state."
          >
            <ActionButtons
              onSuccess={() => {
                setAction(ex3.success);
                return ex3.success.rerun();
              }}
              onFail={() => {
                setAction(ex3.fail);
                return ex3.fail.rerun();
              }}
            />
            {action && (
              <Loading fallback={<div class="card-loading">Loading…</div>}>
                <UserCard action={action} />
              </Loading>
            )}
          </DemoSection>
        );
      };

      // ─── Example 4: <Loading fallback> + <ErrorBoundary> ─────────────────────

      const ex4 = makeActions("ex4");
      const Example4 = () => {
        const [action, setAction] = useFunction();
        return (
          <DemoSection
            title="4. <ErrorBoundary> + <Loading fallback>"
            description="ErrorBoundary catches errors thrown by useAsyncData().
Dismiss hides the error and silences the loading fallback until the action settles again.
Re-fetching auto-dismisses the error and shows nothing until data arrives."
          >
            <div class="buttons">
              <Button
                onActionStart={() => {
                  setAction(ex4.success);
                }}
                action={ex4.success}
              >
                Fetch user (success)
              </Button>
              <Button
                actionErrorEffect="ignore"
                onActionStart={() => {
                  setAction(ex4.fail);
                }}
                action={ex4.fail}
              >
                Fetch user (fail)
              </Button>
            </div>

            {action && (
              <ErrorBoundary fallback={ErrorCard}>
                <Loading fallback={<div class="card-loading">Loading…</div>}>
                  <UserCard action={action} />
                </Loading>
              </ErrorBoundary>
            )}
          </DemoSection>
        );
      };

      // ─── Example 5: <ErrorBoundary> without <Loading> ────────────────────────

      const ex5 = makeActions("ex5");
      const Example5 = () => {
        const [action, setAction] = useFunction();
        return (
          <DemoSection
            title="5. <ErrorBoundary> with component-handled loading"
            description="ErrorBoundary catches errors. The component renders its own loading state.
Dismiss works — action resets to idle. No Suspense involved."
          >
            <ActionButtons
              onSuccess={() => {
                setAction(ex5.success);
                return ex5.success.rerun();
              }}
              onFail={() => {
                setAction(ex5.fail);
                return ex5.fail.rerun();
              }}
            />
            {action && (
              <ErrorBoundary fallback={ErrorCard}>
                <UserCardWithSkeleton action={action} />
              </ErrorBoundary>
            )}
          </DemoSection>
        );
      };

      const App = () => (
        <div>
          <h1>Loading + ErrorBoundary Demo</h1>
          <Example1 />
          <Example2 />
          <Example3 />
          <Example4 />
          <Example5 />
        </div>
      );

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
