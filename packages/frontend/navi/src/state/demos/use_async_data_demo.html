<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading + ErrorBoundary Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      h2 {
        margin-bottom: 4px;
      }
      .demo-section {
        margin-bottom: 40px;
        padding: 16px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-description {
        margin: 0 0 12px;
        color: #555;
        font-size: 0.9em;
        line-height: 1.5;
      }
      .state-badges {
        display: flex;
        margin-bottom: 14px;
        flex-wrap: wrap;
        gap: 16px;
      }
      .state-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8em;
      }
      .state-badge-label {
        color: #888;
        font-weight: 500;
        font-size: 0.85em;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .badge {
        padding: 2px 8px;
        font-weight: 500;
        font-size: 0.9em;
        border: 1px solid transparent;
        border-radius: 12px;
      }
      .badge-component {
        color: #1565c0;
        background: #e8f4fd;
        border-color: #90caf9;
      }
      .badge-delegated {
        color: #6a1b9a;
        background: #f3e8fd;
        border-color: #ce93d8;
      }
      .demo-variant {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px dashed #e0e0e0;
      }
      .demo-variant-title {
        margin: 0 0 4px;
        color: #444;
        font-weight: 600;
        font-size: 0.9em;
      }
      .demo-variant-description {
        margin: 0 0 10px;
        color: #777;
        font-size: 0.85em;
      }
      .buttons {
        display: flex;
        margin-bottom: 12px;
        gap: 8px;
      }
      .card {
        margin-top: 12px;
        padding: 16px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .card-field {
        display: flex;
        margin-top: 6px;
        align-items: center;
        gap: 6px;
        font-size: 0.95em;
      }
      .card-label {
        min-width: 48px;
        color: #888;
        font-size: 0.85em;
      }
      .card-loading {
        margin-top: 12px;
        padding: 16px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      .card-error {
        margin-top: 12px;
        padding: 16px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { signal } from "@preact/signals";
      import { useState } from "preact/hooks";
      import {
        createAction,
        useAsyncData,
        Loading,
        ErrorBoundary,
        Button,
        TextPlaceholder,
      } from "@jsenv/navi";

      const delay = (ms) => new Promise((res) => setTimeout(res, ms));

      const App = () => (
        <div>
          <h1>Loading + ErrorBoundary Demo</h1>
          <ArchitectureSection />
          <ErrorBoundary fallback={ErrorCard}>
            <DelegatesBothDemo />

            <AllowStaleDemo />

            <ManagesErrorDemo />

            <ManagesLoadingDemo />
          </ErrorBoundary>
        </div>
      );

      const DemoSection = ({ title, titleExtra, description, children }) => (
        <div class="demo-section">
          <h2 style={{ display: "flex", alignItems: "center", gap: "12px" }}>
            {title}
            {titleExtra}
          </h2>
          {description && <p class="demo-description">{description}</p>}
          {children}
        </div>
      );

      const ArchitectureSection = () => (
        <div class="demo-section">
          <details>
            <summary style={{ cursor: "pointer" }}>
              <h2 style={{ display: "inline" }}>Architecture</h2>
            </summary>
            <p class="demo-description">
              <code>useAsyncData(action)</code> returns{" "}
              <code>[data, loading, error]</code>. Each value is present or not
              depending on whether you opt in to handle it:
            </p>
            <ul
              style={{
                margin: "0 0 12px",
                paddingLeft: "20px",
                color: "#555",
                fontSize: "0.9em",
                lineHeight: "1.7",
              }}
            >
              <li>
                By default, loading suspends (via <code>&lt;Loading&gt;</code>)
                and errors throw (via <code>&lt;ErrorBoundary&gt;</code>). If no
                ancestor handles them, the default browser behaviour applies
                (uncaught error, eternal suspension).
              </li>
              <li>
                Pass <code>loading: true</code> to receive the{" "}
                <code>loading</code> flag and handle it inline. The component
                never suspends — on first load <code>data</code> is{" "}
                <code>undefined</code> and <code>loading</code> is{" "}
                <code>true</code>. While re-fetching, <code>data</code> holds
                the previous value so the component can decide whether to show
                stale content alongside a spinner, or display a skeleton until
                fresh data arrives.
              </li>
              <li>
                Pass <code>error: true</code> to receive the <code>error</code>{" "}
                object and handle it inline instead of throwing.
              </li>
            </ul>
            <p class="demo-description">
              The moment a component has a specific UX for loading or error, it
              handles it directly rather than relying on bubble-up. Wrappers
              like <code>&lt;Loading&gt;</code> and{" "}
              <code>&lt;ErrorBoundary&gt;</code> act as a safety net for
              unhandled cases, not as the primary design.
            </p>
            <p class="demo-description">
              Handling inline also keeps the component mounted throughout the
              fetch lifecycle, preserving local state (counters, form input,
              scroll position). Using <code>&lt;Loading fallback&gt;</code>{" "}
              suspends the component: it unmounts and its state resets. That
              approach is still supported and works well for simple cases, but
              is shown last here as an alternative rather than the recommended
              default.
            </p>
          </details>
        </div>
      );

      const FetchControls = ({ action, shouldFail }) => (
        <div class="buttons">
          <Button actionErrorEffect="ignore" action={action}>
            Fetch user
          </Button>
          <label
            style={{
              display: "flex",
              alignItems: "center",
              gap: "6px",
              fontSize: "0.9em",
              color: "#555",
              cursor: "pointer",
            }}
          >
            <input
              type="checkbox"
              checked={shouldFail.value}
              onChange={(e) => {
                shouldFail.value = e.target.checked;
              }}
            />
            Simulate server error
          </label>
        </div>
      );

      const ErrorCard = ({ error, resetError }) => (
        <div class="card-error">
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              marginBottom: "8px",
            }}
          >
            <span style={{ fontSize: "1.2em" }}>⚠️</span>
            <strong>Error caught by ErrorBoundary</strong>
          </div>
          <div
            style={{
              fontFamily: "monospace",
              fontSize: "0.9em",
              marginBottom: "12px",
            }}
          >
            {error.message}
          </div>
          <Button onClick={resetError}>Dismiss</Button>
        </div>
      );

      // ─── Action factory ───────────────────────────────────────────────────────

      const makeExample = (name) => {
        const shouldFail = signal(false);
        const action = createAction(
          async () => {
            await delay(800);
            if (shouldFail.peek()) {
              throw new Error("Network error: failed to fetch user");
            }
            return { name: "Alice", email: "alice@example.com" };
          },
          { name },
        );
        return { action, shouldFail };
      };

      // ─── UserCard variants ────────────────────────────────────────────────────

      // Suspends until data is ready — never sees loading or error state.
      const UserCard = ({ action, outerCount }) => {
        const [user] = useAsyncData(action);
        const [count, setCount] = useState(0);
        return (
          <UserCardFields
            name={user.name}
            email={user.email}
            count={count}
            onIncrement={() => setCount((n) => n + 1)}
            outerCount={outerCount}
          />
        );
      };

      const UserCardFields = ({
        name,
        email,
        count,
        onIncrement,
        outerCount,
      }) => (
        <div class="card">
          <div class="card-field">
            <span class="card-label">Name</span>
            <strong>{name}</strong>
          </div>
          <div class="card-field">
            <span class="card-label">Email</span>
            <span style={{ color: "#555" }}>{email}</span>
          </div>
          {outerCount !== undefined && (
            <div class="card-field">
              <span class="card-label">Outer</span>
              <span>{outerCount}</span>
            </div>
          )}
          <div class="card-field" style={{ marginTop: "10px" }}>
            <button onClick={onIncrement} disabled={!onIncrement}>
              Count:{" "}
              {count !== null && count !== undefined ? (
                count
              ) : (
                <TextPlaceholder loading width="20" alignY="center" />
              )}
            </button>
          </div>
        </div>
      );

      // ─── Delegates both ───────────────────────────────────────────────────────
      const exDelegatesBoth = makeExample("fetchUser1");
      const DelegatesBothDemo = () => {
        const [outerCount, setOuterCount] = useState(0);
        return (
          <DemoSection
            title="Unhandled — bubbles up"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="Neither loading nor error is handled inline. Both bubble up to the nearest <Loading> and <ErrorBoundary> ancestors. This is the fallback behaviour when no custom UX is needed — not a pattern to aim for."
          >
            <FetchControls
              action={() => {
                return exDelegatesBoth.action.rerun();
              }}
              shouldFail={exDelegatesBoth.shouldFail}
            />
            <ErrorBoundary fallback={ErrorCard}>
              <Loading fallback={<div class="card-loading">Loading…</div>}>
                <UserCard
                  action={exDelegatesBoth.action}
                  outerCount={outerCount}
                />
              </Loading>
            </ErrorBoundary>
          </DemoSection>
        );
      };

      // ─── Handles loading with stale data ──────────────────────────────────────
      const exAllowStale = makeExample("fetchUser4");
      const AllowStaleDemo = () => {
        const [outerCount, setOuterCount] = useState(0);
        const [hideWhileLoading, setHideWhileLoading] = useState(false);
        return (
          <DemoSection
            title="Handles loading"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="Pass loading: true to receive the loading flag and handle it inside the component. The component never suspends. On first load data is undefined and loading is true — the component is responsible for showing a skeleton. While re-fetching, data holds the previous value so the component can keep showing stale content alongside a spinner."
          >
            <label
              style={{
                display: "flex",
                alignItems: "center",
                gap: "6px",
                marginBottom: "12px",
                fontSize: "0.9em",
                color: "#555",
                cursor: "pointer",
              }}
            >
              <input
                type="checkbox"
                checked={hideWhileLoading}
                onChange={(e) => {
                  setHideWhileLoading(e.target.checked);
                }}
              />
              Hide current user while loading new one (show skeleton instead)
            </label>
            <FetchControls
              action={() => {
                return exAllowStale.action.rerun();
              }}
              shouldFail={exAllowStale.shouldFail}
            />

            <ErrorBoundary fallback={ErrorCard}>
              <Loading>
                {hideWhileLoading ? (
                  <UserCardSkeletonWhileLoading
                    action={exAllowStale.action}
                    outerCount={outerCount}
                  />
                ) : (
                  <UserCardSkeletonFirstLoadOnly
                    action={exAllowStale.action}
                    outerCount={outerCount}
                  />
                )}
              </Loading>
            </ErrorBoundary>
          </DemoSection>
        );
      };
      // Shows skeleton on first load only — keeps stale data visible while re-fetching.
      const UserCardSkeletonFirstLoadOnly = ({ action, outerCount }) => {
        const [user, loading] = useAsyncData(action, { loading: true });
        const [count, setCount] = useState(0);
        if (!user) {
          return <UserCardSkeleton />;
        }
        return (
          <div>
            <UserCardFields
              name={user.name}
              email={user.email}
              count={count}
              onIncrement={() => setCount((n) => n + 1)}
              outerCount={outerCount}
            />
            {loading && <RefreshingIndicator />}
          </div>
        );
      };
      // Always shows skeleton while loading — hides stale data during re-fetch.
      const UserCardSkeletonWhileLoading = ({ action, outerCount }) => {
        const [user, loading] = useAsyncData(action, { loading: true });
        const [count, setCount] = useState(0);
        if (loading) {
          return <UserCardSkeleton />;
        }
        return (
          <UserCardFields
            name={user.name}
            email={user.email}
            count={count}
            onIncrement={() => setCount((n) => n + 1)}
            outerCount={outerCount}
          />
        );
      };
      const RefreshingIndicator = () => (
        <div
          style={{
            marginTop: "8px",
            fontSize: "0.85em",
            color: "#888",
            fontStyle: "italic",
          }}
        >
          Refreshing…
        </div>
      );

      // ─── Manages error ────────────────────────────────────────────────────────
      const exManagesError = makeExample("fetchUser3");
      const ManagesErrorDemo = () => {
        const [outerCount, setOuterCount] = useState(0);
        return (
          <DemoSection
            title="Handles loading and error"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="Pass both loading: true and error: true to handle everything inline. The component stays mounted throughout — local state is preserved across fetches. On first load, data is undefined and the component renders a skeleton itself."
          >
            <FetchControls
              action={() => {
                return exManagesError.action.rerun();
              }}
              shouldFail={exManagesError.shouldFail}
            />
            <Loading>
              <UserCardHandlesError
                action={exManagesError.action}
                outerCount={outerCount}
              />
            </Loading>
          </DemoSection>
        );
      };
      const UserCardHandlesError = ({ action, outerCount }) => {
        const [user, loading, error, dismissError] = useAsyncData(action, {
          loading: true,
          error: true,
        });
        const [count, setCount] = useState(0);
        if (error) {
          return (
            <div class="card-error">
              <span style={{ fontSize: "1.2em" }}>⚠️</span>{" "}
              <strong>Something went wrong</strong>
              <div
                style={{
                  fontFamily: "monospace",
                  fontSize: "0.9em",
                  margin: "8px 0",
                }}
              >
                {error.message}
              </div>
              <Button onClick={dismissError}>Dismiss</Button>
              <Button action={action}>Retry</Button>
            </div>
          );
        }
        if (loading && !user) {
          return <UserCardSkeleton />;
        }
        return (
          <>
            <UserCardFields
              name={user.name}
              email={user.email}
              count={count}
              onIncrement={() => setCount((n) => n + 1)}
              outerCount={outerCount}
            />
            {user && loading && <RefreshingIndicator />}
          </>
        );
      };

      // ─── External skeleton via <Loading fallback> ──────────────────────────────
      const exManagesLoading = makeExample("fetchUser2");
      const ManagesLoadingDemo = () => {
        const [outerCount, setOuterCount] = useState(0);
        return (
          <DemoSection
            title="Alternative: loading UI outside the component via <Loading fallback>"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="The skeleton is declared in <Loading fallback> outside the component. This works and keeps the component simple. The trade-off: the component suspends and unmounts while loading, so local state like the count resets on every fetch. Click Fetch and watch the counter reset."
          >
            <FetchControls
              action={() => {
                return exManagesLoading.action.rerun();
              }}
              shouldFail={exManagesLoading.shouldFail}
            />
            <ErrorBoundary fallback={ErrorCard}>
              <Loading fallback={UserCardSkeleton}>
                <UserCard
                  action={exManagesLoading.action}
                  outerCount={outerCount}
                />
              </Loading>
            </ErrorBoundary>
          </DemoSection>
        );
      };
      const UserCardSkeleton = () => {
        return (
          <UserCardFields
            name={<TextPlaceholder loading width="80" />}
            email={<TextPlaceholder loading width="140" />}
          />
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
