<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading + ErrorBoundary Demo</title>
    <style>
      body {
        margin: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      h2 {
        margin-bottom: 4px;
      }
      .demo-section {
        margin-bottom: 40px;
        padding: 16px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
      }
      .demo-description {
        margin: 0 0 12px;
        color: #555;
        font-size: 0.9em;
        line-height: 1.5;
      }
      .state-badges {
        display: flex;
        margin-bottom: 14px;
        flex-wrap: wrap;
        gap: 16px;
      }
      .state-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8em;
      }
      .state-badge-label {
        color: #888;
        font-weight: 500;
        font-size: 0.85em;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .badge {
        padding: 2px 8px;
        font-weight: 500;
        font-size: 0.9em;
        border: 1px solid transparent;
        border-radius: 12px;
      }
      .badge-component {
        color: #1565c0;
        background: #e8f4fd;
        border-color: #90caf9;
      }
      .badge-delegated {
        color: #6a1b9a;
        background: #f3e8fd;
        border-color: #ce93d8;
      }
      .demo-variant {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px dashed #e0e0e0;
      }
      .demo-variant-title {
        margin: 0 0 4px;
        color: #444;
        font-weight: 600;
        font-size: 0.9em;
      }
      .demo-variant-description {
        margin: 0 0 10px;
        color: #777;
        font-size: 0.85em;
      }
      .buttons {
        display: flex;
        margin-bottom: 12px;
        gap: 8px;
      }
      .card {
        margin-top: 12px;
        padding: 16px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .card-field {
        display: flex;
        margin-top: 6px;
        align-items: center;
        gap: 6px;
        font-size: 0.95em;
      }
      .card-label {
        min-width: 48px;
        color: #888;
        font-size: 0.85em;
      }
      .skeleton {
        display: inline-block;
        height: 1em;
        background: linear-gradient(
          90deg,
          #e0e0e0 25%,
          #f0f0f0 50%,
          #e0e0e0 75%
        );
        background-size: 200% 100%;
        border-radius: 4px;
        animation: shimmer 1.2s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .card-loading {
        margin-top: 12px;
        padding: 16px;
        color: #856404;
        background: #fff8e1;
        border: 1px solid #ffc107;
        border-radius: 6px;
      }
      .card-error {
        margin-top: 12px;
        padding: 16px;
        color: #900;
        background: #fdd;
        border: 1px solid #f44;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { signal } from "@preact/signals";
      import { useState } from "preact/hooks";
      import {
        createAction,
        useAsyncData,
        Loading,
        ErrorBoundary,
        Button,
      } from "@jsenv/navi";

      const delay = (ms) => new Promise((res) => setTimeout(res, ms));

      const App = () => (
        <div>
          <h1>Loading + ErrorBoundary Demo</h1>
          <ArchitectureSection />
          <DelegatesBothDemo />
          <ManagesLoadingDemo />
          <ManagesErrorDemo />
          <AllowStaleDemo />
        </div>
      );

      const DemoSection = ({ title, titleExtra, description, children }) => (
        <div class="demo-section">
          <h2 style={{ display: "flex", alignItems: "center", gap: "12px" }}>
            {title}
            {titleExtra}
          </h2>
          {description && <p class="demo-description">{description}</p>}
          {children}
        </div>
      );

      const ArchitectureSection = () => (
        <div class="demo-section">
          <details>
            <summary style={{ cursor: "pointer" }}>
              <h2 style={{ display: "inline" }}>Architecture</h2>
            </summary>
            <p class="demo-description">
              <code>useAsyncData(action)</code> returns{" "}
              <code>[data, loading, error]</code>. Each value is present or not
              depending on whether you opt in to handle it:
            </p>
            <ul
              style={{
                margin: "0 0 12px",
                paddingLeft: "20px",
                color: "#555",
                fontSize: "0.9em",
                lineHeight: "1.7",
              }}
            >
              <li>
                By default, loading suspends (via <code>&lt;Loading&gt;</code>)
                and errors throw (via <code>&lt;ErrorBoundary&gt;</code>). If no
                ancestor handles them, the default browser behaviour applies
                (uncaught error, eternal suspension).
              </li>
              <li>
                Pass <code>loading: true</code> to receive the{" "}
                <code>loading</code> flag and handle it inline. The component
                never suspends — on first load <code>data</code> is{" "}
                <code>undefined</code> and <code>loading</code> is{" "}
                <code>true</code>. While re-fetching, <code>data</code> holds
                the previous value so the component can decide whether to show
                stale content alongside a spinner, or display a skeleton until
                fresh data arrives.
              </li>
              <li>
                Pass <code>error: true</code> to receive the <code>error</code>{" "}
                object and handle it inline instead of throwing.
              </li>
            </ul>
            <p class="demo-description">
              The moment a component has a specific UX for loading or error, it
              handles it directly rather than relying on bubble-up. Wrappers
              like <code>&lt;Loading&gt;</code> and{" "}
              <code>&lt;ErrorBoundary&gt;</code> act as a safety net for
              unhandled cases, not as the primary design.
            </p>
          </details>
        </div>
      );

      const FetchControls = ({ action, shouldFail }) => (
        <div class="buttons">
          <Button actionErrorEffect="ignore" action={action}>
            Fetch user
          </Button>
          <label
            style={{
              display: "flex",
              alignItems: "center",
              gap: "6px",
              fontSize: "0.9em",
              color: "#555",
              cursor: "pointer",
            }}
          >
            <input
              type="checkbox"
              checked={shouldFail.value}
              onChange={(e) => {
                shouldFail.value = e.target.checked;
              }}
            />
            Simulate server error
          </label>
        </div>
      );

      // ─── Action factory ───────────────────────────────────────────────────────

      const makeExample = (name) => {
        const shouldFail = signal(false);
        const action = createAction(
          async () => {
            await delay(800);
            if (shouldFail.peek()) {
              throw new Error("Network error: failed to fetch user");
            }
            return { name: "Alice", email: "alice@example.com" };
          },
          { name },
        );
        return { action, shouldFail };
      };

      // ─── UserCard variants ────────────────────────────────────────────────────

      // Suspends until data is ready — never sees loading or error state.
      const UserCard = ({ action, outerCount }) => {
        const [user] = useAsyncData(action);
        const [count, setCount] = useState(0);
        return (
          <UserCardFields
            name={user.name}
            email={user.email}
            count={count}
            onIncrement={() => setCount((n) => n + 1)}
            outerCount={outerCount}
          />
        );
      };

      const UserCardFields = ({
        name,
        email,
        count,
        onIncrement,
        outerCount,
      }) => (
        <div class="card">
          <div class="card-field">
            <span class="card-label">Name</span>
            <strong>{name}</strong>
          </div>
          <div class="card-field">
            <span class="card-label">Email</span>
            <span style={{ color: "#555" }}>{email}</span>
          </div>
          {outerCount !== undefined && (
            <div class="card-field">
              <span class="card-label">Outer</span>
              <span>{outerCount}</span>
            </div>
          )}
          <div class="card-field" style={{ marginTop: "10px" }}>
            <button onClick={onIncrement} disabled={!onIncrement}>
              Count:{" "}
              {count !== null && count !== undefined ? (
                count
              ) : (
                <span
                  class="skeleton"
                  style={{ width: "20px", verticalAlign: "middle" }}
                />
              )}
            </button>
          </div>
        </div>
      );

      const ErrorCard = ({ error, resetError }) => (
        <div class="card-error">
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: "8px",
              marginBottom: "8px",
            }}
          >
            <span style={{ fontSize: "1.2em" }}>⚠️</span>
            <strong>Error caught by ErrorBoundary</strong>
          </div>
          <div
            style={{
              fontFamily: "monospace",
              fontSize: "0.9em",
              marginBottom: "12px",
            }}
          >
            {error.message}
          </div>
          <Button onClick={resetError}>Dismiss</Button>
        </div>
      );

      // ─── Delegates both ───────────────────────────────────────────────────────
      const exDelegatesBoth = makeExample("fetchUser1");
      const DelegatesBothDemo = () => {
        const [outerCount, setOuterCount] = useState(0);
        return (
          <DemoSection
            title="Unhandled — bubbles up"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="Neither loading nor error is handled inline. Both bubble up to the nearest <Loading> and <ErrorBoundary> ancestors. This is the fallback behaviour when no custom UX is needed — not a pattern to aim for."
          >
            <FetchControls
              action={() => {
                return exDelegatesBoth.action.rerun();
              }}
              shouldFail={exDelegatesBoth.shouldFail}
            />
            <ErrorBoundary fallback={ErrorCard}>
              <Loading fallback={<div class="card-loading">Loading…</div>}>
                <UserCard
                  action={exDelegatesBoth.action}
                  outerCount={outerCount}
                />
              </Loading>
            </ErrorBoundary>
          </DemoSection>
        );
      };

      // ─── Manages loading ──────────────────────────────────────────────────────
      const exManagesLoading = makeExample("fetchUser2");
      const ManagesLoadingDemo = () => {
        const [outerCount, setOuterCount] = useState(0);
        return (
          <DemoSection
            title="Handles loading — skeleton in <Loading fallback>"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="The component itself stays simple (only renders with data), while its dedicated skeleton is declared in <Loading fallback> right next to it. This is the standard pattern when loading needs a specific UX."
          >
            <FetchControls
              action={() => {
                return exManagesLoading.action.rerun();
              }}
              shouldFail={exManagesLoading.shouldFail}
            />

            <ErrorBoundary fallback={ErrorCard}>
              <Loading fallback={<UserCardSkeleton />}>
                <UserCard
                  action={exManagesLoading.action}
                  outerCount={outerCount}
                />
              </Loading>
            </ErrorBoundary>
          </DemoSection>
        );
      };
      const UserCardSkeleton = () => {
        return (
          <UserCardFields
            name={<span class="skeleton" style={{ width: "80px" }} />}
            email={<span class="skeleton" style={{ width: "140px" }} />}
          />
        );
      };

      // ─── Manages error ────────────────────────────────────────────────────────
      const exManagesError = makeExample("fetchUser3");
      const ManagesErrorDemo = () => {
        const [outerCount, setOuterCount] = useState(0);
        return (
          <DemoSection
            title="Handles error inline"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="Pass error: true to receive the error object and render a custom error UI directly inside the component. Loading still bubbles to <Loading fallback> here; combining both options is also valid."
          >
            <FetchControls
              action={() => {
                return exManagesError.action.rerun();
              }}
              shouldFail={exManagesError.shouldFail}
            />
            <Loading fallback={UserCardSkeleton}>
              <UserCardHandlesError
                action={exManagesError.action}
                outerCount={outerCount}
              />
            </Loading>
          </DemoSection>
        );
      };
      const UserCardHandlesError = ({ action, outerCount }) => {
        const [user, , error] = useAsyncData(action, { error: true });
        const [count, setCount] = useState(0);
        if (error) {
          return (
            <div class="card-error">
              <span style={{ fontSize: "1.2em" }}>⚠️</span>{" "}
              <strong>Something went wrong</strong>
              <div
                style={{
                  fontFamily: "monospace",
                  fontSize: "0.9em",
                  margin: "8px 0",
                }}
              >
                {error.message}
              </div>
              <Button onClick={() => action.rerun()}>Retry</Button>
            </div>
          );
        }
        return (
          <UserCardFields
            name={user.name}
            email={user.email}
            count={count}
            onIncrement={() => setCount((n) => n + 1)}
            outerCount={outerCount}
          />
        );
      };

      // ─── Handles loading with stale data ──────────────────────────────────────

      const exAllowStale = makeExample("fetchUser4");
      const AllowStaleDemo = () => {
        const [outerCount, setOuterCount] = useState(0);
        return (
          <DemoSection
            title="Handles loading inline — keeps stale data while refreshing"
            titleExtra={
              <button
                style={{ fontSize: "0.6em", fontWeight: "normal" }}
                onClick={() => setOuterCount((n) => n + 1)}
              >
                Outer count: {outerCount}
              </button>
            }
            description="Pass loading: true to receive the loading flag and handle it inside the component. The component never suspends. On first load data is undefined and loading is true — the component is responsible for showing a skeleton. While re-fetching, data holds the previous value so the component can keep showing stale content alongside a spinner."
          >
            <FetchControls
              action={() => {
                return exAllowStale.action.rerun();
              }}
              shouldFail={exAllowStale.shouldFail}
            />
            <ErrorBoundary fallback={ErrorCard}>
              <Loading fallback={UserCardSkeleton}>
                <UserCardAllowStale
                  action={exAllowStale.action}
                  outerCount={outerCount}
                />
              </Loading>
            </ErrorBoundary>
          </DemoSection>
        );
      };
      // Shows previous data while re-fetching — suspends only on first load.
      const UserCardAllowStale = ({ action, outerCount }) => {
        const [user, loading] = useAsyncData(action, { loading: true });
        const [count, setCount] = useState(0);
        return (
          <div>
            <UserCardFields
              name={user.name}
              email={user.email}
              count={count}
              onIncrement={() => setCount((n) => n + 1)}
              outerCount={outerCount}
            />
            {loading && (
              <div
                style={{
                  marginTop: "8px",
                  fontSize: "0.85em",
                  color: "#888",
                  fontStyle: "italic",
                }}
              >
                Refreshing…
              </div>
            )}
          </div>
        );
      };

      render(<App />, document.querySelector("#root"));
    </script>
  </body>
</html>
