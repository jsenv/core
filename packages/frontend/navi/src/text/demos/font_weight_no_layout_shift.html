<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>holdSpaceForStyle Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Text } from "@jsenv/navi";

      const Indicator = ({ color }) => (
        <Text width="16px" height="16px" background={color} />
      );

      const DemoSection = ({ title, children }) => (
        <section
          style={{
            marginBottom: "30px",
            padding: "20px",
            border: "1px solid #e9ecef",
            borderRadius: "8px",
            backgroundColor: "#fafbfc",
          }}
        >
          <h2
            style={{
              margin: "0 0 16px 0",
              paddingBottom: "12px",
              borderBottom: "2px solid #e9ecef",
              color: "#495057",
              fontSize: "1.1rem",
            }}
          >
            {title}
          </h2>
          {children}
        </section>
      );

      const Toggle = ({ checked, onChange, label }) => (
        <label style={{ display: "block", marginBottom: "12px" }}>
          <input
            type="checkbox"
            checked={checked}
            onChange={onChange}
            style={{ marginRight: "8px" }}
          />
          {label}
        </label>
      );

      const Box = ({ children, style = {} }) => (
        <div
          style={{
            border: "1px solid #dee2e6",
            padding: "12px",
            backgroundColor: "#fff",
            borderRadius: "4px",
            ...style,
          }}
        >
          {children}
        </div>
      );

      const Demo = () => {
        const [shiftActive, setShiftActive] = useState(false);
        const [basicActive, setBasicActive] = useState(false);
        const [lengthsActive, setLengthsActive] = useState(false);
        const [alignmentsActive, setAlignmentsActive] = useState(false);
        const [sizeActive, setSizeActive] = useState(false);
        const [stableActive, setStableActive] = useState(false);

        return (
          <div
            style={{
              padding: "20px",
              fontFamily: "system-ui, sans-serif",
              maxWidth: "900px",
              margin: "0 auto",
            }}
          >
            <h1 style={{ marginBottom: "8px" }}>holdSpaceForStyle</h1>
            <p style={{ color: "#555", marginBottom: "30px" }}>
              Prevents layout shifts when text style changes (font-weight,
              font-size, …) by rendering an invisible placeholder with the
              "maximum" style to reserve space, then layering the real visible
              text on top via <code>position: absolute</code>.
            </p>

            {/* 1. The problem */}
            <DemoSection title="The problem">
              <p style={{ marginTop: 0 }}>
                When text goes bold it widens, shifting surrounding elements.
              </p>
              <Toggle
                checked={shiftActive}
                onChange={(e) => setShiftActive(e.target.checked)}
                label="Toggle bold"
              />
              <div style={{ display: "flex", gap: "16px" }}>
                <div style={{ flex: 1 }}>
                  <p
                    style={{
                      margin: "0 0 6px",
                      fontSize: "12px",
                      color: "#dc3545",
                    }}
                  >
                    ❌ Without holdSpaceForStyle
                  </p>
                  <Box
                    style={{
                      border: "2px solid #f5c2c7",
                      backgroundColor: "#f8d7da",
                    }}
                  >
                    <span
                      style={{
                        whiteSpace: "nowrap",
                        fontWeight: shiftActive ? "bold" : "normal",
                      }}
                    >
                      Text that shifts layout when bold
                    </span>
                    <Indicator color="red" />
                  </Box>
                </div>
                <div style={{ flex: 1 }}>
                  <p
                    style={{
                      margin: "0 0 6px",
                      fontSize: "12px",
                      color: "#198754",
                    }}
                  >
                    ✅ With holdSpaceForStyle
                  </p>
                  <Box
                    style={{
                      border: "2px solid #badbcc",
                      backgroundColor: "#d1e7dd",
                    }}
                  >
                    <Text
                      noWrap
                      bold={shiftActive}
                      holdSpaceForStyle={{ fontWeight: "bold" }}
                    >
                      Text that shifts layout when bold
                    </Text>
                    <Indicator color="green" />
                  </Box>
                </div>
              </div>
            </DemoSection>

            {/* 2. Basic usage */}
            <DemoSection title="Basic usage — font-weight">
              <Toggle
                checked={basicActive}
                onChange={(e) => setBasicActive(e.target.checked)}
                label="Make text bold"
              />
              <Box>
                <Text
                  noWrap
                  bold={basicActive}
                  holdSpaceForStyle={{ fontWeight: "bold" }}
                  style={{ transition: "font-weight 0.3s ease" }}
                >
                  This text stays stable when toggling bold
                </Text>
                <Indicator color="violet" />
              </Box>
              <p style={{ fontSize: "13px", color: "#555", marginBottom: 0 }}>
                A CSS transition on <code>font-weight</code> can be added on the
                overlay for a smooth visual effect — it is just a regular{" "}
                <code>transition</code> property applied via <code>style</code>.
              </p>
            </DemoSection>

            {/* 3. Different text lengths */}
            <DemoSection title="Different text lengths">
              <Toggle
                checked={lengthsActive}
                onChange={(e) => setLengthsActive(e.target.checked)}
                label="Make all texts bold"
              />
              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  gap: "10px",
                }}
              >
                {[
                  { label: "Short", color: "violet" },
                  {
                    label: "A medium length text for testing",
                    color: "orange",
                  },
                  {
                    label:
                      "This is a much longer text that tests the behavior with extended content",
                    color: "blue",
                  },
                ].map(({ label, color }) => (
                  <Box key={label}>
                    <Text
                      noWrap
                      bold={lengthsActive}
                      holdSpaceForStyle={{ fontWeight: "bold" }}
                      style={{ transition: "font-weight 0.3s ease" }}
                    >
                      {label}
                    </Text>
                    <Indicator color={color} />
                  </Box>
                ))}
              </div>
            </DemoSection>

            {/* 4. Text alignments */}
            <DemoSection title="Text alignments">
              <p style={{ marginTop: 0 }}>
                The overlay is stretched to fill the placeholder (
                <code>inset: 0</code>) so the text alignment set on the parent
                is naturally respected.
              </p>
              <Toggle
                checked={alignmentsActive}
                onChange={(e) => setAlignmentsActive(e.target.checked)}
                label="Toggle bold"
              />
              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  gap: "10px",
                }}
              >
                <div>
                  <p
                    style={{
                      margin: "0 0 4px",
                      fontSize: "12px",
                      color: "#666",
                    }}
                  >
                    Left
                  </p>
                  <Box>
                    <Text
                      noWrap
                      bold={alignmentsActive}
                      holdSpaceForStyle={{ fontWeight: "bold" }}
                      style={{ transition: "font-weight 0.3s ease" }}
                    >
                      Left aligned text
                    </Text>
                    <Indicator color="cyan" />
                  </Box>
                </div>
                <div>
                  <p
                    style={{
                      margin: "0 0 4px",
                      fontSize: "12px",
                      color: "#666",
                    }}
                  >
                    Center
                  </p>
                  <Box>
                    <Indicator color="cyan" />
                    <Text
                      noWrap
                      alignX="center"
                      bold={alignmentsActive}
                      holdSpaceForStyle={{ fontWeight: "bold" }}
                      style={{ transition: "font-weight 0.3s ease" }}
                    >
                      Center aligned text
                    </Text>
                    <Indicator color="cyan" />
                  </Box>
                </div>
                <div>
                  <p
                    style={{
                      margin: "0 0 4px",
                      fontSize: "12px",
                      color: "#666",
                    }}
                  >
                    Right
                  </p>
                  <Box>
                    <Indicator color="cyan" />
                    <Text
                      noWrap
                      alignX="end"
                      bold={alignmentsActive}
                      holdSpaceForStyle={{ fontWeight: "bold" }}
                      style={{ transition: "font-weight 0.3s ease" }}
                    >
                      Right aligned text
                    </Text>
                  </Box>
                </div>
              </div>
            </DemoSection>

            {/* 5. Bold + font-size */}
            <DemoSection title="Bold + font-size change">
              <p style={{ marginTop: 0 }}>
                <code>holdSpaceForStyle</code> accepts any style properties, so
                you can reserve space for both <code>fontWeight</code> and{" "}
                <code>fontSize</code> at once.
              </p>
              <Toggle
                checked={sizeActive}
                onChange={(e) => setSizeActive(e.target.checked)}
                label="Toggle bold + larger font-size"
              />
              <Box>
                <Indicator color="cyan" />
                <Text
                  noWrap
                  alignX="center"
                  bold={sizeActive}
                  holdSpaceForStyle={{ fontWeight: "bold", fontSize: "1.5rem" }}
                  style={{
                    fontSize: sizeActive ? "1.5rem" : "1rem",
                    transition: "font-size 0.3s ease, font-weight 0.3s ease",
                  }}
                >
                  Centered label
                </Text>
                <Indicator color="cyan" />
              </Box>
              <div
                style={{
                  marginTop: "12px",
                  padding: "12px",
                  backgroundColor: "#fff8e1",
                  border: "1px solid #ffe082",
                  borderRadius: "4px",
                  fontSize: "13px",
                  color: "#555",
                }}
              >
                <strong>Note on transitions with font-size:</strong> Animating{" "}
                <code>font-size</code> directly is not smooth — browsers step
                through discrete pixel values. A visually nicer alternative is{" "}
                <code>transform: scale()</code>, but scaling happens after
                layout so the browser cannot reserve the right space for the
                scaled size. That means <code>holdSpaceForStyle</code> cannot
                help you there: you get smooth scaling but no layout-shift
                prevention.
              </div>
            </DemoSection>

            {/* 6. boldStable alternative */}
            <DemoSection title="boldStable — alternative for multi-line text">
              <p style={{ marginTop: 0 }}>
                <code>holdSpaceForStyle</code> only works reliably with
                single-line (<code>noWrap</code>) text. For multi-line content,
                use <code>boldStable</code> instead: it paints the text at
                normal weight on top of a bold background using{" "}
                <code>background-clip: text</code>, so the visual width never
                changes regardless of font-weight.
              </p>
              <Toggle
                checked={stableActive}
                onChange={(e) => setStableActive(e.target.checked)}
                label="Toggle bold"
              />
              <Box
                style={{
                  border: "2px solid #fd7e14",
                  backgroundColor: "#fff3cd",
                }}
              >
                <Text boldStable bold={stableActive}>
                  This longer sentence demonstrates boldStable on multi-line
                  content. The layout never shifts because the visual width is
                  always the bold width, even when the text is displayed normal.
                </Text>
                <Indicator color="orange" />
              </Box>
            </DemoSection>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
