<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TextBox Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 40px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      #container {
        max-width: 700px;
        margin: 0 auto;
      }
      .demo-section {
        margin-bottom: 24px;
        padding: 24px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-bottom: 24px;
        font-size: 1.4rem;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 1rem;
      }
      p {
        margin: 0 0 16px;
        color: #555;
        font-size: 13px;
      }
      .row {
        display: flex;
        margin-bottom: 12px;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 16px;
      }
      .label {
        margin-bottom: 4px;
        color: #888;
        font-size: 12px;
      }
      /* outline the TextBox so we can see its actual width */
      .navi_text_box {
        outline: 1px dashed #aaa;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>TextBox Demo</h1>
      <div id="app"></div>
    </div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { TextBox } from "@jsenv/navi/src/text/text_box.jsx";

      const EditSvg = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="16"
          height="16"
          style="flex-shrink:0"
        >
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" />
        </svg>
      );

      const CheckSvg = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="16"
          height="16"
          style="flex-shrink:0"
        >
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" />
        </svg>
      );

      const App = () => (
        <div>
          {/* 1. Icon after — main use case */}
          <div class="demo-section">
            <h2>1. Icon after</h2>
            <p>
              The icon after stays top-aligned as text wraps to multiple lines.
              The box width hugs the longest line.
            </p>
            <div class="row">
              <div>
                <div class="label">Short text (1 line)</div>
                <TextBox padding="s" spacing="s" iconAfter={<EditSvg />}>
                  Hello world
                </TextBox>
              </div>
              <div>
                <div class="label">Wrapping text</div>
                <TextBox
                  padding="s"
                  spacing="s"
                  iconAfter={<EditSvg />}
                  style="max-width: 220px"
                >
                  The quick brown fox jumps over the lazy dog near the riverbank
                </TextBox>
              </div>
              <div>
                <div class="label">Both icons</div>
                <TextBox
                  padding="s"
                  spacing="s"
                  iconBefore={<CheckSvg />}
                  iconAfter={<EditSvg />}
                  style="max-width: 220px"
                >
                  Both icons at top with wrapping text that spans multiple lines
                  here
                </TextBox>
              </div>
            </div>
          </div>

          {/* 2. maxHeight → overflow on wrapping text */}
          <div class="demo-section">
            <h2>2. maxHeight — overflow on wrapping text</h2>
            <p>
              Setting <code>maxHeight</code> clips the content. Scrollable so
              nothing is lost.
            </p>
            <div class="row">
              <div>
                <div class="label">No maxHeight (full height)</div>
                <TextBox
                  padding="s"
                  spacing="s"
                  iconAfter={<EditSvg />}
                  style="max-width: 200px"
                >
                  Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed
                  do eiusmod tempor incididunt ut labore et dolore magna aliqua.
                </TextBox>
              </div>
              <div>
                <div class="label">maxHeight="4em"</div>
                <TextBox
                  padding="s"
                  spacing="s"
                  iconAfter={<EditSvg />}
                  maxHeight="4em"
                  style="max-width: 200px; overflow-y: auto"
                >
                  Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed
                  do eiusmod tempor incididunt ut labore et dolore magna aliqua.
                </TextBox>
              </div>
              <div>
                <div class="label">maxHeight="2em"</div>
                <TextBox
                  padding="s"
                  spacing="s"
                  iconAfter={<EditSvg />}
                  maxHeight="2em"
                  style="max-width: 200px; overflow-y: auto"
                >
                  Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed
                  do eiusmod tempor incididunt ut labore et dolore magna aliqua.
                </TextBox>
              </div>
            </div>
          </div>

          {/* 3. Single-line overflow → ellipsis */}
          <div class="demo-section">
            <h2>3. Single-line overflow → ellipsis</h2>
            <p>
              When text is forced onto one line (via{" "}
              <code>white-space: nowrap</code> on the content, or because it is
              a long unbreakable string) and <code>maxHeight</code> is smaller
              than the line height, the component adds{" "}
              <code>text-overflow: ellipsis</code> automatically.
            </p>
            <div class="row">
              <div>
                <div class="label">Unbreakable URL, no maxHeight</div>
                <TextBox
                  padding="s"
                  spacing="s"
                  iconAfter={<EditSvg />}
                  style="max-width: 260px"
                >
                  https://very-long-domain-name.example.com/some/deeply/nested/path/to/a/resource
                </TextBox>
              </div>
              <div>
                <div class="label">Same URL + maxHeight="1.5em" → ellipsis</div>
                <TextBox
                  padding="s"
                  spacing="s"
                  iconAfter={<EditSvg />}
                  maxHeight="1.5em"
                  style="max-width: 260px"
                >
                  https://very-long-domain-name.example.com/some/deeply/nested/path/to/a/resource
                </TextBox>
              </div>
              <div>
                <div class="label">white-space: nowrap + maxHeight="1.5em"</div>
                <TextBox
                  padding="s"
                  spacing="s"
                  iconAfter={<EditSvg />}
                  maxHeight="1.5em"
                  style="max-width: 260px; white-space: nowrap"
                >
                  This sentence would normally wrap but nowrap forces one line
                </TextBox>
              </div>
            </div>
          </div>

          {/* 4. Padding and spacing */}
          <div class="demo-section">
            <h2>4. Padding and spacing</h2>
            <p>
              <code>padding</code> applies around the whole box (text + icons).{" "}
              <code>spacing</code> controls the gap between icons and text.
            </p>
            <div class="row">
              <div>
                <div class="label">No padding, no spacing</div>
                <TextBox iconAfter={<EditSvg />} style="max-width: 180px">
                  Text with icon but no padding or spacing
                </TextBox>
              </div>
              <div>
                <div class="label">padding="s", spacing="s"</div>
                <TextBox
                  padding="s"
                  spacing="s"
                  iconAfter={<EditSvg />}
                  style="max-width: 180px"
                >
                  Text with small padding and spacing
                </TextBox>
              </div>
              <div>
                <div class="label">padding="m", spacing="m"</div>
                <TextBox
                  padding="m"
                  spacing="m"
                  iconAfter={<EditSvg />}
                  style="max-width: 180px"
                >
                  Text with medium padding and spacing
                </TextBox>
              </div>
              <div>
                <div class="label">padding="l", spacing="l"</div>
                <TextBox
                  padding="l"
                  spacing="l"
                  iconAfter={<EditSvg />}
                  style="max-width: 180px"
                >
                  Text with large padding and spacing
                </TextBox>
              </div>
            </div>
          </div>
        </div>
      );

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
