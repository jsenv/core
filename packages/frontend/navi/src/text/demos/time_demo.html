<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Time Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Box, Title, Text, Time } from "@jsenv/navi";

      // Grid: label column + one column per prop variant.
      // Children must be alternating: <label/>, <cell/>, <cell/>, <label/>, ...
      const Grid = ({ cols, children }) => (
        <div
          style={{
            display: "grid",
            gridTemplateColumns: `160px ${cols.map(() => "1fr").join(" ")}`,
            columnGap: "24px",
            rowGap: "10px",
            alignItems: "center",
            marginBottom: "8px",
          }}
        >
          {/* header row */}
          <div />
          {cols.map((c, i) => (
            <Text
              key={i}
              style={{ fontSize: "11px", color: "#bbb", fontFamily: "monospace" }}
            >
              {c}
            </Text>
          ))}
          {children}
        </div>
      );

      // One row inside a Grid: label + one child per column.
      const GRow = ({ label, children }) => (
        <>
          <Text style={{ color: "#888", fontSize: "13px", fontFamily: "monospace" }}>
            {label}
          </Text>
          {children}
        </>
      );

      const Section = ({ id, title, children }) => (
        <Box
          as="section"
          id={id}
          style={{
            marginBottom: "32px",
            padding: "24px",
            background: "white",
            borderRadius: "8px",
            boxShadow: "0 2px 8px rgba(0,0,0,0.08)",
          }}
        >
          <Title as="h2" style={{ margin: "0 0 16px" }}>
            {title}
          </Title>
          {children}
        </Box>
      );

      const TOC = () => (
        <nav
          style={{
            marginBottom: "32px",
            padding: "16px 20px",
            background: "white",
            borderRadius: "8px",
            boxShadow: "0 2px 8px rgba(0,0,0,0.08)",
          }}
        >
          <Title as="h2" style={{ margin: "0 0 8px", fontSize: "1rem" }}>
            Contents
          </Title>
          <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "1.8" }}>
            <li><a href="#relative">type="relative" (default)</a></li>
            <li><a href="#duration">type="duration"</a></li>
            <li><a href="#date">type="date"</a></li>
            <li><a href="#month">type="month"</a></li>
            <li><a href="#time">type="time"</a></li>
            <li><a href="#datetime">type="datetime"</a></li>
            <li><a href="#minute">type="minute"</a></li>
            <li><a href="#hour">type="hour"</a></li>
          </ol>
        </nav>
      );

      const NOW = new Date();
      const TODAY = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate(), 14, 30, 0);
      const YESTERDAY = new Date(TODAY);
      YESTERDAY.setDate(YESTERDAY.getDate() - 1);
      const TOMORROW = new Date(TODAY);
      TOMORROW.setDate(TOMORROW.getDate() + 1);
      const LAST_WEEK = new Date(TODAY);
      LAST_WEEK.setDate(LAST_WEEK.getDate() - 7);

      const Demo = () => {
        const [lang, setLang] = useState("fr");

        return (
          <div style={{ padding: "20px", fontFamily: "system-ui, sans-serif", maxWidth: "900px" }}>
            <Title as="h1">Time Demo</Title>

            <Box flex="x" spacing="m" style={{ alignItems: "center", marginBottom: "24px" }}>
              <Text>Language:</Text>
              {["fr", "en", "de", "ja"].map((l) => (
                <button
                  key={l}
                  onClick={() => setLang(l)}
                  style={{
                    padding: "4px 12px",
                    borderRadius: "4px",
                    border: "1px solid #ccc",
                    background: lang === l ? "#0070f3" : "white",
                    color: lang === l ? "white" : "inherit",
                    cursor: "pointer",
                  }}
                >
                  {l}
                </button>
              ))}
            </Box>

            <TOC />

            {/* ── 1. relative ───────────────────────────────────────────── */}
            <Section id="relative" title='1. type="relative" (default)'>
              <Grid cols={["", "bare"]}>
                <GRow label="now - 1h">
                  <Time lang={lang}>{new Date(NOW.getTime() - 60 * 60 * 1000)}</Time>
                  <Time bare lang={lang}>{new Date(NOW.getTime() - 60 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="now - 30min">
                  <Time lang={lang}>{new Date(NOW.getTime() - 30 * 60 * 1000)}</Time>
                  <Time bare lang={lang}>{new Date(NOW.getTime() - 30 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="now + 2h">
                  <Time lang={lang}>{new Date(NOW.getTime() + 2 * 60 * 60 * 1000)}</Time>
                  <Time bare lang={lang}>{new Date(NOW.getTime() + 2 * 60 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="now + 15min">
                  <Time lang={lang}>{new Date(NOW.getTime() + 15 * 60 * 1000)}</Time>
                  <Time bare lang={lang}>{new Date(NOW.getTime() + 15 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="yesterday">
                  <Time lang={lang}>{YESTERDAY}</Time>
                  <Time bare lang={lang}>{YESTERDAY}</Time>
                </GRow>
                <GRow label="last week">
                  <Time lang={lang}>{LAST_WEEK}</Time>
                  <Time bare lang={lang}>{LAST_WEEK}</Time>
                </GRow>
                <GRow label="undefined">
                  <Time lang={lang}>{undefined}</Time>
                  <Time bare lang={lang}>{undefined}</Time>
                </GRow>
              </Grid>

              {/* eventDuration: walk through the lifecycle of a 1-hour event */}
              <Title as="h3" style={{ margin: "24px 0 12px", fontSize: "0.9rem", color: "#555" }}>
                eventDuration
              </Title>
              <Grid cols={["eventDuration=0", "eventDuration=30min", "eventDuration=1h"]}>
                <GRow label="now + 1h">
                  <Time lang={lang}>{new Date(NOW.getTime() + 60 * 60 * 1000)}</Time>
                  <Time eventDuration={30 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() + 60 * 60 * 1000)}</Time>
                  <Time eventDuration={60 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() + 60 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="now + 10min">
                  <Time lang={lang}>{new Date(NOW.getTime() + 10 * 60 * 1000)}</Time>
                  <Time eventDuration={30 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() + 10 * 60 * 1000)}</Time>
                  <Time eventDuration={60 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() + 10 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="now - 1min">
                  <Time lang={lang}>{new Date(NOW.getTime() - 1 * 60 * 1000)}</Time>
                  <Time eventDuration={30 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 1 * 60 * 1000)}</Time>
                  <Time eventDuration={60 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 1 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="now - 20min">
                  <Time lang={lang}>{new Date(NOW.getTime() - 20 * 60 * 1000)}</Time>
                  <Time eventDuration={30 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 20 * 60 * 1000)}</Time>
                  <Time eventDuration={60 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 20 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="now - 31min">
                  <Time lang={lang}>{new Date(NOW.getTime() - 31 * 60 * 1000)}</Time>
                  <Time eventDuration={30 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 31 * 60 * 1000)}</Time>
                  <Time eventDuration={60 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 31 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="now - 59min">
                  <Time lang={lang}>{new Date(NOW.getTime() - 59 * 60 * 1000)}</Time>
                  <Time eventDuration={30 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 59 * 60 * 1000)}</Time>
                  <Time eventDuration={60 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 59 * 60 * 1000)}</Time>
                </GRow>
                <GRow label="now - 61min">
                  <Time lang={lang}>{new Date(NOW.getTime() - 61 * 60 * 1000)}</Time>
                  <Time eventDuration={30 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 61 * 60 * 1000)}</Time>
                  <Time eventDuration={60 * 60 * 1000} lang={lang}>{new Date(NOW.getTime() - 61 * 60 * 1000)}</Time>
                </GRow>
              </Grid>
            </Section>

            {/* ── 2. duration ───────────────────────────────────────────── */}
            <Section id="duration" title='2. type="duration"'>
              <Grid cols={["", 'format="short"']}>
                <GRow label='"2hour15minute"'>
                  <Time type="duration" lang={lang}>{"2hour15minute"}</Time>
                  <Time type="duration" format="short" lang={lang}>{"2hour15minute"}</Time>
                </GRow>
                <GRow label='"PT2H15M"'>
                  <Time type="duration" lang={lang}>{"PT2H15M"}</Time>
                  <Time type="duration" format="short" lang={lang}>{"PT2H15M"}</Time>
                </GRow>
                <GRow label="{ hours: 2, minutes: 15 }">
                  <Time type="duration" lang={lang}>{{ hours: 2, minutes: 15 }}</Time>
                  <Time type="duration" format="short" lang={lang}>{{ hours: 2, minutes: 15 }}</Time>
                </GRow>
                <GRow label="5400">
                  <Time type="duration" lang={lang}>{5400}</Time>
                  <Time type="duration" format="short" lang={lang}>{5400}</Time>
                </GRow>
                <GRow label="300">
                  <Time type="duration" lang={lang}>{300}</Time>
                  <Time type="duration" format="short" lang={lang}>{300}</Time>
                </GRow>
                <GRow label="undefined">
                  <Time type="duration" lang={lang}>{undefined}</Time>
                  <Time type="duration" format="short" lang={lang}>{undefined}</Time>
                </GRow>
              </Grid>

              <Title as="h3" style={{ margin: "24px 0 12px", fontSize: "0.9rem", color: "#555" }}>
                Valeurs invalides
              </Title>
              <Grid cols={["", 'format="short"']}>
                <GRow label='"ahour3minute"'>
                  <Time type="duration" lang={lang}>{"ahour3minute"}</Time>
                  <Time type="duration" format="short" lang={lang}>{"ahour3minute"}</Time>
                </GRow>
                <GRow label='"2ahour15minute"'>
                  <Time type="duration" lang={lang}>{"2ahour15minute"}</Time>
                  <Time type="duration" format="short" lang={lang}>{"2ahour15minute"}</Time>
                </GRow>
                <GRow label='"hour3minute"'>
                  <Time type="duration" lang={lang}>{"hour3minute"}</Time>
                  <Time type="duration" format="short" lang={lang}>{"hour3minute"}</Time>
                </GRow>
                <GRow label='"2hour3minuteXXX"'>
                  <Time type="duration" lang={lang}>{"2hour3minuteXXX"}</Time>
                  <Time type="duration" format="short" lang={lang}>{"2hour3minuteXXX"}</Time>
                </GRow>
                <GRow label='""'>
                  <Time type="duration" lang={lang}>{""}</Time>
                  <Time type="duration" format="short" lang={lang}>{""}</Time>
                </GRow>
                <GRow label='"2"'>
                  <Time type="duration" lang={lang}>{"2"}</Time>
                  <Time type="duration" format="short" lang={lang}>{"2"}</Time>
                </GRow>
                <GRow label='"-1hour"'>
                  <Time type="duration" lang={lang}>{"-1hour"}</Time>
                  <Time type="duration" format="short" lang={lang}>{"-1hour"}</Time>
                </GRow>
                <GRow label='{ hours: "abc" }'>
                  <Time type="duration" lang={lang}>{{ hours: "abc" }}</Time>
                  <Time type="duration" format="short" lang={lang}>{{ hours: "abc" }}</Time>
                </GRow>
                <GRow label="{ hours: NaN }">
                  <Time type="duration" lang={lang}>{{ hours: NaN }}</Time>
                  <Time type="duration" format="short" lang={lang}>{{ hours: NaN }}</Time>
                </GRow>
                <GRow label="{ hours: Infinity }">
                  <Time type="duration" lang={lang}>{{ hours: Infinity }}</Time>
                  <Time type="duration" format="short" lang={lang}>{{ hours: Infinity }}</Time>
                </GRow>
                <GRow label="null">
                  <Time type="duration" lang={lang}>{null}</Time>
                  <Time type="duration" format="short" lang={lang}>{null}</Time>
                </GRow>
                <GRow label="0">
                  <Time type="duration" lang={lang}>{0}</Time>
                  <Time type="duration" format="short" lang={lang}>{0}</Time>
                </GRow>
              </Grid>
            </Section>

            {/* ── 3. date ───────────────────────────────────────────────── */}
            <Section id="date" title='3. type="date"'>
              <Grid cols={["", 'format="short"', "dayLabel"]}>
                <GRow label="today">
                  <Time type="date" lang={lang}>{TODAY}</Time>
                  <Time type="date" format="short" lang={lang}>{TODAY}</Time>
                  <Time type="date" dayLabel lang={lang}>{TODAY}</Time>
                </GRow>
                <GRow label="yesterday">
                  <Time type="date" lang={lang}>{YESTERDAY}</Time>
                  <Time type="date" format="short" lang={lang}>{YESTERDAY}</Time>
                  <Time type="date" dayLabel lang={lang}>{YESTERDAY}</Time>
                </GRow>
                <GRow label="tomorrow">
                  <Time type="date" lang={lang}>{TOMORROW}</Time>
                  <Time type="date" format="short" lang={lang}>{TOMORROW}</Time>
                  <Time type="date" dayLabel lang={lang}>{TOMORROW}</Time>
                </GRow>
                <GRow label='"2025-12-25"'>
                  <Time type="date" lang={lang}>{"2025-12-25"}</Time>
                  <Time type="date" format="short" lang={lang}>{"2025-12-25"}</Time>
                  <Time type="date" dayLabel lang={lang}>{"2025-12-25"}</Time>
                </GRow>
                <GRow label="undefined">
                  <Time type="date" lang={lang}>{undefined}</Time>
                  <Time type="date" format="short" lang={lang}>{undefined}</Time>
                  <Time type="date" dayLabel lang={lang}>{undefined}</Time>
                </GRow>
              </Grid>
            </Section>

            {/* ── 4. month ──────────────────────────────────────────────── */}
            <Section id="month" title='4. type="month"'>
              <Grid cols={[""]}>
                <GRow label='"2025-12"'>
                  <Time type="month" lang={lang}>{"2025-12"}</Time>
                </GRow>
                <GRow label="Date">
                  <Time type="month" lang={lang}>{TODAY}</Time>
                </GRow>
                <GRow label="undefined">
                  <Time type="month" lang={lang}>{undefined}</Time>
                </GRow>
              </Grid>
            </Section>

            {/* ── 5. time ───────────────────────────────────────────────── */}
            <Section id="time" title='5. type="time"'>
              <Grid cols={["", 'format="short"', 'format="timestring"']}>
                <GRow label='"14:30"'>
                  <Time type="time" lang={lang}>{"14:30"}</Time>
                  <Time type="time" format="short" lang={lang}>{"14:30"}</Time>
                  <Time type="time" format="timestring" lang={lang}>{"14:30"}</Time>
                </GRow>
                <GRow label='"09:05:00"'>
                  <Time type="time" lang={lang}>{"09:05:00"}</Time>
                  <Time type="time" format="short" lang={lang}>{"09:05:00"}</Time>
                  <Time type="time" format="timestring" lang={lang}>{"09:05:00"}</Time>
                </GRow>
                <GRow label="Date">
                  <Time type="time" lang={lang}>{TODAY}</Time>
                  <Time type="time" format="short" lang={lang}>{TODAY}</Time>
                  <Time type="time" format="timestring" lang={lang}>{TODAY}</Time>
                </GRow>
                <GRow label="undefined">
                  <Time type="time" lang={lang}>{undefined}</Time>
                  <Time type="time" format="short" lang={lang}>{undefined}</Time>
                  <Time type="time" format="timestring" lang={lang}>{undefined}</Time>
                </GRow>
              </Grid>
            </Section>

            {/* ── 6. datetime ───────────────────────────────────────────── */}
            <Section id="datetime" title='6. type="datetime"'>
              <Grid cols={[""]}>
                <GRow label="Date">
                  <Time type="datetime" lang={lang}>{TODAY}</Time>
                </GRow>
                <GRow label="timestamp">
                  <Time type="datetime" lang={lang}>{TODAY.getTime()}</Time>
                </GRow>
                <GRow label="undefined">
                  <Time type="datetime" lang={lang}>{undefined}</Time>
                </GRow>
              </Grid>
            </Section>

            {/* ── 7. minute ─────────────────────────────────────────────── */}
            <Section id="minute" title='7. type="minute"'>
              <Grid cols={["", 'format="short"', 'format="timestring"']}>
                <GRow label="90">
                  <Time type="minute" lang={lang}>{90}</Time>
                  <Time type="minute" format="short" lang={lang}>{90}</Time>
                  <Time type="minute" format="timestring" lang={lang}>{90}</Time>
                </GRow>
                <GRow label="5">
                  <Time type="minute" lang={lang}>{5}</Time>
                  <Time type="minute" format="short" lang={lang}>{5}</Time>
                  <Time type="minute" format="timestring" lang={lang}>{5}</Time>
                </GRow>
                <GRow label="0">
                  <Time type="minute" lang={lang}>{0}</Time>
                  <Time type="minute" format="short" lang={lang}>{0}</Time>
                  <Time type="minute" format="timestring" lang={lang}>{0}</Time>
                </GRow>
                <GRow label="undefined">
                  <Time type="minute" lang={lang}>{undefined}</Time>
                  <Time type="minute" format="short" lang={lang}>{undefined}</Time>
                  <Time type="minute" format="timestring" lang={lang}>{undefined}</Time>
                </GRow>
              </Grid>
            </Section>

            {/* ── 8. hour ───────────────────────────────────────────────── */}
            <Section id="hour" title='8. type="hour"'>
              <Grid cols={["", 'format="short"']}>
                <GRow label="2">
                  <Time type="hour" lang={lang}>{2}</Time>
                  <Time type="hour" format="short" lang={lang}>{2}</Time>
                </GRow>
                <GRow label="1">
                  <Time type="hour" lang={lang}>{1}</Time>
                  <Time type="hour" format="short" lang={lang}>{1}</Time>
                </GRow>
                <GRow label="0.5">
                  <Time type="hour" lang={lang}>{0.5}</Time>
                  <Time type="hour" format="short" lang={lang}>{0.5}</Time>
                </GRow>
                <GRow label="undefined">
                  <Time type="hour" lang={lang}>{undefined}</Time>
                  <Time type="hour" format="short" lang={lang}>{undefined}</Time>
                </GRow>
              </Grid>
            </Section>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
