<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Icon Vertical Align Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Icon, StarSvg } from "@jsenv/navi";

      const containerStyle = {
        fontSize: "16px",
        padding: "4px 8px",
        backgroundColor: "#f0f8ff",
        border: "2px dotted black",
      };

      const textStyle = {
        backgroundColor: "green",
        color: "white",
      };

      const cellStyle = {
        display: "flex",
        flexDirection: "column",
        gap: "6px",
      };

      const labelStyle = {
        fontSize: "11px",
        color: "#636e72",
        textTransform: "uppercase",
        letterSpacing: "0.05em",
      };

      const rowStyle = {
        display: "flex",
        gap: "32px",
        alignItems: "flex-start",
        marginBottom: "24px",
      };

      const Row = ({ title, iconSize, textSize }) => (
        <div>
          <div style={{ fontSize: "13px", color: "#999", marginBottom: "8px" }}>
            {title}
          </div>
          <div style={rowStyle}>
            <div style={cellStyle}>
              <span style={labelStyle}>@jsenv/navi</span>
              <div style={{ ...containerStyle, fontSize: `${textSize}px` }}>
                <span style={textStyle}>Notifications</span>
                <Icon style={{ fontSize: `${iconSize}px` }}>
                  <StarSvg />
                </Icon>
                After
              </div>
            </div>
          </div>
        </div>
      );

      const VERTICAL_ALIGN_VALUES = [
        "baseline",
        "middle",
        "top",
        "bottom",
        "super",
        "sub",
      ];

      const ControlledRow = () => {
        const [iconSize, setIconSize] = useState(48);
        const [textSize, setTextSize] = useState(15);
        const [verticalAlign, setVerticalAlign] = useState("baseline");
        return (
          <div>
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                gap: "2px",
                fontSize: "13px",
                color: "#999",
                marginBottom: "8px",
              }}
            >
              <label>
                icon font-size:{" "}
                <input
                  type="range"
                  min="5"
                  max="48"
                  value={iconSize}
                  onInput={(e) => setIconSize(Number(e.target.value))}
                />{" "}
                {iconSize}px
              </label>
              <label>
                text font-size:{" "}
                <input
                  type="range"
                  min="5"
                  max="48"
                  value={textSize}
                  onInput={(e) => setTextSize(Number(e.target.value))}
                />{" "}
                {textSize}px
              </label>
              <label>
                vertical-align:{" "}
                <select
                  value={verticalAlign}
                  onChange={(e) => setVerticalAlign(e.target.value)}
                >
                  {VERTICAL_ALIGN_VALUES.map((va) => (
                    <option key={va} value={va}>
                      {va}
                    </option>
                  ))}
                </select>
              </label>
            </div>
            <div style={rowStyle}>
              <div style={cellStyle}>
                <span style={labelStyle}>@jsenv/navi</span>
                <div style={{ ...containerStyle, fontSize: `${textSize}px` }}>
                  <span style={{ verticalAlign }}>
                    <span style={{ ...textStyle }}>NotificationS</span>
                    <Icon style={{ fontSize: `${iconSize}px` }}>
                      <StarSvg />
                    </Icon>
                    <span style={{ ...textStyle }}>After</span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const Demo = () => (
        <div style={{ padding: "20px", fontFamily: "system-ui, sans-serif" }}>
          <h2 style={{ marginTop: 0 }}>Icon vertical align</h2>

          <h3>Très petit (8px) dans texte 16px</h3>
          <Row title="" iconSize={8} textSize={16} />

          <h3>Très grand (40px) dans texte 16px</h3>
          <Row title="" iconSize={40} textSize={16} />

          <h3>Texte avec font-family différents</h3>
          {[
            {
              label: "serif 12px",
              style: { fontFamily: "serif", fontSize: "12px" },
            },
            {
              label: "serif 24px",
              style: { fontFamily: "serif", fontSize: "24px" },
            },
            {
              label: "monospace 12px",
              style: { fontFamily: "monospace", fontSize: "12px" },
            },
            {
              label: "monospace 24px",
              style: { fontFamily: "monospace", fontSize: "24px" },
            },
          ].map(({ label, style }) => (
            <div key={label} style={{ marginBottom: "16px" }}>
              <div
                style={{ fontSize: "13px", color: "#999", marginBottom: "6px" }}
              >
                {label}
              </div>
              <div style={{ ...containerStyle, ...style }}>
                <span style={textStyle}>Notifications</span>
                <Icon>
                  <StarSvg />
                </Icon>
                After
              </div>
            </div>
          ))}

          <h3>Texte avec vertical-align différent</h3>
          {["bottom", "super", "sub", "middle"].map((va) => (
            <div key={va} style={{ marginBottom: "16px" }}>
              <div
                style={{ fontSize: "13px", color: "#999", marginBottom: "6px" }}
              >
                vertical-align: {va}
              </div>
              <div style={containerStyle}>
                <span style={{ verticalAlign: va }}>
                  <span style={textStyle}>Notifications</span>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  After
                </span>
              </div>
            </div>
          ))}

          <h3>Contrôlable</h3>
          <ControlledRow />
        </div>
      );

      render(<Demo />, document.querySelector("#app"));
    </script>
  </body>
</html>
