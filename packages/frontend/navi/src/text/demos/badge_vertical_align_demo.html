<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Badge Vertical Align Demo</title>
  </head>
  <body>
    <style>
      /* * {
        vertical-align: middle;
      } */
    </style>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useLayoutEffect, useRef, useState } from "preact/hooks";
      import { BadgeCount, Text } from "@jsenv/navi";

      const containerStyle = {
        fontSize: "16px",
        padding: "4px 8px",
        backgroundColor: "#f0f8ff",
        border: "2px dotted black",
      };

      const textStyle = {
        backgroundColor: "green",
      };

      const measureTextHeight = (text, computedStyle) => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        ctx.font = `${computedStyle.fontWeight} ${computedStyle.fontSize} ${computedStyle.fontFamily}`;
        const metrics = ctx.measureText(text);
        return (
          metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent
        );
      };

      const Badge = ({ textFontSize, count, fontSize }) => {
        const anchorRef = useRef();
        const badgeRef = useRef();

        useLayoutEffect(() => {
          const anchorEl = anchorRef.current;
          const badgeEl = badgeRef.current;
          if (!anchorEl || !badgeEl) {
            return;
          }
          const anchorStyle = getComputedStyle(anchorEl);
          const badgeStyle = getComputedStyle(badgeEl);
          const anchorFontSize = parseFloat(anchorStyle.fontSize);
          const badgeFontSize = parseFloat(badgeStyle.fontSize);
          if (anchorFontSize === badgeFontSize) {
            badgeEl.style.top = `0px`;
            return;
          }
          const anchorTextHeight = measureTextHeight("M", anchorStyle);
          const badgeTextHeight = measureTextHeight("M", badgeStyle);
          const heightDiff = badgeTextHeight - anchorTextHeight;
          const topOffset = heightDiff / 2;
          console.debug(
            `anchorTextHeight: ${anchorTextHeight}, badgeTextHeight: ${badgeTextHeight}, heightDiff: ${heightDiff}, topOffset: ${topOffset}`,
          );
          badgeEl.style.position = "relative";
          badgeEl.style.top = `${topOffset}px`;
        }, [textFontSize, fontSize, count]);

        return (
          <>
            <span
              ref={anchorRef}
              style={{ width: 0, userSelect: "none", overflow: "hidden" }}
            >
              &#8203;
            </span>
            <span
              ref={badgeRef}
              style={{
                fontSize: `${fontSize}px`,
                backgroundColor: "#e74c3c",
                color: "white",
                padding: "0.4em 0.1em",
                borderRadius: "3px",
                verticalAlign: "inherit",
              }}
            >
              {count}
            </span>
          </>
        );
      };

      const cellStyle = {
        display: "flex",
        flexDirection: "column",
        gap: "6px",
      };

      const labelStyle = {
        fontSize: "11px",
        color: "#636e72",
        textTransform: "uppercase",
        letterSpacing: "0.05em",
      };

      const rowStyle = {
        display: "flex",
        gap: "32px",
        alignItems: "flex-start",
        marginBottom: "24px",
      };

      const Row = ({ title, count, fontSize }) => {
        return (
          <div>
            <div
              style={{ fontSize: "13px", color: "#999", marginBottom: "8px" }}
            >
              {title}
            </div>
            <div style={rowStyle}>
              <div style={cellStyle}>
                <span style={labelStyle}>hardcode</span>
                <div style={containerStyle}>
                  <span style={textStyle}>Notifications</span>
                  <Badge count={count} fontSize={fontSize} />
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>@jsenv/navi</span>
                <div style={containerStyle}>
                  <span style={textStyle}>Notifications</span>
                  <BadgeCount
                    background="#e74c3c"
                    color="white"
                    style={{ fontSize: `${fontSize}px` }}
                  >
                    {count}
                  </BadgeCount>
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>@jsenv/navi circle</span>
                <div style={containerStyle}>
                  <span style={textStyle}>Notifications</span>
                  <BadgeCount
                    background="#e74c3c"
                    color="white"
                    circle
                    style={{ fontSize: `${fontSize}px` }}
                  >
                    {count}
                  </BadgeCount>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const VERTICAL_ALIGN_VALUES = [
        "baseline",
        "middle",
        "bottom",
        "super",
        "sub",
        "text-top",
        "text-bottom",
      ];

      const ControlledRow = () => {
        const [badgeFontSize, setBadgeFontSize] = useState(16);
        const [textFontSize, setTextFontSize] = useState(48);
        const [count, setCount] = useState(5);
        const [verticalAlign, setVerticalAlign] = useState("baseline");
        return (
          <div>
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                gap: "2px",
                flexWrap: "wrap",
                fontSize: "13px",
                color: "#999",
                marginBottom: "8px",
              }}
            >
              <label>
                badge font-size:{" "}
                <input
                  type="range"
                  min="5"
                  max="48"
                  value={badgeFontSize}
                  onInput={(e) => {
                    setBadgeFontSize(Number(e.target.value));
                  }}
                />{" "}
                {badgeFontSize}px
              </label>
              <label>
                text font-size:{" "}
                <input
                  type="range"
                  min="5"
                  max="48"
                  value={textFontSize}
                  onInput={(e) => {
                    setTextFontSize(Number(e.target.value));
                  }}
                />{" "}
                {textFontSize}px
              </label>
              <label>
                count:{" "}
                <input
                  type="number"
                  min="0"
                  max="9999"
                  value={count}
                  style={{ width: "60px" }}
                  onInput={(e) => {
                    setCount(Number(e.target.value));
                  }}
                />
              </label>
              <label>
                vertical-align:{" "}
                <select
                  value={verticalAlign}
                  onChange={(e) => {
                    setVerticalAlign(e.target.value);
                  }}
                >
                  {VERTICAL_ALIGN_VALUES.map((va) => (
                    <option key={va} value={va}>
                      {va}
                    </option>
                  ))}
                </select>
              </label>
            </div>
            <div style={rowStyle}>
              <div style={{ ...cellStyle }}>
                <span style={labelStyle}>hardcode</span>
                <div
                  style={{
                    ...containerStyle,
                    verticalAlign,
                    fontSize: `${textFontSize}px`,
                  }}
                >
                  <span
                    style={{
                      ...textStyle,
                      verticalAlign: "inherit",
                    }}
                  >
                    NotificationS
                  </span>
                  <Badge
                    textFontSize={textFontSize}
                    count={count}
                    fontSize={badgeFontSize}
                  />
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>@jsenv/navi</span>
                <div
                  style={{
                    ...containerStyle,
                    verticalAlign,
                    fontSize: `${textFontSize}px`,
                  }}
                >
                  <span style={{ verticalAlign }}>
                    <span style={{ ...textStyle, verticalAlign: "inherit" }}>
                      NotificationS
                    </span>
                    <BadgeCount
                      background="#e74c3c"
                      color="white"
                      style={{ fontSize: `${badgeFontSize}px` }}
                      textFontSize={textFontSize}
                    >
                      {count}
                    </BadgeCount>
                  </span>
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>@jsenv/navi circle</span>
                <div style={containerStyle}>
                  <span style={{ verticalAlign }}>
                    <span
                      style={{ ...textStyle, fontSize: `${textFontSize}px` }}
                    >
                      Notifications
                    </span>
                    <BadgeCount
                      background="#e74c3c"
                      color="white"
                      circle
                      style={{ fontSize: `${badgeFontSize}px` }}
                      textFontSize={textFontSize}
                    >
                      {count}
                    </BadgeCount>
                  </span>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const Demo = () => {
        return (
          <div style={{ padding: "20px", fontFamily: "system-ui, sans-serif" }}>
            <h2 style={{ marginTop: 0 }}>Badge vertical align</h2>

            <h3>Très petit (8px) — 1 chiffre</h3>
            <Row title="" count={5} fontSize={8} />

            <h3>Très petit (8px) — 2 chiffres</h3>
            <Row title="" count={42} fontSize={8} />

            <h3>Très grand (40px) — 1 chiffre</h3>
            <Row title="" count={5} fontSize={40} />

            <h3>Très grand (40px) — 2 chiffres</h3>
            <Row title="" count={42} fontSize={40} />

            <h3>Contrôlable</h3>
            <ControlledRow />

            <h3>Texte avec font-size et font-family différents</h3>
            {[
              {
                label: "serif 12px",
                style: { fontFamily: "serif", fontSize: "12px" },
              },
              {
                label: "serif 24px",
                style: { fontFamily: "serif", fontSize: "24px" },
              },
              {
                label: "monospace 12px",
                style: { fontFamily: "monospace", fontSize: "12px" },
              },
              {
                label: "monospace 24px",
                style: { fontFamily: "monospace", fontSize: "24px" },
              },
            ].map(({ label, style }) => (
              <div key={label} style={{ marginBottom: "16px" }}>
                <div
                  style={{
                    fontSize: "13px",
                    color: "#999",
                    marginBottom: "6px",
                  }}
                >
                  {label}
                </div>
                <div style={rowStyle}>
                  <div style={cellStyle}>
                    <span style={labelStyle}>hardcode</span>
                    <div style={{ ...containerStyle, ...style }}>
                      <span style={textStyle}>Notifications</span>
                      <Badge count={42} fontSize={16} />
                    </div>
                  </div>
                  <div style={cellStyle}>
                    <span style={labelStyle}>@jsenv/navi</span>
                    <div style={{ ...containerStyle, ...style }}>
                      <span style={textStyle}>Notifications</span>
                      <BadgeCount background="#e74c3c" color="white">
                        {42}
                      </BadgeCount>
                    </div>
                  </div>
                  <div style={cellStyle}>
                    <span style={labelStyle}>@jsenv/navi circle</span>
                    <div style={{ ...containerStyle, ...style }}>
                      <span style={textStyle}>Notifications</span>
                      <BadgeCount background="#e74c3c" color="white" circle>
                        {42}
                      </BadgeCount>
                    </div>
                  </div>
                </div>
              </div>
            ))}

            <h3>Texte avec vertical-align différent</h3>
            {["bottom", "super", "sub", "middle"].map((va) => (
              <div key={va} style={{ marginBottom: "16px" }}>
                <div
                  style={{
                    fontSize: "13px",
                    color: "#999",
                    marginBottom: "6px",
                  }}
                >
                  vertical-align: {va}
                </div>
                <div style={rowStyle}>
                  <div style={cellStyle}>
                    <span style={labelStyle}>hardcode</span>
                    <div style={containerStyle}>
                      <span style={{ verticalAlign: va }}>
                        <span style={textStyle}>Notifications</span>
                        <Badge count={42} fontSize={16} />
                      </span>
                    </div>
                  </div>
                  <div style={cellStyle}>
                    <span style={labelStyle}>@jsenv/navi</span>
                    <div style={containerStyle}>
                      <span style={{ verticalAlign: va }}>
                        <span style={textStyle}>Notifications</span>
                        <BadgeCount background="#e74c3c" color="white">
                          {42}
                        </BadgeCount>
                      </span>
                    </div>
                  </div>
                  <div style={cellStyle}>
                    <span style={labelStyle}>@jsenv/navi circle</span>
                    <div style={containerStyle}>
                      <span style={{ verticalAlign: va }}>
                        <span style={textStyle}>Notifications</span>
                        <BadgeCount background="#e74c3c" color="white" circle>
                          {42}
                        </BadgeCount>
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        );
      };

      render(<Demo />, document.querySelector("#app"));
    </script>
  </body>
</html>
