<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Badge Vertical Align Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { BadgeCount, Text } from "@jsenv/navi";

      const containerStyle = {
        fontSize: "16px",
        padding: "4px 8px",
        backgroundColor: "#f0f8ff",
        border: "2px dotted black",
      };

      const textStyle = {
        backgroundColor: "green",
      };

      const Badge = ({ count, fontSize }) => {
        return (
          <span style={{ display: "inline-flex", alignItems: "center" }}>
            {/* zero-width space: invisible, no width, but establishes line metrics
                at the parent font-size — gives us the vertical reference point
                so align-items: center snaps the badge to the text midline
                without the parent needing flex + align-items */}
            <span style={{ width: 0, overflow: "hidden", userSelect: "none" }}>
              {"\u200B"}
            </span>
            <span
              style={{
                fontSize: `${fontSize}px`,
                backgroundColor: "#e74c3c",
                color: "white",
                padding: "8px 12px",
                borderRadius: "3px",
                lineHeight: "1",
                display: "inline-flex",
                alignItems: "center",
              }}
            >
              {count}
            </span>
          </span>
        );
      };

      const cellStyle = {
        display: "flex",
        flexDirection: "column",
        gap: "6px",
      };

      const labelStyle = {
        fontSize: "11px",
        color: "#636e72",
        textTransform: "uppercase",
        letterSpacing: "0.05em",
      };

      const rowStyle = {
        display: "flex",
        gap: "32px",
        alignItems: "flex-start",
        marginBottom: "24px",
      };

      const Row = ({ title, count, fontSize }) => {
        return (
          <div>
            <div
              style={{ fontSize: "13px", color: "#999", marginBottom: "8px" }}
            >
              {title}
            </div>
            <div style={rowStyle}>
              <div style={cellStyle}>
                <span style={labelStyle}>hardcode</span>
                <div style={containerStyle}>
                  <span style={textStyle}>Notifications</span>
                  <Badge count={count} fontSize={fontSize} />
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>@jsenv/navi</span>
                <div style={containerStyle}>
                  <span style={textStyle}>Notifications</span>
                  <BadgeCount
                    background="#e74c3c"
                    color="white"
                    style={{ fontSize: `${fontSize}px` }}
                  >
                    {count}
                  </BadgeCount>
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>@jsenv/navi circle</span>
                <div style={containerStyle}>
                  <span style={textStyle}>Notifications</span>
                  <BadgeCount
                    background="#e74c3c"
                    color="white"
                    circle
                    style={{ fontSize: `${fontSize}px` }}
                  >
                    {count}
                  </BadgeCount>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const ControlledRow = () => {
        const [fontSize, setFontSize] = useState(32);
        const [count, setCount] = useState(5);
        return (
          <div>
            <div
              style={{ fontSize: "13px", color: "#999", marginBottom: "8px" }}
            >
              Contrôlable —{" "}
              <label>
                font-size:{" "}
                <input
                  type="range"
                  min="8"
                  max="48"
                  value={fontSize}
                  onInput={(e) => {
                    setFontSize(Number(e.target.value));
                  }}
                />{" "}
                {fontSize}px
              </label>{" "}
              <label>
                count:{" "}
                <input
                  type="number"
                  min="0"
                  max="9999"
                  value={count}
                  style={{ width: "60px" }}
                  onInput={(e) => {
                    setCount(Number(e.target.value));
                  }}
                />
              </label>
            </div>
            <div style={rowStyle}>
              <div style={cellStyle}>
                <span style={labelStyle}>hardcode</span>
                <div style={containerStyle}>
                  <span style={textStyle}>Notifications</span>
                  <Badge count={count} fontSize={fontSize} />
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>@jsenv/navi</span>
                <div style={containerStyle}>
                  <span style={textStyle}>Notifications</span>
                  <BadgeCount
                    background="#e74c3c"
                    color="white"
                    style={{ fontSize: `${fontSize}px` }}
                  >
                    {count}
                  </BadgeCount>
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>@jsenv/navi circle</span>
                <div style={containerStyle}>
                  <span style={textStyle}>Notifications</span>
                  <BadgeCount
                    background="#e74c3c"
                    color="white"
                    circle
                    style={{ fontSize: `${fontSize}px` }}
                  >
                    {count}
                  </BadgeCount>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const Demo = () => {
        return (
          <div style={{ padding: "20px", fontFamily: "system-ui, sans-serif" }}>
            <h2 style={{ marginTop: 0 }}>Badge vertical align</h2>

            <h3>Très petit (8px) — 1 chiffre</h3>
            <Row title="" count={5} fontSize={8} />

            <h3>Très petit (8px) — 2 chiffres</h3>
            <Row title="" count={42} fontSize={8} />

            <h3>Très grand (40px) — 1 chiffre</h3>
            <Row title="" count={5} fontSize={40} />

            <h3>Très grand (40px) — 2 chiffres</h3>
            <Row title="" count={42} fontSize={40} />

            <h3>Contrôlable</h3>
            <ControlledRow />

            <h3>Texte avec font-size et font-family différents</h3>
            {[
              {
                label: "serif 12px",
                style: { fontFamily: "serif", fontSize: "12px" },
              },
              {
                label: "serif 24px",
                style: { fontFamily: "serif", fontSize: "24px" },
              },
              {
                label: "monospace 12px",
                style: { fontFamily: "monospace", fontSize: "12px" },
              },
              {
                label: "monospace 24px",
                style: { fontFamily: "monospace", fontSize: "24px" },
              },
            ].map(({ label, style }) => (
              <div key={label} style={{ marginBottom: "16px" }}>
                <div
                  style={{
                    fontSize: "13px",
                    color: "#999",
                    marginBottom: "6px",
                  }}
                >
                  {label}
                </div>
                <div style={rowStyle}>
                  <div style={cellStyle}>
                    <span style={labelStyle}>hardcode</span>
                    <div style={{ ...containerStyle, ...style }}>
                      <span style={textStyle}>Notifications</span>
                      <Badge count={42} fontSize={16} />
                    </div>
                  </div>
                  <div style={cellStyle}>
                    <span style={labelStyle}>@jsenv/navi</span>
                    <div style={{ ...containerStyle, ...style }}>
                      <span style={textStyle}>Notifications</span>
                      <BadgeCount background="#e74c3c" color="white">
                        {42}
                      </BadgeCount>
                    </div>
                  </div>
                  <div style={cellStyle}>
                    <span style={labelStyle}>@jsenv/navi circle</span>
                    <div style={{ ...containerStyle, ...style }}>
                      <span style={textStyle}>Notifications</span>
                      <BadgeCount background="#e74c3c" color="white" circle>
                        {42}
                      </BadgeCount>
                    </div>
                  </div>
                </div>
              </div>
            ))}

            <h3>Texte avec vertical-align différent</h3>
            {["bottom", "super", "sub", "middle"].map((va) => (
              <div key={va} style={{ marginBottom: "16px" }}>
                <div
                  style={{
                    fontSize: "13px",
                    color: "#999",
                    marginBottom: "6px",
                  }}
                >
                  vertical-align: {va}
                </div>
                <div style={rowStyle}>
                  <div style={cellStyle}>
                    <span style={labelStyle}>hardcode</span>
                    <div style={containerStyle}>
                      <span style={{ ...textStyle, verticalAlign: va }}>
                        Notifications
                      </span>
                      <Badge count={42} fontSize={16} />
                    </div>
                  </div>
                  <div style={cellStyle}>
                    <span style={labelStyle}>@jsenv/navi</span>
                    <div style={containerStyle}>
                      <span style={{ ...textStyle, verticalAlign: va }}>
                        Notifications
                      </span>
                      <BadgeCount background="#e74c3c" color="white">
                        {42}
                      </BadgeCount>
                    </div>
                  </div>
                  <div style={cellStyle}>
                    <span style={labelStyle}>@jsenv/navi circle</span>
                    <div style={containerStyle}>
                      <span style={{ ...textStyle, verticalAlign: va }}>
                        Notifications
                      </span>
                      <BadgeCount background="#e74c3c" color="white" circle>
                        {42}
                      </BadgeCount>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        );
      };

      render(<Demo />, document.querySelector("#app"));
    </script>
  </body>
</html>
