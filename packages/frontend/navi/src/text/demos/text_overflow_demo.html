<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Text Overflow Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { BadgeCount, Box, Icon, Text } from "@jsenv/navi";

      const IconTextDemo = () => {
        const [width, setWidth] = useState(300);
        const [isLoading, setIsLoading] = useState(false);
        return (
          <div>
            <div
              style={{
                display: "flex",
                alignItems: "center",
                gap: "20px",
                marginBottom: "12px",
                fontSize: "14px",
                flexWrap: "wrap",
              }}
            >
              <label
                style={{ display: "flex", alignItems: "center", gap: "8px" }}
              >
                Container width: <strong>{width}px</strong>
                <input
                  type="range"
                  min="80"
                  max="600"
                  value={width}
                  onInput={(e) => setWidth(Number(e.target.value))}
                  style={{ width: "200px" }}
                />
              </label>
              <label
                style={{ display: "flex", alignItems: "center", gap: "6px" }}
              >
                <input
                  type="checkbox"
                  checked={isLoading}
                  onChange={(e) => setIsLoading(e.target.checked)}
                />
                loading
              </label>
            </div>

            <p style={{ fontSize: "13px", color: "#555", margin: "0 0 6px" }}>
              Simple: icon + text
            </p>
            <Box
              flex
              padding="s"
              spacing="s"
              width={width}
              border="1px solid #ccc"
              alignY="center"
            >
              <Icon shrink={false}>
                <StarSvg />
              </Icon>
              <Text overflowEllipsis loading={isLoading} minWidth="0">
                A very long label that will be truncated when the container is
                too narrow to show it all
              </Text>
            </Box>

            <p
              style={{ fontSize: "13px", color: "#555", margin: "12px 0 6px" }}
            >
              Nested: outer flex [fixed item | inner flex [text | icon]]
            </p>
            <Box
              flex
              spacing="s"
              width={width}
              border="1px solid #ccc"
              alignY="center"
            >
              <Box
                flex
                padding="xs"
                expandY
                alignY="center"
                border="1px solid #4caf50"
                borderRadius="4px"
              >
                Fixed
              </Box>
              <Box
                flex
                height="4em"
                spacing="s"
                alignY="center"
                expandX
                minWidth="0"
              >
                <Text overflowEllipsis expandX loading={isLoading}>
                  A very long label inside the inner flex that should truncate
                  before the trailing icon disappears
                </Text>
                <Icon shrink={false}>
                  <StarSvg />
                </Icon>
              </Box>
            </Box>
          </div>
        );
      };

      const App = () => {
        return (
          <div
            style={{
              padding: "20px",
              fontFamily: "system-ui, sans-serif",
              maxWidth: "900px",
              lineHeight: "1.5",
            }}
          >
            <h1>Text Overflow Demo</h1>

            <nav
              style={{
                marginBottom: "40px",
                padding: "20px",
                background: "#f8f9fa",
                borderRadius: "8px",
                fontSize: "14px",
              }}
            >
              <strong
                style={{
                  display: "block",
                  marginBottom: "8px",
                  fontSize: "16px",
                }}
              >
                Table des matières
              </strong>
              <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
                <li>
                  <a href="#s-two-col-flex">Two-column flex layout</a>
                </li>
                <li>
                  <a href="#s-icon-text">
                    Icon + overflowing text in a flex row
                  </a>
                </li>
                <li>
                  <a href="#s-two-col-grid">Two-column grid layout</a>
                </li>
                <li>
                  <a href="#s-basic">Basic</a>
                </li>
                <li>
                  <a href="#s-pinned">Pinned Content</a>
                </li>
                <li>
                  <a href="#s-icons-styled">Icons &amp; Styled Text</a>
                </li>
                <li>
                  <a href="#s-widths">Container Widths</a>
                </li>
                <li>
                  <a href="#s-html">HTML Elements</a>
                </li>
                <li>
                  <a href="#s-complex-pinned">Complex Pinned Content</a>
                </li>
                <li>
                  <a href="#s-interactive">Interactive Width</a>
                </li>
                <li>
                  <a href="#s-multiline">Multiline Behavior</a>
                </li>
              </ol>
            </nav>

            <section>
              <h2 id="s-two-col-flex">Two-column flex layout</h2>
              <Box flex spacing="0" width="300">
                <Text overflowEllipsis border="1px solid #ccc">
                  This is a long text in the first column that should be
                  truncated with an ellipsis when there is not enough space.
                </Text>
                <Box border="1px solid #4caf50" shrink={false}>
                  Second column
                </Box>
              </Box>
            </section>

            <section>
              <h2 id="s-icon-text">Icon + overflowing text in a flex row</h2>
              <IconTextDemo />
            </section>

            <section>
              <h2 id="s-two-col-grid">Two-column grid layout</h2>
              {[
                "fit-content(80px) 1fr",
                "minmax(0, 1fr) 100px",
                "auto 100px",
              ].map((cols) => (
                <div key={cols} style={{ marginBottom: "12px" }}>
                  <div
                    style={{
                      fontSize: "12px",
                      color: "#666",
                      marginBottom: "4px",
                    }}
                  >
                    grid-template-columns: <code>{cols}</code>
                  </div>
                  <Box
                    grid
                    style={{ gridTemplateColumns: cols }}
                    spacing="12"
                    width="300"
                  >
                    <Text overflowEllipsis border="1px solid #ccc">
                      This is a long text in the first column that should be
                      truncated with an ellipsis when there is not enough space.
                    </Text>
                    <Box border="1px solid #4caf50" shrink={false}>
                      Second column
                    </Box>
                  </Box>
                </div>
              ))}
            </section>

            <section>
              <h2 id="s-basic">Basic</h2>
              <Box width="220" border="1px solid #ccc" padding="sm">
                <Text overflowEllipsis>
                  This is a very long text that should be truncated with
                  ellipsis when it overflows this small container.
                </Text>
              </Box>
            </section>

            <section>
              <h2 id="s-pinned">Pinned Content</h2>
              <Box row spacing="16px">
                <Box width="260" border="1px solid #ccc" padding="sm">
                  <Text overflowEllipsis>
                    This text has extra info that stays visible
                    <Text overflowPinned color="#666">
                      (modified)
                    </Text>
                  </Text>
                </Box>
                <Box width="260" border="1px solid #ccc" padding="sm">
                  <Text overflowEllipsis>
                    Text with a dynamic count that is long and will overflow
                    <Text overflowPinned color="#4caf50">
                      <BadgeCount background="violet" color="white">
                        10
                      </BadgeCount>
                    </Text>
                  </Text>
                </Box>
              </Box>
            </section>

            <section>
              <h2 id="s-icons-styled">Icons &amp; Styled Text</h2>
              <p style={{ color: "#555", fontSize: "14px" }}>
                Inline icons and styled fragments inside an overflow ellipsis
                will auto-space correctly while the pinned part stays visible.
              </p>
              <Box row spacing="16px">
                <Box width="300" border="1px solid #ccc" padding="sm">
                  <Text overflowEllipsis>
                    <Icon color="orange">
                      <StarSvg />
                    </Icon>
                    <Text textBold>Important</Text> notification about a process
                    currently running with status
                    <Icon>
                      <StarSvg />
                    </Icon>
                    <Text textItalic>active</Text>
                    <Text overflowPinned color="#666">
                      (live)
                    </Text>
                  </Text>
                </Box>
                <Box width="300" border="1px solid #ccc" padding="sm">
                  <Text overflowEllipsis spacing="l">
                    <Icon color="orange">
                      <StarSvg />
                    </Icon>
                    <Text textBold>Important</Text> notification about a process
                    currently running with status
                    <Icon>
                      <StarSvg />
                    </Icon>
                    <Text textItalic>active</Text>
                    <Text overflowPinned color="#666">
                      (live)
                    </Text>
                  </Text>
                </Box>
                <Box width="180" border="1px solid #ccc" padding="sm">
                  <Text overflowEllipsis>
                    <Icon>
                      <StarSvg />
                    </Icon>
                    <Text textUnderline>Truncated</Text> sequence showcasing
                    icon spacing with styled parts
                    <Text overflowPinned color="#666">
                      (ok)
                    </Text>
                  </Text>
                </Box>
              </Box>
            </section>

            <section>
              <h2 id="s-widths">Container Widths</h2>
              <Box row spacing="12px">
                {[150, 200, 300, 400].map((width) => (
                  <div
                    key={width}
                    style={{
                      width: `${width}px`,
                      border: "1px solid #ccc",
                      padding: "8px",
                    }}
                  >
                    <div
                      style={{
                        fontSize: "12px",
                        color: "#666",
                        marginBottom: "4px",
                      }}
                    >
                      Width: {width}px
                    </div>
                    <Text overflowEllipsis>
                      Lorem ipsum dolor sit amet, consectetur adipiscing elit,
                      sed do eiusmod tempor
                    </Text>
                  </div>
                ))}
              </Box>
            </section>

            <section>
              <h2 id="s-html">HTML Elements</h2>
              <Box row spacing="12px">
                <div
                  style={{
                    width: "200px",
                    border: "1px solid #ccc",
                    padding: "8px",
                  }}
                >
                  <div
                    style={{
                      fontSize: "12px",
                      color: "#666",
                      marginBottom: "4px",
                    }}
                  >
                    as=&quot;div&quot; (default)
                  </div>
                  <Text overflowEllipsis>
                    This is rendered as a div element with overflow handling
                  </Text>
                </div>

                <div
                  style={{
                    width: "200px",
                    border: "1px solid #ccc",
                    padding: "8px",
                  }}
                >
                  <div
                    style={{
                      fontSize: "12px",
                      color: "#666",
                      marginBottom: "4px",
                    }}
                  >
                    as=&quot;p&quot;
                  </div>
                  <Text as="p" overflowEllipsis>
                    This is rendered as a paragraph element with overflow
                  </Text>
                </div>

                <div
                  style={{
                    width: "200px",
                    border: "1px solid #ccc",
                    padding: "8px",
                  }}
                >
                  <div
                    style={{
                      fontSize: "12px",
                      color: "#666",
                      marginBottom: "4px",
                    }}
                  >
                    as=&quot;span&quot;
                  </div>
                  <Text as="span" overflowEllipsis>
                    This is rendered as a span element with overflow
                  </Text>
                </div>
              </Box>
            </section>

            <section>
              <h2 id="s-complex-pinned">Complex Pinned Content</h2>
              <Box row spacing="12px">
                <div
                  style={{
                    width: "280px",
                    border: "1px solid #ccc",
                    padding: "8px",
                  }}
                >
                  <div
                    style={{
                      fontSize: "12px",
                      color: "#666",
                      marginBottom: "4px",
                    }}
                  >
                    With icon after
                  </div>
                  <Text overflowEllipsis>
                    Important message that might be too long to display fully
                    <Text overflowPinned color="#f44336" size="sm">
                      ⚠️
                    </Text>
                  </Text>
                </div>

                <div
                  style={{
                    width: "300px",
                    border: "1px solid #ccc",
                    padding: "8px",
                  }}
                >
                  <div
                    style={{
                      fontSize: "12px",
                      color: "#666",
                      marginBottom: "4px",
                    }}
                  >
                    With multiple elements after
                  </div>
                  <Text overflowEllipsis>
                    Document title with attachment count and icon that
                    demonstrates overflow
                    <Text overflowPinned>
                      <div
                        style={{
                          display: "flex",
                          gap: "4px",
                          alignItems: "center",
                        }}
                      >
                        <span style={{ fontSize: "12px", color: "#666" }}>
                          (3)
                        </span>
                        <span style={{ fontSize: "14px" }}>📎</span>
                      </div>
                    </Text>
                  </Text>
                </div>
              </Box>
            </section>

            <section>
              <h2 id="s-interactive">Interactive Width</h2>
              <InteractiveWidthDemo />
            </section>

            <section>
              <h2 id="s-multiline">Multiline Behavior</h2>
              <Box row spacing="16px">
                <div
                  style={{
                    width: "200px",
                    border: "1px solid #ccc",
                    padding: "8px",
                  }}
                >
                  <div
                    style={{
                      fontSize: "12px",
                      color: "#666",
                      marginBottom: "4px",
                    }}
                  >
                    Text with line breaks
                  </div>
                  <Text overflowEllipsis>
                    First line of text{"\n"}
                    Second line of text{"\n"}
                    Third line that should overflow
                  </Text>
                </div>

                <div
                  style={{
                    width: "200px",
                    border: "1px solid #ccc",
                    padding: "8px",
                  }}
                >
                  <div
                    style={{
                      fontSize: "12px",
                      color: "#666",
                      marginBottom: "4px",
                    }}
                  >
                    Vertical alignment comparison
                  </div>
                  <Box layoutRow lineHeight="100px">
                    <Text overflowEllipsis>
                      Just a long line of text that would get overflowed.
                    </Text>
                    <Text overflowEllipsis>
                      Just a long line of text that would get overflowed.
                    </Text>
                  </Box>
                </div>
              </Box>
            </section>
          </div>
        );
      };

      const InteractiveWidthDemo = () => {
        const [width, setWidth] = useState(200);

        return (
          <Box row spacing="12px">
            <Box column spacing="12px" alignY="center">
              <label htmlFor="width-slider">Container Width: {width}px</label>
              <input
                id="width-slider"
                type="range"
                min="100"
                max="500"
                value={width}
                onChange={(e) => setWidth(Number(e.target.value))}
                style={{ width: "200px" }}
              />
            </Box>

            <Box width={width} border="2px solid #2196f3" padding="sm">
              <Text overflowEllipsis textBold>
                Resize me to see how the text overflow behavior adapts to
                different container widths
                <Text overflowPinned textColor="#666">
                  ✓
                </Text>
              </Text>
            </Box>
          </Box>
        );
      };

      const StarSvg = () => (
        <svg
          viewBox="0 0 24 24"
          width="100%"
          height="100%"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
            fill="currentColor"
          />
        </svg>
      );

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
