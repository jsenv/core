<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Text Overflow Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Box, Icon, Text } from "@jsenv/navi";

      const App = () => {
        return (
          <div
            style={{
              padding: "20px",
              fontFamily: "system-ui, sans-serif",
              maxWidth: "900px",
              lineHeight: "1.5",
            }}
          >
            <h1>Text Overflow Demo</h1>
            <p
              style={{
                background: "#fff8e1",
                border: "1px solid #ffe082",
                borderRadius: "6px",
                padding: "10px 14px",
                fontSize: "14px",
                marginBottom: "16px",
              }}
            >
              <strong>Which to use?</strong>
              <br />→ <code>{"maxLines={1}"}</code> — single-line: text is
              forced onto one line and truncated with <code>…</code> (
              <code>white-space: nowrap</code> +{" "}
              <code>text-overflow: ellipsis</code>
              ).
              <br />→ <code>{"maxLines={N}"}</code> where N &gt; 1 — multi-line
              clamp: up to N lines are shown, the rest is truncated with{" "}
              <code>…</code> via <code>-webkit-line-clamp</code>.
            </p>
            <Toc />
            <section>
              <h2 id="s-two-col-flex">Two-column flex layout</h2>
              <TwoColFlexSection />
            </section>
            <section>
              <h2 id="s-icon-text">Icon + overflowing text in a flex row</h2>
              <IconTextSection />
            </section>
            <section>
              <h2 id="s-two-col-grid">Two-column grid layout</h2>
              <TwoColGridSection />
            </section>
            <section>
              <h2 id="s-basic">Basic</h2>
              <BasicSection />
            </section>
            <section>
              <h2 id="s-pinned">Trailing Content (right of ellipsis)</h2>
              <PinnedSection />
            </section>
            <section>
              <h2 id="s-icons-styled">Icons &amp; Styled Text</h2>
              <IconsStyledSection />
            </section>
            <section>
              <h2 id="s-widths">Container Widths</h2>
              <WidthsSection />
            </section>
            <section>
              <h2 id="s-html">HTML Elements</h2>
              <HtmlSection />
            </section>
            <section>
              <h2 id="s-complex-pinned">Complex trailing content</h2>
              <ComplexPinnedSection />
            </section>
            <section>
              <h2 id="s-interactive">Interactive Width</h2>
              <InteractiveWidthSection />
            </section>
            <section>
              <h2 id="s-multiline">Multiline Behavior</h2>
              <MultilineSection />
            </section>
            <section>
              <h2 id="s-line-clamp">Line Clamp (maxLines &gt; 1)</h2>
              <MaxLinesSection />
            </section>
            <section>
              <h2 id="s-text-align">Text Align</h2>
              <TextAlignSection />
            </section>
          </div>
        );
      };

      const Toc = () => {
        return (
          <nav
            style={{
              marginBottom: "40px",
              padding: "20px",
              background: "#f8f9fa",
              borderRadius: "8px",
              fontSize: "14px",
            }}
          >
            <strong
              style={{
                display: "block",
                marginBottom: "8px",
                fontSize: "16px",
              }}
            >
              Table des matières
            </strong>
            <ol style={{ margin: 0, paddingLeft: "20px", lineHeight: "2" }}>
              <li>
                <a href="#s-two-col-flex">Two-column flex layout</a>
              </li>
              <li>
                <a href="#s-icon-text">Icon + overflowing text in a flex row</a>
              </li>
              <li>
                <a href="#s-two-col-grid">Two-column grid layout</a>
              </li>
              <li>
                <a href="#s-basic">Basic</a>
              </li>
              <li>
                <a href="#s-pinned">Trailing Content (right of ellipsis)</a>
              </li>
              <li>
                <a href="#s-icons-styled">Icons &amp; Styled Text</a>
              </li>
              <li>
                <a href="#s-widths">Container Widths</a>
              </li>
              <li>
                <a href="#s-html">HTML Elements</a>
              </li>
              <li>
                <a href="#s-complex-pinned">Complex trailing content</a>
              </li>
              <li>
                <a href="#s-interactive">Interactive Width</a>
              </li>
              <li>
                <a href="#s-multiline">Multiline Behavior</a>
              </li>
              <li>
                <a href="#s-line-clamp">Line Clamp (maxLines &gt; 1)</a>
              </li>
              <li>
                <a href="#s-text-align">Text Align</a>
              </li>
            </ol>
          </nav>
        );
      };

      const TwoColFlexSection = () => {
        return (
          <Box flex spacing="0" width="300">
            <Text maxLines={1} border="1px solid #ccc">
              This is a long text in the first column that should be truncated
              with an ellipsis when there is not enough space.
            </Text>
            <Box border="1px solid #4caf50" shrink={false}>
              Second column
            </Box>
          </Box>
        );
      };

      const IconTextSection = () => {
        const [width, setWidth] = useState(300);
        const [isLoading, setIsLoading] = useState(false);
        return (
          <div>
            <div
              style={{
                display: "flex",
                alignItems: "center",
                gap: "20px",
                marginBottom: "12px",
                fontSize: "14px",
                flexWrap: "wrap",
              }}
            >
              <label
                style={{ display: "flex", alignItems: "center", gap: "8px" }}
              >
                Container width: <strong>{width}px</strong>
                <input
                  type="range"
                  min="80"
                  max="600"
                  value={width}
                  onInput={(e) => setWidth(Number(e.target.value))}
                  style={{ width: "200px" }}
                />
              </label>
              <label
                style={{ display: "flex", alignItems: "center", gap: "6px" }}
              >
                <input
                  type="checkbox"
                  checked={isLoading}
                  onChange={(e) => setIsLoading(e.target.checked)}
                />
                loading
              </label>
            </div>

            <p style={{ fontSize: "13px", color: "#555", margin: "0 0 6px" }}>
              Simple: icon + text
            </p>
            <Box
              flex
              padding="s"
              spacing="s"
              width={width}
              border="1px solid #ccc"
              alignY="center"
            >
              <Icon shrink={false}>
                <StarSvg />
              </Icon>
              <Text maxLines={1} loading={isLoading} minWidth="0">
                A very long label that will be truncated when the container is
                too narrow to show it all
              </Text>
            </Box>

            <p
              style={{ fontSize: "13px", color: "#555", margin: "12px 0 6px" }}
            >
              Nested: outer flex [fixed item | inner flex [text | icon]]
            </p>
            <Box
              flex
              spacing="s"
              width={width}
              border="1px solid #ccc"
              alignY="center"
            >
              <Box
                flex
                padding="xs"
                expandY
                alignY="center"
                border="1px solid #4caf50"
                borderRadius="4px"
              >
                Fixed
              </Box>
              <Box
                flex
                height="4em"
                spacing="s"
                alignY="center"
                expandX
                minWidth="0"
              >
                <Text maxLines={1} expandX loading={isLoading}>
                  A very long label inside the inner flex that should truncate
                  before the trailing icon disappears
                </Text>
                <Icon shrink={false}>
                  <StarSvg />
                </Icon>
              </Box>
            </Box>
          </div>
        );
      };

      const TwoColGridSection = () => {
        return (
          <>
            {[
              "fit-content(80px) 1fr",
              "minmax(0, 1fr) 100px",
              "auto 100px",
            ].map((cols) => (
              <div key={cols} style={{ marginBottom: "12px" }}>
                <div
                  style={{
                    fontSize: "12px",
                    color: "#666",
                    marginBottom: "4px",
                  }}
                >
                  grid-template-columns: <code>{cols}</code>
                </div>
                <Box
                  grid
                  style={{ gridTemplateColumns: cols }}
                  spacing="12"
                  width="300"
                >
                  <Text maxLines={1} border="1px solid #ccc">
                    This is a long text in the first column that should be
                    truncated with an ellipsis when there is not enough space.
                  </Text>
                  <Box border="1px solid #4caf50" shrink={false}>
                    Second column
                  </Box>
                </Box>
              </div>
            ))}
          </>
        );
      };

      const BasicSection = () => {
        return (
          <Box width="220" border="1px solid #ccc" padding="sm">
            <Text maxLines={1}>
              This is a very long text that should be truncated with ellipsis
              when it overflows this small container.
            </Text>
          </Box>
        );
      };

      const PinnedSection = () => {
        return (
          <Box row spacing="16px">
            <Box flex width="260" border="1px solid #ccc" padding="s">
              <Text maxLines={1}>
                This text has extra info while keeping a trailing label visible
              </Text>
              <Text color="#666" shrink={false}>
                (modified)
              </Text>
            </Box>
            <Box flex width="260" border="1px solid #ccc" padding="s">
              <Text maxLines={1}>
                Text with a dynamic count that is long and will overflow
              </Text>
              <Text color="#4caf50" shrink={false}>
                (10)
              </Text>
            </Box>
          </Box>
        );
      };

      const IconsStyledSection = () => {
        return (
          <>
            <p style={{ color: "#555", fontSize: "14px" }}>
              Inline icons and styled fragments inside an overflow ellipsis will
              auto-space correctly across mixed inline elements.
            </p>
            <Box row spacing="16px">
              <Box flex width="300" border="1px solid #ccc" padding="s">
                <Text maxLines={1}>
                  <Icon color="orange">
                    <StarSvg />
                  </Icon>
                  <Text textBold>Important</Text> notification about a process
                  currently running with status
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Text textItalic>active</Text>
                </Text>
                <Text color="#666">(live)</Text>
              </Box>
              <Box flex width="300" border="1px solid #ccc" padding="sm">
                <Text maxLines={1} spacing="l">
                  <Icon color="orange">
                    <StarSvg />
                  </Icon>
                  <Text textBold>Important</Text> notification about a process
                  currently running with status
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Text textItalic>active</Text>
                </Text>
                <Text color="#666">(live)</Text>
              </Box>
              <Box flex width="180" border="1px solid #ccc" padding="sm">
                <Text maxLines={1}>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Text textUnderline>Truncated</Text> sequence showcasing icon
                  spacing with styled parts
                </Text>
                <Text color="#666">(ok)</Text>
              </Box>
            </Box>
          </>
        );
      };

      const WidthsSection = () => {
        return (
          <Box row spacing="12px">
            {[150, 200, 300, 400].map((width) => (
              <div
                key={width}
                style={{
                  width: `${width}px`,
                  border: "1px solid #ccc",
                  padding: "8px",
                }}
              >
                <div
                  style={{
                    fontSize: "12px",
                    color: "#666",
                    marginBottom: "4px",
                  }}
                >
                  Width: {width}px
                </div>
                <Text maxLines={1}>
                  Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed
                  do eiusmod tempor
                </Text>
              </div>
            ))}
          </Box>
        );
      };

      const HtmlSection = () => {
        return (
          <Box row spacing="12px">
            <div
              style={{
                width: "200px",
                border: "1px solid #ccc",
                padding: "8px",
              }}
            >
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                as=&quot;div&quot; (default)
              </div>
              <Text maxLines={1}>
                This is rendered as a div element with overflow handling
              </Text>
            </div>
            <div
              style={{
                width: "200px",
                border: "1px solid #ccc",
                padding: "8px",
              }}
            >
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                as=&quot;p&quot;
              </div>
              <Text as="p" maxLines={1}>
                This is rendered as a paragraph element with overflow
              </Text>
            </div>
            <div
              style={{
                width: "200px",
                border: "1px solid #ccc",
                padding: "8px",
              }}
            >
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                as=&quot;span&quot;
              </div>
              <Text as="span" maxLines={1}>
                This is rendered as a span element with overflow
              </Text>
            </div>
          </Box>
        );
      };

      const ComplexPinnedSection = () => {
        return (
          <Box row spacing="12px">
            <div
              style={{
                width: "280px",
                border: "1px solid #ccc",
                padding: "8px",
              }}
            >
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                With icon after
              </div>
              <Box flex>
                <Text maxLines={1}>
                  Important message that might be too long to display fully
                </Text>
                <Text color="#f44336" size="s" shrink={false}>
                  ⚠
                </Text>
              </Box>
            </div>
            <div
              style={{
                width: "300px",
                border: "1px solid #ccc",
                padding: "8px",
              }}
            >
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                With multiple trailing elements
              </div>
              <Box flex>
                <Text maxLines={1}>
                  Document title with attachment count and icon that
                  demonstrates overflow
                </Text>
                <Box flex spacing="4px" alignY="center" shrink={false}>
                  <span style={{ fontSize: "12px", color: "#666" }}>(3)</span>
                  <span style={{ fontSize: "14px" }}>@</span>
                </Box>
              </Box>
            </div>
          </Box>
        );
      };

      const InteractiveWidthSection = () => {
        const [width, setWidth] = useState(200);
        return (
          <Box row spacing="12px">
            <Box column spacing="12px" alignY="center">
              <label htmlFor="width-slider">Container Width: {width}px</label>
              <input
                id="width-slider"
                type="range"
                min="100"
                max="500"
                value={width}
                onChange={(e) => setWidth(Number(e.target.value))}
                style={{ width: "200px" }}
              />
            </Box>
            <Box flex width={width} border="2px solid #2196f3" padding="s">
              <Text maxLines={1} textBold>
                Resize me to see how the text overflow behavior adapts to
                different container widths
              </Text>
              <Text textColor="#666">✓</Text>
            </Box>
          </Box>
        );
      };

      const MultilineSection = () => {
        return (
          <Box row spacing="16px">
            <div
              style={{
                width: "200px",
                border: "1px solid #ccc",
                padding: "8px",
              }}
            >
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                Text with line breaks
              </div>
              <Text maxLines={1}>
                First line of text{"\n"}
                Second line of text{"\n"}
                Third line that should overflow
              </Text>
            </div>
            <div
              style={{
                width: "200px",
                border: "1px solid #ccc",
                padding: "8px",
              }}
            >
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                Vertical alignment comparison
              </div>
              <Box layoutRow lineHeight="100px">
                <Text maxLines={1}>
                  Just a long line of text that would get overflowed.
                </Text>
                <Text maxLines={1}>
                  Just a long line of text that would get overflowed.
                </Text>
              </Box>
            </div>
          </Box>
        );
      };

      const MaxLinesSection = () => {
        return (
          <Box row spacing="16px" style={{ flexWrap: "wrap" }}>
            {[2, 3, 5].map((n) => (
              <div
                key={n}
                style={{
                  width: "260px",
                  border: "1px solid #ccc",
                  padding: "8px",
                }}
              >
                <div
                  style={{
                    fontSize: "12px",
                    color: "#666",
                    marginBottom: "4px",
                  }}
                >
                  maxLines={n}
                </div>
                <Text maxLines={n}>
                  Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed
                  do eiusmod tempor incididunt ut labore et dolore magna aliqua.
                  Ut enim ad minim veniam, quis nostrud exercitation ullamco
                  laboris nisi ut aliquip ex ea commodo consequat. Duis aute
                  irure dolor in reprehenderit in voluptate velit esse cillum.
                </Text>
              </div>
            ))}
          </Box>
        );
      };

      const TextAlignSection = () => {
        const shortText = "Short text";
        return (
          <Box flex="y" spacing="16px">
            <Box row spacing="16px" style={{ flexWrap: "wrap" }}>
              <div
                style={{
                  width: "220px",
                  border: "1px solid #ccc",
                  padding: "8px",
                }}
              >
                <div
                  style={{
                    fontSize: "12px",
                    color: "#666",
                    marginBottom: "4px",
                  }}
                >
                  {'alignX="center"'}
                </div>
                <Text maxLines={1} alignX="center">
                  {shortText}
                </Text>
              </div>
              <div
                style={{
                  width: "220px",
                  border: "1px solid #ccc",
                  padding: "8px",
                }}
              >
                <div
                  style={{
                    fontSize: "12px",
                    color: "#666",
                    marginBottom: "4px",
                  }}
                >
                  {'alignX="end"'}
                </div>
                <Text maxLines={1} alignX="end">
                  {shortText}
                </Text>
              </div>
            </Box>
            <div>
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                parent <code>Box</code> avec <code>{'textAlign="center"'}</code>{" "}
                — fonctionne car <code>box_style_util</code> génère{" "}
                <code>justifyContent</code> en plus de <code>textAlign</code>
              </div>
              <Box
                style={{
                  width: "220px",
                  border: "1px solid #ccc",
                  padding: "8px",
                }}
                textAlign="center"
              >
                <Text maxLines={1}>{shortText}</Text>
              </Box>
            </div>
            <div>
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                parent <code>div</code> avec{" "}
                <code>{'style={{ textAlign: "center" }}'}</code> brut — ne
                fonctionne pas si le parent est flex
              </div>
              <div
                style={{
                  width: "220px",
                  border: "1px solid #ccc",
                  padding: "8px",
                  textAlign: "center",
                }}
              >
                <Text maxLines={1}>{shortText}</Text>
              </div>
            </div>
            <div>
              <div
                style={{
                  fontSize: "12px",
                  color: "#666",
                  marginBottom: "4px",
                }}
              >
                parent flex avec{" "}
                <code>{'style={{ justifyContent: "center" }}'}</code> (pas de
                alignX sur le Text)
              </div>
              <div
                style={{
                  width: "220px",
                  border: "1px solid #ccc",
                  padding: "8px",
                  display: "flex",
                  justifyContent: "center",
                }}
              >
                <Text maxLines={1}>{shortText}</Text>
              </div>
            </div>
          </Box>
        );
      };

      const StarSvg = () => (
        <svg
          viewBox="0 0 24 24"
          width="100%"
          height="100%"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
            fill="currentColor"
          />
        </svg>
      );

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
