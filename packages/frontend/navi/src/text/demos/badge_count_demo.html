        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#introduction" />
            Qu'est-ce qu'un Badge Count ?
          </Title>

          <Paragraph>
            Un badge count est un composant visuel qui affiche un nombre dans un
            badge, typiquement utilisé pour indiquer des notifications, des
            éléments dans un panier, ou toute autre valeur numérique à mettre en
            évidence.
          </Paragraph>

          <Title as="h3">Exemples de badges par défaut</Title>
          <Paragraph>
            Voici des exemples de badges avec différents nombres en utilisant la
            configuration par défaut :
          </Paragraph>

          <Box row spacing="s" alignX="start">
            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Messages
                <BadgeCount background="#4caf50">5</BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Messages
                <BadgeCount background="darkred">42</BadgeCount>
              </Text>
            </Box>

              <Text>
                Messages
                <BadgeCount background="#2196f3">1247</BadgeCount>
              </Text>
            </Box>
          </Box>

          <Title as="h3">Pourquoi la forme ellipse par défaut ?</Title>
          <Paragraph>
            Le composant BadgeCount utilise par défaut la forme ellipse car elle
            permet d'afficher efficacement aussi bien de petits nombres que de
            très grands nombres.
          </Paragraph>

          <Paragraph>
            À l'inverse, la forme circulaire pose des problèmes pour de grands
            nombres : le rayon du cercle devrait devenir très grand pour
            accommoder 3+ chiffres, rendant le badge disproportionné et peu
            esthétique.
          </Paragraph>

          <Title as="h3">Activation de la forme circulaire</Title>
          <Paragraph>
            Il est néanmoins possible d'activer la forme circulaire avec la prop{" "}
            <code>circle</code> :
          </Paragraph>

          <Box row spacing="s">
            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Messages
                <BadgeCount circle background="#4caf50" color="white">
                  5

              <Text>
                Messages

                  42
                </BadgeCount>
              </Text>
            </Box>

                Messages
                <BadgeCount circle background="#f44336" color="white">
                  127
                </BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Messages
                <BadgeCount circle background="#f44336" color="white">
                  1270
                </BadgeCount>
              </Text>
            </Box>
          </Box>

          <Title as="h3">Système de limitation 99+</Title>
          <Paragraph>
            Quand on utilise la forme circulaire, le composant affiche
            automatiquement "99+" lorsque la valeur dépasse 99, évitant ainsi
            d'afficher 3 chiffres qui rendraient le cercle trop grand.
          </Paragraph>

          <Box
            padding="md"
            background="#fff3e0"
            borderRadius="md"
            marginTop="md"
          >
            <Paragraph style={{ margin: 0 }}>
              <strong>⚠️ Limitation :</strong> Le système ne peut pas aller
              jusqu'à "999+" car cela ferait 4 caractères, ce qui serait encore
              plus problématique visuellement dans un cercle. C'est pourquoi la
              limite reste à "99+".
            </Paragraph>
          </Box>

          <Title as="h3">Basculement automatique avec max={Infinity}</Title>
          <Paragraph>
            Si vous combinez <code>circle</code> avec{" "}
            <code>max={Infinity}</code>, le composant bascule automatiquement en
            mode ellipse si la valeur dépasse ce qui peut être raisonnablement
            affiché dans un cercle :
          </Paragraph>

          <Box row spacing="s">
            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Messages
                <BadgeCount
                  circle
                  max={Infinity}
                  background="#4caf50"
                  color="white"
                >
                  5
                </BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Messages
                <BadgeCount
                  circle
                  max={Infinity}
                  background="#ff9800"
                  color="white"
                >
                  42
                </BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>

                  circle

                  background="#2196f3"
                  color="white"

            padding="md"
            background="#fff3e0"
            borderRadius="md"
            marginTop="md"
          >
            <Paragraph style={{ margin: 0 }}>
              <strong>⚠️ Important :</strong> Le basculement automatique de
              cercle vers ellipse peut casser l'harmonie visuelle d'un design
              system ou l'intention esthétique d'un designer qui souhaite
              maintenir une forme circulaire cohérente. C'est pourquoi ce
              comportement n'est pas activé par défaut et nécessite une
              configuration explicite.
            </Paragraph>
          </Box>

          <Box
            padding="md"
            background="#e8f5e8"
            borderRadius="md"
            marginTop="md"
          >
            <Paragraph style={{ margin: 0 }}>
              <strong>💡 Résumé :</strong> Par défaut, utilisez la forme ellipse
              pour sa flexibilité. Utilisez <code>circle</code> pour des petits
              nombres ou des contextes spécifiques. La combinaison{" "}
              <code>circle + max={Infinity}</code> offre un comportement hybride
              qui peut convenir dans certains cas d'usage.
            </Paragraph>
          </Box>
        </Box>

                <Caption>Button with badge</Caption>
                <br />
                <Button>
                  Tâches
                  <BadgeCount background="#2196f3" color="white">
                    5
                  </BadgeCount>
                </Button>
              </div>
              <div>
                <Caption>Vertically aligned</Caption>
                <br />
                <Button box alignY="center" spacing="xxs">
                  <span>Tâches</span>
                  <BadgeCount background="#2196f3" color="white">
                    5
                  </BadgeCount>
                </Button>
              </div>

              <div>
                <Caption>Vertically aligned + "m" spacing</Caption>
                <br />
                <Button box alignY="center" spacing="m">
                  <span>Tâches</span>
                  <BadgeCount background="#2196f3" color="white">
                    5
                  </BadgeCount>
                </Button>
              </div>
            </Box>

            <div>
              <Caption>Button with badge size="s"</Caption>
              <br />
              <Button>
                Tâches
                <BadgeCount background="#2196f3" color="white" size="s">
                  5
                </BadgeCount>
              </Button>
            </div>

            <div>
              <Caption>Button lineHeight=2.5</Caption>
              <br />
              <Button lineHeight="2.5">
                Tâches
                <BadgeCount background="#2196f3" color="white">
                  5
                </BadgeCount>
              </Button>
            </div>
          </Box>
        </Box>
      );

      const BadgePositioningSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#badge-positioning" />
            Badge positioning
          </Title>
          <Box row spacing="md">
            <div>
              <Caption>Position au début du conteneur</Caption>
              <Box row spacing="md">
                <Box
                  column
                  alignX="start"
                  alignY="center"
                  border="1px solid #e0e0e0"
                  borderRadius="8px"
                  padding="sm"
                  width="200"
                >
                  <BadgeCount background="#ff9800" color="white" size="xs">
                    12
                  </BadgeCount>
                  <Text selfAlignX="end">Tâches en attente</Text>
                </Box>

                <Box
                  column
                  alignX="end"
                  alignY="center"
                  border="1px solid #e0e0e0"
                  borderRadius="8px"
                  padding="sm"
                  width="250"
                >
                  <BadgeCount
                    background="#4caf50"
                    color="white"
                    selfAlignX="start"
                    size="xs"
                  >
                    12
                  </BadgeCount>
                  <Text>Tâches en attente</Text>
                </Box>
              </Box>
            </div>

            <div>
              <Caption>Position à la fin du conteneur</Caption>
              <Box row spacing="md">
                <Box
                  column
                  alignX="end"
                  alignY="center"
                  border="1px solid #e0e0e0"
                  borderRadius="8px"
                  padding="sm"
                  width="200"
                >
                  <Text selfAlignX="start">Alertes</Text>
                  <BadgeCount background="#d32f2f" color="white" size="xs">
                    25
                  </BadgeCount>
                </Box>

                <Box
                  column
                  alignX="start"
                  alignY="center"
                  border="1px solid #e0e0e0"
                  borderRadius="8px"
                  padding="sm"
                  width="250"
                >
                  Messages
                  <BadgeCount
                    background="#1976d2"
                    color="white"
                    selfAlignX="end"
                  >
                    8
                  </BadgeCount>
                </Box>
              </Box>
            </div>
          </Box>
        </Box>
      );

      const NoWrapSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#nowrap" />
            Association texte + badge (pas de coupure)
          </Title>
          <Box column spacing="md">
            <div>
              <Caption>
                Sans noWrap - Le badge peut être séparé du texte
              </Caption>
              <Paragraph
                overflowEllipsis
                style={{
                  width: "120px",
                  border: "1px solid #ddd",
                  padding: "8px",
                  backgroundColor: "#f9f9f9",
                }}
              >
                <Text>
                  Vous avez
                  <BadgeCount background="#673ab7" color="white">
                    15
                  </BadgeCount>
                  messages
                </Text>
              </Paragraph>
            </div>

            <div>
              <Caption>
                Avec noWrap - Le badge et "messages" restent ensemble
              </Caption>
              <Paragraph
                overflowEllipsis
                style={{
                  width: "120px",
                  border: "1px solid #ddd",
                  padding: "8px",
                  backgroundColor: "#e8f5e8",
                }}
              >
                Vous avez
                <Text noWrap>
                  <BadgeCount background="#673ab7" color="white">
                    15
                  </BadgeCount>
                  messages
                </Text>
              </Paragraph>
            </div>
          </Box>
        </Box>
      );

      const BigNumbersSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#big-numbers" />
            Grands nombres
          </Title>
          <Paragraph>
            Le composant utilise <code>Intl.NumberFormat</code> pour formater
            les nombres selon la langue : <code>1 000</code> en français,{" "}
            <code>1,000</code> en anglais. La langue est détectée
            automatiquement depuis le navigateur et peut être contrôlée via la
            prop <code>lang</code> sur le badge.
          </Paragraph>

          <Title as="h3">Formatage selon la locale du navigateur</Title>
          <Box row spacing="s" alignX="start">
            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Items
                <BadgeCount background="#2196f3" color="white">
                  {1000}
                </BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Items
                <BadgeCount background="#2196f3" color="white">
                  {10000}
                </BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Items
                <BadgeCount background="#2196f3" color="white">
                  {1000000}
                </BadgeCount>
              </Text>
            </Box>
          </Box>

          <Title as="h3">Formatage avec lang="en"</Title>
          <Paragraph>
            Pour forcer une langue spécifique, utiliser la prop{" "}
            <code>lang</code> :
          </Paragraph>
          <Box row spacing="s" alignX="start">
            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Items
                <BadgeCount background="#9c27b0" color="white" lang="en">
                  {1000}
                </BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Items
                <BadgeCount background="#9c27b0" color="white" lang="en">
                  {10000}
                </BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Items
                <BadgeCount background="#9c27b0" color="white" lang="en">
                  {1000000}
                </BadgeCount>
              </Text>
            </Box>
          </Box>

          <Title as="h3">Avec max (limitation)</Title>
          <Paragraph>
            On peut toujours combiner avec <code>max</code> pour limiter
            l'affichage :
          </Paragraph>
          <Box row spacing="s" alignX="start">
            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Items
                <BadgeCount background="#ff9800" color="white" max={999}>
                  {1000}
                </BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Items
                <BadgeCount background="#ff9800" color="white" max={9999}>
                  {10000}
                </BadgeCount>
              </Text>
            </Box>

            <Box padding="md" background="#f8f9fa" borderRadius="md">
              <Text>
                Items
                <BadgeCount background="#ff9800" color="white" max={999999}>
                  {1000000}
                </BadgeCount>
              </Text>
            </Box>
          </Box>

          <Title as="h3">noWrap</Title>
          <Paragraph>
            <code>BadgeCount</code> est un <code>inline-block</code>, ce qui
            garantit que la version formatée du nombre ne peut pas être coupée
            en plusieurs lignes. C'est particulièrement utile pour le français
            où <code>Intl.NumberFormat</code> insère un espace entre les groupes
            de chiffres (ex.&nbsp;<code>1 000 000</code>).
          </Paragraph>
          <Box row spacing="lg" alignX="start">
            <div>
              <Caption>Sans BadgeCount — "1 000 000" peut se couper</Caption>
              <div
                style={{
                  width: "120px",
                  border: "1px solid #ddd",
                  padding: "8px",
                  backgroundColor: "#fff3f3",
                  lineHeight: "1.6",
                }}
              >
                Vous avez 1 000 000 messages
              </div>
            </div>

            <div>
              <Caption>Avec BadgeCount — le nombre reste entier</Caption>
              <div
                style={{
                  width: "120px",
                  border: "1px solid #ddd",
                  padding: "8px",
                  backgroundColor: "#e8f5e8",
                  lineHeight: "1.6",
                }}
              >
                <Text>
                  Vous avez
                  <BadgeCount background="#4caf50" color="white">
                    {1000000}
                  </BadgeCount>
                  messages
                </Text>
              </div>
            </div>
          </Box>

          <Title as="h3">Chaîne en entrée</Title>
          <Paragraph>
            Lorsqu'une chaîne est passée, le badge tente de la convertir en
            nombre via <code>Number()</code>. Si la conversion échoue (par
            exemple <code>"1 000"</code> ou <code>"1,000"</code>), la valeur est
            affichée telle quelle sans formatage ni troncature. C'est le
            comportement attendu : pour bénéficier du formatage, il faut passer
            un nombre.
          </Paragraph>
          <Box row spacing="s" alignX="start">
            <Box row padding="m" background="#f8f9fa" borderRadius="md">
              <Caption>"1000" → nombre reconnu, formaté</Caption>
              <Text>
                Items
                <BadgeCount background="#607d8b" color="white">
                  1000
                </BadgeCount>
              </Text>
            </Box>

            <Box row padding="m" background="#f8f9fa" borderRadius="md">
              <Caption>"1 000" → non reconnu, affiché brut</Caption>
              <Text>
                Items
                <BadgeCount background="#607d8b" color="white">
                  1 000
                </BadgeCount>
              </Text>
            </Box>

            <Box row padding="m" background="#f8f9fa" borderRadius="md">
              <Caption>"1,000" → non reconnu, affiché brut</Caption>
              <Text>
                Items
                <BadgeCount background="#607d8b" color="white">
                  1,000
                </BadgeCount>
              </Text>
            </Box>
          </Box>
        </Box>
      );

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
