<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>TextAnchor Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import { Icon, BadgeCount } from "@jsenv/navi";

      const RedSquareSvg = () => (
        <svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="10" height="5" fill="red" />
          <rect x="0" y="5" width="10" height="5" fill="darkred" />
        </svg>
      );

      const containerStyle = {
        fontSize: "16px",
        padding: "4px 8px",
        backgroundColor: "#f0f8ff",
        border: "2px dotted black",
      };

      const textStyle = {
        backgroundColor: "green",
        color: "white",
      };

      const cellStyle = {
        display: "flex",
        flexDirection: "column",
        gap: "6px",
      };

      const labelStyle = {
        fontSize: "11px",
        color: "#636e72",
        textTransform: "uppercase",
        letterSpacing: "0.05em",
      };

      const rowStyle = {
        display: "flex",
        gap: "32px",
        alignItems: "flex-start",
        marginBottom: "24px",
      };

      const VERTICAL_ALIGN_VALUES = [
        "baseline",
        "middle",
        "top",
        "bottom",
        "super",
        "sub",
      ];

      const TEXT_ANCHOR_VALUES = [
        "line-top",
        "char-top",
        "center",
        "char-bottom",
        "line-bottom",
      ];

      const InlineRowContent = ({ innerSpanStyle, children }) => {
        if (innerSpanStyle) {
          return <span style={innerSpanStyle}>{children}</span>;
        }
        return children;
      };

      const InlineRow = ({
        containerExtraStyle,
        innerSpanStyle,
        iconSize,
        badgeSize,
        textAnchor,
      }) => (
        <div style={rowStyle}>
          <div style={cellStyle}>
            <span style={labelStyle}>icon</span>
            <div style={{ ...containerStyle, ...containerExtraStyle }}>
              <InlineRowContent innerSpanStyle={innerSpanStyle}>
                <span style={textStyle}>Notifications</span>
                <Icon size={iconSize} textAnchor={textAnchor}>
                  <RedSquareSvg />
                </Icon>
                <span style={textStyle}>After</span>
              </InlineRowContent>
            </div>
          </div>
          <div style={cellStyle}>
            <span style={labelStyle}>badge ellipse</span>
            <div style={{ ...containerStyle, ...containerExtraStyle }}>
              <InlineRowContent innerSpanStyle={innerSpanStyle}>
                <span style={textStyle}>Notifications</span>
                <BadgeCount
                  background="#e74c3c"
                  color="white"
                  size={badgeSize}
                  textAnchor={textAnchor}
                >
                  {42}
                </BadgeCount>
                <span style={textStyle}>After</span>
              </InlineRowContent>
            </div>
          </div>
          <div style={cellStyle}>
            <span style={labelStyle}>badge circle</span>
            <div style={{ ...containerStyle, ...containerExtraStyle }}>
              <InlineRowContent innerSpanStyle={innerSpanStyle}>
                <span style={textStyle}>Notifications</span>
                <BadgeCount
                  background="#e74c3c"
                  color="white"
                  circle
                  size={badgeSize}
                  textAnchor={textAnchor}
                >
                  {42}
                </BadgeCount>
                <span style={textStyle}>After</span>
              </InlineRowContent>
            </div>
          </div>
        </div>
      );

      const SizedInlineRow = ({
        iconSize,
        badgeSize,
        textSize,
        textAnchor,
      }) => (
        <div style={rowStyle}>
          <div style={cellStyle}>
            <span style={labelStyle}>icon</span>
            <div style={{ ...containerStyle, fontSize: `${textSize}px` }}>
              <span style={textStyle}>Notifications</span>
              <Icon
                size={iconSize}
                lineLayout={{ size: textSize }}
                textAnchor={textAnchor}
              >
                <RedSquareSvg />
              </Icon>
              After
            </div>
          </div>
          <div style={cellStyle}>
            <span style={labelStyle}>badge ellipse</span>
            <div style={{ ...containerStyle, fontSize: `${textSize}px` }}>
              <span style={textStyle}>Notifications</span>
              <BadgeCount
                background="#e74c3c"
                color="white"
                size={badgeSize}
                lineLayout={{ size: textSize }}
                textAnchor={textAnchor}
              >
                {42}
              </BadgeCount>
              After
            </div>
          </div>
          <div style={cellStyle}>
            <span style={labelStyle}>badge circle</span>
            <div style={{ ...containerStyle, fontSize: `${textSize}px` }}>
              <span style={textStyle}>Notifications</span>
              <BadgeCount
                background="#e74c3c"
                color="white"
                circle
                size={badgeSize}
                lineLayout={{ size: textSize }}
                textAnchor={textAnchor}
              >
                {42}
              </BadgeCount>
              After
            </div>
          </div>
        </div>
      );

      const ControlledRow = () => {
        const [itemSize, setItemSize] = useState(24);
        const [textSize, setTextSize] = useState(24);
        const [count, setCount] = useState(42);
        const [verticalAlign, setVerticalAlign] = useState("baseline");
        const [textAnchor, setTextAnchor] = useState("center");
        const [lineHeight, setLineHeight] = useState("normal");
        return (
          <div>
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                gap: "2px",
                fontSize: "13px",
                color: "#999",
                marginBottom: "8px",
              }}
            >
              <label>
                item font-size:{" "}
                <input
                  type="range"
                  min="5"
                  max="48"
                  value={itemSize}
                  onInput={(e) => setItemSize(Number(e.target.value))}
                />{" "}
                {itemSize}px
              </label>
              <label>
                text font-size:{" "}
                <input
                  type="range"
                  min="5"
                  max="48"
                  value={textSize}
                  onInput={(e) => setTextSize(Number(e.target.value))}
                />{" "}
                {textSize}px
              </label>
              <label>
                count:{" "}
                <input
                  type="number"
                  min="0"
                  max="9999"
                  value={count}
                  style={{ width: "60px" }}
                  onInput={(e) => setCount(Number(e.target.value))}
                />
              </label>
              <label>
                vertical-align:{" "}
                <select
                  value={verticalAlign}
                  onChange={(e) => setVerticalAlign(e.target.value)}
                >
                  {VERTICAL_ALIGN_VALUES.map((va) => (
                    <option key={va} value={va}>
                      {va}
                    </option>
                  ))}
                </select>
              </label>
              <label>
                textAnchor:{" "}
                <select
                  value={textAnchor}
                  onChange={(e) => setTextAnchor(e.target.value)}
                >
                  {TEXT_ANCHOR_VALUES.map((la) => (
                    <option key={la} value={la}>
                      {la}
                    </option>
                  ))}
                </select>
              </label>
              <label>
                line-height:{" "}
                <input
                  type="range"
                  min="0.5"
                  max="4"
                  step="0.1"
                  value={lineHeight === "normal" ? 1.2 : lineHeight}
                  onInput={(e) => setLineHeight(Number(e.target.value))}
                />{" "}
                {lineHeight}
              </label>
            </div>
            <div style={rowStyle}>
              <div style={cellStyle}>
                <span style={labelStyle}>icon</span>
                <div
                  style={{
                    ...containerStyle,
                    fontSize: `${textSize}px`,
                    lineHeight,
                  }}
                >
                  <span style={{ verticalAlign }}>
                    <span style={textStyle}>NotificationS</span>
                    <Icon
                      size={itemSize}
                      textAnchor={textAnchor}
                      lineLayout={{ size: textSize, verticalAlign }}
                    >
                      <RedSquareSvg />
                    </Icon>
                    <span style={textStyle}>After</span>
                  </span>
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>badge ellipse</span>
                <div
                  style={{
                    ...containerStyle,
                    fontSize: `${textSize}px`,
                    lineHeight,
                  }}
                >
                  <span style={{ verticalAlign }}>
                    <span style={textStyle}>NotificationS</span>
                    <BadgeCount
                      background="#e74c3c"
                      color="white"
                      size={itemSize}
                      textAnchor={textAnchor}
                      lineLayout={{ size: textSize, verticalAlign }}
                    >
                      {count}
                    </BadgeCount>
                    <span style={textStyle}>After</span>
                  </span>
                </div>
              </div>
              <div style={cellStyle}>
                <span style={labelStyle}>badge circle</span>
                <div
                  style={{
                    ...containerStyle,
                    fontSize: `${textSize}px`,
                    lineHeight,
                  }}
                >
                  <span style={{ verticalAlign }}>
                    <span style={textStyle}>NotificationS</span>
                    <BadgeCount
                      background="#e74c3c"
                      color="white"
                      circle
                      size={itemSize}
                      textAnchor={textAnchor}
                      lineLayout={{ size: textSize, verticalAlign }}
                    >
                      {count}
                    </BadgeCount>
                    <span style={textStyle}>After</span>
                  </span>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const Demo = () => (
        <div style={{ padding: "20px", fontFamily: "system-ui, sans-serif" }}>
          <h2 style={{ marginTop: 0 }}>TextAnchor</h2>

          <h3>textAnchor statiques — petit (8px) dans texte 16px</h3>
          {TEXT_ANCHOR_VALUES.map((la) => (
            <div key={la} style={{ marginBottom: "12px" }}>
              <div
                style={{ fontSize: "13px", color: "#999", marginBottom: "4px" }}
              >
                textAnchor="{la}"
              </div>
              <SizedInlineRow
                iconSize={8}
                badgeSize={8}
                textSize={16}
                textAnchor={la}
              />
            </div>
          ))}

          <h3>textAnchor statiques — grand (40px) dans texte 16px</h3>
          {TEXT_ANCHOR_VALUES.map((la) => (
            <div key={la} style={{ marginBottom: "12px" }}>
              <div
                style={{ fontSize: "13px", color: "#999", marginBottom: "4px" }}
              >
                textAnchor="{la}"
              </div>
              <SizedInlineRow
                iconSize={40}
                badgeSize={40}
                textSize={16}
                textAnchor={la}
              />
            </div>
          ))}

          <h3>Contrôlable</h3>
          <ControlledRow />

          <h3>Texte avec font-family différents</h3>
          {[
            {
              label: "serif 12px",
              style: { fontFamily: "serif", fontSize: "12px" },
            },
            {
              label: "serif 24px",
              style: { fontFamily: "serif", fontSize: "24px" },
            },
            {
              label: "monospace 12px",
              style: { fontFamily: "monospace", fontSize: "12px" },
            },
            {
              label: "monospace 24px",
              style: { fontFamily: "monospace", fontSize: "24px" },
            },
          ].map(({ label, style }) => (
            <div key={label} style={{ marginBottom: "16px" }}>
              <div
                style={{ fontSize: "13px", color: "#999", marginBottom: "6px" }}
              >
                {label}
              </div>
              <InlineRow containerExtraStyle={style} />
            </div>
          ))}

          <h3>Texte avec vertical-align différent</h3>
          {["bottom", "super", "sub", "middle"].map((va) => (
            <div key={va} style={{ marginBottom: "16px" }}>
              <div
                style={{ fontSize: "13px", color: "#999", marginBottom: "6px" }}
              >
                vertical-align: {va}
              </div>
              <InlineRow innerSpanStyle={{ verticalAlign: va }} />
            </div>
          ))}
        </div>
      );

      render(<Demo />, document.querySelector("#app"));
    </script>
  </body>
</html>
