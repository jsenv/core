<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Text Auto-Spacing Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render, Fragment } from "preact";
      import { createContext } from "preact";
      import { Text, Icon, Link } from "@jsenv/navi";

      const ThemeContext = createContext({ theme: "default" });

      const StarSvg = () => (
        <svg
          viewBox="0 0 24 24"
          width="100%"
          height="100%"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
            fill="currentColor"
          />
        </svg>
      );

      const Example = ({ label, children }) => (
        <div style={{ marginBottom: "12px" }}>
          {label && (
            <div
              style={{ fontSize: "13px", color: "#888", marginBottom: "4px" }}
            >
              {label}
            </div>
          )}
          <div
            style={{
              border: "1px solid #ddd",
              padding: "8px 12px",
              borderRadius: "4px",
            }}
          >
            {children}
          </div>
        </div>
      );

      const Section = ({ title, children }) => (
        <section style={{ marginBottom: "40px" }}>
          <h2 style={{ fontSize: "1.1rem", marginBottom: "16px" }}>{title}</h2>
          {children}
        </section>
      );

      const Demo = () => {
        return (
          <div
            style={{
              padding: "20px",
              fontFamily: "system-ui, sans-serif",
              maxWidth: "700px",
            }}
          >
            <h1 style={{ marginBottom: "30px" }}>Text Auto-Spacing</h1>

            <Section title="Basic auto-spacing">
              <Example label="With auto-spacing (default)">
                <Text>
                  <strong>Hello</strong>
                  <em>beautiful</em>
                  <span>world!</span>
                </Text>
              </Example>
              <Example label='With spacing="pre" (manual)'>
                <Text spacing="pre">
                  <strong>Hello</strong> <em>beautiful</em> <span>world!</span>
                </Text>
              </Example>
            </Section>

            <Section title="Custom separators">
              <Example label='spacing=" / " (breadcrumb)'>
                <Text spacing={<span> / </span>} color="#666">
                  <Link href="#">Products</Link>
                  <Link href="#">Electronics</Link>
                  <Link href="#">Smartphones</Link>
                  <Text bold color="black">
                    iPhone 15
                  </Text>
                </Text>
              </Example>
              <Example label='spacing=" • " (status bar)'>
                <Text spacing=" • ">
                  <Text>
                    Status:
                    <Text bold color="green">
                      Online
                    </Text>
                  </Text>
                  <Text>
                    Users:
                    <Text bold color="blue">
                      1,234
                    </Text>
                  </Text>
                  <Text>
                    Updated: <Text color="#666">2 min ago</Text>
                  </Text>
                </Text>
              </Example>
              <Example label='spacing=", " (tags)'>
                <Text spacing=", ">
                  <span
                    style={{
                      backgroundColor: "#e1f5fe",
                      padding: "2px 6px",
                      borderRadius: "3px",
                    }}
                  >
                    React
                  </span>
                  <span
                    style={{
                      backgroundColor: "#e8f5e8",
                      padding: "2px 6px",
                      borderRadius: "3px",
                    }}
                  >
                    JavaScript
                  </span>
                  <span
                    style={{
                      backgroundColor: "#fff3e0",
                      padding: "2px 6px",
                      borderRadius: "3px",
                    }}
                  >
                    CSS
                  </span>
                </Text>
              </Example>
            </Section>

            <Section title='Exact control with spacing="pre"'>
              <p style={{ color: "#666", marginBottom: "12px" }}>
                When parts should stick together (no space between them).
              </p>
              <Example label="Default: unwanted space in compound word">
                <Text>
                  <span style={{ color: "blue" }}>Java</span>
                  <span style={{ color: "orange", fontWeight: "bold" }}>
                    Script
                  </span>
                </Text>
              </Example>
              <Example label='spacing="pre": parts joined'>
                <Text spacing="pre">
                  <span style={{ color: "blue" }}>Java</span>
                  <span style={{ color: "orange", fontWeight: "bold" }}>
                    Script
                  </span>
                </Text>
              </Example>
              <Example label="Default: broken price">
                <Text>
                  <span>Price:</span>
                  <strong style={{ color: "green" }}>$</strong>
                  <span style={{ fontSize: "1.2em" }}>29</span>
                  <span style={{ fontSize: "0.8em" }}>.99</span>
                </Text>
              </Example>
              <Example label='spacing="pre": clean price'>
                <Text spacing="pre">
                  <span>Price: </span>
                  <strong style={{ color: "green" }}>$</strong>
                  <span style={{ fontSize: "1.2em" }}>29</span>
                  <span style={{ fontSize: "0.8em" }}>.99</span>
                </Text>
              </Example>
            </Section>

            <Section title="Wrappers that break auto-spacing">
              <p style={{ color: "#666", marginBottom: "12px" }}>
                Context Providers and Fragments create intermediate nodes that
                prevent auto-spacing between their content and siblings.
              </p>

              <h3 style={{ fontSize: "0.95rem", marginBottom: "8px" }}>
                Context Provider
              </h3>
              <Example label="Provider wrapping children — missing spaces around provider content">
                <Text>
                  Welcome to
                  <ThemeContext.Provider value={{ theme: "premium" }}>
                    <Text bold>our platform</Text>
                    <Text italic>today</Text>
                  </ThemeContext.Provider>
                  and enjoy!
                </Text>
              </Example>
              <Example label="Fix: move Provider outside Text">
                <ThemeContext.Provider value={{ theme: "premium" }}>
                  <Text>
                    Welcome to
                    <Text bold>our platform</Text>
                    <Text italic>today</Text>
                    and enjoy!
                  </Text>
                </ThemeContext.Provider>
              </Example>
              <Example label="Fix: nest a Text inside the Provider">
                <Text>
                  Welcome to
                  <ThemeContext.Provider value={{ theme: "premium" }}>
                    <Text>
                      <Text bold>our platform</Text>
                      <Text italic>today</Text>
                    </Text>
                  </ThemeContext.Provider>
                  and enjoy!
                </Text>
              </Example>

              <h3
                style={{
                  fontSize: "0.95rem",
                  marginTop: "20px",
                  marginBottom: "8px",
                }}
              >
                Fragment
              </h3>
              <Example label="Fragment wrapping children — missing spaces around fragment content">
                <Text>
                  Welcome to
                  <>
                    <Text bold>our platform</Text>
                    <Text italic>today</Text>
                  </>
                  and enjoy!
                </Text>
              </Example>
              <Example label="Fix: remove the Fragment">
                <Text>
                  Welcome to
                  <Text bold>our platform</Text>
                  <Text italic>today</Text>
                  and enjoy!
                </Text>
              </Example>
            </Section>

            <Section title="Underline with icons">
              <p style={{ color: "#666", marginBottom: "12px" }}>
                When underline is on the container, the space between icon and
                text gets underlined too. Move underline to the text instead.
              </p>
              <Example label="Underline on container — space is underlined">
                <Text noWrap underline>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  star
                </Text>
              </Example>
              <Example label="Underline on text only — clean">
                <Text noWrap>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Text underline>star</Text>
                </Text>
              </Example>
              <Example label="Link with icons — underline on everything">
                <Link href="./user-profile">
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Text>Go to profile</Text>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Icon>
                    <StarSvg />
                  </Icon>
                </Link>
              </Example>
              <Example label="Link with underline={false} + Text underline — clean">
                <Link href="./user-profile" underline={false}>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Text underline>Go to profile</Text>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  <Icon>
                    <StarSvg />
                  </Icon>
                </Link>
              </Example>
            </Section>

            <Section title="Multiline behavior">
              <p style={{ color: "#666", marginBottom: "12px" }}>
                Auto-spacing skips adding spaces when adjacent children
                start/end with whitespace.
              </p>
              <Example label="Child ending with newline — no extra space added">
                <Text preWrap>
                  First line.{"\n"}
                  Second line.
                </Text>
              </Example>
              <Example label="Child starting with space — no extra space added">
                <Text preWrap>
                  {"Hello"}
                  {" world!"}
                </Text>
              </Example>
              <Example label="Normal children — spacing added between all">
                <Text preWrap>
                  <strong>Bold</strong>
                  {"normal"}
                  <em>italic</em>
                  {"end"}
                </Text>
              </Example>
            </Section>

            <Section title="Icon spacing sizes">
              <Example label="Default spacing">
                <Text>
                  <Icon>
                    <StarSvg />
                  </Icon>
                  Text
                </Text>
              </Example>
              {["xs", "sm", "md", "lg", "xl"].map((size) => (
                <Example key={size} label={`spacing="${size}"`}>
                  <Text spacing={size}>
                    <Icon>
                      <StarSvg />
                    </Icon>
                    Text
                  </Text>
                </Example>
              ))}
            </Section>
          </div>
        );
      };

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
