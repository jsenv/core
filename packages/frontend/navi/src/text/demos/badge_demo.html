<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Badge Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Badge,
        Box,
        Text,
        Title,
        Paragraph,
        Link,
        Button,
        Field,
        Label,
      } from "@jsenv/navi";

      const TocSection = () => (
        <Box as="nav" marginBottom="xl">
          <Title as="h2">Table of contents</Title>
          <Box flex="y" spacing="xs">
            <Link href="#basic">1. Basic usage</Link>
            <Link href="#statuses">2. Status badges</Link>
            <Link href="#inline">3. Inline with text</Link>
            <Link href="#text-color">4. Automatic text color</Link>
            <Link href="#font-sizes">5. Font sizes</Link>
            <Link href="#badge-with-button">6. Badge with button</Link>
            <Link href="#overflow">7. Overflow with long text</Link>
          </Box>
        </Box>
      );

      const BasicUsageSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#basic" />
            Basic usage
          </Title>
          <Paragraph>
            Badge displays text in a pill-shaped badge, useful for labels,
            statuses, tags, and categories.
          </Paragraph>
          <Box flex="y" spacing="s" alignX="start">
            <Badge background="#4caf50">New</Badge>
            <Badge background="#2196f3">Beta</Badge>
            <Badge background="darkred">Deprecated</Badge>
            <Badge background="#ff9800">Draft</Badge>
            <Badge background="#9c27b0">Pro</Badge>
          </Box>
        </Box>
      );

      const StatusBadgesSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#statuses" />
            Status badges
          </Title>
          <Box flex="y" spacing="s" alignX="start">
            <Badge background="#4caf50">Active</Badge>
            <Badge background="#f44336">Inactive</Badge>
            <Badge background="#ff9800">Pending</Badge>
            <Badge background="#9e9e9e">Archived</Badge>
          </Box>
        </Box>
      );

      const InlineWithTextSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#inline" />
            Inline with text
          </Title>
          <Paragraph>
            <Text>Product name</Text>
            <Badge background="#2196f3">New</Badge>
          </Paragraph>
          <Paragraph>
            <Text>Experimental feature</Text>
            <Badge background="#ff9800">Beta</Badge>
          </Paragraph>
          <Paragraph>
            <Text>Old API</Text>
            <Badge background="#9e9e9e">Deprecated</Badge>
          </Paragraph>
        </Box>
      );

      const DarkBackgroundSection = () => {
        const [showBadge, setShowBadge] = useState(false);
        return (
          <Box as="section" marginBottom="xl">
            <Title as="h2">
              <Link anchor href="#text-color" />
              Automatic text color
            </Title>
            <Paragraph>
              The badge automatically switches its text color to white when its
              own background color is dark. Toggle to see the badge appear and
              disappear.
            </Paragraph>
            <Box flex="y" spacing="s" alignY="center" alignX="start">
              <Button onClick={() => setShowBadge((v) => !v)}>
                {showBadge ? "Hide badge" : "Show badge"}
              </Button>
              <Text>
                Coucou
                {showBadge && <Badge background="#1e1e1e">Active</Badge>}
              </Text>
            </Box>
          </Box>
        );
      };

      const FontSizesSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#font-sizes" />
            Font sizes
          </Title>
          <Box row spacing="s" alignX="center">
            <Text style={{ fontSize: "0.8em" }}>
              Small text
              <Badge background="#2196f3">Tag</Badge>
            </Text>
            <Text>
              Normal text
              <Badge background="#2196f3">Tag</Badge>
            </Text>
            <Text style={{ fontSize: "1.5em" }}>
              Large text
              <Badge background="#2196f3">Tag</Badge>
            </Text>
          </Box>
        </Box>
      );

      const BadgeWithButtonSection = () => {
        const [badges, setBadges] = useState([
          "One",
          "Two",
          "Three",
          "Four",
          "Five",
        ]);
        return (
          <Box as="section" marginBottom="xl">
            <Title as="h2">
              <Link anchor href="#badge-with-button" />
              Badge with button
            </Title>
            <Paragraph>
              The button occupies the full right side of the badge and inherits
              the badge border radius. It is discrete by default and reveals
              itself on hover.
            </Paragraph>
            <Box flex="x" spacing="xs" style="flex-wrap: wrap;">
              {badges.map((label) => (
                <Badge key={label}>
                  {label}
                  <Badge.Button
                    onMouseDown={() => {
                      setBadges((prev) => prev.filter((b) => b !== label));
                    }}
                    aria-label={`Remove ${label}`}
                  >
                    ×
                  </Badge.Button>
                </Badge>
              ))}

              <Badge key="on_the_left">
                <Badge.Button
                  overflowPinned="start"
                  onMouseDown={() => {
                    console.log("Button on the left");
                  }}
                >
                  ×
                </Badge.Button>
                Left
              </Badge>
            </Box>
            {badges.length === 0 && (
              <Box marginTop="s">
                <Button
                  onClick={() => {
                    setBadges(["One", "Two", "Three", "Four", "Five"]);
                  }}
                >
                  Reset
                </Button>
              </Box>
            )}
          </Box>
        );
      };

      const OverflowSection = () => {
        const [maxWidth, setMaxWidth] = useState(120);
        const longLabel = "Very long badge label that overflows";
        return (
          <Box as="section" marginBottom="xl">
            <Title as="h2">
              <Link anchor href="#overflow" />
              Overflow with long text
            </Title>
            <Paragraph>
              Badge has a default <code>max-width</code>. When text is longer,
              it is truncated with an ellipsis. The button stays pinned at the
              right edge regardless.
            </Paragraph>
            <Field>
              <Label>max-width: {maxWidth}px</Label>
              <input
                type="range"
                min="40"
                max="300"
                value={maxWidth}
                onInput={(e) => setMaxWidth(Number(e.currentTarget.value))}
              />
            </Field>
            <Box flex="y" spacing="s" alignX="start" marginTop="s">
              <Box flex="x" spacing="xs" alignY="center">
                <Text>No button:</Text>
                <Badge style={{ maxWidth: `${maxWidth}px` }}>{longLabel}</Badge>
              </Box>
              <Box flex="x" spacing="xs" alignY="center">
                <Text>Button on the right (pinned):</Text>
                <Badge style={{ maxWidth: `${maxWidth}px` }}>
                  {longLabel}
                  <Badge.Button aria-label="Remove">×</Badge.Button>
                </Badge>
              </Box>
              <Box flex="x" spacing="xs" alignY="center">
                <Text>Button on the left (not pinned):</Text>
                <Badge style={{ maxWidth: `${maxWidth}px` }}>
                  <Badge.Button overflowPinned="start" aria-label="Remove">
                    ×
                  </Badge.Button>
                  {longLabel}
                </Badge>
              </Box>
            </Box>
          </Box>
        );
      };

      const Demo = () => (
        <div
          style={{
            padding: "20px",
            fontFamily: "system-ui, sans-serif",
            maxWidth: "800px",
            lineHeight: "1.6",
          }}
        >
          <Title as="h1">Badge Demo</Title>
          <TocSection />
          <BasicUsageSection />
          <StatusBadgesSection />
          <InlineWithTextSection />
          <DarkBackgroundSection />
          <FontSizesSection />
          <BadgeWithButtonSection />
          <OverflowSection />
        </div>
      );

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
