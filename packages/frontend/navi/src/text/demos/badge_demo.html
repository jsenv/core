<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Badge Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Badge,
        Box,
        Text,
        Title,
        Paragraph,
        Link,
        Button,
      } from "@jsenv/navi";

      const BasicUsageSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#basic" />
            Basic usage
          </Title>
          <Paragraph>
            Badge displays text in a pill-shaped badge, useful for labels,
            statuses, tags, and categories.
          </Paragraph>
          <Box flex="y" spacing="s" alignX="start">
            <Badge background="#4caf50">New</Badge>
            <Badge background="#2196f3">Beta</Badge>
            <Badge background="darkred">Deprecated</Badge>
            <Badge background="#ff9800">Draft</Badge>
            <Badge background="#9c27b0">Pro</Badge>
          </Box>
        </Box>
      );

      const StatusBadgesSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#statuses" />
            Status badges
          </Title>
          <Box flex="y" spacing="s" alignX="start">
            <Badge background="#4caf50">Active</Badge>
            <Badge background="#f44336">Inactive</Badge>
            <Badge background="#ff9800">Pending</Badge>
            <Badge background="#9e9e9e">Archived</Badge>
          </Box>
        </Box>
      );

      const InlineWithTextSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#inline" />
            Inline with text
          </Title>
          <Paragraph>
            <Text>Product name</Text>
            <Badge background="#2196f3">New</Badge>
          </Paragraph>
          <Paragraph>
            <Text>Experimental feature</Text>
            <Badge background="#ff9800">Beta</Badge>
          </Paragraph>
          <Paragraph>
            <Text>Old API</Text>
            <Badge background="#9e9e9e">Deprecated</Badge>
          </Paragraph>
        </Box>
      );

      const DarkBackgroundSection = () => {
        const [showBadge, setShowBadge] = useState(false);
        return (
          <Box as="section" marginBottom="xl">
            <Title as="h2">
              <Link anchor href="#text-color" />
              Automatic text color
            </Title>
            <Paragraph>
              The badge automatically switches its text color to white when its
              own background color is dark. Toggle to see the badge appear and
              disappear.
            </Paragraph>
            <Box flex="y" spacing="s" alignY="center" alignX="start">
              <Button onClick={() => setShowBadge((v) => !v)}>
                {showBadge ? "Hide badge" : "Show badge"}
              </Button>
              <Text>
                Coucou
                {showBadge && <Badge background="#1e1e1e">Active</Badge>}
              </Text>
            </Box>
          </Box>
        );
      };

      const FontSizesSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#font-sizes" />
            Font sizes
          </Title>
          <Box row spacing="s" alignX="center">
            <Text style={{ fontSize: "0.8em" }}>
              Small text
              <Badge background="#2196f3">Tag</Badge>
            </Text>
            <Text>
              Normal text
              <Badge background="#2196f3">Tag</Badge>
            </Text>
            <Text style={{ fontSize: "1.5em" }}>
              Large text
              <Badge background="#2196f3">Tag</Badge>
            </Text>
          </Box>
        </Box>
      );

      const Demo = () => (
        <div
          style={{
            padding: "20px",
            fontFamily: "system-ui, sans-serif",
            maxWidth: "800px",
            lineHeight: "1.6",
          }}
        >
          <Title as="h1">Badge Demo</Title>
          <BasicUsageSection />
          <StatusBadgesSection />
          <InlineWithTextSection />
          <DarkBackgroundSection />
          <FontSizesSection />
        </div>
      );

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
