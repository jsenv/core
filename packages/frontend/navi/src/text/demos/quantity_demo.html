<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Quantity Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Box,
        Caption,
        Link,
        Paragraph,
        Quantity,
        Text,
        Title,
      } from "@jsenv/navi";

      Quantity.Intl.addUnit("item", {
        en: ["item", "items"],
        fr: ["article", "articles"],
        de: "artikel",
        ja: "点",
      });
      Quantity.Intl.addUnit("minute", {
        en: ["minute", "minutes"],
        fr: ["minute", "minutes"],
        de: ["Minute", "Minuten"],
        ja: "分",
      });
      Quantity.Intl.addUnit("people", {
        en: ["person", "people"],
        fr: ["personne", "personnes"],
        de: ["Person", "Personen"],
        ja: "人",
      });

      const Demo = () => {
        return (
          <div
            style={{
              padding: "20px",
              fontFamily: "system-ui, sans-serif",
              maxWidth: "800px",
              lineHeight: "1.6",
            }}
          >
            <Title as="h1">Quantity Demo</Title>

            <TableOfContents />
            <IntroductionSection />
            <UnitPositionSection />
            <SizeSection />
            <LangSection />
            <IntlUnitSection />
            <LoadingSection />
            <ReadOnlyDisabledSection />
          </div>
        );
      };

      const TableOfContents = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">Table des matières</Title>
          <Box row spacing="xs" marginTop="md">
            <Link href="#introduction">1. Introduction</Link>
            <Link href="#unit-position">2. Position de l'unité</Link>
            <Link href="#size">3. Taille</Link>
            <Link href="#lang">4. Langue (formatage des nombres)</Link>
            <Link href="#intl-unit">5. Unités traduites (intl)</Link>
            <Link href="#loading">6. État de chargement</Link>
            <Link href="#readonly-disabled">7. readOnly et disabled</Link>
          </Box>
        </Box>
      );

      const IntroductionSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#introduction" />
            Introduction
          </Title>
          <Paragraph>
            <code>Quantity</code> affiche une valeur (le plus souvent un nombre)
            avec optionnellement une unité et un label. Les nombres sont
            formatés automatiquement via <code>Intl.NumberFormat</code> selon la
            locale du navigateur.
          </Paragraph>

          <Title as="h3">Exemples de base</Title>
          <Box row spacing="xl" alignY="end">
            <Box row spacing="s">
              <Caption>Valeur seule</Caption>
              <Quantity>{42}</Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>Avec unité</Caption>
              <Quantity unit="minutes">{42}</Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>Avec label</Caption>
              <Quantity label="Durée" unit="minutes">
                {42}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>Grand nombre formaté</Caption>
              <Quantity label="Utilisateurs" unit="personnes">
                {1234567}
              </Quantity>
            </Box>
          </Box>
        </Box>
      );

      const UnitPositionSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#unit-position" />
            Position de l'unité
          </Title>
          <Paragraph>
            Par défaut l'unité s'affiche à droite de la valeur (
            <code>unitPosition="right"</code>). Elle peut aussi s'afficher en
            dessous avec <code>unitPosition="bottom"</code>.
          </Paragraph>

          <Box row spacing="xl" alignY="end">
            <Box row spacing="s">
              <Caption>unitPosition="right" (défaut)</Caption>
              <Quantity label="Vitesse" unit="km/h">
                {120}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>unitPosition="bottom"</Caption>
              <Quantity label="Vitesse" unit="km/h" unitPosition="bottom">
                {120}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>unitPosition="right" — grand nombre</Caption>
              <Quantity label="Population" unit="habitants">
                {8100000}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>unitPosition="bottom" — grand nombre</Caption>
              <Quantity
                label="Population"
                unit="habitants"
                unitPosition="bottom"
              >
                {8100000}
              </Quantity>
            </Box>
          </Box>
        </Box>
      );

      const SizeSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#size" />
            Taille
          </Title>
          <Paragraph>
            La prop <code>size</code> accepte les clés de l'échelle de taille :
            <code>s</code>, <code>m</code>, <code>l</code>, <code>xl</code>{" "}
            (défaut), <code>xxl</code>. Elle peut aussi recevoir une valeur CSS
            arbitraire. Le label n'est pas affecté.
          </Paragraph>

          <Box row spacing="xl" alignY="end">
            <Box row spacing="s">
              <Caption>size="s"</Caption>
              <Quantity label="Score" unit="pts" size="s">
                {98}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>size="m"</Caption>
              <Quantity label="Score" unit="pts" size="m">
                {98}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>size="l"</Caption>
              <Quantity label="Score" unit="pts" size="l">
                {98}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>size="xl" (défaut)</Caption>
              <Quantity label="Score" unit="pts">
                {98}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>size="xxl"</Caption>
              <Quantity label="Score" unit="pts" size="xxl">
                {98}
              </Quantity>
            </Box>
          </Box>
        </Box>
      );

      const LangSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#lang" />
            Langue (formatage des nombres)
          </Title>
          <Paragraph>
            La prop <code>lang</code> est passée à{" "}
            <code>Intl.NumberFormat</code> pour formater les nombres, et à
            l'intl interne pour traduire les unités connues (comme{" "}
            <code>item</code>).
          </Paragraph>

          <Box row spacing="xl" alignY="end">
            <Box row spacing="s">
              <Caption>lang="fr"</Caption>
              <Quantity label="Ventes" unit="item" lang="fr">
                {1234567}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>lang="en"</Caption>
              <Quantity label="Sales" unit="item" lang="en">
                {1234567}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>lang="de"</Caption>
              <Quantity label="Verkäufe" unit="item" lang="de">
                {1234567}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>lang="ja"</Caption>
              <Quantity label="売上" unit="item" lang="ja">
                {1234567}
              </Quantity>
            </Box>
          </Box>
        </Box>
      );

      const IntlUnitSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#intl-unit" />
            Unités traduites (intl)
          </Title>
          <Paragraph>
            <code>Quantity.Intl.addUnit()</code> enregistre une unité connue
            avec ses traductions par langue. La forme singulière ou plurielle
            est choisie automatiquement selon la valeur. Les langues qui n'ont
            pas de distinction de nombre acceptent une chaîne simple. Les unités
            non enregistrées s'affichent telles quelles.
          </Paragraph>

          <Title as="h3">minute</Title>
          <Box row spacing="xl" alignY="end" marginBottom="m">
            <Box row spacing="s">
              <Caption>1 minute (singulier)</Caption>
              <Quantity label="Durée" unit="minute">
                {1}
              </Quantity>
            </Box>
            <Box row spacing="s">
              <Caption>5 minutes (pluriel)</Caption>
              <Quantity label="Durée" unit="minute">
                {5}
              </Quantity>
            </Box>
            <Box row spacing="s">
              <Caption>unitPosition="bottom"</Caption>
              <Quantity label="Durée" unit="minute" unitPosition="bottom">
                {5}
              </Quantity>
            </Box>
          </Box>

          <Title as="h3">people</Title>
          <Box row spacing="xl" alignY="end" marginBottom="m">
            <Box row spacing="s">
              <Caption>1 personne (singulier)</Caption>
              <Quantity label="Participants" unit="people">
                {1}
              </Quantity>
            </Box>
            <Box row spacing="s">
              <Caption>42 personnes (pluriel)</Caption>
              <Quantity label="Participants" unit="people">
                {42}
              </Quantity>
            </Box>
          </Box>

          <Title as="h3">
            unit={`["singular", "plural"]`} — tableau direct
          </Title>
          <Paragraph>
            Passer un tableau <code>[singulier, pluriel]</code> directement
            bypasse l'intl : la forme est choisie selon{" "}
            <code>value &gt; 1</code>, sans traduction.
          </Paragraph>
          <Box row spacing="xl" alignY="end" marginBottom="m">
            <Box row spacing="s">
              <Caption>1 cheval (singulier)</Caption>
              <Quantity label="Montures" unit={["cheval", "chevaux"]}>
                {1}
              </Quantity>
            </Box>
            <Box row spacing="s">
              <Caption>3 chevaux (pluriel)</Caption>
              <Quantity label="Montures" unit={["cheval", "chevaux"]}>
                {3}
              </Quantity>
            </Box>
          </Box>

          <Title as="h3">Unité inconnue (fallback)</Title>
          <Box row spacing="xl" alignY="end">
            <Box row spacing="s">
              <Caption>unit="km" (inchangé)</Caption>
              <Quantity label="Distance" unit="km">
                {12}
              </Quantity>
            </Box>
            <Box row spacing="s">
              <Caption>unit="pts" (inchangé)</Caption>
              <Quantity label="Score" unit="pts">
                {1337}
              </Quantity>
            </Box>
          </Box>
        </Box>
      );

      const LoadingSection = () => {
        const [loading, setLoading] = useState(true);

        return (
          <Box as="section" marginBottom="xl">
            <Title as="h2">
              <Link anchor href="#loading" />
              État de chargement
            </Title>
            <Paragraph>
              Lorsque <code>loading</code> est activé, la valeur est remplacée
              par un indicateur de chargement. L'unité est aussi masquée.
            </Paragraph>

            <Box row spacing="m" alignY="center" marginBottom="m">
              <button onClick={() => setLoading((v) => !v)}>
                {loading ? "Terminer le chargement" : "Remettre en chargement"}
              </button>
            </Box>

            <Box row spacing="xl" alignY="end" marginBottom="m">
              <Box row spacing="s">
                <Caption>loading</Caption>
                <Quantity
                  label="Utilisateurs"
                  unit="personnes"
                  loading={loading}
                >
                  {0}
                </Quantity>
              </Box>

              <Box row spacing="s">
                <Caption>loading — unitPosition="bottom"</Caption>
                <Quantity
                  label="Utilisateurs"
                  unit="personnes"
                  unitPosition="bottom"
                  loading={loading}
                >
                  {0}
                </Quantity>
              </Box>

              <Box row spacing="s">
                <Caption>loading — size="xxl"</Caption>
                <Quantity
                  label="Utilisateurs"
                  unit="personnes"
                  size="xxl"
                  loading={loading}
                >
                  {0}
                </Quantity>
              </Box>
            </Box>

            <Box row spacing="xl" alignY="end">
              <Quantity
                label="Connexions actives"
                unit="utilisateurs"
                loading={loading}
              >
                {4821}
              </Quantity>
              <Quantity label="Requêtes" unit="/ sec" loading={loading}>
                {342}
              </Quantity>
            </Box>
          </Box>
        );
      };

      const ReadOnlyDisabledSection = () => (
        <Box as="section" marginBottom="xl">
          <Title as="h2">
            <Link anchor href="#readonly-disabled" />
            readOnly et disabled
          </Title>
          <Paragraph>
            <code>readOnly</code> indique que la valeur n'est pas modifiable
            (légèrement atténuée). <code>disabled</code> indique que le
            composant n'est pas actif (fortement atténué, curseur not-allowed).
          </Paragraph>

          <Box row spacing="xl" alignY="end">
            <Box row spacing="s">
              <Caption>Normal</Caption>
              <Quantity label="Capacité" unit="places">
                {250}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>readOnly</Caption>
              <Quantity label="Capacité" unit="places" readOnly>
                {250}
              </Quantity>
            </Box>

            <Box row spacing="s">
              <Caption>disabled</Caption>
              <Quantity label="Capacité" unit="places" disabled>
                {250}
              </Quantity>
            </Box>
          </Box>
        </Box>
      );

      render(<Demo />, document.getElementById("app"));
    </script>
  </body>
</html>
