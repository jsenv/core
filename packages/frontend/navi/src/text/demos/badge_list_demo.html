<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>Badge List Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { render } from "preact";
      import { Badge, BadgeList, Box, Title, Paragraph } from "@jsenv/navi";

      const App = () => (
        <Box padding="l" flex="y" spacing="xl">
          <Box as="section">
            <Title as="h2">Default badges</Title>
            <BadgeList>
              <Badge>HTML</Badge>
              <Badge>CSS</Badge>
              <Badge>JavaScript</Badge>
              <Badge>TypeScript</Badge>
              <Badge>React</Badge>
              <Badge>Vue</Badge>
              <Badge>Angular</Badge>
              <Badge>Node.js</Badge>
              <Badge>Python</Badge>
              <Badge>Rust</Badge>
              <Badge>Go</Badge>
              <Badge>Java</Badge>
              <Badge>C++</Badge>
              <Badge>Swift</Badge>
              <Badge>Kotlin</Badge>
              <Badge>SQL</Badge>
            </BadgeList>
          </Box>

          <Box as="section">
            <Title as="h2">Colored badges</Title>
            <BadgeList>
              <Badge background="#4caf50">Active</Badge>
              <Badge background="#f44336">Inactive</Badge>
              <Badge background="#ff9800">Pending</Badge>
              <Badge background="#9e9e9e">Archived</Badge>
              <Badge background="#2196f3">Beta</Badge>
              <Badge background="darkred">Deprecated</Badge>
              <Badge background="#9c27b0">Pro</Badge>
              <Badge background="#00bcd4">New</Badge>
            </BadgeList>
          </Box>

          <Box as="section">
            <Title as="h2">Wrapping behavior</Title>
            <Paragraph>
              Badges wrap to the next line when they overflow the container.
            </Paragraph>
            <Box
              maxWidth="400px"
              border="2px dotted #aaa"
              padding="m"
              borderRadius="4px"
            >
              <BadgeList>
                <Badge>React</Badge>
                <Badge>Vue</Badge>
                <Badge>Svelte</Badge>
                <Badge>Angular</Badge>
                <Badge>Preact</Badge>
                <Badge>Solid</Badge>
                <Badge>Remix</Badge>
                <Badge>Next.js</Badge>
                <Badge>Nuxt</Badge>
                <Badge>Astro</Badge>
                <Badge>Qwik</Badge>
                <Badge>Gatsby</Badge>
              </BadgeList>
            </Box>
          </Box>

          <Box as="section">
            <Title as="h2">Custom spacing</Title>
            <Paragraph>
              Override spacing with the <code>spacing</code> prop.
            </Paragraph>
            <BadgeList spacing="m">
              <Badge>One</Badge>
              <Badge>Two</Badge>
              <Badge>Three</Badge>
              <Badge>Four</Badge>
              <Badge>Five</Badge>
            </BadgeList>
          </Box>
        </Box>
      );

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
