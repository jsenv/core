<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ref callback vs object ref</title>
    <style>
      body {
        max-width: 680px;
        padding: 20px;
        font-family: monospace;
      }
      h2 {
        margin-top: 0;
      }
      .modes {
        display: flex;
        margin-bottom: 16px;
        padding: 12px 16px;
        flex-direction: column;
        gap: 10px;
        background: #f9f9f9;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      .modes label {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: start;
        gap: 8px;
        cursor: pointer;
      }
      .mode-title {
        font-weight: bold;
      }
      .mode-desc {
        margin-top: 2px;
        color: #555;
        font-size: 0.85em;
      }
      .expectation {
        margin-bottom: 16px;
        padding: 8px 12px;
        font-size: 0.9em;
        border-left: 4px solid;
        border-radius: 4px;
      }
      .expectation.bug {
        color: #900;
        background: #fff0f0;
        border-color: #c00;
      }
      .expectation.ok {
        color: #060;
        background: #f0fff0;
        border-color: #090;
      }
      .controls {
        display: flex;
        margin-bottom: 16px;
        gap: 8px;
      }
      button {
        padding: 8px 16px;
        background: #fff;
        border: 1px solid #aaa;
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      dialog {
        min-width: 240px;
        padding: 20px;
        border: 1px solid #aaa;
        border-radius: 8px;
      }
      #log {
        margin-top: 16px;
        padding-top: 8px;
        border-top: 1px solid #eee;
      }
      .log-entry {
        padding: 3px 0;
        font-size: 0.9em;
        border-bottom: 1px solid #f0f0f0;
      }
      .log-entry.ok {
        color: #090;
      }
      .log-entry.bug {
        color: #c00;
        font-weight: bold;
      }
      .log-entry.info {
        color: #555;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      /**
       * Investigates ref timing: is externalRef.current set by the time
       * useLayoutEffect runs, regardless of whether Box uses a stable
       * callback ref or an object ref?
       *
       * Background: in the picker bug, scrollToItem reads ref.current and
       * gets undefined. We suspect Box's stable callback ref might not be
       * forwarding to the external ref in time. This demo verifies that.
       *
       * Preact guarantees: refs are applied (refQueue) BEFORE layout effects
       * (commitQueue). So both approaches should have ref.current set
       * when useLayoutEffect fires.
       *
       * If both show DIV here, the bug is NOT a simple ref-timing issue —
       * it must require a more specific sequence (signal re-render, specific
       * dialog lifecycle, etc.) that is harder to isolate.
       */

      import { render } from "preact";
      import { useRef, useState, useLayoutEffect } from "preact/hooks";

      // ---- Box variants ----

      // Box with STABLE CALLBACK REF (current box.jsx approach).
      // Creates one stable function; reads externalRef via a ref-of-ref.
      const BoxCallbackRef = ({ ref: externalRef, id, children }) => {
        const externalRefRef = useRef(externalRef);
        externalRefRef.current = externalRef;

        const refCallbackRef = useRef(null);
        if (!refCallbackRef.current) {
          refCallbackRef.current = (el) => {
            const cur = externalRefRef.current;
            if (cur) {
              if (typeof cur === "function") {
                cur(el);
              } else {
                cur.current = el;
              }
            }
          };
        }

        return (
          <div
            ref={refCallbackRef.current}
            data-box={id}
            style={{ border: "1px dashed #aaa", padding: 4 }}
          >
            BoxCallbackRef#{id} {children}
          </div>
        );
      };

      // Box with OBJECT REF passthrough (the alternative approach).
      const BoxObjectRef = ({ ref: externalRef, id, children }) => {
        const defaultRef = useRef(null);
        const finalRef = externalRef || defaultRef;
        return (
          <div
            ref={finalRef}
            data-box={id}
            style={{ border: "1px dashed #aaa", padding: 4 }}
          >
            BoxObjectRef#{id} {children}
          </div>
        );
      };

      // ---- List component ----
      // Mounted only when the dialog is open.
      // useLayoutEffect reads containerRef.current — if the callback ref
      // forwarded correctly, it should be the div element.
      const List = ({ mode, instanceId }) => {
        const containerRef = useRef(null);

        useLayoutEffect(() => {
          const el = containerRef.current;
          appendLog({
            kind: el ? "ok" : "bug",
            text: `[${instanceId}] useLayoutEffect — containerRef.current = ${el ? `<${el.tagName.toLowerCase()}>` : "null"}`,
          });
        }, []);

        const BoxComponent =
          mode === "callback" ? BoxCallbackRef : BoxObjectRef;
        return (
          <BoxComponent ref={containerRef} id={instanceId}>
            <ul style={{ margin: 0, paddingLeft: 16 }}>
              <li>item A</li>
              <li>item B</li>
            </ul>
          </BoxComponent>
        );
      };

      // ---- App ----
      let appendLog;

      const MODES = {
        callback: {
          title: "BoxCallbackRef — stable callback, forwards to externalRef",
          desc:
            "Box wraps the ref in a stable function. The function writes to " +
            "externalRef.current when called by Preact. Preact calls refs before " +
            "layout effects (refQueue before commitQueue). " +
            "Expected: containerRef.current = <div> on mount.",
          expectOk: true,
        },
        object: {
          title: "BoxObjectRef — direct object ref passthrough",
          desc:
            "Box passes the external useRef directly to the DOM element. " +
            "Preact sets ref.current = element before layout effects run. " +
            "Expected: containerRef.current = <div> on mount.",
          expectOk: true,
        },
      };

      const App = () => {
        const [mode, setMode] = useState("callback");
        const [isOpen, setIsOpen] = useState(false);
        const [openCount, setOpenCount] = useState(0);
        const [logs, setLogs] = useState([]);
        appendLog = (entry) => setLogs((l) => [...l, entry]);

        const dialogRef = useRef(null);

        const openDialog = () => {
          setIsOpen(true);
          setOpenCount((c) => c + 1);
          dialogRef.current.showModal();
        };

        const closeDialog = () => {
          setIsOpen(false);
          dialogRef.current.close();
        };

        const switchMode = (newMode) => {
          if (isOpen) {
            closeDialog();
          }
          setLogs([]);
          setOpenCount(0);
          setMode(newMode);
        };

        const exp = MODES[mode];

        return (
          <div>
            <h2>Ref callback vs object ref</h2>
            <p>
              Is <code>containerRef.current</code> set by the time{" "}
              <code>useLayoutEffect</code> runs? The list is conditionally
              rendered (<code>{"{isOpen && <List />}"}</code>) so it remounts on
              each open. Each open uses <code>key=openCount</code> to force a
              fresh instance.
            </p>

            <div class="modes">
              {Object.entries(MODES).map(([key, m]) => (
                <label key={key}>
                  <input
                    type="radio"
                    name="mode"
                    checked={mode === key}
                    onChange={() => switchMode(key)}
                  />
                  <div>
                    <div class="mode-title">{m.title}</div>
                    <div class="mode-desc">{m.desc}</div>
                  </div>
                </label>
              ))}
            </div>

            <div class={`expectation ${exp.expectOk ? "ok" : "bug"}`}>
              Expected:{" "}
              {exp.expectOk
                ? "✓ containerRef.current = <div> — ref is set before layout effect"
                : "✗ containerRef.current = null — ref was not set in time"}
            </div>

            <div class="controls">
              <button onClick={openDialog} disabled={isOpen}>
                Open dialog #{openCount + 1}
              </button>
              <button onClick={closeDialog} disabled={!isOpen}>
                Close dialog
              </button>
              <button onClick={() => setLogs([])}>Clear log</button>
            </div>

            <dialog ref={dialogRef}>
              <strong>Dialog open #{openCount}</strong>
              {isOpen && (
                <List
                  key={openCount}
                  mode={mode}
                  instanceId={`open${openCount}`}
                />
              )}
              <br />
              <button onClick={closeDialog}>Close</button>
            </dialog>

            <div id="log">
              <strong>Log:</strong>
              {logs.length === 0 && (
                <div class="log-entry info">
                  — open the dialog to see results —
                </div>
              )}
              {logs.map((entry, i) => (
                <div key={i} class={`log-entry ${entry.kind}`}>
                  {entry.text}
                </div>
              ))}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
