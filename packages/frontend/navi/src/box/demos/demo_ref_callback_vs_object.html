<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ref callback bug repro</title>
    <style>
      body {
        max-width: 600px;
        padding: 20px;
        font-family: monospace;
      }
      h2 {
        margin-top: 0;
      }
      .steps {
        margin-bottom: 16px;
        padding: 12px 16px;
        font-size: 0.9em;
        line-height: 1.8;
        background: #fffbe6;
        border: 1px solid #e6c700;
        border-radius: 6px;
      }
      .steps strong {
        display: block;
        margin-bottom: 4px;
      }
      .controls {
        display: flex;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      button {
        padding: 8px 14px;
        font-family: monospace;
        background: #fff;
        border: 1px solid #aaa;
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      dialog {
        min-width: 260px;
        padding: 0;
        border: 1px solid #aaa;
        border-radius: 8px;
      }
      .dialog-inner {
        padding: 16px;
      }
      .item-list {
        max-height: 160px;
        margin: 8px 0;
        padding: 0;
        list-style: none;
        border: 1px solid #ddd;
        border-radius: 4px;
        overflow-y: auto;
      }
      .item-list li {
        padding: 6px 12px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
      }
      .item-list li:last-child {
        border-bottom: none;
      }
      .item-list li.selected {
        font-weight: bold;
        background: #e8f0fe;
      }
      .item-list li:hover {
        background: #f5f5f5;
      }
      .item-list li.selected:hover {
        background: #dce8fd;
      }
      #log {
        margin-top: 16px;
        padding-top: 8px;
        border-top: 1px solid #eee;
      }
      .log-entry {
        padding: 3px 0;
        font-size: 0.85em;
        white-space: pre-wrap;
        border-bottom: 1px solid #f5f5f5;
      }
      .log-entry.ok {
        color: #090;
      }
      .log-entry.bug {
        color: #c00;
        font-weight: bold;
      }
      .log-entry.info {
        color: #555;
      }
      .log-entry.warn {
        color: #c60;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      /**
       * Reproduces the bug where ref.current is null inside scrollToItem
       * when the picker is reopened after a resize (popover → dialog mode switch).
       *
       * Uses the REAL Picker, SelectableList, Selectable components.
       * Resize is simulated by setting windowWidthSignal directly:
       *   - wide  (1200px) → popover mode
       *   - narrow (400px) → dialog mode
       *
       * Steps to reproduce:
       * 1. Click "Simulate resize → dialog" (while picker is closed)
       * 2. Open the picker, select an item
       * 3. Close the picker (click outside / press Escape)
       * 4. Open the picker again → BUG: scrollToItem crashes with null ref?
       */

      import { useSignal } from "@preact/signals";
      import { render } from "preact";
      import { useEffect, useId, useRef, useState } from "preact/hooks";
      import { useControlProps } from "@jsenv/navi/src/control/control_hooks.jsx";
      import {
        dispatchRequestAction,
        dispatchRequestInteraction,
      } from "@jsenv/navi/src/control/validation/custom_constraint_validation.js";
      import { List, ListItem } from "@jsenv/navi/src/control/list/list.jsx";
      import { windowWidthSignal } from "@jsenv/navi/src/layout/responsive.js";
      import { dispatchCustomEvent, findEvent } from "@jsenv/dom";
      import { compareTwoJsValues } from "@jsenv/navi/src/utils/compare_two_js_values.js";
      import {
        getUIStateFromElement,
        dispatchRequestSetUIState,
      } from "@jsenv/navi/src/control/ui_state_controller.js";
      import { Box } from "@jsenv/navi/src/box/box.jsx";
      import { focusFirstAutofocusOrFocusable } from "@jsenv/navi/src/utils/focus/focus_first_autofocus_or_focusable.js";

      import {
        createComponentResolver,
        useNextResolver,
      } from "@jsenv/navi/src/resolver/resolver.jsx";

      // MockDialog: real <dialog> via Box (like the real Dialog), with showModal/close.
      // onnavi_open/onnavi_close stay in ...rest so Box registers them as DOM event
      // listeners — they fire when navi_open/navi_close bubble up from dispatchCustomEvent.
      const MockDialog = (props) => {
        const { ref: refProp, id, children, ...rest } = props;
        const defaultRef = useRef(null);
        const ref = refProp || defaultRef;
        const openedRef = useRef(false);

        const open = (e) => {
          const dialogEl = ref.current;
          dialogEl.showModal();
          openedRef.current = true;
          dispatchCustomEvent(dialogEl, "navi_open", { event: e });
        };
        const close = (e) => {
          const dialogEl = ref.current;
          dialogEl.close();
          openedRef.current = false;
          dispatchCustomEvent(dialogEl, "navi_close", { event: e });
        };

        return (
          <Box
            {...rest}
            as="dialog"
            id={id}
            ref={ref}
            onMouseDown={(e) => {
              rest.onMouseDown?.(e);
              // backdrop click: target is the <dialog> itself
              if (e.button === 0 && e.target === ref.current) {
                close(e);
              }
            }}
            onCancel={(e) => {
              e.preventDefault();
              if (openedRef.current) {
                close(e);
              }
            }}
            onnavi_request_open={(e) => {
              if (!openedRef.current) {
                open(e);
              }
            }}
            onnavi_request_close={(e) => {
              if (openedRef.current) {
                close(e);
              }
            }}
          >
            {children}
          </Box>
        );
      };

      const useIgnoreClickForMousedown = () => {
        const disableClickFor = () => {
          const suppressClick = (clickEvent) => {
            clickEvent.stopPropagation();
            clickEvent.preventDefault();
            document.removeEventListener("click", suppressClick, {
              capture: true,
            });
          };
          document.addEventListener("click", suppressClick, { capture: true });
        };
        return disableClickFor;
      };

      const OPTIONS = ["Apple", "Banana", "Cherry"];

      const getPickerInput = (pickerEl) =>
        pickerEl.querySelector(".navi_picker_input");
      const getPickerInputUIState = (pickerEl) =>
        getUIStateFromElement(getPickerInput(pickerEl));

      // ── MockPickerButton (= PickerButton) ──────────────────────────────────────
      const MockPickerButton = (props) => {
        const { ref, popupProps, children } = props;
        const inputRef = useRef(null);
        const [inputProps, pickerRemainingProps] = useControlProps(
          { ...props, ref: inputRef },
          {
            primaryInteractionMode: "pointer",
            controlType: "input",
            statePropName: "value",
            defaultStatePropName: "defaultValue",
            getUIValue: () => (inputRef.current ? inputRef.current.value : ""),
            fallbackState: "",
            getStateFromProp: (v) => v ?? "",
            getPropFromState: (s) => s ?? "",
          },
        );
        return (
          <button
            ref={ref}
            type="button"
            {...pickerRemainingProps}
            id={inputProps.id}
            onMouseDown={(e) => {
              inputProps.onMouseDown(e);
            }}
            onClick={(e) => {
              inputProps.onClick(e);
            }}
            popupProps={undefined}
            actionInteraction={undefined}
          >
            <input
              {...inputProps}
              className="navi_picker_input"
              tabIndex={-1}
            />
            <span>{inputProps.value || "—"}</span>
            {children}
          </button>
        );
      };

      // ── MockPickerCustom (= PickerCustom + PickerContentInside* merged) ──────────
      const MockPickerCustom = (props) => {
        const Next = useNextResolver();
        const isSmallScreen = windowWidthSignal.value <= 600;
        const { ref } = props;

        const pickerProps = { ...props };
        const popupProps = {};
        Object.assign(pickerProps, { popupProps, actionInteraction: "manual" });

        const popupRef = useRef(null);
        popupProps.ref = popupRef;

        const popupId = useId();
        Object.assign(pickerProps, { "aria-controls": popupId });
        Object.assign(popupProps, { id: popupId });

        const [expanded, setExpanded] = useState(false);
        const expandedRef = useRef(expanded);
        expandedRef.current = expanded;
        const valueAtOpenRef = useRef(null);

        const onOpen = () => {
          expandedRef.current = true;
          setExpanded(true);
          valueAtOpenRef.current = getPickerInputUIState(ref.current);
        };
        const onClose = (e) => {
          const cancelEvent = findEvent(
            e,
            (eInChain) =>
              eInChain.type === "navi_request_close" && eInChain.detail.cancel,
          );
          const isCancel = Boolean(cancelEvent);
          expandedRef.current = false;
          setExpanded(false);
          const pickerEl = ref.current;
          const inputEl = getPickerInput(pickerEl);
          const valueAtOpen = valueAtOpenRef.current;
          if (isCancel) {
            dispatchRequestSetUIState(inputEl, valueAtOpen, { event: e });
            return;
          }
          const valueAtClose = getPickerInputUIState(pickerEl);
          if (!compareTwoJsValues(valueAtClose, valueAtOpen)) {
            dispatchRequestAction(inputEl, { event: e, uiState: valueAtClose });
          }
        };

        const disableClickFor = useIgnoreClickForMousedown();
        const requestOpen = (e) => {
          const pickerEl = ref.current;
          pickerEl.scrollIntoView({ block: "nearest" });
          const popupEl = popupRef.current;
          return dispatchCustomEvent(popupEl, "navi_request_open", {
            event: e,
            anchor: pickerEl,
          });
        };
        const requestClose = (
          e = new CustomEvent("programmatic"),
          { cancel = false } = {},
        ) => {
          const mousedownEvent = findEvent(e, "mousedown");
          if (mousedownEvent) {
            disableClickFor();
          }
          const popupEl = popupRef.current;
          return dispatchCustomEvent(popupEl, "navi_request_close", {
            event: e,
            cancel,
          });
        };

        const { onActionStart, children } = props;
        Object.assign(pickerProps, {
          "aria-expanded": expanded,
          "onActionStart": (e) => {
            onActionStart?.(e);
            requestClose(e);
          },
          "onnavi_request_close": (e) => {
            if (dispatchRequestInteraction(ref.current, e)) {
              requestClose(e);
            }
          },
          children,
        });
        Object.assign(popupProps, {
          onnavi_open: (e) => {
            onOpen(e);
          },
          onnavi_close: (e) => {
            onClose(e);
          },
          onMouseDown: (e) => {
            if (e.button !== 0) {
              return;
            }
            e.stopPropagation();
          },
          onClick: (e) => {
            if (e.button !== 0) {
              return;
            }
            e.stopPropagation();
          },
        });

        const { onMouseDown, onClick } = props;
        Object.assign(pickerProps, {
          onMouseDown: (e) => {
            onMouseDown?.(e);
            const pickerEl = ref.current;
            if (
              dispatchRequestInteraction(
                pickerEl,
                e,
                "mousedown to open picker",
              )
            ) {
              if (expandedRef.current) {
                requestClose(e);
              } else {
                e.preventDefault();
                requestOpen(e);
              }
            }
          },
          onClick: (e) => {
            onClick?.(e);
            if (e.detail === 0) {
              return;
            }
            if (
              dispatchRequestInteraction(ref.current, e, "click to open picker")
            ) {
              e.preventDefault();
              requestOpen(e);
            }
          },
        });

        if (isSmallScreen) {
          return (
            <Next aria-haspopup="dialog" {...pickerProps}>
              <MockDialog {...popupProps} className="navi_picker_dialog">
                {pickerProps.children}
              </MockDialog>
            </Next>
          );
        }
        return (
          <Next aria-haspopup="listbox" {...pickerProps}>
            <div>{pickerProps.children}</div>
          </Next>
        );
      };

      // ── Resolver chain (= pickerResolvers + renderPicker) ─────────────────────
      const MockPickerCustomResolver = (props) => {
        return <MockPickerCustom {...props} />;
      };

      const renderMockPicker = createComponentResolver([
        MockPickerCustomResolver,
      ]);

      const MockPicker = (props) => {
        const defaultRef = useRef(null);
        props.ref = props.ref || defaultRef;
        return renderMockPicker(MockPickerButton, props);
      };

      // Minimal SelectableList: renders a real <List>.
      const MockSelectableList = (props) => {
        const defaultRef = useRef();
        props.ref = props.ref || defaultRef;
        const [listControlProps, remainingProps] = useControlProps(props, {
          controlType: "text",
          statePropName: "value",
          defaultStatePropName: "defaultValue",
          getUIValue: () => undefined,
          fallbackState: "",
          getStateFromProp: (v) => v ?? "",
          getPropFromState: (s) => s,
        });
        return (
          <List
            as="fieldset"
            {...listControlProps}
            {...remainingProps}
            name={undefined}
          />
        );
      };

      // Minimal Selectable: calls useCheckableProps (the real one), renders a real
      const MockSelectable = (props) => {
        const { id, value, children, index } = props;
        const spanRef = useRef();
        const onClick = (e) => {
          const listEl = spanRef.current.closest(".navi_list_container");
          dispatchRequestAction(listEl, { event: e, uiState: value });
        };
        return (
          <ListItem id={id} index={index}>
            <span
              ref={spanRef}
              onClick={onClick}
              style={{
                padding: "6px 12px",
                display: "block",
                cursor: "pointer",
              }}
            >
              {children}
            </span>
          </ListItem>
        );
      };

      const App = () => {
        const selectedSignal = useSignal();
        const selectedValue = selectedSignal.value;

        const simulateNarrow = () => {
          windowWidthSignal.value = 1200;
          setTimeout(() => {
            windowWidthSignal.value = 536;
          }, 16);
        };

        return (
          <div>
            <p>
              Steps: 1. <b>Simulate resize</b> · 2. <b>Open</b>, select item ·
              3. <b>Close</b> · 4. <b>Open</b> again → BUG?
            </p>
            <button onClick={simulateNarrow}>Simulate resize → dialog</button>
            <MockPicker
              type="text"
              name="repro_picker"
              value={selectedValue}
              action={(v) => {
                selectedSignal.value = v;
              }}
            >
              <MockSelectableList action="update">
                {OPTIONS.map((opt, i) => (
                  <MockSelectable
                    key={opt}
                    id={`${opt}_item`}
                    index={i}
                    value={opt}
                  >
                    {opt}
                  </MockSelectable>
                ))}
              </MockSelectableList>
            </MockPicker>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
