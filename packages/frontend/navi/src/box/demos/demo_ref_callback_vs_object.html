<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ref callback bug repro</title>
    <style>
      body {
        max-width: 600px;
        padding: 20px;
        font-family: monospace;
      }
      h2 {
        margin-top: 0;
      }
      .steps {
        margin-bottom: 16px;
        padding: 12px 16px;
        font-size: 0.9em;
        line-height: 1.8;
        background: #fffbe6;
        border: 1px solid #e6c700;
        border-radius: 6px;
      }
      .steps strong {
        display: block;
        margin-bottom: 4px;
      }
      .controls {
        display: flex;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      button {
        padding: 8px 14px;
        font-family: monospace;
        background: #fff;
        border: 1px solid #aaa;
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      dialog {
        min-width: 260px;
        padding: 0;
        border: 1px solid #aaa;
        border-radius: 8px;
      }
      .dialog-inner {
        padding: 16px;
      }
      .item-list {
        max-height: 160px;
        margin: 8px 0;
        padding: 0;
        list-style: none;
        border: 1px solid #ddd;
        border-radius: 4px;
        overflow-y: auto;
      }
      .item-list li {
        padding: 6px 12px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
      }
      .item-list li:last-child {
        border-bottom: none;
      }
      .item-list li.selected {
        font-weight: bold;
        background: #e8f0fe;
      }
      .item-list li:hover {
        background: #f5f5f5;
      }
      .item-list li.selected:hover {
        background: #dce8fd;
      }
      #log {
        margin-top: 16px;
        padding-top: 8px;
        border-top: 1px solid #eee;
      }
      .log-entry {
        padding: 3px 0;
        font-size: 0.85em;
        white-space: pre-wrap;
        border-bottom: 1px solid #f5f5f5;
      }
      .log-entry.ok {
        color: #090;
      }
      .log-entry.bug {
        color: #c00;
        font-weight: bold;
      }
      .log-entry.info {
        color: #555;
      }
      .log-entry.warn {
        color: #c60;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      /**
       * Reproduces the bug where ref.current is null inside scrollToItem
       * when the picker is reopened after a resize (popover → dialog mode switch).
       *
       * Uses the REAL Picker, SelectableList, Selectable components.
       * Resize is simulated by setting windowWidthSignal directly:
       *   - wide  (1200px) → popover mode
       *   - narrow (400px) → dialog mode
       *
       * Steps to reproduce:
       * 1. Click "Simulate resize → dialog" (while picker is closed)
       * 2. Open the picker, select an item
       * 3. Close the picker (click outside / press Escape)
       * 4. Open the picker again → BUG: scrollToItem crashes with null ref?
       */

      import { useSignal } from "@preact/signals";
      import { render } from "preact";
      import { useState } from "preact/hooks";
      import {
        Box,
        Field,
        Label,
        Picker,
        SelectableList,
        Selectable,
      } from "@jsenv/navi";
      import { windowWidthSignal } from "@jsenv/navi/src/layout/responsive.js";

      const OPTIONS = [
        "Apple",
        "Banana",
        "Cherry",
        "Date",
        "Elderberry",
        "Fig",
        "Grape",
      ];

      // ---- App ----
      const App = () => {
        const selectedSignal = useSignal([]);
        const selectedArray = selectedSignal.value;
        const [logs, setLogs] = useState([]);
        const appendLog = (text, kind = "info") => {
          console.debug(`[demo] ${text}`);
          setLogs((l) => [...l, { text, kind }].slice(-40));
        };

        const simulateWide = () => {
          windowWidthSignal.value = 1200;
          appendLog(
            `--- simulate resize: wide (1200px) → popover mode ---`,
            "warn",
          );
        };
        const simulateNarrow = () => {
          windowWidthSignal.value = 400;
          appendLog(
            `--- simulate resize: narrow (400px) → dialog mode ---`,
            "warn",
          );
        };

        // Patch console.debug to capture scrollToItem logs from real list.jsx
        const origDebug = console.debug;
        console.debug = (...args) => {
          origDebug(...args);
          const msg = args.join(" ");
          if (msg.includes("scroll")) {
            appendLog(
              msg,
              msg.includes("null") || msg.includes("undefined") ? "bug" : "ok",
            );
          }
        };

        return (
          <div>
            <h2>Ref callback bug repro</h2>

            <div className="steps">
              <strong>Steps to reproduce:</strong>
              1. Click <b>Simulate resize → dialog</b> (picker must be closed)
              <br />
              2. <b>Open</b> the picker, select an item
              <br />
              3. <b>Close</b> the picker (click outside or Escape)
              <br />
              4. <b>Open</b> the picker again → BUG?
            </div>

            <div className="controls">
              <button onClick={simulateWide}>
                Simulate resize → wide (popover)
              </button>
              <button onClick={simulateNarrow}>
                Simulate resize → narrow (dialog)
              </button>
            </div>

            <Box flex="y" spacing="m" style={{ marginTop: 16 }}>
              <Field vertical>
                <Label>Fruits</Label>
                <Picker
                  type="text"
                  name="repro_picker"
                  value={selectedArray}
                  ui={
                    selectedArray.length === 0
                      ? "Select fruits"
                      : selectedArray.join(", ")
                  }
                  action={(v) => {
                    appendLog(`action called: ${JSON.stringify(v)}`, "info");
                    selectedSignal.value = v;
                  }}
                >
                  <SelectableList multiple action="update">
                    {OPTIONS.map((opt, i) => (
                      <Selectable
                        key={opt}
                        id={`${opt}_item`}
                        index={i}
                        value={opt}
                        selected={selectedArray.includes(opt)}
                        padding="s"
                        spacing="s"
                      >
                        {opt}
                      </Selectable>
                    ))}
                  </SelectableList>
                </Picker>
              </Field>
            </Box>

            <p style={{ margin: "8px 0", fontSize: "0.85em", color: "#555" }}>
              Selected:{" "}
              {selectedArray.length === 0 ? "(none)" : selectedArray.join(", ")}
            </p>

            <div id="log">
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <strong>Log:</strong>
                <button
                  onClick={() => {
                    const text = logs.map((e) => e.text).join("\n");
                    window.navigator.clipboard.writeText(text);
                  }}
                  disabled={logs.length === 0}
                >
                  Copy
                </button>
              </div>
              {logs.length === 0 && (
                <div className="log-entry info">
                  — open the picker to start —
                </div>
              )}
              {logs.map((entry, i) => (
                <div key={i} className={`log-entry ${entry.kind}`}>
                  {entry.text}
                </div>
              ))}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
