<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ref callback bug repro</title>
    <style>
      body {
        max-width: 600px;
        padding: 20px;
        font-family: monospace;
      }
      h2 {
        margin-top: 0;
      }
      .steps {
        margin-bottom: 16px;
        padding: 12px 16px;
        font-size: 0.9em;
        line-height: 1.8;
        background: #fffbe6;
        border: 1px solid #e6c700;
        border-radius: 6px;
      }
      .steps strong {
        display: block;
        margin-bottom: 4px;
      }
      .controls {
        display: flex;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      button {
        padding: 8px 14px;
        font-family: monospace;
        background: #fff;
        border: 1px solid #aaa;
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      dialog {
        min-width: 260px;
        padding: 0;
        border: 1px solid #aaa;
        border-radius: 8px;
      }
      .dialog-inner {
        padding: 16px;
      }
      .item-list {
        max-height: 160px;
        margin: 8px 0;
        padding: 0;
        list-style: none;
        border: 1px solid #ddd;
        border-radius: 4px;
        overflow-y: auto;
      }
      .item-list li {
        padding: 6px 12px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
      }
      .item-list li:last-child {
        border-bottom: none;
      }
      .item-list li.selected {
        font-weight: bold;
        background: #e8f0fe;
      }
      .item-list li:hover {
        background: #f5f5f5;
      }
      .item-list li.selected:hover {
        background: #dce8fd;
      }
      #log {
        margin-top: 16px;
        padding-top: 8px;
        border-top: 1px solid #eee;
      }
      .log-entry {
        padding: 3px 0;
        font-size: 0.85em;
        white-space: pre-wrap;
        border-bottom: 1px solid #f5f5f5;
      }
      .log-entry.ok {
        color: #090;
      }
      .log-entry.bug {
        color: #c00;
        font-weight: bold;
      }
      .log-entry.info {
        color: #555;
      }
      .log-entry.warn {
        color: #c60;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      /**
       * Reproduces the bug where ref.current is null inside scrollToItem
       * when the picker is reopened after a resize (popover → dialog mode switch).
       *
       * Uses the REAL Picker, SelectableList, Selectable components.
       * Resize is simulated by setting windowWidthSignal directly:
       *   - wide  (1200px) → popover mode
       *   - narrow (400px) → dialog mode
       *
       * Steps to reproduce:
       * 1. Click "Simulate resize → dialog" (while picker is closed)
       * 2. Open the picker, select an item
       * 3. Close the picker (click outside / press Escape)
       * 4. Open the picker again → BUG: scrollToItem crashes with null ref?
       */

      import { useSignal } from "@preact/signals";
      import { render } from "preact";
      import { useRef } from "preact/hooks";
      import { List, ListItem } from "@jsenv/navi/src/control/list/list.jsx";
      import { windowWidthSignal } from "@jsenv/navi/src/layout/responsive.js";
      import { dispatchCustomEvent } from "@jsenv/dom";
      import {
        createComponentResolver,
        useNextResolver,
      } from "@jsenv/navi/src/resolver/resolver.jsx";

      // MockDialog: minimal <dialog> — showModal/close + dispatches navi_close event
      // so onnavi_close on the element is triggered via DOM bubbling.
      const MockDialog = (props) => {
        const { ref: refProp, id, children, ...rest } = props;
        const defaultRef = useRef(null);
        const ref = refProp || defaultRef;

        const close = (e) => {
          ref.current.close();
          dispatchCustomEvent(ref.current, "navi_close", { event: e });
        };

        return (
          <dialog
            {...rest}
            id={id}
            ref={ref}
            onCancel={(e) => {
              e.preventDefault();
              close(e);
            }}
            onnavi_request_open={() => {
              ref.current.showModal();
            }}
            onnavi_request_close={(e) => {
              close(e);
            }}
          >
            {children}
          </dialog>
        );
      };

      const OPTIONS = ["Apple", "Banana", "Cherry"];

      // ── MockPickerButton ──────────────────────────────────────────────────────
      const MockPickerButton = (props) => {
        const {
          ref,
          children,
          onMouseDown,
          popupProps,
          actionInteraction,
          ...rest
        } = props;
        return (
          <button ref={ref} type="button" onMouseDown={onMouseDown}>
            {children}
          </button>
        );
      };

      // ── MockPickerCustom (= PickerCustom + PickerContentInside* merged) ──────────
      const MockPickerCustom = (props) => {
        const Next = useNextResolver();
        const isSmallScreen = windowWidthSignal.value <= 600;
        const { ref } = props;

        const pickerProps = { ...props };
        const popupProps = {};
        Object.assign(pickerProps, { popupProps, actionInteraction: "manual" });

        const popupRef = useRef(null);
        popupProps.ref = popupRef;

        const onClose = () => {
          props.action?.("dummy");
        };

        const requestOpen = (e) => {
          dispatchCustomEvent(popupRef.current, "navi_request_open", {
            event: e,
            anchor: ref.current,
          });
        };

        const { children } = props;
        Object.assign(pickerProps, { children });
        Object.assign(popupProps, {
          onnavi_close: (e) => {
            onClose(e);
          },
        });
        Object.assign(pickerProps, {
          onMouseDown: (e) => {
            e.preventDefault();
            requestOpen(e);
          },
        });

        if (isSmallScreen) {
          return (
            <Next aria-haspopup="dialog" {...pickerProps}>
              <MockDialog {...popupProps} className="navi_picker_dialog">
                {pickerProps.children}
              </MockDialog>
            </Next>
          );
        }
        return (
          <Next aria-haspopup="listbox" {...pickerProps}>
            <div>{pickerProps.children}</div>
          </Next>
        );
      };

      // ── Resolver chain (= pickerResolvers + renderPicker) ─────────────────────
      const MockPickerCustomResolver = (props) => {
        return <MockPickerCustom {...props} />;
      };

      const renderMockPicker = createComponentResolver([
        MockPickerCustomResolver,
      ]);

      const MockPicker = (props) => {
        const defaultRef = useRef(null);
        props.ref = props.ref || defaultRef;
        return renderMockPicker(MockPickerButton, props);
      };

      // Minimal SelectableList: renders a real <List>.
      const MockSelectableList = (props) => {
        const defaultRef = useRef();
        props.ref = props.ref || defaultRef;
        return <List as="fieldset" {...props} />;
      };

      const MockSelectable = ({ index, children }) => {
        return (
          <ListItem index={index}>
            <span>{children}</span>
          </ListItem>
        );
      };

      const App = () => {
        const selectedSignal = useSignal();
        const selectedValue = selectedSignal.value;

        const simulateNarrow = () => {
          windowWidthSignal.value = 1200;
          setTimeout(() => {
            windowWidthSignal.value = 536;
          }, 16);
        };

        return (
          <div>
            <p>
              Steps: 1. <b>Simulate resize</b> · 2. <b>Open</b>, select item ·
              3. <b>Close</b> · 4. <b>Open</b> again → BUG?
            </p>
            <button onClick={simulateNarrow}>Simulate resize → dialog</button>
            <MockPicker
              type="text"
              name="repro_picker"
              value={selectedValue}
              action={(v) => {
                selectedSignal.value = v;
              }}
            >
              <MockSelectableList action="update">
                {OPTIONS.map((opt, i) => (
                  <MockSelectable key={opt} index={i}>
                    {opt}
                  </MockSelectable>
                ))}
              </MockSelectableList>
            </MockPicker>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
