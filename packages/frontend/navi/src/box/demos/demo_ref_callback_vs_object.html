<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ref callback vs object ref repro</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      /**
       * Reproduces the bug where useDisplayedLayoutEffect captures
       * el = containerRef.current = undefined when containerRef is
       * implemented as a stable callback ref that never sets .current
       * on the function itself.
       *
       * useDisplayedLayoutEffect does:
       *
       *   useLayoutEffect(() => {
       *     const el = ref.current; // captured once on mount
       *     ancestor.addEventListener("toggle", () => {
       *       callback(el);        // always uses the captured el
       *     });
       *   }, []);
       *
       * When ref is a stable callback function (Box's finalRef) that
       * doesn't set ref.current = element, el is captured as undefined.
       * Every subsequent dialog open then calls callback(undefined).
       *
       * With an object ref (useRef / { current }), ref.current = element
       * is always set by Preact before layout effects run, so el is correct.
       *
       * The fix: the callback ref function must expose .current = element
       * so it behaves like a ref object when read externally.
       * useComposeElementRef already does this: refCallback.current = el.
       */

      import { render } from "preact";
      import { useRef, useState, useLayoutEffect } from "preact/hooks";

      // ---- useDisplayedLayoutEffect (simplified) ----
      // Fires callback(el) immediately if ancestor dialog is open,
      // and on every subsequent open via the "toggle" event.
      // IMPORTANT: captures `el = ref.current` once at mount.
      const useDisplayedLayoutEffect = (ref, callback, deps) => {
        const callbackRef = useRef(callback);
        callbackRef.current = callback;

        // Runs on mount and when deps change
        useLayoutEffect(() => {
          const el = ref.current;
          if (!el) {
            return;
          }
          const ancestor = el.closest("dialog");
          if (!ancestor) {
            callbackRef.current(el);
            return;
          }
          if (ancestor.open) {
            callbackRef.current(el);
          }
          // else: closed — wait for toggle below
        }, deps);

        // Set up toggle listener once (deps=[]).
        // Captures el = ref.current at mount time.
        useLayoutEffect(() => {
          const el = ref.current; // ← BUG: undefined when ref is callback without .current
          if (!el) {
            return;
          }
          const ancestor = el.closest("dialog");
          if (!ancestor) {
            return;
          }
          const onToggle = (e) => {
            const isOpen = e.newState === "open";
            if (!isOpen) {
              return;
            }
            callbackRef.current(el);
          };
          ancestor.addEventListener("toggle", onToggle);
          return () => {
            ancestor.removeEventListener("toggle", onToggle);
          };
        }, []);
      };

      // ---- Box with STABLE CALLBACK REF — does NOT set .current on fn ----
      // This is the current simplified box.jsx approach.
      // The returned finalRef is a function. finalRef.current is never set.
      const BoxCallbackRef = ({ ref: externalRef, children }) => {
        const externalRefRef = useRef(externalRef);
        externalRefRef.current = externalRef;

        const refCallbackRef = useRef(null);
        if (!refCallbackRef.current) {
          refCallbackRef.current = (el) => {
            const currentRef = externalRefRef.current;
            if (currentRef) {
              if (typeof currentRef === "function") {
                currentRef(el);
              } else {
                currentRef.current = el;
              }
            }
          };
          // NOTE: refCallbackRef.current.current is never set = the bug
        }

        return <div ref={refCallbackRef.current}>{children}</div>;
      };

      // ---- Box with STABLE CALLBACK REF — DOES set .current on fn (fix) ----
      // Like useComposeElementRef does: refCallback.current = el.
      const BoxCallbackRefFixed = ({ ref: externalRef, children }) => {
        const externalRefRef = useRef(externalRef);
        externalRefRef.current = externalRef;

        const refCallbackRef = useRef(null);
        if (!refCallbackRef.current) {
          refCallbackRef.current = (el) => {
            refCallbackRef.current.current = el; // ← the fix
            const currentRef = externalRefRef.current;
            if (currentRef) {
              if (typeof currentRef === "function") {
                currentRef(el);
              } else {
                currentRef.current = el;
              }
            }
          };
        }

        return <div ref={refCallbackRef.current}>{children}</div>;
      };

      // ---- Box with plain OBJECT REF passthrough ----
      const BoxObjectRef = ({ ref: externalRef, children }) => {
        const defaultRef = useRef(null);
        const finalRef = externalRef || defaultRef;
        return <div ref={finalRef}>{children}</div>;
      };

      // ---- List component ----
      // Mimics SelectableList inside a dialog:
      // - Creates containerRef, passes it to Box.
      // - Uses useDisplayedLayoutEffect(containerRef, ...) to scroll on open.
      const List = ({ mode }) => {
        const containerRef = useRef(null);

        useDisplayedLayoutEffect(
          containerRef,
          (el) => {
            // "el" is what useDisplayedLayoutEffect captured at mount time
            const elDesc = el ? `<${el.tagName.toLowerCase()}>` : String(el);
            const liveDesc = containerRef.current
              ? `<${containerRef.current.tagName.toLowerCase()}>`
              : String(containerRef.current);
            log(
              `scrollToSelected: el=${elDesc}, containerRef.current=${liveDesc}`,
              el ? "ok" : "bug",
            );
          },
          [],
        );

        if (mode === "callback") {
          return (
            <BoxCallbackRef ref={containerRef}>
              <ul>
                <li>item 1</li>
                <li>item 2</li>
              </ul>
            </BoxCallbackRef>
          );
        }
        if (mode === "callback-fixed") {
          return (
            <BoxCallbackRefFixed ref={containerRef}>
              <ul>
                <li>item 1</li>
                <li>item 2</li>
              </ul>
            </BoxCallbackRefFixed>
          );
        }
        return (
          <BoxObjectRef ref={containerRef}>
            <ul>
              <li>item 1</li>
              <li>item 2</li>
            </ul>
          </BoxObjectRef>
        );
      };

      // ---- App ----
      let appendLog;

      const App = () => {
        const [mode, setMode] = useState("callback");
        const [openCount, setOpenCount] = useState(0);
        const [logs, setLogs] = useState([]);
        appendLog = (entry) => setLogs((l) => [entry, ...l]);

        const dialogRef = useRef(null);

        const openDialog = () => {
          setOpenCount((c) => c + 1);
          dialogRef.current.showModal();
        };
        const closeDialog = () => {
          dialogRef.current.close();
        };

        return (
          <div style={{ fontFamily: "monospace", padding: 16 }}>
            <h2>Ref callback vs object ref</h2>
            <p>
              <strong>
                Why does a stable callback ref break useDisplayedLayoutEffect?
              </strong>
              <br />
              useDisplayedLayoutEffect captures <code>
                el = ref.current
              </code>{" "}
              once at mount. If <code>ref</code> is a callback function without{" "}
              <code>.current</code>, el is <code>undefined</code> forever.
            </p>

            <div style={{ marginBottom: 12 }}>
              <label style={{ marginRight: 12 }}>
                <input
                  type="radio"
                  checked={mode === "callback"}
                  onChange={() => setMode("callback")}
                />{" "}
                Callback ref — no .current set (bug)
              </label>
              <label style={{ marginRight: 12 }}>
                <input
                  type="radio"
                  checked={mode === "callback-fixed"}
                  onChange={() => setMode("callback-fixed")}
                />{" "}
                Callback ref — .current set (fix)
              </label>
              <label>
                <input
                  type="radio"
                  checked={mode === "object"}
                  onChange={() => setMode("object")}
                />{" "}
                Object ref (works)
              </label>
            </div>

            <button onClick={openDialog}>Open dialog ({openCount})</button>

            <dialog ref={dialogRef} style={{ padding: 24, minWidth: 300 }}>
              <button onClick={closeDialog}>Close</button>
              <List mode={mode} />
            </dialog>

            <div style={{ marginTop: 16 }}>
              {logs.map((entry, i) => (
                <div
                  key={i}
                  style={{
                    color: entry.ok ? "green" : "red",
                    fontWeight: entry.ok ? "normal" : "bold",
                  }}
                >
                  [{openCount - i <= 0 ? "?" : openCount - i}] {entry.msg}
                </div>
              ))}
            </div>
          </div>
        );
      };

      const log = (msg, kind) => {
        appendLog({ msg, ok: kind === "ok" });
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
