<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ref callback bug repro</title>
    <style>
      body {
        max-width: 600px;
        padding: 20px;
        font-family: monospace;
      }
      h2 {
        margin-top: 0;
      }
      .steps {
        margin-bottom: 16px;
        padding: 12px 16px;
        font-size: 0.9em;
        line-height: 1.8;
        background: #fffbe6;
        border: 1px solid #e6c700;
        border-radius: 6px;
      }
      .steps strong {
        display: block;
        margin-bottom: 4px;
      }
      .controls {
        display: flex;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      button {
        padding: 8px 14px;
        font-family: monospace;
        background: #fff;
        border: 1px solid #aaa;
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      dialog {
        min-width: 260px;
        padding: 0;
        border: 1px solid #aaa;
        border-radius: 8px;
      }
      .dialog-inner {
        padding: 16px;
      }
      .item-list {
        max-height: 160px;
        margin: 8px 0;
        padding: 0;
        list-style: none;
        border: 1px solid #ddd;
        border-radius: 4px;
        overflow-y: auto;
      }
      .item-list li {
        padding: 6px 12px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
      }
      .item-list li:last-child {
        border-bottom: none;
      }
      .item-list li.selected {
        font-weight: bold;
        background: #e8f0fe;
      }
      .item-list li:hover {
        background: #f5f5f5;
      }
      .item-list li.selected:hover {
        background: #dce8fd;
      }
      #log {
        margin-top: 16px;
        padding-top: 8px;
        border-top: 1px solid #eee;
      }
      .log-entry {
        padding: 3px 0;
        font-size: 0.85em;
        white-space: pre-wrap;
        border-bottom: 1px solid #f5f5f5;
      }
      .log-entry.ok {
        color: #090;
      }
      .log-entry.bug {
        color: #c00;
        font-weight: bold;
      }
      .log-entry.info {
        color: #555;
      }
      .log-entry.warn {
        color: #c60;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      /**
       * Attempts to reproduce the bug where ref.current is null/undefined
       * inside scrollToItem when the picker dialog is reopened.
       *
       * Steps to reproduce:
       * 1. Resize while closed — simulate re-render while dialog is closed
       * 2. Open picker + select first item
       * 3. Close picker
       * 4. Open picker + select second item → BUG: scrollToItem crashes
       *
       * The list is conditionally rendered (only when dialog is open) and
       * uses a key that changes on each open to force a remount.
       *
       * The Box component wraps the container and ul refs in stable callback
       * refs. The useDisplayedLayoutEffect uses containerRef to find the
       * dialog ancestor and set up the toggle listener.
       */

      import { signal } from "@preact/signals";
      import { render } from "preact";
      import { useRef, useState, useCallback } from "preact/hooks";
      import { Box, Dialog, useDisplayedLayoutEffect } from "@jsenv/navi";

      // ---- Shared state ----
      const selectedIdSignal = signal(null);
      const ITEMS = [
        { id: "item-1", label: "Apple" },
        { id: "item-2", label: "Banana" },
        { id: "item-3", label: "Cherry" },
        { id: "item-4", label: "Date" },
        { id: "item-5", label: "Elderberry" },
        { id: "item-6", label: "Fig" },
        { id: "item-7", label: "Grape" },
      ];

      // ---- Logging ----
      let appendLog;
      const log = (text, kind = "info") => {
        if (appendLog) {
          appendLog({ text, kind });
        }
        console.debug(`[demo] ${text}`);
      };

      // ---- PickerList ----
      // Mimics the SelectableList inside the picker dialog.
      // - containerRef → passed to outer Box (container)
      // - ref → passed to inner Box (ul)
      // - useDisplayedLayoutEffect scrolls to selected on dialog open
      const PickerList = ({ instanceId }) => {
        const containerRef = useRef(null);
        const ulRef = useRef(null);

        const selectedId = selectedIdSignal.value;

        log(
          `PickerList[${instanceId}] render — selectedId=${selectedId}`,
          "info",
        );

        // scrollToItem: reads containerRef.current and ulRef.current live
        const scrollToItem = useCallback((itemId, reason) => {
          const containerEl = containerRef.current;
          const ulEl = ulRef.current;
          if (!containerEl) {
            log(
              `scrollToItem(${itemId}, "${reason}") BUG — containerRef.current is null/undefined!`,
              "bug",
            );
            return;
          }
          if (!ulEl) {
            log(
              `scrollToItem(${itemId}, "${reason}") BUG — ulRef.current is null/undefined!`,
              "bug",
            );
            return;
          }
          const itemEl = ulEl.querySelector(`[data-id="${itemId}"]`);
          if (itemEl) {
            itemEl.scrollIntoView({ block: "nearest" });
          }
          log(
            `scrollToItem(${itemId}, "${reason}") OK — containerEl=<${containerEl.tagName.toLowerCase()}>, ulEl=<${ulEl.tagName.toLowerCase()}>`,
            "ok",
          );
        }, []);

        // Mimics useListScrollSync: scroll to selected on display
        useDisplayedLayoutEffect(
          containerRef,
          (el) => {
            log(
              `useDisplayedLayoutEffect fired (instanceId=${instanceId}, el=${el ? `<${el.tagName.toLowerCase()}>` : "null"})`,
              el ? "info" : "bug",
            );
            const selected = selectedIdSignal.peek();
            if (selected) {
              scrollToItem(selected, "scroll to selected");
            } else {
              scrollToItem(ITEMS[0].id, "scroll to top");
            }
          },
          [ulRef],
        );

        return (
          <Box ref={containerRef} flex="y" style={{ gap: 0 }}>
            <Box as="ul" ref={ulRef} className="item-list">
              {ITEMS.map((item) => (
                <li
                  key={item.id}
                  data-id={item.id}
                  className={selectedId === item.id ? "selected" : ""}
                  onClick={() => {
                    selectedIdSignal.value = item.id;
                    log(`selected: ${item.label}`, "info");
                  }}
                >
                  {selectedId === item.id ? "▶ " : "  "}
                  {item.label}
                </li>
              ))}
            </Box>
          </Box>
        );
      };

      // ---- App ----
      const App = () => {
        const [logs, setLogs] = useState([]);
        const [isOpen, setIsOpen] = useState(false);
        const [openKey, setOpenKey] = useState(0);
        const [rerenderCount, setRerenderCount] = useState(0);
        appendLog = (entry) => setLogs((l) => [...l, entry].slice(-40));

        const dialogRef = useRef(null);

        const openPicker = () => {
          const nextKey = openKey + 1;
          setOpenKey(nextKey);
          setIsOpen(true);
          log(`--- openPicker (key=${nextKey}) ---`, "info");
          // Use the Dialog component's event API so openedRef is tracked correctly
          // (needed for backdrop-click to close)
          dialogRef.current.dispatchEvent(
            new CustomEvent("navi_request_open", { bubbles: true }),
          );
        };

        const closePicker = () => {
          setIsOpen(false);
          log("--- closePicker ---", "info");
        };

        const simulateRerender = () => {
          setRerenderCount((c) => c + 1);
          log(
            `--- simulateRerender #${rerenderCount + 1} (dialog closed) ---`,
            "warn",
          );
        };

        return (
          <div>
            <h2>Ref callback bug repro</h2>

            <div className="steps">
              <strong>Steps to reproduce:</strong>
              1. <b>Resize while closed</b> — simulate re-render while dialog is
              closed
              <br />
              2. <b>Open picker</b> + select <b>first item</b>
              <br />
              3. <b>Close picker</b> by clicking outside
              <br />
              4. <b>Open picker</b> + select <b>second item</b> → BUG?
            </div>

            <div className="controls">
              <button onClick={simulateRerender} disabled={isOpen}>
                1. Resize while closed #{rerenderCount + 1}
              </button>
              <button onClick={openPicker} disabled={isOpen}>
                2/4. Open picker (key={openKey + 1})
              </button>
            </div>

            <p
              style={{
                margin: "4px 0 16px",
                fontSize: "0.85em",
                color: "#555",
              }}
            >
              Selected: {selectedIdSignal.value ?? "(none)"} · Dialog:{" "}
              {isOpen ? "open" : "closed"} · Re-renders: {rerenderCount}
            </p>

            <Dialog ref={dialogRef} onnavi_close={closePicker}>
              <div className="dialog-inner">
                <div style={{ marginBottom: 8, fontWeight: "bold" }}>
                  Picker (open #{openKey})
                </div>
                {isOpen && (
                  <PickerList key={openKey} instanceId={`open${openKey}`} />
                )}
              </div>
            </Dialog>

            <div id="log">
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <strong>Log:</strong>
                <button
                  onClick={() => {
                    const text = logs.map((e) => e.text).join("\n");
                    window.navigator.clipboard.writeText(text);
                  }}
                  disabled={logs.length === 0}
                >
                  Copy
                </button>
              </div>
              {logs.length === 0 && (
                <div className="log-entry info">
                  — open the picker to start —
                </div>
              )}
              {logs.map((entry, i) => (
                <div key={i} className={`log-entry ${entry.kind}`}>
                  {entry.text}
                </div>
              ))}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
