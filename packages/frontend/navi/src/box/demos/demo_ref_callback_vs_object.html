<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ref callback bug repro</title>
    <style>
      body {
        max-width: 600px;
        padding: 20px;
        font-family: monospace;
      }
      h2 {
        margin-top: 0;
      }
      .steps {
        margin-bottom: 16px;
        padding: 12px 16px;
        font-size: 0.9em;
        line-height: 1.8;
        background: #fffbe6;
        border: 1px solid #e6c700;
        border-radius: 6px;
      }
      .steps strong {
        display: block;
        margin-bottom: 4px;
      }
      .controls {
        display: flex;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      button {
        padding: 8px 14px;
        font-family: monospace;
        background: #fff;
        border: 1px solid #aaa;
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      dialog {
        min-width: 260px;
        padding: 0;
        border: 1px solid #aaa;
        border-radius: 8px;
      }
      .dialog-inner {
        padding: 16px;
      }
      .item-list {
        max-height: 160px;
        margin: 8px 0;
        padding: 0;
        list-style: none;
        border: 1px solid #ddd;
        border-radius: 4px;
        overflow-y: auto;
      }
      .item-list li {
        padding: 6px 12px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
      }
      .item-list li:last-child {
        border-bottom: none;
      }
      .item-list li.selected {
        font-weight: bold;
        background: #e8f0fe;
      }
      .item-list li:hover {
        background: #f5f5f5;
      }
      .item-list li.selected:hover {
        background: #dce8fd;
      }
      #log {
        margin-top: 16px;
        padding-top: 8px;
        border-top: 1px solid #eee;
      }
      .log-entry {
        padding: 3px 0;
        font-size: 0.85em;
        white-space: pre-wrap;
        border-bottom: 1px solid #f5f5f5;
      }
      .log-entry.ok {
        color: #090;
      }
      .log-entry.bug {
        color: #c00;
        font-weight: bold;
      }
      .log-entry.info {
        color: #555;
      }
      .log-entry.warn {
        color: #c60;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      /**
       * Attempts to reproduce the bug where ref.current is null/undefined
       * inside scrollToItem when the picker is reopened.
       *
       * Mimics the real CustomPicker architecture:
       * - "popover" mode: list only mounted when open (inside Popover)
       * - "dialog" mode: list ALWAYS mounted (inside Dialog, even when closed)
       * - Resize (windowWidthSignal) switches mode → structural unmount/remount
       *
       * Steps to reproduce:
       * 1. Resize — switches between popover/dialog (remounts the list)
       * 2. Open picker + select first item
       * 3. Close picker (click outside)
       * 4. Open picker + select second item → BUG?
       */

      import { signal } from "@preact/signals";
      import { render } from "preact";
      import { forwardRef } from "preact/compat";
      import {
        useRef,
        useState,
        useCallback,
        useImperativeHandle,
      } from "preact/hooks";
      import {
        Box,
        Dialog,
        Popover,
        useDisplayedLayoutEffect,
      } from "@jsenv/navi";

      // ---- Shared state ----
      const selectedIdSignal = signal(null);
      const ITEMS = [
        { id: "item-1", label: "Apple" },
        { id: "item-2", label: "Banana" },
        { id: "item-3", label: "Cherry" },
        { id: "item-4", label: "Date" },
        { id: "item-5", label: "Elderberry" },
        { id: "item-6", label: "Fig" },
        { id: "item-7", label: "Grape" },
      ];

      // ---- Logging ----
      let appendLog;
      const log = (text, kind = "info") => {
        if (appendLog) {
          appendLog({ text, kind });
        }
        console.debug(`[demo] ${text}`);
      };

      // ---- PickerList ----
      // Mimics SelectableList / useListScrollSync inside the picker popup.
      // containerRef → outer Box (container), ulRef → inner Box (ul)
      // useDisplayedLayoutEffect scrolls to selected each time the ancestor opens.
      const PickerList = ({ instanceId }) => {
        const containerRef = useRef(null);
        const ulRef = useRef(null);

        const selectedId = selectedIdSignal.value;

        log(
          `PickerList[${instanceId}] render — selectedId=${selectedId}`,
          "info",
        );

        const scrollToItem = useCallback((itemId, reason) => {
          const containerEl = containerRef.current;
          const ulEl = ulRef.current;
          if (!containerEl) {
            log(
              `scrollToItem(${itemId}, "${reason}") BUG — containerRef.current is null!`,
              "bug",
            );
            return;
          }
          if (!ulEl) {
            log(
              `scrollToItem(${itemId}, "${reason}") BUG — ulRef.current is null!`,
              "bug",
            );
            return;
          }
          const itemEl = ulEl.querySelector(`[data-id="${itemId}"]`);
          if (itemEl) {
            itemEl.scrollIntoView({ block: "nearest" });
          }
          log(`scrollToItem(${itemId}, "${reason}") OK`, "ok");
        }, []);

        useDisplayedLayoutEffect(
          containerRef,
          (el) => {
            log(
              `useDisplayedLayoutEffect fired (instanceId=${instanceId})`,
              "info",
            );
            const selected = selectedIdSignal.peek();
            if (selected) {
              scrollToItem(selected, "scroll to selected");
            } else {
              scrollToItem(ITEMS[0].id, "scroll to top");
            }
          },
          [ulRef],
        );

        return (
          <Box ref={containerRef} flex="y" style={{ gap: 0 }}>
            <Box as="ul" ref={ulRef} className="item-list">
              {ITEMS.map((item) => (
                <li
                  key={item.id}
                  data-id={item.id}
                  className={selectedId === item.id ? "selected" : ""}
                  onClick={() => {
                    selectedIdSignal.value = item.id;
                    log(`selected: ${item.label}`, "info");
                  }}
                >
                  {selectedId === item.id ? "▶ " : "  "}
                  {item.label}
                </li>
              ))}
            </Box>
          </Box>
        );
      };

      // ---- PickerInsideDialog ----
      // Mimics PickerContentInsideDialog: Dialog always renders children (list is always mounted).
      const PickerInsideDialog = forwardRef(({ instanceId, onClose }, ref) => {
        const dialogRef = useRef(null);
        useImperativeHandle(ref, () => ({
          requestOpen: () => {
            dialogRef.current.dispatchEvent(
              new CustomEvent("navi_request_open", { bubbles: true }),
            );
          },
        }));
        return (
          <Dialog
            ref={dialogRef}
            onnavi_open={() => {
              log(`dialog opened (instanceId=${instanceId})`, "info");
            }}
            onnavi_close={onClose}
          >
            <div className="dialog-inner">
              <div style={{ marginBottom: 8, fontWeight: "bold" }}>
                Picker — dialog mode ({instanceId})
              </div>
              {/* List is ALWAYS mounted (no conditional), matching real Dialog behavior */}
              <PickerList instanceId={instanceId} />
            </div>
          </Dialog>
        );
      });

      // ---- PickerInsidePopover ----
      // Mimics PickerContentInsidePopover: list only mounted when open.
      const PickerInsidePopover = ({
        instanceId,
        isOpen,
        anchorRef,
        onClose,
      }) => {
        if (!isOpen) {
          return null;
        }
        return (
          <Popover
            anchor={anchorRef}
            onnavi_close={onClose}
            style={{ minWidth: 200 }}
          >
            <div className="dialog-inner">
              <div style={{ marginBottom: 8, fontWeight: "bold" }}>
                Picker — popover mode ({instanceId})
              </div>
              <PickerList instanceId={instanceId} />
            </div>
          </Popover>
        );
      };

      // ---- App ----
      const App = () => {
        const [logs, setLogs] = useState([]);
        const [isOpen, setIsOpen] = useState(false);
        const [openCount, setOpenCount] = useState(0);
        const [mode, setMode] = useState("popover"); // "popover" | "dialog"
        appendLog = (entry) => setLogs((l) => [...l, entry].slice(-40));

        const anchorRef = useRef(null);
        const dialogPickerRef = useRef(null);

        const openPicker = () => {
          const next = openCount + 1;
          setOpenCount(next);
          setIsOpen(true);
          log(`--- openPicker #${next} (mode=${mode}) ---`, "info");
          if (mode === "dialog") {
            // Ask the Dialog component to open via its event API
            dialogPickerRef.current.requestOpen();
          }
        };

        const closePicker = () => {
          setIsOpen(false);
          log("--- closePicker ---", "info");
        };

        const toggleMode = () => {
          const next = mode === "popover" ? "dialog" : "popover";
          setMode(next);
          log(`--- resize: switched to ${next} mode ---`, "warn");
        };

        return (
          <div>
            <h2>Ref callback bug repro</h2>

            <div className="steps">
              <strong>Steps to reproduce:</strong>
              1. Start in <b>popover</b> mode (default)
              <br />
              2. <b>Resize</b> → switch to <b>dialog</b> mode (while closed)
              <br />
              3. <b>Open</b> the picker
              <br />
              4. <b>Select</b> an item
              <br />
              5. Click <b>outside</b> to close
              <br />
              6. <b>Open</b> the picker again → BUG?
            </div>

            <div className="controls">
              <button onClick={toggleMode} disabled={isOpen}>
                2. Resize (currently: {mode})
              </button>
              <button ref={anchorRef} onClick={openPicker} disabled={isOpen}>
                3/6. Open picker (open #{openCount + 1})
              </button>
            </div>

            <p
              style={{
                margin: "4px 0 16px",
                fontSize: "0.85em",
                color: "#555",
              }}
            >
              Selected: {selectedIdSignal.value ?? "(none)"} · Mode: {mode} ·
              Picker: {isOpen ? "open" : "closed"}
            </p>

            {/* Each mode renders a completely different component tree, matching the real app.
                The key on each ensures Preact unmounts/remounts the popup tree on mode switch. */}
            {mode === "dialog" ? (
              <PickerInsideDialog
                key="dialog"
                instanceId="dialog"
                onClose={closePicker}
                ref={dialogPickerRef}
              />
            ) : (
              <PickerInsidePopover
                key="popover"
                instanceId={`popover-open${openCount}`}
                isOpen={isOpen}
                anchorRef={anchorRef}
                onClose={closePicker}
              />
            )}

            <div id="log">
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <strong>Log:</strong>
                <button
                  onClick={() => {
                    const text = logs.map((e) => e.text).join("\n");
                    window.navigator.clipboard.writeText(text);
                  }}
                  disabled={logs.length === 0}
                >
                  Copy
                </button>
              </div>
              {logs.length === 0 && (
                <div className="log-entry info">
                  — open the picker to start —
                </div>
              )}
              {logs.map((entry, i) => (
                <div key={i} className={`log-entry ${entry.kind}`}>
                  {entry.text}
                </div>
              ))}
            </div>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
