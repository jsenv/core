<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ref callback bug repro</title>
    <style>
      body {
        max-width: 600px;
        padding: 20px;
        font-family: monospace;
      }
      h2 {
        margin-top: 0;
      }
      .steps {
        margin-bottom: 16px;
        padding: 12px 16px;
        font-size: 0.9em;
        line-height: 1.8;
        background: #fffbe6;
        border: 1px solid #e6c700;
        border-radius: 6px;
      }
      .steps strong {
        display: block;
        margin-bottom: 4px;
      }
      .controls {
        display: flex;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      button {
        padding: 8px 14px;
        font-family: monospace;
        background: #fff;
        border: 1px solid #aaa;
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      dialog {
        min-width: 260px;
        padding: 0;
        border: 1px solid #aaa;
        border-radius: 8px;
      }
      .dialog-inner {
        padding: 16px;
      }
      .item-list {
        max-height: 160px;
        margin: 8px 0;
        padding: 0;
        list-style: none;
        border: 1px solid #ddd;
        border-radius: 4px;
        overflow-y: auto;
      }
      .item-list li {
        padding: 6px 12px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
      }
      .item-list li:last-child {
        border-bottom: none;
      }
      .item-list li.selected {
        font-weight: bold;
        background: #e8f0fe;
      }
      .item-list li:hover {
        background: #f5f5f5;
      }
      .item-list li.selected:hover {
        background: #dce8fd;
      }
      #log {
        margin-top: 16px;
        padding-top: 8px;
        border-top: 1px solid #eee;
      }
      .log-entry {
        padding: 3px 0;
        font-size: 0.85em;
        white-space: pre-wrap;
        border-bottom: 1px solid #f5f5f5;
      }
      .log-entry.ok {
        color: #090;
      }
      .log-entry.bug {
        color: #c00;
        font-weight: bold;
      }
      .log-entry.info {
        color: #555;
      }
      .log-entry.warn {
        color: #c60;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      /**
       * Reproduces the bug where ref.current is null inside scrollToItem
       * when the picker is reopened after a resize (popover → dialog mode switch).
       *
       * Uses the REAL Picker, SelectableList, Selectable components.
       * Resize is simulated by setting windowWidthSignal directly:
       *   - wide  (1200px) → popover mode
       *   - narrow (400px) → dialog mode
       *
       * Steps to reproduce:
       * 1. Click "Simulate resize → dialog" (while picker is closed)
       * 2. Open the picker, select an item
       * 3. Close the picker (click outside / press Escape)
       * 4. Open the picker again → BUG: scrollToItem crashes with null ref?
       */

      import { useSignal } from "@preact/signals";
      import { render } from "preact";
      import { useId, useRef } from "preact/hooks";
      import { createContext } from "preact";
      import { Picker } from "@jsenv/navi";
      import { Box } from "@jsenv/navi/src/box/box.jsx";
      import { Field } from "@jsenv/navi/src/control/field.jsx";
      import { useControlgroupProps } from "@jsenv/navi/src/control/control_hooks.jsx";
      import { useCheckableProps } from "@jsenv/navi/src/control/input/use_checkable_props.js";
      import { dispatchRequestAction } from "@jsenv/navi/src/control/validation/custom_constraint_validation.js";
      import {
        dispatchCustomEvent,
        dispatchPublicCustomEvent,
      } from "@jsenv/dom";
      import { List, ListItem } from "@jsenv/navi/src/control/list/list.jsx";
      import { useFocusGroup } from "@jsenv/navi/src/utils/focus/use_focus_group.js";
      import { windowWidthSignal } from "@jsenv/navi/src/layout/responsive.js";

      const OPTIONS = ["Apple", "Banana", "Cherry"];

      const SelectableListMultipleContext = createContext(false);

      // Minimal SelectableList: calls useControlgroupProps (the real one) and
      // renders a real <List> (which creates the .navi_list_container used by
      // useListScrollSync). Skips useFocusGroup and selectedIndicator.
      const MockSelectableList = (props) => {
        const defaultRef = useRef();
        props.ref = props.ref || defaultRef;
        const defaultName = useId();
        props.name = props.name || `mock_list_${defaultName}`;
        const [listControlProps, remainingProps] = useControlgroupProps(props, {
          controlType: "radio_group",
          childComponentType: "radio",
          aggregateChildStates: (childUIStateControllers) => {
            for (const c of childUIStateControllers) {
              if (c.uiState) {
                return c.uiState;
              }
            }
            return undefined;
          },
        });
        useFocusGroup(listControlProps.ref, {
          ySelector: "[navi-selectable-real-input]",
        });
        const listVnode = (
          <List
            as="fieldset"
            navi-has-selected-background=""
            {...listControlProps}
            {...remainingProps}
            name={undefined}
            onnavi_list_nav={(e) => {
              const { item, event } = e.detail;
              const isAutomaticNav =
                event.type === "navi_list_nav_top_on_displayed" ||
                event.type === "navi_list_top_match_change" ||
                event.type === "navi_scroll_restore";
              if (item && !isAutomaticNav) {
                dispatchPublicCustomEvent(
                  e.currentTarget,
                  "navi_list_item_point",
                  { item, event },
                );
              }
            }}
            onnavi_list_request_nav={(e) => {
              const { item } = e.detail;
              if (!item) {
                return;
              }
              dispatchCustomEvent(e.currentTarget, "navi_list_request_scroll", {
                event: e,
                item,
              });
            }}
            onnavi_list_request_select={(e) => {
              const { item } = e.detail;
              if (!item) {
                return;
              }
              const listEl = e.currentTarget;
              dispatchCustomEvent(listEl, "navi_list_request_nav", {
                event: e,
                item,
              });
              dispatchPublicCustomEvent(listEl, "navi_list_select", {
                item,
                event: e,
              });
              const requester = item
                ? listEl.querySelector(`#${CSS.escape(item.id)}`)
                : e.target;
              dispatchRequestAction(listEl, { event: e, requester });
            }}
          />
        );
        return (
          <SelectableListMultipleContext.Provider value={false}>
            {listVnode}
          </SelectableListMultipleContext.Provider>
        );
      };

      // Minimal Selectable: calls useCheckableProps (the real one), renders a real
      // <ListItem> with a visually-hidden radio input. On action, dispatches
      // navi_request_action on the nearest .navi_list_container — same as the real Selectable.
      const MockSelectable = (props) => {
        const { id, value, children, index, ...rest } = props;
        const inputRef = useRef();
        const [checkableProps] = useCheckableProps(
          {
            ...rest,
            ref: inputRef,
            id: `${id}_input`,
            type: "radio",
            value,
            action: (v, { event }) => {
              const listContainerEl = event.currentTarget.closest(
                ".navi_list_container",
              );
              dispatchRequestAction(listContainerEl, { event });
            },
          },
          { multiple: false },
        );
        const { checked, basePseudoState } = checkableProps;
        return (
          <ListItem
            id={id}
            index={index}
            basePseudoState={{
              ":-navi-selected": checked,
              ...basePseudoState,
            }}
            aria-selected={checked}
          >
            <Field
              padding="m"
              flex
              alignY="center"
              expandX
              basePseudoState={basePseudoState}
              pseudoStateSelector="[navi-selectable-real-input]"
              interactive
            >
              <Box
                as="input"
                ref={inputRef}
                {...checkableProps}
                navi-selectable-real-input=""
                navi-visually-hidden=""
                children={undefined}
              />
              {children}
            </Field>
          </ListItem>
        );
      };

      const App = () => {
        const selectedSignal = useSignal();
        const selectedValue = selectedSignal.value;

        const simulateNarrow = () => {
          windowWidthSignal.value = 1200;
          setTimeout(() => {
            windowWidthSignal.value = 536;
          }, 16);
        };

        return (
          <div>
            <p>
              Steps: 1. <b>Simulate resize</b> · 2. <b>Open</b>, select item ·
              3. <b>Close</b> · 4. <b>Open</b> again → BUG?
            </p>
            <button onClick={simulateNarrow}>Simulate resize → dialog</button>
            <Picker
              type="text"
              name="repro_picker"
              value={selectedValue}
              action={(v) => {
                selectedSignal.value = v;
              }}
            >
              <MockSelectableList action="update">
                {OPTIONS.map((opt, i) => (
                  <MockSelectable
                    key={opt}
                    id={`${opt}_item`}
                    index={i}
                    value={opt}
                  >
                    {opt}
                  </MockSelectable>
                ))}
              </MockSelectableList>
            </Picker>
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
