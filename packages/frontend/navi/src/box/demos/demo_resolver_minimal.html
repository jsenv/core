<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>resolver minimal</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" jsenv-type="module/jsx">
      import { signal, useSignal } from "@preact/signals";
      import { render } from "preact";
      import { useRef, useEffect, useCallback } from "preact/hooks";
      import { List, ListItem } from "@jsenv/navi";
      import { dispatchCustomEvent } from "@jsenv/dom";
      import {
        createComponentResolver,
        useNextResolver,
      } from "@jsenv/navi/src/resolver/resolver.jsx";

      const modeSignal = signal("plain");

      window.__mountTracker = { MockDialog: 0, MockPickerCustom: 0, button: 0 };

      const MockDialog = ({ ref, onnavi_close, children }) => {
        useEffect(() => {
          window.__mountTracker.MockDialog++;
          console.debug(
            `[MOUNT MockDialog #${window.__mountTracker.MockDialog}]`,
          );
          return () => console.debug(`[UNMOUNT MockDialog]`);
        }, []);
        const close = () => {
          ref.current.close();
          dispatchCustomEvent(ref.current, "navi_close", {});
        };
        return (
          <dialog
            ref={ref}
            onnavi_close={onnavi_close}
            onCancel={(e) => {
              e.preventDefault();
              close();
            }}
          >
            {children}
          </dialog>
        );
      };

      const MockPickerCustom = (props) => {
        const Next = useNextResolver();
        const popupRef = useRef(null);
        const isDialogMode = modeSignal.value === "dialog";
        useEffect(() => {
          window.__mountTracker.MockPickerCustom++;
          console.debug(
            `[MOUNT MockPickerCustom #${window.__mountTracker.MockPickerCustom}]`,
          );
          return () => console.debug(`[UNMOUNT MockPickerCustom]`);
        }, []);
        const onMouseDown = () => popupRef.current?.showModal();
        const onClose = () => props.action?.("dummy");
        const { children, ...rest } = props;
        if (isDialogMode) {
          return (
            <Next {...rest} onMouseDown={onMouseDown}>
              <MockDialog ref={popupRef} onnavi_close={onClose}>
                {children}
              </MockDialog>
            </Next>
          );
        }
        return (
          <Next {...rest} onMouseDown={onMouseDown}>
            <div>{children}</div>
          </Next>
        );
      };

      const renderMockPicker = createComponentResolver([
        MockPickerCustom,
        "button",
      ]);

      const App = () => {
        const selectedSignal = useSignal();
        return (
          <div>
            <button
              onClick={() => {
                modeSignal.value = "dialog";
              }}
            >
              Switch to dialog
            </button>
            {renderMockPicker({
              value: selectedSignal.value,
              action: () => {
                selectedSignal.value = "x";
              },
              children: (
                <List key="L">
                  <ListItem index={0} value="apple">
                    Apple
                  </ListItem>
                </List>
              ),
            })}
          </div>
        );
      };

      render(<App />, document.getElementById("app"));
    </script>
  </body>
</html>
