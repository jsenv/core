<svg
  xmlns="http://www.w3.org/2000/svg"
  font-family="SauceCodePro Nerd Font, Source Code Pro, Courier"
  font-size="14"
  width="640"
  height="195.45"
  backgroundColor="#282c34"
>
  <g id="background">
    <rect
      x="1"
      y="1"
      width="638"
      height="193.45"
      fill="#282c34"
      stroke="rgba(255,255,255,0.35)"
      stroke-width="1"
      rx="8"
    />
  </g>
  <g id="header">
    <g transform="translate(20,20)">
      <circle cx="0" cy="0" r="6" fill="#ff5f57" />
      <circle cx="20" cy="0" r="6" fill="#febc2e" />
      <circle cx="40" cy="0" r="6" fill="#28c840" />
    </g>
    <text fill="#abb2bf" text-anchor="middle" x="320" y="20">Terminal</text>
  </g>
  <foreignObject
    id="body"
    y="40"
    width="100%"
    height="155.45"
    overflow="hidden"
  >
    <svg
      width="314.05"
      height="155.45"
      font-family="monospace"
      font-variant-east-asian="full-width"
      fill="#abb2bf"
    >
      <g>
        <text x="10" y="14.55">Error: assert({ </text>
        <text x="144.42" y="14.55" fill="#B22222">actual</text>
        <text x="194.83" y="14.55">, </text>
        <text x="211.63" y="14.55" fill="#32CD32">expected</text>
        <text x="287.25" y="14.55"> })</text>
        <text x="10" y="52.55">{</text>
        <text x="10" y="71.55" fill="#B22222">-</text>
        <text x="43.61" y="71.55" fill="#B22222">foo: </text>
        <text x="85.61" y="71.55" fill="#B22222">true</text>
        <text x="119.22" y="71.55" fill="#B22222">,</text>
        <text x="10" y="90.55" fill="#32CD32">+</text>
        <text x="43.61" y="90.55" fill="#32CD32">foo: </text>
        <text x="85.61" y="90.55" fill="#32CD32">false</text>
        <text x="127.62" y="90.55" fill="#32CD32">,</text>
        <text x="10" y="109.55">}</text>
      </g>
    </svg>
  </foreignObject>
</svg>
