        <text x="144.42" y="71.55" fill="#cd5555">,</text>
        <text x="161.22" y="71.55" fill="#cd5555">toto</text>
        <text x="194.83" y="71.55" fill="#cd5555">:</text>
        <text x="211.63" y="71.55" fill="#cd5555">&#x22;actual&#x22;</text>
        <text x="287.25" y="71.55" fill="#cd5555">}</text>
